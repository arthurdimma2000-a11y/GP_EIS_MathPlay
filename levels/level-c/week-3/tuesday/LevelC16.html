<!doctype html>
<html lang="en">
<head>

<style id="gpLessonPrehide">
  .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
  .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}
  .convo-line.show,.speech-line.show,.dialog-line.show,.bubble-line.show,.bubble-left.show,.bubble-right.show,#bubbleLeft.show,#bubbleRight.show{display:block !important;}
  .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,1.9vw,19px) !important;line-height:1.24 !important;max-width:min(40vw,320px) !important;white-space:normal !important;word-break:break-word !important;overflow-wrap:anywhere !important;}
  @media (max-width:780px){
    .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,3.6vw,17px) !important;max-width:min(44vw,220px) !important;line-height:1.2 !important;}
  }
</style>

<script>
  document.documentElement.classList.add('gp-intro-video-pending');
  setTimeout(function(){
    document.documentElement.classList.remove('gp-intro-video-pending');
  }, 60000);
</script>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Level C16 - Pentagons</title>
<link rel="stylesheet" href="../../../../shared/css/base.css" />
<link rel="stylesheet" href="../../../../shared/css/layout.css" />
<link rel="stylesheet" href="../../../../shared/css/lesson.css" />
<style>
  :root{
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    --ink:#2d2d2d;
    --bubble-left:#dff1ff;
    --bubble-right:#ffe7d8;
    --shadow:0 20px 40px rgba(0,0,0,.12);
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    background:#e7f7e7;
    padding:6px;
    color:var(--ink);
  }

  html.gp-intro-video-pending body > *:not(#gpIntroVideoOverlay){visibility:hidden !important;}

  .card{
    width:min(1280px,99vw);
    min-height:calc(100vh - 12px);
    border-radius:18px;
    padding:14px 14px 18px;
  }
  .poster-area{
    position:relative;
    width:100%;
    max-width:1120px;
    margin:0 auto;
    border-radius:16px;
    overflow:hidden;
  }
  .poster-img{width:100%;height:auto;display:block;}
  .circle-layer{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:2;
  }
  .bubble{
    position:absolute;
    padding:18px 24px;
    border-radius:24px;
    font-weight:800;
    font-size:clamp(1.6rem,3vw,2.7rem);
    max-width:520px;
    line-height:1.2;
    box-shadow:0 12px 24px rgba(0,0,0,.14);
    opacity:0;
  }
  .bubble .accent-red{color:#ef3b2d;}
  .bubble.show{opacity:1;}
  .bubble.left{display:none;}
  .bubble.right{right:8%; top:27%; background:var(--bubble-right);}
  .bubble.left::after{
    content:"";
    position:absolute;
    left:12px;
    bottom:-10px;
    border-width:10px 8px 0 8px;
    border-style:solid;
    border-color:var(--bubble-left) transparent transparent transparent;
  }
  .bubble.right::after{
    content:"";
    position:absolute;
    right:14px;
    bottom:-10px;
    border-width:10px 8px 0 8px;
    border-style:solid;
    border-color:var(--bubble-right) transparent transparent transparent;
  }
  .convo-line{
    display:none;
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:3;
    margin:0;
    overflow:visible;
  }
  .convo-line.show{
    display:flex !important;
  }
  .convo-line .bubble-stack{
    position:absolute;
    left:42.5%;
    top:14%;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:6px;
    z-index:4;
  }
  .bubble.sparkle{
    background:linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);
    box-shadow:0 0 12px rgba(255,214,0,.6), 0 0 18px rgba(255,105,180,.4);
    animation:sparklePulse 1.2s ease-in-out infinite;
  }
  @keyframes sparklePulse{
    0%,100%{filter:brightness(1);}
    50%{filter:brightness(1.12);}
  }
  .repeat-result{
    margin-top:4px;
    font-size:2.1rem;
    line-height:1.1;
    font-weight:900;
    color:#2f9f5f;
    text-align:left;
    min-height:1.1em;
  }
  .star-row{
    display:flex;
    gap:6px;
    margin-top:4px;
    font-weight:900;
    font-size:2.35rem;
    line-height:1;
    color:#ffd24a;
    text-shadow:0 2px 0 #b87900,0 4px 0 #8a5a00,0 8px 14px rgba(0,0,0,.28);
    justify-content:flex-start;
    min-height:1em;
  }
  .shape-hit{
    position:absolute;
    border:none;
    border-radius:50%;
    background:transparent;
    cursor:pointer;
    z-index:2;
  }
  .shape-hit.found::after{
    content:"✓";
    position:absolute;
    right:-6px;
    top:-8px;
    width:32px;
    height:32px;
    border-radius:50%;
    display:grid;
    place-items:center;
    background:#23a655;
    color:#fff;
    font-weight:900;
    font-size:20px;
    box-shadow:0 8px 16px rgba(0,0,0,.16);
  }

  .girl-spot{
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
  }
  .girl-spot img{
    width:64px;
    height:64px;
    border-radius:16px;
    object-fit:cover;
    box-shadow:0 6px 14px rgba(0,0,0,.25);
    border:4px solid #ffe3f7;
    background:#ffd6f2;
    cursor:pointer;
  }
  .girl-hint{
    font-weight:800;
    color:#d62828;
    font-size:.9rem;
  }

  .reveal-top{
    position:absolute;
    top:80.7%;
    left:57.8%;
    width:6.9%;
    min-width:32px;
    text-align:center;
    font-size:clamp(1.8rem,4vw,3rem);
    font-weight:800;
    color:#8f8f8f;
    opacity:0;
    line-height:1;
  }
  .reveal-bee{
    position:absolute;
    top:88.35%;
    left:40.35%;
    width:6.9%;
    min-width:32px;
    transform:none;
    font-size:clamp(1.8rem,4vw,3rem);
    font-weight:800;
    color:#8f8f8f;
    opacity:0;
    text-align:center;
    line-height:1;
  }
  .reveal-top.show,
  .reveal-bee.show{opacity:1;}

  .controls{
    margin-top:12px;
    display:flex;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
  }
  .btn{
    border:none;
    border-radius:999px;
    padding:8px 12px;
    font-size:.9rem;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
    background:#ff8a5b;
    color:#fff;
  }
  .mic-icon-btn{
    border:none;
    background:transparent;
    padding:0;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }
  .mic-icon-btn img{
    width:32px;
    height:32px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
  }
  .record-icon{width:16px;height:16px;display:inline-block;vertical-align:middle;}
  .recording{display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .recording audio{height:28px;}
  .recording-status,.conversation-status{font-size:.9rem;font-weight:700;color:#555;}
  .circle-stroke{
    fill:none;
    stroke:#23a655;
    stroke-width:12;
    stroke-linecap:round;
    stroke-linejoin:round;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,.16));
  }
  .circle-stroke.wrong{
    stroke:#d62828;
    stroke-dasharray:12 10;
  }

  @media (max-width:780px){
    .convo-line .bubble-stack{
      left:41.5%;
      top:13.5%;
    }
    .reveal-top{
      top:80.4%;
      left:57.4%;
      width:7.6%;
    }
    .reveal-bee{
      top:88.1%;
      left:39.9%;
      width:7.6%;
    }
  }
  @media (max-width:520px){
    .convo-line .bubble-stack{
      left:40.2%;
      top:13.2%;
    }
    .repeat-result{font-size:1.35rem;}
    .star-row{font-size:1.55rem;}
  }

  #gpIntroVideoOverlay{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.92);
    z-index:99999;
    padding:16px;
    flex-direction:column;
    gap:14px;
  }
  #gpIntroVideoOverlay.active{display:flex;}

  #gpIntroVideo{
    width:min(92vw,980px);
    max-height:82vh;
    height:auto;
    display:block;
    border-radius:14px;
    background:#000;
    box-shadow:0 18px 48px rgba(0,0,0,.45);
  }

  .gp-intro-help{
    color:#fff;
    font-weight:800;
    font-size:1rem;
    text-align:center;
    text-shadow:0 2px 8px rgba(0,0,0,.45);
    max-width:min(92vw,760px);
  }

  .gp-intro-controls{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
  }

  .gp-intro-btn{
    border:none;
    border-radius:999px;
    padding:12px 22px;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,.22);
  }

  .gp-intro-btn.play{
    background:linear-gradient(180deg,#dff7ff,#8fdcff);
    color:#114a67;
    display:none;
  }

  .gp-intro-btn.sound{
    background:linear-gradient(180deg,#fffad7,#ffd86a);
    color:#8b5a00;
  }

  .gp-intro-btn.skip{
    background:linear-gradient(180deg,#ffffff,#e9eef7);
    color:#304060;
  }
</style>

<body>

  <div id="gpIntroVideoOverlay" class="active" aria-label="Lesson intro video">
    <video id="gpIntroVideo" preload="metadata" autoplay muted playsinline webkit-playsinline poster="../../../../assets/images/shapes/LC16c.png">
      <source src="../../../../assets/video/LC16cvideo.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="gp-intro-help" id="gpIntroHelp">Video is playing muted. Tap "Turn On Sound" if you want audio.</div>
    <div class="gp-intro-controls">
      <button class="gp-intro-btn play" id="gpIntroPlayBtn" type="button">Play Intro</button>
      <button class="gp-intro-btn sound" id="gpIntroSoundBtn" type="button">Turn On Sound</button>
      <button class="gp-intro-btn skip" id="gpIntroSkipBtn" type="button">Skip Intro</button>
    </div>
  </div>

  <div class="card">
    <div class="poster-area" id="posterArea">
      <img class="poster-img" src="../../../../assets/images/shapes/LC16c.png" alt="Pentagon poster">
      <svg class="circle-layer" id="circleLayer" viewBox="0 0 1024 1536" preserveAspectRatio="none" aria-hidden="true"></svg>

      <div class="row convo-line" hidden>
        <div class="bubble-stack">
          <div class="bubble baker" id="bubbleLeft">A pentagon has <span class="accent-red">five sides</span> and <span class="accent-red">five vertices</span>.</div>
          <div class="repeat-result" data-line="0"></div>
          <div class="star-row" data-line="0"></div>
        </div>
      </div>
      <button class="shape-hit" data-shape-id="triangle" data-correct="false" data-rx="0.42" data-ry="0.35" aria-label="Triangle" style="left:9.8%;top:54.7%;width:30.4%;height:19.2%;"></button>
      <button class="shape-hit" data-shape-id="quadrilateral" data-correct="false" data-rx="0.31" data-ry="0.39" aria-label="Quadrilateral" style="left:39.8%;top:50.5%;width:17.3%;height:16.1%;"></button>
      <button class="shape-hit" data-shape-id="pentagon" data-correct="true" data-rx="0.42" data-ry="0.35" aria-label="Pentagon" style="left:56.6%;top:49.8%;width:31.3%;height:18.7%;"></button>

      <div class="reveal-top" id="topLine"></div>
      <div class="reveal-bee" id="beeLine"></div>
    </div>

    <div class="controls">
      <div class="girl-spot" aria-label="Tap the girl">
        <img src="../../../../assets/images/shapes/CirckleGirlWk1.png" alt="Tap the girl" id="girlBtn" class="tap-girl">
        <div class="girl-hint">Tap the girl</div>
      </div>
      <button class="btn prev" id="prevBtn">&#8592; Previous page</button>
      <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
        <img src="../../../../assets/images/avatars/Microphone.png" alt="Microphone">
      </button>
      <button class="btn next" id="nextBtn">Next page &#8594;</button>
      <button class="btn" id="recordBtn">
        <svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z"
                fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
          <path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        </svg> Record Practice
      </button>
      <div class="recording">
        <audio id="recordingPlayback" controls></audio>
      </div>
    </div>
    <div class="recording-status" id="recordingStatus"></div>
    <div class="conversation-status" id="conversationStatus"></div>
  </div>

  <script>
    window.__GP_REQUIRE_INTRO_AUDIO__ = true;

    const girlBtn = document.getElementById('girlBtn');
    const topLine = document.getElementById('topLine');
    const beeLine = document.getElementById('beeLine');
    const bubbleLeft = document.getElementById('bubbleLeft');
    const micIconBtn = document.getElementById('micIconBtn');
    const recordBtn = document.getElementById('recordBtn');
    const recordingPlayback = document.getElementById('recordingPlayback');
    const recordingStatus = document.getElementById('recordingStatus');
    const conversationStatus = document.getElementById('conversationStatus');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const circleLayer = document.getElementById('circleLayer');
    const posterArea = document.getElementById('posterArea');
    const shapeHits = Array.from(document.querySelectorAll('.shape-hit'));
    const lines = Array.from(document.querySelectorAll('.convo-line'));
    const repeatResults = Array.from(document.querySelectorAll('.repeat-result'));
    const starRows = Array.from(document.querySelectorAll('.star-row'));

    let recorder = null;
    let recordedChunks = [];
    let isRecording = false;
    let solved = false;
    const expectedLines = ['A pentagon has five sides and five vertices.'];
    const attempts = [0];
    const starsAwarded = [0];
    let micStepIndex = 0;
    let micPhase = 'reveal';
    let micBusy = false;
    let micDone = false;
    let micInitialized = false;

    function speak(text, onEnd){
      if(!('speechSynthesis' in window)) {
        if (typeof onEnd === 'function') setTimeout(onEnd, 500);
        return;
      }
      try{ window.speechSynthesis.cancel(); }catch(e){}
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 1.0;
      u.pitch = 1.05;
      u.volume = 1.0;
      if (window.GPTracing?.applyPreferredVoice) window.GPTracing.applyPreferredVoice(u);
      if (typeof onEnd === 'function') {
        u.onend = () => onEnd();
        u.onerror = () => onEnd();
      }
      window.speechSynthesis.speak(u);
    }

    function showLine(el, text){
      el.textContent = text;
      el.classList.add('show');
    }

    function showBubble(el, text){
      el.textContent = text;
      el.classList.add('show');
    }

    function showConvoLine(index){
      const line = lines[index];
      if (!line) return;
      line.hidden = false;
      line.classList.add('show');
      line.style.display = 'flex';
      const bubble = line.querySelector('.bubble');
      if (bubble) bubble.classList.add('show');
    }

    function hideAllLines(){
      lines.forEach((line) => {
        line.hidden = true;
        line.classList.remove('show');
        line.style.display = 'none';
        const bubble = line.querySelector('.bubble');
        if (bubble) {
          bubble.classList.remove('show');
          bubble.classList.remove('sparkle');
        }
      });
    }

    function highlightLine(index, on){
      const line = lines[index];
      const bubble = line ? line.querySelector('.bubble') : null;
      if (!bubble) return;
      bubble.classList.toggle('sparkle', on);
    }

    function setStars(index, count){
      const row = starRows[index];
      if (!row) return;
      row.innerHTML = new Array(count).fill('&#9733;').join('');
    }

    function resetMicProtocol(){
      hideAllLines();
      repeatResults.forEach((el) => { if (el) el.textContent = ''; });
      starRows.forEach((el) => { if (el) el.textContent = ''; });
      attempts[0] = 0;
      starsAwarded[0] = 0;
      micStepIndex = 0;
      micPhase = 'reveal';
      micBusy = false;
      micDone = false;
      micInitialized = false;
      highlightLine(0, false);
    }

    function showAndSpeakLine(index){
      if (index < 0 || index >= lines.length) return;
      showConvoLine(index);
      const line = lines[index];
      const bubble = line.querySelector('.bubble');
      if (bubble) speak(bubble.textContent || '');
    }

    function listenForRepeat(expectedText, onDone){
      if (window.GPTracing?.listenForRepeat) {
        window.GPTracing.listenForRepeat(expectedText, onDone);
        return;
      }
      onDone(100, expectedText);
    }

    function moveToNextMicStep(){
      highlightLine(micStepIndex, false);
      micStepIndex += 1;
      micPhase = 'reveal';
      micBusy = false;

      if (micStepIndex >= expectedLines.length) {
        micDone = true;
        const totalStars = starsAwarded.reduce((sum, count) => sum + count, 0);
        const score = Math.round((totalStars / 3) * 100);
        conversationStatus.textContent = totalStars > 0 ? 'Amazing job!' : 'Good try!';
        saveLessonProgress(score, totalStars > 0 || solved);
      }
    }

    async function runMicStepFlow(){
      if (window.GPTracing?.prepareMicSupport) {
        await window.GPTracing.prepareMicSupport().catch(() => {});
      }
      if (micDone || micBusy) return;

      if (!micInitialized) {
        showConvoLine(0);
        micInitialized = true;
      }

      if (micPhase === 'reveal') {
        showAndSpeakLine(micStepIndex);
        conversationStatus.textContent = expectedLines[micStepIndex];
        micPhase = 'repeat';
        return;
      }

      highlightLine(micStepIndex, true);
      micBusy = true;
      conversationStatus.textContent = 'Repeat after me.';

      speak('Repeat after me.', () => {
        listenForRepeat(expectedLines[micStepIndex], (pct, said) => {
          const tryNo = ++attempts[micStepIndex];

          if (pct >= 50) {
            if (repeatResults[micStepIndex]) {
              repeatResults[micStepIndex].style.color = '#2f9f5f';
              repeatResults[micStepIndex].textContent = (said || expectedLines[micStepIndex]).trim();
            }
            starsAwarded[micStepIndex] = window.GPTracing?.rewardStars ? window.GPTracing.rewardStars(tryNo) : Math.max(1, 4 - tryNo);
            setStars(micStepIndex, starsAwarded[micStepIndex]);
            setTimeout(() => moveToNextMicStep(), 220);
            return;
          }

          if (tryNo >= 3) {
            if (repeatResults[micStepIndex]) {
              repeatResults[micStepIndex].style.color = '#c62828';
              repeatResults[micStepIndex].textContent = 'You did a good job. Nice try!';
            }
            starsAwarded[micStepIndex] = 0;
            setStars(micStepIndex, 0);
            speak('You did a good job. Nice try!', () => setTimeout(() => moveToNextMicStep(), 200));
            return;
          }

          micBusy = false;
          micPhase = 'repeat';
          if (repeatResults[micStepIndex]) {
            repeatResults[micStepIndex].style.color = '#c62828';
            repeatResults[micStepIndex].textContent = 'Sorry, try again!';
          }
          conversationStatus.textContent = 'Sorry, try again!';
          speak('Sorry, try again!');
        });
      });
    }

    window.__GP_DISABLE_UNIFIED_MIC_PROTOCOL = true;

    function clearCircle(shapeId){
      const existing = circleLayer.querySelector('[data-circle-for="' + shapeId + '"]');
      if (existing) existing.remove();
    }

    function drawCircleForHit(hit, isWrong){
      const areaRect = posterArea.getBoundingClientRect();
      const rect = hit.getBoundingClientRect();
      const svgW = 1024;
      const svgH = 1536;
      const x = ((rect.left - areaRect.left) / areaRect.width) * svgW;
      const y = ((rect.top - areaRect.top) / areaRect.height) * svgH;
      const w = (rect.width / areaRect.width) * svgW;
      const h = (rect.height / areaRect.height) * svgH;
      clearCircle(hit.dataset.shapeId);
      const ellipse = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
      ellipse.setAttribute('cx', (x + w / 2).toFixed(2));
      ellipse.setAttribute('cy', (y + h / 2).toFixed(2));
      ellipse.setAttribute('rx', (w * Number(hit.dataset.rx || 0.42)).toFixed(2));
      ellipse.setAttribute('ry', (h * Number(hit.dataset.ry || 0.34)).toFixed(2));
      ellipse.setAttribute('class', 'circle-stroke' + (isWrong ? ' wrong' : ''));
      ellipse.setAttribute('data-circle-for', hit.dataset.shapeId);
      circleLayer.appendChild(ellipse);
      if (isWrong) {
        setTimeout(() => clearCircle(hit.dataset.shapeId), 720);
      }
    }

    function saveLessonProgress(score, completed){
      if (typeof window.finishAndSave !== 'function') return;
      window.finishAndSave({
        pageId: 'LevelC16',
        level: 'C',
        activityType: 'lesson',
        score,
        stars: score >= 95 ? 3 : score >= 60 ? 2 : score > 0 ? 1 : 0,
        completed: !!completed,
        skills: { reading: 1, writing: 0, speaking: 1, listening: 1 }
      });
    }

    function toggleRecord(){
      if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        recordingStatus.textContent = "Recording not supported in this browser.";
        return;
      }
      if(isRecording){
        recorder && recorder.stop();
        return;
      }
      navigator.mediaDevices.getUserMedia({ audio:true })
        .then(stream => {
          recorder = new MediaRecorder(stream);
          recordedChunks = [];
          recorder.ondataavailable = e => {
            if(e.data && e.data.size > 0) recordedChunks.push(e.data);
          };
          recorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'audio/webm' });
            recordingPlayback.src = URL.createObjectURL(blob);
            recordingStatus.textContent = "Recording ready.";
            stream.getTracks().forEach(t => t.stop());
            isRecording = false;
            recordBtn.innerHTML = `<svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">
              <path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z"
                    fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
              <path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
              <path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
              <path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
            </svg> Record Practice`;
          };
          recorder.start();
          isRecording = true;
          recordingStatus.textContent = "Recording...";
          recordBtn.textContent = "Stop Recording";
        })
        .catch(() => {
          recordingStatus.textContent = "Microphone permission denied.";
        });
    }

    girlBtn.addEventListener('click', () => {
      showLine(topLine, "5");
      showLine(beeLine, "5");
      conversationStatus.textContent = "A pentagon has 5 sides and 5 vertices.";
      speak("A pentagon has 5 sides and 5 vertices.");
    });

    recordBtn.addEventListener('click', toggleRecord);
    shapeHits.forEach((hit) => {
      hit.addEventListener('click', () => {
        const isCorrect = hit.dataset.correct === 'true';
        if (isCorrect) {
          hit.classList.add('found');
          solved = true;
          drawCircleForHit(hit, false);
          conversationStatus.textContent = "Correct. That shape is a pentagon.";
          speak("Correct. That shape is a pentagon.");
          saveLessonProgress(100, true);
          return;
        }
        drawCircleForHit(hit, true);
        conversationStatus.textContent = "Try again. Find the pentagon.";
        speak("Try again. Find the pentagon.");
      });
    });

    if (micIconBtn) {
      micIconBtn.addEventListener('click', () => {
        if (micDone) {
          resetMicProtocol();
        }
        runMicStepFlow();
      });
    }

    if(prevBtn) prevBtn.addEventListener('click', () => { window.location.href = '../monday/LevelC15.html'; });
    if(nextBtn) nextBtn.addEventListener('click', () => {
      saveLessonProgress(solved ? 100 : 0, solved);
      window.location.href = 'LevelC17.html';
    });

    resetMicProtocol();
  </script>

  <script src="../../../../activity-standardizer.js"></script>
  <script src="../../../../shared/js/storage.js"></script>
  <script src="../../../../shared/js/progress.js"></script>
  <script src="../../../../shared/js/tracing.js"></script>
  <script type="module">
    import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
    window.GPProgress.installTracker({
      saveActivityResult,
      markLoginPing,
      defaultPageId: "LevelC16",
      defaultLevel: "C",
      defaultActivityType: "lesson",
      defaultScore: 100,
      defaultStars: 1,
      defaultSkills: {
        reading: 1,
        writing: 0,
        speaking: 1,
        listening: 1
      }
    });

    function getStudentSession(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
      }catch(e){
        return null;
      }
    }

    function inferProgressMeta(payload){
      const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
      const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
      const level = (payload && payload.level)
        || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
      const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
      const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
      const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
      const month = payload && payload.month != null ? Number(payload.month) : 1;
      return {
        pageId,
        file,
        level,
        week: Number.isFinite(week) && week > 0 ? week : 1,
        month: Number.isFinite(month) && month > 0 ? month : 1
      };
    }

    function getActivityStore(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      }catch(e){
        return {};
      }
    }

    function setActivityStore(store){
      try{
        localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
      }catch(e){}
    }

    function saveLocalActivityFallback(payload){
      const session = getStudentSession() || {};
      const meta = inferProgressMeta(payload || {});
      const score = payload && typeof payload.score === "number" ? payload.score : 0;
      const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
      const tracing = payload && typeof payload.tracing === "number"
        ? payload.tracing
        : (payload && typeof payload.progress === "number" ? payload.progress : 0);
      const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
      const entry = {
        pageId: meta.pageId,
        file: meta.file,
        level: meta.level,
        type,
        activityType: (payload && payload.activityType) || type,
        score,
        stars,
        skills: payload && payload.skills ? payload.skills : {},
        completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
        tracing,
        week: meta.week,
        month: meta.month,
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
        savedAt: new Date().toISOString(),
        ts: Date.now()
      };
      const store = getActivityStore();
      store[meta.pageId] = {
        ...(store[meta.pageId] || {}),
        ...entry
      };
      setActivityStore(store);
      try{
        localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
      }catch(e){}
      return store[meta.pageId];
    }

    async function finishAndSave(payload){
      const session = getStudentSession() || {};
      const fullPayload = {
        ...(payload || {}),
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
      };
    
      saveLocalActivityFallback(fullPayload);
    
      if (typeof window.finishActivity === "function") {
        try{
          await window.finishActivity(fullPayload);
        }catch(err){
          console.warn("finishActivity failed, local fallback already saved:", err);
        }
      }
    
      return fullPayload;
    }

    window.finishAndSave = finishAndSave;
  </script>

  <script>
    (function(){
      const html = document.documentElement;
      const overlay = document.getElementById("gpIntroVideoOverlay");
      const video = document.getElementById("gpIntroVideo");
      const help = document.getElementById("gpIntroHelp");
      const playBtn = document.getElementById("gpIntroPlayBtn");
      const soundBtn = document.getElementById("gpIntroSoundBtn");
      const skipBtn = document.getElementById("gpIntroSkipBtn");

      if (!overlay || !video || !help || !playBtn || !soundBtn || !skipBtn) {
        html.classList.remove("gp-intro-video-pending");
        return;
      }

      let revealed = false;
      let hardTimeout = setTimeout(revealLesson, 60000);

      function revealLesson(){
        if (revealed) return;
        revealed = true;
        clearTimeout(hardTimeout);
        try { video.pause(); } catch(e){}
        overlay.classList.remove("active");
        overlay.style.display = "none";
        html.classList.remove("gp-intro-video-pending");
      }

      function showPlayFallback(msg){
        help.textContent = msg || 'Tap "Play Intro" to start the video.';
        playBtn.style.display = "inline-flex";
      }

      async function tryAutoplayMuted(){
        try{
          video.muted = true;
          video.defaultMuted = true;
          await video.play();
          help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
          playBtn.style.display = "none";
        }catch(err){
          showPlayFallback('Autoplay was blocked. Tap "Play Intro" to start.');
        }
      }

      async function playWithSound(){
        try{
          video.muted = false;
          video.defaultMuted = false;
          video.volume = 1;
          await video.play();
          help.textContent = 'Sound is on. Tap "Skip Intro" to continue.';
          playBtn.style.display = "none";
        }catch(err){
          help.textContent = 'Tap "Play Intro" first, then tap "Turn On Sound".';
          playBtn.style.display = "inline-flex";
        }
      }

      playBtn.addEventListener("click", async () => {
        try{
          video.muted = true;
          video.defaultMuted = true;
          await video.play();
          help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
          playBtn.style.display = "none";
        }catch(err){
          help.textContent = "Unable to start the intro video.";
        }
      });

      soundBtn.addEventListener("click", playWithSound);
      skipBtn.addEventListener("click", revealLesson);

      video.addEventListener("playing", () => {
        help.textContent = video.muted
          ? 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".'
          : 'Sound is on. Tap "Skip Intro" to continue.';
      });

      video.addEventListener("ended", revealLesson, { once:true });

      video.addEventListener("error", () => {
        help.textContent = "Intro video failed to load. Opening page now.";
        setTimeout(revealLesson, 800);
      }, { once:true });

      video.addEventListener("loadedmetadata", () => {
        tryAutoplayMuted();
      }, { once:true });

      setTimeout(() => {
        if (!revealed && video.readyState >= 1) tryAutoplayMuted();
      }, 1200);
    })();
  </script>

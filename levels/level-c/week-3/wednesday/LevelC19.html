<style>
  :root{
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    --ink:#234057;
    --shadow:0 20px 40px rgba(0,0,0,.10);
    --good:#239b56;
    --warn:#d93025;
    --accent:#ff8a5b;
    --accent-soft:#eaf5ff;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#e7f7e7;
    padding:6px;
    color:var(--ink);
  }

  html.gp-intro-video-pending body > *:not(#gpIntroVideoOverlay){
    visibility:hidden !important;
  }

  .card{
    width:min(1280px,99vw);
    min-height:calc(100vh - 12px);
    border-radius:18px;
    padding:14px 14px 18px;
  }

  .poster-area{
    position:relative;
    width:100%;
    max-width:1120px;
    margin:0 auto;
  }

  .poster-img{
    width:100%;
    height:auto;
    display:block;
    border-radius:14px;
    box-shadow:var(--shadow);
    user-select:none;
    -webkit-user-drag:none;
  }

  .match-lines{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:2;
  }

  .match-hit{
    position:absolute;
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:transparent;
    transform:translate(-50%, -50%);
    cursor:pointer;
    z-index:3;
    touch-action:manipulation;
    padding:0;
  }

  .match-hit::before{
    content:"";
    position:absolute;
    inset:9px;
    border-radius:50%;
    background:#111;
    box-shadow:0 0 0 2px rgba(255,255,255,.82);
  }

  .match-hit.active{
    box-shadow:0 0 0 7px rgba(29,95,214,.25);
  }

  .match-hit.done{
    box-shadow:0 0 0 7px rgba(35,155,86,.28);
  }

  .prompt-bubble{
    margin:12px auto 0;
    width:min(1120px,100%);
    padding:12px 16px;
    border-radius:18px;
    background:var(--accent-soft);
    color:var(--ink);
    font-weight:800;
    text-align:center;
    box-shadow:0 10px 24px rgba(0,0,0,.08);
  }

  .progress-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    margin-top:12px;
    width:min(1120px,100%);
    margin-left:auto;
    margin-right:auto;
  }

  .progress-text{
    font-weight:800;
    color:#184a86;
  }

  .progress-bar{
    width:min(560px,92%);
    height:14px;
    border-radius:999px;
    background:#e7efff;
    overflow:hidden;
    box-shadow:inset 0 1px 3px rgba(0,0,0,.15);
  }

  .progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#3cc4ff,#7dffb3);
    transition:width .15s ease-out;
  }

  .status-line{
    text-align:center;
    min-height:1.4em;
    font-weight:800;
    color:#1f7a3a;
    margin-top:2px;
  }

  .controls{
    margin-top:12px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    width:min(1120px,100%);
    margin-left:auto;
    margin-right:auto;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:9px 14px;
    font-size:.92rem;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
    background:var(--accent);
    color:#fff;
  }

  .btn.secondary{
    background:linear-gradient(180deg,#fffad7,#ffd86a);
    color:#8b5a00;
  }

  .mic-icon-btn{
    border:none;
    background:transparent;
    padding:0;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .mic-icon-btn img{
    width:32px;
    height:32px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
  }

  .record-icon{
    width:16px;
    height:16px;
    display:inline-block;
    vertical-align:middle;
  }

  .recording{
    display:inline-flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }

  .recording audio{
    height:28px;
  }

  .recording-status,.conversation-status{
    font-size:.9rem;
    font-weight:700;
    color:#555;
    text-align:center;
    width:min(1120px,100%);
    margin:6px auto 0;
  }

  #gpIntroVideoOverlay{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.92);
    z-index:99999;
    padding:16px;
    flex-direction:column;
    gap:14px;

  #gpIntroVideoOverlay.active{display:flex;}

  #gpIntroVideo{
    width:min(92vw,980px);
    max-height:82vh;
    height:auto;
    display:block;
    border-radius:14px;
    background:#000;
    box-shadow:0 18px 48px rgba(0,0,0,.45);

  .gp-intro-help{
    color:#fff;
    font-weight:800;
    font-size:1rem;
    text-align:center;
    text-shadow:0 2px 8px rgba(0,0,0,.45);
    max-width:min(92vw,760px);
  }

  .gp-intro-controls{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
  }

  .gp-intro-btn{
    border:none;
    border-radius:999px;
    padding:12px 22px;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,.22);
  }

  .gp-intro-btn.play{
    background:linear-gradient(180deg,#dff7ff,#8fdcff);
    color:#114a67;
    display:none;
  }

  .gp-intro-btn.sound{
    background:linear-gradient(180deg,#fffad7,#ffd86a);
    color:#8b5a00;

    background:linear-gradient(180deg,#ffffff,#e9eef7);

    .match-hit{
      width:34px;
      height:34px;
    }

    .match-hit::before{
      inset:7px;
    }

<script>
(() => {
  window.__GP_REQUIRE_INTRO_AUDIO__ = true;

  const matchLines = document.getElementById('matchLines');
  const matchHits = Array.from(document.querySelectorAll('.match-hit'));
  const promptBubble = document.getElementById('promptBubble');
  const progressPercentEl = document.getElementById('progressPercent');
  const progressFillEl = document.getElementById('progressFill');
  const statusLine = document.getElementById('statusLine');
  const micIconBtn = document.getElementById('micIconBtn');
  const recordBtn = document.getElementById('recordBtn');
  const recordingPlayback = document.getElementById('recordingPlayback');
  const recordingStatus = document.getElementById('recordingStatus');
  const conversationStatus = document.getElementById('conversationStatus');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const clearBtn = document.getElementById('clearBtn');

  /* Left order:
     0 sloth
     1 monkey
     2 bee
     3 butterfly

     Right order:
     0 monkey hangs.
     1 sloth hangs.
     2 butterfly flies.
     3 bee hangs.
  */
  const correctMap = [1, 0, 3, 2];

  let startIndex = null;
  const matchedLeft = new Set();
  const matchedRight = new Set();
  let saveTimer = null;
  let celebrated = false;
  let recorder = null;
  let recordedChunks = [];
  let isRecording = false;

  function speak(text){
    if (window.GPTracing && typeof window.GPTracing.speakText === 'function') {
      window.GPTracing.speakText(text, { rate: 0.95, pitch: 1.05 });
      return;
    }
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.96;
    u.pitch = 1.06;
    window.speechSynthesis.speak(u);
  }

  function playChime(){
    try{ new Audio('../../../../assets/audio/chimes/chime.mp3.mp3').play().catch(()=>{}); }catch(_e){}
  }

  function playCelebration(){
    playChime();
    window.GPTracing?.playTraceCelebration?.();
  }

  function drawMatchLine(startBtn, endBtn){
    const x1 = parseFloat(startBtn.style.left);
    const y1 = parseFloat(startBtn.style.top);
    const x2 = parseFloat(endBtn.style.left);
    const y2 = parseFloat(endBtn.style.top);

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#239b56');
    line.setAttribute('stroke-width', '0.95');
    line.setAttribute('stroke-linecap', 'round');
    matchLines.appendChild(line);
  }

  function computeScore(){
    return Math.round((matchedLeft.size / correctMap.length) * 100);
  }

  function updateProgressUI(){
    const score = computeScore();
    progressPercentEl.textContent = score + '%';
    progressFillEl.style.width = score + '%';

    if (score === 0) {
      promptBubble.textContent = 'Connect each tangram animal on the left to its correct name on the right.';
      statusLine.textContent = '';
    } else if (score < 100) {
      promptBubble.textContent = 'Great work. Keep matching the black dots to the correct animal names.';
    } else {
      promptBubble.textContent = 'Excellent! You matched all the tangram animals correctly.';
      statusLine.textContent = 'Excellent! You completed the page quest.';
    }
    return score;
  }

  function persistProgress(){
    const score = updateProgressUI();
    if (typeof window.finishAndSave !== 'function') return;
    window.finishAndSave({
      pageId: 'LevelC19',
      level: 'C',
      activityType: 'matching',
      score,
      progress: score,
      tracing: score,
      completed: score === 100,
      stars: score >= 95 ? 3 : score >= 65 ? 2 : score > 0 ? 1 : 0,
      skills: { reading: 1, writing: 1, speaking: 0, listening: 1 }
    }).catch(() => {});
  }

  function schedulePersist(){
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(persistProgress, 120);
  }

  function clearPuzzle(){
    startIndex = null;
    matchedLeft.clear();
    matchedRight.clear();
    celebrated = false;
    matchLines.innerHTML = '';
    matchHits.forEach(btn => btn.classList.remove('active', 'done'));
    conversationStatus.textContent = '';
    updateProgressUI();
    statusLine.textContent = 'Start from a black dot on the left.';
    schedulePersist();
  }

  function handleSelection(btn){
    const side = btn.dataset.side;
    const index = Number(btn.dataset.index);

    if (side === 'left') {
      if (matchedLeft.has(index)) return;
      matchHits.forEach(node => node.classList.remove('active'));
      startIndex = index;
      btn.classList.add('active');
      conversationStatus.textContent = 'Now tap the matching black dot on the right.';
      return;
    }

    if (startIndex === null) {
      conversationStatus.textContent = 'Tap a black dot on the left first.';
      speak('Tap a black dot on the left first.');
      return;
    }

    if (matchedLeft.has(startIndex) || matchedRight.has(index)) return;

    const leftBtn = matchHits.find(node => node.dataset.side === 'left' && Number(node.dataset.index) === startIndex);
    if (!leftBtn) {
      startIndex = null;
      return;
    }

    if (correctMap[startIndex] === index) {
      drawMatchLine(leftBtn, btn);
      leftBtn.classList.remove('active');
      leftBtn.classList.add('done');
      btn.classList.add('done');
      matchedLeft.add(startIndex);
      matchedRight.add(index);
      conversationStatus.textContent = 'Correct!';
      playChime();

      if (matchedLeft.size === correctMap.length && !celebrated) {
        celebrated = true;
        playCelebration();
        speak('Excellent! You matched all the tangram animals correctly.');
      }
      schedulePersist();
    } else {
      conversationStatus.textContent = 'Try again!';
      speak('Try again!');
      matchHits.forEach(node => node.classList.remove('active'));
    }

    startIndex = null;
    updateProgressUI();
  }

  matchHits.forEach(btn => {
    ['click','pointerup','touchend'].forEach(eventName => {
      btn.addEventListener(eventName, (e) => {
        e.preventDefault();
        handleSelection(btn);
      }, { passive:false });
    });
  });

  micIconBtn.addEventListener('click', () => {
    conversationStatus.textContent = 'Tap a left black dot, then tap its correct name dot on the right.';
    speak('Tap a left black dot, then tap its correct name dot on the right.');
  });

  clearBtn.addEventListener('click', clearPuzzle);
  prevBtn.addEventListener('click', () => { window.location.href = 'LevelC18.html'; });
  nextBtn.addEventListener('click', async () => {
    persistProgress();
    window.location.href = '../thursday/LevelC_Revision3.html';
  });

  function toggleRecord(){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      recordingStatus.textContent = 'Recording not supported in this browser.';
      return;
    }

    if(isRecording){
      recorder && recorder.stop();
      return;
    }

    navigator.mediaDevices.getUserMedia({ audio:true })
      .then(stream => {
        recorder = new MediaRecorder(stream);
        recordedChunks = [];

        recorder.ondataavailable = e => {
          if(e.data && e.data.size > 0) recordedChunks.push(e.data);
        };

        recorder.onstop = () => {
          const blob = new Blob(recordedChunks, { type: 'audio/webm' });
          recordingPlayback.src = URL.createObjectURL(blob);
          recordingStatus.textContent = 'Recording ready.';
          stream.getTracks().forEach(t => t.stop());
          isRecording = false;
          recordBtn.innerHTML = `<svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">
            <path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z"
                  fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
            <path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
            <path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
            <path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          </svg> Practice Record`;
        };

        recorder.start();
        isRecording = true;
        recordingStatus.textContent = 'Recording...';
        recordBtn.textContent = 'Stop Recording';
      })
      .catch(() => {
        recordingStatus.textContent = 'Microphone permission denied.';
      });
  }

  recordBtn.addEventListener('click', toggleRecord);

  updateProgressUI();
  schedulePersist();
})();
</script>

<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LevelC19",
    defaultLevel: "C",
    defaultActivityType: "lesson",
    defaultScore: 100,
    defaultStars: 1,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);
    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}
    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };

    saveLocalActivityFallback(fullPayload);

    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }

    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>

<script>
  (function(){
    const html = document.documentElement;
    const overlay = document.getElementById("gpIntroVideoOverlay");
    const video = document.getElementById("gpIntroVideo");
    const help = document.getElementById("gpIntroHelp");
    const playBtn = document.getElementById("gpIntroPlayBtn");
    const soundBtn = document.getElementById("gpIntroSoundBtn");
    const skipBtn = document.getElementById("gpIntroSkipBtn");

    if (!overlay || !video || !help || !playBtn || !soundBtn || !skipBtn) {
      html.classList.remove("gp-intro-video-pending");
      return;
    }

    let revealed = false;
    let hardTimeout = setTimeout(revealLesson, 60000);

    function revealLesson(){
      if (revealed) return;
      revealed = true;
      clearTimeout(hardTimeout);
      try { video.pause(); } catch(e){}
      overlay.classList.remove("active");
      overlay.style.display = "none";
      html.classList.remove("gp-intro-video-pending");
    }

    function showPlayFallback(msg){
      help.textContent = msg || 'Tap "Play Intro" to start the video.';
      playBtn.style.display = "inline-flex";
    }

    async function tryAutoplayMuted(){
      try{
        video.muted = true;
        video.defaultMuted = true;
        await video.play();
        help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
        playBtn.style.display = "none";
      }catch(err){
        showPlayFallback('Autoplay was blocked. Tap "Play Intro" to start.');
      }
    }

    async function playWithSound(){
      try{
        video.muted = false;
        video.defaultMuted = false;
        video.volume = 1;
        await video.play();
        help.textContent = 'Sound is on. Tap "Skip Intro" to continue.';
        playBtn.style.display = "none";
      }catch(err){
        help.textContent = 'Tap "Play Intro" first, then tap "Turn On Sound".';
        playBtn.style.display = "inline-flex";
      }
    }

    playBtn.addEventListener("click", async () => {
      try{
        video.muted = true;
        video.defaultMuted = true;
        await video.play();
        help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
        playBtn.style.display = "none";
      }catch(err){
        help.textContent = "Unable to start the intro video.";
      }
    });

    soundBtn.addEventListener("click", playWithSound);
    skipBtn.addEventListener("click", revealLesson);

    video.addEventListener("playing", () => {
      help.textContent = video.muted
        ? 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".'
        : 'Sound is on. Tap "Skip Intro" to continue.';
    });

    video.addEventListener("ended", revealLesson, { once:true });

    video.addEventListener("error", () => {
      help.textContent = "Intro video failed to load. Opening page now.";
      setTimeout(revealLesson, 800);
    }, { once:true });

    video.addEventListener("loadedmetadata", () => {
      tryAutoplayMuted();
    }, { once:true });

    setTimeout(() => {
      if (!revealed && video.readyState >= 1) tryAutoplayMuted();
    }, 1200);
  })();
</script>
</body>

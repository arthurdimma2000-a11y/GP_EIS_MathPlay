<!doctype html>
<html lang="en">
<head>

<style id="gpLessonPrehide">
  .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
  .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}
  .convo-line.show,.speech-line.show,.dialog-line.show,.bubble-line.show,.bubble-left.show,.bubble-right.show,#bubbleLeft.show,#bubbleRight.show{display:block !important;}
  .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,1.9vw,19px) !important;line-height:1.24 !important;max-width:min(40vw,320px) !important;white-space:normal !important;word-break:break-word !important;overflow-wrap:anywhere !important;}
  @media (max-width:780px){
    .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,3.6vw,17px) !important;max-width:min(44vw,220px) !important;line-height:1.2 !important;}
  }
</style>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Level C15 - Hexagons and Octagons</title>
<link rel="stylesheet" href="../../../../shared/css/base.css" />
<link rel="stylesheet" href="../../../../shared/css/layout.css" />
<link rel="stylesheet" href="../../../../shared/css/lesson.css" />

<style>
  :root{
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    --shadow:0 20px 40px rgba(0,0,0,.12);
    --hex:#e53935;
    --hexGlow:rgba(229,57,53,.30);
    --hexGlowSoft:rgba(229,57,53,.16);
    --oct:#1e88e5;
    --octGlow:rgba(30,136,229,.30);
    --octGlowSoft:rgba(30,136,229,.16);
    --green:#38d27a;
    --gold:#ffd24a;
    --ink:#1b4e74;
  }

  *{box-sizing:border-box}

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    background:#e7f7e7;
    padding:6px;
    margin:0;
  }

  .app{
    width:min(1280px,99vw);
    min-height:calc(100vh - 12px);
    border-radius:18px;
    padding:12px;
    display:flex;
    flex-direction:column;
  }

  .wrap{
    position:relative;
    width:100%;
    max-width:1120px;
    margin:0 auto;
    aspect-ratio:563/748;
    user-select:none;
    -webkit-user-select:none;
    overflow:hidden;
    border-radius:16px;
    box-shadow:0 16px 30px rgba(0,0,0,.10);
  }

  #poster{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    display:block;
    pointer-events:none;
  }

  #ink,
  #fx{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    display:block;
    background:transparent;
    touch-action:none;
    cursor:crosshair;
  }

  #ink{z-index:2}
  #fx{z-index:3; pointer-events:none}

  .progress-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:7px;
    width:100%;
    max-width:1120px;
    margin:10px auto 0;
    background:rgba(255,255,255,.72);
    border-radius:20px;
    padding:12px 10px 10px;
    box-shadow:0 12px 24px rgba(0,0,0,.06);
  }

  .progress-bar{
    width:min(560px,92%);
    height:16px;
    border-radius:999px;
    background:#e7efff;
    overflow:hidden;
    box-shadow:inset 0 1px 3px rgba(0,0,0,.15);
  }

  .progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--hex),var(--oct),var(--green));
    transition:width .15s ease-out;
  }

  .progress-text{
    font-weight:900;
    color:#15507d;
    font-size:1rem;
  }

  .progress-message,
  .status-line{
    text-align:center;
    font-weight:900;
    min-height:1.35em;
  }

  .progress-message{color:#2e9b2e}
  .status-line{color:#1f7a3a;margin-top:8px}

  .controls{
    margin-top:12px;
    display:flex;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    width:100%;
    max-width:1120px;
    margin-left:auto;
    margin-right:auto;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:10px 15px;
    font-size:.98rem;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
    background:#ff8a5b;
    color:#fff;
    transition:transform .12s ease, filter .12s ease;
  }

  .btn:hover{transform:translateY(-1px); filter:brightness(1.03)}

  .mic-icon-btn{
    border:none;
    background:#fff;
    border-radius:50%;
    width:48px;
    height:48px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 18px rgba(0,0,0,.12);
    cursor:pointer;
  }

  .mic-icon-btn img{
    width:32px;
    height:32px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
  }
</style>

<style id="gpUnifiedIntroPrehide">
  #introVideoWrap,.intro-video-wrap,#lbIntroVideoOverlay{
    display:none !important;
    visibility:hidden !important;
    opacity:0 !important;
    pointer-events:none !important;
  }
</style>
</head>
<body>
  <div class="app">
    <div class="wrap" id="wrap">
      <img id="poster" src="../../../../assets/images/shapes/C15cc.png" alt="Shape Sides Week 3" />
      <canvas id="ink"></canvas>
      <canvas id="fx"></canvas>
    </div>

    <div class="progress-wrap">
      <div class="progress-text">Trace progress: <span id="progressPercent">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-message" id="progressMessage">Join the dots to make the shapes.</div>
    </div>
    <div class="status-line" id="statusLine"></div>

    <div class="controls">
      <button class="btn prev" id="prevBtn">&#8592; Previous page</button>
      <button class="btn" id="undoBtn">Undo</button>
      <button class="btn" id="clearBtn">Clear</button>
      <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat instruction">
        <img src="../../../../assets/images/avatars/Microphone.png" alt="Microphone">
      </button>
      <button class="btn next" id="nextBtn">Next page &#8594;</button>
    </div>
  </div>

<script>
(() => {
  const wrap = document.getElementById("wrap");
  const canvas = document.getElementById("ink");
  const fxCanvas = document.getElementById("fx");
  const img = document.getElementById("poster");
  const ctx = canvas.getContext("2d");
  const fx = fxCanvas.getContext("2d");

  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const clearBtn = document.getElementById("clearBtn");
  const undoBtn = document.getElementById("undoBtn");
  const micIconBtn = document.getElementById("micIconBtn");
  const progressPercentEl = document.getElementById("progressPercent");
  const progressFillEl = document.getElementById("progressFill");
  const progressMessageEl = document.getElementById("progressMessage");
  const statusLine = document.getElementById("statusLine");

  /* Compact 6-dot hexagons placed fully inside each left-side box */
  const HEX_DOTS = [
    [0.205,0.262],[0.297,0.262],[0.343,0.344],[0.297,0.426],[0.205,0.426],[0.159,0.344],
    [0.205,0.502],[0.297,0.502],[0.343,0.584],[0.297,0.666],[0.205,0.666],[0.159,0.584],
    [0.205,0.742],[0.297,0.742],[0.343,0.824],[0.297,0.906],[0.205,0.906],[0.159,0.824]
  ];

  /* Compact 8-dot octagons placed fully inside each right-side box */
  const OCT_DOTS = [
    [0.654,0.258],[0.730,0.258],[0.782,0.310],[0.782,0.386],[0.730,0.438],[0.654,0.438],[0.602,0.386],[0.602,0.310],
    [0.654,0.498],[0.730,0.498],[0.782,0.550],[0.782,0.626],[0.730,0.678],[0.654,0.678],[0.602,0.626],[0.602,0.550],
    [0.654,0.738],[0.730,0.738],[0.782,0.790],[0.782,0.866],[0.730,0.918],[0.654,0.918],[0.602,0.866],[0.602,0.790]
  ];

  const ALL_DOTS = HEX_DOTS.concat(OCT_DOTS);
  const REQUIRED_EDGES = new Set();
  const ADJACENCY = new Map();

  function getGroup(index){
    return index < HEX_DOTS.length ? "hex" : "oct";
  }

  function groupColor(group){
    return group === "hex"
      ? getComputedStyle(document.documentElement).getPropertyValue('--hex').trim()
      : getComputedStyle(document.documentElement).getPropertyValue('--oct').trim();
  }

  function groupGlow(group){
    return group === "hex"
      ? getComputedStyle(document.documentElement).getPropertyValue('--hexGlow').trim()
      : getComputedStyle(document.documentElement).getPropertyValue('--octGlow').trim();
  }

  function groupSoftGlow(group){
    return group === "hex"
      ? getComputedStyle(document.documentElement).getPropertyValue('--hexGlowSoft').trim()
      : getComputedStyle(document.documentElement).getPropertyValue('--octGlowSoft').trim();
  }

  [[0, HEX_DOTS.length, 6], [HEX_DOTS.length, ALL_DOTS.length, 8]].forEach(([start, end, size]) => {
    for (let offset = start; offset < end; offset += size) {
      for (let i = 0; i < size; i += 1) {
        const a = offset + i;
        const b = offset + ((i + 1) % size);
        const key = a < b ? `${a}-${b}` : `${b}-${a}`;
        REQUIRED_EDGES.add(key);

        if (!ADJACENCY.has(a)) ADJACENCY.set(a, new Set());
        if (!ADJACENCY.has(b)) ADJACENCY.set(b, new Set());
        ADJACENCY.get(a).add(b);
        ADJACENCY.get(b).add(a);
      }
    }
  });

  const strokes = [];
  let isDown = false;
  let startDot = null;
  let hoverPt = null;
  let hoverDot = null;
  let traceSolved = false;
  let lastTickAt = 0;

  function speak(text){
    if (window.GPTracing?.speakText) {
      window.GPTracing.speakText(text, { rate: 0.94, pitch: 1.08 });
      return;
    }
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.96;
    u.pitch = 1.08;
    if (window.GPTracing?.applyPreferredVoice) window.GPTracing.applyPreferredVoice(u);
    window.speechSynthesis.speak(u);
  }

  const progressMilestones = new Set();

  function playConnectTick(group = "hex"){
    const now = performance.now();
    if (now - lastTickAt < 80) return;
    lastTickAt = now;

    if (window.GPTracing?.playTraceTick) {
      window.GPTracing.playTraceTick({
        throttleMs: 80,
        frequency: group === "hex" ? 860 : 960,
        endFrequency: group === "hex" ? 620 : 700,
        volume: 0.06
      });
      return;
    }

    try{
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if(!AudioCtx) return;
      const ac = new AudioCtx();
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = "triangle";
      o.frequency.setValueAtTime(group === "hex" ? 840 : 980, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(group === "hex" ? 620 : 720, ac.currentTime + 0.10);
      g.gain.setValueAtTime(0.0001, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.08, ac.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.12);
      o.connect(g).connect(ac.destination);
      o.start();
      o.stop(ac.currentTime + 0.13);
      o.onended = () => ac.close();
    }catch(_e){}
  }

  function playWrongTap(){
    try{
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if(!AudioCtx) return;
      const ac = new AudioCtx();
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = "square";
      o.frequency.setValueAtTime(210, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(160, ac.currentTime + 0.12);
      g.gain.setValueAtTime(0.0001, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.05, ac.currentTime + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.14);
      o.connect(g).connect(ac.destination);
      o.start();
      o.stop(ac.currentTime + 0.15);
      o.onended = () => ac.close();
    }catch(_e){}
  }

  function playChime(){
    try{ new Audio('../../../../assets/audio/chimes/chime.mp3.mp3').play().catch(()=>{}); }catch(_e){}
  }

  function playCelebration(){
    playChime();
    window.GPTracing?.playTraceCelebration?.();
  }

  function progressMessageFor(score){
    if (score >= 100) return "Fantastic! All the shapes are complete.";
    if (score >= 75) return "Great work. Finish the last shape sides.";
    if (score >= 40) return "Nice tracing. Keep joining the dots.";
    return "Join the dots to make the shapes.";
  }

  function updateProgressUI(score){
    progressPercentEl.textContent = `${score}%`;
    progressFillEl.style.width = `${score}%`;
    progressMessageEl.textContent = progressMessageFor(score);
  }

  function maybeCelebrateProgress(score){
    [
      [25, "Good start!"],
      [50, "Wonderful tracing!"],
      [75, "You are almost done!"]
    ].forEach(([mark, message]) => {
      if (score >= mark && !progressMilestones.has(mark)) {
        progressMilestones.add(mark);
        playChime();
        speak(message);
      }
    });
  }

  function resizeCanvas() {
    const rect = wrap.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);

    [canvas, fxCanvas].forEach(c => {
      c.width = Math.round(rect.width * dpr);
      c.height = Math.round(rect.height * dpr);
      c.style.width = rect.width + "px";
      c.style.height = rect.height + "px";
    });

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    fx.setTransform(dpr, 0, 0, dpr, 0, 0);
    redraw();
  }

  function dotToPx([nx, ny]) {
    const rect = wrap.getBoundingClientRect();
    return { x: nx * rect.width, y: ny * rect.height };
  }

  function edgeKey(a, b) {
    return a < b ? `${a}-${b}` : `${b}-${a}`;
  }

  function saveTraceProgress() {
    const score = Math.round((strokes.length / REQUIRED_EDGES.size) * 100);
    updateProgressUI(score);
    maybeCelebrateProgress(score);

    if (typeof window.finishAndSave !== 'function') return score;

    window.finishAndSave({
      pageId: 'LevelC15',
      level: 'C',
      activityType: 'tracing',
      score,
      tracing: score,
      stars: score >= 95 ? 3 : score >= 65 ? 2 : score > 0 ? 1 : 0,
      skills: { reading: 1, writing: 1, speaking: 0, listening: 1 }
    }).catch(() => {});

    return score;
  }

  function nearestDot(px, py, radiusPx) {
    let best = null;
    let bestD2 = radiusPx * radiusPx;
    for (let index = 0; index < ALL_DOTS.length; index += 1) {
      const p = dotToPx(ALL_DOTS[index]);
      const dx = p.x - px;
      const dy = p.y - py;
      const d2 = dx*dx + dy*dy;
      if (d2 <= bestD2) {
        bestD2 = d2;
        best = { pt: p, index };
      }
    }
    return best;
  }

  function getLocalPoint(e) {
    const rect = wrap.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function drawCompletedLines(){
    ctx.clearRect(0, 0, wrap.clientWidth, wrap.clientHeight);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    for (const s of strokes) {
      const color = groupColor(s.group);
      const glow = groupGlow(s.group);
      const soft = groupSoftGlow(s.group);

      ctx.beginPath();
      ctx.lineWidth = 18;
      ctx.strokeStyle = soft;
      ctx.moveTo(s.a.x, s.a.y);
      ctx.lineTo(s.b.x, s.b.y);
      ctx.stroke();

      ctx.beginPath();
      ctx.lineWidth = 10;
      ctx.strokeStyle = glow;
      ctx.moveTo(s.a.x, s.a.y);
      ctx.lineTo(s.b.x, s.b.y);
      ctx.stroke();

      ctx.beginPath();
      ctx.lineWidth = 6;
      ctx.strokeStyle = color;
      ctx.moveTo(s.a.x, s.a.y);
      ctx.lineTo(s.b.x, s.b.y);
      ctx.stroke();

      ctx.beginPath();
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = "rgba(255,255,255,0.72)";
      ctx.moveTo(s.a.x, s.a.y);
      ctx.lineTo(s.b.x, s.b.y);
      ctx.stroke();
    }
  }

  function drawDotGuides(){
    fx.clearRect(0, 0, wrap.clientWidth, wrap.clientHeight);

    for (let index = 0; index < ALL_DOTS.length; index++) {
      const p = dotToPx(ALL_DOTS[index]);
      const group = getGroup(index);
      const color = groupColor(group);
      const glow = groupGlow(group);
      const soft = groupSoftGlow(group);

      const isStart = startDot && startDot.index === index;
      const isHover = hoverDot && hoverDot.index === index;
      const isNeighbor = startDot && ADJACENCY.get(startDot.index)?.has(index);

      fx.beginPath();
      fx.arc(p.x, p.y, isStart ? 14 : 10.5, 0, Math.PI * 2);
      fx.fillStyle = isStart ? "rgba(255,210,74,0.98)" : isHover ? color : "rgba(255,255,255,0.96)";
      fx.fill();

      fx.beginPath();
      fx.arc(p.x, p.y, isStart ? 24 : 20, 0, Math.PI * 2);
      fx.lineWidth = isNeighbor ? 4.5 : 3.5;
      fx.strokeStyle = isStart ? "rgba(255,170,0,0.98)" : color;
      fx.globalAlpha = isNeighbor ? 1 : 0.92;
      fx.stroke();
      fx.globalAlpha = 1;

      fx.beginPath();
      fx.arc(p.x, p.y, isStart ? 30 : 25, 0, Math.PI * 2);
      fx.lineWidth = 7;
      fx.strokeStyle = soft;
      fx.stroke();

      if (isNeighbor) {
        fx.beginPath();
        fx.arc(p.x, p.y, 28, 0, Math.PI * 2);
        fx.lineWidth = 3;
        fx.strokeStyle = glow;
        fx.stroke();
      }
    }
  }

  function drawPreview(){
    if (!(isDown && startDot && hoverPt)) return;

    const startGroup = getGroup(startDot.index);
    const color = groupColor(startGroup);
    const glow = groupGlow(startGroup);
    const soft = groupSoftGlow(startGroup);
    const endTarget = hoverDot && ADJACENCY.get(startDot.index)?.has(hoverDot.index) ? hoverDot.pt : hoverPt;

    fx.beginPath();
    fx.lineWidth = 16;
    fx.strokeStyle = soft;
    fx.moveTo(startDot.pt.x, startDot.pt.y);
    fx.lineTo(endTarget.x, endTarget.y);
    fx.stroke();

    fx.beginPath();
    fx.lineWidth = 8;
    fx.strokeStyle = hoverDot && ADJACENCY.get(startDot.index)?.has(hoverDot.index) ? color : "rgba(120,120,120,0.55)";
    fx.setLineDash([10,8]);
    fx.moveTo(startDot.pt.x, startDot.pt.y);
    fx.lineTo(endTarget.x, endTarget.y);
    fx.stroke();
    fx.setLineDash([]);

    fx.beginPath();
    fx.lineWidth = 4;
    fx.strokeStyle = hoverDot && ADJACENCY.get(startDot.index)?.has(hoverDot.index) ? glow : "rgba(150,150,150,0.25)";
    fx.moveTo(startDot.pt.x, startDot.pt.y);
    fx.lineTo(endTarget.x, endTarget.y);
    fx.stroke();
  }

  function redraw() {
    drawCompletedLines();
    drawDotGuides();
    drawPreview();
  }

  function onDown(e) {
    const p = getLocalPoint(e);
    const near = nearestDot(p.x, p.y, 28);
    if (!near) return;

    isDown = true;
    startDot = near;
    hoverPt = p;
    hoverDot = near;
    canvas.setPointerCapture?.(e.pointerId);
    playConnectTick(getGroup(near.index));
    redraw();
  }

  function onMove(e) {
    const p = getLocalPoint(e);
    hoverPt = p;
    hoverDot = nearestDot(p.x, p.y, 32);

    if (isDown && startDot && hoverDot && ADJACENCY.get(startDot.index)?.has(hoverDot.index)) {
      playConnectTick(getGroup(startDot.index));
    }

    redraw();
  }

  function onUp(e) {
    if (!isDown) return;

    const p = getLocalPoint(e);
    const endDot = nearestDot(p.x, p.y, 32);

    if (endDot && startDot && endDot.index !== startDot.index) {
      const key = edgeKey(startDot.index, endDot.index);
      const sameGroup = getGroup(startDot.index) === getGroup(endDot.index);

      if (REQUIRED_EDGES.has(key) && sameGroup) {
        if (!strokes.some((stroke) => stroke.key === key)) {
          const group = getGroup(startDot.index);
          strokes.push({ a: startDot.pt, b: endDot.pt, key, group });
          playConnectTick(group);
          saveTraceProgress();

          if (!traceSolved && strokes.length === REQUIRED_EDGES.size) {
            traceSolved = true;
            statusLine.textContent = "Excellent! You completed all of the shapes.";
            playCelebration();
            speak("Excellent! You completed all of the shapes.");
          }
        } else {
          playWrongTap();
        }
      } else {
        playWrongTap();
      }
    }

    isDown = false;
    startDot = null;
    hoverPt = null;
    hoverDot = null;
    redraw();
  }

  canvas.addEventListener("pointerdown", onDown);
  canvas.addEventListener("pointermove", onMove);
  canvas.addEventListener("pointerup", onUp);
  canvas.addEventListener("pointercancel", onUp);
  canvas.addEventListener("pointerleave", () => {
    if (!isDown) {
      hoverDot = null;
      hoverPt = null;
      redraw();
    }
  });

  clearBtn.addEventListener("click", () => {
    strokes.length = 0;
    traceSolved = false;
    progressMilestones.clear();
    statusLine.textContent = "";
    saveTraceProgress();
    redraw();
    speak("All lines cleared. Try again.");
  });

  undoBtn.addEventListener("click", () => {
    strokes.pop();
    traceSolved = false;
    statusLine.textContent = "";
    saveTraceProgress();
    redraw();
    playWrongTap();
  });

  if (micIconBtn) {
    micIconBtn.addEventListener("click", () => {
      speak("Join each dot to the next dot to make the red hexagons and the blue octagons.");
    });
  }

  prevBtn.addEventListener("click", () => { window.location.href = "../tuesday/LevelC11.html"; });
  nextBtn.addEventListener("click", () => {
    saveTraceProgress();
    window.location.href = "LevelC13.html";
  });

  const boot = () => {
    resizeCanvas();
    updateProgressUI(0);
    speak("Join each dot to the next dot to make the red hexagons and the blue octagons.");
  };

  if (img.complete) boot(); else img.addEventListener("load", boot);
  window.addEventListener("resize", resizeCanvas);
})();
</script>

<script src="../../../../activity-standardizer.js"></script>
<script src="../../../../shared/js/storage.js"></script>
<script src="../../../../shared/js/progress.js"></script>
<script src="../../../../shared/js/tracing.js"></script>

<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";

  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LevelC15",
    defaultLevel: "C",
    defaultActivityType: "lesson",
    defaultScore: 100,
    defaultStars: 1,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);
    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}
    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };

    saveLocalActivityFallback(fullPayload);

    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }

    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>

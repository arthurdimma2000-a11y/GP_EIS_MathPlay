<!doctype html>
<html lang="en">
<head>
<style id="gpLessonPrehide">
  .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
  .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}
  .convo-line.show,.speech-line.show,.dialog-line.show,.bubble-line.show,.bubble-left.show,.bubble-right.show,#bubbleLeft.show,#bubbleRight.show{display:block !important;}
  .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,1.9vw,19px) !important;line-height:1.24 !important;max-width:min(40vw,320px) !important;white-space:normal !important;word-break:break-word !important;overflow-wrap:anywhere !important;}
  @media (max-width:780px){
    .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,3.6vw,17px) !important;max-width:min(44vw,220px) !important;line-height:1.2 !important;}
  }
</style>
<meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Level C22 - Hexagons</title>
  <link rel="stylesheet" href="../../../../shared/css/base.css" />
  <link rel="stylesheet" href="../../../../shared/css/layout.css" />
  <link rel="stylesheet" href="../../../../shared/css/lesson.css" />
  <style>
    :root{font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;--ink:#2d2d2d;--bubble:#dff1ff;--red:#d62828;--shadow:0 20px 40px rgba(0,0,0,.12);}
    body{display:flex;align-items:center;justify-content:center;background:#e7f7e7;padding:6px;color:var(--ink);}    .card{width:min(1280px,99vw);min-height:calc(100vh - 12px);border-radius:18px;padding:14px 14px 18px;}    
    .poster-area{position:relative;width:100%;max-width:1120px;margin:0 auto;border-radius:16px;overflow:hidden;}
    .poster-img{width:100%;height:auto;display:block;}
    .bubble{position:absolute;left:14%;top:26%;padding:12px 16px;border-radius:16px;font-weight:800;font-size:1.3rem;max-width:320px;line-height:1.2;box-shadow:0 8px 18px rgba(0,0,0,.12);background:var(--bubble);opacity:0;}
    .bubble.show{opacity:1;}
    .bubble::after{content:"";position:absolute;left:12px;bottom:-10px;border-width:10px 8px 0 8px;border-style:solid;border-color:var(--bubble) transparent transparent transparent;}
    .red{color:var(--red);}    
    .shape-hit{
      position:absolute;
      border:3px dashed transparent;
      border-radius:18px;
      background:transparent;
      cursor:pointer;
      z-index:2;
    }
    .shape-hit.found{border-color:#3cb371;box-shadow:0 0 0 2px rgba(60,179,113,.25);}
    .shape-hit.wrong{border-color:#d62828;box-shadow:0 0 0 2px rgba(214,40,40,.25);}
    .girl-spot{position:absolute;left:16px;top:12px;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:3;}
    .girl-spot img{width:64px;height:64px;border-radius:16px;object-fit:cover;box-shadow:0 6px 14px rgba(0,0,0,.25);border:4px solid #ffe3f7;background:#ffd6f2;cursor:pointer;}
    .girl-hint{font-weight:800;color:#d62828;font-size:.9rem;}
    .tap-line{position:absolute;left:10%;right:10%;top:14%;text-align:center;font-size:2.4rem;font-weight:900;opacity:0;}
    .tap-line.show{opacity:1;}
    .tap-line2{position:absolute;left:10%;right:10%;top:22%;text-align:center;font-size:2.1rem;font-weight:900;opacity:0;}
    .tap-line2.show{opacity:1;}
    .controls{margin-top:12px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;}
    .btn{border:none;border-radius:999px;padding:8px 12px;font-size:.9rem;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.15);background:#ff8a5b;color:#fff;}
    .mic-icon-btn img{width:32px;height:32px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));}
  </style>
<style id="gpUnifiedIntroPrehide">#introVideoWrap,.intro-video-wrap,#lbIntroVideoOverlay{display:none !important;visibility:hidden !important;opacity:0 !important;pointer-events:none !important;}</style>
</head>
<body>
  <div class="card">
    <div class="poster-area">
      <img class="poster-img" src="../../../../assets/images/shapes/C22.png" alt="Hexagon poster">
      <div class="bubble speakable" data-text="A hexagon has six sides and six vertices.">A hexagon has six sides<br>and six vertices.</div>
      <button class="shape-hit" data-correct="true" aria-label="Hexagon" style="left:6%;top:63%;width:19%;height:15%;"></button>
      <button class="shape-hit" data-correct="false" aria-label="Pentagon" style="left:32%;top:57%;width:28%;height:21%;"></button>
      <button class="shape-hit" data-correct="false" aria-label="Other polygon" style="left:66%;top:57%;width:24%;height:19%;"></button>
      <div class="girl-spot">
        <img src="../../../../assets/images/shapes/CirckleGirlWk1.png" alt="Tap the girl" id="girlBtn" class="tap-girl">
        <div class="girl-hint">Tap the girl</div>
      </div>
      <div class="tap-line" id="tapLine"></div>
      <div class="tap-line2" id="tapLine2"></div>
    </div>
    <div class="controls">
      <button class="btn prev" id="prevBtn">← Previous page</button>
      <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
        <img src="../../../../assets/images/avatars/Microphone.png" alt="Microphone">
      </button>
      <button class="btn next" id="nextBtn">Next page →</button>
    </div>
  </div>
  <script>
      const girlBtn = document.getElementById('girlBtn');
      const tapLine = document.getElementById('tapLine');
      const tapLine2 = document.getElementById('tapLine2');
      const shapeHits = Array.from(document.querySelectorAll('.shape-hit'));
    function speak(text){
      if(!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 1.0; u.pitch = 1.05; u.volume = 1.0;
      window.speechSynthesis.speak(u);
    }
    function typeLine(el, text){
      el.textContent = '';
      let i = 0;
      el.classList.add('show');
      const step = () => {
        el.innerHTML = text.slice(0, i);
        i += 1;
        if(i <= text.length){ setTimeout(step, 22); }
      };
      step();
    }
      girlBtn.addEventListener('click', () => {
        typeLine(tapLine, 'Circle each shape that is a hexagon.');
        speak('Circle each shape that is a hexagon.');
        setTimeout(() => {
          typeLine(tapLine2, 'A hexagon has <span class="red">6 sides</span> and <span class="red">6 vertices</span>.');
          speak('A hexagon has 6 sides and 6 vertices.');
        }, 500);
      });
      function syncShapeProgress() {
        const solved = shapeHits.filter((hit) => hit.classList.contains('found')).length;
        const wrong = shapeHits.filter((hit) => hit.classList.contains('wrong')).length;
        const score = solved ? Math.max(0, Math.min(100, Math.round((solved / 1) * 100) - wrong * 10)) : 0;
        if (typeof finishActivity === 'function') {
          window.finishAndSave({
            pageId: 'LevelC22',
            level: 'C',
            activityType: 'lesson',
            score,
            stars: score >= 95 ? 3 : score >= 60 ? 2 : score > 0 ? 1 : 0,
            skills: { reading: 1, writing: 0, speaking: 1, listening: 1 }
          });
        }
      }
      shapeHits.forEach((hit) => {
        hit.addEventListener('click', () => {
          const isCorrect = hit.dataset.correct === 'true';
          shapeHits.forEach((button) => {
            if (button !== hit && isCorrect) button.classList.remove('wrong');
          });
          hit.classList.toggle('found', isCorrect);
          hit.classList.toggle('wrong', !isCorrect);
          speak(isCorrect ? 'Correct! That is a hexagon.' : 'Try again. Find the hexagon.');
          syncShapeProgress();
        });
      });
      document.getElementById('prevBtn').addEventListener('click', () => { window.location.href = '../monday/LevelC21.html'; });
      document.getElementById('nextBtn').addEventListener('click', () => { window.location.href = 'LevelC23.html'; });
  </script>
<script src="../../../../activity-standardizer.js"></script>
<script src="../../../../shared/js/storage.js"></script>
<script src="../../../../shared/js/progress.js"></script>
<script src="../../../../shared/js/tracing.js"></script>
<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LevelC22",
    defaultLevel: "C",
    defaultActivityType: "lesson",
    defaultScore: 100,
    defaultStars: 1,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);
    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}
    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };
  
    saveLocalActivityFallback(fullPayload);
  
    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }
  
    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>
</body>
</html>

<script>
  window.__GP_REQUIRE_INTRO_AUDIO__ = true;

  const girlBtn = document.getElementById('girlBtn');
  const micIconBtn = document.getElementById('micIconBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const questNote = document.getElementById('questNote');
  const answerInputs = Array.from(document.querySelectorAll('.poster-answer-box'));
  const micPrompt = document.getElementById('micPrompt');

  const fillChime = new Audio('../../../../assets/audio/chimes/chime.mp3.mp3');
  fillChime.preload = 'auto';

  let fillProgressUi = null;
  let fillCelebrated = false;
  let promptTypingTimer = null;
  let promptDelayTimer = null;

  const promptLines = [
    'Count the number of pieces used to make each shape.',
    'Write the correct number inside every blank box.',
    'Fill all five boxes to complete the page quest.'
  ];

  function speak(text){
    if (window.GPTracing && typeof window.GPTracing.speakText === 'function') {
      window.GPTracing.speakText(text, { rate: 0.94, pitch: 1.08 });
      return;
    }
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.0;
    u.pitch = 1.05;
    window.speechSynthesis.speak(u);
  }

  function typePromptText(text){
    if (promptTypingTimer) clearInterval(promptTypingTimer);
    if (promptDelayTimer) clearTimeout(promptDelayTimer);
    if (micPrompt) micPrompt.textContent = '';
    let index = 0;
    promptTypingTimer = setInterval(() => {
      index += 1;
      if (micPrompt) micPrompt.textContent = text.slice(0, index);
      if (index >= text.length) {
        clearInterval(promptTypingTimer);
        promptTypingTimer = null;
      }
    }, 28);
  }

  function speakPrompt(){
    const leadLine = "Let's make shapes using tangram.";
    typePromptText(leadLine);
    speak(leadLine);
    promptDelayTimer = setTimeout(() => {
      speak('Count the number of pieces used to make each shape.');
    }, 5000);
  }

  girlBtn.addEventListener('click', speakPrompt);
  micIconBtn.addEventListener('click', speakPrompt);

  function playBoxTick(){
    if (window.GPTracing && typeof window.GPTracing.playTraceTick === 'function') {
      window.GPTracing.playTraceTick({
        throttleMs: 70,
        frequency: 860,
        endFrequency: 590,
        volume: 0.055
      });
    }
  }

  function playFillCelebration(){
    if (window.GPTracing && typeof window.GPTracing.playTraceCelebration === 'function') {
      window.GPTracing.playTraceCelebration();
    }
    try{
      const sound = fillChime.cloneNode(true);
      sound.currentTime = 0;
      sound.play().catch(() => {});
    }catch(_err){}
  }

  function sanitizeValue(input){
    input.value = input.value.replace(/[^\d]/g, '').slice(0, 2);
  }

  function getAnsweredCount(){
    return answerInputs.filter(input => input.value.trim() !== '').length;
  }

  function getCorrectCount(){
    return answerInputs.filter(input => input.value.trim() === String(input.dataset.answer || '')).length;
  }

  function allBoxesFilled(){
    return getAnsweredCount() === answerInputs.length;
  }

  function markBoxes(){
    answerInputs.forEach((input) => {
      const value = input.value.trim();
      input.classList.toggle('filled', value !== '');

      if (value === '') {
        input.classList.remove('correct', 'incorrect');
      } else if (value === String(input.dataset.answer || '')) {
        input.classList.add('correct');
        input.classList.remove('incorrect');
      } else {
        input.classList.add('incorrect');
        input.classList.remove('correct');
      }
    });
  }

  function computeScore(){
    const total = answerInputs.length;
    const correct = getCorrectCount();
    return total ? Math.round((correct / total) * 100) : 0;
  }

  function computeStars(score){
    return score >= 95 ? 3 : score >= 65 ? 2 : score > 0 ? 1 : 0;
  }

  async function updateFillProgress(shouldPersist = true){
    const score = computeScore();
    const completed = allBoxesFilled();

    if (fillProgressUi) {
      fillProgressUi.textEl.textContent = score + '%';
      fillProgressUi.fillEl.style.width = score + '%';
    }

    nextBtn.disabled = false;

    if (!completed) {
      questNote.textContent = 'Fill all 5 blank boxes on the poster to complete the page quest.';
    } else if (score === 100) {
      questNote.textContent = 'Excellent. You counted all the tangram pieces correctly.';
    } else {
      questNote.textContent = 'You filled all the boxes. Check the answers again before moving on.';
    }

    if (completed && score === 100 && !fillCelebrated) {
      fillCelebrated = true;
      playFillCelebration();
      speak('Brilliant work. You counted all the tangram pieces correctly.');
    }

    if (!(completed && score === 100)) {
      fillCelebrated = false;
    }

    if (!shouldPersist || typeof window.finishAndSave !== 'function') return;

    const payload = {
      pageId: 'LevelC12',
      level: 'C',
      activityType: 'lesson',
      score,
      tracing: score,
      progress: score,
      completed,
      stars: computeStars(score),
      skills: { reading: 1, writing: 1, speaking: 1, listening: 1 }
    };

    await window.finishAndSave(payload);
  }

  answerInputs.forEach((input) => {
    input.addEventListener('focus', playBoxTick);
    input.addEventListener('pointerdown', playBoxTick);

    input.addEventListener('input', async () => {
      sanitizeValue(input);
      markBoxes();
      await updateFillProgress(true);
    });

    input.addEventListener('blur', async () => {
      sanitizeValue(input);
      markBoxes();
      await updateFillProgress(true);
    });
  });

  function initWritingProgressUi(){
    if (fillProgressUi) return;
    if (!window.GPTracing || typeof window.GPTracing.ensureTraceProgressUI !== 'function') {
      window.setTimeout(initWritingProgressUi, 60);
      return;
    }

    fillProgressUi = window.GPTracing.ensureTraceProgressUI({
      container: document.querySelector('.card'),
      before: document.querySelector('.controls'),
      label: 'Writing progress'
    });

    updateFillProgress(false);
  }

  initWritingProgressUi();
  markBoxes();
  updateFillProgress(false);

  if (prevBtn) {
    prevBtn.addEventListener('click', () => {
      window.location.href = 'LevelC11.html';
    });
  }

  if (nextBtn) {
    nextBtn.addEventListener('click', async () => {
        await updateFillProgress(true);
        window.location.href = 'LevelC13.html';
      });
  }
</script>

<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";

  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LevelC12",
    defaultLevel: "C",
    defaultActivityType: "lesson",
    defaultScore: 0,
    defaultStars: 0,
    defaultSkills: {
      reading: 1,
      writing: 1,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;

    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";

    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };

    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);

    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}

    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };

    saveLocalActivityFallback(fullPayload);

    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }

    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>

<script>
  (function(){
    const html = document.documentElement;
    const overlay = document.getElementById("gpIntroVideoOverlay");
    const video = document.getElementById("gpIntroVideo");
    const help = document.getElementById("gpIntroHelp");
    const playBtn = document.getElementById("gpIntroPlayBtn");
    const soundBtn = document.getElementById("gpIntroSoundBtn");
    const skipBtn = document.getElementById("gpIntroSkipBtn");

    if (!overlay || !video || !help || !playBtn || !soundBtn || !skipBtn) {
      html.classList.remove("gp-intro-video-pending");
      return;
    }

    let revealed = false;
    let hardTimeout = setTimeout(revealLesson, 60000);

    function revealLesson(){
      if (revealed) return;
      revealed = true;
      clearTimeout(hardTimeout);
      try { video.pause(); } catch(e){}
      overlay.classList.remove("active");
      overlay.style.display = "none";
      html.classList.remove("gp-intro-video-pending");
    }

    function showPlayFallback(msg){
      help.textContent = msg || 'Tap "Play Intro" to start the video.';
      playBtn.style.display = "inline-flex";
    }

    async function tryAutoplayMuted(){
      try{
        video.muted = true;
        video.defaultMuted = true;
        await video.play();
        help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
        playBtn.style.display = "none";
      }catch(err){
        showPlayFallback('Autoplay was blocked. Tap "Play Intro" to start.');
      }
    }

    async function playWithSound(){
      try{
        video.muted = false;
        video.defaultMuted = false;
        video.volume = 1;
        await video.play();
        help.textContent = 'Sound is on. Tap "Skip Intro" to continue.';
        playBtn.style.display = "none";
      }catch(err){
        help.textContent = 'Tap "Play Intro" first, then tap "Turn On Sound".';
        playBtn.style.display = "inline-flex";
      }
    }

    playBtn.addEventListener("click", async () => {
      try{
        video.muted = true;
        video.defaultMuted = true;
        await video.play();
        help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
        playBtn.style.display = "none";
      }catch(err){
        help.textContent = "Unable to start the intro video.";
      }
    });

    soundBtn.addEventListener("click", playWithSound);
    skipBtn.addEventListener("click", revealLesson);

    video.addEventListener("playing", () => {
      help.textContent = video.muted
        ? 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".'
        : 'Sound is on. Tap "Skip Intro" to continue.';
    });

    video.addEventListener("ended", revealLesson, { once:true });

    video.addEventListener("error", () => {
      help.textContent = "Intro video failed to load. Opening page now.";
      setTimeout(revealLesson, 800);
    }, { once:true });

    video.addEventListener("loadedmetadata", () => {
      tryAutoplayMuted();
    }, { once:true });

    setTimeout(() => {
      if (!revealed && video.readyState >= 1) tryAutoplayMuted();
    }, 1200);
  })();
</script>
</body>
</html>

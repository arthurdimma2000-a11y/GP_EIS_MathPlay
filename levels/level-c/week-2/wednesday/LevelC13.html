<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>LevelC13</title>
<style>
  :root{--blue:#5f8fd5;--lightBlue:#eaf4ff;--ink:#2d2d2d;--orange:#ff9854;--green:#23b060;--gold:#ffcc48;--shadow:0 14px 32px rgba(0,0,0,.12);--font:"Comic Sans MS","Trebuchet MS","Segoe UI",system-ui,-apple-system,sans-serif}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#bfe9fb;font-family:var(--font);color:var(--ink)}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:8px}
  .card{width:min(1280px,99vw);min-height:calc(100vh - 16px);background:#fff;border-radius:24px;box-shadow:var(--shadow);padding:12px 12px 18px}
  .poster-wrap{position:relative;width:min(100%, 960px);margin:0 auto}
  .poster-img{display:block;width:100%;height:auto;border-radius:18px;user-select:none;-webkit-user-drag:none}
  .write-box{position:absolute;border:3px solid rgba(255,164,177,.95);background:rgba(255,255,255,.96);border-radius:12px;box-shadow:0 6px 12px rgba(0,0,0,.04);padding:8px 12px 6px;color:#666;font-size:clamp(21px,3vw,31px);line-height:1.1;text-align:center;outline:none;min-height:52px;display:flex;align-items:center;justify-content:center;overflow:hidden;white-space:nowrap}
  .write-box::before{content:"";position:absolute;left:10px;right:10px;bottom:8px;border-bottom:3px dotted rgba(120,120,120,.35);pointer-events:none}
  .write-box:empty::after{content:attr(data-placeholder);color:rgba(80,80,80,.35);font-size:clamp(18px,2.4vw,24px);position:relative;z-index:1;white-space:nowrap}
  .write-box:focus{border-color:#7db4ff;box-shadow:0 0 0 5px rgba(125,180,255,.18)}
  .name-box{background:rgba(255,255,255,.98)}
  .count-box{font-size:clamp(24px,3.2vw,34px)}
  .name-square{left:7.8%;top:38.7%;width:20.8%}
  .name-parallelogram{left:18.8%;top:64.1%;width:31.6%}
  .name-triangle{left:28.2%;top:94.0%;width:18.8%}
  .count-square{left:37.4%;top:31.2%;width:12.2%}
  .count-parallelogram{left:58.8%;top:56.0%;width:12.2%}
  .count-triangle{left:56.2%;top:76.7%;width:12.2%}
  .controls{width:min(100%,960px);margin:14px auto 0;display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}
  .nav-btn{border:none;border-radius:999px;padding:12px 18px;font:700 16px/1 var(--font);cursor:pointer;color:#fff;background:linear-gradient(180deg,#ff9854,#ff7d45);box-shadow:0 5px 0 rgba(0,0,0,.13)}
  .nav-btn:active{transform:translateY(2px);box-shadow:0 3px 0 rgba(0,0,0,.13)}
  .nav-btn.next{justify-self:end}
  .mic-btn{width:74px;height:74px;border:none;border-radius:50%;display:grid;place-items:center;cursor:pointer;background:transparent;box-shadow:none;transition:transform .15s ease;padding:0}
  .mic-btn:hover{transform:translateY(-1px) scale(1.02)}
  .mic-btn img{width:74px;height:74px;display:block;filter:drop-shadow(0 10px 18px rgba(0,0,0,.14))}
  .mic-btn.listening{animation:pulse 1s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,99,127,.38),0 10px 18px rgba(0,0,0,.14), inset 0 -4px 0 rgba(0,0,0,.08)}70%{box-shadow:0 0 0 16px rgba(255,99,127,0),0 10px 18px rgba(0,0,0,.14), inset 0 -4px 0 rgba(0,0,0,.08)}100%{box-shadow:0 0 0 0 rgba(255,99,127,0),0 10px 18px rgba(0,0,0,.14), inset 0 -4px 0 rgba(0,0,0,.08)}}
  .practice-panel{width:min(100%,960px);margin:14px auto 0;background:linear-gradient(180deg,#fffaf1,#fff3da);border:3px solid #ffd37b;border-radius:18px;padding:14px 16px;box-shadow:0 10px 20px rgba(0,0,0,.06)}
  .practice-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .practice-title{font-size:clamp(18px,2.4vw,24px);font-weight:900;color:#7a4d00}
  .stars{display:flex;gap:8px;align-items:center}.star{font-size:30px;filter:grayscale(1);opacity:.35;transform:scale(.96);transition:.2s ease}.star.active{filter:none;opacity:1;transform:scale(1.06)}
  .prompt{margin-top:10px;font-size:clamp(18px,2.3vw,24px);font-weight:800;color:#30445c;background:#fff;border-radius:14px;padding:12px 14px;border:2px dashed #9cc7ff}
  .status-row{margin-top:10px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}
  .status-badge{padding:8px 12px;border-radius:999px;background:#eaf4ff;font-weight:800;color:#2d5e9a;border:2px solid #bfdcff}
  .heard-box{flex:1 1 360px;min-height:52px;background:#fff;border:2px solid #e5e5e5;border-radius:14px;padding:10px 12px;font-size:clamp(16px,2vw,20px)}
  .writing-progress{margin-top:12px;background:#fff;border:2px solid #cfe0ff;border-radius:16px;padding:12px 14px}
  .writing-progress-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .writing-progress-title{font-size:clamp(16px,2vw,20px);font-weight:900;color:#2d5e9a}
  .writing-progress-value{font-size:clamp(16px,2vw,20px);font-weight:900;color:#23b060}
  .writing-progress-track{margin-top:10px;width:100%;height:18px;border-radius:999px;background:#e6eefb;overflow:hidden;box-shadow:inset 0 1px 4px rgba(0,0,0,.08)}
  .writing-progress-fill{width:0;height:100%;border-radius:999px;background:linear-gradient(90deg,#5bb9ff,#23b060);transition:width .25s ease}
  .hint{width:min(100%,960px);margin:10px auto 0;color:#335;font-size:14px;text-align:center}
  @media (max-width:760px){.card{padding:8px 8px 16px}.controls{grid-template-columns:1fr}.nav-btn,.nav-btn.next{justify-self:stretch}.mic-btn{justify-self:center;order:-1}.practice-top{justify-content:center}.status-row{justify-content:center}.writing-progress-top{justify-content:center}.write-box{font-size:clamp(18px,2.8vw,26px);min-height:46px;padding:7px 10px 5px}.name-square{left:7.4%;top:38.7%;width:22.4%}.name-parallelogram{left:18.3%;top:64.2%;width:33.0%}.name-triangle{left:27.5%;top:94.0%;width:20.2%}.count-square{left:36.8%;top:31.2%;width:13.8%}.count-parallelogram{left:58.1%;top:56.2%;width:13.8%}.count-triangle{left:55.6%;top:76.8%;width:13.8%}}
</style>
</head>
<body>
  <main class="card">
    <section class="poster-wrap" aria-label="Tangram lesson poster">
      <img class="poster-img" alt="Tangram poster asking students to name the tangram shapes" src="../../../../assets/images/shapes/LC13ccb.png">
      <div class="write-box name-box name-square" contenteditable="true" spellcheck="false" aria-label="Write square" data-placeholder="Square"></div>
      <div class="write-box name-box name-parallelogram" contenteditable="true" spellcheck="false" aria-label="Write parallelogram" data-placeholder="Parallelogram"></div>
      <div class="write-box name-box name-triangle" contenteditable="true" spellcheck="false" aria-label="Write triangle" data-placeholder="Triangle"></div>
      <div class="write-box count-box count-square" contenteditable="true" spellcheck="false" aria-label="Write how many pieces were used for the square" data-placeholder="Write number"></div>
      <div class="write-box count-box count-parallelogram" contenteditable="true" spellcheck="false" aria-label="Write how many pieces were used for the parallelogram" data-placeholder="Write number"></div>
      <div class="write-box count-box count-triangle" contenteditable="true" spellcheck="false" aria-label="Write how many pieces were used for the triangle" data-placeholder="Write number"></div>
    </section>

    <section class="controls" aria-label="Page controls">
      <button class="nav-btn prev" id="prevBtn" type="button">← Previous page</button>
      <button class="mic-btn" id="micBtn" type="button" aria-label="Repeat after me speaking activity">
        <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone" aria-hidden="true">
      </button>
      <button class="nav-btn next" id="nextBtn" type="button">Next page →</button>
    </section>

    <section class="practice-panel" aria-live="polite">
      <div class="practice-top">
        <div class="practice-title">Mic Practice • Repeat after me</div>
        <div class="stars" id="stars" aria-label="Speaking stars">
          <span class="star" id="star1">⭐</span>
          <span class="star" id="star2">⭐</span>
          <span class="star" id="star3">⭐</span>
        </div>
      </div>
      <div class="prompt" id="promptText">The names of the Tangram shapes are square, parallelogram and triangle.</div>
      <div class="status-row">
        <div class="status-badge" id="statusBadge">Tap the mic to begin.</div>
        <div class="heard-box" id="heardBox">Your spoken words will appear here.</div>
      </div>
      <div class="writing-progress" aria-live="polite">
        <div class="writing-progress-top">
          <div class="writing-progress-title">Writing progress</div>
          <div class="writing-progress-value" id="writingProgressValue">0%</div>
        </div>
        <div class="writing-progress-track" aria-label="Writing completion progress">
          <div class="writing-progress-fill" id="writingProgressFill"></div>
        </div>
      </div>
    </section>

    <div class="hint">Allow microphone permission in Chrome for the speaking activity to work.</div>
  </main>
<script>
window.__GP_DISABLE_UNIFIED_MIC_PROTOCOL = true;
const PREVIOUS_PAGE = 'LevelC9.html';
const NEXT_PAGE = '../thursday/FairlyTaleWk2C.html';
const PAGE_ID = 'LevelC13';
const LEVEL_ID = 'C';
const TARGET_PHRASE = 'The names of the Tangram shapes are square, parallelogram and triangle';
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const micBtn = document.getElementById('micBtn');
const heardBox = document.getElementById('heardBox');
const statusBadge = document.getElementById('statusBadge');
const stars = [document.getElementById('star1'), document.getElementById('star2'), document.getElementById('star3')];
const writingBoxes = Array.from(document.querySelectorAll('.write-box'));
const writingProgressFill = document.getElementById('writingProgressFill');
const writingProgressValue = document.getElementById('writingProgressValue');
const chimeAudio = new Audio('../../../../assets/audio/chimes/chime.mp3');
const cheerAudio = new Audio('../../../../assets/audio/sfx-cheer.mp3');
let phase = 'reveal';
let attempts = 0;
let finished = false;
let recognitionCounter = 0;
let lastFilledCount = 0;
let writingCelebrated = false;
const writingPraise = {
  1: 'Good Job!',
  2: 'Amazing Job!',
  3: 'Wow! Keep going',
  4: 'Good Job!',
  5: 'Amazing Job!',
  6: 'Wow! you are supper smart!'
};
chimeAudio.preload = 'auto';
cheerAudio.preload = 'auto';
chimeAudio.volume = 0.7;
cheerAudio.volume = 0.8;
function cleanEditableText(el){ const text = (el.innerText || '').replace(/\n+/g, ' ').replace(/\s+/g, ' ').trim(); if (!text) el.innerHTML = ''; }
function placeCaretAtEnd(el){ el.focus(); const range = document.createRange(); range.selectNodeContents(el); range.collapse(false); const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range); }
function getBoxValue(box){ return (box.innerText || '').replace(/\n+/g, ' ').replace(/\s+/g, ' ').trim(); }
function getFilledCount(){ return writingBoxes.filter(box => getBoxValue(box).length > 0).length; }
function playTaskChime(){ try { chimeAudio.currentTime = 0; chimeAudio.play().catch(() => {}); } catch(_) {} }
function playTaskCheer(){ try { cheerAudio.currentTime = 0; cheerAudio.play().catch(() => {}); } catch(_) {} }
function updateWritingProgress(){
  const filledCount = getFilledCount();
  const percent = Math.round((filledCount / writingBoxes.length) * 100);
  writingProgressFill.style.width = percent + '%';
  writingProgressValue.textContent = percent + '%';
  if (filledCount > lastFilledCount) {
    playTaskChime();
    const praise = writingPraise[Math.min(filledCount, writingBoxes.length)];
    if (praise) {
      statusBadge.textContent = praise;
      heardBox.textContent = `Writing progress: ${filledCount} of ${writingBoxes.length} boxes filled.`;
      if (filledCount >= 2) playTaskCheer();
      speak(praise);
    }
  }
  if (filledCount === writingBoxes.length && !writingCelebrated) {
    writingCelebrated = true;
    statusBadge.textContent = 'Wow! you are supper smart!';
    heardBox.textContent = 'All the writing boxes are filled. Great work!';
    playTaskChime();
    playTaskCheer();
    speak('Wow! you are supper smart!');
  } else if (filledCount < writingBoxes.length) {
    writingCelebrated = false;
  }
  lastFilledCount = filledCount;
}
writingBoxes.forEach((box) => {
  box.addEventListener('input', () => { if ((box.innerText || '').length > 26) { box.innerText = box.innerText.slice(0, 26); placeCaretAtEnd(box); } });
  box.addEventListener('input', updateWritingProgress);
  box.addEventListener('blur', () => { cleanEditableText(box); updateWritingProgress(); });
  box.addEventListener('keydown', (e) => { if (e.key === 'Enter') e.preventDefault(); });
});
function setStars(count){ stars.forEach((star, index) => star.classList.toggle('active', index < count)); }
function normalizeText(text){ return String(text || '').toLowerCase().replace(/[^a-z\s]/g, ' ').replace(/\s+/g, ' ').trim(); }
function scoreTranscript(transcript){
  const normalized = normalizeText(transcript);
  const target = normalizeText(TARGET_PHRASE);
  const mustHave = ['square','parallelogram','triangle'];
  const keywordCount = mustHave.filter(word => normalized.includes(word)).length;
  if (normalized === target) return { stars:3, pass:true };
  if (keywordCount === 3 && normalized.includes('tangram')) return { stars:3, pass:true };
  if (keywordCount >= 2) return { stars:2, pass:true };
  if (normalized.length > 0) return { stars:1, pass:false };
  return { stars:0, pass:false };
}
function getVoice(){ if (!('speechSynthesis' in window)) return null; const voices = speechSynthesis.getVoices() || []; return voices.find(v => /female|woman|zira|jenny|aria|ava|allison|emma|olivia/i.test(`${v.name} ${v.lang}`)) || voices.find(v => /en/i.test(v.lang||'')) || voices[0] || null; }
function speak(text){ return new Promise(resolve => { if (!('speechSynthesis' in window)) return resolve(); try { speechSynthesis.cancel(); } catch(_) {} const u = new SpeechSynthesisUtterance(text); const voice = getVoice(); if (voice) u.voice = voice; u.lang='en-US'; u.rate=0.9; u.pitch=1.02; u.onend=resolve; u.onerror=resolve; speechSynthesis.speak(u); }); }
function getRecognitionCtor(){ return window.SpeechRecognition || window.webkitSpeechRecognition || null; }
function listen(){ return new Promise(resolve => { const SR = getRecognitionCtor(); if (!SR) return resolve({ supported:false, transcript:'' }); const id = ++recognitionCounter; const rec = new SR(); rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=3; rec.continuous=false; let done=false; const finish=t=>{ if(done || id!==recognitionCounter) return; done=true; micBtn.classList.remove('listening'); resolve({ supported:true, transcript:(t||'').trim() }); }; rec.onstart=()=>micBtn.classList.add('listening'); rec.onresult=e=>finish(Array.from(e.results||[]).map(r=>r&&r[0]&&r[0].transcript).filter(Boolean).join(' ')); rec.onerror=()=>finish(''); rec.onnomatch=()=>finish(''); rec.onend=()=>finish(''); try{ rec.start(); }catch(_){ finish(''); } }); }
async function pushProgress(extra={}){
  const payload = { pageId:PAGE_ID, level:LEVEL_ID, activityType:'speaking', score:extra.score ?? (finished ? 100 : 0), stars:extra.stars ?? 0, completed:finished, skills:{reading:0, writing:0, speaking: finished ? 3 : 1, listening: finished ? 3 : 1}, heard: heardBox.textContent, ...extra };
  try { const store = JSON.parse(localStorage.getItem('gpProgressByPage') || '{}'); store[payload.pageId] = payload; localStorage.setItem('gpProgressByPage', JSON.stringify(store)); localStorage.setItem('gpLatestProgress', JSON.stringify(payload)); } catch(_) {}
  try { if (window.GPTrack && typeof window.GPTrack.finish === 'function') await window.GPTrack.finish(payload); } catch(_) {}
}
async function handleMic(){
  if (finished) return;
  if (phase === 'reveal') {
    statusBadge.textContent = TARGET_PHRASE;
    heardBox.textContent = 'Listen carefully to the full sentence.';
    await speak(TARGET_PHRASE);
    phase = 'coach';
    return;
  }
  if (phase === 'coach') {
    statusBadge.textContent = 'Repeat after me.';
    await speak('Repeat after me.');
    phase = 'listen';
  }
  statusBadge.textContent = 'Speak now.';
  const heard = await listen();
    attempts += 1;
    const transcript = (heard.transcript || '').trim();
  heardBox.textContent = transcript || 'No speech was heard.';
    const result = scoreTranscript(transcript);
  if (result.pass) {
    const awarded = attempts === 1 ? 3 : attempts === 2 ? 2 : 1;
    setStars(awarded);
    statusBadge.textContent = awarded === 3 ? 'Great job! 3 stars!' : awarded === 2 ? 'Well done! 2 stars!' : 'Nice work! 1 star!';
    finished = true;
    await pushProgress({ score:100, stars:awarded, completed:true });
    await speak(statusBadge.textContent);
    celebrate();
    return;
  }
  if (attempts >= 3) {
    setStars(0);
    statusBadge.textContent = 'You did a good Job. Nice try!';
    await pushProgress({ score:35, stars:0, completed:true });
    finished = true;
    await speak('You did a good Job. Nice try!');
    return;
  }
  setStars(Math.max(0, result.stars));
  statusBadge.textContent = 'Sorry, try again!';
  await pushProgress({ score:10 * attempts, stars:result.stars });
  await speak('Sorry, try again!');
  phase = 'reveal';
}
function celebrate(){ const burst = document.createElement('div'); burst.setAttribute('aria-hidden','true'); burst.style.position='fixed'; burst.style.inset='0'; burst.style.pointerEvents='none'; burst.style.overflow='hidden'; burst.style.zIndex='9999'; document.body.appendChild(burst); for(let i=0;i<18;i++){ const star=document.createElement('div'); star.textContent=i%2?'⭐':'✨'; star.style.position='absolute'; star.style.left=Math.random()*100+'vw'; star.style.top='-20px'; star.style.fontSize=(22+Math.random()*24)+'px'; star.style.transition='transform 1200ms ease, opacity 1200ms ease'; burst.appendChild(star); requestAnimationFrame(()=>{ star.style.transform='translate('+((Math.random()-.5)*120)+'px,'+(80+Math.random()*80)+'vh) rotate('+(Math.random()*520)+'deg)'; star.style.opacity='0'; }); } setTimeout(()=>burst.remove(),1300); }
prevBtn.addEventListener('click', () => { try { speechSynthesis.cancel(); } catch(_) {} location.href = PREVIOUS_PAGE; });
nextBtn.addEventListener('click', () => { try { speechSynthesis.cancel(); } catch(_) {} location.href = NEXT_PAGE; });
micBtn.addEventListener('click', handleMic);
window.addEventListener('load', () => { try { if (window.GPTrack) window.GPTrack.start(PAGE_ID); } catch(_) {} updateWritingProgress(); pushProgress({ score:0, stars:0, completed:false }); });
</script>
<script src="../../../../shared/js/activity-standardizer-shared.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
 <title>Level C Tangram Names: Repeat and Record Week 2</title>
<style>
  :root{
    --blue:#5f8fd5;
    --lightBlue:#eaf4ff;
    --ink:#2d2d2d;
    --orange:#ff9854;
    --green:#23b060;
    --gold:#ffcc48;
    --shadow:0 14px 32px rgba(0,0,0,.12);
    --cardRadius:20px;
    --panelRadius:16px;
    --font:"Comic Sans MS","Trebuchet MS","Segoe UI",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#bfe9fb;font-family:var(--font);color:var(--ink);}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:8px;}
  .card{
    width:min(1280px,99vw);
    min-height:calc(100vh - 16px);
    background:#fff;
    border-radius:24px;
    box-shadow:var(--shadow);
    padding:12px 12px 18px;
  }
  .poster-wrap{
    position:relative;
    width:min(100%, 960px);
    margin:0 auto;
  }
  .poster-img{
    display:block;
    width:100%;
    height:auto;
    border-radius:18px;
    user-select:none;
    -webkit-user-drag:none;
  }
  .write-box{
    position:absolute;
    border:3px solid rgba(255,164,177,.95);
    background:rgba(255,255,255,.92);
    border-radius:12px;
    box-shadow:0 6px 12px rgba(0,0,0,.04);
    padding:8px 10px 6px;
    color:#666;
    font-size:clamp(24px,3.2vw,34px);
    line-height:1.1;
    text-align:center;
    outline:none;
    min-height:46px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    white-space:nowrap;
  }
  .write-box::before{
    content:"";
    position:absolute;
    left:10px;
    right:10px;
    bottom:8px;
    border-bottom:3px dotted rgba(120,120,120,.35);
    pointer-events:none;
  }
  .write-box:empty::after{
    content:attr(data-placeholder);
    color:rgba(80,80,80,.35);
    font-size:clamp(18px,2.4vw,24px);
    position:relative;
    z-index:1;
    white-space:nowrap;
  }
  .write-box:focus{
    border-color:#7db4ff;
    box-shadow:0 0 0 5px rgba(125,180,255,.18);
  }

  .box-square{left:13.6%;top:38.7%;width:20.5%;}
  .box-parallelogram{left:21.0%;top:63.9%;width:29.8%;}
  .box-triangle{left:29.1%;top:94.0%;width:18.6%;}

  .controls{
    width:min(100%,960px);
    margin:14px auto 0;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    gap:12px;
    align-items:center;
  }
  .nav-btn{
    border:none;
    border-radius:999px;
    padding:12px 18px;
    font:700 16px/1 var(--font);
    cursor:pointer;
    color:#fff;
    background:linear-gradient(180deg,#ff9854,#ff7d45);
    box-shadow:0 5px 0 rgba(0,0,0,.13);
  }
  .nav-btn:active{transform:translateY(2px);box-shadow:0 3px 0 rgba(0,0,0,.13);}
  .nav-btn.next{justify-self:end;}
  .mic-btn{
    width:74px;height:74px;border:none;border-radius:50%;
    display:grid;place-items:center;cursor:pointer;
    background:radial-gradient(circle at 35% 30%, #ffffff 0 18%, #ffe4ea 19% 40%, #ff9fb3 41% 100%);
    box-shadow:0 10px 18px rgba(0,0,0,.14), inset 0 -4px 0 rgba(0,0,0,.08);
    transition:transform .15s ease;
  }
  .mic-btn:hover{transform:translateY(-1px) scale(1.02);}
  .mic-btn.recording{
    animation:pulse 1s infinite;
    background:radial-gradient(circle at 35% 30%, #ffffff 0 16%, #ffd2db 17% 36%, #ff637f 37% 100%);
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,99,127,.38),0 10px 18px rgba(0,0,0,.14), inset 0 -4px 0 rgba(0,0,0,.08);}
    70%{box-shadow:0 0 0 16px rgba(255,99,127,0),0 10px 18px rgba(0,0,0,.14), inset 0 -4px 0 rgba(0,0,0,.08);}
    100%{box-shadow:0 0 0 0 rgba(255,99,127,0),0 10px 18px rgba(0,0,0,.14), inset 0 -4px 0 rgba(0,0,0,.08);}
  }

  .practice-panel{
    width:min(100%,960px);
    margin:14px auto 0;
    background:linear-gradient(180deg,#fffaf1,#fff3da);
    border:3px solid #ffd37b;
    border-radius:18px;
    padding:14px 16px;
    box-shadow:0 10px 20px rgba(0,0,0,.06);
  }
  .practice-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  .practice-title{font-size:clamp(18px,2.4vw,24px);font-weight:900;color:#7a4d00;}
  .stars{display:flex;gap:8px;align-items:center;}
  .star{
    font-size:30px;
    filter:grayscale(1);
    opacity:.35;
    transform:scale(.96);
    transition:.2s ease;
  }
  .star.active{filter:none;opacity:1;transform:scale(1.06);}
  .prompt{
    margin-top:10px;
    font-size:clamp(18px,2.3vw,24px);
    font-weight:800;
    color:#30445c;
    background:#fff;
    border-radius:14px;
    padding:12px 14px;
    border:2px dashed #9cc7ff;
  }
  .status-row{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    justify-content:space-between;
  }
  .status-badge{
    padding:8px 12px;
    border-radius:999px;
    background:#eaf4ff;
    font-weight:800;
    color:#2d5e9a;
    border:2px solid #bfdcff;
  }
  .heard-box{
    flex:1 1 360px;
    min-height:52px;
    background:#fff;
    border:2px solid #e5e5e5;
    border-radius:14px;
    padding:10px 12px;
    font-size:clamp(16px,2vw,20px);
  }
  .hint{
    width:min(100%,960px);
    margin:10px auto 0;
    color:#335;
    font-size:14px;
    text-align:center;
  }

  @media (max-width:760px){
    .card{padding:8px 8px 16px;}
    .controls{grid-template-columns:1fr;}
    .nav-btn,.nav-btn.next{justify-self:stretch;}
    .mic-btn{justify-self:center;order:-1;}
    .practice-top{justify-content:center;}
    .status-row{justify-content:center;}
    .box-square{left:12.8%;top:38.55%;width:22.2%;}
    .box-parallelogram{left:20.0%;top:63.8%;width:31.2%;}
    .box-triangle{left:28.1%;top:93.85%;width:20.2%;}
  }
</style>
</head>

<script>
  const PREVIOUS_PAGE = "LevelC9.html";
  const NEXT_PAGE = "../thursday/FairlyTaleWk2C.html";
  const TARGET_PHRASE = "The names of the Tangram shapes are square, parallelogram and triangle";

  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const micBtn = document.getElementById("micBtn");
  const heardBox = document.getElementById("heardBox");
  const statusBadge = document.getElementById("statusBadge");
  const stars = [
    document.getElementById("star1"),
    document.getElementById("star2"),
    document.getElementById("star3")
  ];

  const writingBoxes = Array.from(document.querySelectorAll(".write-box"));

  function cleanEditableText(el){
    const text = (el.innerText || "").replace(/\n+/g, " ").replace(/\s+/g, " ").trim();
    if (!text) el.innerHTML = "";
  }

  function placeCaretAtEnd(el){
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  writingBoxes.forEach((box) => {
    box.addEventListener("input", () => {
      if ((box.innerText || "").length > 26) {
        box.innerText = box.innerText.slice(0, 26);
        placeCaretAtEnd(box);
      }
    });
    box.addEventListener("blur", () => cleanEditableText(box));
    box.addEventListener("keydown", (e) => {
      if (e.key === "Enter") e.preventDefault();
    });
  });

  function setStars(count){
    stars.forEach((star, index) => star.classList.toggle("active", index < count));
  }

  function normalizeText(text){
    return String(text || "")
      .toLowerCase()
      .replace(/[^a-z\s]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function scoreSpeech(transcript){
    const normalized = normalizeText(transcript);
    const target = normalizeText(TARGET_PHRASE);

    const mustHave = ["square", "parallelogram", "triangle"];
    const keywordCount = mustHave.filter(word => normalized.includes(word)).length;

    if (normalized === target) return 3;
    if (keywordCount === 3 && normalized.includes("tangram")) return 3;
    if (keywordCount >= 2) return 2;
    if (normalized.length > 0) return 1;
    return 0;
  }

  function speak(text, onEnd){
    if (!("speechSynthesis" in window)) {
      if (typeof onEnd === "function") onEnd();
      return;
    }
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.9;
    utterance.pitch = 1.02;
    utterance.onend = () => typeof onEnd === "function" && onEnd();
    speechSynthesis.speak(utterance);
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let isListening = false;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
      isListening = true;
      micBtn.classList.add("recording");
      statusBadge.textContent = "Listening...";
      heardBox.textContent = "Go ahead and say the sentence.";
    };

    recognition.onend = () => {
      isListening = false;
      micBtn.classList.remove("recording");
      if (statusBadge.textContent === "Listening...") {
        statusBadge.textContent = "Tap the mic and try again.";
      }
    };

    recognition.onerror = (event) => {
      isListening = false;
      micBtn.classList.remove("recording");
      const reason = event && event.error ? event.error : "speech error";
      statusBadge.textContent = "Mic problem: " + reason;
      heardBox.textContent = "Please allow the microphone, then tap the mic again.";
    };

    recognition.onresult = (event) => {
      const transcript = event.results?.[0]?.[0]?.transcript || "";
      heardBox.textContent = transcript || "No speech was heard.";
      const starsEarned = scoreSpeech(transcript);
      setStars(starsEarned);

      if (starsEarned === 3) {
        statusBadge.textContent = "Great job! 3 stars!";
        celebrate();
        finishActivity({ stars: 3, score: 100, skills: { speaking: 100, listening: 80, reading: 0, writing: 0 } });
      } else if (starsEarned === 2) {
        statusBadge.textContent = "Good try! 2 stars. Say all 3 names.";
      } else if (starsEarned === 1) {
        statusBadge.textContent = "Nice try! 1 star. Try again.";
      } else {
        statusBadge.textContent = "Let's try again.";
      }
    };
  }

  function startMicProtocol(){
    if (!recognition) {
      setStars(0);
      statusBadge.textContent = "Speech practice is not supported in this browser.";
      heardBox.textContent = "Use Chrome or Edge and allow microphone access.";
      speak("Repeat after me. " + TARGET_PHRASE);
      return;
    }

    if (isListening) {
      recognition.stop();
      return;
    }

    setStars(0);
    heardBox.textContent = "Listen first, then repeat the sentence.";
    statusBadge.textContent = "Repeat after me...";
    speak("Repeat after me. " + TARGET_PHRASE, () => {
      try {
        recognition.start();
      } catch (err) {
        statusBadge.textContent = "Tap the mic again.";
      }
    });
  }

  function celebrate(){
    const burst = document.createElement("div");
    burst.setAttribute("aria-hidden", "true");
    burst.style.position = "fixed";
    burst.style.inset = "0";
    burst.style.pointerEvents = "none";
    burst.style.overflow = "hidden";
    burst.style.zIndex = "9999";
    document.body.appendChild(burst);

    for (let i = 0; i < 18; i++) {
      const star = document.createElement("div");
      star.textContent = i % 2 ? "⭐" : "✨";
      star.style.position = "absolute";
      star.style.left = Math.random() * 100 + "vw";
      star.style.top = "-20px";
      star.style.fontSize = (22 + Math.random() * 24) + "px";
      star.style.transition = "transform 1200ms ease, opacity 1200ms ease";
      burst.appendChild(star);
      requestAnimationFrame(() => {
        star.style.transform = "translate(" + ((Math.random() - .5) * 120) + "px," + (80 + Math.random() * 80) + "vh) rotate(" + (Math.random() * 520) + "deg)";
        star.style.opacity = "0";
      });
    }

    setTimeout(() => burst.remove(), 1300);
  }

  prevBtn?.addEventListener("click", () => window.location.href = PREVIOUS_PAGE);
  nextBtn?.addEventListener("click", () => window.location.href = NEXT_PAGE);
  micBtn?.addEventListener("click", startMicProtocol);

  window.addEventListener("load", () => {
    if (!window.GPTrack) return;
    const pageFile = ((location.pathname || "").split("/").pop() || "").replace(/\.html$/i, "");
    window.GPTrack.start(pageFile || document.title || "Activity");
  });

  async function finishActivity(overrides = {}){
    if (!window.GPTrack || typeof window.GPTrack.finish !== "function") return;
    const pageFile = ((location.pathname || "").split("/").pop() || "").replace(/\.html$/i, "");
    const inferredLevel = "C";

    try {
      await window.GPTrack.finish({
        pageId: pageFile || document.title || "Activity",
        level: inferredLevel,
        activityType: "speaking",
        score: null,
        stars: 0,
        skills: { reading: 0, writing: 0, speaking: 0, listening: 0 },
        ...overrides
      });
    } catch (e) {
      console.warn("Progress save skipped:", e);
    }
  }
</script>

<script src="./levelbc-runtime-fix.js"></script>
<script src="./activity-standardizer.js"></script>
<script type="module" src="./progress-tracker.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <style id="gpLessonPrehide">
    .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
    .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}
    .convo-line.show,.speech-line.show,.dialog-line.show,.bubble-line.show,.bubble-left.show,.bubble-right.show,#bubbleLeft.show,#bubbleRight.show{display:block !important;}
  </style>

  <script>
    document.documentElement.classList.add('gp-intro-video-pending');
    setTimeout(function(){
      document.documentElement.classList.remove('gp-intro-video-pending');
    }, 60000);
  </script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Level C8 - Vertices of Brownies and Muffins</title>

  <link rel="stylesheet" href="../../../../shared/css/base.css" />
  <link rel="stylesheet" href="../../../../shared/css/layout.css" />
  <link rel="stylesheet" href="../../../../shared/css/lesson.css" />

  <style>
    :root{
      font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
      --navy:#1d5fd6;
      --gold:#ffd86a;
      --orange:#ff8a5b;
      --shadow:0 16px 36px rgba(0,0,0,.12);
      --red:#d62828;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      background:#bfe9fb;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:6px;
    }

    html.gp-intro-video-pending body > *:not(#gpIntroVideoOverlay){
      visibility:hidden !important;
    }

    .card{
      width:min(1280px,99vw);
      min-height:calc(100vh - 12px);
      border-radius:18px;
      padding:12px 12px 18px;
      position:relative;
    }

    .poster-area{
      position:relative;
      width:100%;
      max-width:1120px;
      margin:0 auto;
    }

    .poster-img{
      width:100%;
      height:auto;
      display:block;
      position:relative;
      z-index:0;
      border-radius:16px;
      user-select:none;
      -webkit-user-drag:none;
    }

    .tap-girl-control{
      display:inline-flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      background:linear-gradient(180deg,#ffffff,#ffeef8);
      border:3px solid #8ec5ff;
      border-radius:999px;
      padding:7px 14px 7px 8px;
      box-shadow:0 8px 18px rgba(0,0,0,.12);
      color:var(--red);
    }

    .tap-girl-control img{
      width:52px;
      height:auto;
      display:block;
      border-radius:14px;
    }

    .tap-girl-label{
      font-size:.92rem;
      font-weight:900;
      color:var(--red);
      text-align:left;
      line-height:1.05;
      white-space:nowrap;
    }

    .fact-reveal{
      position:absolute;
      left:50%;
      bottom:9.5%;
      transform:translateX(-50%) translateY(-30%);
      width:min(88%,900px);
      text-align:center;
      z-index:4;
      opacity:0;
      pointer-events:none;
      transition:opacity .25s ease, transform .25s ease;
    }

    .fact-reveal.show{
      opacity:1;
      transform:translateX(-50%) translateY(-30%);
    }

    .fact-box{
      display:inline-block;
      background:rgba(255,255,255,.95);
      border:4px solid #4e7fd1;
      border-radius:22px;
      padding:14px 22px;
      box-shadow:0 10px 24px rgba(0,0,0,.12);
      color:#222;
      font-size:clamp(17px,2.15vw,30px);
      line-height:1.45;
      font-weight:900;
      max-width:100%;
      min-height:2.4em;
    }

    .fact-box .red{
      color:var(--red);
    }

    .fact-box .typed-cursor{
      display:inline-block;
      width:.08em;
      height:1em;
      margin-left:2px;
      vertical-align:-0.08em;
      background:#4e7fd1;
      animation:blinkCursor 1s steps(1,end) infinite;
    }

    .row{
      display:flex;
      align-items:center;
      gap:10px;
      position:relative;
      z-index:4;
    }

    .convo-line{
      display:none;
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:4;
      margin:0;
      overflow:visible;
    }

    .convo-line.show{
      display:flex;
    }

    .row.right{
      justify-content:flex-end;
    }

    .convo-line .bubble-stack{
      position:absolute;
      z-index:5;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .line1 .bubble-stack{
      left:24%;
      top:14.6%;
      width:auto;
      max-width:none;
      min-width:max-content;
      align-items:flex-start;
    }

    .line2 .bubble-stack{
      right:18%;
      top:16.7%;
      width:auto;
      max-width:none;
      min-width:max-content;
      align-items:flex-end;
    }

    .bubble{
      padding:10px 14px;
      border-radius:16px;
      position:relative;
      font-size:clamp(18px,2vw,28px);
      line-height:1.22;
      font-weight:800;
      max-width:100%;
      box-shadow:0 8px 16px rgba(0,0,0,.16);
      white-space:nowrap;
      word-break:normal;
      overflow-wrap:normal;
    }

    .bubble.kid{background:#d8ebff;}
    .bubble.baker{background:#fde3c4;}

    .bubble.kid::after{
      content:"";
      position:absolute;
      right:-6px;
      top:14px;
      border-width:8px 0 8px 8px;
      border-style:solid;
      border-color:transparent transparent transparent #d8ebff;
    }

    .bubble.baker::after{
      content:"";
      position:absolute;
      left:-6px;
      top:14px;
      border-width:8px 8px 8px 0;
      border-style:solid;
      border-color:transparent #fde3c4 transparent transparent;
    }

    .bubble.sparkle{
      background:linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);
      box-shadow:0 0 12px rgba(255,214,0,.6),0 0 18px rgba(255,105,180,.4);
      animation:sparklePulse 1.2s ease-in-out infinite;
    }

    @keyframes sparklePulse{
      0%,100%{filter:brightness(1);}
      50%{filter:brightness(1.12);}
    }

    .repeat-result{
      margin-top:4px;
      font-size:2.1rem;
      line-height:1.1;
      font-weight:900;
      color:#2f9f5f;
      text-align:center;
    }

    .star-row{
      display:flex;
      gap:6px;
      margin-top:4px;
      font-weight:900;
      font-size:2.35rem;
      line-height:1;
      color:#ffd24a;
      text-shadow:0 2px 0 #b87900,0 4px 0 #8a5a00,0 8px 14px rgba(0,0,0,.28);
      justify-content:center;
    }

    @keyframes blinkCursor{
      0%,49%{opacity:1;}
      50%,100%{opacity:0;}
    }

    .status-line{
      min-height:1.5em;
      margin-top:8px;
      text-align:center;
      font-weight:900;
      color:#1f7a3a;
      font-size:1rem;
    }

    .controls{
      margin-top:10px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      border-radius:999px;
      padding:10px 18px;
      font-weight:900;
      cursor:pointer;
      background:linear-gradient(180deg,#fffad7,#ffd86a);
      color:#8b5a00;
      box-shadow:0 4px 0 rgba(0,0,0,.2);
      font-size:1rem;
    }

    button:active{
      transform:translateY(2px);
      box-shadow:0 1px 0 rgba(0,0,0,.2);
    }

    .mic-icon-btn{
      background:linear-gradient(180deg,#ff8a5b,#ff6b3d);
      padding:8px 14px;
    }

    .mic-icon-btn img{
      width:28px;
      height:28px;
      display:block;
    }

    .conversation-status{
      min-height:1.2em;
      text-align:center;
      font-weight:700;
      margin-top:6px;
    }

    #gpIntroVideoOverlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.92);
      z-index:99999;
      padding:16px;
      flex-direction:column;
      gap:14px;
    }

    #gpIntroVideoOverlay.active{display:flex;}

    #gpIntroVideo{
      width:min(92vw,980px);
      max-height:82vh;
      height:auto;
      display:block;
      border-radius:14px;
      background:#000;
      box-shadow:0 18px 48px rgba(0,0,0,.45);
    }

    .gp-intro-help{
      color:#fff;
      font-weight:800;
      font-size:1rem;
      text-align:center;
      text-shadow:0 2px 8px rgba(0,0,0,.45);
      max-width:min(92vw,760px);
    }

    .gp-intro-controls{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
    }

    .gp-intro-btn{
      border:none;
      border-radius:999px;
      padding:12px 22px;
      font-size:1rem;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 6px 0 rgba(0,0,0,.22);
    }

    .gp-intro-btn.play{
      background:linear-gradient(180deg,#dff7ff,#8fdcff);
      color:#114a67;
      display:none;
    }

    .gp-intro-btn.sound{
      background:linear-gradient(180deg,#fffad7,#ffd86a);
      color:#8b5a00;
    }

    .gp-intro-btn.skip{
      background:linear-gradient(180deg,#ffffff,#e9eef7);
      color:#304060;
    }

    @media (max-width:900px){
      .tap-girl-control img{
        width:46px;
      }

      .tap-girl-label{
        font-size:.78rem;
      }

      .fact-reveal{
        width:min(93%,860px);
        bottom:8.5%;
      }

      .fact-box{
        padding:12px 14px;
        border-radius:18px;
        font-size:clamp(15px,2.7vw,24px);
        line-height:1.4;
      }

      .line1 .bubble-stack{
        left:22.5%;
        top:14.3%;
        width:auto;
      }

      .line2 .bubble-stack{
        right:16.5%;
        top:16.5%;
        width:auto;
      }
    }

    @media (max-width:640px){
      .fact-reveal{
        bottom:7.5%;
      }

      .fact-box{
        font-size:clamp(14px,3.2vw,20px);
      }

      .bubble{
        font-size:clamp(12px,2.7vw,16px);
      }

      .line1 .bubble-stack{
        left:20%;
        top:14%;
        width:auto;
      }

      .line2 .bubble-stack{
        right:14%;
        top:16.1%;
        width:auto;
      }

      .repeat-result{
        font-size:1.35rem;
      }

      .star-row{
        font-size:1.55rem;
      }

      button{
        font-size:.95rem;
      }
    }
  </style>
</head>

<body>
  <div id="gpIntroVideoOverlay" class="active" aria-label="Lesson intro video">
    <video id="gpIntroVideo" preload="metadata" autoplay muted playsinline webkit-playsinline poster="../../../../assets/images/shapes/LevelC8.png">
      <source src="https://res.cloudinary.com/dtknykrkf/video/upload/f_auto:video,q_auto/v1774463158/LC8cvideo_cacuol.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="gp-intro-help" id="gpIntroHelp">Video is playing muted. Tap "Turn On Sound" if you want audio.</div>
    <div class="gp-intro-controls">
      <button class="gp-intro-btn play" id="gpIntroPlayBtn" type="button">Play Intro</button>
      <button class="gp-intro-btn sound" id="gpIntroSoundBtn" type="button">Turn On Sound</button>
      <button class="gp-intro-btn skip" id="gpIntroSkipBtn" type="button">Skip Intro</button>
    </div>
  </div>

  <div class="card">
    <div class="poster-area" id="posterArea">
      <img class="poster-img" src="../../../../assets/images/shapes/LC8.png" alt="Shape Sides poster with brownies and muffins">

      <div class="row convo-line line1" hidden>
        <div class="bubble-stack">
          <div class="bubble baker">Let&apos;s eat brownies together.</div>
          <div class="repeat-result" data-line="0"></div>
          <div class="star-row" data-line="0"></div>
        </div>
      </div>

      <div class="row right convo-line line2" hidden>
        <div class="bubble-stack">
          <div class="bubble kid">Let&apos;s eat muffins together.</div>
          <div class="repeat-result" data-line="1"></div>
          <div class="star-row" data-line="1"></div>
        </div>
      </div>

      <div class="fact-reveal" id="factReveal" aria-live="polite">
        <div class="fact-box" id="factBox"></div>
      </div>
    </div>

    <div class="status-line" id="statusLine"></div>

    <div class="controls">
      <button class="tap-girl-control" id="tapGirlBtn" type="button" aria-label="Tap the girl">
        <img src="../../../../assets/images/shapes/CirckleGirlWk1.png" alt="Tap the girl">
        <span class="tap-girl-label">Tap the girl</span>
      </button>

      <button id="prevBtn" type="button"><- Previous page</button>

      <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Read the sentence">
        <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone">
      </button>

      <button id="hideBtn" type="button">Hide Text</button>
      <button id="nextBtn" type="button">Next page -></button>
    </div>

    <div class="conversation-status" id="conversationStatus"></div>
  </div>

  <script>
    window.__GP_REQUIRE_INTRO_AUDIO__ = true;

    const tapGirlBtn = document.getElementById('tapGirlBtn');
    const factReveal = document.getElementById('factReveal');
    const factBox = document.getElementById('factBox');
    const statusLine = document.getElementById('statusLine');
    const conversationStatus = document.getElementById('conversationStatus');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const hideBtn = document.getElementById('hideBtn');
    const micIconBtn = document.getElementById('micIconBtn');
    const lines = Array.from(document.querySelectorAll('.convo-line'));
    const repeatResults = Array.from(document.querySelectorAll('.repeat-result'));
    const starRows = Array.from(document.querySelectorAll('.star-row'));

    let lessonCompleted = false;
    let revealVisible = false;
    let typingTimer = null;
    let activeSpeech = null;
    let micStep = 0;
    const revealSegments = [
      { text: 'The brownies have ' },
      { text: '4 vertices', red: true },
      { text: ' and the muffins have ' },
      { text: '5 vertices', red: true },
      { text: '.' }
    ];
    const spokenSentence = 'The brownies have 4 vertices and the muffins have 5 vertices.';
    const micLines = [
      "Let's eat brownies together.",
      "Let's eat muffins together."
    ];

    function speakText(text){
      if (window.GPTracing?.speakText) {
        window.GPTracing.speakText(text, { rate: 0.9, pitch: 1.04, volume: 1 });
        return;
      }
      if(!('speechSynthesis' in window)) return;
      try{ window.speechSynthesis.cancel(); }catch(e){}
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.9;
      utterance.pitch = 1.04;
      utterance.volume = 1;
      if (window.GPTracing?.applyPreferredVoice) {
        window.GPTracing.applyPreferredVoice(utterance);
      }
      window.speechSynthesis.speak(utterance);
    }

    function setStars(index, count){
      const row = starRows[index];
      if (!row) return;
      row.innerHTML = new Array(count).fill('&#9733;').join('');
    }

    function showLine(index){
      const line = lines[index];
      if (!line) return;
      line.hidden = false;
      line.classList.add('show');
    }

    function highlightLine(index, on){
      const line = lines[index];
      const bubble = line ? line.querySelector('.bubble') : null;
      if (!bubble) return;
      bubble.classList.toggle('sparkle', on);
    }

    function showMicBubble(index){
      showLine(index);
      highlightLine(index, true);
      if (repeatResults[index]) {
        repeatResults[index].textContent = micLines[index];
      }
      setStars(index, 3);
      window.setTimeout(() => highlightLine(index, false), 900);
    }

    function resetMicBubbles(){
      lines.forEach((line) => {
        line.hidden = true;
        line.classList.remove('show');
      });
      repeatResults.forEach((el) => {
        if (el) el.textContent = '';
      });
      starRows.forEach((el) => {
        if (el) el.textContent = '';
      });
      micStep = 0;
    }

    function renderTypedSegments(count){
      if (!factBox) return;
      let remaining = count;
      const html = revealSegments.map((segment) => {
        if (remaining <= 0) return '';
        const typed = segment.text.slice(0, remaining);
        remaining -= typed.length;
        if (!typed) return '';
        return segment.red ? `<span class="red">${typed}</span>` : typed;
      }).join('');
      const totalChars = revealSegments.reduce((sum, segment) => sum + segment.text.length, 0);
      factBox.innerHTML = html + (count < totalChars ? '<span class="typed-cursor"></span>' : '');
    }

    function stopTyping(){
      if (typingTimer) {
        window.clearInterval(typingTimer);
        typingTimer = null;
      }
    }

    function startTypingReveal(durationMs){
      const totalChars = revealSegments.reduce((sum, segment) => sum + segment.text.length, 0);
      let count = 0;
      renderTypedSegments(0);
      stopTyping();
      const stepMs = Math.max(35, Math.round(durationMs / totalChars));
      typingTimer = window.setInterval(() => {
        count += 1;
        renderTypedSegments(count);
        if (count >= totalChars) {
          stopTyping();
        }
      }, stepMs);
    }

    function speakWithTyping(text){
      const estimatedDuration = 3300;
      startTypingReveal(estimatedDuration);

      if (!('speechSynthesis' in window)) {
        renderTypedSegments(revealSegments.reduce((sum, segment) => sum + segment.text.length, 0));
        return;
      }

      try{
        if (activeSpeech) {
          window.speechSynthesis.cancel();
          activeSpeech = null;
        }
      }catch(e){}

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.9;
      utterance.pitch = 1.04;
      utterance.volume = 1;
      if (window.GPTracing?.applyPreferredVoice) {
        window.GPTracing.applyPreferredVoice(utterance);
      }
      utterance.onend = () => {
        activeSpeech = null;
        renderTypedSegments(revealSegments.reduce((sum, segment) => sum + segment.text.length, 0));
        stopTyping();
      };
      utterance.onerror = () => {
        activeSpeech = null;
        renderTypedSegments(revealSegments.reduce((sum, segment) => sum + segment.text.length, 0));
        stopTyping();
      };
      activeSpeech = utterance;
      window.speechSynthesis.speak(utterance);
    }

    async function revealFacts(){
      factReveal.classList.add('show');
      revealVisible = true;
      statusLine.textContent = 'Great job!';
      conversationStatus.textContent = 'The vertices sentence is typing on the poster.';
      speakWithTyping(spokenSentence);

      if (!lessonCompleted && typeof window.finishAndSave === 'function') {
        lessonCompleted = true;
        try{
          await window.finishAndSave({
            pageId:'LevelC8',
            level:'C',
            activityType:'lesson',
            score:100,
            stars:3,
            completed:true,
            skills:{ reading:1, writing:0, speaking:1, listening:1 }
          });
        }catch(err){
          console.warn('Progress save failed:', err);
        }
      }
    }

    function hideFacts(){
      factReveal.classList.remove('show');
      revealVisible = false;
      stopTyping();
      try{
        window.speechSynthesis.cancel();
      }catch(e){}
      activeSpeech = null;
      if (factBox) factBox.innerHTML = '';
      statusLine.textContent = '';
      conversationStatus.textContent = 'Text hidden.';
      resetMicBubbles();
    }

    if (tapGirlBtn) {
      tapGirlBtn.addEventListener('click', revealFacts);
    }

    if (hideBtn) {
      hideBtn.addEventListener('click', hideFacts);
    }

    if (micIconBtn) {
      micIconBtn.addEventListener('click', () => {
        if (micStep >= micLines.length) {
          micStep = 0;
        }
        showMicBubble(micStep);
        speakText(micLines[micStep]);
        conversationStatus.textContent = micLines[micStep];
        micStep += 1;
      });
    }

    if (prevBtn) {
      prevBtn.addEventListener('click', () => {
        window.location.href = '../../week-1/friday/LevelC_Quiz1.html';
      });
    }

    if (nextBtn) {
      nextBtn.addEventListener('click', async () => {
        if (!lessonCompleted && typeof window.finishAndSave === 'function') {
          try{
            await window.finishAndSave({
              pageId:'LevelC8',
              level:'C',
              activityType:'lesson',
              score: revealVisible ? 100 : 0,
              stars: revealVisible ? 3 : 0,
              completed: !!revealVisible,
              skills:{ reading:1, writing:0, speaking:1, listening:1 }
            });
          }catch(err){
            console.warn('Progress save before next page failed:', err);
          }
        }
        window.location.href = 'LevelC9.html';
      });
    }
  </script>

  <script src="../../../../activity-standardizer.js"></script>
  <script src="../../../../shared/js/storage.js"></script>
  <script src="../../../../shared/js/progress.js"></script>
  <script src="../../../../shared/js/tracing.js"></script>

  <script type="module">
    import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";

    window.GPProgress.installTracker({
      saveActivityResult,
      markLoginPing,
      defaultPageId: "LevelC8",
      defaultLevel: "C",
      defaultActivityType: "lesson",
      defaultScore: 100,
      defaultStars: 1,
      defaultSkills: {
        reading: 1,
        writing: 0,
        speaking: 1,
        listening: 1
      }
    });

    function getStudentSession(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
      }catch(e){
        return null;
      }
    }

    function inferProgressMeta(payload){
      const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
      const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
      const level = (payload && payload.level)
        || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
      const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
      const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
      const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
      const month = payload && payload.month != null ? Number(payload.month) : 1;
      return {
        pageId,
        file,
        level,
        week: Number.isFinite(week) && week > 0 ? week : 1,
        month: Number.isFinite(month) && month > 0 ? month : 1
      };
    }

    function getActivityStore(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      }catch(e){
        return {};
      }
    }

    function setActivityStore(store){
      try{
        localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
      }catch(e){}
    }

    function saveLocalActivityFallback(payload){
      const session = getStudentSession() || {};
      const meta = inferProgressMeta(payload || {});
      const score = payload && typeof payload.score === "number" ? payload.score : 0;
      const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
      const tracing = payload && typeof payload.tracing === "number"
        ? payload.tracing
        : (payload && typeof payload.progress === "number" ? payload.progress : 0);
      const type = (payload && (payload.type || payload.activityType)) || "lesson";

      const entry = {
        pageId: meta.pageId,
        file: meta.file,
        level: meta.level,
        type,
        activityType: (payload && payload.activityType) || type,
        score,
        stars,
        skills: payload && payload.skills ? payload.skills : {},
        completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
        tracing,
        week: meta.week,
        month: meta.month,
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
        savedAt: new Date().toISOString(),
        ts: Date.now()
      };

      const store = getActivityStore();
      store[meta.pageId] = {
        ...(store[meta.pageId] || {}),
        ...entry
      };
      setActivityStore(store);

      try{
        localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
      }catch(e){}

      return store[meta.pageId];
    }

    async function finishAndSave(payload){
      const session = getStudentSession() || {};
      const fullPayload = {
        ...(payload || {}),
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
      };

      saveLocalActivityFallback(fullPayload);

      if (typeof window.finishActivity === "function") {
        try{
          await window.finishActivity(fullPayload);
        }catch(err){
          console.warn("finishActivity failed, local fallback already saved:", err);
        }
      }

      return fullPayload;
    }

    window.finishAndSave = finishAndSave;
  </script>

  <script>
    (function(){
      const html = document.documentElement;
      const overlay = document.getElementById("gpIntroVideoOverlay");
      const video = document.getElementById("gpIntroVideo");
      const help = document.getElementById("gpIntroHelp");
      const playBtn = document.getElementById("gpIntroPlayBtn");
      const soundBtn = document.getElementById("gpIntroSoundBtn");
      const skipBtn = document.getElementById("gpIntroSkipBtn");

      if (!overlay || !video || !help || !playBtn || !soundBtn || !skipBtn) {
        html.classList.remove("gp-intro-video-pending");
        return;
      }

      let revealed = false;
      let hardTimeout = setTimeout(revealLesson, 60000);

      function revealLesson(){
        if (revealed) return;
        revealed = true;
        clearTimeout(hardTimeout);
        try { video.pause(); } catch(e){}
        overlay.classList.remove("active");
        overlay.style.display = "none";
        html.classList.remove("gp-intro-video-pending");
      }

      function showPlayFallback(msg){
        help.textContent = msg || 'Tap "Play Intro" to start the video.';
        playBtn.style.display = "inline-flex";
      }

      async function tryAutoplayMuted(){
        try{
          video.muted = true;
          video.defaultMuted = true;
          await video.play();
          help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
          playBtn.style.display = "none";
        }catch(err){
          showPlayFallback('Autoplay was blocked. Tap "Play Intro" to start.');
        }
      }

      async function playWithSound(){
        try{
          video.muted = false;
          video.defaultMuted = false;
          video.volume = 1;
          await video.play();
          help.textContent = 'Sound is on. Tap "Skip Intro" to continue.';
          playBtn.style.display = "none";
        }catch(err){
          help.textContent = 'Tap "Play Intro" first, then tap "Turn On Sound".';
          playBtn.style.display = "inline-flex";
        }
      }

      playBtn.addEventListener("click", async () => {
        try{
          video.muted = true;
          video.defaultMuted = true;
          await video.play();
          help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
          playBtn.style.display = "none";
        }catch(err){
          help.textContent = "Unable to start the intro video.";
        }
      });

      soundBtn.addEventListener("click", playWithSound);
      skipBtn.addEventListener("click", revealLesson);

      video.addEventListener("playing", () => {
        help.textContent = video.muted
          ? 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".'
          : 'Sound is on. Tap "Skip Intro" to continue.';
      });

      video.addEventListener("ended", revealLesson, { once:true });

      video.addEventListener("error", () => {
        help.textContent = "Intro video failed to load. Opening page now.";
        setTimeout(revealLesson, 800);
      }, { once:true });

      video.addEventListener("loadedmetadata", () => {
        tryAutoplayMuted();
      }, { once:true });

      setTimeout(() => {
        if (!revealed && video.readyState >= 1) tryAutoplayMuted();
      }, 1200);
    })();
  </script>
</body>

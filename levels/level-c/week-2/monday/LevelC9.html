<script src="../../../../shared/js/vertex-entry.js"></script>
<script>
  window.__GP_REQUIRE_INTRO_AUDIO__ = true;

  const posterArea = document.getElementById('posterArea');
  const posterImg = posterArea.querySelector('.poster-img');
  const dotLayer = document.getElementById('dotLayer');
  const drawLayer = document.getElementById('drawLayer');
  const statusLine = document.getElementById('statusLine');
  const progressPercentEl = document.getElementById('progressPercent');
  const progressFillEl = document.getElementById('progressFill');
  const progressMessageEl = document.getElementById('progressMessage');
  const ctx = drawLayer.getContext('2d');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const clearBtn = document.getElementById('clearBtn');

  const introLines = [
    "⑴Practice drawing shapes with 4 vertices and 5 vertices.",
    "Draw Quadrangles and Pentagons by drawing lines to connect the red and blue dots."
  ];

  function speak(text){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.96;
    u.pitch = 1.08;
    u.volume = 1.0;
    if (window.GPTracing?.applyPreferredVoice) window.GPTracing.applyPreferredVoice(u);
    window.speechSynthesis.speak(u);
  }

  function speakIntro(){
    let i = 0;
    const next = () => {
      if(i >= introLines.length) return;
      speak(introLines[i]);
      i += 1;
      setTimeout(next, 1200);
    };
    next();
  }

  const quadrangles = [
      { id:'q1', row:0, points:[[0.1641,0.3709],[0.3320,0.3709],[0.3730,0.4555],[0.1270,0.4555]] },
      { id:'q2', row:1, points:[[0.1563,0.5558],[0.3574,0.5389],[0.3867,0.6769],[0.1816,0.6945]] },
      { id:'q3', row:2, points:[[0.1660,0.7732],[0.3809,0.7732],[0.3516,0.9086],[0.1367,0.9054]] }
    ];
  const pentagons = [
      { id:'p1', row:0, points:[[0.7236,0.3448],[0.8330,0.3930],[0.7988,0.4822],[0.6484,0.4822],[0.6094,0.3930]] },
      { id:'p2', row:1, points:[[0.7236,0.5629],[0.8496,0.6170],[0.8008,0.7198],[0.6465,0.7198],[0.5977,0.6170]] },
      { id:'p3', row:2, points:[[0.7236,0.7745],[0.8398,0.8266],[0.8057,0.9321],[0.6416,0.9321],[0.6074,0.8266]] }
    ];

  const shapes = [...quadrangles, ...pentagons];
  const samples = new Map();
  const visited = new Map();
  const completed = new Set();
  const shapePercents = new Map();
  const rowCompleted = [false,false,false];
  const rowMessages = ["Amazing Job!","Thumps up!","Wow! you are super smart!"];
  const progressMilestones = new Set();
  let progressSaveTimer = null;
  let traceFinished = false;
  let lastTraceSound = 0;
  let combinedProgress = 0;

  function playTraceTick(){
    if (window.GPTracing?.playTraceTick) {
      window.GPTracing.playTraceTick({ throttleMs: 100 });
      return;
    }
    try{
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if(!AudioCtx) return;
      const a = new AudioCtx();
      const osc = a.createOscillator();
      const gain = a.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.value = 0.06;
      osc.connect(gain);
      gain.connect(a.destination);
      osc.start();
      osc.stop(a.currentTime + 0.05);
      osc.onended = () => a.close();
    }catch(e){}
  }

  function playChime(){
    try{ new Audio('../../../../assets/audio/chimes/chime.mp3.mp3').play().catch(()=>{}); }catch(_e){}
  }

  function playCelebration(){
    playChime();
    window.GPTracing?.playTraceCelebration?.();
  }

  function computeOverallProgress(){
    const values = shapes.map((shape) => shapePercents.get(shape.id) || 0);
    return values.length ? Math.round(values.reduce((sum, value) => sum + value, 0) / values.length) : 0;
  }

  function progressMessageFor(score){
    if (score >= 100) return 'Fantastic! All the shapes are complete.';
    if (score >= 75) return 'Amazing job! Finish the last sides.';
    if (score >= 40) return 'Great tracing. Keep joining the dots.';
    return 'Trace the quadrangles and pentagons.';
  }

  function updateProgressUI(score){
    progressPercentEl.textContent = `${score}%`;
    progressFillEl.style.width = `${score}%`;
    progressMessageEl.textContent = progressMessageFor(score);
  }

  function applyCombinedProgress(score){
    combinedProgress = Math.max(0, Math.min(100, Math.round(score)));
    updateProgressUI(combinedProgress);
  }

  function persistTraceProgress(score){
    if (typeof window.finishAndSave !== 'function') return;
    window.finishAndSave({
      pageId: 'LevelC9',
      level: 'C',
      activityType: 'tracing',
      score,
      tracing: score,
      stars: score >= 95 ? 3 : score >= 65 ? 2 : score > 0 ? 1 : 0,
      skills: { reading: 1, writing: 1, speaking: 0, listening: 1 }
    }).catch(() => {});
  }

  function schedulePersist(score){
    if (progressSaveTimer) window.clearTimeout(progressSaveTimer);
    progressSaveTimer = window.setTimeout(() => persistTraceProgress(score), 160);
  }

  const vertexEntry = window.GPVertexEntry?.create({
    mount: "#vertexEntryMount",
    title: "Write the number of vertices",
    prompt: "Write 4 for each quadrangle and 5 for each pentagon.",
    showProgress: false,
    items: [
      { id: "q1Vertices", label: "Quadrangle 1", answer: 4, hint: "Write 4", successSpeech: "Correct. A quadrangle has 4 vertices." },
      { id: "q2Vertices", label: "Quadrangle 2", answer: 4, hint: "Write 4", successSpeech: "Correct. A quadrangle has 4 vertices." },
      { id: "q3Vertices", label: "Quadrangle 3", answer: 4, hint: "Write 4", successSpeech: "Correct. A quadrangle has 4 vertices." },
      { id: "p1Vertices", label: "Pentagon 1", answer: 5, hint: "Write 5", successSpeech: "Correct. A pentagon has 5 vertices." },
      { id: "p2Vertices", label: "Pentagon 2", answer: 5, hint: "Write 5", successSpeech: "Correct. A pentagon has 5 vertices." },
      { id: "p3Vertices", label: "Pentagon 3", answer: 5, hint: "Write 5", successSpeech: "Correct. A pentagon has 5 vertices." }
    ],
    onProgress(state){
      applyCombinedProgress(state.totalProgress);
      schedulePersist(state.totalProgress);
      maybeCelebrateProgress(state.totalProgress);
    }
  }) || null;

  function queueTraceSave(score){
    if (vertexEntry) {
      vertexEntry.setBaseProgress(score);
      return;
    }
    applyCombinedProgress(score);
    schedulePersist(score);
  }

  function maybeCelebrateProgress(score){
    [
      [35, 'Nice tracing. Keep going!'],
      [70, 'Great work. You are almost done!']
    ].forEach(([mark, message]) => {
      if (score >= mark && !progressMilestones.has(mark)) {
        progressMilestones.add(mark);
        playChime();
        speak(message);
      }
    });

    if (score >= 100 && !traceFinished) {
      traceFinished = true;
      playCelebration();
      speak('Excellent! You completed all the quadrangles and pentagons.');
    }
  }

    function redrawDots(){
      dotLayer.innerHTML = '';
      shapes.forEach(shape => {
        const color = shape.id.startsWith('q') ? '#d62c2c' : '#1d76c9';
        const pts = shape.points.map(p => `${p[0]*1024},${p[1]*1536}`).join(' ');
        const poly = document.createElementNS('http://www.w3.org/2000/svg','polyline');
        poly.setAttribute('points', pts + ' ' + pts.split(' ')[0]);
        poly.setAttribute('fill','none');
        poly.setAttribute('stroke','rgba(200,200,200,0.7)');
        poly.setAttribute('stroke-width','3');
        poly.setAttribute('stroke-dasharray','10 8');
        dotLayer.appendChild(poly);
        shape.points.forEach(p => {
          const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
          c.setAttribute('cx', p[0]*1024);
          c.setAttribute('cy', p[1]*1536);
          c.setAttribute('r', 10);
          c.setAttribute('fill', color);
          dotLayer.appendChild(c);
        });
      });
  }

  function toCanvasPoint(pt){
    return { x: pt[0] * drawLayer.width, y: pt[1] * drawLayer.height };
  }

  function buildSamples(){
    samples.clear();
    visited.clear();
    completed.clear();
    shapePercents.clear();
    if (vertexEntry) vertexEntry.reset();
    shapes.forEach(shape => {
      const pts = shape.points.map(p => toCanvasPoint(p));
      const spacing = 10;
      const s = [];
      for(let i=0;i<pts.length;i++){
        const a = pts[i];
        const b = pts[(i+1)%pts.length];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx,dy);
        const steps = Math.max(1, Math.ceil(dist/spacing));
        for(let k=0;k<=steps;k++){
          s.push({ x: a.x + (dx*k/steps), y: a.y + (dy*k/steps) });
        }
      }
      samples.set(shape.id, s);
      visited.set(shape.id, new Array(s.length).fill(false));
      shapePercents.set(shape.id, 0);
    });
    updateProgressUI(0);
  }

  function updateVisited(pos){
    const threshold = 34;
    const thr2 = threshold * threshold;
    let changedAny = false;
    shapes.forEach(shape => {
      if(completed.has(shape.id)) return;
      const s = samples.get(shape.id) || [];
      const v = visited.get(shape.id) || [];
      let changed = false;
      for(let i=0;i<s.length;i++){
        if(v[i]) continue;
        const dx = pos.x - s[i].x;
        const dy = pos.y - s[i].y;
        if(dx*dx + dy*dy <= thr2){ v[i]=true; changed=true; }
      }
      if(changed){
        let pct = Math.round((v.filter(Boolean).length / s.length) * 100);
        if (pct >= 96) pct = 100;
        shapePercents.set(shape.id, pct);
        if(pct >= 100){ completed.add(shape.id); }
        changedAny = true;
      }
    });

    if (changedAny) {
      const overall = computeOverallProgress();
      queueTraceSave(overall);
      maybeCelebrateProgress(overall);
    }

    for(let row=0; row<3; row++){
      const qId = `q${row+1}`;
      const pId = `p${row+1}`;
      if(!rowCompleted[row] && completed.has(qId) && completed.has(pId)){
        rowCompleted[row] = true;
        const msg = rowMessages[row];
        statusLine.textContent = msg;
        playCelebration();
        speak(msg);
        queueTraceSave(computeOverallProgress());
      }
    }
  }

  let drawing = false;
  function getEventPos(e){
    const rect = drawLayer.getBoundingClientRect();
    if (e.touches && e.touches[0]) {
      return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    }
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
  function startDraw(e){
    e.preventDefault();
    drawing = true;
    const pos = getEventPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x,pos.y);
    updateVisited(pos);
  }
  function moveDraw(e){
    if(!drawing) return;
    e.preventDefault();
    const pos = getEventPos(e);
    ctx.lineTo(pos.x,pos.y);
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#ff4d4d';
    ctx.stroke();
    updateVisited(pos);
    const now = performance.now();
    if(now - lastTraceSound > 120){ lastTraceSound = now; playTraceTick(); }
  }
  function endDraw(e){
    if(!drawing) return;
    e && e.preventDefault();
    drawing = false;
  }
  drawLayer.addEventListener('pointerdown', startDraw);
  drawLayer.addEventListener('pointermove', moveDraw);
  drawLayer.addEventListener('pointerup', endDraw);
  drawLayer.addEventListener('pointerleave', endDraw);
  drawLayer.addEventListener('pointercancel', endDraw);
  drawLayer.addEventListener('mousedown', startDraw);
  drawLayer.addEventListener('mousemove', moveDraw);
  drawLayer.addEventListener('mouseup', endDraw);
  drawLayer.addEventListener('touchstart', startDraw, { passive:false });
  drawLayer.addEventListener('touchmove', moveDraw, { passive:false });
  drawLayer.addEventListener('touchend', endDraw);

  clearBtn.addEventListener('click', () => {
    ctx.clearRect(0,0,drawLayer.width,drawLayer.height);
    rowCompleted.fill(false);
    statusLine.textContent = '';
    progressMilestones.clear();
    traceFinished = false;
    buildSamples();
    queueTraceSave(0);
  });
  if (prevBtn) prevBtn.addEventListener('click', () => { window.location.href = 'LevelC8.html'; });
  if (nextBtn) nextBtn.addEventListener('click', () => { window.location.href = '../tuesday/LevelC10.html'; });

  function resize(){
    const imgRect = posterImg.getBoundingClientRect();
    const areaRect = posterArea.getBoundingClientRect();
    const width = imgRect.width || areaRect.width;
    const height = imgRect.height || areaRect.height;
    if(!width || !height){
      requestAnimationFrame(resize);
      return;
    }
    drawLayer.width = width;
    drawLayer.height = height;
    drawLayer.style.width = width + 'px';
    drawLayer.style.height = height + 'px';
    ctx.clearRect(0,0,drawLayer.width,drawLayer.height);
    redrawDots();
    buildSamples();
  }

  resize();
  if (posterImg && !posterImg.complete) {
    posterImg.addEventListener('load', resize, { once:true });
  }
  window.addEventListener('resize', resize);
  if ('ResizeObserver' in window) {
    const ro = new ResizeObserver(resize);
    ro.observe(posterArea);
  }

  setTimeout(speakIntro, 150);
</script>
<script src="../../../../activity-standardizer.js"></script>
<script src="../../../../shared/js/storage.js"></script>
<script src="../../../../shared/js/progress.js"></script>
<script src="../../../../shared/js/tracing.js"></script>
<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LevelC9",
    defaultLevel: "C",
    defaultActivityType: "lesson",
    defaultScore: 100,
    defaultStars: 1,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);
    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}
    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };

    saveLocalActivityFallback(fullPayload);

    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }

    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>

<script>
  (function(){
    const html = document.documentElement;
    const overlay = document.getElementById("gpIntroVideoOverlay");
    const video = document.getElementById("gpIntroVideo");
    const help = document.getElementById("gpIntroHelp");
    const playBtn = document.getElementById("gpIntroPlayBtn");
    const soundBtn = document.getElementById("gpIntroSoundBtn");
    const skipBtn = document.getElementById("gpIntroSkipBtn");

    if (!overlay || !video || !help || !playBtn || !soundBtn || !skipBtn) {
      html.classList.remove("gp-intro-video-pending");
      return;
    }

    let revealed = false;
    let hardTimeout = setTimeout(revealLesson, 60000);

    function revealLesson(){
      if (revealed) return;
      revealed = true;
      clearTimeout(hardTimeout);
      try { video.pause(); } catch(e){}
      overlay.classList.remove("active");
      overlay.style.display = "none";
      html.classList.remove("gp-intro-video-pending");
    }

    function showPlayFallback(msg){
      help.textContent = msg || 'Tap "Play Intro" to start the video.';
      playBtn.style.display = "inline-flex";
    }

    async function tryAutoplayMuted(){
      try{
        video.muted = true;
        video.defaultMuted = true;
        await video.play();
        help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
        playBtn.style.display = "none";
      }catch(err){
        showPlayFallback('Autoplay was blocked. Tap "Play Intro" to start.');
      }
    }

    async function playWithSound(){
      try{
        video.muted = false;
        video.defaultMuted = false;
        video.volume = 1;
        await video.play();
        help.textContent = 'Sound is on. Tap "Skip Intro" to continue.';
        playBtn.style.display = "none";
      }catch(err){
        help.textContent = 'Tap "Play Intro" first, then tap "Turn On Sound".';
        playBtn.style.display = "inline-flex";
      }
    }

    playBtn.addEventListener("click", async () => {
      try{
        video.muted = true;
        video.defaultMuted = true;
        await video.play();
        help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
        playBtn.style.display = "none";
      }catch(err){
        help.textContent = "Unable to start the intro video.";
      }
    });

    soundBtn.addEventListener("click", playWithSound);
    skipBtn.addEventListener("click", revealLesson);

    video.addEventListener("playing", () => {
      help.textContent = video.muted
        ? 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".'
        : 'Sound is on. Tap "Skip Intro" to continue.';
    });

    video.addEventListener("ended", revealLesson, { once:true });

    video.addEventListener("error", () => {
      help.textContent = "Intro video failed to load. Opening page now.";
      setTimeout(revealLesson, 800);
    }, { once:true });

    video.addEventListener("loadedmetadata", () => {
      tryAutoplayMuted();
    }, { once:true });

    setTimeout(() => {
      if (!revealed && video.readyState >= 1) tryAutoplayMuted();
    }, 1200);
  })();
</script>
</body>

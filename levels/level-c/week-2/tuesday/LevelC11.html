<style>
  :root{
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    --shadow:0 20px 40px rgba(0,0,0,.10);
    --navy:#1d5fd6;
    --sky:#dff3ff;
    --good:#20a35b;
    --bad:#d62828;
    --gold:#ffce47;
    --ink:#20314f;
  }

  *{box-sizing:border-box;}

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    background:#bfe9fb;
    padding:6px;
  }

  html.gp-intro-video-pending body > *:not(#gpIntroVideoOverlay){
    visibility:hidden !important;
  }

  .card{
    width:min(1280px,99vw);
    min-height:calc(100vh - 12px);
    border-radius:18px;
    padding:12px 12px 18px;
    position:relative;
  }

  .poster-area{
    position:relative;
    width:100%;
    max-width:1120px;
    margin:0 auto;
    border-radius:20px;
    overflow:hidden;
  }

  .poster-img,
  .poster-overlay{
    width:100%;
    height:auto;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
  }

  .poster-base{
    position:relative;
    z-index:1;
  }

  .circle-layer{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:2;
    pointer-events:none;
  }

  .poster-overlay{
    position:absolute;
    inset:0;
    z-index:3;
    pointer-events:none;
  }

  .instruction-bubble{
    position:absolute;
    left:25%;
    top:17%;
    max-width:46%;
    background:linear-gradient(180deg,#f4fbff,#dff1ff);
    border:4px solid #7cb8ff;
    border-radius:30px;
    padding:18px 24px;
    font-weight:900;
    font-size:clamp(20px,2.7vw,42px);
    line-height:1.15;
    color:var(--ink);
    box-shadow:0 12px 30px rgba(0,0,0,.12);
    opacity:0;
    transform:translateY(8px);
    transition:opacity .22s ease, transform .22s ease;
    z-index:5;
  }

  .instruction-bubble.show{
    opacity:1;
    transform:translateY(0);
  }

  .instruction-bubble::after{
    content:"";
    position:absolute;
    left:-18px;
    top:42px;
    width:0;height:0;
    border-top:16px solid transparent;
    border-bottom:16px solid transparent;
    border-right:22px solid #dff1ff;
    filter:drop-shadow(-3px 0 0 #7cb8ff);
  }

  .hud{
    width:100%;
    max-width:1120px;
    margin:10px auto 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }

  .status-pill{
    background:#ffffff;
    color:var(--ink);
    border:3px solid #b9dcff;
    border-radius:999px;
    padding:10px 16px;
    min-height:48px;
    display:flex;
    align-items:center;
    font-weight:900;
    box-shadow:var(--shadow);
  }

  .progress-wrap{
    flex:1 1 340px;
    display:flex;
    align-items:center;
    gap:10px;
    background:#ffffff;
    border:3px solid #b9dcff;
    border-radius:999px;
    padding:10px 14px;
    box-shadow:var(--shadow);
  }

  .progress-track{
    flex:1;
    height:16px;
    border-radius:999px;
    background:#ebf6ff;
    overflow:hidden;
    border:1px solid #cde7ff;
  }

  .progress-fill{
    width:0%;
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg,#44b8ff,#3ad07a);
    transition:width .25s ease;
  }

  .progress-text{
    min-width:84px;
    font-weight:900;
    color:var(--ink);
    text-align:right;
  }

  .shape-hit{
    position:absolute;
    cursor:pointer;
    border:none;
    background:transparent;
    z-index:4;
    touch-action:manipulation;
    border-radius:28px;
    outline:none;
  }

  .shape-hit::before{
    content:"";
    position:absolute;
    inset:8%;
    border-radius:50%;
    border:4px dashed rgba(29,95,214,.18);
    opacity:0;
    transform:scale(.82);
    transition:opacity .18s ease, transform .18s ease;
  }

  .shape-hit:hover::before,
  .shape-hit:focus-visible::before{
    opacity:1;
    transform:scale(1);
  }

  .shape-hit.correct::after{
    content:"✓";
    position:absolute;
    right:-6px;
    top:-10px;
    width:34px;
    height:34px;
    border-radius:50%;
    background:var(--good);
    color:#fff;
    display:grid;
    place-items:center;
    font-weight:900;
    font-size:20px;
    box-shadow:0 8px 18px rgba(0,0,0,.16);
  }

  .shape-hit.wrong{
    animation:wrongShake .36s ease;
  }

  @keyframes wrongShake{
    0%{transform:translateX(0);}
    20%{transform:translateX(-6px);}
    40%{transform:translateX(6px);}
    60%{transform:translateX(-4px);}
    80%{transform:translateX(4px);}
    100%{transform:translateX(0);}
  }

  .shape-hit.pulse{
    animation:pulseSoft 1.8s ease-in-out infinite;
  }

  @keyframes pulseSoft{
    0%{filter:drop-shadow(0 0 0 rgba(68,184,255,0));}
    50%{filter:drop-shadow(0 0 12px rgba(68,184,255,.35));}
    100%{filter:drop-shadow(0 0 0 rgba(68,184,255,0));}
  }

  .controls{
    margin-top:12px;
    display:flex;
    justify-content:space-between;

    color:#7b5600;

  .mic-icon-btn{

    background:transparent;
    padding:0;
    cursor:pointer;

    align-items:center;
    justify-content:center;

    height:48px;
    border-radius:50%;
    background:#fff;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
  }

  .mic-icon-btn img{
    width:32px;
    height:32px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
  }

  .circle-stroke{

    stroke:var(--good);
    stroke-width:12;
    stroke-linecap:round;
    stroke-linejoin:round;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,.16));
  }

  .circle-stroke.wrong{
    stroke:var(--bad);
    stroke-dasharray:12 10;
  }

  #gpIntroVideoOverlay{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.92);
    z-index:99999;
    padding:16px;
    flex-direction:column;
    gap:14px;
  }

  #gpIntroVideoOverlay.active{display:flex;}

  #gpIntroVideo{
    width:min(92vw,980px);
    max-height:82vh;
    height:auto;
    display:block;
    border-radius:14px;
    background:#000;
    box-shadow:0 18px 48px rgba(0,0,0,.45);
  }

  .gp-intro-help{
    color:#fff;
    font-weight:800;
    font-size:1rem;
    text-align:center;
    text-shadow:0 2px 8px rgba(0,0,0,.45);
    max-width:min(92vw,760px);
  }

  .gp-intro-controls{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
  }

  .gp-intro-btn{
    border:none;
    border-radius:999px;
    padding:12px 22px;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,.22);
  }

  .gp-intro-btn.play{
    background:linear-gradient(180deg,#dff7ff,#8fdcff);
    color:#114a67;

  }

  .gp-intro-btn.sound{

    color:#8b5a00;
  }

  .gp-intro-btn.skip{
    background:linear-gradient(180deg,#ffffff,#e9eef7);

  }

  #gpUnifiedIntroPrehide,
  #introVideoWrap,
  .intro-video-wrap,
  #lbIntroVideoOverlay{
    display:none !important;
    visibility:hidden !important;
    opacity:0 !important;
    pointer-events:none !important;
  }

  @media (max-width:900px){
    .instruction-bubble{
      left:23%;
      top:16%;
      max-width:58%;
      font-size:clamp(18px,3.2vw,32px);
      padding:14px 18px;
    }
  }

  @media (max-width:640px){
    .instruction-bubble{
      left:21%;
      top:15%;
      max-width:62%;
      font-size:clamp(16px,3.6vw,24px);
      padding:12px 14px;
      border-radius:20px;
    }

    .instruction-bubble::after{
      top:28px;
      left:-13px;
      border-top:12px solid transparent;
      border-bottom:12px solid transparent;
      border-right:16px solid #dff1ff;
    }

    .btn{
      font-size:.94rem;
      padding:11px 15px;
    }
  }
</style>

<script>
  window.__GP_REQUIRE_INTRO_AUDIO__ = true;

  const introBubble = document.getElementById('introBubble');
  const hits = Array.from(document.querySelectorAll('.shape-hit'));
  const micIconBtn = document.getElementById('micIconBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const clearBtn = document.getElementById('clearBtn');
  const statusPill = document.getElementById('statusPill');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const circleLayer = document.getElementById('circleLayer');
  const posterArea = document.getElementById('posterArea');

  const chime = new Audio('../../../../assets/audio/chimes/chime.mp3.mp3');
  chime.preload = 'auto';

  const promptText = 'Can you find all of the quadrangles? Circle each shape that is a quadrangle.';
  const successText = 'Excellent! You found all of the quadrangles.';
  const wrongText = 'That shape is not a quadrangle. Try again.';

  const correctHits = hits.filter(hit => hit.dataset.correct === 'true');
  let solved = false;

  function speak(text){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.98;
    u.pitch = 1.04;
    u.volume = 1;
    if (window.GPTracing?.applyPreferredVoice) window.GPTracing.applyPreferredVoice(u);
    window.speechSynthesis.speak(u);
  }

  function showBubble(text){
    introBubble.textContent = text;
    introBubble.classList.add('show');
  }

  function countFound(){
    return correctHits.filter(hit => hit.classList.contains('correct')).length;
  }

  function updateHud(){
    const found = countFound();
    const total = correctHits.length;
    const pct = Math.round((found / total) * 100);

    progressFill.style.width = pct + '%';
    progressText.textContent = found + ' / ' + total;

    if (solved) {
      statusPill.textContent = successText;
    } else if (found > 0) {
      statusPill.textContent = 'Great! Keep circling the quadrangles.';
    } else {
      statusPill.textContent = 'Circle each shape that is a quadrangle.';
    }
  }

  function currentScore(){
    const found = countFound();
    return Math.round((found / correctHits.length) * 100);
  }

  function saveShapeProgress(forceCompleted){
    const score = currentScore();
    if (typeof window.finishAndSave === 'function') {
      window.finishAndSave({
        pageId: 'LevelC11',
        level: 'C',
        activityType: 'lesson',
        score,
        stars: score >= 95 ? 3 : score >= 65 ? 2 : score > 0 ? 1 : 0,
        completed: !!forceCompleted,
        skills: { reading: 1, writing: 0, speaking: 1, listening: 1 }
      });
    }
  }

  function clearCircle(shapeId){
    const existing = circleLayer.querySelector('[data-circle-for="' + shapeId + '"]');
    if (existing) existing.remove();
  }

  function drawCircleForHit(hit, isWrong){
    const areaRect = posterArea.getBoundingClientRect();
    const rect = hit.getBoundingClientRect();
    const svgW = 1120;
    const svgH = 1400;

    const x = ((rect.left - areaRect.left) / areaRect.width) * svgW;
    const y = ((rect.top - areaRect.top) / areaRect.height) * svgH;
    const w = (rect.width / areaRect.width) * svgW;
    const h = (rect.height / areaRect.height) * svgH;

    clearCircle(hit.dataset.shapeId);

    const ellipse = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
    ellipse.setAttribute('cx', (x + w / 2).toFixed(2));
    ellipse.setAttribute('cy', (y + h / 2).toFixed(2));
    ellipse.setAttribute('rx', (w * 0.44).toFixed(2));
    ellipse.setAttribute('ry', (h * 0.44).toFixed(2));
    ellipse.setAttribute('class', 'circle-stroke' + (isWrong ? ' wrong' : ''));
    ellipse.setAttribute('data-circle-for', hit.dataset.shapeId);

    circleLayer.appendChild(ellipse);

    if (isWrong) {
      setTimeout(() => clearCircle(hit.dataset.shapeId), 700);
    }
  }

  function redrawCorrectCircles(){
    hits.forEach(hit => {
      if (hit.classList.contains('correct')) {
        drawCircleForHit(hit, false);
      }
    });
  }

  function handleCorrect(hit){
    if (hit.classList.contains('correct')) return;

    hit.classList.remove('wrong','pulse');
    hit.classList.add('correct');
    drawCircleForHit(hit, false);

    updateHud();
    saveShapeProgress(false);

    if (correctHits.every(el => el.classList.contains('correct'))) {
      solved = true;
      showBubble(successText);
      statusPill.textContent = successText;
      try { chime.currentTime = 0; chime.play().catch(() => {}); } catch (_) {}
      speak(successText);
      saveShapeProgress(true);
    } else {
      speak('Good job!');
    }
  }

  function handleWrong(hit){
    if (solved) return;
    hit.classList.remove('wrong');
    void hit.offsetWidth;
    hit.classList.add('wrong');
    drawCircleForHit(hit, true);
    statusPill.textContent = wrongText;
    speak(wrongText);
    setTimeout(() => {
      hit.classList.remove('wrong');
      if (!solved) updateHud();
    }, 700);
  }

  hits.forEach(hit => {
    hit.addEventListener('click', () => {
      if (solved) return;
      if (hit.dataset.correct === 'true') {
        handleCorrect(hit);
      } else {
        handleWrong(hit);
      }
    });
  });

  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      solved = false;
      circleLayer.innerHTML = '';
      hits.forEach(hit => {
        hit.classList.remove('correct','wrong');
        hit.classList.add('pulse');
      });
      showBubble('Can you find all of the quadrangles?');
      updateHud();
      saveShapeProgress(false);
    });
  }

  if (micIconBtn) {
    micIconBtn.addEventListener('click', () => {
      speak(promptText);
      showBubble('Can you find all of the quadrangles?');
    });
  }

  if (prevBtn) {
    prevBtn.addEventListener('click', () => {
      window.location.href = 'LevelC10.html';
    });
  }

  if (nextBtn) {
    nextBtn.addEventListener('click', async () => {
      saveShapeProgress(solved);
      window.location.href = '../wednesday/LevelC12.html';
    });
  }

  window.addEventListener('resize', () => {
    redrawCorrectCircles();
  });

  showBubble('Can you find all of the quadrangles?');
  updateHud();
  setTimeout(() => speak(promptText), 250);
</script>

<script src="../../../../activity-standardizer.js"></script>

<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";

  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LevelC11",
    defaultLevel: "C",
    defaultActivityType: "lesson",
    defaultScore: 100,
    defaultStars: 1,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";

    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };

    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);

    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}

    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };

    saveLocalActivityFallback(fullPayload);

    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }

    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>

<script>
  (function(){
    const html = document.documentElement;
    const overlay = document.getElementById("gpIntroVideoOverlay");
    const video = document.getElementById("gpIntroVideo");
    const help = document.getElementById("gpIntroHelp");
    const playBtn = document.getElementById("gpIntroPlayBtn");
    const soundBtn = document.getElementById("gpIntroSoundBtn");
    const skipBtn = document.getElementById("gpIntroSkipBtn");

    if (!overlay || !video || !help || !playBtn || !soundBtn || !skipBtn) {
      html.classList.remove("gp-intro-video-pending");
      return;
    }

    let revealed = false;
    let hardTimeout = setTimeout(revealLesson, 60000);

    function revealLesson(){
      if (revealed) return;
      revealed = true;
      clearTimeout(hardTimeout);
      try { video.pause(); } catch(e){}
      overlay.classList.remove("active");
      overlay.style.display = "none";
      html.classList.remove("gp-intro-video-pending");
    }

    function showPlayFallback(msg){
      help.textContent = msg || 'Tap "Play Intro" to start the video.';
      playBtn.style.display = "inline-flex";
    }

    async function tryAutoplayMuted(){
      try{
        video.muted = true;
        video.defaultMuted = true;
        await video.play();
        help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
        playBtn.style.display = "none";
      }catch(err){
        showPlayFallback('Autoplay was blocked. Tap "Play Intro" to start.');
      }
    }

    async function playWithSound(){
      try{
        video.muted = false;
        video.defaultMuted = false;
        video.volume = 1;
        await video.play();
        help.textContent = 'Sound is on. Tap "Skip Intro" to continue.';
        playBtn.style.display = "none";
      }catch(err){
        help.textContent = 'Tap "Play Intro" first, then tap "Turn On Sound".';
        playBtn.style.display = "inline-flex";
      }
    }

    playBtn.addEventListener("click", async () => {
      try{
        video.muted = true;
        video.defaultMuted = true;
        await video.play();
        help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
        playBtn.style.display = "none";
      }catch(err){
        help.textContent = "Unable to start the intro video.";
      }
    });

    soundBtn.addEventListener("click", playWithSound);
    skipBtn.addEventListener("click", revealLesson);

    video.addEventListener("playing", () => {
      help.textContent = video.muted
        ? 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".'
        : 'Sound is on. Tap "Skip Intro" to continue.';
    });

    video.addEventListener("ended", revealLesson, { once:true });

    video.addEventListener("error", () => {
      help.textContent = "Intro video failed to load. Opening page now.";
      setTimeout(revealLesson, 800);
    }, { once:true });

    video.addEventListener("loadedmetadata", () => {
      tryAutoplayMuted();
    }, { once:true });

    setTimeout(() => {
      if (!revealed && video.readyState >= 1) tryAutoplayMuted();
    }, 1200);
  })();
</script>

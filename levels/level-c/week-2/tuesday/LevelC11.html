<!doctype html>
<html lang="en">
<head>
<style id="gpLessonPrehide">
  .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
  .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}
  .convo-line.show,.speech-line.show,.dialog-line.show,.bubble-line.show,.bubble-left.show,.bubble-right.show,#bubbleLeft.show,#bubbleRight.show{display:block !important;}
  .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,1.9vw,19px) !important;line-height:1.24 !important;max-width:min(40vw,320px) !important;white-space:normal !important;word-break:break-word !important;overflow-wrap:anywhere !important;}
  @media (max-width:780px){
    .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,3.6vw,17px) !important;max-width:min(44vw,220px) !important;line-height:1.2 !important;}
  }
</style>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Level C11 - Find Quadrangles</title>
<link rel="stylesheet" href="../../../../shared/css/base.css" />
<link rel="stylesheet" href="../../../../shared/css/layout.css" />
<link rel="stylesheet" href="../../../../shared/css/lesson.css" />
<style>
  :root{font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;--shadow:0 20px 40px rgba(0,0,0,.08);}
  body{display:flex;align-items:center;justify-content:center;background:#bfe9fb;padding:6px;}
  .card{width:min(1280px,99vw);min-height:calc(100vh - 12px);border-radius:18px;padding:12px 12px 18px;position:relative;}
  .poster-area{position:relative;width:100%;max-width:1120px;margin:0 auto;}
  .poster-img{width:100%;height:auto;display:block;}
  .bubble{position:absolute;left:10%;top:18%;max-width:340px;background:#e3f0ff;border-radius:16px;padding:10px 14px;font-weight:700;line-height:1.3;opacity:0;transition:opacity .2s ease;}
  .bubble.show{opacity:1;}
  .bubble::after{content:"";position:absolute;left:-6px;top:18px;border-width:8px 8px 8px 0;border-style:solid;border-color:transparent #e3f0ff transparent transparent;}
  .shape-hit{position:absolute;border-radius:16px;cursor:pointer;animation:bob 2.6s ease-in-out infinite;}
  .shape-hit.correct{outline:4px solid #3cb371;}
  .shape-hit.wrong{outline:4px solid #d62828;}
  @keyframes bob{0%{transform:translateY(0);}50%{transform:translateY(-6px);}100%{transform:translateY(0);}}
  .controls{margin-top:12px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;width:100%;max-width:1120px;margin-left:auto;margin-right:auto;}
  .btn{border:none;border-radius:999px;padding:10px 14px;font-size:.95rem;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.15);background:#ff8a5b;color:#fff;}
  .mic-icon-btn img{width:32px;height:32px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));}
</style>
<style id="gpUnifiedIntroPrehide">#introVideoWrap,.intro-video-wrap,#lbIntroVideoOverlay{display:none !important;visibility:hidden !important;opacity:0 !important;pointer-events:none !important;}</style>
</head>
<body>
  <div class="card">
    <div class="poster-area" id="posterArea">
      <img class="poster-img" src="../../../../assets/images/shapes/LevelC11.png" alt="Find quadrangles">
      <div class="bubble" id="introBubble">Can you find all of the quadrangles?</div>

      <div class="shape-hit" data-correct="true" style="left:18%;top:32%;width:26%;height:18%;"></div>
      <div class="shape-hit" data-correct="false" style="left:45%;top:32%;width:20%;height:18%;"></div>
      <div class="shape-hit" data-correct="false" style="left:70%;top:32%;width:20%;height:18%;"></div>

      <div class="shape-hit" data-correct="false" style="left:18%;top:50%;width:22%;height:18%;"></div>
      <div class="shape-hit" data-correct="false" style="left:42%;top:50%;width:22%;height:18%;"></div>
      <div class="shape-hit" data-correct="true" style="left:67%;top:50%;width:20%;height:18%;"></div>

      <div class="shape-hit" data-correct="false" style="left:18%;top:69%;width:24%;height:18%;"></div>
      <div class="shape-hit" data-correct="true" style="left:46%;top:69%;width:22%;height:18%;"></div>
      <div class="shape-hit" data-correct="false" style="left:70%;top:69%;width:22%;height:18%;"></div>
    </div>

    <div class="controls">
      <button class="btn prev" id="prevBtn">&#8592; Previous page</button>
      <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
        <img src="../../../../assets/images/avatars/Microphone.png" alt="Microphone">
      </button>
      <button class="btn next" id="nextBtn">Next page &#8594;</button>
    </div>
  </div>

<script>
  const introBubble = document.getElementById('introBubble');
  const hits = Array.from(document.querySelectorAll('.shape-hit'));
  const micIconBtn = document.getElementById('micIconBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const chime = new Audio('../../../../assets/audio/chimes/chime.mp3.mp3');
  chime.preload = 'auto';
  function speak(text){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.0;
    u.pitch = 1.05;
    window.speechSynthesis.speak(u);
  }

  const correctHits = hits.filter((hit) => hit.dataset.correct === 'true');
  let solved = false;

  function saveShapeProgress(){
    if (typeof finishActivity !== 'function') return;
    const found = correctHits.filter((hit) => hit.classList.contains('correct')).length;
    const score = Math.round((found / correctHits.length) * 100);
    window.finishAndSave({
      pageId: 'LevelC11',
      level: 'C',
      activityType: 'lesson',
      score,
      stars: score >= 95 ? 3 : score >= 65 ? 2 : score > 0 ? 1 : 0,
      skills: { reading: 1, writing: 0, speaking: 1, listening: 1 }
    });
  }

  hits.forEach((hit) => {
    hit.addEventListener('click', () => {
      if (solved || hit.classList.contains('correct')) return;
      if (hit.dataset.correct === 'true') {
        hit.classList.remove('wrong');
        hit.classList.add('correct');
        saveShapeProgress();
        if (correctHits.every((el) => el.classList.contains('correct'))) {
          solved = true;
          introBubble.textContent = 'Excellent! You found all of the quadrangles.';
          introBubble.classList.add('show');
          try { chime.currentTime = 0; chime.play().catch(() => {}); } catch (_) {}
          speak('Excellent! You found all of the quadrangles.');
          saveShapeProgress();
        }
      } else {
        hit.classList.add('wrong');
        window.setTimeout(() => hit.classList.remove('wrong'), 700);
      }
    });
  });

  // Keep bubbles hidden on load; unified mic protocol reveals/speaks them.

  // Mic click is handled by activity-standardizer unified protocol.

  if(prevBtn) prevBtn.addEventListener('click', () => { window.location.href = 'LevelC10.html'; });
  if(nextBtn) nextBtn.addEventListener('click', () => { window.location.href = '../wednesday/LevelC12.html'; });
</script>
<script src="../../../../activity-standardizer.js"></script>
<script src="../../../../shared/js/storage.js"></script>
<script src="../../../../shared/js/progress.js"></script>
<script src="../../../../shared/js/tracing.js"></script>
<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LevelC11",
    defaultLevel: "C",
    defaultActivityType: "lesson",
    defaultScore: 100,
    defaultStars: 1,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);
    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}
    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };
  
    saveLocalActivityFallback(fullPayload);
  
    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }
  
    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>
</body>
</html>

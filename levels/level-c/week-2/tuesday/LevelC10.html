<style>
  :root{
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    --shadow:0 20px 40px rgba(0,0,0,.08);
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    background:#bfe9fb;
    padding:6px;
  }

  html.gp-intro-video-pending body > *:not(#gpIntroVideoOverlay){visibility:hidden !important;}

  .card{
    width:min(1280px,99vw);
    min-height:calc(100vh - 12px);
    border-radius:18px;
    padding:12px 12px 18px;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
  }

  .poster-area{
    position:relative;
    width:100%;
    max-width:1120px;
    margin:0 auto;
  }

  .poster-img{
    width:100%;
    height:auto;
    display:block;
    border-radius:18px;
  }

  .circle-layer{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:2;
  }

  .bubble{
    position:absolute;
    left:23%;
    top:17%;
    max-width:44%;
    background:linear-gradient(180deg,#f5fbff,#dff2ff);
    border:4px solid #8bc5ff;
    border-radius:28px;
    padding:18px 24px;
    font-weight:900;
    line-height:1.24;
    font-size:clamp(22px,2.35vw,36px);
    color:#20314f;
    box-shadow:0 12px 30px rgba(0,0,0,.12);
    z-index:4;
    opacity:0;
    transform:translateY(8px);
    transition:opacity .22s ease, transform .22s ease;
  }

  .bubble::after{
    content:"";
    position:absolute;
    left:100%;
    top:44px;
    border-width:14px 0 14px 18px;
    border-style:solid;
    border-color:transparent transparent transparent #dff2ff;
  }

  .bubble.show{
    opacity:1;
    transform:translateY(0);
  }

  .reveal-lines{
    width:100%;
    max-width:1120px;
    min-height:3.2em;
    text-align:center;
    font-weight:900;
    font-size:clamp(1.3rem,2.2vw,2rem);
    margin:10px auto 0;
    color:#21344f;
  }

  .line{
    opacity:0;
    transform:translateY(6px);
    transition:opacity .2s ease,transform .2s ease;
  }

  .line.show{
    opacity:1;
    transform:translateY(0);
  }

  .red{color:#d62828;}

  .shape-hit{
    position:absolute;
    border:none;
    background:transparent;
    border-radius:50%;
    cursor:pointer;
    z-index:3;
    touch-action:manipulation;
  }

  .shape-hit.correct::after{
    content:"✓";
    position:absolute;
    right:-8px;
    top:-10px;
    width:34px;
    height:34px;
    border-radius:50%;
    display:grid;
    place-items:center;
    background:#23a655;
    color:#fff;
    font-weight:900;
    font-size:20px;
    box-shadow:0 8px 16px rgba(0,0,0,.16);
  }

  .circle-stroke{
    fill:none;
    stroke:#23a655;
    stroke-width:12;
    stroke-linecap:round;
    stroke-linejoin:round;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,.18));
  }

  .circle-stroke.wrong{
    stroke:#d62828;
    stroke-dasharray:12 10;
  }

  .tap-girl-control{
    border:none;
    background:linear-gradient(180deg,#fff7fb,#ffe3f2);
    border-radius:999px;
    padding:8px 14px 8px 8px;
    display:inline-flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    box-shadow:0 8px 18px rgba(0,0,0,.12);
    color:#d62828;
    font-weight:800;
  }

  .tap-girl-control img{
    width:58px;
    height:58px;
    border-radius:16px;
    border:3px solid #ffd1ea;
    background:#fff;
  }

  .controls{
    margin-top:12px;
    display:grid;
    grid-template-columns:auto auto auto 1fr auto;
    gap:10px;
    align-items:center;
    width:100%;
    max-width:1120px;
    margin-left:auto;
    margin-right:auto;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:10px 14px;
    font-size:.95rem;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
    background:#ff8a5b;
    color:#fff;
  }

  .mic-icon-btn{
    border:none;
    background:transparent;
    padding:0;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .mic-icon-btn img{
    width:32px;
    height:32px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
  }

  @media (max-width:900px){
    .bubble{
      left:22%;
      top:15.5%;
      max-width:48%;
      font-size:clamp(18px,2.8vw,28px);
      padding:14px 18px;
    }
    .controls{
      grid-template-columns:1fr 1fr 1fr;
    }
    .controls > *{

    }
  }

  @media (max-width:640px){

  #gpIntroVideoOverlay{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.92);

  #gpIntroVideo{

  .gp-intro-help{

  .gp-intro-btn{
    border:none;

<script>
  window.__GP_REQUIRE_INTRO_AUDIO__ = true;

  const introBubble = document.getElementById('introBubble');
  const girlBtn = document.getElementById('girlBtn');
  const girlSentence = document.getElementById('girlSentence');
  const micIconBtn = document.getElementById('micIconBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const circleLayer = document.getElementById('circleLayer');
  const posterArea = document.querySelector('.poster-area');
  const shapeHits = Array.from(document.querySelectorAll('.shape-hit'));
  let solved = false;
  let activeTypingTimer = null;
  const girlSegments = [
    { text: 'A quadrangle has ' },
    { text: '4 sides', red: true },
    { text: ' and ' },
    { text: '4 vertices', red: true },
    { text: '.' }
  ];

  function speak(text){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.0;
    u.pitch = 1.05;
    window.speechSynthesis.speak(u);
  }

  function stopTyping(){
    if (activeTypingTimer) {
      clearInterval(activeTypingTimer);
      activeTypingTimer = null;
    }
  }

  function renderGirlText(charCount, container){
    let remaining = charCount;
    const html = girlSegments.map((segment) => {
      if (remaining <= 0) return '';
      const typed = segment.text.slice(0, remaining);
      remaining -= typed.length;
      if (!typed) return '';
      return segment.red ? `<span class="red">${typed}</span>` : typed;
    }).join('');
    container.innerHTML = html;
  }

  function typeGirlLine(container, onDone){
    stopTyping();
    container.innerHTML = '';
    const line = document.createElement('div');
    line.className = 'line show';
    container.appendChild(line);
    let index = 0;
    const totalChars = girlSegments.reduce((sum, segment) => sum + segment.text.length, 0);
    activeTypingTimer = setInterval(() => {
      index += 1;
      renderGirlText(index, line);
      if (index >= totalChars) {
        stopTyping();
        if (onDone) onDone();
      }
    }, 22);
  }

  function showBubble(){
    introBubble.classList.add('show');
  }

  function clearCircle(shapeId){
    const existing = circleLayer.querySelector('[data-circle-for="' + shapeId + '"]');
    if (existing) existing.remove();
  }

  function drawCircleForHit(hit, isWrong){
    const areaRect = posterArea.getBoundingClientRect();
    const rect = hit.getBoundingClientRect();
    const svgW = 1024;
    const svgH = 1536;
    const x = ((rect.left - areaRect.left) / areaRect.width) * svgW;
    const y = ((rect.top - areaRect.top) / areaRect.height) * svgH;
    const w = (rect.width / areaRect.width) * svgW;
    const h = (rect.height / areaRect.height) * svgH;

    clearCircle(hit.dataset.shapeId);
    const ellipse = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
    ellipse.setAttribute('cx', (x + w / 2).toFixed(2));
    ellipse.setAttribute('cy', (y + h / 2).toFixed(2));
    ellipse.setAttribute('rx', (w * (hit.dataset.correct === 'true' ? 0.35 : 0.38)).toFixed(2));
    ellipse.setAttribute('ry', (h * (hit.dataset.correct === 'true' ? 0.31 : 0.34)).toFixed(2));
    ellipse.setAttribute('class', 'circle-stroke' + (isWrong ? ' wrong' : ''));
    ellipse.setAttribute('data-circle-for', hit.dataset.shapeId);
    circleLayer.appendChild(ellipse);
    if (isWrong) {
      setTimeout(() => clearCircle(hit.dataset.shapeId), 720);
    }
  }

  function saveLessonProgress(score, completed){
    if (typeof window.finishAndSave !== 'function') return;
    window.finishAndSave({
      pageId:'LevelC10',
      level:'C',
      activityType:'lesson',
      score,
      stars: score >= 100 ? 3 : score > 0 ? 1 : 0,
      completed: !!completed,
      skills:{ reading:1, writing:0, speaking:1, listening:1 }
    });
  }

  function handleShapeClick(hit){
    if (hit.dataset.correct === 'true') {
      if (!hit.classList.contains('correct')) {
        hit.classList.add('correct');
        solved = true;
        drawCircleForHit(hit, false);
        saveLessonProgress(100, true);
      }
      speak('Excellent. A square is a quadrangle.');
      return;
    }
    drawCircleForHit(hit, true);
    speak('That shape is not a quadrangle. Try the square.');
  }

  showBubble();

  girlBtn.addEventListener('click', () => {
    typeGirlLine(girlSentence, () => speak('A quadrangle has 4 sides and 4 vertices.'));
  });

  shapeHits.forEach((hit) => {
    hit.addEventListener('click', () => handleShapeClick(hit));
  });

  if (micIconBtn) {
    micIconBtn.addEventListener('click', () => {
      showBubble();
      speak('A square is a quadrangle. A quadrangle has four sides and four vertices.');
    });
  }

  if(prevBtn) prevBtn.addEventListener('click', () => { window.location.href = '../monday/LevelC9.html'; });
  if(nextBtn) nextBtn.addEventListener('click', () => {
    saveLessonProgress(solved ? 100 : 0, solved);
    window.location.href = 'LevelC11.html';
  });
</script>

<script src="../../../../activity-standardizer.js"></script>
<script src="../../../../shared/js/storage.js"></script>
<script src="../../../../shared/js/progress.js"></script>
<script src="../../../../shared/js/tracing.js"></script>

<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LevelC10",
    defaultLevel: "C",
    defaultActivityType: "lesson",
    defaultScore: 100,
    defaultStars: 1,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);
    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}
    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };

    saveLocalActivityFallback(fullPayload);

    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }

    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>

<script>
  (function(){
    const html = document.documentElement;
    const overlay = document.getElementById("gpIntroVideoOverlay");
    const video = document.getElementById("gpIntroVideo");
    const help = document.getElementById("gpIntroHelp");
    const playBtn = document.getElementById("gpIntroPlayBtn");
    const soundBtn = document.getElementById("gpIntroSoundBtn");
    const skipBtn = document.getElementById("gpIntroSkipBtn");

    if (!overlay || !video || !help || !playBtn || !soundBtn || !skipBtn) {
      html.classList.remove("gp-intro-video-pending");
      return;
    }

    let revealed = false;
    let hardTimeout = setTimeout(revealLesson, 60000);

    function revealLesson(){
      if (revealed) return;
      revealed = true;
      clearTimeout(hardTimeout);
      try { video.pause(); } catch(e){}
      overlay.classList.remove("active");
      overlay.style.display = "none";
      html.classList.remove("gp-intro-video-pending");
    }

    function showPlayFallback(msg){
      help.textContent = msg || 'Tap "Play Intro" to start the video.';
      playBtn.style.display = "inline-flex";
    }

    async function tryAutoplayMuted(){
      try{
        video.muted = true;
        video.defaultMuted = true;
        await video.play();
        help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
        playBtn.style.display = "none";
      }catch(err){
        showPlayFallback('Autoplay was blocked. Tap "Play Intro" to start.');
      }
    }

    async function playWithSound(){
      try{
        video.muted = false;
        video.defaultMuted = false;
        video.volume = 1;
        await video.play();
        help.textContent = 'Sound is on. Tap "Skip Intro" to continue.';
        playBtn.style.display = "none";
      }catch(err){
        help.textContent = 'Tap "Play Intro" first, then tap "Turn On Sound".';
        playBtn.style.display = "inline-flex";
      }
    }

    playBtn.addEventListener("click", async () => {
      try{
        video.muted = true;
        video.defaultMuted = true;
        await video.play();
        help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
        playBtn.style.display = "none";
      }catch(err){
        help.textContent = "Unable to start the intro video.";
      }
    });

    soundBtn.addEventListener("click", playWithSound);
    skipBtn.addEventListener("click", revealLesson);

    video.addEventListener("playing", () => {
      help.textContent = video.muted
        ? 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".'
        : 'Sound is on. Tap "Skip Intro" to continue.';
    });

    video.addEventListener("ended", revealLesson, { once:true });

    video.addEventListener("error", () => {
      help.textContent = "Intro video failed to load. Opening page now.";
      setTimeout(revealLesson, 800);
    }, { once:true });

    video.addEventListener("loadedmetadata", () => {
      tryAutoplayMuted();
    }, { once:true });

    setTimeout(() => {
      if (!revealed && video.readyState >= 1) tryAutoplayMuted();
    }, 1200);
  })();
</script>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
<style id="gpLessonPrehide">
  .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
  .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}

  .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,1.9vw,19px) !important;line-height:1.24 !important;max-width:min(40vw,320px) !important;white-space:normal !important;word-break:break-word !important;overflow-wrap:anywhere !important;}
  @media (max-width:780px){
    .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,3.6vw,17px) !important;max-width:min(44vw,220px) !important;line-height:1.2 !important;}

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Level C7 - Find the Mistake</title>
<link rel="stylesheet" href="../../../../shared/css/base.css" />
<link rel="stylesheet" href="../../../../shared/css/layout.css" />
<link rel="stylesheet" href="../../../../shared/css/lesson.css" />
<style>
  :root{
    --ink:#2d2d2d;
    --bg:#e4f6df;
    --card:#ffffff;
    --border:#ef6c79;
    --accent:#ef6c79;
    --btn-yellow:#f6da7b;
    --btn-orange:#ff8a5b;
    --btn-blue:#dfeaff;
    --shadow:0 10px 24px rgba(0,0,0,.08);
    --success:#2f9f5f;
    --danger:#d62828;
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    padding:16px;
    color:var(--ink);
  }
  .app{
    position:relative;
    width:min(1020px,96vw);
    background:#fffefc;
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:16px 16px 12px;
  }
  .title{
    font-size:clamp(2rem,5vw,3.6rem);
    font-weight:900;
    margin:0 0 10px;
    color:#ef5b6b;
    text-align:center;
  }
  .board{
    position:relative;
    border:2px dashed #efb8c0;
    border-radius:18px;
    padding:14px;
    background:linear-gradient(180deg,#fffefc 0%,#fff8ef 100%);
    overflow:hidden;
  }
  .prompt-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:12px;
  }
  .prompt-pill{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:10px 16px;
    background:#fff6d9;
    border:2px solid #f2d57d;
    border-radius:999px;
    font-weight:800;
    color:#6b4f00;
    box-shadow:0 4px 0 rgba(0,0,0,.07);
  }
  .status{
    min-height:1.4em;
    font-weight:800;
    color:#6c4bbf;
  }
  .poster-wrap{
    position:relative;
    width:min(804px,100%);
    margin:0 auto;
    border-radius:16px;
    overflow:hidden;
    background:#fff;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    touch-action:none;
    user-select:none;
  }
  .poster{
    display:block;
    width:100%;
    height:auto;
  }
  #drawLayer{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }
  .hint-card{
    margin-top:12px;
    background:#f7fbff;
    border:2px solid #d7e8ff;
    border-radius:16px;
    padding:12px 14px;
    font-weight:700;
    color:#345;
    line-height:1.35;
  }
  .controls{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-top:14px;
    flex-wrap:wrap;
  }
  .btn{
    border:none;
    border-radius:999px;
    padding:10px 16px;
    font-size:.95rem;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
  }
  .btn.prev{background:#f8f0c7;color:#9c7b2f;}
  .btn.next{background:var(--btn-yellow);color:#8b5a00;}
  .btn.stop{background:var(--btn-blue);color:#1f3b6b;}
  .btn.read{background:var(--btn-orange);color:#fff;}
  .btn.check{background:#ef6c79;color:#fff;}
  .btn:disabled{opacity:.65;cursor:not-allowed;}
  .record-icon{width:16px;height:16px;display:inline-block;vertical-align:middle;}
  .record-icon path{stroke:#fff;}
  .recording{display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .recording audio{height:32px;}
  .recording-status{font-size:.85rem;color:#555;min-height:1.2em;margin-top:6px;}
  .home-btn{
    position:absolute;
    right:10px;
    top:6px;
    width:72px;
    height:72px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:transparent;
    border:none;
    padding:0;
    text-decoration:none;
    z-index:25;
    transform-origin:top center;
    animation:homeSwing 2.4s ease-in-out infinite;
  }
  .home-btn img{
    width:72px;
    height:72px;
    display:block;
    filter:drop-shadow(0 8px 10px rgba(0,0,0,.22));
  }
  @keyframes homeSwing{
    0%{transform:translateY(30%) rotate(-6deg);}
    50%{transform:translateY(30%) rotate(8deg);}
    100%{transform:translateY(30%) rotate(-6deg);}
  }
</style>
</head>

  <script>
    const posterWrap = document.getElementById('posterWrap');
    const drawLayer = document.getElementById('drawLayer');
    const statusText = document.getElementById('statusText');
    const checkBtn = document.getElementById('checkBtn');
    const clearBtn = document.getElementById('clearBtn');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const recordBtn = document.getElementById('recordBtn');
    const recordingPlayback = document.getElementById('recordingPlayback');
    const recordingStatus = document.getElementById('recordingStatus');
    const instructionAudio = new Audio('../../../../assets/audio/chimes/InstructionAudio.mp3');
    instructionAudio.preload = 'auto';

    const viewBoxWidth = 804;
    const viewBoxHeight = 1109;
    const correctTarget = { x: 262, y: 185, width: 324, height: 628 }; // circled center tangram animal
    let recorder = null;
    let recordedChunks = [];
    let drawing = false;
    let startPoint = null;
    let draftCircle = null;
    let finalCircle = null;
    let solved = false;
    let loadIntroStarted = false;

    function getSpeechVoice(role) {
      if (!('speechSynthesis' in window) || typeof window.speechSynthesis.getVoices !== 'function') return null;
      const voices = window.speechSynthesis.getVoices() || [];
      if (!voices.length) return null;
      const english = voices.filter(v => /^en(-|_)?/i.test(String(v.lang || '')));
      const pool = english.length ? english : voices;
      const maleName = /(david|mark|george|daniel|fred|alex|guy|matthew|thomas|brian|christopher|male|man|boy)/i;
      const femaleName = /(samantha|victoria|zira|jenny|aria|ava|allison|ellie|libby|olivia|serena|emma|ivy|nova|stella|grace|female|woman|girl)/i;
      if (role === 'female') {
        return pool.find(v => femaleName.test(String(v.name || '')) && !maleName.test(String(v.name || '')))
          || pool.find(v => !maleName.test(String(v.name || '')))
          || pool[0]
          || null;
      }
      return pool[0] || null;
    }

    function speakLine(text, options, onend) {
      if (!('speechSynthesis' in window) || !text) {
        if (onend) onend();
        return;
      }
      try { window.speechSynthesis.cancel(); } catch (_err) {}
      const opts = options || {};
      const utter = new SpeechSynthesisUtterance(text);
      const voice = getSpeechVoice(opts.role);
      if (voice) utter.voice = voice;
      utter.lang = opts.lang || 'en-US';
      utter.rate = typeof opts.rate === 'number' ? opts.rate : 0.92;
      utter.pitch = typeof opts.pitch === 'number' ? opts.pitch : 1.08;
      utter.onend = () => { if (onend) onend(); };
      utter.onerror = () => { if (onend) onend(); };
      window.speechSynthesis.speak(utter);
    }

    function setStatus(text, speak = false) {
      if (statusText) statusText.textContent = text || '';
      if (speak) speakLine(text);
    }

    function svgPointFromClient(clientX, clientY) {
      const rect = posterWrap.getBoundingClientRect();
      const x = ((clientX - rect.left) / rect.width) * viewBoxWidth;
      const y = ((clientY - rect.top) / rect.height) * viewBoxHeight;
      return { x: Math.max(0, Math.min(viewBoxWidth, x)), y: Math.max(0, Math.min(viewBoxHeight, y)) };
    }

    function clearCircle(keepStatus = false) {
      if (draftCircle) { draftCircle.remove(); draftCircle = null; }
      if (finalCircle) { finalCircle.remove(); finalCircle = null; }
      drawing = false;
      startPoint = null;
      solved = false;
      if (!keepStatus) setStatus('Find the one that does not follow the tangram rule.');
    }

    function createCircleEl() {
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
      circle.setAttribute('fill', 'rgba(255,255,255,0.02)');
      circle.setAttribute('stroke', '#d62828');
      circle.setAttribute('stroke-width', '7');
      circle.setAttribute('stroke-dasharray', '12 10');
      circle.setAttribute('stroke-linecap', 'round');
      return circle;
    }

    function updateCircle(circle, a, b) {
      const cx = (a.x + b.x) / 2;
      const cy = (a.y + b.y) / 2;
      const rx = Math.max(28, Math.abs(b.x - a.x) / 2);
      const ry = Math.max(28, Math.abs(b.y - a.y) / 2);
      circle.setAttribute('cx', cx);
      circle.setAttribute('cy', cy);
      circle.setAttribute('rx', rx);
      circle.setAttribute('ry', ry);
    }

    function circleBounds(circle) {
      const cx = Number(circle.getAttribute('cx'));
      const cy = Number(circle.getAttribute('cy'));
      const rx = Number(circle.getAttribute('rx'));
      const ry = Number(circle.getAttribute('ry'));
      return { x: cx - rx, y: cy - ry, width: rx * 2, height: ry * 2, cx, cy, rx, ry };
    }

    function intersectionArea(a, b) {
      const x1 = Math.max(a.x, b.x);
      const y1 = Math.max(a.y, b.y);
      const x2 = Math.min(a.x + a.width, b.x + b.width);
      const y2 = Math.min(a.y + a.height, b.y + b.height);
      const w = Math.max(0, x2 - x1);
      const h = Math.max(0, y2 - y1);
      return w * h;
    }

    function isCorrectSelection(circle) {
      const chosen = circleBounds(circle);
      const overlap = intersectionArea(chosen, correctTarget);
      const chosenArea = chosen.width * chosen.height;
      const targetArea = correctTarget.width * correctTarget.height;
      const centerInside = chosen.cx >= correctTarget.x && chosen.cx <= correctTarget.x + correctTarget.width && chosen.cy >= correctTarget.y && chosen.cy <= correctTarget.y + correctTarget.height;
      return centerInside && overlap >= targetArea * 0.18 && chosenArea >= targetArea * 0.22 && chosenArea <= targetArea * 4.8;
    }

    async function completePuzzle() {
      solved = true;
      if (finalCircle) {
        finalCircle.setAttribute('stroke', '#2f9f5f');
        finalCircle.setAttribute('stroke-dasharray', '0');
        finalCircle.setAttribute('fill', 'rgba(47,159,95,0.08)');
      }
      setStatus('Amazing job! You circled the wrong tangram animal.', true);
      try {
        const chime = new Audio('../../../../assets/audio/chimes/chime.mp3');
        chime.preload = 'auto';
        chime.play().catch(() => {});
      } catch (_) {}

      try {
        if (window.GPTrack?.realtime) {
          await window.GPTrack.realtime({
            pageId: 'LevelC7',
            level: 'C',
            activityType: 'selection',
            score: 100,
            stars: 3,
            skills: { reading: 1, writing: 0, speaking: 0, listening: 1 }
          });
        }
      } catch (_) {}

      try {
        if (typeof window.finishAndSave === 'function') {
          await window.finishAndSave({
            pageId: 'LevelC7',
            level: 'C',
            activityType: 'selection',
            score: 100,
            stars: 3,
            skills: { reading: 1, writing: 0, speaking: 0, listening: 1 }
          });
        }
      } catch (_) {}
    }

    function playLoadInstructionSequence() {
      if (loadIntroStarted) return;
      loadIntroStarted = true;

      const beginSpeech = () => {
        setStatus('Find the mistake and circle it.');
        speakLine('Find the mistake and circle it.', { role: 'female', rate: 0.92, pitch: 1.08 });
      };

      const fallbackTimer = window.setTimeout(beginSpeech, 5200);
      instructionAudio.onended = () => {
        window.clearTimeout(fallbackTimer);
        beginSpeech();
      };
      instructionAudio.onerror = () => {
        window.clearTimeout(fallbackTimer);
        beginSpeech();
      };

      try {
        instructionAudio.currentTime = 0;
        const playAttempt = instructionAudio.play();
        if (playAttempt && typeof playAttempt.catch === 'function') {
          playAttempt.catch(() => {
            window.clearTimeout(fallbackTimer);
            beginSpeech();
          });
        }
      } catch (_err) {
        window.clearTimeout(fallbackTimer);
        beginSpeech();
      }
    }

    function startDrawing(event) {
      if (solved) return;
      event.preventDefault();
      if (finalCircle) { finalCircle.remove(); finalCircle = null; }
      if (draftCircle) { draftCircle.remove(); draftCircle = null; }
      const point = event.touches ? svgPointFromClient(event.touches[0].clientX, event.touches[0].clientY) : svgPointFromClient(event.clientX, event.clientY);
      startPoint = point;
      drawing = true;
      draftCircle = createCircleEl();
      drawLayer.appendChild(draftCircle);
      updateCircle(draftCircle, startPoint, point);
      setStatus('Draw a circle around the animal you think is wrong.');
    }

    function moveDrawing(event) {
      if (!drawing || !draftCircle || !startPoint) return;
      event.preventDefault();
      const point = event.touches ? svgPointFromClient(event.touches[0].clientX, event.touches[0].clientY) : svgPointFromClient(event.clientX, event.clientY);
      updateCircle(draftCircle, startPoint, point);
    }

    function endDrawing(event) {
      if (!drawing || !draftCircle) return;
      event.preventDefault();
      drawing = false;
      finalCircle = draftCircle;
      draftCircle = null;
      setStatus('Good try. Now tap Check Answer.');
    }

    async function checkAnswer() {
      if (!finalCircle) {
        setStatus('First draw a circle around one animal.', true);
        return;
      }
      if (isCorrectSelection(finalCircle)) {
        await completePuzzle();
      } else {
        finalCircle.setAttribute('stroke', '#d62828');
        finalCircle.setAttribute('stroke-dasharray', '10 8');
        finalCircle.setAttribute('fill', 'rgba(214,40,40,0.05)');
        setStatus('Try again. Circle the animal that does not use all seven tangram pieces.', true);
      }
    }

    posterWrap.addEventListener('mousedown', startDrawing);
    posterWrap.addEventListener('mousemove', moveDrawing);
    window.addEventListener('mouseup', endDrawing);
    posterWrap.addEventListener('touchstart', startDrawing, { passive:false });
    posterWrap.addEventListener('touchmove', moveDrawing, { passive:false });
    window.addEventListener('touchend', endDrawing, { passive:false });

    clearBtn.addEventListener('click', () => clearCircle());
    checkBtn.addEventListener('click', checkAnswer);
    nextBtn.addEventListener('click', () => { window.location.href = '../thursday/TangramHorseFairlyTale.html'; });
    prevBtn.addEventListener('click', () => { window.location.href = 'LevelC3.html'; });

    function setRecordLabel(text) {
      recordBtn.innerHTML =
        '<svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">' +
        '<path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>' +
        '<path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '</svg> ' + text;
    }

    async function toggleRecord() {
      if (recorder && recorder.state === 'recording') {
        recorder.stop();
        setRecordLabel('Record');
        if (recordingStatus) recordingStatus.textContent = 'Saved recording.';
        return;
      }
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          if (recordingStatus) recordingStatus.textContent = 'Microphone not available in this browser.';
          return;
        }
        if (!window.MediaRecorder) {
          if (recordingStatus) recordingStatus.textContent = 'Recording not supported on this device.';
          return;
        }
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation:true, noiseSuppression:true, autoGainControl:true }
        });
        recordedChunks = [];
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
          ? 'audio/webm;codecs=opus'
          : (MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '');
        recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
        recorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        recorder.onstop = () => {
          const type = recorder.mimeType || 'audio/webm';
          const blob = new Blob(recordedChunks, { type });
          recordingPlayback.src = URL.createObjectURL(blob);
          recordingPlayback.muted = false;
          recordingPlayback.volume = 1;
          recordingPlayback.load();
          stream.getTracks().forEach(t => t.stop());
        };
        recorder.start();
        setRecordLabel('Stop recording');
        if (recordingStatus) recordingStatus.textContent = 'Recording... speak clearly.';
      } catch(e) {
        setRecordLabel('Record');
        if (recordingStatus) recordingStatus.textContent = 'Microphone permission denied.';
      }
    }

    recordBtn.addEventListener('click', toggleRecord);
    window.addEventListener('load', playLoadInstructionSequence, { once:true });
  </script>

  <script src="../../../../activity-standardizer.js"></script>
  <script src="../../../../shared/js/storage.js"></script>
  <script src="../../../../shared/js/progress.js"></script>
  <script src="../../../../shared/js/tracing.js"></script>
  <script type="module">
    import { saveActivityResult, markLoginPing } from '../../../../progress-tracker.js';
    window.GPProgress.installTracker({
      saveActivityResult,
      markLoginPing,
      defaultPageId: 'LevelC7',
      defaultLevel: 'C',
      defaultActivityType: 'selection',
      defaultScore: 100,
      defaultStars: 1,
      defaultSkills: { reading: 1, writing: 0, speaking: 0, listening: 1 }
    });

    function getStudentSession() {
      try {
        return JSON.parse(localStorage.getItem('GP_EIS_STUDENT_SESSION') || 'null');
      } catch (e) {
        return null;
      }
    }

    function inferProgressMeta(payload) {
      const pageId = String((payload && payload.pageId) || ((location.pathname || '').split('/').pop() || 'Activity').replace(/\.html$/i, ''));
      const file = (payload && (payload.file || payload.fileName)) || (pageId + '.html');
      const level = (payload && payload.level)
        || (/^(LA|LevelA|Level_A)/i.test(pageId) ? 'A' : (/^(LB|LevelB|Level_B)/i.test(pageId) ? 'B' : (/^(LC|LevelC|Level_C)/i.test(pageId) ? 'C' : 'A')));
      const weekMatch = String(location.pathname || '').match(/week-(\d+)/i);
      const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
      const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
      const month = payload && payload.month != null ? Number(payload.month) : 1;
      return {
        pageId,
        file,
        level,
        week: Number.isFinite(week) && week > 0 ? week : 1,
        month: Number.isFinite(month) && month > 0 ? month : 1
      };
    }

    function getActivityStore() {
      try {
        return JSON.parse(localStorage.getItem('GP_EIS_ACTIVITY_RESULTS') || '{}');
      } catch (e) {
        return {};
      }
    }

    function setActivityStore(store) {
      try {
        localStorage.setItem('GP_EIS_ACTIVITY_RESULTS', JSON.stringify(store || {}));
      } catch (e) {}
    }

    function saveLocalActivityFallback(payload) {
      const session = getStudentSession() || {};
      const meta = inferProgressMeta(payload || {});
      const score = payload && typeof payload.score === 'number' ? payload.score : 0;
      const stars = payload && typeof payload.stars === 'number' ? payload.stars : 0;
      const tracing = payload && typeof payload.tracing === 'number'
        ? payload.tracing
        : (payload && typeof payload.progress === 'number' ? payload.progress : 0);
      const type = (payload && payload.type) || (payload && payload.activityType) || 'selection';
      const entry = {
        pageId: meta.pageId,
        file: meta.file,
        level: meta.level,
        type,
        activityType: (payload && payload.activityType) || type,
        score,
        stars,
        skills: payload && payload.skills ? payload.skills : {},
        completed: payload && typeof payload.completed === 'boolean' ? payload.completed : true,
        tracing,
        week: meta.week,
        month: meta.month,
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
        savedAt: new Date().toISOString(),
        ts: Date.now()
      };
      const store = getActivityStore();
      store[meta.pageId] = { ...(store[meta.pageId] || {}), ...entry };
      setActivityStore(store);
      try {
        localStorage.setItem('GP_EIS_LAST_FILE', meta.file);
      } catch (e) {}
      return store[meta.pageId];
    }

    async function finishAndSave(payload) {
      const session = getStudentSession() || {};
      const fullPayload = {
        ...(payload || {}),
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
      };

      saveLocalActivityFallback(fullPayload);

      if (typeof window.finishActivity === 'function') {
        try {
          await window.finishActivity(fullPayload);
        } catch (err) {
          console.warn('finishActivity failed, local fallback already saved:', err);
        }
      }
      return fullPayload;
    }

    window.finishAndSave = finishAndSave;
  </script>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Level C7 - Find the Mistake</title>

<style>
  :root{
    --ink:#2d2d2d;
    --bg:#e4f6df;
    --card:#f9f4ff;
    --border:#d9b9f0;
    --accent:#6c4bbf;
    --bubble-kid:#d8ebff;
    --bubble-baker:#fde3c4;
    --btn-yellow:#f6da7b;
    --btn-orange:#ff8a5b;
    --btn-blue:#dfeaff;
    --shadow:0 10px 24px rgba(0,0,0,.08);
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    padding:16px;
    color:var(--ink);
  }

  html.gp-intro-video-pending body > *:not(#gpIntroVideoOverlay){visibility:hidden !important;}

  .app{
    position:relative;
    width:min(980px,96vw);
    background:#fff;
    border-radius:16px;
    box-shadow:var(--shadow);
    padding:16px 16px 10px;
  }

  .title{
    font-size:clamp(2.4rem,6vw,4.2rem);
    font-weight:800;
    margin-bottom:10px;
  }

  .board{
    border:2px dashed var(--border);
    border-radius:16px;
    padding:16px;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,209,229,.45) 0 60px, transparent 65px),
      radial-gradient(circle at 85% 25%, rgba(255,236,180,.5) 0 70px, transparent 75px),
      radial-gradient(circle at 35% 80%, rgba(210,244,255,.55) 0 80px, transparent 85px),
      radial-gradient(circle at 80% 75%, rgba(214,255,220,.55) 0 70px, transparent 75px),
      linear-gradient(180deg, #fef7ff 0%, #f7fbff 50%, #fff4df 100%);
    min-height:420px;
    position:relative;
    overflow:hidden;
  }

  .board-sky{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:0;
  }

  .sparkle-dot{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:rgba(255,255,255,.85);
    box-shadow:0 6px 10px rgba(0,0,0,.12);
  }
  .sparkle-dot.s1{left:20%;top:22%;}
  .sparkle-dot.s2{left:70%;top:32%;}
  .sparkle-dot.s3{left:35%;top:62%;}
  .sparkle-dot.s4{left:82%;top:60%;}

  .tray-hero{
    display:flex;
    justify-content:center;
    margin:6px 0 14px;
    position:relative;
    z-index:1;
  }

  .tray-hero img{
    width:min(780px,95%);
    height:auto;
    display:block;
    filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
    transform:translateY(0%);
  }

  .mistake-hit{
    position:absolute;
    border:3px dashed transparent;
    border-radius:18px;
    background:transparent;
    cursor:pointer;
    z-index:2;
  }
  .mistake-hit.found{
    border-color:#3cb371;
    box-shadow:0 0 0 2px rgba(60,179,113,.25);
  }
  .mistake-hit.wrong{
    border-color:#d62828;
    box-shadow:0 0 0 2px rgba(214,40,40,.25);
  }

  .board-caption-left{
    position:absolute;
    left:16px;
    top:10px;
    font-weight:800;
    color:var(--accent);
    font-size:1.05rem;
    z-index:1;
  }

  .meal-question{
    position:absolute;
    left:50%;
    top:18%;
    transform:translateX(-50%);
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    font-size:3rem;
    font-weight:900;
    color:#2d2d2d;
    z-index:2;
    text-align:center;
    white-space:nowrap;
  }

  .row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:18px 0;
    position:relative;
    z-index:1;
  }
  .convo-line{display:none;}
  .convo-line.show{display:flex;}
  .line1{
    position:absolute;
    left:44%;
    top:23%;
    transform:translateX(-50%);
    z-index:2;
  }

  .bubble{
    padding:10px 14px;
    border-radius:16px;
    position:relative;
    font-size:1.6rem;
    transform:translateY(20%);
  }
  .bubble.big{
    font-size:1.35rem;
    padding:16px 18px;
    max-width:520px;
    min-width:280px;
    line-height:1.35;
  }
  .bubble-stack{
    display:flex;
    flex-direction:column;
    gap:6px;
    align-items:flex-start;
  }
  .bubble.baker{background:var(--bubble-baker);}
  .bubble.sparkle{
    background:linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);
    box-shadow:0 0 12px rgba(255,214,0,.6), 0 0 18px rgba(255,105,180,.4);
    animation:sparklePulse 1.2s ease-in-out infinite;
  }
  @keyframes sparklePulse{
    0%,100%{filter:brightness(1);}
    50%{filter:brightness(1.12);}
  }
  .bubble.baker::after{
    content:"";
    position:absolute;
    left:-6px;
    top:14px;
    border-width:8px 8px 8px 0;
    border-style:solid;
    border-color:transparent var(--bubble-baker) transparent transparent;
  }

  .repeat-result{
    margin-top:4px;
    font-size:.95rem;
    font-weight:700;
    color:#2f9f5f;
  }
  .star-row{
    display:flex;
    gap:6px;
    margin-top:4px;
    font-weight:900;
    font-size:1.2rem;
    color:#ffd24a;
    text-shadow:
      0 2px 0 #b87900,
      0 4px 0 #8a5a00,
      0 8px 14px rgba(0,0,0,.28);
  }

  .highlight-red-global{
    color:#d62828;
    font-weight:800;
  }

  .plate-answer{
    position:absolute;
    left:50%;
    top:84%;
    transform:translateX(-50%);
    font-size:1.6rem;
    font-weight:800;
    color:#2d2d2d;
    text-align:center;
    opacity:0;
    transition:opacity .25s ease;
    z-index:2;
    max-width:80%;
  }
  .plate-answer.show{
    opacity:1;
  }

  .girl-spot{
    position:absolute;
    left:16px;
    top:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    z-index:3;
  }
  .girl-spot img{
    width:64px;
    height:64px;
    border-radius:16px;
    object-fit:cover;
    box-shadow:0 6px 14px rgba(0,0,0,.25);
    border:4px solid #ffe3f7;
    background:#ffd6f2;
    cursor:pointer;
  }
  .girl-hint{
    font-size:.85rem;
    font-weight:800;
    color:#d62828;
    text-align:center;
  }

  .controls{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-top:14px;
    flex-wrap:wrap;
  }
  .btn{
    border:none;
    border-radius:999px;
    padding:10px 16px;
    font-size:.95rem;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
  }
  .btn.prev{background:#f8f0c7;color:#9c7b2f;}
  .btn.next{background:var(--btn-yellow);color:#8b5a00;}
  .btn.stop{background:var(--btn-blue);color:#1f3b6b;}
  .btn.read{background:var(--btn-orange);color:#fff;}

  .mic-icon-btn{
    border:none;
    background:transparent;
    padding:0;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }
  .mic-icon-btn img{
    width:38px;
    height:38px;
    display:block;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
  }

  .record-icon{
    width:16px;
    height:16px;
    display:inline-block;
    vertical-align:middle;
  }
  .record-icon path{stroke:#fff;}
  .recording{
    display:inline-flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .recording audio{height:32px;}
  .recording-status{font-size:.85rem;color:#555;}
  .conversation-status{
    margin-top:8px;
    font-size:.95rem;
    font-weight:800;
    color:#6c4bbf;
    min-height:1.2em;
  }
  .footer-note{
    margin-top:6px;
    font-size:.9rem;
    color:#666;
  }

  .home-btn{
    position:absolute;
    right:10px;
    top:6px;
    width:72px;
    height:72px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:transparent;
    border:none;
    padding:0;
    text-decoration:none;
    z-index:25;
    transform-origin:top center;
    animation:homeSwing 2.4s ease-in-out infinite;
  }
  .home-btn img{
    width:72px;
    height:72px;
    display:block;
    filter:drop-shadow(0 8px 10px rgba(0,0,0,.22));
  }
  @keyframes homeSwing{
    0%{transform:translateY(30%) rotate(-6deg);}
    50%{transform:translateY(30%) rotate(8deg);}
    100%{transform:translateY(30%) rotate(-6deg);}
  }

  @media (max-width:780px){
    .bubble{font-size:1.3rem;}
  }
  @media (max-width:520px){
    body{align-items:flex-start;padding:10px;}
    .app{width:100%;padding:12px 12px 10px;border-radius:12px;}
    .title{font-size:1.05rem;}
    .board{padding:12px;min-height:unset;}
    .tray-hero img{width:min(520px,100%);}
    .bubble{font-size:1.1rem;padding:8px 10px;}
    .controls{justify-content:center;}
    .meal-question{font-size:1.6rem;white-space:normal;width:80%;}
  }

  #gpIntroVideoOverlay{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.92);
    z-index:99999;
    padding:16px;
    flex-direction:column;
    gap:14px;
  }
  #gpIntroVideoOverlay.active{display:flex;}

  #gpIntroVideo{
    width:min(92vw,980px);
    max-height:82vh;
    height:auto;
    display:block;
    border-radius:14px;
    background:#000;
    box-shadow:0 18px 48px rgba(0,0,0,.45);
  }

  .gp-intro-help{
    color:#fff;
    font-weight:800;
    font-size:1rem;
    text-align:center;
    text-shadow:0 2px 8px rgba(0,0,0,.45);
    max-width:min(92vw,760px);
  }

  .gp-intro-controls{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
  }

  .gp-intro-btn{
    border:none;
    border-radius:999px;
    padding:12px 22px;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,.22);
  }

  .gp-intro-btn.play{
    background:linear-gradient(180deg,#dff7ff,#8fdcff);
    color:#114a67;
    display:none;
  }

  .gp-intro-btn.sound{
    background:linear-gradient(180deg,#fffad7,#ffd86a);
    color:#8b5a00;
  }

  .gp-intro-btn.skip{
    background:linear-gradient(180deg,#ffffff,#e9eef7);
    color:#304060;
  }
</style>

<body>

  <div id="gpIntroVideoOverlay" class="active" aria-label="Lesson intro video">
    <video id="gpIntroVideo" preload="metadata" autoplay muted playsinline webkit-playsinline poster="../../../../assets/images/shapes/LevelC7.png">

    <div class="gp-intro-controls">
      <button class="gp-intro-btn play" id="gpIntroPlayBtn" type="button">Play Intro</button>

  <div class="app">
    <a class="home-btn" href="../../../../index.html" aria-label="Home">
      <img src="Home1.png" alt="Home">
    </a>

    <div class="title">Vertices</div>

    <div class="board" id="board">
      <div class="board-sky" aria-hidden="true">
        <div class="sparkle-dot s1"></div>
        <div class="sparkle-dot s2"></div>
        <div class="sparkle-dot s3"></div>

      </div>

      <div class="tray-hero">
        <img src="../../../../assets/images/shapes/LevelC7.png" alt="Tangram puzzle poster">
        <button class="mistake-hit" data-correct="true" aria-label="Incorrect muffin shape" style="left:67%;top:55%;width:15%;height:16%;"></button>

        <img src="EyeglassGirl.png" alt="Tap the girl" id="tapGirl">

      </div>

      <div class="row convo-line line1">
        <div class="bubble-stack">
          <div class="bubble baker big">Find the mistake and circle it.</div>
          <div class="repeat-result" data-line="0"></div>
          <div class="star-row" data-line="0"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn prev" id="prevBtn">&#8592; Previous page</button>
      <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
        <img src="Microphone.png" alt="Microphone">
      </button>
      <button class="btn next" id="nextBtn">Next page &#8594;</button>
      <button class="btn stop" id="clearBtn" type="button">Clear</button>
      <button class="btn read" id="recordBtn">
        <svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
          <path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        </svg>
        Record
      </button>
      <div class="recording">
        <audio id="recordingPlayback" controls></audio>
      </div>
    </div>

    <div class="recording-status" id="recordingStatus"></div>
    <div class="conversation-status" id="conversationStatus"></div>
    <div class="footer-note">Tap the microphone to reveal the conversation line by line.</div>
  </div>

  <script>
    window.__GP_REQUIRE_INTRO_AUDIO__ = true;

    const clearBtn = document.getElementById("clearBtn");
    const micIconBtn = document.getElementById("micIconBtn");
    const recordBtn = document.getElementById("recordBtn");
    const recordingPlayback = document.getElementById("recordingPlayback");
    const recordingStatus = document.getElementById("recordingStatus");
    const conversationStatus = document.getElementById("conversationStatus");
    const tapGirl = document.getElementById("tapGirl");
    const plateAnswer = document.getElementById("plateAnswer");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    const lines = Array.from(document.querySelectorAll(".convo-line"));
    const repeatResults = Array.from(document.querySelectorAll(".repeat-result"));
    const starRows = Array.from(document.querySelectorAll(".star-row"));

    let currentLineIndex = -1;
    let recorder = null;
    let recordedChunks = [];
    const expectedLines = ["Find the mistake and circle it"];
    const attempts = [0];
    const maxAttempts = 3;

    function hideAllLines(){
      lines.forEach(line => {
        line.classList.remove("show");
        line.hidden = true;
      });
    }

    function speakLine(text, onend){
      if (!("speechSynthesis" in window)) {
        if (onend) onend();
        return;
      }
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 0.95;
      utter.pitch = 1.1;
      utter.onend = () => { if (onend) onend(); };
      utter.onerror = () => { if (onend) onend(); };
      window.speechSynthesis.speak(utter);
    }

    function highlightLine(index, on){
      const line = lines[index];
      if (!line) return;
      const bubble = line.querySelector(".bubble");
      if (!bubble) return;
      bubble.classList.toggle("sparkle", on);
    }

    function normalizeSpeech(text){
      return (text || "")
        .toLowerCase()
        .replace(/[^\w\s]|_/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function setStars(index, count){
      const row = starRows[index];
      if (!row) return;
      row.innerHTML = new Array(count).fill("&#9733;").join("");
    }

    function setConversationStatus(text){
      if (!conversationStatus) return;
      conversationStatus.textContent = text || "";
    }

    function clearConversation(){
      hideAllLines();
      currentLineIndex = -1;
      attempts[0] = 0;
      repeatResults.forEach(el => { if (el) el.textContent = ""; });
      starRows.forEach(el => { if (el) el.textContent = ""; });
      lines.forEach(line => {
        const bubble = line.querySelector(".bubble");
        if (bubble) bubble.classList.remove("sparkle");
      });
      setConversationStatus("");
      document.querySelectorAll(".mistake-hit").forEach(btn => btn.classList.remove("found","wrong"));
      if (plateAnswer) plateAnswer.classList.remove("show");
    }

    function listenForRepeat(expectedText){
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        speakLine("Sorry, try again!");
        setConversationStatus("Sorry, try again!");
        return;
      }
      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.onresult = (event) => {
        const said = event.results[0][0].transcript;
        const expected = normalizeSpeech(expectedText);
        const actual = normalizeSpeech(said);
        attempts[0] += 1;

        if (actual === expected) {
          highlightLine(0, false);
          const attemptCount = attempts[0];
          const stars = attemptCount === 1 ? 3 : (attemptCount <= 3 ? 2 : 1);
          setStars(0, stars);
          if (repeatResults[0]) repeatResults[0].textContent = expectedText;
          const chime = new Audio("chime.mp3.mp3");
          chime.preload = "auto";
          chime.play().catch(() => {});
          speakLine("Amazing Job!");
          setConversationStatus("Amazing Job!");
        } else {
          if (attempts[0] >= maxAttempts) {
            speakLine("Sorry, Study hard!");
            setConversationStatus("Sorry, Study hard!");
            highlightLine(0, false);
            return;
          }
          speakLine("Sorry, try again!");
          setConversationStatus("Sorry, try again!");
        }
      };
      recognition.onerror = () => {
        speakLine("Sorry, try again!");
        setConversationStatus("Sorry, try again!");
      };
      recognition.start();
    }

    function showAndSpeakLine(index){
      if (index < 0 || index >= lines.length) return;
      const line = lines[index];
      line.hidden = false;
      line.classList.add("show");
      currentLineIndex = index;
      const bubble = line.querySelector(".bubble");
      if (bubble) speakLine(bubble.textContent || "");
    }

    function showTapGirlMessage(){
      const plainText = "The brownies have 4 sides and the muffins have 5 sides.";
      if (plateAnswer) {
        plateAnswer.classList.add("show");
        plateAnswer.innerHTML = 'The brownies have <span class="highlight-red-global">4 sides</span> and the muffins have <span class="highlight-red-global">5 sides</span>.';
      }
      const chime = new Audio("chime.mp3.mp3");
      chime.preload = "auto";
      chime.play().catch(() => {});
      speakLine(plainText);
    }

    function setRecordLabel(text){
      recordBtn.innerHTML =
        '<svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">' +
        '<path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>' +
        '<path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '</svg> ' + text;
    }

    async function toggleRecord(){
      if (recorder && recorder.state === "recording") {
        recorder.stop();
        setRecordLabel("Record");
        if (recordingStatus) recordingStatus.textContent = "Saved recording.";
        return;
      }
      try{
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          if (recordingStatus) recordingStatus.textContent = "Microphone not available in this browser.";
          return;
        }
        if (!window.MediaRecorder) {
          if (recordingStatus) recordingStatus.textContent = "Recording not supported on this device.";
          return;
        }
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
        recordedChunks = [];
        const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
          ? "audio/webm;codecs=opus"
          : (MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "");
        recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
        recorder.ondataavailable = (e) => {
          if (e.data.size > 0) recordedChunks.push(e.data);
        };
        recorder.onstop = () => {
          const type = recorder.mimeType || "audio/webm";
          const blob = new Blob(recordedChunks, { type });
          recordingPlayback.src = URL.createObjectURL(blob);
          recordingPlayback.muted = false;
          recordingPlayback.volume = 1;
          recordingPlayback.load();
          stream.getTracks().forEach(t => t.stop());
        };
        recorder.start();
        setRecordLabel("Stop recording");
        if (recordingStatus) recordingStatus.textContent = "Recording... speak clearly.";
      }catch(e){
        setRecordLabel("Record");
        if (recordingStatus) recordingStatus.textContent = "Microphone permission denied.";
      }
    }

    hideAllLines();

    if (clearBtn) clearBtn.addEventListener("click", clearConversation);
    if (tapGirl) tapGirl.addEventListener("click", showTapGirlMessage);

    if (micIconBtn) {
      micIconBtn.addEventListener("click", async (event) => {
        event.preventDefault();
        event.stopImmediatePropagation();
        if (window.GPTracing?.prepareMicSupport) {
          try { await window.GPTracing.prepareMicSupport(); } catch (_) {}
        }
        if (currentLineIndex === -1) {
          showAndSpeakLine(0);
          highlightLine(0, true);
          setConversationStatus("Repeat after me.");
          setTimeout(() => listenForRepeat(expectedLines[0]), 400);
        } else {
          highlightLine(0, true);
          setConversationStatus("Repeat after me.");
          setTimeout(() => listenForRepeat(expectedLines[0]), 400);
        }
      });
    }

    recordBtn.addEventListener("click", toggleRecord);
    nextBtn.addEventListener("click", () => { window.location.href = "../thursday/LevelC_Revision1.html"; });
    prevBtn.addEventListener("click", () => { window.location.href = "LevelC6.html"; });
  </script>

    async function finishActivity(overrides = {}){
      if (!window.GPTrack) return;
      const pageFile = ((location.pathname || "").split("/").pop() || "").replace(/\.html$/i, "");
      const inferredLevel = (/^(LA|LevelA|Level_A)/i.test(pageFile))
        ? "A"
        : (/^(LB|LevelB)/i.test(pageFile))
          ? "B"
          : (/^(LC|LevelC)/i.test(pageFile))
            ? "C"
            : null;

      await GPTrack.finish({
        pageId: pageFile || document.title || "Activity",
        level: inferredLevel,

        stars: 0,

  <script>
    (function(){
      const html = document.documentElement;
      const overlay = document.getElementById("gpIntroVideoOverlay");
      const video = document.getElementById("gpIntroVideo");
      const help = document.getElementById("gpIntroHelp");
      const playBtn = document.getElementById("gpIntroPlayBtn");
      const soundBtn = document.getElementById("gpIntroSoundBtn");
      const skipBtn = document.getElementById("gpIntroSkipBtn");

      if (!overlay || !video || !help || !playBtn || !soundBtn || !skipBtn) {
        html.classList.remove("gp-intro-video-pending");
        return;
      }

      let revealed = false;
      let hardTimeout = setTimeout(revealLesson, 60000);

      function revealLesson(){
        if (revealed) return;
        revealed = true;
        clearTimeout(hardTimeout);
        try { video.pause(); } catch(e){}
        overlay.classList.remove("active");
        overlay.style.display = "none";
        html.classList.remove("gp-intro-video-pending");
      }

      function showPlayFallback(msg){
        help.textContent = msg || 'Tap "Play Intro" to start the video.';
        playBtn.style.display = "inline-flex";
      }

      async function tryAutoplayMuted(){
        try{
          video.muted = true;
          video.defaultMuted = true;
          await video.play();
          help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
          playBtn.style.display = "none";
        }catch(err){
          showPlayFallback('Autoplay was blocked. Tap "Play Intro" to start.');
        }
      }

      async function playWithSound(){
        try{
          video.muted = false;
          video.defaultMuted = false;
          video.volume = 1;
          await video.play();
          help.textContent = 'Sound is on. Tap "Skip Intro" to continue.';
          playBtn.style.display = "none";
        }catch(err){
          help.textContent = 'Tap "Play Intro" first, then tap "Turn On Sound".';
          playBtn.style.display = "inline-flex";
        }
      }

      playBtn.addEventListener("click", async () => {
        try{
          video.muted = true;
          video.defaultMuted = true;
          await video.play();
          help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
          playBtn.style.display = "none";
        }catch(err){
          help.textContent = "Unable to start the intro video.";
        }
      });

      soundBtn.addEventListener("click", playWithSound);
      skipBtn.addEventListener("click", revealLesson);

      video.addEventListener("playing", () => {
        help.textContent = video.muted
          ? 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".'
          : 'Sound is on. Tap "Skip Intro" to continue.';
      });

      video.addEventListener("ended", revealLesson, { once:true });

      video.addEventListener("error", () => {
        help.textContent = "Intro video failed to load. Opening page now.";
        setTimeout(revealLesson, 800);
      }, { once:true });

      video.addEventListener("loadedmetadata", () => {
        tryAutoplayMuted();
      }, { once:true });

      setTimeout(() => {
        if (!revealed && video.readyState >= 1) tryAutoplayMuted();
      }, 1200);
    })();
  </script>

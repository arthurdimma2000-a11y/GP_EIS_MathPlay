<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Level C5 - Tangrams</title>
<link rel="stylesheet" href="../../../../shared/css/base.css" />
<link rel="stylesheet" href="../../../../shared/css/layout.css" />
<link rel="stylesheet" href="../../../../shared/css/lesson.css" />
<style id="gpLessonPrehide">
  .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
</style>

<style>
  :root{
    --bg:#f8f3ea;
    --card:#fffdf8;
    --ink:#252525;
    --accent:#ef6a6a;
    --accent-2:#46a6ff;
    --good:#2f9f5f;
    --warn:#f2994a;
    --shadow:0 16px 36px rgba(0,0,0,.12);
    --ring:0 0 0 4px rgba(70,166,255,.18);
    --radius:22px;
    font-family:"Comic Sans MS","Trebuchet MS","Segoe UI",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:linear-gradient(180deg,#fff8ef 0%,#f8f1e5 100%);color:var(--ink);}
  body{min-height:100vh;padding:18px;display:flex;align-items:center;justify-content:center;}
  .app{
    width:min(1180px, 98vw);
    background:var(--card);
    border:4px solid #ffd6d6;
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:18px 18px 14px;
    position:relative;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:14px;
    padding-right:72px;
  }
  .title-wrap{display:flex;flex-direction:column;gap:4px;}
  .eyebrow{font-size:.9rem;font-weight:800;color:#8f8f8f;letter-spacing:.03em;text-transform:uppercase;}
  .title{font-size:clamp(1.9rem,4vw,3.1rem);font-weight:900;color:#eb6363;line-height:1;}
  .subtitle{font-size:clamp(.98rem,1.8vw,1.1rem);font-weight:700;color:#666;}
  .home-btn{
    position:absolute;right:12px;top:8px;width:64px;height:64px;display:inline-flex;align-items:center;justify-content:center;
    background:transparent;border:none;padding:0;text-decoration:none;z-index:12;animation:homeSwing 2.5s ease-in-out infinite;
  }
  .home-btn img{width:64px;height:64px;display:block;filter:drop-shadow(0 8px 10px rgba(0,0,0,.22));}
  @keyframes homeSwing{0%{transform:translateY(18%) rotate(-6deg);}50%{transform:translateY(18%) rotate(8deg);}100%{transform:translateY(18%) rotate(-6deg);}}
  .layout{display:grid;grid-template-columns:minmax(280px,1fr) minmax(280px, 350px);gap:16px;align-items:start;}
  .poster-card{
    background:#fff;border:3px solid #ffd9d9;border-radius:24px;padding:14px;
    box-shadow:0 10px 24px rgba(0,0,0,.07);
  }
  .poster-wrap{
    position:relative;
    width:100%;
    aspect-ratio:1365 / 2048;
    border-radius:18px;
    overflow:hidden;
    background:#fff;
  }
  .poster-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;user-select:none;-webkit-user-drag:none;}
  .line-layer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;}
  .line-layer line.main{stroke:#2f9f5f;stroke-width:1.05;stroke-linecap:round;filter:drop-shadow(0 2px 3px rgba(0,0,0,.12));}
  .line-layer line.temp{stroke:#4aa3ff;stroke-width:.95;stroke-linecap:round;stroke-dasharray:2 1.8;opacity:.95;}
  .dot{
    position:absolute;transform:translate(-50%,-50%);
    width:28px;height:28px;border-radius:50%;
    border:2.5px dashed #111;background:rgba(255,255,255,.94);
    box-shadow:0 2px 8px rgba(0,0,0,.14);
    cursor:grab;z-index:4;touch-action:none;padding:0;
  }
  .dot::after{
    content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:7px;height:7px;border-radius:50%;background:#111;
  }
  .dot.left{cursor:crosshair;}
  .dot.active{box-shadow:var(--ring),0 2px 10px rgba(0,0,0,.18);}
  .dot.done{border-style:solid;border-color:var(--good);}
  .dot.disabled{cursor:default;}
  .hint-bar{
    margin-top:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;
  }
  .hint-text{font-weight:800;color:#555;font-size:1rem;}
  .side-card{
    background:linear-gradient(180deg,#fffefd 0%, #f7fbff 100%);
    border:3px solid #dcecff;
    border-radius:24px;
    padding:16px;
    box-shadow:0 10px 24px rgba(0,0,0,.07);
    position:sticky;top:10px;
  }
  .status-pill{
    display:inline-flex;align-items:center;gap:8px;min-height:44px;padding:10px 14px;
    border-radius:999px;background:#fff3cd;border:2px solid #ffe08b;font-weight:900;color:#8a6200;
  }
  .score-box{
    margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;
  }
  .mini-box{
    background:#fff;border:2px solid #ececec;border-radius:18px;padding:12px;text-align:center;
  }
  .mini-label{font-size:.84rem;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.03em;}
  .mini-value{font-size:1.65rem;font-weight:900;color:#333;margin-top:4px;}
  .progress-wrap{margin-top:12px;}
  .progress-label{display:flex;justify-content:space-between;gap:10px;font-weight:800;color:#666;margin-bottom:6px;}
  .progress-bar{height:16px;background:#edf2f7;border-radius:999px;overflow:hidden;border:2px solid #dbe7f4;}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#65d18a 0%, #4aa3ff 100%);transition:width .25s ease;}
  .instruction-box{
    margin-top:14px;background:#fff;border:2px dashed #ffd1d1;border-radius:18px;padding:14px;
  }
  .instruction-box h3{margin:0 0 8px;color:#eb6363;font-size:1.08rem;}
  .instruction-box p{margin:0 0 6px;line-height:1.45;font-weight:700;color:#555;}
  .instruction-box ul{margin:8px 0 0 18px;padding:0;}
  .instruction-box li{margin:6px 0;font-weight:700;color:#555;}
  .controls{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;}
  .btn{
    border:none;border-radius:999px;padding:12px 18px;font-weight:900;font-size:1rem;cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
  }
  .btn.prev{background:#f6f0cb;color:#8c6a00;}
  .btn.next{background:#ffd36e;color:#7a4d00;}
  .btn.clear{background:#e9f2ff;color:#234f85;}
  .btn.read{background:#ff8a5b;color:#fff;}
  .btn.try{background:#f0fff3;color:#227845;border:2px solid #8dd3a2;box-shadow:none;}
  .footer-note{margin-top:10px;font-size:.92rem;font-weight:700;color:#777;}
  .celebrate{animation:pop .35s ease;}
  @keyframes pop{0%{transform:scale(.94);}60%{transform:scale(1.05);}100%{transform:scale(1);}}
  .shake{animation:shake .25s linear 2;}
  @keyframes shake{0%,100%{transform:translate(-50%,-50%);}25%{transform:translate(calc(-50% - 3px),-50%);}75%{transform:translate(calc(-50% + 3px),-50%);}}
  @media (max-width:980px){
    .layout{grid-template-columns:1fr;}
    .side-card{position:static;}
  }
  @media (max-width:640px){
    body{padding:10px;}
    .app{padding:12px;}
    .topbar{padding-right:58px;}
    .home-btn{width:52px;height:52px;right:8px;top:6px;}
    .home-btn img{width:52px;height:52px;}
    .dot{width:24px;height:24px;}
    .dot::after{width:6px;height:6px;}
    .controls{justify-content:center;}
  }
  function playChime() {
    try {
      const chime = new Audio("../../../../assets/audio/chimes/chime.mp3.mp3");
      chime.preload = "auto";
      chime.play().catch(() => {});
    } catch (_) {}
  }

  function getPercentPosition(el) {
    return {
      x: parseFloat(el.style.left),
      y: parseFloat(el.style.top)
    };
  }

  function setStatus(text, kind) {
    statusPill.textContent = text;
    statusPill.style.background = kind === 'good' ? '#ecfff1' : (kind === 'bad' ? '#fff1f1' : '#fff3cd');
    statusPill.style.borderColor = kind === 'good' ? '#9ad7aa' : (kind === 'bad' ? '#ffb9b9' : '#ffe08b');
    statusPill.style.color = kind === 'good' ? '#227845' : (kind === 'bad' ? '#bf3030' : '#8a6200');
  }

  function updateScoreboard() {
    const correct = matchedLeft.size;
    const score = Math.round((correct / totalMatches) * 100);
    correctCountEl.textContent = String(correct);
    scoreValueEl.textContent = String(score);
    progressText.textContent = score + '%';
    progressFill.style.width = score + '%';
  }

  function makeLine(x1, y1, x2, y2, cls) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);
    line.setAttribute('class', cls);
    return line;
  }

  function clearTempLine() {
    if (tempLine) {
      tempLine.remove();
      tempLine = null;
    }
  }

  function resetActiveState() {
    dots.forEach(dot => dot.classList.remove('active'));
  }

  function clearAllMatches() {
    matchedLeft.clear();
    hasSavedCompletion = false;
    attemptCount = 0;
    pointerId = null;
    currentDrag = null;
    clearTempLine();
    lineLayer.innerHTML = '';
    dots.forEach(dot => {
      dot.classList.remove('active', 'done', 'disabled', 'shake');
      dot.disabled = false;
    });
    updateScoreboard();
    setStatus('All lines cleared. Start again from a black dotted circle on the left.', 'warn');
  }

  function nearestRightDotFromPoint(clientX, clientY) {
    let best = null;
    let bestDistance = Infinity;
    rightDots.forEach(dot => {
      if (dot.classList.contains('done')) return;
      const rect = dot.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dist = Math.hypot(clientX - cx, clientY - cy);
      if (dist < bestDistance) {
        bestDistance = dist;
        best = dot;
      }
    });
    return bestDistance <= 34 ? best : null;
  }

  function animateWrong(dotA, dotB) {
    [dotA, dotB].filter(Boolean).forEach(dot => {
      dot.classList.remove('shake');
      void dot.offsetWidth;
      dot.classList.add('shake');
      setTimeout(() => dot.classList.remove('shake'), 600);
    });
  }

  async function saveCompletion() {
    if (hasSavedCompletion) return;
    hasSavedCompletion = true;

    const payload = {
      pageId: "LevelC5",
      level: "C",
      activityType: "matching",
      score: 100,
      stars: attemptCount <= 5 ? 3 : (attemptCount <= 8 ? 2 : 1),
      completed: true,
      tracing: 100,
      progress: 100,
      skills: {
        reading: 1,
        writing: 0,
        speaking: 0,
        listening: 1
      }
    };

    try {
      if (window.GPTrack && typeof window.GPTrack.realtime === "function") {
        await window.GPTrack.realtime(payload);
      }
    } catch (_) {}

    try {
      if (typeof window.finishAndSave === "function") {
        await window.finishAndSave(payload);
      } else if (typeof window.finishActivity === "function") {
        await window.finishActivity(payload);
      }
    } catch (err) {
      console.warn("Progress save failed:", err);
    }
  }

  async function completePuzzle() {
    updateScoreboard();
    setStatus('Excellent! All tangram matches are correct and saved.', 'good');
    document.querySelector('.poster-card')?.classList.add('celebrate');
    setTimeout(() => document.querySelector('.poster-card')?.classList.remove('celebrate'), 500);
    playChime();
    speak('Excellent. You matched all the tangram names correctly.');
    await saveCompletion();
  }

  function lockPair(leftDot, rightDot) {
    const p1 = getPercentPosition(leftDot);
    const p2 = getPercentPosition(rightDot);
    const line = makeLine(p1.x, p1.y, p2.x, p2.y, 'main');
    line.dataset.leftIndex = leftDot.dataset.index;
    lineLayer.appendChild(line);
    leftDot.classList.remove('active');
    rightDot.classList.remove('active');
    leftDot.classList.add('done', 'disabled');
    rightDot.classList.add('done', 'disabled');
    leftDot.disabled = true;
    rightDot.disabled = true;
    matchedLeft.add(Number(leftDot.dataset.index));
    updateScoreboard();
  }

  function startDrag(leftDot, event) {
    if (leftDot.classList.contains('done')) return;
    pointerId = event.pointerId;
    currentDrag = leftDot;
    resetActiveState();
    leftDot.classList.add('active');
    const start = getPercentPosition(leftDot);
    clearTempLine();
    tempLine = makeLine(start.x, start.y, start.x, start.y, 'temp');
    lineLayer.appendChild(tempLine);
    try { leftDot.setPointerCapture(pointerId); } catch (_) {}
  }

  function updateDrag(event) {
    if (!currentDrag || event.pointerId !== pointerId || !tempLine) return;
    const wrapRect = lineLayer.getBoundingClientRect();
    const x = ((event.clientX - wrapRect.left) / wrapRect.width) * 100;
    const y = ((event.clientY - wrapRect.top) / wrapRect.height) * 100;
    const start = getPercentPosition(currentDrag);
    tempLine.setAttribute('x1', start.x);
    tempLine.setAttribute('y1', start.y);
    tempLine.setAttribute('x2', Math.max(0, Math.min(100, x)));
    tempLine.setAttribute('y2', Math.max(0, Math.min(100, y)));
  }

  async function endDrag(event) {
    if (!currentDrag || event.pointerId !== pointerId) return;
    const leftDot = currentDrag;
    const target = nearestRightDotFromPoint(event.clientX, event.clientY);
    clearTempLine();
    resetActiveState();
    currentDrag = null;
    pointerId = null;
    attemptCount += 1;

    if (!target) {
      setStatus('Drag to a circle on the right side.', 'warn');
      speak('Try to connect to a circle on the right.');
      return;
    }

    const leftIndex = Number(leftDot.dataset.index);
    const rightIndex = Number(target.dataset.index);
    if (matchMap[leftIndex] === rightIndex) {
      lockPair(leftDot, target);
      setStatus('Correct match. Keep going.', 'good');
      speak('Correct');
      if (matchedLeft.size === totalMatches) {
        await completePuzzle();
      }
    } else {
      animateWrong(leftDot, target);
      setStatus('That line is not correct. Try again.', 'bad');
      speak('Try again');
    }
  }

  leftDots.forEach(dot => {
    dot.addEventListener('pointerdown', event => {
      event.preventDefault();
      startDrag(dot, event);
    });
  });

  window.addEventListener('pointermove', updateDrag, { passive: true });
  window.addEventListener('pointerup', endDrag);
  window.addEventListener('pointercancel', endDrag);

  clearBtn.addEventListener('click', clearAllMatches);
  replayInstructionBtn.addEventListener('click', () => {
    speak('Connect each tangram shape on the left to the correct name on the right. Use the black dotted circles to draw each answer line.');
    setStatus('Listen and connect the matching circles carefully.', 'warn');
  });

  prevBtn.addEventListener('click', () => {
    window.location.href = "LevelC4.html";
  });
  nextBtn.addEventListener('click', () => {
    window.location.href = "../wednesday/LevelC6.html";
  });

  updateScoreboard();
  setStatus('Start by touching a black dotted circle on the left.', 'warn');
})();
</script>

<script>
(function(){
  const homeBtn = document.querySelector('.home-btn');
  if(!homeBtn) return;
  const chime = new Audio("../../../../assets/audio/chimes/chime.mp3.mp3");
  chime.preload = "auto";
  homeBtn.addEventListener('click', () => {
    try {
      chime.currentTime = 0;
      const p = chime.play();
      if (p && typeof p.catch === "function") p.catch(() => {});
    } catch (_) {}
  });
})();
</script>

<script src="../../../../activity-standardizer.js"></script>
<script src="../../../../shared/js/storage.js"></script>
<script src="../../../../shared/js/progress.js"></script>
<script src="../../../../shared/js/tracing.js"></script>
<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";

  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LevelC5",
    defaultLevel: "C",
    defaultActivityType: "matching",
    defaultScore: 100,
    defaultStars: 3,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 0,
      listening: 1
    }
  });

  function getStudentSession(){
    try {
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    } catch (e) {
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try {
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    } catch (e) {
      return {};
    }
  }

  function setActivityStore(store){
    try {
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    } catch (e) {}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "matching";
    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);
    try {
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    } catch (e) {}
    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };

    saveLocalActivityFallback(fullPayload);

    if (typeof window.finishActivity === "function") {
      try {
        await window.finishActivity(fullPayload);
      } catch (err) {
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }

    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>

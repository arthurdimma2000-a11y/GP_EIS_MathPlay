<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>LevelC2</title>
<style>
  :root{font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial,sans-serif;--ink:#2d2d2d;--bubble-left:#dff1ff;--bubble-right:#ffe7d8;--shadow:0 20px 40px rgba(0,0,0,.12);--bg:#e7f7e7;--orange:#ff8a5b;--success:#2f9f5f;--gold:#ffd24a}
  *{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--ink)} body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:12px}
  .card{width:min(980px,96vw);background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:14px 14px 18px}
  .poster-area{position:relative;width:min(900px,100%);margin:0 auto;border-radius:16px;overflow:hidden}
  .poster-img{width:100%;height:auto;display:block}
  .girl-spot{position:absolute;left:16px;top:16px;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:5}
  .girl-spot img{width:72px;height:72px;border-radius:18px;object-fit:cover;border:4px solid #ffe3f7;background:#ffd6f2;box-shadow:0 6px 14px rgba(0,0,0,.25);cursor:pointer}
  .girl-hint{font-size:.92rem;font-weight:800;color:#d62828;text-align:center}
  .finger-cue{position:absolute;left:50%;top:-26px;transform:translateX(-50%);font-size:1.8rem;line-height:1;filter:drop-shadow(0 4px 6px rgba(0,0,0,.2));animation:fingerBob 1s ease-in-out infinite;display:none;pointer-events:none}
  .finger-cue.show{display:block}
  @keyframes fingerBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}
  .bubble{position:absolute;padding:10px 14px;border-radius:16px;font-weight:700;font-size:1.05rem;max-width:260px;line-height:1.2;box-shadow:0 8px 18px rgba(0,0,0,.12);display:none}
  .bubble.show{display:block}.bubble.left{left:10%;top:25%;background:var(--bubble-left)}.bubble.right{right:8%;top:27%;background:var(--bubble-right)}
  .bubble.left::after{content:"";position:absolute;left:12px;bottom:-10px;border-width:10px 8px 0 8px;border-style:solid;border-color:var(--bubble-left) transparent transparent transparent}
  .bubble.right::after{content:"";position:absolute;right:14px;bottom:-10px;border-width:10px 8px 0 8px;border-style:solid;border-color:var(--bubble-right) transparent transparent transparent}
  .bubble.highlight{outline:3px solid rgba(255,165,0,.65);background:#ffeb99;transform:scale(1.04)}
  .controls{margin-top:12px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center}
  .btn{border:none;border-radius:999px;padding:10px 14px;font-size:.95rem;font-weight:800;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.15);background:#ff8a5b;color:#fff}
  .mic-icon-btn{border:none;background:transparent;padding:0;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}.mic-icon-btn img{width:36px;height:36px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.18))}
  .record-icon{width:16px;height:16px;display:inline-block;vertical-align:middle}
  .recording{display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap}.recording audio{height:28px}
  .recording-status,.conversation-status{font-size:.95rem;font-weight:800;color:#555;min-height:1.25em;text-align:center;margin-top:8px}
  .conversation-status{color:#6c4bbf}.repeat-result{min-height:1.2em;font-weight:900;color:var(--success);text-align:center}.star-row{min-height:1.1em;text-align:center;color:var(--gold);font-size:28px;text-shadow:0 2px 0 #b87900,0 4px 0 #8a5a00,0 8px 14px rgba(0,0,0,.22)}
  .practice-panel{display:grid;gap:8px;justify-items:center;margin-top:12px}
  @media (max-width:600px){.controls{justify-content:center}.bubble{max-width:40vw;font-size:.95rem}.girl-spot img{width:62px;height:62px}}
</style>
</head>
<body>
  <div class="card">
    <div class="poster-area" id="posterArea">
      <img class="poster-img" src="../../../../assets/images/shapes/LC2c.png" alt="Shape Sides poster">
      <div class="girl-spot">
        <span class="finger-cue show" id="girlFinger" aria-hidden="true">👇</span>
        <img src="../../../../assets/images/shapes/CirckleGirlWk1.png" alt="Tap the girl" id="girlBtn">
        <div class="girl-hint">Tap the girl</div>
      </div>
      <div class="bubble left" id="bubbleLeft">Don’t eat alone.</div>
      <div class="bubble right" id="bubbleRight">Let's eat together.</div>
    </div>

    <div class="practice-panel">
      <div class="repeat-result" id="repeatResult"></div>
      <div class="star-row" id="starRow"></div>
    </div>

    <div class="controls">
      <button class="btn prev" id="prevBtn" type="button">← Previous page</button>
      <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
        <span class="finger-cue" id="micFinger" aria-hidden="true">👇</span>
        <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone">
      </button>
      <button class="btn next" id="nextBtn" type="button">Next page →</button>
      <button class="btn" id="recordBtn" type="button">
        <svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
          <path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        </svg> Record Practice
      </button>
      <div class="recording"><audio id="recordingPlayback" controls></audio></div>
    </div>
    <div class="recording-status" id="recordingStatus"></div>
    <div class="conversation-status" id="conversationStatus"></div>
  </div>
<script>
window.__GP_DISABLE_UNIFIED_MIC_PROTOCOL = true;
const PREV_PAGE = '../monday/TangramArtClass.html';
const NEXT_PAGE = '../wednesday/LevelC3.html';
const PAGE_ID = 'LevelC2';
const LEVEL_ID = 'C';
const expectedLines = ['Don’t eat alone.', 'Let’s eat together.'];
const bubbleLeft = document.getElementById('bubbleLeft');
const bubbleRight = document.getElementById('bubbleRight');
const girlBtn = document.getElementById('girlBtn');
const girlFinger = document.getElementById('girlFinger');
const micFinger = document.getElementById('micFinger');
const micIconBtn = document.getElementById('micIconBtn');
const recordBtn = document.getElementById('recordBtn');
const recordingPlayback = document.getElementById('recordingPlayback');
const recordingStatus = document.getElementById('recordingStatus');
const conversationStatus = document.getElementById('conversationStatus');
const repeatResult = document.getElementById('repeatResult');
const starRow = document.getElementById('starRow');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
let recorder = null, recordedChunks = [], isRecording = false;
let currentIndex = 0, phase = 'reveal', attempts = [0,0], stars = [0,0], finished = false, recognitionCounter = 0, girlTapped = false;
function setGuide(stage){ if(girlFinger) girlFinger.classList.toggle('show', stage==='girl'); if(micFinger) micFinger.classList.toggle('show', stage==='mic'); }
function getVoice(){ if (!('speechSynthesis' in window)) return null; const voices = speechSynthesis.getVoices() || []; return voices.find(v => /female|woman|zira|jenny|aria|ava|allison|emma|olivia/i.test(`${v.name} ${v.lang}`)) || voices.find(v => /en/i.test(v.lang||'')) || voices[0] || null; }
function speak(text){ return new Promise(resolve => { if (!('speechSynthesis' in window)) return resolve(); try { speechSynthesis.cancel(); } catch(_) {} const u = new SpeechSynthesisUtterance(text); const voice = getVoice(); if (voice) u.voice = voice; u.lang='en-US'; u.rate=0.92; u.pitch=1.08; u.onend=resolve; u.onerror=resolve; speechSynthesis.speak(u); }); }
function normalizeText(text){ return String(text||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim(); }
function percentMatch(a,b){ const aa=normalizeText(a).split(' ').filter(Boolean); const bb=normalizeText(b).split(' ').filter(Boolean); if(!aa.length) return 0; let hits=0; aa.forEach(w=>{ if(bb.includes(w)) hits++; }); return Math.round(hits/aa.length*100); }
function rewardStars(n){ return n===1?3:n===2?2:n===3?1:0; }
function setStars(count){ starRow.textContent = new Array(count).fill('★').join(''); }
function showBubble(index){ if(index===0){ bubbleLeft.classList.add('show'); bubbleLeft.classList.remove('highlight'); } if(index===1){ bubbleRight.classList.add('show'); bubbleRight.classList.remove('highlight'); } }
function highlightBubble(index,on){ const el = index===0 ? bubbleLeft : bubbleRight; el.classList.toggle('highlight', !!on); }
function getRecognitionCtor(){ return window.SpeechRecognition || window.webkitSpeechRecognition || null; }
function listen(){ return new Promise(resolve => { const SR = getRecognitionCtor(); if(!SR) return resolve({ supported:false, transcript:'' }); const id=++recognitionCounter; const rec=new SR(); rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=3; rec.continuous=false; let done=false; const finish=t=>{ if(done || id!==recognitionCounter) return; done=true; resolve({ supported:true, transcript:(t||'').trim() }); }; rec.onresult=e=>finish(Array.from(e.results||[]).map(r=>r&&r[0]&&r[0].transcript).filter(Boolean).join(' ')); rec.onerror=()=>finish(''); rec.onnomatch=()=>finish(''); rec.onend=()=>finish(''); try{ rec.start(); }catch(_){ finish(''); } }); }
async function pushProgress(extra={}){ const totalStars=stars.reduce((a,b)=>a+b,0); const payload={ pageId:PAGE_ID, level:LEVEL_ID, activityType:'speaking', score: finished ? 100 : Math.min(95,totalStars*15), stars: totalStars, completed: finished, skills:{reading:0, writing:0, speaking: finished ? 3 : 1, listening: finished ? 3 : 1}, ...extra }; try { const store = JSON.parse(localStorage.getItem('gpProgressByPage') || '{}'); store[payload.pageId] = payload; localStorage.setItem('gpProgressByPage', JSON.stringify(store)); localStorage.setItem('gpLatestProgress', JSON.stringify(payload)); } catch(_) {} try { if (window.GPTrack && typeof window.GPTrack.finish === 'function') await window.GPTrack.finish(payload); } catch(_) {} }
async function handleMic(){ if (finished) return; if (phase === 'reveal') { showBubble(currentIndex); conversationStatus.textContent = expectedLines[currentIndex]; await speak(expectedLines[currentIndex]); phase='coach'; await pushProgress(); return; } if (phase === 'coach') { highlightBubble(currentIndex,true); conversationStatus.textContent='Repeat after me.'; await speak('Repeat after me.'); conversationStatus.textContent='Tap the mic and say the sentence.'; phase='listen'; return; } const heard = await listen(); const tryNo = ++attempts[currentIndex]; if (!heard.supported) { conversationStatus.textContent='Speech check is not supported in this browser.'; repeatResult.textContent='Use Chrome or Edge for mic practice.'; repeatResult.style.color='#b06a00'; return; } const pct = percentMatch(expectedLines[currentIndex], heard.transcript); if (pct >= 50) { repeatResult.textContent = heard.transcript || expectedLines[currentIndex]; repeatResult.style.color='#2f9f5f'; stars[currentIndex] = rewardStars(tryNo); setStars(stars[currentIndex]); conversationStatus.textContent = 'Great! Moving on.'; highlightBubble(currentIndex,false); await pushProgress(); if (currentIndex < expectedLines.length-1) { currentIndex += 1; phase='reveal'; return; } finished=true; conversationStatus.textContent='Amazing job!'; await speak('Amazing job!'); await pushProgress({ score:100, completed:true }); return; } if (tryNo >= 3) { repeatResult.textContent='You did a good Job. Nice try!'; repeatResult.style.color='#b06a00'; setStars(0); highlightBubble(currentIndex,false); if (currentIndex < expectedLines.length-1) { currentIndex += 1; phase='reveal'; conversationStatus.textContent='You did a good Job. Nice try!'; await speak('You did a good Job. Nice try!'); await pushProgress(); return; } finished=true; conversationStatus.textContent='You did a good Job. Nice try!'; await speak('You did a good Job. Nice try!'); await pushProgress({ completed:true }); return; } repeatResult.textContent='Sorry, try again!'; repeatResult.style.color='#c62828'; conversationStatus.textContent='Sorry, try again!'; await speak('Sorry, try again!'); phase='coach'; await pushProgress(); }
function toggleRecord(){ if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ recordingStatus.textContent='Recording not supported in this browser.'; return; } if(isRecording){ recorder && recorder.stop(); return; } navigator.mediaDevices.getUserMedia({ audio:true }).then(stream => { recorder = new MediaRecorder(stream); recordedChunks=[]; recorder.ondataavailable=e=>{ if(e.data && e.data.size>0) recordedChunks.push(e.data); }; recorder.onstop=()=>{ const blob = new Blob(recordedChunks, { type:'audio/webm' }); recordingPlayback.src = URL.createObjectURL(blob); recordingStatus.textContent='Recording ready.'; stream.getTracks().forEach(t=>t.stop()); isRecording=false; recordBtn.innerHTML = `<svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true"><path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/><path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/><path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/><path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/></svg> Record Practice`; }; recorder.start(); isRecording=true; recordingStatus.textContent='Recording...'; recordBtn.textContent='Stop Recording'; }).catch(()=>{ recordingStatus.textContent='Microphone permission denied.'; }); }
bubbleLeft.classList.remove('show'); bubbleRight.classList.remove('show');
conversationStatus.textContent='Tap the girl to begin.';
micIconBtn.addEventListener('click', async()=>{ if(!girlTapped){ conversationStatus.textContent='Tap the girl first.'; setGuide('girl'); await speak('Tap the girl first.'); return; } setGuide(''); return handleMic(); }); recordBtn.addEventListener('click', toggleRecord); if (girlBtn) girlBtn.addEventListener('click', async () => { girlTapped = true; showBubble(0); conversationStatus.textContent = expectedLines[0]; await speak(expectedLines[0]); conversationStatus.textContent='Now tap the microphone.'; setGuide('mic'); await speak('Now tap the microphone.'); }); prevBtn.addEventListener('click', ()=>{ try { speechSynthesis.cancel(); } catch(_) {} location.href = PREV_PAGE; }); nextBtn.addEventListener('click', ()=>{ try { speechSynthesis.cancel(); } catch(_) {} location.href = NEXT_PAGE; }); setGuide('girl'); window.addEventListener('load', () => { try { if (window.GPTrack) window.GPTrack.start(PAGE_ID); } catch(_) {} pushProgress({ score:0, stars:0, completed:false }); });
</script>
<script src="../../../../shared/js/activity-standardizer-shared.js"></script>
<script src="../../../../shared/js/mic-lesson-helper.js"></script>
<script src="../../../../shared/js/non-mic-lesson-helper.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>

<style id="gpLessonPrehide">
  .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
  .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}
  .convo-line.show,.speech-line.show,.dialog-line.show,.bubble-line.show,.bubble-left.show,.bubble-right.show,#bubbleLeft.show,#bubbleRight.show{display:block !important;}
  .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,1.9vw,19px) !important;line-height:1.24 !important;max-width:min(40vw,320px) !important;white-space:normal !important;word-break:break-word !important;overflow-wrap:anywhere !important;}
  @media (max-width:780px){
    .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,3.6vw,17px) !important;max-width:min(44vw,220px) !important;line-height:1.2 !important;}
  }
</style>



<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Level C14 - Shape Sides</title>
<link rel="stylesheet" href="../../../../shared/css/base.css" />
<link rel="stylesheet" href="../../../../shared/css/layout.css" />
<link rel="stylesheet" href="../../../../shared/css/lesson.css" />
<style>
  :root{
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    --ink:#2d2d2d;
    --bubble-left:#dff1ff;
    --bubble-right:#ffe7d8;
    --shadow:0 20px 40px rgba(0,0,0,.12);
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    background:#e7f7e7;
    padding:16px;
    color:var(--ink);
  }

  .card{
    width:min(980px,96vw);
    border-radius:18px;
    padding:14px 14px 18px;
  }
  .poster-area{
    position:relative;
    width:min(900px,100%);
    margin:0 auto;
    border-radius:16px;
    overflow:hidden;
  }
  .poster-img{width:100%;height:auto;display:block;}
  .bubble{
    position:absolute;
    padding:10px 14px;
    border-radius:16px;
    font-weight:700;
    font-size:1.05rem;
    max-width:260px;
    line-height:1.2;
    box-shadow:0 8px 18px rgba(0,0,0,.12);
    opacity:0;
  }
  .bubble.show{opacity:1;}
  .bubble.left{left:10%; top:25%; background:var(--bubble-left);}
  .bubble.right{right:8%; top:27%; background:var(--bubble-right);}
  .bubble.left::after{
    content:"";
    position:absolute;
    left:12px;
    bottom:-10px;
    border-width:10px 8px 0 8px;
    border-style:solid;
    border-color:var(--bubble-left) transparent transparent transparent;
  }
  .bubble.right::after{
    content:"";
    position:absolute;
    right:14px;
    bottom:-10px;
    border-width:10px 8px 0 8px;
    border-style:solid;
    border-color:var(--bubble-right) transparent transparent transparent;
  }

  .controls{
    margin-top:12px;
    display:flex;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
  }
  .btn{
    border:none;
    border-radius:999px;
    padding:8px 12px;
    font-size:.9rem;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
    background:#ff8a5b;
    color:#fff;
  }
  .mic-icon-btn img{
    width:32px;
    height:32px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
  }
  .record-icon{width:16px;height:16px;display:inline-block;vertical-align:middle;}
  .recording{display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .recording audio{height:28px;}
  .recording-status,.conversation-status{font-size:.9rem;font-weight:700;color:#555;}
</style>
</head>
<body>

  

  <div class="card">
    <div class="poster-area" id="posterArea">
      <img class="poster-img" src="../../../../assets/images/shapes/LC2c.png" alt="Shape Sides poster">

      <div class="bubble left" id="bubbleLeft">Don’t eat alone.</div>
      <div class="bubble right" id="bubbleRight">Let's eat together.</div>
    </div>

    <div class="controls">
      <button class="btn prev" id="prevBtn">&#8592; Previous page</button>
      <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
        <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone">
      </button>
      <button class="btn next" id="nextBtn">Next page &#8594;</button>
      <button class="btn" id="recordBtn" type="button">
        <svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z"
                fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
          <path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        </svg> Record Practice
      </button>
      <div class="recording">
        <audio id="recordingPlayback" controls></audio>
      </div>
    </div>
    <div class="recording-status" id="recordingStatus"></div>
    <div class="conversation-status" id="conversationStatus"></div>
  </div>

  <script>
    const bubbleLeft = document.getElementById('bubbleLeft');
    const bubbleRight = document.getElementById('bubbleRight');
    const micIconBtn = document.getElementById('micIconBtn');
    const recordBtn = document.getElementById('recordBtn');
    const recordingPlayback = document.getElementById('recordingPlayback');
    const recordingStatus = document.getElementById('recordingStatus');
    const conversationStatus = document.getElementById('conversationStatus');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    let recorder = null;
    let recordedChunks = [];
    let isRecording = false;

    function speak(text){
      if(!('speechSynthesis' in window)) return;
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 1.0;
      u.pitch = 1.05;
      u.volume = 1.0;
      if (window.GPTracing?.applyPreferredVoice) window.GPTracing.applyPreferredVoice(u);
      window.speechSynthesis.speak(u);
    }

    function showBubble(el, text){
      el.textContent = text;
      el.classList.add('show');
      speak(text);
    }

    function hideBubbles(){
      bubbleLeft.classList.remove('show');
      bubbleRight.classList.remove('show');
    }

    function toggleRecord(){
      if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        recordingStatus.textContent = "Recording not supported in this browser.";
        return;
      }
      if(isRecording){
        recorder && recorder.stop();
        return;
      }
      navigator.mediaDevices.getUserMedia({ audio:true })
        .then(stream => {
          recorder = new MediaRecorder(stream);
          recordedChunks = [];
          recorder.ondataavailable = e => {
            if(e.data && e.data.size > 0) recordedChunks.push(e.data);
          };
          recorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'audio/webm' });
            recordingPlayback.src = URL.createObjectURL(blob);
            recordingStatus.textContent = "Recording ready.";
            stream.getTracks().forEach(t => t.stop());
            isRecording = false;
            recordBtn.innerHTML = `<svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">
              <path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z"
                    fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
              <path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
              <path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
              <path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
            </svg> Record Practice`;
          };
          recorder.start();
          isRecording = true;
          recordingStatus.textContent = "Recording...";
          recordBtn.textContent = "Stop Recording";
        })
        .catch(() => {
          recordingStatus.textContent = "Microphone permission denied.";
        });
    }

    hideBubbles();

    recordBtn.addEventListener('click', toggleRecord);

    if(prevBtn) prevBtn.addEventListener('click', () => { window.location.href = '../../../../index.html'; });
    if(nextBtn) nextBtn.addEventListener('click', () => { window.location.href = '../wednesday/LevelC3.html'; });
  </script>

  <script src="../../../../activity-standardizer.js"></script>
  <script src="../../../../shared/js/storage.js"></script>
  <script src="../../../../shared/js/progress.js"></script>
  <script src="../../../../shared/js/tracing.js"></script>

  <script type="module">
    import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
    window.GPProgress.installTracker({
      saveActivityResult,
      markLoginPing,
      defaultPageId: "LevelC2",
      defaultLevel: "C",
      defaultActivityType: "lesson",
      defaultScore: 100,
      defaultStars: 1,
      defaultSkills: {
        reading: 1,
        writing: 0,
        speaking: 1,
        listening: 1
      }
    });

    function getStudentSession(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
      }catch(e){
        return null;
      }
    }

    function inferProgressMeta(payload){
      const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
      const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
      const level = (payload && payload.level)
        || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
      const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
      const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
      const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
      const month = payload && payload.month != null ? Number(payload.month) : 1;
      return {
        pageId,
        file,
        level,
        week: Number.isFinite(week) && week > 0 ? week : 1,
        month: Number.isFinite(month) && month > 0 ? month : 1
      };
    }

    function getActivityStore(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      }catch(e){
        return {};
      }
    }

    function setActivityStore(store){
      try{
        localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
      }catch(e){}
    }

    function saveLocalActivityFallback(payload){
      const session = getStudentSession() || {};
      const meta = inferProgressMeta(payload || {});
      const score = payload && typeof payload.score === "number" ? payload.score : 0;
      const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
      const tracing = payload && typeof payload.tracing === "number"
        ? payload.tracing
        : (payload && typeof payload.progress === "number" ? payload.progress : 0);
      const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
      const entry = {
        pageId: meta.pageId,
        file: meta.file,
        level: meta.level,
        type,
        activityType: (payload && payload.activityType) || type,
        score,
        stars,
        skills: payload && payload.skills ? payload.skills : {},
        completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
        tracing,
        week: meta.week,
        month: meta.month,
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
        savedAt: new Date().toISOString(),
        ts: Date.now()
      };
      const store = getActivityStore();
      store[meta.pageId] = {
        ...(store[meta.pageId] || {}),
        ...entry
      };
      setActivityStore(store);
      try{
        localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
      }catch(e){}
      return store[meta.pageId];
    }

    async function finishAndSave(payload){
      const session = getStudentSession() || {};
      const fullPayload = {
        ...(payload || {}),
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
      };

      saveLocalActivityFallback(fullPayload);

      if (typeof window.finishActivity === "function") {
        try{
          await window.finishActivity(fullPayload);
        }catch(err){
          console.warn("finishActivity failed, local fallback already saved:", err);
        }
      }

      return fullPayload;
    }

    window.finishAndSave = finishAndSave;
  </script>

  
</body>
</html>

  <script src="../../../../shared/js/vertex-entry.js"></script>
  <script>
    const boards = [
      { id: "tri1", dots: [
        { x: 0.5, y: 0.11 },
        { x: 0.18, y: 0.84 },
        { x: 0.82, y: 0.84 }
      ]},
      { id: "tri2", dots: [
        { x: 0.22, y: 0.18 },
        { x: 0.22, y: 0.84 },
        { x: 0.82, y: 0.68 }
      ]},
      { id: "tri3", dots: [
        { x: 0.5, y: 0.16 },
        { x: 0.24, y: 0.82 },
        { x: 0.74, y: 0.82 }
      ]}
    ];

    const completionLines = [
      "Amazing Job!",
      "Thumbs up!",
      "Wow! you are super smart!"
    ];

    let completedCount = 0;
    const traceProgressPercentEl = document.getElementById("traceProgressPercent");
    const traceProgressFillEl = document.getElementById("traceProgressFill");
    const traceProgressMessageEl = document.getElementById("traceProgressMessage");
    const TRACE_EDGES_PER_BOARD = 3;
    const TOTAL_TRACE_EDGES = boards.length * TRACE_EDGES_PER_BOARD;
    let combinedProgress = 0;

    function progressMessageFor(score){
      if (score >= 100) return "Fantastic! All the triangles are complete.";
      if (score >= 66) return "Great tracing. One more triangle to go.";
      if (score >= 33) return "Nice work. Keep joining the dots.";
      return "Connect the dots to make the triangles.";
    }

    function updateTraceProgressUI(score){
      traceProgressPercentEl.textContent = `${score}%`;
      traceProgressFillEl.style.width = `${score}%`;
      traceProgressMessageEl.textContent = progressMessageFor(score);
    }

    function playTraceTick(){
      window.GPTracing?.playTraceTick?.({ throttleMs: 100 });
    }

    function playCelebration(){
      try{ new Audio('../../../../assets/audio/chimes/chime.mp3.mp3').play().catch(()=>{}); }catch(_e){}
      window.GPTracing?.playTraceCelebration?.();
    }

    function applyCombinedProgress(score){
      combinedProgress = Math.max(0, Math.min(100, Math.round(score)));
      updateTraceProgressUI(combinedProgress);
    }

    const vertexEntry = window.GPVertexEntry?.create({
      mount: "#vertexEntryMount",
      title: "Write the number of vertices",
      prompt: "Write the number of vertices for each triangle.",
      showProgress: false,
      items: [
        { id: "tri1Vertices", label: "Triangle 1", answer: 3, hint: "Write 3", successSpeech: "Correct. A triangle has 3 vertices." },
        { id: "tri2Vertices", label: "Triangle 2", answer: 3, hint: "Write 3", successSpeech: "Correct. A triangle has 3 vertices." },
        { id: "tri3Vertices", label: "Triangle 3", answer: 3, hint: "Write 3", successSpeech: "Correct. A triangle has 3 vertices." }
      ],
      onProgress(state){
        applyCombinedProgress(state.totalProgress);
        if (typeof window.finishAndSave === 'function') {
          window.finishAndSave({
            pageId: 'LevelC3',
            level: 'C',
            activityType: 'tracing',
            score: state.totalProgress,
            tracing: state.totalProgress,
            stars: state.totalProgress >= 95 ? 3 : state.totalProgress >= 65 ? 2 : state.totalProgress > 0 ? 1 : 0,
            skills: { reading: 1, writing: 1, speaking: 1, listening: 1 }
          }).catch(() => {});
        }
      }
    }) || null;

    function saveTraceProgress(){
      const tracedEdges = boardStates ? boardStates.reduce((sum, state) => sum + state.lines.length, 0) : 0;
      const baseScore = Math.round((tracedEdges / TOTAL_TRACE_EDGES) * 100);
      const score = vertexEntry ? vertexEntry.setBaseProgress(baseScore) : baseScore;
      if (vertexEntry) return score;
      applyCombinedProgress(score);
      if (typeof window.finishAndSave !== 'function') return score;
      window.finishAndSave({
        pageId: 'LevelC3',
        level: 'C',
        activityType: 'tracing',
        score,
        tracing: score,
        stars: score >= 95 ? 3 : score >= 65 ? 2 : score > 0 ? 1 : 0,
        skills: { reading: 1, writing: 1, speaking: 1, listening: 1 }
      }).catch(() => {});
      return score;
    }

    function speakLine(text, onend){
      if (!("speechSynthesis" in window)) {
        if (onend) onend();
        return;
      }
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.96;
      u.pitch = 1.08;
      if (window.GPTracing?.applyPreferredVoice) window.GPTracing.applyPreferredVoice(u);
      u.onend = () => { if (onend) onend(); };
      u.onerror = () => { if (onend) onend(); };
      window.speechSynthesis.speak(u);
    }

    function speakSequence(lines, index = 0){
      const line = lines[index];
      if (!line) return;
      speakLine(line, () => {
        setTimeout(() => speakSequence(lines, index + 1), 220);
      });
    }

    function setupBoard(board, onComplete){
      const canvas = document.getElementById(board.id);
      const ctx = canvas.getContext("2d");
      const state = {
        canvas,
        ctx,
        dots: board.dots,
        lines: [],
        drawing: false,
        startIdx: null,
        previewPos: null,
        completed: false
      };

      function resize(){
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        draw();
      }

      function drawDot(x, y){
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, 11, 0, Math.PI * 2);
        ctx.fillStyle = "#e33";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.restore();
      }

      function draw(){
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#2b2b2b";

        state.lines.forEach(line => {
          ctx.beginPath();
          ctx.moveTo(line.x1, line.y1);
          ctx.lineTo(line.x2, line.y2);
          ctx.stroke();
        });

        if (state.drawing && state.previewPos && state.startIdx !== null) {
          const start = getDotPx(state.startIdx);
          ctx.strokeStyle = "#6a6a6a";
          ctx.beginPath();
          ctx.moveTo(start.x, start.y);
          ctx.lineTo(state.previewPos.x, state.previewPos.y);
          ctx.stroke();
        }

        state.dots.forEach(dot => {
          const x = dot.x * canvas.width;
          const y = dot.y * canvas.height;
          drawDot(x, y);
        });
      }

      function getDotPx(index){
        const dot = state.dots[index];
        return { x: dot.x * canvas.width, y: dot.y * canvas.height };
      }

      function hitTest(pos){
        const threshold = 34;
        for (let i = 0; i < state.dots.length; i += 1) {
          const d = getDotPx(i);
          const dx = pos.x - d.x;
          const dy = pos.y - d.y;
          if (dx * dx + dy * dy <= threshold * threshold) return i;
        }
        return null;
      }

      function edgeKey(a, b){
        return a < b ? `${a}-${b}` : `${b}-${a}`;
      }

      function isAllowedEdge(a, b){
        const last = state.dots.length - 1;
        return Math.abs(a - b) === 1 || ((a === 0 && b === last) || (b === 0 && a === last));
      }

      function hasEdge(a, b){
        return state.lines.some(line => line.key === edgeKey(a, b));
      }

      function pointerPos(e){
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      }

      canvas.addEventListener("pointerdown", (e) => {
        if (state.completed) return;
        const pos = pointerPos(e);
        const idx = hitTest(pos);
        if (idx === null) return;
        state.drawing = true;
        state.startIdx = idx;
        state.previewPos = getDotPx(idx);
        canvas.setPointerCapture(e.pointerId);
        draw();
      });

      canvas.addEventListener("pointermove", (e) => {
        if (!state.drawing) return;
        state.previewPos = (() => {
          const p = pointerPos(e);
          const idx = hitTest(p);
          return idx === null ? p : getDotPx(idx);
        })();
        draw();
      });

      function endPointer(e){
        if (!state.drawing) return;
        const pos = pointerPos(e);
        const endIdx = (() => {
          const direct = hitTest(pos);
          if (direct !== null) return direct;
          for (let j = 0; j < state.dots.length; j += 1) {
            const d = getDotPx(j);
            const dx = pos.x - d.x;
            const dy = pos.y - d.y;
            if (dx * dx + dy * dy <= 42 * 42) return j;
          }
          return null;
        })();

        let addedLine = false;
        if (endIdx !== null && endIdx !== state.startIdx) {
          if (isAllowedEdge(state.startIdx, endIdx) && !hasEdge(state.startIdx, endIdx)) {
            const start = getDotPx(state.startIdx);
            const end = getDotPx(endIdx);
            addedLine = true;
            state.lines.push({
              key: edgeKey(state.startIdx, endIdx),
              x1: start.x,
              y1: start.y,
              x2: end.x,
              y2: end.y
            });
          }
        }

        state.drawing = false;
        state.startIdx = null;
        state.previewPos = null;
        draw();

        if (addedLine) {
          playTraceTick();
          saveTraceProgress();
        }

        if (!state.completed && state.lines.length >= state.dots.length) {
          state.completed = true;
          onComplete();
        }
      }

      canvas.addEventListener("pointerup", endPointer);
      canvas.addEventListener("pointercancel", endPointer);

      state.reset = () => {
        state.lines = [];
        state.completed = false;
        draw();
      };

      resize();
      window.addEventListener("resize", resize);
      return state;
    }

    const boardStates = boards.map((board) => setupBoard(board, () => {
      if (completedCount >= completionLines.length) return;
      const message = completionLines[completedCount];
      completedCount += 1;
      playCelebration();
      speakLine(message);
      saveTraceProgress();
      if (completedCount === boards.length) {
        setTimeout(() => {
          playCelebration();
          speakLine("Excellent! You completed all the triangles.");
        }, 240);
      }
    }));

    updateTraceProgressUI(0);

    document.getElementById("resetBtn").addEventListener("click", () => {
      completedCount = 0;
      boardStates.forEach(state => state.reset());
      if (vertexEntry) vertexEntry.reset();
      saveTraceProgress();
      updateTraceProgressUI(0);
    });

    window.addEventListener("load", () => {
      speakSequence([
        "Practice drawing shapes with 0 sides and 3 sides.",
        "Circles and Ovals.",
        "Draw triangles by drawing lines to connect the red dots."
      ]);
    });

    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    if (prevBtn) {
      prevBtn.addEventListener("click", () => {
        window.location.href = "LevelC2.html";
      });
    }

      if (nextBtn) {
        nextBtn.addEventListener("click", () => {
          window.location.href = "../tuesday/LevelC4.html";
        });
      }
  </script>

  <script src="../../../../activity-standardizer.js"></script>
  <script src="../../../../shared/js/storage.js"></script>
  <script src="../../../../shared/js/progress.js"></script>
  <script src="../../../../shared/js/tracing.js"></script>
  <script type="module">
    import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
    window.GPProgress.installTracker({
      saveActivityResult,
      markLoginPing,
      defaultPageId: "LevelC3",
      defaultLevel: "C",
      defaultActivityType: "lesson",
      defaultScore: 100,
      defaultStars: 1,
      defaultSkills: {
        reading: 1,
        writing: 0,
        speaking: 1,
        listening: 1
      }
    });

    function getStudentSession(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
      }catch(e){
        return null;
      }
    }

    function inferProgressMeta(payload){
      const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
      const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
      const level = (payload && payload.level)
        || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
      const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
      const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
      const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
      const month = payload && payload.month != null ? Number(payload.month) : 1;
      return {
        pageId,
        file,
        level,
        week: Number.isFinite(week) && week > 0 ? week : 1,
        month: Number.isFinite(month) && month > 0 ? month : 1
      };
    }

    function getActivityStore(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      }catch(e){
        return {};
      }
    }

    function setActivityStore(store){
      try{
        localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
      }catch(e){}
    }

    function saveLocalActivityFallback(payload){
      const session = getStudentSession() || {};
      const meta = inferProgressMeta(payload || {});
      const score = payload && typeof payload.score === "number" ? payload.score : 0;
      const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
      const tracing = payload && typeof payload.tracing === "number"
        ? payload.tracing
        : (payload && typeof payload.progress === "number" ? payload.progress : 0);
      const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
      const entry = {
        pageId: meta.pageId,
        file: meta.file,
        level: meta.level,
        type,
        activityType: (payload && payload.activityType) || type,
        score,
        stars,
        skills: payload && payload.skills ? payload.skills : {},
        completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
        tracing,
        week: meta.week,
        month: meta.month,
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
        savedAt: new Date().toISOString(),
        ts: Date.now()
      };
      const store = getActivityStore();
      store[meta.pageId] = {
        ...(store[meta.pageId] || {}),
        ...entry
      };
      setActivityStore(store);
      try{
        localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
      }catch(e){}
      return store[meta.pageId];
    }

    async function finishAndSave(payload){
      const session = getStudentSession() || {};
      const fullPayload = {
        ...(payload || {}),
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
      };

      saveLocalActivityFallback(fullPayload);

      if (typeof window.finishActivity === "function") {
        try{
          await window.finishActivity(fullPayload);
        }catch(err){
          console.warn("finishActivity failed, local fallback already saved:", err);
        }
      }

      return fullPayload;
    }

    window.finishAndSave = finishAndSave;
  </script>

  <script>
    (function(){
      const html = document.documentElement;
      const overlay = document.getElementById("gpIntroVideoOverlay");
      const video = document.getElementById("gpIntroVideo");
      const help = document.getElementById("gpIntroHelp");
      const playBtn = document.getElementById("gpIntroPlayBtn");
      const soundBtn = document.getElementById("gpIntroSoundBtn");
      const skipBtn = document.getElementById("gpIntroSkipBtn");

      if (!overlay || !video || !help || !playBtn || !soundBtn || !skipBtn) {
        html.classList.remove("gp-intro-video-pending");
        return;
      }

      let revealed = false;
      let hardTimeout = setTimeout(revealLesson, 60000);

      function revealLesson(){
        if (revealed) return;
        revealed = true;
        clearTimeout(hardTimeout);
        try { video.pause(); } catch(e){}
        overlay.classList.remove("active");
        overlay.style.display = "none";
        html.classList.remove("gp-intro-video-pending");
      }

      function showPlayFallback(msg){
        help.textContent = msg || 'Tap "Play Intro" to start the video.';
        playBtn.style.display = "inline-flex";
      }

      async function tryAutoplayMuted(){
        try{
          video.muted = true;
          video.defaultMuted = true;
          await video.play();
          help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
          playBtn.style.display = "none";
        }catch(err){
          showPlayFallback('Autoplay was blocked. Tap "Play Intro" to start.');
        }
      }

      async function playWithSound(){
        try{
          video.muted = false;
          video.defaultMuted = false;
          video.volume = 1;
          await video.play();
          help.textContent = 'Sound is on. Tap "Skip Intro" to continue.';
          playBtn.style.display = "none";
        }catch(err){
          help.textContent = 'Tap "Play Intro" first, then tap "Turn On Sound".';
          playBtn.style.display = "inline-flex";
        }
      }

      playBtn.addEventListener("click", async () => {
        try{
          video.muted = true;
          video.defaultMuted = true;
          await video.play();
          help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
          playBtn.style.display = "none";
        }catch(err){
          help.textContent = "Unable to start the intro video.";
        }
      });

      soundBtn.addEventListener("click", playWithSound);
      skipBtn.addEventListener("click", revealLesson);

      video.addEventListener("playing", () => {
        help.textContent = video.muted
          ? 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".'
          : 'Sound is on. Tap "Skip Intro" to continue.';
      });

      video.addEventListener("ended", revealLesson, { once:true });

      video.addEventListener("error", () => {
        help.textContent = "Intro video failed to load. Opening page now.";
        setTimeout(revealLesson, 800);
      }, { once:true });

      video.addEventListener("loadedmetadata", () => {
        tryAutoplayMuted();
      }, { once:true });

      setTimeout(() => {
        if (!revealed && video.readyState >= 1) tryAutoplayMuted();
      }, 1200);
    })();
  </script>
</body>
</html>

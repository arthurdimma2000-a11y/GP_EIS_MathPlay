<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Counting Sticks Lesson</title>
<style>
  :root{
    --red:#f24b5e;
    --pink:#f8b8ca;
    --soft:#fff7fb;
    --ink:#242229;
    --purple:#6c4bbf;
    --green:#23a95b;
    --gold:#ffd24a;
    --blue:#3cb7ff;
    --shadow:0 16px 34px rgba(0,0,0,.13);
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    background:#fff9ef;
    color:var(--ink);
  }

  body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:10px;
    background-image:
      linear-gradient(#f1e6d8 1px, transparent 1px),
      linear-gradient(90deg, #f1e6d8 1px, transparent 1px);
    background-size:28px 28px;
  }

  .app{
    width:min(980px,100%);
    background:#fffdf7;
    border:8px solid var(--red);
    border-radius:30px;
    box-shadow:var(--shadow);
    padding:12px;
    position:relative;
    overflow:hidden;
  }

  .home-btn{
    position:absolute;
    right:12px;
    top:10px;
    z-index:30;
    width:68px;
    height:68px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:none;
    background:transparent;
    text-decoration:none;
    transform-origin:top center;
    animation:homeSwing 2.4s ease-in-out infinite;
  }

  .home-btn img{
    width:68px;
    height:68px;
    filter:drop-shadow(0 8px 10px rgba(0,0,0,.22));
  }

  @keyframes homeSwing{
    0%{transform:translateY(25%) rotate(-6deg);}
    50%{transform:translateY(25%) rotate(8deg);}
    100%{transform:translateY(25%) rotate(-6deg);}
  }

  .poster-wrap{
    position:relative;
    width:min(879px,100%);
    margin:0 auto;
    border-radius:22px;
    overflow:hidden;
    background:#f8b8ca;
  }

  .poster-img{
    width:100%;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
  }

  .hotspot{
    position:absolute;
    z-index:5;
    border:4px solid transparent;
    border-radius:18px;
    background:rgba(255,255,255,.001);
    cursor:pointer;
    touch-action:manipulation;
    transition:transform .14s ease, border-color .14s ease, box-shadow .14s ease, background .14s ease;
  }

  .hotspot:hover,
  .hotspot.focused{
    border-color:rgba(255,210,74,.95);
    background:rgba(255,255,255,.10);
    box-shadow:0 0 0 6px rgba(255,210,74,.25), 0 10px 22px rgba(0,0,0,.18);
    transform:scale(1.012);
  }

  .hotspot.correct{
    border-color:rgba(35,169,91,.96);
    background:rgba(35,169,91,.12);
    box-shadow:0 0 0 7px rgba(35,169,91,.18), 0 0 20px rgba(35,169,91,.45);
  }

  .hotspot.wrong{
    border-color:rgba(242,75,94,.96);
    background:rgba(242,75,94,.12);
    animation:shake .32s ease;
  }

  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-8px);}
    75%{transform:translateX(8px);}
  }

  .hs-1{left:56%;top:28%;width:38%;height:8%;}
  .hs-3{left:53%;top:39%;width:42%;height:12%;}
  .hs-5{left:54%;top:53%;width:41%;height:12%;}
  .hs-8{left:53%;top:66%;width:39%;height:12%;}
  .hs-10{left:53%;top:81%;width:40%;height:11%;}

  .activity-panel{
    margin:14px auto 0;
    width:min(879px,100%);
    background:#fff8fb;
    border:3px solid #ffd1df;
    border-radius:22px;
    padding:12px;
    box-shadow:0 8px 18px rgba(0,0,0,.06);
  }

  .prompt-card{
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
    align-items:center;
    background:#fff;
    border:3px dashed #f5b3c4;
    border-radius:18px;
    padding:12px 14px;
  }

  .prompt-text{
    font-size:clamp(1.1rem,3.4vw,1.65rem);
    line-height:1.2;
    font-weight:1000;
    color:#4b3960;
  }

  .target-pill{
    min-width:92px;
    min-height:64px;
    display:grid;
    place-items:center;
    border-radius:18px;
    background:linear-gradient(180deg,#fff9d4,#ffe8a3);
    color:#8b5a00;
    font-size:clamp(1.7rem,5vw,2.5rem);
    font-weight:1000;
    box-shadow:0 6px 0 rgba(0,0,0,.13);
  }

  .progress-wrap{
    margin-top:12px;
  }

  .progress-label{
    text-align:center;
    font-weight:1000;
    color:#4b3960;
    margin-bottom:6px;
  }

  .bar{
    height:16px;
    background:#e8eef8;
    border-radius:999px;
    overflow:hidden;
    box-shadow:inset 0 2px 4px rgba(0,0,0,.12);
  }

  .fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#58c6ff,#83e79f);
    transition:width .25s ease;
  }

  .mini-progress{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:8px;
    margin-top:10px;
    text-align:center;
    font-weight:900;
    font-size:.92rem;
  }

  .mini-box{
    background:#fff;
    border:2px solid #e7edf8;
    border-radius:12px;
    padding:7px 5px;
  }

  .mini-box.done{
    border-color:#95e7b6;
    background:#effff4;
    color:#126b37;
  }

  .controls{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    margin-top:14px;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:11px 17px;
    font-size:.98rem;
    font-weight:1000;
    cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,.18);
    transition:transform .1s ease, filter .1s ease;
  }

  .btn:hover{filter:brightness(1.04);transform:translateY(-1px);}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.14);}
  .btn.primary{background:var(--red);color:#fff;}
  .btn.yellow{background:#f7dc6f;color:#8b5a00;}
  .btn.blue{background:#dfeaff;color:#1f3b6b;}
  .btn.green{background:#c9f2d6;color:#166c38;}

  .mic-icon-btn{
    position:relative;
    min-height:46px;
    min-width:46px;
    border:none;
    border-radius:999px;
    cursor:pointer;
    background:transparent;
    padding:0;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    transition:transform .12s ease, filter .12s ease, opacity .12s ease;
  }

  .mic-icon-btn:hover{transform:translateY(-1px);filter:brightness(1.03);}
  .mic-icon-btn:active{transform:translateY(2px);}
  .mic-icon-btn img{
    width:52px;
    height:52px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
  }
  .mic-icon-btn.is-busy{opacity:.7;pointer-events:none;transform:scale(.97);}

  .finger-cue{
    position:absolute;
    left:50%;
    top:-22px;
    transform:translateX(-50%);
    font-size:1.6rem;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.18));
    animation:fingerBob 1s ease-in-out infinite;
    display:none;
    pointer-events:none;
  }

  .finger-cue.show{display:block;}

  @keyframes fingerBob{
    0%,100%{transform:translateX(-50%) translateY(0);}
    50%{transform:translateX(-50%) translateY(6px);}
  }

  .status{
    margin-top:11px;
    min-height:1.5em;
    text-align:center;
    font-size:clamp(1rem,3vw,1.35rem);
    font-weight:1000;
    color:#5a3eb0;
  }

  .stars{
    text-align:center;
    min-height:1.3em;
    font-size:2.1rem;
    letter-spacing:4px;
    color:var(--gold);
    text-shadow:0 2px 0 #b87900,0 4px 0 #8a5a00,0 8px 14px rgba(0,0,0,.28);
  }

  .confetti-piece{
    position:fixed;
    top:-20px;
    width:10px;
    height:16px;
    border-radius:3px;
    z-index:9999;
    pointer-events:none;
    animation:confettiFall 1.7s linear forwards;
  }

  @keyframes confettiFall{
    to{transform:translateY(105vh) rotate(540deg);opacity:.1;}
  }

  @media(max-width:700px){
    .app{border-width:6px;padding:8px;border-radius:22px;}
    .prompt-card{grid-template-columns:1fr;text-align:center;}
    .target-pill{margin:auto;}
    .mini-progress{grid-template-columns:repeat(2,1fr);}
    .home-btn,.home-btn img{width:58px;height:58px;}
  }
</style>
</head>

  const startBtn = document.getElementById("startBtn");
  const readBtn = document.getElementById("readBtn");
  const cheerBtn = document.getElementById("cheerBtn");
  const clearBtn = document.getElementById("clearBtn");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const homeBtn = document.getElementById("homeBtn");
  const micBtn = document.getElementById("micIconBtn");
  const micFinger = document.getElementById("micFinger");

  let currentIndex = 0;
  let started = false;
  let completed = new Set();
  let completedAll = false;
  let audioCtx = null;
  let micSequenceRunning = false;

  function setStatus(text){ statusText.textContent = text || ""; }

  function pickVoice(){
    if (!("speechSynthesis" in window)) return null;
    const voices = window.speechSynthesis.getVoices() || [];
    return voices.find(v => /^en[-_]us/i.test(v.lang || "") && /jenny|aria|ava|allison|ellie|libby|olivia|serena|emma|ivy|grace|luna|nova|stella|samantha|female|girl|zira/i.test(v.name || ""))
      || voices.find(v => /^en[-_]us/i.test(v.lang || "") && !/male|boy|david|guy|michael|james|daniel|thomas|alex|mark|paul|brian|steve|kevin|eric|christopher/i.test(v.name || ""))
      || voices.find(v => /^en/i.test(v.lang || ""))
      || voices[0]
      || null;
  }

  function speak(text){
    return new Promise(resolve => {
      if (!text || !("speechSynthesis" in window)) { resolve(); return; }
      try{ window.speechSynthesis.cancel(); }catch(_){ }
      const utter = new SpeechSynthesisUtterance(String(text));
      utter.lang = "en-US";
      utter.rate = 0.9;
      utter.pitch = 1.16;
      utter.volume = 1;
      const voice = pickVoice();
      if (voice) utter.voice = voice;
      utter.onend = resolve;
      utter.onerror = resolve;
      window.speechSynthesis.speak(utter);
    });
  }

  function getAudioCtx(){
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return null;
    if (!audioCtx) audioCtx = new AudioContext();
    if (audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
    return audioCtx;
  }

  function playFallbackChime(){
    const ctx = getAudioCtx();
    if (!ctx) return;
    [660,880,1046].forEach((freq,i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.13;
      gain.gain.setValueAtTime(0.0001,t);
      gain.gain.exponentialRampToValueAtTime(0.22,t+0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001,t+0.32);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t+0.34);
    });
  }

  function playChime(){
    let played = false;
    try{
      if (chimeAudio && chimeAudio.getAttribute("src")) {
        chimeAudio.currentTime = 0;
        const attempt = chimeAudio.play();
        if (attempt && typeof attempt.then === "function") {
          attempt.then(() => { played = true; }).catch(() => {});
        }
      }
    }catch(_){ }
    setTimeout(() => { if (!played) playFallbackChime(); }, 200);
  }

  function applause(){
    const ctx = getAudioCtx();
    if (!ctx) return;
    for(let i=0;i<4;i++){
      const bufferSize = Math.floor(ctx.sampleRate * 0.08);
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for(let j=0;j<bufferSize;j++) data[j] = (Math.random()*2-1) * Math.pow(1-j/bufferSize,2);
      const noise = ctx.createBufferSource();
      const gain = ctx.createGain();
      noise.buffer = buffer;
      gain.gain.value = 0.22;
      noise.connect(gain);
      gain.connect(ctx.destination);
      noise.start(ctx.currentTime + i*0.14);
    }
  }

  function normalizeSpeech(text){
    return String(text || "")
      .toLowerCase()
      .replace(/[^a-z0-9\s]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function lineMatches(expected, heard){
    const normalizedExpected = normalizeSpeech(expected);
    const normalizedHeard = normalizeSpeech(heard);
    if (!normalizedExpected || !normalizedHeard) return false;
    if (normalizedHeard.includes(normalizedExpected)) return true;
    const words = normalizedExpected.split(" ").filter(Boolean);
    const matched = words.filter(word => normalizedHeard.includes(word)).length;
    return matched >= Math.max(2, words.length - 1);
  }

  function listenForLine(expected){
    return new Promise(resolve => {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        resolve({ supported:false, matched:false, transcript:"" });
        return;
      }

      let settled = false;
      let timeoutId = 0;
      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      const finish = result => {
        if (settled) return;
        settled = true;
        if (timeoutId) window.clearTimeout(timeoutId);
        try { recognition.stop(); } catch(_) {}
        resolve(result);
      };

      recognition.onresult = event => {
        const transcript = Array.from(event.results || [])
          .map(result => result[0] && result[0].transcript ? result[0].transcript : "")
          .join(" ")
          .trim();
        finish({
          supported:true,
          transcript,
          matched:lineMatches(expected, transcript)
        });
      };

      recognition.onerror = () => finish({ supported:true, matched:false, transcript:"" });
      recognition.onnomatch = () => finish({ supported:true, matched:false, transcript:"" });
      recognition.onend = () => finish({ supported:true, matched:false, transcript:"" });

      try {
        recognition.start();
        timeoutId = window.setTimeout(() => {
          finish({ supported:true, matched:false, transcript:"" });
        }, 5000);
      } catch(_) {
        finish({ supported:true, matched:false, transcript:"" });
      }
    });
  }

  async function runRepeatAfterMe(){
    if (micSequenceRunning) return;
    micSequenceRunning = true;
    micBtn.classList.add("is-busy");
    micFinger.classList.remove("show");
    getAudioCtx();

    const sequence = counts.map(count => lines[count]);
    await speak("Repeat after me. Listen carefully and say each sentence.");

    for (let i = 0; i < sequence.length; i++) {
      const expected = sequence[i];
      setStatus("Repeat after me: " + expected);
      await speak("Repeat after me. " + expected);

      let success = false;
      for (let attempt = 0; attempt < 2 && !success; attempt++) {
        const result = await listenForLine(expected);
        if (!result.supported) {
          setStatus("Microphone listening is not supported here. Please say: " + expected);
          await speak("Please say: " + expected);
          success = true;
          break;
        }
        if (result.matched) {
          success = true;
          playChime();
          setStatus("Good job. " + expected);
          await speak("Good job.");
        } else if (attempt === 0) {
          setStatus("Try again. Say: " + expected);
          await speak("Try again. " + expected);
        }
      }
    }

    setStatus("Repeat after me is finished. Great speaking.");
    await speak("Repeat after me is finished. Great speaking.");
    micBtn.classList.remove("is-busy");
    micSequenceRunning = false;
  }

  function confetti(){
    const colors = ["#f24b5e","#ffd24a","#58c6ff","#83e79f","#f7a6c9","#9ed06a"];
    for(let i=0;i<36;i++){
      const piece = document.createElement("div");
      piece.className = "confetti-piece";
      piece.style.left = Math.random()*100 + "vw";
      piece.style.background = colors[Math.floor(Math.random()*colors.length)];
      piece.style.animationDelay = Math.random()*0.35 + "s";
      piece.style.transform = "rotate(" + Math.random()*180 + "deg)";
      document.body.appendChild(piece);
      piece.addEventListener("animationend", () => piece.remove());
    }
  }

  function updateProgress(){
    const pct = Math.round((completed.size / counts.length) * 100);
    progressText.textContent = pct + "%";
    progressFill.style.width = pct + "%";

    document.querySelectorAll(".mini-box").forEach(box => box.classList.remove("done"));
    completed.forEach(count => {
      const box = document.getElementById("box" + count);
      if (box) box.classList.add("done");
    });

    if (pct >= 100) starsEl.textContent = "⭐ ⭐ ⭐";
    else if (pct >= 60) starsEl.textContent = "⭐ ⭐";
    else if (pct >= 20) starsEl.textContent = "⭐";
    else starsEl.textContent = "";

    saveProgress(pct);
  }

  function saveProgress(score){
    try{
      const store = JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      store[PAGE_ID] = {
        pageId:PAGE_ID,
        file:PAGE_ID + ".html",
        level,
        type:"lesson",
        activityType:"counting",
        score,
        stars:score >= 100 ? 3 : score >= 60 ? 2 : score >= 20 ? 1 : 0,
        completed:score >= 100,
        skills:{reading:1,writing:0,speaking:1,listening:1},
        savedAt:new Date().toISOString(),
        ts:Date.now()
      };
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store));
      localStorage.setItem("GP_EIS_LAST_FILE", PAGE_ID + ".html");
    }catch(_){ }
  }

  function focusCurrentHotspot(){
    hotspots.forEach(h => h.classList.remove("focused"));
    if (!started || completedAll) return;
    const target = counts[currentIndex];
    const el = hotspots.find(h => Number(h.dataset.count) === target);
    if (el) el.classList.add("focused");
    targetPill.textContent = target;
    promptText.textContent = "Find and tap: " + lines[target];
  }

  async function startLesson(){
    getAudioCtx();
    started = true;
    completedAll = false;
    currentIndex = 0;
    setStatus("Listen and tap the correct stick group.");
    focusCurrentHotspot();
    await speak("What can I count? Let us count sticks. Find and tap the group that says: " + lines[counts[currentIndex]]);
  }

  async function readPoster(){
    getAudioCtx();
    setStatus("Reading the poster.");
    await speak("Counting Sticks. Playing with sticks. What can I count?");
    for(const count of counts){
      await speak(lines[count]);
    }
    await speak("I can count sticks.");
    setStatus(started ? "Now tap the correct stick group." : "Tap Start Lesson to play.");
  }

  async function handleHotspotTap(el){
    getAudioCtx();
    if (!started) {
      await startLesson();
      return;
    }

    const tapped = Number(el.dataset.count);
    const target = counts[currentIndex];

    if (tapped !== target) {
      el.classList.add("wrong");
      setTimeout(() => el.classList.remove("wrong"), 400);
      setStatus("Oops! Try again. Find " + target + " stick" + (target === 1 ? "." : "s."));
      await speak("Oops, try again. Find " + lines[target]);
      return;
    }

    el.classList.add("correct");
    completed.add(tapped);
    updateProgress();
    playChime();
    setStatus("Correct! " + lines[tapped]);
    await speak("Correct! " + lines[tapped]);

    currentIndex += 1;
    if (currentIndex >= counts.length) {
      completedAll = true;
      hotspots.forEach(h => h.classList.remove("focused"));
      promptText.textContent = "I can count sticks.";
      targetPill.textContent = "✓";
      applause();
      confetti();
      playChime();
      setStatus("Wow! You are super smart! You can count sticks.");
      await speak("Wow! You are super smart! I can count sticks.");
      return;
    }

    focusCurrentHotspot();
    const next = counts[currentIndex];
    await speak("Now find " + lines[next]);
  }

  function resetLesson(){
    try{ if ("speechSynthesis" in window) window.speechSynthesis.cancel(); }catch(_){ }
    completed = new Set();
    currentIndex = 0;
    started = false;
    completedAll = false;
    hotspots.forEach(h => h.classList.remove("correct","wrong","focused"));
    promptText.textContent = "Tap Start. Then find and tap the correct stick group.";
    targetPill.textContent = "1";
    setStatus("Lesson cleared. Tap Start Lesson.");
    updateProgress();
  }

  hotspots.forEach(el => el.addEventListener("click", () => handleHotspotTap(el)));
  startBtn.addEventListener("click", startLesson);
  readBtn.addEventListener("click", readPoster);
  cheerBtn.addEventListener("click", () => {
    getAudioCtx();
    applause();
    confetti();
    playChime();
    setStatus("You can do it! Great counting!");
    speak("You can do it! Great counting!");
  });
  clearBtn.addEventListener("click", resetLesson);
  micBtn.addEventListener("click", runRepeatAfterMe);
  prevBtn.addEventListener("click", () => { window.location.href = "../Monday/Bk2ArtClassC.html"; });
  nextBtn.addEventListener("click", () => { window.location.href = "../Wednesday/Bk2LC3.html"; });
  homeBtn.addEventListener("click", () => { try{ if ("speechSynthesis" in window) window.speechSynthesis.cancel(); }catch(_){ } });

  if ("speechSynthesis" in window) window.speechSynthesis.onvoiceschanged = () => {};

  window.addEventListener("load", () => {
    updateProgress();
    setTimeout(() => {
      speak("Welcome! This page is Counting Sticks. Listen carefully. Tap Start Lesson, then find each stick group: one stick, three sticks, five sticks, eight sticks, and ten sticks.");
    }, 500);
  }, {once:true});
})();
</script>

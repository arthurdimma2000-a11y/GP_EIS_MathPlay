<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Counting Sticks - Trace the Numbers</title>
<style>
  :root{
    --red:#f24b5e;
    --pink:#f7b8c8;
    --card:#fffdf7;
    --ink:#28242a;
    --purple:#aa3cae;
    --orange:#ff8c20;
    --brown:#71431f;
    --blue:#058aac;
    --green:#2f9f5f;
    --gold:#ffd24a;
    --shadow:0 16px 34px rgba(0,0,0,.14);
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#fff9ef;color:var(--ink);}
  body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:10px;
    background-image:
      linear-gradient(#f2e7da 1px, transparent 1px),
      linear-gradient(90deg, #f2e7da 1px, transparent 1px);
    background-size:28px 28px;
  }
  .app{
    width:min(980px,100%);
    background:var(--card);
    border:8px solid var(--red);
    border-radius:30px;
    padding:14px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
  }
  .home-btn{
    position:absolute;right:14px;top:14px;z-index:30;
    width:64px;height:64px;border-radius:18px;border:none;background:#fff;
    display:flex;align-items:center;justify-content:center;text-decoration:none;
    box-shadow:0 8px 16px rgba(0,0,0,.18);animation:homeSwing 2.4s ease-in-out infinite;
  }
  .home-btn img{width:54px;height:54px;object-fit:contain;}
  @keyframes homeSwing{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(6deg)}}
  .poster-wrap{position:relative;width:min(886px,100%);margin:0 auto;}
  .poster-img{display:block;width:100%;height:auto;user-select:none;-webkit-user-drag:none;border-radius:18px;}
  .trace-box{
    position:absolute;
    z-index:8;
    border:3px solid rgba(242,75,94,.72);
    background:rgba(255,255,255,.88);
    border-radius:10px;
    box-shadow:0 5px 14px rgba(0,0,0,.10);
    touch-action:none;
  }
  .trace-box.is-active{outline:4px solid rgba(255,210,74,.55);box-shadow:0 0 0 7px rgba(255,210,74,.18),0 8px 18px rgba(0,0,0,.12);}
  .trace-box.is-done{border-color:#20a95a;background:rgba(232,255,238,.92);}
  .trace-svg,.trace-canvas{position:absolute;inset:0;width:100%;height:100%;}
  .trace-svg{pointer-events:none;z-index:1;}
  .trace-canvas{z-index:2;touch-action:none;cursor:crosshair;border-radius:8px;}
  .trace-box .label-mini{
    position:absolute;left:50%;top:-21px;transform:translateX(-50%);
    white-space:nowrap;font-weight:1000;font-size:clamp(.7rem,1.7vw,.95rem);
    color:#e03245;background:#fff;border:2px solid #ffd1df;border-radius:999px;padding:1px 8px;
    box-shadow:0 3px 8px rgba(0,0,0,.10);
  }
  /* Number tracing boxes shifted left so they do not cover the first letters of the words. */
  .box-match{left:17.2%;top:39.4%;width:8.3%;height:6.6%;}
  .box-wood{left:51.9%;top:39.4%;width:7.8%;height:6.6%;}
  .box-craft{left:17.2%;top:64.4%;width:7.8%;height:6.6%;}
  .box-twig{left:59.2%;top:64.4%;width:7.8%;height:6.6%;}
  .box-tooth{left:36.5%;top:88.1%;width:7.8%;height:6.6%;}
  .panel{
    width:min(886px,100%);
    margin:12px auto 0;
    background:#fff8fb;
    border:3px solid #ffd1df;
    border-radius:20px;
    padding:12px;
    box-shadow:0 8px 18px rgba(0,0,0,.06);
  }
  .progress-title{font-weight:1000;text-align:center;color:#4b3960;font-size:clamp(1rem,2.5vw,1.25rem);}
  .bar{height:18px;background:#e7efff;border-radius:999px;overflow:hidden;box-shadow:inset 0 2px 5px rgba(0,0,0,.12);margin:8px auto;width:min(720px,96%);}
  .fill{height:100%;width:0%;background:linear-gradient(90deg,#58c6ff,#83e79f);transition:width .18s ease;}
  .mini-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px;}
  .mini{text-align:center;background:#fff;border:2px solid #e7edf8;border-radius:14px;padding:7px;font-weight:1000;font-size:.9rem;}
  .mini span{color:var(--green);}
  .stars{text-align:center;min-height:1.4em;color:var(--gold);font-size:2rem;letter-spacing:3px;text-shadow:0 2px 0 #b87900,0 4px 0 #8a5a00,0 8px 14px rgba(0,0,0,.28);}
  .controls{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;}
  .btn{
    border:none;border-radius:999px;padding:11px 17px;font-size:clamp(.9rem,2.3vw,1rem);
    font-weight:1000;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.18);
    transition:transform .1s ease,filter .1s ease;
  }
  .btn:hover{filter:brightness(1.04);transform:translateY(-1px);}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.14);}
  .btn.read{background:var(--red);color:#fff;}
  .btn.cheer{background:#c9f2d6;color:#166c38;}
  .btn.clear{background:#dfeaff;color:#1f3b6b;}
  .btn.nav{background:#f7dc6f;color:#8b5a00;}
  .status{margin-top:10px;text-align:center;min-height:1.5em;font-size:clamp(1rem,2.7vw,1.3rem);font-weight:1000;color:#5a3eb0;}
  .hint{text-align:center;color:#666;font-size:.92rem;margin-top:5px;font-weight:700;}
  .confetti-piece{position:fixed;top:-20px;width:10px;height:16px;border-radius:3px;z-index:9999;pointer-events:none;animation:confettiFall 1.7s linear forwards;}
  @keyframes confettiFall{to{transform:translateY(105vh) rotate(540deg);opacity:.1;}}
  @media(max-width:720px){
    body{padding:6px;}
    .app{border-width:6px;padding:8px;border-radius:22px;}
    .home-btn{width:52px;height:52px;right:8px;top:8px;}
    .home-btn img{width:44px;height:44px;}
    .mini-grid{grid-template-columns:repeat(2,1fr);}
    .trace-box{border-width:2px;}
    .trace-box .label-mini{display:none;}
    /* Keep each number box away from the word label on small screens too. */
    .box-match{left:16.6%;width:8.4%;}
    .box-wood{left:51.2%;width:7.8%;}
    .box-craft{left:16.6%;width:7.8%;}
    .box-twig{left:58.7%;width:7.8%;}
    .box-tooth{left:35.8%;width:7.8%;}
  }
</style>
</head>

  let lastTick = 0;

  function setStatus(text){ statusEl.textContent = text || ''; }

  function getAudioCtx(){
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return null;
    if (!audioCtx) audioCtx = new AudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
    return audioCtx;
  }

  function pickVoice(){
    if (!('speechSynthesis' in window)) return null;
    const voices = window.speechSynthesis.getVoices() || [];
    const female = /jenny|aria|ava|allison|ellie|libby|olivia|emma|ivy|samantha|serena|zira|female|girl/i;
    const male = /david|guy|michael|james|daniel|thomas|mark|paul|brian|steve|kevin|eric|male|boy/i;
    return voices.find(v => /^en[-_]us/i.test(v.lang || '') && female.test(v.name || ''))
      || voices.find(v => /^en[-_]us/i.test(v.lang || '') && !male.test(v.name || ''))
      || voices.find(v => /^en/i.test(v.lang || '') && female.test(v.name || ''))
      || voices.find(v => /^en/i.test(v.lang || ''))
      || voices[0]
      || null;
  }

  function speak(text, callback){
    if (!text || !('speechSynthesis' in window)) { if (callback) callback(); return; }
    try { window.speechSynthesis.cancel(); } catch(_) {}
    const u = new SpeechSynthesisUtterance(String(text));
    u.lang = 'en-US';
    u.rate = 0.88;
    u.pitch = 1.16;
    u.volume = 1;
    const voice = pickVoice();
    if (voice) u.voice = voice;
    u.onend = () => callback && callback();
    u.onerror = () => callback && callback();
    window.speechSynthesis.speak(u);
  }

  function playChime(){
    let played = false;
    try {
      chimeAudio.currentTime = 0;
      const p = chimeAudio.play();
      if (p && typeof p.then === 'function') p.then(() => { played = true; }).catch(() => {});
    } catch(_) {}
    window.setTimeout(() => {
      if (played) return;
      const ctx = getAudioCtx();
      if (!ctx) return;
      [660, 880, 1046].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.13;
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.22, t + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.33);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(t); osc.stop(t + 0.34);
      });
    }, 180);
  }

  function playTick(){
    const now = performance.now();
    if (now - lastTick < 70) return;
    lastTick = now;
    const ctx = getAudioCtx();
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = 980;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.045, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.08);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.09);
  }

  function clap(){
    const ctx = getAudioCtx();
    if (!ctx) return;
    for (let i = 0; i < 4; i++) {
      const len = Math.floor(ctx.sampleRate * 0.08);
      const buffer = ctx.createBuffer(1, len, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let j = 0; j < len; j++) data[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / len, 2);
      const src = ctx.createBufferSource();
      const gain = ctx.createGain();
      src.buffer = buffer;
      gain.gain.value = 0.22;
      src.connect(gain); gain.connect(ctx.destination);
      src.start(ctx.currentTime + i * 0.14);
    }
  }

  function confetti(){
    const colors = ['#f24b5e','#ffd24a','#58c6ff','#83e79f','#f7a6c9','#9ed06a','#ff8c20'];
    for (let i = 0; i < 38; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDelay = (Math.random() * .35) + 's';
      piece.style.transform = 'rotate(' + (Math.random() * 180) + 'deg)';
      document.body.appendChild(piece);
      piece.addEventListener('animationend', () => piece.remove());
    }
  }

  function addLine(list, x1, y1, x2, y2, steps){
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      list.push({ x:x1 + (x2 - x1) * t, y:y1 + (y2 - y1) * t });
    }
  }
  function addEllipse(list, cx, cy, rx, ry, start, end, steps){
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const a = start + (end - start) * t;
      list.push({ x:cx + Math.cos(a) * rx, y:cy + Math.sin(a) * ry });
    }
  }
  function digitPointsOne(digit){
    const p = [];
    const PI = Math.PI;
    switch(String(digit)){
      case '0': addEllipse(p,.50,.52,.30,.37,0,PI*2,96); break;
      case '1': addLine(p,.36,.28,.52,.16,18); addLine(p,.52,.16,.52,.86,76); addLine(p,.36,.86,.70,.86,24); break;
      case '2': addEllipse(p,.50,.31,.27,.19,PI*1.05,PI*2.10,54); addLine(p,.74,.36,.28,.84,70); addLine(p,.28,.84,.76,.84,38); break;
      case '3': addEllipse(p,.48,.32,.27,.18,PI*1.12,PI*2.72,64); addEllipse(p,.47,.67,.29,.20,PI*1.45,PI*2.86,64); break;
      case '4': addLine(p,.70,.15,.70,.88,76); addLine(p,.26,.58,.78,.58,45); addLine(p,.26,.58,.64,.15,56); break;
      case '5': addLine(p,.72,.17,.32,.17,36); addLine(p,.32,.17,.32,.46,32); addEllipse(p,.50,.64,.28,.22,PI*1.15,PI*2.85,70); break;
      case '6': addEllipse(p,.52,.62,.28,.25,0,PI*2,86); addEllipse(p,.55,.38,.30,.30,PI*.92,PI*1.85,45); break;
      case '7': addLine(p,.24,.18,.78,.18,48); addLine(p,.78,.18,.43,.88,82); break;
      case '8': addEllipse(p,.50,.34,.25,.20,0,PI*2,72); addEllipse(p,.50,.68,.30,.24,0,PI*2,86); break;
      case '9': addEllipse(p,.50,.36,.28,.24,0,PI*2,82); addLine(p,.70,.36,.40,.88,74); break;
      default: break;
    }
    return p;
  }

  function numberPoints(numberText){
    const chars = String(numberText).split('');
    const out = [];
    const gap = chars.length > 1 ? 0.06 : 0;
    const charW = chars.length > 1 ? (1 - gap) / 2 : 1;
    chars.forEach((ch, idx) => {
      const left = chars.length > 1 ? idx * (charW + gap) : 0;
      digitPointsOne(ch).forEach(pt => {
        out.push({ x:left + pt.x * charW, y:pt.y });
      });
    });
    return out;
  }

  function renderDots(svg, numberText){
    const pts = numberPoints(numberText);
    svg.setAttribute('viewBox','0 0 100 100');
    svg.innerHTML = '';
    pts.forEach((pt, i) => {
      if (i % 3 !== 0) return;
      const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx', (pt.x * 100).toFixed(2));
      c.setAttribute('cy', (pt.y * 100).toFixed(2));
      c.setAttribute('r', '2.55');
      c.setAttribute('fill', '#888');
      c.setAttribute('opacity', '.92');
      svg.appendChild(c);
    });
  }

  function createTracePad(box, index){
    const numberText = box.dataset.number;
    const name = box.dataset.name || numberText;
    const svg = box.querySelector('.trace-svg');
    const canvas = box.querySelector('.trace-canvas');
    const state = { points:[], visited:[], drawing:false, last:null, progress:0, completed:false, milestone:false };
    let ctx;

    function resize(){
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.max(70, Math.round(rect.width * dpr));
      canvas.height = Math.max(70, Math.round(rect.height * dpr));
      ctx = canvas.getContext('2d');
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#2367d9';
      ctx.lineWidth = Math.max(7, Math.min(rect.width, rect.height) * .09);
      const pts = numberPoints(numberText);
      state.points = pts.map(pt => ({ x:pt.x * rect.width, y:pt.y * rect.height }));
      state.visited = new Array(state.points.length).fill(false);
      state.progress = 0;
      state.completed = false;
      state.milestone = false;
      ctx.clearRect(0,0,rect.width,rect.height);
      renderDots(svg, numberText);
    }

    function getPoint(ev){
      const rect = canvas.getBoundingClientRect();
      return { x:ev.clientX - rect.left, y:ev.clientY - rect.top };
    }

    function mark(point){
      const rect = canvas.getBoundingClientRect();
      const threshold = Math.max(13, Math.min(rect.width, rect.height) * .12);
      const t2 = threshold * threshold;
      let changed = false;
      for (let i = 0; i < state.points.length; i++) {
        if (state.visited[i]) continue;
        const dx = state.points[i].x - point.x;
        const dy = state.points[i].y - point.y;
        if (dx*dx + dy*dy <= t2) { state.visited[i] = true; changed = true; }
      }
      if (changed) {
        state.progress = Math.round((state.visited.filter(Boolean).length / Math.max(1, state.visited.length)) * 100);
        if (state.progress >= 45 && !state.milestone) {
          state.milestone = true;
          setStatus('Good job! Keep tracing number ' + numberText + '.');
          speak('Good job! Keep tracing.');
        }
        if (state.progress >= 88 && !state.completed) {
          state.completed = true;
          box.classList.add('is-done');
          playChime();
          clap();
          setStatus('Amazing! You traced ' + numberText + ' for ' + name + '.');
          speak('Amazing! You traced number ' + numberText + '.');
        }
        updateOverall();
      }
    }

    function start(ev){
      ev.preventDefault(); getAudioCtx(); box.classList.add('is-active');
      state.drawing = true; state.last = getPoint(ev); mark(state.last);
    }
    function move(ev){
      if (!state.drawing) return;
      ev.preventDefault();
      const p = getPoint(ev);
      ctx.beginPath(); ctx.moveTo(state.last.x, state.last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
      playTick(); state.last = p; mark(p);
    }
    function end(){ state.drawing = false; state.last = null; box.classList.remove('is-active'); updateOverall(); }

    canvas.addEventListener('pointerdown', start, { passive:false });
    canvas.addEventListener('pointermove', move, { passive:false });
    window.addEventListener('pointerup', end, { passive:true });
    canvas.addEventListener('touchstart', function(ev){ if(ev.touches && ev.touches[0]) start(ev.touches[0]); ev.preventDefault(); }, { passive:false });
    canvas.addEventListener('touchmove', function(ev){ if(ev.touches && ev.touches[0]) move(ev.touches[0]); ev.preventDefault(); }, { passive:false });
    window.addEventListener('touchend', end, { passive:true });

    resize();
    return {
      numberText, name,
      get progress(){ return state.progress; },
      reset(){ box.classList.remove('is-done','is-active'); resize(); updateOverall(); },
      resize
    };
  }

  function buildMiniGrid(){
    miniGrid.innerHTML = '';
    traceBoxes.forEach(box => {
      const div = document.createElement('div');
      div.className = 'mini';
      div.id = 'mini-' + box.dataset.id;
      div.innerHTML = box.dataset.number + ' ' + box.dataset.name + ': <span>0%</span>';
      miniGrid.appendChild(div);
    });
  }

  function saveProgress(score){
    try {
      const store = JSON.parse(localStorage.getItem('GP_EIS_ACTIVITY_RESULTS') || '{}');
      store[PAGE_ID] = {
        pageId:PAGE_ID,
        file:PAGE_ID + '.html',
        level:'A',
        week:1,
        month:1,
        type:'tracing',
        activityType:'lesson',
        score:Math.round(score),
        tracing:Math.round(score),
        stars:score >= 95 ? 3 : score >= 70 ? 2 : score >= 40 ? 1 : 0,
        completed:score >= 95,
        skills:{reading:1,writing:score >= 95 ? 3 : score >= 70 ? 2 : score > 0 ? 1 : 0,listening:1,speaking:1},
        savedAt:new Date().toISOString(),
        ts:Date.now()
      };
      localStorage.setItem('GP_EIS_ACTIVITY_RESULTS', JSON.stringify(store));
      localStorage.setItem('GP_EIS_LAST_FILE', PAGE_ID + '.html');
    } catch(_) {}
  }

  function updateOverall(){
    pads.forEach(pad => {
      const el = document.querySelector('#mini-' + pad.name.replace(/\s+/g,'').replace(/[^a-z0-9]/ig,'') + ' span');
    });
    traceBoxes.forEach((box, i) => {
      const mini = document.getElementById('mini-' + box.dataset.id);
      if (mini) mini.querySelector('span').textContent = (pads[i]?.progress || 0) + '%';
    });
    const total = pads.reduce((sum, pad) => sum + pad.progress, 0);
    const overall = Math.round(total / Math.max(1, pads.length));
    overallPercent.textContent = overall + '%';
    overallFill.style.width = overall + '%';
    starsEl.textContent = overall >= 95 ? '⭐ ⭐ ⭐' : overall >= 70 ? '⭐ ⭐' : overall >= 40 ? '⭐' : '';
    saveProgress(overall);
    if (overall >= 95 && !completedAll) {
      completedAll = true;
      playChime(); clap(); confetti();
      setStatus('Wow! You traced all the dotted numbers. You are super smart!');
      speak('Wow! You traced all the dotted numbers. You are super smart!');
    } else if (overall < 95) {
      completedAll = false;
      if (overall > 0) setStatus('Keep tracing each dotted digital number.');
    }
  }

  function startLesson(){
    getAudioCtx();
    setStatus('Listen carefully.');
    speak('Welcome to Counting Sticks. I have sticks. Count the different sticks. Trace the big dotted digital numbers. Trace 10 for matchsticks, 6 for wooden sticks, 8 for craft sticks, 4 for twigs, and 9 for toothpicks.');
  }

  function readPoster(){
    getAudioCtx();
    speak('Counting Sticks. I have sticks. Count the different sticks. 10 matchsticks. 6 wooden sticks. 8 craft sticks. 4 twigs. 9 toothpicks.');
  }

  buildMiniGrid();
  pads = traceBoxes.map((box, index) => createTracePad(box, index));
  updateOverall();

  startBtn.addEventListener('click', startLesson);
  readBtn.addEventListener('click', readPoster);
  cheerBtn.addEventListener('click', () => { getAudioCtx(); playChime(); clap(); confetti(); setStatus('You can do it! Great tracing!'); speak('You can do it! Great tracing!'); });
  clearBtn.addEventListener('click', () => { completedAll = false; pads.forEach(p => p.reset()); starsEl.textContent = ''; setStatus('Cleared. Start tracing again.'); speak('Cleared. Start tracing again.'); });
  prevBtn.addEventListener('click', () => { try { window.speechSynthesis.cancel(); } catch(_) {} window.location.href = '../Tuesday/Bk2LC2.html'; });
  nextBtn.addEventListener('click', () => { try { window.speechSynthesis.cancel(); } catch(_) {} window.location.href = 'Bk2LC7.html'; });
  if (homeBtn) homeBtn.addEventListener('click', () => { try { window.speechSynthesis.cancel(); } catch(_) {} });
  window.addEventListener('resize', () => { pads.forEach(p => p.resize()); updateOverall(); });
  if ('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged = () => {};
  window.addEventListener('load', () => window.setTimeout(startLesson, 600), { once:true });
  window.addEventListener('beforeunload', () => { try { window.speechSynthesis.cancel(); } catch(_) {} });
})();
</script>

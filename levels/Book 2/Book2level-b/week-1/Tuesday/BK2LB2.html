<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Horizontal Lines - Shopping Lesson</title>
<style>
  :root{
    --red:#f24b5e;
    --green:#70c36f;
    --dark:#25222a;
    --card:#fffdf8;
    --gold:#ffd24a;
    --good:#19a85d;
    --purple:#6c4bbf;
    --blue:#dfeaff;
    --orange:#ff8a5b;
    --shadow:0 14px 32px rgba(0,0,0,.14);
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;color:var(--dark);background:#fff9ef;}
  body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:10px;
    background-image:linear-gradient(#f3e8d8 1px,transparent 1px),linear-gradient(90deg,#f3e8d8 1px,transparent 1px);
    background-size:28px 28px;
  }
  .app{width:min(980px,100%);background:var(--card);border:6px solid var(--red);border-radius:28px;box-shadow:var(--shadow);padding:12px;position:relative;overflow:hidden;}
  .top-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
  .title-pill{background:#fff;border:4px solid var(--red);border-radius:999px;padding:8px 14px;font-size:clamp(1.05rem,3vw,1.55rem);font-weight:1000;color:var(--red);box-shadow:0 6px 0 rgba(242,75,94,.18);}
  .home-btn{
    position:absolute;
    top:14px;
    right:14px;
    z-index:20;
    width:78px;
    transform-origin:top center;
    animation:homeSwing 3.2s ease-in-out infinite;
  }
  .home-btn img{display:block;width:100%;}
  .poster-wrap{position:relative;width:min(860px,100%);margin:0 auto;border-radius:18px;overflow:hidden;background:#70c36f;}
  .poster-img{width:100%;height:auto;display:block;user-select:none;-webkit-user-drag:none;}
  .line-zone{position:absolute;left:39.5%;width:52.5%;height:4.5%;border-radius:999px;cursor:pointer;z-index:6;background:rgba(255,255,255,.001);touch-action:manipulation;}
  .line-zone::after{content:"";position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:8px;border-radius:999px;background:transparent;transition:.2s ease;}
  .line-zone:hover::after{background:rgba(255,255,255,.35);box-shadow:0 0 0 3px rgba(255,255,255,.5);}
  .line-zone.found::after{background:linear-gradient(90deg,#00c853,#a8ff78);box-shadow:0 0 0 4px rgba(0,200,83,.18),0 0 20px rgba(0,200,83,.7);animation:linePulse .9s ease-in-out infinite;}
  .zone1{top:44.1%;}
  .zone2{top:53.6%;}
  .zone3{top:63.0%;}
  .zone4{top:70.3%;}
  @keyframes linePulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.25);}}
  .conversation-panel{margin:12px auto 0;width:min(860px,100%);display:grid;gap:10px;background:linear-gradient(180deg,#fff,#fff9e9);border:3px dashed rgba(108,75,191,.35);border-radius:18px;padding:12px;}
  .convo-line{display:none;align-items:flex-start;justify-content:flex-start;}
  .convo-line.show{display:flex;}
  .convo-line.right{justify-content:flex-end;}
  .bubble-stack{max-width:min(100%,520px);display:grid;gap:5px;}
  .convo-line.right .bubble-stack{justify-items:end;}
  .bubble{font-size:clamp(1.05rem,3vw,1.55rem);line-height:1.25;font-weight:1000;padding:12px 16px;border-radius:22px;box-shadow:0 8px 16px rgba(0,0,0,.12);background:#fff;position:relative;}
  .bubble.pink{border:4px solid #f24b8a;}
  .bubble.yellow{border:4px solid #ffca3a;}
  .bubble.green{border:4px solid #78bd43;}
  .bubble.sparkle{background:linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);box-shadow:0 0 12px rgba(255,214,0,.75),0 0 22px rgba(255,105,180,.45),0 10px 20px rgba(0,0,0,.18);animation:sparklePulse 1s ease-in-out infinite;}
  @keyframes sparklePulse{0%,100%{filter:brightness(1);transform:scale(1);}50%{filter:brightness(1.16);transform:scale(1.02);}}
  .repeat-result{min-height:1.2em;font-size:clamp(1rem,2.5vw,1.25rem);font-weight:1000;color:#169b55;}
  .try-message{min-height:1.2em;font-size:clamp(.95rem,2.4vw,1.1rem);font-weight:1000;color:#c62828;}
  .star-row{min-height:1.2em;font-size:clamp(1.25rem,3.2vw,1.8rem);letter-spacing:3px;color:var(--gold);text-shadow:0 2px 0 #b87900,0 4px 0 #8a5a00,0 8px 14px rgba(0,0,0,.25);}
  .progress-card{margin:12px auto 0;width:min(860px,100%);background:#fff8fb;border:3px solid #ffd1df;border-radius:18px;padding:12px;display:grid;gap:8px;}
  .progress-label{text-align:center;font-weight:1000;color:#4b3960;font-size:clamp(1rem,2.6vw,1.2rem);}
  .bar{height:16px;background:#e8eef8;border-radius:999px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.12);}
  .fill{height:100%;width:0%;background:linear-gradient(90deg,#58c6ff,#83e79f);transition:width .25s ease;}
  .controls{width:min(860px,100%);margin:12px auto 0;display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;}
  .btn,.mic-icon-btn{border:none;border-radius:999px;min-height:46px;padding:10px 16px;font-size:.98rem;font-weight:1000;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.16);transition:transform .1s ease,filter .1s ease;}
  .btn:hover,.mic-icon-btn:hover{filter:brightness(1.04);transform:translateY(-1px);}
  .btn:active,.mic-icon-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.14);}
  .btn.prev,.btn.next{background:#f7dc6f;color:#8b5a00;}
  .btn.read{background:var(--orange);color:#fff;}
  .btn.clear{background:var(--blue);color:#1f3b6b;}
  .btn.cheer{background:#c9f2d6;color:#166c38;}
  .mic-icon-btn{background:#fff;padding:6px 12px;display:inline-flex;align-items:center;gap:8px;color:#4b3960;}
  .mic-icon-btn img{width:42px;height:42px;display:block;}
  .mic-icon-btn.is-busy{opacity:.7;pointer-events:none;}
  .status{width:min(860px,100%);margin:10px auto 0;text-align:center;min-height:1.5em;font-size:clamp(1rem,3vw,1.35rem);font-weight:1000;color:#5a3eb0;}
  .stars-overall{text-align:center;min-height:1.3em;font-size:2rem;letter-spacing:4px;color:var(--gold);text-shadow:0 2px 0 #b87900,0 4px 0 #8a5a00,0 8px 14px rgba(0,0,0,.25);}
  .confetti-piece{position:fixed;top:-20px;width:10px;height:16px;border-radius:3px;z-index:9999;pointer-events:none;animation:confettiFall 1.7s linear forwards;}
  @keyframes homeSwing{0%,100%{transform:rotate(0deg);}25%{transform:rotate(7deg);}75%{transform:rotate(-7deg);}}
  @keyframes confettiFall{to{transform:translateY(105vh) rotate(540deg);opacity:.1;}}
  @media(max-width:620px){.app{border-width:5px;padding:9px;}.controls{gap:8px;}.btn,.mic-icon-btn{font-size:.88rem;padding:9px 12px;}.home-btn{position:static;display:block;margin:0 0 8px auto;}}
</style>
</head>

  const chimeAudio = document.getElementById('chimeAudio');
  const lineZones = Array.from(document.querySelectorAll('.line-zone'));
  const lineProgressText = document.getElementById('lineProgressText');
  const lineProgressFill = document.getElementById('lineProgressFill');
  const overallStars = document.getElementById('overallStars');

  const lineEls = Array.from(document.querySelectorAll('.convo-line'));
  const bubbleEls = lineEls.map(line => line.querySelector('.bubble'));
  const resultEls = lineEls.map(line => line.querySelector('.repeat-result'));
  const tryEls = lineEls.map(line => line.querySelector('.try-message'));
  const starEls = lineEls.map(line => line.querySelector('.star-row'));

  let audioCtx = null;
  let foundLines = new Set();
  let activityCelebrated = false;
  let recognitionToken = 0;
  const micState = {index:0,phase:'reveal',attempts:new Array(CONFIG.micLines.length).fill(0),stars:new Array(CONFIG.micLines.length).fill(0),busy:false,done:false};

  function setStatus(text){ statusText.textContent = text || ''; }
  function getAudioCtx(){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return null;
    if(!audioCtx) audioCtx = new AC();
    if(audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
    return audioCtx;
  }
  function pickVoice(){
    if(!('speechSynthesis' in window)) return null;
    const voices = window.speechSynthesis.getVoices() || [];
    return voices.find(v => /^en[-_]us/i.test(v.lang||'') && /jenny|aria|ava|allison|ellie|libby|olivia|emma|ivy|samantha|female|girl|zira/i.test(v.name||''))
      || voices.find(v => /^en[-_]us/i.test(v.lang||'') && !/male|boy|david|guy|michael|james|thomas|mark|paul|brian|steve|kevin|eric/i.test(v.name||''))
      || voices.find(v => /^en/i.test(v.lang||''))
      || voices[0] || null;
  }
  function speak(text){
    return new Promise(resolve => {
      if(!text || !('speechSynthesis' in window)) { resolve(); return; }
      try{ window.speechSynthesis.cancel(); }catch(_e){}
      const u = new SpeechSynthesisUtterance(String(text));
      u.lang = 'en-US'; u.rate = 0.88; u.pitch = 1.16; u.volume = 1;
      const voice = pickVoice(); if(voice) u.voice = voice;
      u.onend = resolve; u.onerror = resolve;
      window.speechSynthesis.speak(u);
    });
  }
  function stopSpeaking(){ try{ if('speechSynthesis' in window) window.speechSynthesis.cancel(); }catch(_e){} recognitionToken++; }
  function playChime(){
    getAudioCtx();
    let played = false;
    try{
      if(chimeAudio){
        chimeAudio.currentTime = 0;
        const p = chimeAudio.play();
        if(p && typeof p.then === 'function') p.then(()=>played=true).catch(()=>{});
      }
    }catch(_e){}
    setTimeout(() => {
      if(played) return;
      const ctx = getAudioCtx(); if(!ctx) return;
      [660,880,1046].forEach((freq,i)=>{
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type='sine'; osc.frequency.value=freq;
        const t = ctx.currentTime + i*.13;
        gain.gain.setValueAtTime(.0001,t);
        gain.gain.exponentialRampToValueAtTime(.22,t+.03);
        gain.gain.exponentialRampToValueAtTime(.0001,t+.32);
        osc.connect(gain); gain.connect(ctx.destination); osc.start(t); osc.stop(t+.34);
      });
    }, 180);
  }
  function clap(){
    const ctx = getAudioCtx(); if(!ctx) return;
    for(let i=0;i<4;i++){
      const size = Math.floor(ctx.sampleRate*.08);
      const buffer = ctx.createBuffer(1,size,ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for(let j=0;j<size;j++) data[j]=(Math.random()*2-1)*Math.pow(1-j/size,2);
      const noise = ctx.createBufferSource(); const gain = ctx.createGain();
      noise.buffer=buffer; gain.gain.value=.22; noise.connect(gain); gain.connect(ctx.destination);
      noise.start(ctx.currentTime + i*.14);
    }
  }
  function confetti(){
    const colors = ['#f24b5e','#ffd24a','#58c6ff','#83e79f','#f7a6c9','#9ed06a'];
    for(let i=0;i<34;i++){
      const piece = document.createElement('div');
      piece.className='confetti-piece';
      piece.style.left = Math.random()*100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random()*colors.length)];
      piece.style.animationDelay = Math.random()*.35 + 's';
      piece.style.transform = 'rotate(' + Math.random()*180 + 'deg)';
      document.body.appendChild(piece);
      piece.addEventListener('animationend',()=>piece.remove());
    }
  }
  function saveProgress(extra={}){
    try{
      const lineScore = Math.round((foundLines.size / lineZones.length) * 100);
      const micStars = micState.stars.reduce((a,b)=>a+b,0);
      const payload = {
        pageId:CONFIG.pageId,file:CONFIG.pageId+'.html',level:CONFIG.level,activityType:'lesson',type:'horizontal-lines',
        score:Math.max(lineScore, extra.score || 0), tracing:lineScore, stars:Math.max(extra.stars || 0, Math.min(3, Math.floor(micStars/3))),
        completed:lineScore>=100 || !!extra.completed, savedAt:new Date().toISOString(), ts:Date.now(), ...extra
      };
      const store = JSON.parse(localStorage.getItem('GP_EIS_ACTIVITY_RESULTS') || '{}');
      store[payload.pageId] = {...(store[payload.pageId] || {}), ...payload};
      localStorage.setItem('GP_EIS_ACTIVITY_RESULTS', JSON.stringify(store));
      localStorage.setItem('GP_EIS_LAST_FILE', payload.file);
    }catch(_e){}
  }
  function updateLineProgress(){
    const pct = Math.round((foundLines.size / lineZones.length) * 100);
    lineProgressText.textContent = pct + '%';
    lineProgressFill.style.width = pct + '%';
    overallStars.textContent = pct >= 100 ? '⭐ ⭐ ⭐' : pct >= 75 ? '⭐ ⭐' : pct >= 50 ? '⭐' : '';
    saveProgress({score:pct,tracing:pct,stars:pct>=100?3:pct>=75?2:pct>=50?1:0,completed:pct>=100});
    if(pct >= 100 && !activityCelebrated){
      activityCelebrated = true;
      playChime(); clap(); confetti();
      setStatus('Wow! You found all the horizontal lines!');
      speak('Wow! You found all the horizontal lines. Shelves have lines that go across!');
    } else if(pct > 0 && pct < 100){
      setStatus('Good job! Keep tapping the shelf lines that go across.');
    }
  }
  lineZones.forEach(zone => {
    zone.addEventListener('click', () => {
      getAudioCtx();
      const id = zone.dataset.line;
      if(foundLines.has(id)) return;
      foundLines.add(id); zone.classList.add('found');
      playChime();
      const num = foundLines.size;
      if(num < lineZones.length) speak('Good job! That line goes across. Find another horizontal line.');
      updateLineProgress();
    });
  });

  function showLine(i){ if(lineEls[i]) lineEls[i].classList.add('show'); }
  function hideLines(){ lineEls.forEach(l=>l.classList.remove('show')); }
  function clearSparkle(){ bubbleEls.forEach(b=>b && b.classList.remove('sparkle')); }
  function setBusy(on){ micState.busy = !!on; micBtn.classList.toggle('is-busy', !!on); }
  function setResult(i,text,color){ if(resultEls[i]){ resultEls[i].textContent=text||''; resultEls[i].style.color=color||''; } }
  function setTry(i,text,color){ if(tryEls[i]){ tryEls[i].textContent=text||''; tryEls[i].style.color=color||''; } }
  function setStars(i,n){ if(starEls[i]) starEls[i].textContent = n>0 ? '⭐'.repeat(n) : ''; }
  function wordsOf(text){ return String(text||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(Boolean).map(w=>w.replace(/s$/,'')); }
  const stopWords = new Set(['a','an','the','is','are','am','to','of','for','on','in','at','my','your','his','her','our','their','do','does','did','i','you','he','she','it','we','they','that']);
  function importantWords(text){ return wordsOf(text).filter(w=>!stopWords.has(w)); }
  function isCorrectRepeat(expected, said){
    const exp = wordsOf(expected), heard = wordsOf(said);
    if(!exp.length || !heard.length) return false;
    const hits = exp.filter(w=>heard.includes(w)).length;
    const pct = Math.round((hits / exp.length) * 100);
    const imp = importantWords(expected);
    const impHits = imp.filter(w=>heard.includes(w)).length;
    return pct >= 50 && (imp.length <= 2 ? impHits === imp.length : impHits >= Math.ceil(imp.length*.5));
  }
  function rewardStars(attempt){ return attempt===1 ? 3 : attempt===2 ? 2 : attempt===3 ? 1 : 0; }
  function listenForSpeech(timeoutMs){
    return new Promise(resolve => {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!SR){ resolve({supported:false,transcript:''}); return; }
      const token = ++recognitionToken;
      const rec = new SR(); rec.lang='en-US'; rec.interimResults=false; rec.continuous=false; rec.maxAlternatives=3;
      let finished=false;
      const timer = setTimeout(()=>{ try{rec.stop();}catch(_e){} }, timeoutMs || 7000);
      function finish(transcript){
        if(finished || token !== recognitionToken) return;
        finished=true; clearTimeout(timer); resolve({supported:true,transcript:(transcript||'').trim()});
      }
      rec.onresult = e => finish(Array.from(e.results||[]).map(r=>r && r[0] && r[0].transcript).filter(Boolean).join(' '));
      rec.onerror = () => finish(''); rec.onnomatch = () => finish(''); rec.onend = () => finish('');
      try{ rec.start(); }catch(_e){ finish(''); }
    });
  }
  async function finishMic(){
    clearSparkle(); setBusy(false); micState.done=true; micState.phase='done';
    const remark = CONFIG.remarks[Math.floor(Math.random()*CONFIG.remarks.length)];
    playChime(); clap(); confetti(); setStatus(remark); await speak(remark);
    saveProgress({completed:true,score:100,stars:3});
  }
  async function revealCurrentLine(){
    clearSparkle();
    const text = CONFIG.micLines[micState.index];
    showLine(micState.index); setStatus(text); await speak(text);
    micState.phase='repeat-ready'; setStatus('Tap the microphone again and repeat after me.');
  }
  async function moveToNextLine(){
    clearSparkle();
    if(micState.index >= CONFIG.micLines.length - 1){ await finishMic(); return; }
    micState.index += 1; micState.phase='repeat-ready';
    showLine(micState.index); setStatus(CONFIG.micLines[micState.index]); await speak(CONFIG.micLines[micState.index]);
    setStatus('Tap the microphone again and repeat after me.');
  }
  async function repeatAttempt(){
    const expected = CONFIG.micLines[micState.index];
    bubbleEls[micState.index].classList.add('sparkle');
    setTry(micState.index,'',''); setStatus('Repeat after me.'); await speak('Repeat after me.');
    setBusy(true); setStatus('Listening... say the sentence now.');
    const heard = await listenForSpeech(7000);
    setBusy(false);
    if(!heard.supported){ setStatus('Speech check works best in Chrome or Edge.'); setTry(micState.index,'Speech check is not supported on this browser.','#b06a00'); micState.phase='repeat-ready'; return; }
    const transcript = heard.transcript || '';
    const attempt = ++micState.attempts[micState.index];
    if(isCorrectRepeat(expected, transcript)){
      const stars = rewardStars(attempt); micState.stars[micState.index]=stars;
      setResult(micState.index, transcript || expected, '#169b55'); setTry(micState.index,'',''); setStars(micState.index,stars);
      playChime(); await moveToNextLine(); return;
    }
    if(attempt >= 3){
      micState.stars[micState.index]=0; setStars(micState.index,0); setTry(micState.index,'You did a good Job. Nice try!','#b06a00');
      setStatus('You did a good Job. Nice try!'); await speak('You did a good Job. Nice try!'); await moveToNextLine(); return;
    }
    setResult(micState.index,'',''); setTry(micState.index,'Sorry, try again!','#c62828'); setStatus('Sorry, try again!');
    await speak('Sorry, try again!'); micState.phase='repeat-ready'; setStatus('Tap the microphone and try again.');
  }
  async function onMic(){
    getAudioCtx();
    if(micState.busy || micState.done) return;
    if(micState.phase === 'reveal') await revealCurrentLine();
    else if(micState.phase === 'repeat-ready') await repeatAttempt();
  }
  async function readInstructions(){
    getAudioCtx();
    setStatus('Listen carefully.');
    await speak('Horizontal lines go across from side to side. Look at the shelves. Tap the shelf lines that go across. Then use the microphone to repeat: What do you want? I want toys. Shelves have lines that go across.');
    setStatus('Tap the shelf lines that go across, or tap the microphone to practice speaking.');
  }
  function resetAll(){
    stopSpeaking(); foundLines.clear(); activityCelebrated=false;
    lineZones.forEach(z=>z.classList.remove('found'));
    micState.index=0; micState.phase='reveal'; micState.attempts=new Array(CONFIG.micLines.length).fill(0); micState.stars=new Array(CONFIG.micLines.length).fill(0); micState.busy=false; micState.done=false;
    hideLines(); clearSparkle(); resultEls.forEach(el=>{el.textContent=''; el.style.color='';}); tryEls.forEach(el=>{el.textContent=''; el.style.color='';}); starEls.forEach(el=>el.textContent='');
    overallStars.textContent=''; lineProgressFill.style.width='0%'; lineProgressText.textContent='0%';
    setBusy(false); setStatus('Start again. Tap the shelf lines that go across.'); saveProgress({score:0,stars:0,completed:false});
  }

  micBtn.addEventListener('click', onMic);
  readBtn.addEventListener('click', readInstructions);
  clearBtn.addEventListener('click', resetAll);
  cheerBtn.addEventListener('click', () => { getAudioCtx(); playChime(); clap(); confetti(); setStatus('You can do it! Great job!'); speak('You can do it! Great job!'); });
  homeBtn.addEventListener('click', () => { stopSpeaking(); location.href = CONFIG.homeHref; });
  prevBtn.addEventListener('click', () => { stopSpeaking(); location.href = CONFIG.prevHref; });
  nextBtn.addEventListener('click', () => { stopSpeaking(); location.href = CONFIG.nextHref; });
  if('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged = () => {};
  hideLines(); updateLineProgress(); setStatus('Tap Read Instructions to begin.');
  window.addEventListener('load', () => setTimeout(readInstructions, 650), {once:true});
  window.addEventListener('beforeunload', stopSpeaking);
})();
</script>
</body>

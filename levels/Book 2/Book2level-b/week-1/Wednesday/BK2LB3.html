<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Horizontal Lines - Week 1</title>
<style>
  :root{
    --red:#f24b5e;
    --pink:#f6a0ad;
    --sky:#bfefff;
    --ink:#27242a;
    --good:#1fa85b;
    --gold:#ffd24a;
    --blue:#1684d8;
    --cream:#fffaf1;
    --shadow:0 16px 36px rgba(0,0,0,.12);
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#fff9ef;color:var(--ink);}
  body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:10px;
    background-image:
      linear-gradient(#f1e6d8 1px, transparent 1px),
      linear-gradient(90deg, #f1e6d8 1px, transparent 1px);
    background-size:28px 28px;
  }
  .app{
    width:min(990px,100%);
    background:#ffffff;
    border-radius:24px;
    box-shadow:var(--shadow);
    padding:12px;
    position:relative;
    overflow:hidden;
  }
  .home-float{
    position:fixed;
    top:18px;
    right:18px;
    z-index:1000;
    width:74px;
    transform-origin:top center;
    animation:homeSwing 3.2s ease-in-out infinite;
  }
  .home-float img{display:block;width:100%;}
  @keyframes homeSwing{0%,100%{transform:rotate(0deg);}25%{transform:rotate(7deg);}75%{transform:rotate(-7deg);}}
  .poster-wrap{
    position:relative;
    width:min(883px,100%);
    margin:0 auto;
    border-radius:18px;
  }
  .poster-img{
    display:block;
    width:100%;
    height:auto;
    user-select:none;
    -webkit-user-drag:none;
    border-radius:16px;
  }
  .trace-canvas{
    position:absolute;
    z-index:5;
    touch-action:none;
    cursor:crosshair;
    background:rgba(255,255,255,0);
    border-radius:999px;
  }
  .trace-canvas.done{box-shadow:0 0 0 4px rgba(31,168,91,.15),0 0 16px rgba(31,168,91,.35);}
  #line1{left:29.7%;top:32.5%;width:41.2%;height:4.5%;}
  #line2{left:26.7%;top:38.7%;width:47.0%;height:4.5%;}
  #line3{left:22.0%;top:51.6%;width:57.5%;height:4.5%;}
  #line4{left:17.0%;top:60.0%;width:66.0%;height:4.5%;}
  #line5{left:15.9%;top:71.5%;width:68.7%;height:4.5%;}
  #line6{left:10.2%;top:81.3%;width:80.0%;height:4.5%;}
  .tap-hotspot{
    position:absolute;
    z-index:4;
    border-radius:999px;
    pointer-events:none;
  }
  .progress-card{
    width:min(883px,100%);
    margin:12px auto 0;
    background:linear-gradient(180deg,#fff8fb,#ffffff);
    border:3px solid #ffd0dc;
    border-radius:20px;
    padding:12px;
    box-shadow:0 8px 18px rgba(0,0,0,.08);
  }
  .progress-title{
    text-align:center;
    font-size:clamp(1rem,3vw,1.35rem);
    font-weight:1000;
    color:#4b3960;
    margin-bottom:8px;
  }
  .bar{
    height:16px;
    background:#e8eef8;
    border-radius:999px;
    overflow:hidden;
    box-shadow:inset 0 2px 4px rgba(0,0,0,.12);
  }
  .fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#58c6ff,#83e79f);
    transition:width .2s ease;
  }
  .line-progress{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:8px;
    margin-top:10px;
  }
  .line-chip{
    background:#fff;
    border:2px solid #e8edf8;
    border-radius:14px;
    padding:7px 4px;
    text-align:center;
    font-size:.9rem;
    font-weight:900;
  }
  .line-chip span{color:var(--good);}
  .controls{
    width:min(883px,100%);
    margin:12px auto 0;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .btn{
    border:none;
    border-radius:999px;
    padding:11px 16px;
    font-size:.98rem;
    font-weight:1000;
    cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,.18);
    transition:transform .1s ease, filter .1s ease;
  }
  .btn:hover{filter:brightness(1.04);transform:translateY(-1px);}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.14);}
  .btn.read{background:var(--red);color:#fff;}
  .btn.cheer{background:#c9f2d6;color:#166c38;}
  .btn.clear{background:#dfeaff;color:#1f3b6b;}
  .btn.nav{background:#f7dc6f;color:#8b5a00;}
  .status{
    width:min(883px,100%);
    margin:10px auto 0;
    min-height:1.5em;
    text-align:center;
    font-size:clamp(1rem,3vw,1.35rem);
    font-weight:1000;
    color:#5a3eb0;
  }
  .stars{
    text-align:center;
    min-height:1.3em;
    font-size:2.1rem;
    letter-spacing:4px;
    color:var(--gold);
    text-shadow:0 2px 0 #b87900,0 4px 0 #8a5a00,0 8px 14px rgba(0,0,0,.28);
  }
  .home-btn{
    position:absolute;
    top:14px;
    right:14px;
    z-index:20;
    background:#fff;
    border:3px solid #ffe0ea;
    border-radius:16px;
    padding:8px 10px;
    font-weight:1000;
    text-decoration:none;
    color:#4b3960;
    box-shadow:0 8px 16px rgba(0,0,0,.12);
  }
  .confetti-piece{
    position:fixed;
    top:-20px;
    width:10px;
    height:16px;
    border-radius:3px;
    z-index:9999;
    pointer-events:none;
    animation:confettiFall 1.7s linear forwards;
  }
  @keyframes confettiFall{
    to{transform:translateY(105vh) rotate(540deg);opacity:.1;}
  }
  @media(max-width:760px){
    body{padding:6px;}
    .app{padding:8px;border-radius:18px;}
    .line-progress{grid-template-columns:repeat(3,1fr);}
    .home-btn{position:static;display:inline-block;margin:0 0 8px 0;}
  }
</style>
</head>

  function pickVoice(){
    if(!("speechSynthesis" in window)) return null;
    const voices = window.speechSynthesis.getVoices() || [];
    return voices.find(v => /^en[-_]us/i.test(v.lang || "") && /jenny|aria|ava|allison|ellie|libby|olivia|emma|ivy|samantha|female|girl|zira/i.test(v.name || ""))
      || voices.find(v => /^en[-_]us/i.test(v.lang || "") && !/male|boy|david|guy|michael|james|thomas|mark|paul|brian|steve|kevin|eric/i.test(v.name || ""))
      || voices.find(v => /^en/i.test(v.lang || ""))
      || voices[0]
      || null;
  }

  function speak(text){
    if(!text || !("speechSynthesis" in window)) return;
    try{ window.speechSynthesis.cancel(); }catch(_e){}
    const u = new SpeechSynthesisUtterance(String(text));
    u.lang = "en-US";
    u.rate = 0.88;
    u.pitch = 1.16;
    u.volume = 1;
    const voice = pickVoice();
    if(voice) u.voice = voice;
    window.speechSynthesis.speak(u);
  }

  let audioCtx = null;
  function getAudioCtx(){
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if(!AudioContext) return null;
    if(!audioCtx) audioCtx = new AudioContext();
    if(audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
    return audioCtx;
  }

  let lastTick = 0;
  function traceTick(){
    const now = performance.now();
    if(now - lastTick < 60) return;
    lastTick = now;
    const ctx = getAudioCtx();
    if(!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "triangle";
    osc.frequency.value = 980;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.035, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.08);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.09);
  }

  function playChime(){
    let played = false;
    try{
      chimeAudio.currentTime = 0;
      const p = chimeAudio.play();
      if(p && typeof p.then === "function") p.then(()=>{played = true;}).catch(()=>{});
    }catch(_e){}

    setTimeout(() => {
      if(played) return;
      const ctx = getAudioCtx();
      if(!ctx) return;
      [660, 880, 1046].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.13;
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.22, t + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(t);
        osc.stop(t + 0.34);
      });
    }, 180);
  }

  function clap(){
    const ctx = getAudioCtx();
    if(!ctx) return;
    for(let i = 0; i < 4; i++){
      const bufferSize = Math.floor(ctx.sampleRate * 0.08);
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for(let j = 0; j < bufferSize; j++) data[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / bufferSize, 2);
      const noise = ctx.createBufferSource();
      const gain = ctx.createGain();
      noise.buffer = buffer;
      gain.gain.value = 0.22;
      noise.connect(gain);
      gain.connect(ctx.destination);
      noise.start(ctx.currentTime + i * 0.14);
    }
  }

  function confetti(){
    const colors = ["#f24b5e","#ffd24a","#58c6ff","#83e79f","#f7a6c9","#9ed06a"];
    for(let i = 0; i < 36; i++){
      const piece = document.createElement("div");
      piece.className = "confetti-piece";
      piece.style.left = Math.random() * 100 + "vw";
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDelay = (Math.random() * .35) + "s";
      piece.style.transform = "rotate(" + (Math.random() * 180) + "deg)";
      document.body.appendChild(piece);
      piece.addEventListener("animationend", () => piece.remove());
    }
  }

  function saveProgress(score){
    try{
      const store = JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      store[PAGE_ID] = {
        pageId:PAGE_ID,
        file:PAGE_ID + ".html",
        level:"A",
        week:1,
        type:"tracing",
        activityType:"lesson",
        score:score,
        tracing:score,
        stars:score >= 95 ? 3 : score >= 70 ? 2 : score >= 40 ? 1 : 0,
        completed:score >= 95,
        skills:{reading:1,writing:1,speaking:0,listening:1},
        savedAt:new Date().toISOString(),
        ts:Date.now()
      };
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store));
      localStorage.setItem("GP_EIS_LAST_FILE", PAGE_ID + ".html");
    }catch(_e){}
  }

  function createLineTrace(canvas, pctEl, lineNumber, onProgress){
    const state = {drawing:false,last:null,samples:[],visited:[],progress:0,completed:false,midCheer:false};
    let ctx;

    function setup(){
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.max(160, Math.round(rect.width * dpr));
      canvas.height = Math.max(38, Math.round(rect.height * dpr));
      ctx = canvas.getContext("2d");
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#1d73d8";
      ctx.lineWidth = Math.max(10, canvas.height * .20);
      state.samples = [];
      state.visited = [];
      const y = canvas.height / 2;
      const start = canvas.width * .04;
      const end = canvas.width * .96;
      for(let i = 0; i <= 150; i++){
        const t = i / 150;
        state.samples.push({x:start + (end - start) * t, y});
        state.visited.push(false);
      }
      clearCanvas();
    }

    function clearCanvas(){ ctx.clearRect(0,0,canvas.width,canvas.height); }

    function point(ev){
      const rect = canvas.getBoundingClientRect();
      const p = ev.touches && ev.touches[0] ? ev.touches[0] : ev;
      return {
        x:(p.clientX - rect.left) * (canvas.width / rect.width),
        y:(p.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function mark(pos){
      const threshold = Math.max(22, canvas.height * .55);
      const t2 = threshold * threshold;
      let changed = false;
      for(let i=0;i<state.samples.length;i++){
        if(state.visited[i]) continue;
        const dx = state.samples[i].x - pos.x;
        const dy = state.samples[i].y - pos.y;
        if(dx * dx + dy * dy <= t2){
          state.visited[i] = true;
          changed = true;
        }
      }
      if(changed){
        state.progress = Math.round(state.visited.filter(Boolean).length / state.visited.length * 100);
        pctEl.textContent = state.progress + "%";
        onProgress();

        if(state.progress >= 45 && !state.midCheer){
          state.midCheer = true;
          speak("Good tracing. Keep going!");
        }

        if(state.progress >= 88 && !state.completed){
          state.completed = true;
          canvas.classList.add("done");
          playChime();
          speak("Great! Line " + lineNumber + " is traced.");
        }
      }
    }

    function down(ev){
      ev.preventDefault();
      getAudioCtx();
      state.drawing = true;
      state.last = point(ev);
      mark(state.last);
    }

    function move(ev){
      if(!state.drawing) return;
      ev.preventDefault();
      const p = point(ev);
      ctx.beginPath();
      ctx.moveTo(state.last.x, state.last.y);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      traceTick();
      state.last = p;
      mark(p);
    }

    function up(){
      state.drawing = false;
      state.last = null;
    }

    canvas.addEventListener("pointerdown", down, {passive:false});
    canvas.addEventListener("pointermove", move, {passive:false});
    window.addEventListener("pointerup", up, {passive:true});
    canvas.addEventListener("touchstart", down, {passive:false});
    canvas.addEventListener("touchmove", move, {passive:false});
    window.addEventListener("touchend", up, {passive:true});
    window.addEventListener("resize", setup);

    setup();

    return {
      get progress(){return state.progress;},
      reset(){
        state.progress = 0;
        state.completed = false;
        state.midCheer = false;
        pctEl.textContent = "0%";
        canvas.classList.remove("done");
        setup();
        onProgress();
      }
    };
  }

  let pads = [];
  let allDone = false;

  function updateOverall(){
    const total = pads.reduce((sum,pad)=>sum + pad.progress, 0);
    const overall = Math.round(total / Math.max(1, pads.length));
    overallText.textContent = overall + "%";
    overallFill.style.width = overall + "%";

    if(overall >= 95 && !allDone){
      allDone = true;
      starsEl.textContent = "⭐ ⭐ ⭐";
      setStatus("Wow! You traced all the horizontal lines!");
      playChime();
      clap();
      confetti();
      speak("Wow! You traced all the horizontal lines from left to right. You are super smart!");
    }else if(overall >= 70){
      starsEl.textContent = "⭐ ⭐";
      if(!allDone) setStatus("Great tracing! Keep going from left to right.");
    }else if(overall >= 40){
      starsEl.textContent = "⭐";
      setStatus("Good job. Keep tracing the horizontal lines.");
    }else if(overall > 0){
      setStatus("Keep tracing each line from the blue point to the red point.");
    }

    if(overall < 95) allDone = false;
    saveProgress(overall);
  }

  pads = lineIds.map((id, index) => {
    const canvas = document.getElementById(id);
    const pctEl = document.getElementById(pctIds[index]);
    return createLineTrace(canvas, pctEl, index + 1, updateOverall);
  });
  updateOverall();

  function readInstructions(){
    getAudioCtx();
    setStatus("Listen carefully.");
    speak("Welcome to Horizontal Lines. Trace the horizontal lines from point to point. Start at the blue point and move across to the red point. Lines can be drawn from left to right.");
  }

  readBtn.addEventListener("click", readInstructions);

  cheerBtn.addEventListener("click", () => {
    getAudioCtx();
    clap();
    playChime();
    confetti();
    setStatus("You can do it! Great tracing!");
    speak("You can do it! Great tracing!");
  });

  clearBtn.addEventListener("click", () => {
    pads.forEach(pad => pad.reset());
    starsEl.textContent = "";
    setStatus("Cleared. Start again from the blue points.");
    speak("Cleared. Start again from the blue points.");
  });

  prevBtn.addEventListener("click", () => {
    try{ window.speechSynthesis.cancel(); }catch(_e){}
    window.location.href = "../Tuesday/BK2LB2.html";
  });

  nextBtn.addEventListener("click", () => {
    try{ window.speechSynthesis.cancel(); }catch(_e){}
    window.location.href = "BK2LB7.html";
  });

  if(homeBtn){
    homeBtn.addEventListener("click", () => {
      try{ window.speechSynthesis.cancel(); }catch(_e){}
    });
  }

  if("speechSynthesis" in window){
    window.speechSynthesis.onvoiceschanged = () => {};
  }

  window.addEventListener("load", () => {
    setTimeout(readInstructions, 650);
  }, {once:true});

  window.addEventListener("beforeunload", () => {
    try{ window.speechSynthesis.cancel(); }catch(_e){}
  });
})();
</script>

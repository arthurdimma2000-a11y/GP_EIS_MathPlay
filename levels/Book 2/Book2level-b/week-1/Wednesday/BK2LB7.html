<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Numbers - Add the Lines</title>
<style>
  :root{
    --red:#f24b5e;
    --pink:#f5a1a5;
    --yellow:#f8df8a;
    --green:#9ed06a;
    --blue:#84d7ee;
    --ink:#474549;
    --purple:#6c4bbf;
    --gold:#ffd24a;
    --good:#1fa85b;
    --shadow:0 16px 36px rgba(0,0,0,.13);
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#fff9ef;color:var(--ink);}
  body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:10px;
    background-image:linear-gradient(#f1e6d8 1px,transparent 1px),linear-gradient(90deg,#f1e6d8 1px,transparent 1px);
    background-size:28px 28px;
  }
  .app{
    width:min(980px,100%);
    background:#fffdf7;
    border:8px solid var(--red);
    border-radius:30px;
    padding:14px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
  }
  .home-float{
    position:fixed;
    top:18px;
    right:18px;
    z-index:1000;
    width:74px;
    transform-origin:top center;
    animation:homeSwing 3.2s ease-in-out infinite;
  }
  .home-float img{display:block;width:100%;}
  @keyframes homeSwing{0%,100%{transform:rotate(0deg);}25%{transform:rotate(7deg);}75%{transform:rotate(-7deg);}}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .badge{background:#fff;border:3px solid #ffe0ea;border-radius:999px;padding:8px 14px;font-weight:1000;box-shadow:0 8px 16px rgba(0,0,0,.08);}
  .badge span{color:var(--red);}
  .navs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
  .btn{
    border:none;border-radius:999px;padding:10px 15px;font-size:.98rem;font-weight:1000;cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,.18);transition:transform .1s ease,filter .1s ease;
  }
  .btn:hover{filter:brightness(1.04);transform:translateY(-1px);}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.14);}
  .home{background:#25d17d;color:#fff;}
  .prev,.next{background:#f7dc6f;color:#8b5a00;}
  .read{background:var(--red);color:#fff;}
  .clear{background:#dfeaff;color:#1f3b6b;}
  .cheer{background:#c9f2d6;color:#166c38;}

  .poster-wrap{position:relative;width:min(885px,100%);margin:0 auto;border-radius:20px;overflow:hidden;background:#fff;}
  .poster-img{display:block;width:100%;height:auto;user-select:none;-webkit-user-drag:none;}
  .trace-canvas{
    position:absolute;
    background:transparent;
    touch-action:none;
    cursor:crosshair;
    z-index:5;
    border-radius:12px;
  }
  .active-hint{
    position:absolute;z-index:8;pointer-events:none;border:4px solid rgba(255,210,74,.85);border-radius:16px;
    box-shadow:0 0 0 6px rgba(255,210,74,.18),0 0 22px rgba(255,105,180,.35);
    animation:pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.82;}50%{transform:scale(1.02);opacity:1;}}

  /* Right-side answer boxes on the poster */
  #trace15{left:63.7%;top:27.2%;width:23.5%;height:10.7%;}
  #trace17{left:63.7%;top:40.6%;width:23.5%;height:10.7%;}
  #trace18{left:63.7%;top:54.2%;width:23.5%;height:10.8%;}
  #trace19{left:63.7%;top:67.7%;width:23.5%;height:10.8%;}
  #trace20{left:63.7%;top:81.5%;width:23.5%;height:10.6%;}

  .progress-card{
    margin:14px auto 0;width:min(885px,100%);background:#fff8fb;border:3px solid #ffd1df;border-radius:20px;padding:12px;
    box-shadow:0 8px 18px rgba(0,0,0,.06);
  }
  .progress-title{text-align:center;font-size:clamp(1rem,2.8vw,1.3rem);font-weight:1000;color:#4b3960;margin-bottom:8px;}
  .bar{height:16px;background:#e8eef8;border-radius:999px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.12);}
  .fill{height:100%;width:0%;background:linear-gradient(90deg,#58c6ff,#83e79f);transition:width .2s ease;}
  .mini-progress{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px;text-align:center;font-weight:900;font-size:.92rem;}
  .mini-box{background:#fff;border:2px solid #e7edf8;border-radius:12px;padding:6px;}
  .mini-box.done{border-color:#72db94;background:#effff4;}
  .stars{text-align:center;min-height:1.4em;font-size:2rem;letter-spacing:4px;color:var(--gold);text-shadow:0 2px 0 #b87900,0 4px 0 #8a5a00,0 8px 14px rgba(0,0,0,.28);}
  .status{margin:10px auto 0;width:min(885px,100%);min-height:1.5em;text-align:center;font-size:clamp(1rem,3vw,1.35rem);font-weight:1000;color:#5a3eb0;}
  .controls{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;}
  .confetti-piece{position:fixed;top:-20px;width:10px;height:16px;border-radius:3px;z-index:9999;pointer-events:none;animation:confettiFall 1.7s linear forwards;}
  @keyframes confettiFall{to{transform:translateY(105vh) rotate(540deg);opacity:.1;}}
  @media(max-width:760px){
    .app{border-width:6px;padding:10px;border-radius:22px;}
    .mini-progress{grid-template-columns:repeat(2,1fr);}
    .topbar{justify-content:center;}
  }
</style>
</head>

  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  const pads = [];
  let completedAll = false;
  let activePadIndex = 0;
  let audioCtx = null;
  let lastTick = 0;

  function setStatus(text){ statusEl.textContent = text || ""; }

  function pickVoice(){
    if (!("speechSynthesis" in window)) return null;
    const voices = window.speechSynthesis.getVoices() || [];
    return voices.find(v => /^en[-_]us/i.test(v.lang || "") && /jenny|aria|ava|allison|ellie|libby|olivia|emma|ivy|samantha|female|girl|zira/i.test(v.name || ""))
      || voices.find(v => /^en[-_]us/i.test(v.lang || "") && !/male|boy|david|guy|michael|james|thomas|mark|paul|brian|steve|kevin|eric/i.test(v.name || ""))
      || voices.find(v => /^en/i.test(v.lang || ""))
      || voices[0]
      || null;
  }

  function speak(text){
    if (!text || !("speechSynthesis" in window)) return;
    try { window.speechSynthesis.cancel(); } catch(_){}
    const u = new SpeechSynthesisUtterance(String(text));
    u.lang = "en-US";
    u.rate = 0.88;
    u.pitch = 1.16;
    u.volume = 1;
    const voice = pickVoice();
    if (voice) u.voice = voice;
    window.speechSynthesis.speak(u);
  }

  function getAudioCtx(){
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return null;
    if (!audioCtx) audioCtx = new AudioContext();
    if (audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
    return audioCtx;
  }

  function playTick(){
    const now = performance.now();
    if (now - lastTick < 70) return;
    lastTick = now;
    const ctx = getAudioCtx();
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "triangle";
    osc.frequency.value = 960;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.04, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.08);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.09);
  }

  function playChime(){
    try{
      chimeAudio.currentTime = 0;
      const p = chimeAudio.play();
      if (p && typeof p.catch === "function") p.catch(fallbackChime);
    }catch(_){ fallbackChime(); }
  }

  function fallbackChime(){
    const ctx = getAudioCtx();
    if (!ctx) return;
    [660,880,1046].forEach((freq,i)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const t = ctx.currentTime + i * 0.13;
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001,t);
      gain.gain.exponentialRampToValueAtTime(0.2,t+0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001,t+0.32);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t+0.34);
    });
  }

  function clap(){
    const ctx = getAudioCtx();
    if (!ctx) return;
    for(let i=0;i<4;i++){
      const bufferSize = Math.floor(ctx.sampleRate * 0.08);
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for(let j=0;j<bufferSize;j++) data[j] = (Math.random()*2-1) * Math.pow(1 - j/bufferSize, 2);
      const noise = ctx.createBufferSource();
      const gain = ctx.createGain();
      noise.buffer = buffer;
      gain.gain.value = 0.23;
      noise.connect(gain); gain.connect(ctx.destination);
      noise.start(ctx.currentTime + i * 0.14);
    }
  }

  function confetti(){
    const colors = ["#f24b5e","#ffd24a","#58c6ff","#83e79f","#f7a6c9","#9ed06a"];
    for(let i=0;i<36;i++){
      const piece = document.createElement("div");
      piece.className = "confetti-piece";
      piece.style.left = Math.random() * 100 + "vw";
      piece.style.background = colors[Math.floor(Math.random()*colors.length)];
      piece.style.animationDelay = (Math.random() * .35) + "s";
      piece.style.transform = "rotate(" + (Math.random()*180) + "deg)";
      document.body.appendChild(piece);
      piece.addEventListener("animationend", () => piece.remove());
    }
  }

  function addLine(pts,x1,y1,x2,y2,steps){
    for(let i=0;i<=steps;i++){
      const t = i/steps;
      pts.push({x:x1+(x2-x1)*t,y:y1+(y2-y1)*t});
    }
  }

  function addArc(pts,cx,cy,rx,ry,a1,a2,steps){
    for(let i=0;i<=steps;i++){
      const t = i/steps;
      const a = a1 + (a2-a1)*t;
      pts.push({x:cx+Math.cos(a)*rx,y:cy+Math.sin(a)*ry});
    }
  }

  function digitPoints(digit, x, y, w, h){
    const pts = [];
    if (digit === "1"){
      addLine(pts,x+w*.40,y+h*.16,x+w*.58,y+h*.08,16);
      addLine(pts,x+w*.58,y+h*.08,x+w*.58,y+h*.88,60);
    }
    if (digit === "2"){
      addArc(pts,x+w*.50,y+h*.28,w*.30,h*.22,Math.PI*1.10,Math.PI*2.12,42);
      addLine(pts,x+w*.78,y+h*.35,x+w*.24,y+h*.82,52);
      addLine(pts,x+w*.24,y+h*.82,x+w*.82,y+h*.82,35);
    }
    if (digit === "5"){
      addLine(pts,x+w*.76,y+h*.14,x+w*.30,y+h*.14,28);
      addLine(pts,x+w*.30,y+h*.14,x+w*.26,y+h*.46,25);
      addLine(pts,x+w*.26,y+h*.46,x+w*.58,y+h*.46,20);
      addArc(pts,x+w*.52,y+h*.64,w*.30,h*.23,Math.PI*1.45,Math.PI*3.05,54);
    }
    if (digit === "7"){
      addLine(pts,x+w*.22,y+h*.18,x+w*.80,y+h*.18,32);
      addLine(pts,x+w*.80,y+h*.18,x+w*.42,y+h*.88,64);
    }
    if (digit === "8"){
      addArc(pts,x+w*.52,y+h*.32,w*.25,h*.18,0,Math.PI*2,56);
      addArc(pts,x+w*.52,y+h*.68,w*.30,h*.22,0,Math.PI*2,68);
    }
    if (digit === "9"){
      addArc(pts,x+w*.50,y+h*.34,w*.28,h*.22,0,Math.PI*2,62);
      addLine(pts,x+w*.76,y+h*.32,x+w*.46,y+h*.88,60);
    }
    if (digit === "0"){
      addArc(pts,x+w*.52,y+h*.50,w*.32,h*.40,0,Math.PI*2,86);
    }
    return pts;
  }

  function numberPoints(number, w, h){
    const text = String(number);
    const gap = w * 0.04;
    const cellW = (w - gap * (text.length - 1)) / text.length;
    let pts = [];
    for(let i=0;i<text.length;i++){
      const x = i * (cellW + gap);
      pts = pts.concat(digitPoints(text[i], x, h*.08, cellW, h*.84));
    }
    return pts;
  }

  function makePad(canvas, index){
    const number = canvas.dataset.number;
    const state = {drawing:false,last:null,samples:[],visited:[],progress:0,completed:false,halfCheered:false};
    let ctx;

    function setup(){
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.max(80, Math.round(rect.width * dpr));
      canvas.height = Math.max(60, Math.round(rect.height * dpr));
      ctx = canvas.getContext("2d");
      ctx.setTransform(1,0,0,1,0,0);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = Math.max(10*dpr, Math.min(canvas.width,canvas.height)*0.095);
      ctx.strokeStyle = "rgba(37,101,210,.92)";
      state.samples = numberPoints(number, canvas.width, canvas.height);
      state.visited = new Array(state.samples.length).fill(false);
      state.progress = 0;
      state.completed = false;
      state.halfCheered = false;
      ctx.clearRect(0,0,canvas.width,canvas.height);
    }

    function point(ev){
      const rect = canvas.getBoundingClientRect();
      const p = ev.touches && ev.touches[0] ? ev.touches[0] : ev;
      return {x:(p.clientX-rect.left)*(canvas.width/rect.width), y:(p.clientY-rect.top)*(canvas.height/rect.height)};
    }

    function mark(pt){
      const threshold = Math.max(24, Math.min(canvas.width,canvas.height)*0.16);
      const t2 = threshold*threshold;
      let changed = false;
      for(let i=0;i<state.samples.length;i++){
        if(state.visited[i]) continue;
        const dx = state.samples[i].x - pt.x;
        const dy = state.samples[i].y - pt.y;
        if(dx*dx + dy*dy <= t2){ state.visited[i] = true; changed = true; }
      }
      if(changed){
        state.progress = Math.round(state.visited.filter(Boolean).length / Math.max(1,state.visited.length) * 100);
        updateProgress();
        if(state.progress >= 45 && !state.halfCheered){
          state.halfCheered = true;
          speak("Good tracing. Keep going.");
        }
        if(state.progress >= 86 && !state.completed){
          state.completed = true;
          playChime();
          clap();
          speak("Amazing! You traced number " + number + ".");
          setActivePad(Math.min(index + 1, pads.length - 1));
        }
      }
    }

    function down(ev){ ev.preventDefault(); getAudioCtx(); state.drawing = true; state.last = point(ev); mark(state.last); setActivePad(index); }
    function move(ev){
      if(!state.drawing) return;
      ev.preventDefault();
      const pt = point(ev);
      ctx.beginPath();
      ctx.moveTo(state.last.x, state.last.y);
      ctx.lineTo(pt.x, pt.y);
      ctx.stroke();
      playTick();
      state.last = pt;
      mark(pt);
    }
    function up(){ state.drawing = false; state.last = null; }

    canvas.addEventListener("pointerdown", down, {passive:false});
    canvas.addEventListener("pointermove", move, {passive:false});
    window.addEventListener("pointerup", up, {passive:true});
    canvas.addEventListener("touchstart", down, {passive:false});
    canvas.addEventListener("touchmove", move, {passive:false});
    window.addEventListener("touchend", up, {passive:true});
    window.addEventListener("resize", setup);

    setup();
    return {
      number,
      get progress(){return state.progress;},
      reset(){setup(); updateProgress();}
    };
  }

  function setActivePad(index){
    activePadIndex = index;
    const c = canvases[index];
    if(!c || !activeHint || !posterWrap) return;
    const wrapRect = posterWrap.getBoundingClientRect();
    const rect = c.getBoundingClientRect();
    activeHint.hidden = false;
    activeHint.style.left = ((rect.left - wrapRect.left) / wrapRect.width * 100) + "%";
    activeHint.style.top = ((rect.top - wrapRect.top) / wrapRect.height * 100) + "%";
    activeHint.style.width = (rect.width / wrapRect.width * 100) + "%";
    activeHint.style.height = (rect.height / wrapRect.height * 100) + "%";
  }

  function updateProgress(){
    let total = 0;
    pads.forEach(p => {
      total += p.progress;
      const pct = document.getElementById("pct" + p.number);
      const box = document.getElementById("box" + p.number);
      if(pct) pct.textContent = p.progress + "%";
      if(box) box.classList.toggle("done", p.progress >= 86);
    });
    const overall = Math.round(total / Math.max(1,pads.length));
    overallText.textContent = overall + "%";
    overallFill.style.width = overall + "%";

    if(overall >= 95 && !completedAll){
      completedAll = true;
      starsEl.textContent = "⭐ ⭐ ⭐";
      setStatus("Wow! You added the lines and traced all the numbers!");
      playChime();
      clap();
      confetti();
      speak("Wow! You added the lines and traced all the numbers. You are super smart!");
    } else if(overall >= 70){
      starsEl.textContent = "⭐ ⭐";
      setStatus("Great job! Keep tracing the dotted numbers.");
    } else if(overall >= 35){
      starsEl.textContent = "⭐";
      setStatus("Good job. Keep going.");
    } else if(overall > 0){
      setStatus("Keep tracing carefully.");
    }

    saveProgress(overall);
  }

  function saveProgress(score){
    try{
      const store = JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      store[pageId] = {
        pageId,
        file: pageId + ".html",
        level:"A",
        week:1,
        month:1,
        type:"tracing",
        activityType:"lesson",
        score:Math.round(score),
        tracing:Math.round(score),
        stars:score >= 95 ? 3 : score >= 70 ? 2 : score >= 35 ? 1 : 0,
        completed:score >= 95,
        skills:{reading:1,writing:score >= 95 ? 3 : score > 0 ? 1 : 0,listening:1,speaking:0},
        savedAt:new Date().toISOString(),
        ts:Date.now()
      };
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store));
      localStorage.setItem("GP_EIS_LAST_FILE", pageId + ".html");
    }catch(_){}
  }

  function intro(){
    getAudioCtx();
    setActivePad(activePadIndex);
    setStatus("Listen carefully. Trace the dotted answer numbers.");
    speak("Look at the lines. Add the lines to ten. Then trace the dotted answer numbers. Trace fifteen, seventeen, eighteen, nineteen, and twenty. Start from the top row and trace carefully.");
  }

  pads.push(...canvases.map((canvas, i) => makePad(canvas, i)));
  updateProgress();
  setActivePad(0);

  readBtn.addEventListener("click", intro);
  cheerBtn.addEventListener("click", () => { getAudioCtx(); playChime(); clap(); confetti(); setStatus("You can do it! Great job!"); speak("You can do it! Great job!"); });
  clearBtn.addEventListener("click", () => {
    completedAll = false;
    pads.forEach(p => p.reset());
    starsEl.textContent = "";
    setActivePad(0);
    setStatus("Cleared. Start tracing again.");
    speak("Cleared. Start tracing again.");
  });
  homeBtn.addEventListener("click", () => { window.location.href = homeHref; });
  prevBtn.addEventListener("click", () => { window.location.href = prevHref; });
  nextBtn.addEventListener("click", () => { window.location.href = nextHref; });

  if("speechSynthesis" in window) window.speechSynthesis.onvoiceschanged = () => {};
  window.addEventListener("beforeunload", () => { try{ window.speechSynthesis.cancel(); }catch(_){} });
  window.addEventListener("load", () => { setTimeout(intro, 650); }, {once:true});
})();
</script>

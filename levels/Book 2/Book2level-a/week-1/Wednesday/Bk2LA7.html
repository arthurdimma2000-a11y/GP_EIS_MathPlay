<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>LA7 - Numbers 6 7 8</title>
<style>
  :root{
    --bg:#eef8ec;
    --card:#ffffff;
    --ink:#2d2d2d;
    --pink:#f04d5d;
    --green:#2f9f5f;
    --gold:#ffd24a;
    --blue:#52b5e8;
    --shadow:0 14px 30px rgba(0,0,0,.10);
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink)}
  body{min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:10px}
  img{max-width:100%;height:auto;display:block}
  .app{width:min(980px,100%);background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:14px;position:relative;overflow:hidden}
  .home-btn{position:absolute;right:12px;top:8px;width:70px;height:70px;display:flex;align-items:center;justify-content:center;text-decoration:none;border:none;background:transparent;z-index:30;animation:homeSwing 2.4s ease-in-out infinite;transform-origin:top center}
  .home-btn img{width:70px;height:70px;display:block;filter:drop-shadow(0 8px 10px rgba(0,0,0,.22))}
  @keyframes homeSwing{0%{transform:translateY(30%) rotate(-6deg)}50%{transform:translateY(30%) rotate(8deg)}100%{transform:translateY(30%) rotate(-6deg)}}
  .title{font-size:clamp(1.2rem,3vw,2rem);font-weight:900;color:#4a395f;margin:0 0 10px}
  .poster-wrap{position:relative;width:min(880px,100%);margin:0 auto;border-radius:18px;overflow:hidden}
  .poster-img{display:block;width:100%;height:auto;border-radius:18px;user-select:none;-webkit-user-drag:none;pointer-events:none}
  .trace-canvas{position:absolute;z-index:10;touch-action:none;cursor:crosshair;background:transparent;border-radius:8px;pointer-events:auto;user-select:none}
  .row-6{left:35.7%;top:29.3%;width:56.4%;height:20.6%;}
  .row-7{left:35.7%;top:51.5%;width:56.4%;height:20.6%;}
  .row-8{left:35.7%;top:73.5%;width:56.4%;height:20.6%;}
  .progress-card{margin:14px auto 0;width:min(880px,100%);display:grid;gap:10px;background:#fff8fb;border:2px solid #ffd7e4;border-radius:18px;padding:12px 14px}
  .overall-label{font-weight:900;color:#4b3960;text-align:center}
  .bar{width:100%;height:14px;background:#eceff7;border-radius:999px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.10)}
  .fill{height:100%;width:0%;background:linear-gradient(90deg,#59c6ff,#73e39c);transition:width .18s ease}
  .row-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .stat{background:#fff;border:2px solid #e9eef8;border-radius:16px;padding:8px 10px;text-align:center;box-shadow:0 6px 12px rgba(0,0,0,.05)}
  .stat-title{font-weight:900;font-size:.95rem;color:#47506b}
  .stat-value{font-weight:900;font-size:1rem;color:#2f9f5f;margin-top:2px}
  .controls{width:min(880px,100%);margin:12px auto 0;display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap}
  .btn{border:none;border-radius:999px;padding:10px 16px;font-size:.95rem;font-weight:800;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.15);transition:transform .12s ease, filter .12s ease}
  .btn:hover{transform:translateY(-1px);filter:brightness(1.03)}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.12)}
  .btn.prev{background:#f8f0c7;color:#9c7b2f}
  .btn.next{background:#f6da7b;color:#8b5a00}
  .btn.clear{background:#dfeaff;color:#1f3b6b}
  .btn.read{background:#ff8a5b;color:#fff}
  .status{width:min(880px,100%);margin:10px auto 0;text-align:center;font-weight:900;color:#6c4bbf;min-height:1.4em;font-size:clamp(.95rem,2.5vw,1.1rem)}
  .footer-note{width:min(880px,100%);margin:6px auto 0;text-align:center;color:#666;font-size:.92rem}
  .cheer-stars{text-align:center;min-height:1.4em;color:var(--gold);font-size:1.8rem;letter-spacing:4px;text-shadow:0 2px 0 #b87900,0 4px 0 #8a5a00,0 8px 14px rgba(0,0,0,.22)}
  #introVideoWrap,.intro-video-wrap,#lbIntroVideoOverlay,.intro-overlay,.video-intro,.intro-video,video[data-intro],video.gp-intro-video,video.intro-video{display:none!important;visibility:hidden!important;opacity:0!important;pointer-events:none!important}
  @media (max-width:640px){
    body{padding:8px}
    .app{padding:10px}
    .row-stats{grid-template-columns:1fr}
    .btn{width:auto}
  }
</style>
</head>

    const voice = pickVoice();
    if (voice) utter.voice = voice;
    utter.onend = () => { if (onend) onend(); };
    utter.onerror = () => { if (onend) onend(); };
    window.speechSynthesis.speak(utter);
  }

  function playTone(freq, duration, volume, type){
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      const ctx = new AudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type || "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(volume || 0.1, ctx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + (duration || 0.12));
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + (duration || 0.12));
    } catch(_e){}
  }

  function playChime(){
    setTimeout(() => playTone(660, 0.20, 0.18, "sine"), 0);
    setTimeout(() => playTone(880, 0.20, 0.18, "sine"), 120);
    setTimeout(() => playTone(1046, 0.26, 0.18, "sine"), 240);
  }

  let lastTick = 0;
  function playTraceTick(){
    const now = performance.now();
    if (now - lastTick < 60) return;
    lastTick = now;
    playTone(980, 0.075, 0.035, "triangle");
  }

  function saveProgress(score){
    try {
      const pageId = CONFIG.pageId || "LA7";
      const store = JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      store[pageId] = {
        ...(store[pageId] || {}),
        pageId,
        file: pageId + ".html",
        level: CONFIG.level || "A",
        type: "tracing",
        activityType: "lesson",
        score: Math.round(score),
        tracing: Math.round(score),
        stars: score >= 95 ? 3 : score >= 70 ? 2 : score >= 40 ? 1 : 0,
        completed: score >= 95,
        skills: { reading:1, writing:1, speaking:1, listening:1 },
        savedAt: new Date().toISOString(),
        ts: Date.now()
      };
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store));
      localStorage.setItem("GP_EIS_LAST_FILE", pageId + ".html");
      window.dispatchEvent(new CustomEvent("gp-progress-update", { detail: store[pageId] }));
    } catch(_e){}
  }

  function createDigitPoints(kind, width, height){
    const pts = [];
    function pushLine(x1,y1,x2,y2,steps){
      for (let i=0;i<=steps;i++) {
        const t = i / Math.max(1, steps);
        pts.push({x:x1+(x2-x1)*t, y:y1+(y2-y1)*t});
      }
    }
    function pushArc(cx,cy,rx,ry,a1,a2,steps){
      for (let i=0;i<=steps;i++) {
        const t = i / Math.max(1, steps);
        const a = a1 + (a2-a1)*t;
        pts.push({x:cx + Math.cos(a)*rx, y:cy + Math.sin(a)*ry});
      }
    }

    // Three visible digits in each row: colored example, dashed practice, and gray practice.
    const centers = [0.18, 0.50, 0.82];
    const topY = height * 0.10;
    const H = height * 0.80;
    const W = width * 0.15;

    centers.forEach(cxFrac => {
      const cx = width * cxFrac;
      if (kind === "6") {
        pushArc(cx + W*0.05, topY + H*0.25, W*0.55, H*0.22, Math.PI*1.05, Math.PI*2.12, 52);
        pushArc(cx, topY + H*0.57, W*0.58, H*0.33, Math.PI*1.12, Math.PI*0.03, 78);
        pushArc(cx, topY + H*0.67, W*0.36, H*0.20, 0, Math.PI*2, 66);
      } else if (kind === "7") {
        pushLine(cx - W*0.52, topY + H*0.14, cx + W*0.52, topY + H*0.14, 54);
        pushLine(cx + W*0.46, topY + H*0.14, cx - W*0.12, topY + H*0.90, 78);
      } else if (kind === "8") {
        pushArc(cx, topY + H*0.30, W*0.35, H*0.18, 0, Math.PI*2, 66);
        pushArc(cx, topY + H*0.70, W*0.43, H*0.23, 0, Math.PI*2, 78);
      }
    });
    return pts;
  }

  function createTracePad(canvas, kind, outputEl){
    const state = {
      drawing:false,
      progress:0,
      completed:false,
      milestone1:false,
      samplePoints:[],
      visited:[],
      lastPoint:null
    };
    let ctx = null;

    function setup(keepProgress){
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const oldProgress = state.progress;
      canvas.width = Math.max(180, Math.round(rect.width * dpr));
      canvas.height = Math.max(90, Math.round(rect.height * dpr));
      ctx = canvas.getContext("2d");
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#2f7dd1";
      ctx.lineWidth = Math.max(10, Math.min(canvas.width, canvas.height) * 0.08);
      state.samplePoints = createDigitPoints(kind, canvas.width, canvas.height);
      state.visited = new Array(state.samplePoints.length).fill(false);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      if (keepProgress) state.progress = oldProgress;
      outputEl.textContent = state.progress + "%";
    }

    function getPoint(ev){
      const r = canvas.getBoundingClientRect();
      const p = ev.touches && ev.touches[0] ? ev.touches[0] : ev;
      const scaleX = canvas.width / Math.max(1, r.width);
      const scaleY = canvas.height / Math.max(1, r.height);
      return { x:(p.clientX - r.left) * scaleX, y:(p.clientY - r.top) * scaleY };
    }

    function mark(point){
      const threshold = Math.max(28, Math.min(canvas.width, canvas.height) * 0.085);
      const threshold2 = threshold * threshold;
      let changed = false;
      for (let i=0;i<state.samplePoints.length;i++) {
        if (state.visited[i]) continue;
        const dx = state.samplePoints[i].x - point.x;
        const dy = state.samplePoints[i].y - point.y;
        if ((dx*dx + dy*dy) <= threshold2) {
          state.visited[i] = true;
          changed = true;
        }
      }
      if (changed) {
        state.progress = Math.round((state.visited.filter(Boolean).length / Math.max(1,state.visited.length)) * 100);
        outputEl.textContent = state.progress + "%";
        updateOverall();

        if (state.progress >= 35 && !state.milestone1) {
          state.milestone1 = true;
          speak("Good job! Keep tracing number " + kind + ".");
        }
        if (state.progress >= 85 && !state.completed) {
          state.completed = true;
          playChime();
          speak("Amazing! Number " + kind + " is traced.");
        }
      }
    }

    function start(ev){
      ev.preventDefault();
      state.drawing = true;
      state.lastPoint = getPoint(ev);
      mark(state.lastPoint);
    }

    function move(ev){
      if (!state.drawing) return;
      ev.preventDefault();
      const pt = getPoint(ev);
      ctx.beginPath();
      ctx.moveTo(state.lastPoint.x, state.lastPoint.y);
      ctx.lineTo(pt.x, pt.y);
      ctx.stroke();
      playTraceTick();
      state.lastPoint = pt;
      mark(pt);
    }

    function end(){ state.drawing = false; state.lastPoint = null; }

    canvas.addEventListener("pointerdown", start, { passive:false });
    canvas.addEventListener("pointermove", move, { passive:false });
    window.addEventListener("pointerup", end, { passive:true });
    canvas.addEventListener("touchstart", start, { passive:false });
    canvas.addEventListener("touchmove", move, { passive:false });
    window.addEventListener("touchend", end, { passive:true });

    setup(false);

    return {
      get progress() { return state.progress; },
      refresh() { setup(true); },
      reset() { state.progress = 0; state.completed = false; state.milestone1 = false; setup(false); updateOverall(); }
    };
  }

  let overallDone = false;
  const pads = [];

  function updateOverall(){
    const total = pads.reduce((sum,p) => sum + p.progress, 0);
    const overall = Math.round(total / Math.max(1, pads.length));
    overallPercent.textContent = overall + "%";
    overallFill.style.width = overall + "%";
    saveProgress(overall);
    starsRow.textContent = overall >= 95 ? "⭐ ⭐ ⭐" : overall >= 70 ? "⭐ ⭐" : overall >= 40 ? "⭐" : "";

    if (overall >= 95 && !overallDone) {
      overallDone = true;
      playChime();
      setStatus("Wow! You traced all the numbers beside the cakes!");
      speak("Wow! You traced all the numbers 6, 7, and 8 beside the cakes. You are super smart!");
    } else if (overall < 95) {
      overallDone = false;
      if (overall >= 1) setStatus("Keep tracing the numbers 6, 7, and 8.");
    }
  }

  function buildPads(){
    pads.length = 0;
    pads.push(createTracePad(document.getElementById("trace6"), "6", pct6));
    pads.push(createTracePad(document.getElementById("trace7"), "7", pct7));
    pads.push(createTracePad(document.getElementById("trace8"), "8", pct8));
    updateOverall();
  }

  function refreshPads(){ pads.forEach(p => p.refresh()); }

  function startIntro(){
    setStatus("Listen carefully.");
    speak("Welcome! Let us write numbers. Trace all the number digits beside the cakes. First trace the sixes, then the sevens, and then the eights. Follow the dotted lines carefully. When you finish, you will hear a cheer.", () => {
      setStatus("Trace all the number digits beside the cakes.");
    });
  }

  clearBtn.addEventListener("click", () => {
    pads.forEach(p => p.reset());
    starsRow.textContent = "";
    overallDone = false;
    setStatus("The tracing has been cleared. Start again.");
    speak("The tracing has been cleared. Start again.");
  });

  readBtn.addEventListener("click", startIntro);
  prevBtn.addEventListener("click", () => { stopSpeaking(); window.location.href = CONFIG.prevHref || "Bk2LA3.html"; });
  nextBtn.addEventListener("click", () => { stopSpeaking(); window.location.href = CONFIG.nextHref || "../Thursday/Bk2POEMA.html"; });
  if (homeBtn) homeBtn.addEventListener("click", () => stopSpeaking());

  if ("speechSynthesis" in window) window.speechSynthesis.onvoiceschanged = () => {};
  window.addEventListener("beforeunload", stopSpeaking);
  window.addEventListener("resize", () => window.setTimeout(refreshPads, 120));

  function init(){
    buildPads();
    setStatus("Trace all the number digits beside the cakes.");
    window.setTimeout(startIntro, 450);
  }

  if (posterImg.complete) init();
  else posterImg.addEventListener("load", init, { once:true });
})();
</script>

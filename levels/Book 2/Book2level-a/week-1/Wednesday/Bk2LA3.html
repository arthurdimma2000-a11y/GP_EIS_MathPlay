<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>LA3 - Straight Lines</title>
<style>
  :root{
    --ink:#2d2d2d;
    --bg:#fff9f1;
    --card:#ffffff;
    --accent:#f2475b;
    --pink:#f5a3c6;
    --blue:#19a9e8;
    --green:#13a856;
    --gold:#ffd24a;
    --soft:#fff7fb;
    --shadow:0 18px 38px rgba(0,0,0,.12);
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);}
  body{display:flex;align-items:flex-start;justify-content:center;padding:10px;overflow-x:hidden;}
  .lesson-card{width:min(960px,100%);background:var(--card);border-radius:22px;box-shadow:var(--shadow);padding:10px 10px 16px;}
  .poster-wrap{position:relative;width:min(885px,100%);margin:0 auto;border-radius:18px;overflow:hidden;background:#fff;}
  .poster-img{display:block;width:100%;height:auto;user-select:none;-webkit-user-drag:none;pointer-events:none;}
  .trace-zone{position:absolute;z-index:8;touch-action:none;cursor:crosshair;background:rgba(255,255,255,0.001);}
  .trace-zone canvas{width:100%;height:100%;display:block;touch-action:none;}
  .trace-zone.is-active{outline:3px solid rgba(52,157,255,.25);border-radius:999px;}
  .trace-zone.done{outline:4px solid rgba(47,159,95,.25);border-radius:999px;}
  .zone-1{left:24.4%;top:38.8%;width:53.4%;height:3.2%;}
  .zone-2{left:34.2%;top:58.6%;width:32.4%;height:3.0%;}
  .zone-3{left:13.8%;top:78.8%;width:74.0%;height:3.1%;}
  .controls-panel{margin:12px auto 0;width:min(885px,100%);background:linear-gradient(180deg,#fff,#fff7fb);border:3px solid rgba(242,71,91,.25);border-radius:18px;padding:12px;box-shadow:0 8px 20px rgba(0,0,0,.08);}
  .progress-title{font-size:clamp(1rem,2.6vw,1.35rem);font-weight:900;text-align:center;color:#f2475b;margin-bottom:7px;}
  .progress-row{display:flex;align-items:center;gap:10px;}
  .progress-bar{flex:1;height:18px;background:#e7efff;border-radius:999px;overflow:hidden;box-shadow:inset 0 2px 5px rgba(0,0,0,.16);}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#31b7ff,#84efab);border-radius:999px;transition:width .14s ease-out;}
  .progress-percent{min-width:54px;text-align:right;font-weight:1000;color:#175ca8;font-size:1.05rem;}
  .line-progress-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:9px;}
  .mini-progress{background:#fff;border:2px solid #ffe0ea;border-radius:14px;padding:8px 10px;text-align:center;font-weight:900;color:#444;}
  .mini-progress span{color:#f2475b;}
  .status{min-height:1.45em;text-align:center;font-weight:1000;color:#6c4bbf;font-size:clamp(.95rem,2.5vw,1.15rem);margin-top:8px;}
  .button-row{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px;}
  button{border:none;border-radius:999px;padding:10px 16px;font-size:.95rem;font-weight:900;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.16);transition:transform .1s ease,filter .1s ease;}
  button:hover{filter:brightness(1.04);}
  button:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.14);}
  .btn-prev,.btn-next{background:#ff8a5b;color:#fff;}
  .btn-clear{background:#dfeaff;color:#1f3b6b;}
  .btn-read{background:#f6da7b;color:#8b5a00;}
  .btn-home{background:#fff0f4;color:#f2475b;border:2px solid #ffd0db;text-decoration:none;display:inline-flex;border-radius:999px;padding:10px 16px;font-weight:900;box-shadow:0 4px 0 rgba(0,0,0,.16);}
  .footer-note{margin-top:8px;text-align:center;color:#666;font-weight:800;font-size:.9rem;}
  .home-float{
    position:fixed;
    top:18px;
    right:18px;
    z-index:1000;
    width:74px;
    transform-origin:top center;
    animation:homeSwing 3.2s ease-in-out infinite;
  }
  .home-float img{display:block;width:100%;}
  @keyframes homeSwing{0%,100%{transform:rotate(0deg);}25%{transform:rotate(7deg);}75%{transform:rotate(-7deg);}}
  @media(max-width:620px){
    body{padding:6px;}
    .lesson-card{border-radius:16px;padding:6px 6px 12px;}
    .controls-panel{padding:10px;border-radius:14px;}
    .line-progress-grid{grid-template-columns:1fr;}
    button,.btn-home{font-size:.85rem;padding:9px 12px;}
    .progress-row{gap:6px;}
  }
</style>
</head>

<script>
(function(){
  "use strict";

  const PAGE_ID = "LA3";
  const LEVEL = "A";
  const CHIME_SRC = "../../../../assets/audio/chimes/chime.mp3";
  const prevHref = "../Tuesday/Bk2LA2.html";
  const nextHref = "Bk2LA7.html";

  const zones = Array.from(document.querySelectorAll(".trace-zone"));
  const progressFill = document.getElementById("progressFill");
  const progressPercent = document.getElementById("progressPercent");
  const statusText = document.getElementById("statusText");
  const clearBtn = document.getElementById("clearBtn");
  const readBtn = document.getElementById("readBtn");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  const pads = [];
  const linePercents = [0,0,0];
  const cheeredLines = [false,false,false];
  let finalCelebrated = false;
  let audioCtx = null;
  let lastTick = 0;

  function setStatus(text){
    if (statusText) statusText.textContent = text || "";
  }

  function pickVoice(){
    if (!("speechSynthesis" in window)) return null;
    const voices = window.speechSynthesis.getVoices() || [];
    return voices.find(v => /^en[-_]us/i.test(v.lang || "") && /jenny|aria|ava|allison|ellie|libby|olivia|serena|emma|ivy|grace|luna|nova|stella|samantha|female|girl|zira/i.test(v.name || ""))
      || voices.find(v => /^en[-_]us/i.test(v.lang || "") && !/male|boy|david|guy|michael|james|daniel|thomas|alex|mark|paul|brian|steve|kevin|eric|christopher/i.test(v.name || ""))
      || voices.find(v => /^en/i.test(v.lang || "") && /jenny|aria|ava|allison|ellie|libby|olivia|serena|emma|ivy|grace|luna|nova|stella|samantha|female|girl|zira/i.test(v.name || ""))
      || voices.find(v => /^en/i.test(v.lang || ""))
      || voices[0]
      || null;
  }

  function speak(text, options){
    return new Promise(resolve => {
      if (!text || !("speechSynthesis" in window)) { resolve(); return; }
      try { window.speechSynthesis.cancel(); } catch(_) {}
      const u = new SpeechSynthesisUtterance(String(text));
      const opts = options || {};
      u.lang = "en-US";
      u.rate = typeof opts.rate === "number" ? opts.rate : 0.88;
      u.pitch = typeof opts.pitch === "number" ? opts.pitch : 1.16;
      u.volume = 1;
      const voice = pickVoice();
      if (voice) u.voice = voice;
      u.onend = resolve;
      u.onerror = resolve;
      window.speechSynthesis.speak(u);
    });
  }

  function getAudioContext(){
    const Ctor = window.AudioContext || window.webkitAudioContext;
    if (!Ctor) return null;
    if (!audioCtx) audioCtx = new Ctor();
    if (audioCtx.state === "suspended") audioCtx.resume().catch(() => {});
    return audioCtx;
  }

  function playTraceTick(){
    const now = Date.now();
    if (now - lastTick < 65) return;
    lastTick = now;
    const ctx = getAudioContext();
    if (!ctx) return;
    try {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.06, ctx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.055);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.06);
    } catch(_) {}
  }

  function playChime(){
    let played = false;
    try {
      const audio = new Audio(CHIME_SRC);
      audio.volume = 0.9;
      const p = audio.play();
      if (p && typeof p.then === "function") p.then(() => played = true).catch(() => {});
    } catch(_) {}
    setTimeout(() => {
      if (played) return;
      const ctx = getAudioContext();
      if (!ctx) return;
      try {
        [660, 880, 1046].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "sine";
          osc.frequency.value = freq;
          const start = ctx.currentTime + i * 0.12;
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(0.18, start + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.18);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(start);
          osc.stop(start + 0.2);
        });
      } catch(_) {}
    }, 250);
  }

  function playApplause(){
    const ctx = getAudioContext();
    if (!ctx) return;
    try {
      for (let i = 0; i < 7; i++) {
        const bufferSize = Math.floor(ctx.sampleRate * 0.045);
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let j = 0; j < bufferSize; j++) data[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / bufferSize, 2);
        const src = ctx.createBufferSource();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        filter.type = "bandpass";
        filter.frequency.value = 1200 + Math.random() * 1400;
        gain.gain.value = 0.16;
        src.buffer = buffer;
        src.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        src.start(ctx.currentTime + i * 0.075);
      }
    } catch(_) {}
  }

  function fitCanvas(canvas){
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const width = Math.max(40, Math.round(rect.width * dpr));
    const height = Math.max(20, Math.round(rect.height * dpr));
    if (canvas.width !== width || canvas.height !== height) {
      canvas.width = width;
      canvas.height = height;
    }
    const ctx = canvas.getContext("2d");
    ctx.setTransform(1,0,0,1,0,0);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    return {ctx,width,height,dpr};
  }

  function createLinePad(zone, index){
    const canvas = zone.querySelector("canvas");
    const state = {drawing:false,last:null,samples:[],visited:[],pct:0,ctxInfo:null};

    function rebuild(keepProgress){
      state.ctxInfo = fitCanvas(canvas);
      const {width,height,ctx} = state.ctxInfo;
      state.samples = [];
      const left = width * 0.06;
      const right = width * 0.94;
      const y = height * 0.5;
      const count = 110;
      for (let i = 0; i < count; i++) {
        const t = i / (count - 1);
        state.samples.push({x:left + (right-left)*t, y});
      }
      if (!keepProgress) {
        state.visited = new Array(state.samples.length).fill(false);
        state.pct = 0;
      } else if (state.visited.length !== state.samples.length) {
        state.visited = new Array(state.samples.length).fill(false);
        state.pct = 0;
      }
      ctx.clearRect(0,0,width,height);
    }

    function point(evt){
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {x:(evt.clientX - rect.left) * scaleX, y:(evt.clientY - rect.top) * scaleY};
    }

    function distToSegment(px, py, ax, ay, bx, by){
      const dx = bx - ax;
      const dy = by - ay;
      if (!dx && !dy) return Math.hypot(px - ax, py - ay);
      const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / (dx*dx + dy*dy)));
      const x = ax + t * dx;
      const y = ay + t * dy;
      return Math.hypot(px - x, py - y);
    }

    function mark(a, b){
      const threshold = Math.max(14, Math.min(canvas.width, canvas.height) * 0.58);
      let changed = false;
      for (let i = 0; i < state.samples.length; i++) {
        if (state.visited[i]) continue;
        const s = state.samples[i];
        if (distToSegment(s.x, s.y, a.x, a.y, b.x, b.y) <= threshold) {
          state.visited[i] = true;
          changed = true;
        }
      }
      if (changed) {
        const hits = state.visited.filter(Boolean).length;
        state.pct = Math.round((hits / state.visited.length) * 100);
        updateProgress(index, state.pct);
      }
    }

    function start(evt){
      evt.preventDefault();
      getAudioContext();
      state.drawing = true;
      zone.classList.add("is-active");
      canvas.setPointerCapture?.(evt.pointerId);
      const p = point(evt);
      state.last = p;
      mark(p,p);
    }

    function move(evt){
      if (!state.drawing) return;
      evt.preventDefault();
      const p = point(evt);
      const {ctx,width,height} = state.ctxInfo;
      ctx.strokeStyle = "#1e6bff";
      ctx.lineWidth = Math.max(5, height * 0.18);
      ctx.beginPath();
      ctx.moveTo(state.last.x, state.last.y);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      playTraceTick();
      mark(state.last, p);
      state.last = p;
    }

    function end(evt){
      if (!state.drawing) return;
      evt && evt.preventDefault && evt.preventDefault();
      state.drawing = false;
      state.last = null;
      zone.classList.remove("is-active");
      updateProgress(index, state.pct);
    }

    canvas.addEventListener("pointerdown", start, {passive:false});
    canvas.addEventListener("pointermove", move, {passive:false});
    canvas.addEventListener("pointerup", end, {passive:false});
    canvas.addEventListener("pointercancel", end, {passive:false});
    canvas.addEventListener("pointerleave", end, {passive:false});

    rebuild(false);

    return {
      reset(){ rebuild(false); zone.classList.remove("done","is-active"); },
      resize(){ rebuild(true); },
      getProgress(){ return state.pct; }
    };
  }

  function updateProgress(index, pct){
    linePercents[index] = Math.max(0, Math.min(100, Math.round(pct)));
    const linePct = document.getElementById("linePct" + index);
    if (linePct) linePct.textContent = linePercents[index] + "%";

    const zone = zones[index];
    if (zone) zone.classList.toggle("done", linePercents[index] >= 90);

    const total = Math.round(linePercents.reduce((a,b)=>a+b,0) / linePercents.length);
    if (progressPercent) progressPercent.textContent = total + "%";
    if (progressFill) progressFill.style.width = total + "%";

    if (linePercents[index] >= 75 && !cheeredLines[index]) {
      cheeredLines[index] = true;
      setStatus("Great tracing! Keep going.");
      playChime();
      speak("Great tracing! Keep going.");
    }

    if (total >= 92 && !finalCelebrated) {
      finalCelebrated = true;
      setStatus("Wow! You traced all the straight lines. Amazing job!");
      playChime();
      playApplause();
      speak("Wow! You traced all the straight lines. Amazing job! A straight line has two points.");
      saveProgress(total, true);
      return;
    }

    if (total < 92) finalCelebrated = false;
    saveProgress(total, false);
  }

  function saveProgress(score, completed){
    const stars = score >= 92 ? 3 : score >= 70 ? 2 : score >= 35 ? 1 : 0;
    const payload = {
      pageId: PAGE_ID,
      file: PAGE_ID + ".html",
      level: LEVEL,
      activityType: "straight-line-tracing",
      type: "lesson",
      score,
      tracing: score,
      stars,
      completed: !!completed,
      skills: {reading:1, writing: score >= 70 ? 2 : score > 0 ? 1 : 0, speaking:1, listening:1},
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    try {
      const store = JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      store[payload.pageId] = {...(store[payload.pageId] || {}), ...payload};
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store));
      localStorage.setItem("GP_EIS_LAST_FILE", payload.file);
      localStorage.setItem("gpLatestProgress", JSON.stringify(payload));
    } catch(_) {}
    try { window.dispatchEvent(new CustomEvent("gp-progress-update", {detail:payload})); } catch(_) {}
    if (typeof window.finishAndSave === "function") {
      window.finishAndSave(payload).catch(() => {});
    }
  }

  function readInstructions(){
    setStatus("Trace each straight line from the green point to the red point.");
    speak("Straight lines. Week one. Trace the straight lines from point to point. Start at the green point and trace to the red point. A straight line has two points.");
  }

  function clearAll(){
    pads.forEach(p => p.reset());
    for (let i=0;i<linePercents.length;i++) {
      linePercents[i] = 0;
      cheeredLines[i] = false;
      const el = document.getElementById("linePct" + i);
      if (el) el.textContent = "0%";
    }
    finalCelebrated = false;
    if (progressPercent) progressPercent.textContent = "0%";
    if (progressFill) progressFill.style.width = "0%";
    setStatus("Trace each straight line from the green point to the red point.");
    saveProgress(0, false);
  }

  zones.forEach((zone, index) => pads.push(createLinePad(zone, index)));
  window.addEventListener("resize", () => pads.forEach(p => p.resize()));
  if (window.visualViewport) window.visualViewport.addEventListener("resize", () => pads.forEach(p => p.resize()));

  clearBtn.addEventListener("click", clearAll);
  readBtn.addEventListener("click", readInstructions);
  prevBtn.addEventListener("click", () => { window.location.href = prevHref; });
  nextBtn.addEventListener("click", () => { window.location.href = nextHref; });

  if ("speechSynthesis" in window) window.speechSynthesis.onvoiceschanged = () => {};

  window.addEventListener("load", () => {
    clearAll();
    setTimeout(readInstructions, 650);
  }, {once:true});
})();
</script>
</body>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>LA2 - Straight Lines</title>
<style>
  :root{
    --ink:#2d2d2d;
    --bg:#fff8f2;
    --card:#ffffff;
    --pink:#f7a9cf;
    --red:#f34458;
    --green:#19a85b;
    --orange:#ff8a5b;
    --yellow:#f6da7b;
    --blue:#dfeaff;
    --success:#2f9f5f;
    --danger:#c62828;
    --gold:#ffd24a;
    --shadow:0 12px 28px rgba(0,0,0,.10);
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    width:100%;
    max-width:100%;
    overflow-x:hidden;
    background:var(--bg);
    color:var(--ink);
  }

  body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:10px;
  }

  img{max-width:100%;height:auto;display:block;}

  .app{
    position:relative;
    width:min(980px,100%);
    background:var(--card);
    border-radius:20px;
    box-shadow:var(--shadow);
    padding:12px;
  }

  .home-btn{
    position:absolute;
    right:12px;
    top:8px;
    width:66px;
    height:66px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:transparent;
    border:none;
    padding:0;
    text-decoration:none;
    z-index:30;
    transform-origin:top center;
    animation:homeSwing 2.4s ease-in-out infinite;
  }

  .home-btn img{
    width:66px;
    height:66px;
    filter:drop-shadow(0 8px 10px rgba(0,0,0,.22));
  }

  @keyframes homeSwing{
    0%{transform:translateY(18%) rotate(-6deg);}
    50%{transform:translateY(18%) rotate(8deg);}
    100%{transform:translateY(18%) rotate(-6deg);}
  }

  .page-title{
    margin:0 0 8px;
    text-align:center;
    font-size:clamp(1.5rem,4vw,2.6rem);
    font-weight:1000;
    color:var(--red);
    text-shadow:0 2px 0 #fff;
  }

  .poster-card{
    position:relative;
    width:min(904px,100%);
    margin:0 auto;
    border-radius:18px;
    overflow:hidden;
    background:#f7a9cf;
    box-shadow:0 8px 20px rgba(0,0,0,.10);
    touch-action:none;
  }

  .poster-image{
    width:100%;
    height:auto;
    user-select:none;
    -webkit-user-drag:none;
    pointer-events:none;
  }

  .trace-canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:5;
    touch-action:none;
    background:transparent;
    cursor:crosshair;
  }

  .focus-zone{
    position:absolute;
    pointer-events:none;
    z-index:8;
    border-radius:999px;
    opacity:0;
    transform:scale(.96);
    transition:opacity .18s ease, transform .18s ease;
  }

  .focus-zone.show{
    opacity:1;
    transform:scale(1);
    outline:4px solid rgba(255,255,255,.95);
    box-shadow:0 0 0 6px rgba(255,215,0,.28),0 0 18px rgba(255,105,180,.42);
  }

  .focus-zone.sparkle{
    opacity:1;
    transform:scale(1.03);
    background:rgba(255,238,120,.20);
    outline:5px solid rgba(255,214,0,.88);
    box-shadow:0 0 14px rgba(255,214,0,.95),0 0 26px rgba(255,105,180,.65);
    animation:sparklePulse .9s ease-in-out infinite;
  }

  @keyframes sparklePulse{
    0%,100%{filter:brightness(1);}
    50%{filter:brightness(1.2);}
  }

  .focus-bubble-1{left:30.4%;top:35.0%;width:21.5%;height:10.0%;}
  .focus-bubble-2{left:49.5%;top:45.0%;width:25.5%;height:10.8%;}
  .focus-line{left:16.8%;top:72.3%;width:68.0%;height:5.2%;}

  .lesson-panel{
    width:min(904px,100%);
    margin:12px auto 0;
    border:3px solid rgba(243,68,88,.25);
    border-radius:18px;
    background:linear-gradient(180deg,#fff,#fff7fb);
    padding:12px;
    display:grid;
    gap:10px;
  }

  .progress-wrap{
    display:grid;
    justify-items:center;
    gap:6px;
  }

  .progress-text{
    font-size:clamp(.95rem,2vw,1.05rem);
    font-weight:900;
    color:#6c4bbf;
  }

  .progress-bar{
    width:min(520px,92%);
    height:14px;
    background:#e7efff;
    border-radius:999px;
    overflow:hidden;
    box-shadow:inset 0 1px 3px rgba(0,0,0,.16);
  }

  .progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#19a85b,#7dffb3);
    transition:width .15s ease-out;
  }

  .conversation-panel{
    display:grid;
    gap:10px;
  }

  .convo-line{
    display:none;
    align-items:flex-start;
    gap:8px;
  }

  .convo-line.show{display:flex;}

  .convo-line.right{justify-content:flex-end;}

  .bubble-stack{
    display:flex;
    flex-direction:column;
    gap:6px;
    max-width:min(100%,520px);
  }

  .convo-line.right .bubble-stack{align-items:flex-end;}

  .bubble{
    position:relative;
    padding:12px 16px;
    border-radius:18px;
    font-size:clamp(1rem,2.3vw,1.28rem);
    font-weight:900;
    line-height:1.25;
    box-shadow:0 8px 16px rgba(0,0,0,.12);
    background:#fff;
  }

  .bubble.baker{border:3px solid #ef3e91;}
  .bubble.kid{border:3px solid #75c942;}

  .bubble.sparkle{
    background:linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);
    box-shadow:0 0 12px rgba(255,214,0,.75),0 0 20px rgba(255,105,180,.55);
    animation:sparklePulse .95s ease-in-out infinite;
  }

  .repeat-result{
    min-height:1.2em;
    font-size:clamp(1rem,2.4vw,1.4rem);
    line-height:1.2;
    font-weight:1000;
    color:var(--success);
  }

  .try-message{
    min-height:1.2em;
    font-size:clamp(.95rem,2.3vw,1.15rem);
    line-height:1.2;
    font-weight:1000;
  }

  .star-row{
    min-height:1.15em;
    display:flex;
    gap:6px;
    color:var(--gold);
    font-size:clamp(1.35rem,3.4vw,2rem);
    line-height:1;
    text-shadow:0 2px 0 #b87900,0 4px 0 #8a5a00,0 8px 14px rgba(0,0,0,.28);
  }

  .controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    width:100%;
  }

  .mascot-spot{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#fff;
    border:2px solid #e8e0ff;
    border-radius:14px;
    padding:6px 10px;
    box-shadow:0 8px 16px rgba(0,0,0,.12);
  }

  .tap-girl{
    width:46px;
    height:46px;
    border-radius:12px;
    object-fit:cover;
    cursor:pointer;
  }

  .mascot-hint{
    font-size:.95rem;
    font-weight:900;
    color:#2f9f5f;
    white-space:nowrap;
  }

  .finger-cue{
    position:absolute;
    left:50%;
    top:-26px;
    transform:translateX(-50%);
    font-size:1.8rem;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.18));
    animation:fingerBob 1s ease-in-out infinite;
    display:none;
    pointer-events:none;
  }

  .finger-cue.show{display:block;}

  @keyframes fingerBob{
    0%,100%{transform:translateX(-50%) translateY(0);}
    50%{transform:translateX(-50%) translateY(6px);}
  }

  .btn,.mic-icon-btn{
    min-height:46px;
    min-width:46px;
    border:none;
    border-radius:999px;
    cursor:pointer;
    font-weight:900;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
    transition:transform .12s ease, filter .12s ease;
  }

  .btn:hover,.mic-icon-btn:hover{transform:translateY(-1px);filter:brightness(1.03);}
  .btn:active,.mic-icon-btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.12);}

  .btn{padding:10px 16px;font-size:.95rem;}
  .btn.prev{background:#f8f0c7;color:#9c7b2f;}
  .btn.next{background:var(--yellow);color:#8b5a00;}
  .btn.stop{background:var(--blue);color:#1f3b6b;}
  .btn.read{background:var(--orange);color:#fff;}

  .mic-icon-btn{
    position:relative;
    background:transparent;
    padding:0;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    box-shadow:none;
  }

  .mic-icon-btn img{
    width:52px;
    height:52px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
  }

  .mic-icon-btn.is-busy{opacity:.7;pointer-events:none;transform:scale(.97);}

  .record-icon{width:16px;height:16px;vertical-align:middle;margin-right:6px;}
  .recording audio{height:34px;max-width:240px;}

  .status-wrap{display:grid;gap:6px;}

  .conversation-status,.recording-status{
    min-height:1.25em;
    text-align:center;
    font-weight:1000;
  }

  .conversation-status{color:#6c4bbf;font-size:clamp(.95rem,2.5vw,1.1rem);}
  .recording-status{color:#555;font-size:.92rem;}

  .footer-note{text-align:center;color:#666;font-size:.92rem;}

  @media (max-width:560px){
    body{padding:6px;}
    .app{border-radius:14px;padding:8px;}
    .page-title{font-size:1.35rem;margin-right:58px;}
    .home-btn,.home-btn img{width:54px;height:54px;}
    .lesson-panel{padding:10px;}
    .controls{gap:8px;}
    .mascot-spot{width:100%;justify-content:center;}
  }
</style>
</head>

<script>
(function(){
  "use strict";

  const CONFIG = window.__PAGE_CONFIG__ || {};

  const homeBtn = document.getElementById("homeBtn");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const clearBtn = document.getElementById("clearBtn");
  const micBtn = document.getElementById("micIconBtn");
  const girlBtn = document.getElementById("girlBtn");
  const girlFinger = document.getElementById("girlFinger");
  const micFinger = document.getElementById("micFinger");
  const focusLine = document.getElementById("focusLine");
  const recordBtn = document.getElementById("recordBtn");
  const recordingPlayback = document.getElementById("recordingPlayback");
  const recordingStatus = document.getElementById("recordingStatus");
  const conversationStatus = document.getElementById("conversationStatus");
  const posterCard = document.getElementById("posterCard");
  const posterImage = document.getElementById("posterImage");
  const traceCanvas = document.getElementById("traceCanvas");
  const progressPercent = document.getElementById("progressPercent");
  const progressFill = document.getElementById("progressFill");

  const lineEls = Array.from(document.querySelectorAll(".convo-line"));
  const bubbleEls = lineEls.map(line => line.querySelector(".bubble"));
  const resultEls = lineEls.map(line => line.querySelector(".repeat-result"));
  const tryMessageEls = lineEls.map(line => line.querySelector(".try-message"));
  const starEls = lineEls.map(line => line.querySelector(".star-row"));
  const focusEls = [document.getElementById("focus0"), document.getElementById("focus1")];

  const micLines = Array.isArray(CONFIG.micLines) && CONFIG.micLines.length
    ? CONFIG.micLines
    : bubbleEls.map(el => (el.textContent || "").trim()).filter(Boolean);

  let recognitionToken = 0;
  let recorder = null;
  let recordedChunks = [];
  let traceCelebrated = false;

  const state = {
    index: 0,
    phase: "reveal",
    attempts: new Array(micLines.length).fill(0),
    stars: new Array(micLines.length).fill(0),
    busy: false,
    done: false
  };

  const traceState = {
    ctx:null,
    samples:[],
    drawing:false,
    prev:null,
    progress:0
  };

  function setStatus(text){
    if (conversationStatus) conversationStatus.textContent = text || "";
  }

  function setGuide(which){
    if (girlFinger) girlFinger.classList.toggle("show", which === "girl");
    if (micFinger) micFinger.classList.toggle("show", which === "mic");
  }

  function showLine(index){
    const line = lineEls[index];
    if (line) line.classList.add("show");
  }

  function hideAllLines(){
    lineEls.forEach(line => line.classList.remove("show"));
  }

  function clearHighlights(){
    bubbleEls.forEach(bubble => bubble && bubble.classList.remove("sparkle"));
    focusEls.forEach(el => el && el.classList.remove("show", "sparkle"));
  }

  function highlightLine(index, sparkle){
    const bubble = bubbleEls[index];
    const focus = focusEls[index];
    if (bubble) bubble.classList.toggle("sparkle", !!sparkle);
    if (focus) {
      focus.classList.add("show");
      focus.classList.toggle("sparkle", !!sparkle);
    }
  }

  function setResult(index, text, color){
    const el = resultEls[index];
    if (!el) return;
    el.textContent = text || "";
    el.style.color = color || "";
  }

  function setTryMessage(index, text, color){
    const el = tryMessageEls[index];
    if (!el) return;
    el.textContent = text || "";
    el.style.color = color || "";
  }

  function setStars(index, count){
    const el = starEls[index];
    if (!el) return;
    el.textContent = count > 0 ? "⭐".repeat(count) : "";
  }

  function setBusy(on){
    state.busy = !!on;
    if (micBtn) micBtn.classList.toggle("is-busy", state.busy);
  }

  function pickVoice(){
    if (!("speechSynthesis" in window)) return null;
    const voices = window.speechSynthesis.getVoices() || [];
    return voices.find(v => /^en[-_]us/i.test(v.lang || "") && /jenny|aria|ava|allison|ellie|libby|olivia|serena|emma|ivy|grace|luna|nova|stella|samantha|female|girl|zira/i.test(v.name || ""))
      || voices.find(v => /^en[-_]us/i.test(v.lang || "") && !/male|boy|david|guy|michael|james|daniel|thomas|alex|mark|paul|brian|steve|kevin|eric|christopher/i.test(v.name || ""))
      || voices.find(v => /^en/i.test(v.lang || "") && /jenny|aria|ava|allison|ellie|libby|olivia|serena|emma|ivy|grace|luna|nova|stella|samantha|female|girl|zira/i.test(v.name || ""))
      || voices.find(v => /^en/i.test(v.lang || ""))
      || voices[0]
      || null;
  }

  function speak(text){
    return new Promise(resolve => {
      if (!text || !("speechSynthesis" in window)) {
        resolve();
        return;
      }
      try { window.speechSynthesis.cancel(); } catch(_) {}
      const utter = new SpeechSynthesisUtterance(String(text));
      utter.lang = "en-US";
      utter.rate = 0.88;
      utter.pitch = 1.16;
      utter.volume = 1;
      const voice = pickVoice();
      if (voice) utter.voice = voice;
      utter.onend = resolve;
      utter.onerror = resolve;
      window.speechSynthesis.speak(utter);
    });
  }

  function stopSpeaking(){
    recognitionToken += 1;
    try { if ("speechSynthesis" in window) window.speechSynthesis.cancel(); } catch(_) {}
  }

  function normalizeWord(word){
    return String(word || "")
      .toLowerCase()
      .replace(/[^a-z0-9]/g, "")
      .replace(/ies$/, "y")
      .replace(/s$/, "");
  }

  function wordsOf(text){
    return String(text || "")
      .toLowerCase()
      .replace(/[^a-z0-9\s]/g, " ")
      .split(/\s+/)
      .map(normalizeWord)
      .filter(Boolean);
  }

  const stopWords = new Set(["a","an","the","is","are","am","to","of","for","on","in","at","my","your","his","her","our","their","do","does","did","i","you","he","she","it","we","they"]);

  function importantWords(text){
    return wordsOf(text).filter(word => !stopWords.has(word));
  }

  function matchPercent(expected, said){
    const expectedWords = wordsOf(expected);
    const saidWords = wordsOf(said);
    if (!expectedWords.length || !saidWords.length) return 0;
    let hits = 0;
    expectedWords.forEach(word => { if (saidWords.includes(word)) hits += 1; });
    return Math.round((hits / expectedWords.length) * 100);
  }

  function hasEnoughImportantWords(expected, said){
    const needed = importantWords(expected);
    if (!needed.length) return true;
    const heard = wordsOf(said);
    const hits = needed.filter(word => heard.includes(word)).length;
    if (needed.length <= 2) return hits === needed.length;
    return hits >= Math.ceil(needed.length * 0.5);
  }

  function isCorrectRepeat(expected, said){
    const percent = matchPercent(expected, said);
    return percent >= 50 && hasEnoughImportantWords(expected, said);
  }

  function rewardStars(attemptNumber){
    if (attemptNumber === 1) return 3;
    if (attemptNumber === 2) return 2;
    if (attemptNumber === 3) return 1;
    return 0;
  }

  function listenForSpeech(timeoutMs){
    return new Promise(resolve => {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        resolve({ supported:false, transcript:"" });
        return;
      }
      const token = ++recognitionToken;
      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.continuous = false;
      recognition.maxAlternatives = 3;
      let finished = false;
      const timer = setTimeout(() => { try { recognition.stop(); } catch(_) {} }, timeoutMs || 7000);
      function finish(transcript){
        if (finished || token !== recognitionToken) return;
        finished = true;
        clearTimeout(timer);
        resolve({ supported:true, transcript:(transcript || "").trim() });
      }
      recognition.onresult = event => {
        const transcript = Array.from(event.results || [])
          .map(result => result && result[0] && result[0].transcript)
          .filter(Boolean)
          .join(" ");
        finish(transcript);
      };
      recognition.onerror = () => finish("");
      recognition.onnomatch = () => finish("");
      recognition.onend = () => finish("");
      try { recognition.start(); } catch(_) { finish(""); }
    });
  }

  function playChime(){
    let played = false;
    try {
      if (CONFIG.chimeSrc) {
        const audio = new Audio(CONFIG.chimeSrc);
        audio.volume = 0.9;
        audio.play().then(() => { played = true; }).catch(() => {});
      }
    } catch(_) {}
    setTimeout(() => {
      if (played) return;
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        const ctx = new AudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(660, ctx.currentTime);
        osc.frequency.setValueAtTime(880, ctx.currentTime + 0.12);
        osc.frequency.setValueAtTime(1046, ctx.currentTime + 0.24);
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.55);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.6);
      } catch(_) {}
    }, 250);
  }

  async function saveProgress(extra = {}){
    const completedLines = resultEls.filter(el => {
      const text = (el && el.textContent || "").trim();
      return text && !/sorry|nice try/i.test(text);
    }).length;
    const totalStars = state.stars.reduce((sum, value) => sum + value, 0);
    const score = Math.max(0, Math.min(100, Math.round((completedLines / Math.max(1, micLines.length)) * 55 + totalStars * 5 + (traceState.progress >= 90 ? 30 : Math.round(traceState.progress * .3)))));
    const payload = {
      pageId: CONFIG.pageId || "LA2",
      file: (CONFIG.pageId || "LA2") + ".html",
      level: CONFIG.level || "A",
      type: "lesson",
      activityType: "straight-line-mic-trace",
      score,
      stars: totalStars,
      completed: !!(state.done || traceState.progress >= 90),
      tracing: traceState.progress || 0,
      skills: {
        speaking: completedLines >= micLines.length ? 3 : completedLines > 0 ? 1 : 0,
        listening: completedLines >= micLines.length ? 3 : completedLines > 0 ? 1 : 0,
        reading: 1,
        writing: traceState.progress >= 90 ? 3 : traceState.progress > 0 ? 1 : 0
      },
      savedAt: new Date().toISOString(),
      ts: Date.now(),
      ...extra
    };
    try {
      const store = JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      store[payload.pageId] = { ...(store[payload.pageId] || {}), ...payload };
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store));
      localStorage.setItem("GP_EIS_LAST_FILE", payload.file);
      localStorage.setItem("gpLatestProgress", JSON.stringify(payload));
    } catch(_) {}
    try { window.dispatchEvent(new CustomEvent("gp-progress-update", { detail: payload })); } catch(_) {}
    try {
      if (window.GPTrack && typeof window.GPTrack.finish === "function") await window.GPTrack.finish(payload);
    } catch(_) {}
    return payload;
  }

  async function finishSequence(){
    clearHighlights();
    setBusy(false);
    state.done = true;
    state.phase = "done";
    const remarks = Array.isArray(CONFIG.completionRemarks) && CONFIG.completionRemarks.length ? CONFIG.completionRemarks : ["Wow! You are super smart!", "Amazing Job!", "Great! Keep it up!"];
    const remark = remarks[Math.floor(Math.random() * remarks.length)];
    playChime();
    setStatus(remark);
    setGuide("");
    await speak(remark);
    await saveProgress({ completed:true, score:100 });
  }

  async function revealCurrentLineAndSpeak(){
    clearHighlights();
    const text = micLines[state.index];
    showLine(state.index);
    highlightLine(state.index, false);
    setStatus(text);
    setGuide("mic");
    await speak(text);
    state.phase = "repeat-ready";
    setStatus("Tap the microphone again and repeat after me.");
    await saveProgress();
  }

  async function moveToNextLine(){
    clearHighlights();
    if (state.index >= micLines.length - 1) {
      await finishSequence();
      return;
    }
    state.index += 1;
    state.phase = "repeat-ready";
    showLine(state.index);
    highlightLine(state.index, false);
    setStatus(micLines[state.index]);
    setGuide("mic");
    await speak(micLines[state.index]);
    setStatus("Tap the microphone again and repeat after me.");
    await saveProgress();
  }

  async function handleRepeatAttempt(){
    const expected = micLines[state.index];
    if (!expected) return;
    highlightLine(state.index, true);
    setTryMessage(state.index, "", "");
    setStatus("Repeat after me.");
    await speak("Repeat after me.");
    setBusy(true);
    setStatus("Listening... say the sentence now.");
    const heard = await listenForSpeech(7000);
    setBusy(false);
    if (!heard.supported) {
      setTryMessage(state.index, "Speech check is not supported. Use Chrome or Edge.", "#b06a00");
      setStatus("Speech check is not supported on this browser.");
      state.phase = "repeat-ready";
      return;
    }
    const transcript = (heard.transcript || "").trim();
    const attemptNumber = ++state.attempts[state.index];
    if (isCorrectRepeat(expected, transcript)) {
      const stars = rewardStars(attemptNumber);
      state.stars[state.index] = stars;
      setResult(state.index, transcript || expected, "#2f9f5f");
      setTryMessage(state.index, "", "");
      setStars(state.index, stars);
      await saveProgress();
      await moveToNextLine();
      return;
    }
    if (attemptNumber >= 3) {
      state.stars[state.index] = 0;
      setStars(state.index, 0);
      setResult(state.index, "", "");
      setTryMessage(state.index, "You did a good Job. Nice try!", "#b06a00");
      setStatus("You did a good Job. Nice try!");
      await saveProgress();
      await speak("You did a good Job. Nice try!");
      await moveToNextLine();
      return;
    }
    setResult(state.index, "", "");
    setTryMessage(state.index, "Sorry, try again!", "#c62828");
    setStatus("Sorry, try again!");
    await saveProgress();
    await speak("Sorry, try again!");
    state.phase = "repeat-ready";
    setStatus("Tap the microphone and try again.");
  }

  async function onMicClick(event){
    if (event) { event.preventDefault(); event.stopPropagation(); }
    if (state.busy || state.done) return;
    if (state.phase === "reveal") {
      await revealCurrentLineAndSpeak();
      return;
    }
    if (state.phase === "repeat-ready") await handleRepeatAttempt();
  }

  async function onGirlTap(){
    setGuide("mic");
    if (focusLine) focusLine.classList.add("sparkle");
    setStatus(CONFIG.girlTapSpeech || "This is a straight line.");
    await speak(CONFIG.girlTapSpeech || "This is a straight line.");
    setStatus("Now trace the straight line or tap the microphone.");
    await speak("Now trace the straight line or tap the microphone.");
    setTimeout(() => focusLine && focusLine.classList.remove("sparkle"), 1000);
  }

  async function speakPageInstruction(){
    const intro = "Tap the girl first. Trace the straight line. Then tap the microphone and repeat after me.";
    setGuide("girl");
    setStatus(intro);
    await speak(intro);
  }

  function resizeCanvas(){
    if (!traceCanvas || !posterCard) return;
    const rect = posterCard.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    traceCanvas.width = Math.max(10, Math.round(rect.width * dpr));
    traceCanvas.height = Math.max(10, Math.round(rect.height * dpr));
    const ctx = traceCanvas.getContext("2d");
    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(dpr, dpr);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "rgba(25,168,91,.92)";
    ctx.lineWidth = Math.max(8, rect.width * 0.018);
    traceState.ctx = ctx;
    traceState.width = rect.width;
    traceState.height = rect.height;
    rebuildSamples();
  }

  function rebuildSamples(){
    const width = traceState.width || 1;
    const height = traceState.height || 1;
    const a = { x:0.18 * width, y:0.752 * height };
    const b = { x:0.835 * width, y:0.752 * height };
    const len = Math.hypot(b.x - a.x, b.y - a.y);
    const steps = Math.max(20, Math.ceil(len / 9));
    traceState.samples = [];
    for (let i = 0; i <= steps; i += 1) {
      const t = i / steps;
      traceState.samples.push({ x:a.x + (b.x - a.x) * t, y:a.y + (b.y - a.y) * t, hit:false });
    }
    traceState.progress = 0;
    updateTraceProgress();
  }

  function distPointToSegment(px, py, ax, ay, bx, by){
    const dx = bx - ax, dy = by - ay;
    if (!dx && !dy) return Math.hypot(px - ax, py - ay);
    const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / (dx*dx + dy*dy)));
    const x = ax + t * dx, y = ay + t * dy;
    return Math.hypot(px - x, py - y);
  }

  function getPoint(evt){
    const rect = traceCanvas.getBoundingClientRect();
    return { x:evt.clientX - rect.left, y:evt.clientY - rect.top };
  }

  function markHits(a, b){
    const threshold = Math.max(18, (traceState.width || 400) * 0.028);
    for (const sample of traceState.samples) {
      if (sample.hit) continue;
      if (distPointToSegment(sample.x, sample.y, a.x, a.y, b.x, b.y) <= threshold) sample.hit = true;
    }
  }

  function updateTraceProgress(){
    const hitCount = traceState.samples.filter(sample => sample.hit).length;
    traceState.progress = traceState.samples.length ? Math.round((hitCount / traceState.samples.length) * 100) : 0;
    if (progressPercent) progressPercent.textContent = traceState.progress + "%";
    if (progressFill) progressFill.style.width = traceState.progress + "%";
    if (traceState.progress >= 90 && !traceCelebrated) {
      traceCelebrated = true;
      playChime();
      setStatus("Great tracing! This is a straight line.");
      speak("Great tracing! This is a straight line.");
    }
    if (traceState.progress < 90) traceCelebrated = false;
    saveProgress();
  }

  function initTracing(){
    if (!traceCanvas) return;
    resizeCanvas();
    traceCanvas.addEventListener("pointerdown", evt => {
      evt.preventDefault();
      traceCanvas.setPointerCapture?.(evt.pointerId);
      traceState.drawing = true;
      traceState.prev = getPoint(evt);
      if (focusLine) focusLine.classList.add("show");
    });
    traceCanvas.addEventListener("pointermove", evt => {
      if (!traceState.drawing) return;
      evt.preventDefault();
      const p = getPoint(evt);
      const ctx = traceState.ctx;
      ctx.beginPath();
      ctx.moveTo(traceState.prev.x, traceState.prev.y);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      markHits(traceState.prev, p);
      traceState.prev = p;
      updateTraceProgress();
    });
    function stop(evt){
      if (!traceState.drawing) return;
      evt.preventDefault();
      traceState.drawing = false;
      traceState.prev = null;
    }
    traceCanvas.addEventListener("pointerup", stop);
    traceCanvas.addEventListener("pointercancel", stop);
    traceCanvas.addEventListener("pointerleave", stop);
    window.addEventListener("resize", resizeCanvas);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", resizeCanvas);
  }

  function resetPage(){
    stopSpeaking();
    state.index = 0;
    state.phase = "reveal";
    state.attempts = new Array(micLines.length).fill(0);
    state.stars = new Array(micLines.length).fill(0);
    state.busy = false;
    state.done = false;
    setBusy(false);
    hideAllLines();
    clearHighlights();
    resultEls.forEach(el => { if (el) { el.textContent = ""; el.style.color = ""; } });
    tryMessageEls.forEach(el => { if (el) { el.textContent = ""; el.style.color = ""; } });
    starEls.forEach(el => { if (el) el.textContent = ""; });
    if (traceState.ctx) traceState.ctx.clearRect(0,0,traceState.width || 1,traceState.height || 1);
    rebuildSamples();
    setGuide("girl");
    setStatus("Tap the girl to begin.");
    saveProgress({ score:0, stars:0, completed:false });
  }

  function go(url){
    stopSpeaking();
    if (url) window.location.href = url;
  }

  async function toggleRecord(){
    if (!recordBtn) return;
    function setRecordLabel(label){
      recordBtn.innerHTML = `
        <svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
          <path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        </svg>${label}
      `;
    }
    if (recorder && recorder.state === "recording") {
      recorder.stop();
      setRecordLabel("Record");
      if (recordingStatus) recordingStatus.textContent = "Saved recording.";
      return;
    }
    try {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        if (recordingStatus) recordingStatus.textContent = "Microphone not available in this browser.";
        return;
      }
      if (!window.MediaRecorder) {
        if (recordingStatus) recordingStatus.textContent = "Recording not supported on this device.";
        return;
      }
      const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      recordedChunks = [];
      recorder = new MediaRecorder(stream);
      recorder.ondataavailable = event => { if (event.data && event.data.size > 0) recordedChunks.push(event.data); };
      recorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: recorder.mimeType || "audio/webm" });
        if (recordingPlayback) {
          recordingPlayback.src = URL.createObjectURL(blob);
          recordingPlayback.load();
        }
        stream.getTracks().forEach(track => track.stop());
      };
      recorder.start();
      setRecordLabel("Stop");
      if (recordingStatus) recordingStatus.textContent = "Recording... speak clearly.";
    } catch(_) {
      if (recordingStatus) recordingStatus.textContent = "Microphone permission denied.";
    }
  }

  if (micBtn) micBtn.addEventListener("click", onMicClick, { passive:false });
  if (girlBtn) girlBtn.addEventListener("click", onGirlTap);
  if (clearBtn) clearBtn.addEventListener("click", resetPage);
  if (recordBtn) recordBtn.addEventListener("click", toggleRecord);
  if (prevBtn) prevBtn.addEventListener("click", () => go(CONFIG.prevHref));
  if (nextBtn) nextBtn.addEventListener("click", () => go(CONFIG.nextHref));
  if (homeBtn) homeBtn.addEventListener("click", event => { event.preventDefault(); go(CONFIG.homeHref); });

  if ("speechSynthesis" in window) window.speechSynthesis.onvoiceschanged = () => {};
  if (posterImage && posterImage.complete) initTracing();
  else if (posterImage) posterImage.addEventListener("load", initTracing, { once:true });
  else initTracing();

  hideAllLines();
  setGuide("girl");
  setStatus("Tap the girl to begin.");
  saveProgress({ score:0, stars:0, completed:false });
  window.addEventListener("load", () => speakPageInstruction(), { once:true });
  window.addEventListener("beforeunload", stopSpeaking);
})();
</script>
</body>
</html>

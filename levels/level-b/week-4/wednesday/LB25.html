<!doctype html>
<html lang="en">
<head>
<script>
  window.__GP_FORCE_UNIFIED_MIC_PROTOCOL__ = true;
  window.__GP_ENABLE_AUTO_INTRO_VIDEOS__ = false;
  window.__GP_AUTO_PAGE_OPENING_HINT__ = false;
</script>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Level B • Even Numbers</title>

<style>
  :root{
    --ink:#263238;
    --orange:#ff9f1c;
    --circle:#f44756;
    --green:#2fd17d;
    --soft:#f7fff4;
    --panel:#ffffff;
    --shadow:0 18px 45px rgba(31,42,55,.16);
    font-family:"Comic Sans MS","Baloo 2","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{
    min-height:100%;
    height:auto;
  }
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    background:
      radial-gradient(circle at 12% 10%, rgba(255,217,120,.40), transparent 26%),
      radial-gradient(circle at 88% 14%, rgba(170,230,255,.45), transparent 28%),
      radial-gradient(circle at 50% 95%, rgba(190,255,205,.55), transparent 30%),
      #e7f7e7;
    padding:8px 10px 12px;
    color:var(--ink);
    overflow-x:hidden;
    overflow-y:auto;
  }
  .app{
    width:min(980px,98vw);
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:center;
    margin:0 auto;
  }
  .poster-card{
    position:relative;
    width:min(860px,96vw,60svh);
    max-width:860px;
    border-radius:20px;
    background:#fff;
    box-shadow:var(--shadow);
    overflow:hidden;
    touch-action:manipulation;
    flex:0 0 auto;
  }
  .poster-wrap{
    position:relative;
    width:100%;
    aspect-ratio:958/1326;
  }
  .poster-img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    display:block;
    object-fit:contain;
    user-select:none;
    -webkit-user-drag:none;
    pointer-events:none;
  }

  .number-target{
    position:absolute;
    transform:translate(-50%,-50%);
    border:0;
    padding:0;
    background:transparent;
    cursor:pointer;
    border-radius:999px;
    z-index:6;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }
  .number-target:focus-visible{
    outline:4px solid rgba(47,209,125,.75);
    outline-offset:4px;
  }
  .number-target::before{
    content:"";
    position:absolute;
    inset:7%;
    border:0 solid transparent;
    border-radius:999px;
    opacity:0;
    transform:scale(.74);
    transition:opacity .15s ease, transform .15s ease;
  }
  .number-target.circled::before{
    opacity:1;
    transform:scale(1);
    border:clamp(4px,.85vw,8px) solid var(--circle);
    box-shadow:
      0 0 0 clamp(2px,.35vw,4px) rgba(255,255,255,.88),
      0 5px 12px rgba(0,0,0,.20);
  }
  .number-target.wrong::before{
    opacity:1;
    transform:scale(1);
    border:clamp(3px,.65vw,6px) dashed #8b0000;
    box-shadow:0 0 0 4px rgba(255,255,255,.8);
  }
  .number-target.wrong::after{
    content:"✕";
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    color:#8b0000;
    background:#fff;
    border-radius:999px;
    width:30px;
    height:30px;
    display:grid;
    place-items:center;
    font-weight:1000;
    font-size:20px;
    box-shadow:0 4px 10px rgba(0,0,0,.18);
  }
  .number-target.pulse::before{
    animation:circlePop .34s ease-out;
  }
  @keyframes circlePop{
    0%{transform:scale(.55);opacity:.1}
    70%{transform:scale(1.12);opacity:1}
    100%{transform:scale(1);opacity:1}
  }

  .control-card{
    width:min(860px,96vw,60svh);
    max-width:860px;
    background:rgba(255,255,255,.95);
    border-radius:20px;
    box-shadow:0 12px 26px rgba(31,42,55,.10);
    padding:10px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }
  .progress-line{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    font-weight:1000;
    color:#1f4c36;
    text-align:center;
  }
  .progress-bar{
    width:min(420px,92%);
    height:13px;
    border-radius:999px;
    background:#e6edf6;
    overflow:hidden;
    box-shadow:inset 0 2px 4px rgba(0,0,0,.12);
  }
  .progress-fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#ff9f1c,#2fd17d);
    transition:width .18s ease;
  }
  .button-row{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;
  }
  .btn{
    border:0;
    border-radius:999px;
    padding:10px 14px;
    font-weight:1000;
    font-size:.94rem;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.16);
    color:#fff;
    background:#ff8a5b;
  }
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.16)}
  .btn.secondary{background:#f2f6ff;color:#21335c}
  .btn.success{background:linear-gradient(180deg,#62e6b0,#20c76a);color:#092012}
  .mic-icon-btn{
    width:52px;
    height:52px;
    border:0;
    border-radius:999px;
    background:#fff;
    box-shadow:0 6px 16px rgba(0,0,0,.18);
    display:inline-flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    padding:0;
  }
  .mic-icon-btn img{
    width:34px;
    height:34px;
    display:block;
    filter:drop-shadow(0 3px 6px rgba(0,0,0,.18));
  }
  .feedback{
    min-height:1.35em;
    font-weight:1000;
    font-size:clamp(.95rem,2.5vw,1.1rem);
    text-align:center;
    color:#1f7a3a;
  }
  .feedback.try{color:#d62828}
  .feedback.sparkle{
    animation:feedbackSparkle 1.1s ease-in-out infinite;
  }
  @keyframes feedbackSparkle{
    0%,100%{filter:brightness(1)}
    50%{filter:brightness(1.25)}
  }


  @supports (width: 1dvh){
    .poster-card,
    .control-card{
      width:min(860px,96vw,60dvh);
    }
  }

  @media (max-height:720px){
    body{padding-top:4px;}
    .app{gap:6px;}
    .poster-card,
    .control-card{
      width:min(820px,96vw,57dvh);
    }
    .control-card{padding:7px;}
    .feedback{font-size:.9rem;}
    .progress-bar{height:10px;}
  }

  @media (max-width:640px){
    body{padding:6px}
    .poster-card,.control-card{border-radius:14px}
    .btn{font-size:.84rem;padding:9px 11px}
    .mic-icon-btn{width:48px;height:48px}
  }
</style>
</head>

<script>
(() => {
  const targets = [...document.querySelectorAll(".number-target")];
  const correctTargets = targets.filter(t => t.dataset.correct === "true");
  const feedback = document.getElementById("feedback");
  const foundCount = document.getElementById("foundCount");
  const progressFill = document.getElementById("progressFill");
  const progressPercent = document.getElementById("progressPercent");
  const clearBtn = document.getElementById("clearBtn");
  const checkBtn = document.getElementById("checkBtn");
  const micIconBtn = document.getElementById("micIconBtn");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  const correctNumbers = new Set(["2","4","6","8","10"]);
  let completed = false;
  let saveTimer = null;
  let micStep = 0;
  let micBusy = false;

  function setFeedback(text, isTry = false, sparkle = false){
    feedback.textContent = text || "";
    feedback.classList.toggle("try", !!isTry);
    feedback.classList.toggle("sparkle", !!sparkle);
  }

  function speak(text, onEnd){
    if (window.GPTracing && typeof window.GPTracing.speakText === "function") {
      window.GPTracing.speakText(text, { rate: 0.94, pitch: 1.08, onEnd });
      return;
    }
    if (!("speechSynthesis" in window)) {
      if (typeof onEnd === "function") window.setTimeout(onEnd, 250);
      return;
    }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.94;
    u.pitch = 1.08;
    u.volume = 1;
    if (window.GPTracing && typeof window.GPTracing.applyPreferredVoice === "function") {
      window.GPTracing.applyPreferredVoice(u);
    }
    if (typeof onEnd === "function") u.onend = onEnd;
    window.speechSynthesis.speak(u);
  }

  function playGood(){
    try{ window.GPTracing?.playSuccessChime?.(); }catch(_e){}
    try{ window.GPTracing?.playTraceTick?.({ frequency:880, endFrequency:1180, volume:.06 }); }catch(_e){}
  }

  function playBad(){
    try{
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      const ac = new AC();
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = "square";
      o.frequency.setValueAtTime(220, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(145, ac.currentTime + .15);
      g.gain.setValueAtTime(.0001, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(.045, ac.currentTime + .02);
      g.gain.exponentialRampToValueAtTime(.0001, ac.currentTime + .17);
      o.connect(g).connect(ac.destination);
      o.start();
      o.stop(ac.currentTime + .18);
      o.onended = () => ac.close();
    }catch(_e){}
  }

  function scoreNow(){
    const found = correctTargets.filter(t => t.classList.contains("circled")).length;
    return {
      found,
      total: correctTargets.length,
      score: Math.round((found / correctTargets.length) * 100)
    };
  }

  function updateProgress(){
    const { found, total, score } = scoreNow();
    foundCount.textContent = String(found);
    progressPercent.textContent = score + "%";
    progressFill.style.width = score + "%";

    if (typeof window.__gpSaveEvenNumbers === "function") {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => window.__gpSaveEvenNumbers(score), 200);
    }

    if (found === total && !completed) {
      completed = true;
      setFeedback("🎉 Excellent! You circled all the even numbers!", false, true);
      try{ window.GPTracing?.playCheerAudio?.(); }catch(_e){}
      speak("Excellent! You circled all the even numbers!");
      if (typeof window.__gpSaveEvenNumbers === "function") window.__gpSaveEvenNumbers(100);
    }
  }

  function handleTarget(target){
    const num = target.dataset.num;
    const isCorrect = target.dataset.correct === "true";

    if (isCorrect) {
      if (!target.classList.contains("circled")) {
        target.classList.add("circled", "pulse");
        window.setTimeout(() => target.classList.remove("pulse"), 400);
        playGood();
        setFeedback(`Great! ${num} is an even number.`);
      } else {
        setFeedback(`${num} is already circled. Keep going!`);
      }
      updateProgress();
      return;
    }

    target.classList.add("wrong");
    playBad();
    setFeedback(`Oops! ${num} is an odd number. Find an even number.`, true);
    window.setTimeout(() => target.classList.remove("wrong"), 850);
  }

  targets.forEach(target => {
    target.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      handleTarget(target);
    });
  });

  clearBtn.addEventListener("click", () => {
    targets.forEach(t => t.classList.remove("circled","wrong","pulse"));
    completed = false;
    setFeedback("Circles cleared. Tap the even numbers: 2, 4, 6, 8 and 10.");
    updateProgress();
    speak("Circles cleared. Try again.");
  });

  checkBtn.addEventListener("click", () => {
    const { found, total } = scoreNow();
    if (found === total) {
      completed = true;
      setFeedback("🎉 Perfect! 2, 4, 6, 8 and 10 are even numbers.", false, true);
      speak("Perfect! Two, four, six, eight and ten are even numbers.");
      if (typeof window.__gpSaveEvenNumbers === "function") window.__gpSaveEvenNumbers(100);
    } else {
      const left = total - found;
      setFeedback(`You found ${found}/${total}. Find ${left} more even number${left === 1 ? "" : "s"}.`, true);
      speak(`You found ${found} out of ${total}. Find ${left} more even number${left === 1 ? "" : "s"}.`);
    }
  });

  function normalizeWords(text){
    return String(text || "")
      .toLowerCase()
      .replace(/[^a-z0-9 ]+/g, " ")
      .replace(/\s+/g, " ")
      .trim()
      .split(" ")
      .filter(Boolean);
  }

  function matchPercent(expected, said){
    const exp = normalizeWords(expected);
    const got = new Set(normalizeWords(said));
    if (!exp.length) return 0;
    const hits = exp.filter(w => got.has(w)).length;
    return Math.round((hits / exp.length) * 100);
  }

  function listenForRepeat(expected){
    if (window.GPTracing && typeof window.GPTracing.listenForRepeat === "function") {
      window.GPTracing.listenForRepeat(expected, (pct) => {
        micBusy = false;
        if (pct >= 50) {
          setFeedback("Excellent speaking! Now circle the even numbers.", false, true);
          speak("Excellent speaking! Now circle the even numbers.");
        } else {
          setFeedback("Sorry, try again! Tap the microphone and repeat.", true);
          speak("Sorry, try again!");
        }
      });
      return;
    }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      micBusy = false;
      setFeedback("Now circle the even numbers: 2, 4, 6, 8 and 10.");
      return;
    }

    const rec = new SR();
    rec.lang = "en-US";
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.onresult = (event) => {
      const said = event.results?.[0]?.[0]?.transcript || "";
      const pct = matchPercent(expected, said);
      micBusy = false;
      if (pct >= 50) {
        setFeedback("Excellent speaking! Now circle the even numbers.", false, true);
        speak("Excellent speaking! Now circle the even numbers.");
      } else {
        setFeedback("Sorry, try again! Tap the microphone and repeat.", true);
        speak("Sorry, try again!");
      }
    };
    rec.onerror = () => {
      micBusy = false;
      setFeedback("Microphone permission is needed. You can still circle the even numbers.", true);
    };
    rec.onend = () => { micBusy = false; };
    try{ rec.start(); }catch(_e){ micBusy = false; }
  }

  function runMicProtocol(){
    if (micBusy) return;
    const line = "Find and circle all of the even numbers.";
    if (micStep === 0) {
      setFeedback(line, false, true);
      speak(line);
      micStep = 1;
      return;
    }

    micBusy = true;
    setFeedback("Repeat after me: Find and circle all of the even numbers.", false, true);
    speak("Repeat after me.", () => {
      setTimeout(() => listenForRepeat(line), 250);
    });
    micStep = 1;
  }

  micIconBtn.addEventListener("click", (event) => {
    event.preventDefault();
    event.stopImmediatePropagation();
    runMicProtocol();
  }, true);

  prevBtn.addEventListener("click", () => { window.location.href = "LB21.html"; });
  nextBtn.addEventListener("click", () => {
    const { score } = scoreNow();
    if (typeof window.__gpSaveEvenNumbers === "function") window.__gpSaveEvenNumbers(score);
    window.location.href = "../thursday/PolygonMusicFairlyTale.html";
  });

  updateProgress();
})();
</script>

<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";

  window.GPProgress?.installTracker?.({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LB25",
    defaultLevel: "B",
    defaultActivityType: "lesson",
    defaultScore: 0,
    defaultStars: 0,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{ return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null"); }
    catch(e){ return null; }
  }

  function getActivityStore(){
    try{ return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}"); }
    catch(e){ return {}; }
  }

  function setActivityStore(store){
    try{ localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {})); }
    catch(e){}
  }

  function saveLocalActivityFallback(score){
    const session = getStudentSession() || {};
    const safeScore = Math.max(0, Math.min(100, Math.round(Number(score) || 0)));
    const entry = {
      pageId: "LB25",
      file: "LB25.html",
      level: "B",
      type: "lesson",
      activityType: "circle",
      score: safeScore,
      tracing: safeScore,
      stars: safeScore >= 100 ? 3 : safeScore >= 60 ? 2 : safeScore > 0 ? 1 : 0,
      completed: safeScore >= 100,
      skills: { reading: 1, writing: 0, speaking: 1, listening: 1 },
      week: 4,
      month: 1,
      classId: session.classId || null,
      studentId: session.studentId || null,
      studentName: session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store.LB25 = { ...(store.LB25 || {}), ...entry };
    setActivityStore(store);
    try{ localStorage.setItem("GP_EIS_LAST_FILE", "LB25.html"); }catch(e){}
    return entry;
  }

  async function finishAndSave(score){
    const safeScore = Math.max(0, Math.min(100, Math.round(Number(score) || 0)));
    saveLocalActivityFallback(safeScore);

    if (typeof window.finishActivity === "function") {
      try {
        await window.finishActivity({
          pageId: "LB25",
          file: "LB25.html",
          level: "B",
          activityType: "circle",
          score: safeScore,
          tracing: safeScore,
          stars: safeScore >= 100 ? 3 : safeScore >= 60 ? 2 : safeScore > 0 ? 1 : 0,
          completed: safeScore >= 100,
          skills: { reading: 1, writing: 0, speaking: 1, listening: 1 }
        });
      } catch(err) {
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }
  }

  window.__gpSaveEvenNumbers = finishAndSave;
</script>

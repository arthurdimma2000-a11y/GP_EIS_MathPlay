<!doctype html>
<html lang="en">
<head>

<style id="gpLessonPrehide">
  .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
  .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}
  .convo-line.show,.speech-line.show,.dialog-line.show,.bubble-line.show,.bubble-left.show,.bubble-right.show,#bubbleLeft.show,#bubbleRight.show{display:block !important;}
  .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,1.9vw,19px) !important;line-height:1.24 !important;max-width:min(40vw,320px) !important;white-space:normal !important;word-break:break-word !important;overflow-wrap:anywhere !important;}
  @media (max-width:780px){
    .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,3.6vw,17px) !important;max-width:min(44vw,220px) !important;line-height:1.2 !important;}
  }
</style>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Level B • Even Numbers</title>

  <style>
    :root{
      --ink:#2d2d2d;
      --bg:#e4f6df;
      --border:#d9b9f0;
      --bubble-left:#fde3c4;
      --btn-orange:#ff8a5b;
      --btn-blue:#dfeaff;
      --shadow:0 10px 24px rgba(0,0,0,.08);
      font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg);
      padding:16px;
      color:var(--ink);
    }
    .app{
      width:min(940px,96vw);
      background:#fff;
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:12px 12px 8px;
      position:relative;
    }
    .board{
      border:2px dashed var(--border);
      border-radius:16px;
      padding:12px;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,185,210,.35) 0 52px, transparent 54px),
        radial-gradient(circle at 82% 22%, rgba(210,240,255,.4) 0 58px, transparent 60px),
        radial-gradient(circle at 30% 80%, rgba(255,225,150,.35) 0 56px, transparent 58px),
        radial-gradient(circle at 72% 78%, rgba(190,255,210,.35) 0 54px, transparent 56px),
        linear-gradient(180deg,#fff7fb 0%, #f6f7ff 50%, #fff5e8 100%);
      min-height:360px;
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }
    .tray-hero{
      display:flex;
      justify-content:center;
      margin:6px 0 8px;
      width:100%;
    }
    .tray-hero img{
      width:min(676px,92%);
      height:auto;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
    }
    .row{
      display:flex;
      align-items:center;
      gap:10px;
      margin:10px 0;
      width:100%;
      justify-content:flex-start;
      z-index:2;
    }
    .convo-line{
      display:none !important;
      position:absolute;
      transform:translateY(-30%);
    }
    .convo-line.show{
      display:flex !important;
    }
    .line1{
      left:10%;
      top:16%;
    }
    .bubble{
      padding:10px 14px;
      border-radius:16px;
      position:relative;
      font-size:1rem;
      max-width:min(560px,70vw);
      line-height:1.25;
      background:var(--bubble-left);
    }
    .bubble::after{
      content:"";
      position:absolute;
      left:-6px;
      top:14px;
      border-width:8px 8px 8px 0;
      border-style:solid;
      border-color:transparent var(--bubble-left) transparent transparent;
    }
    .bubble.sparkle{
      background: linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);
      box-shadow:0 0 12px rgba(255,214,0,.6), 0 0 18px rgba(255,105,180,.4);
      animation: sparklePulse 1.2s ease-in-out infinite;
    }
    @keyframes sparklePulse{
      0%,100%{filter:brightness(1);}
      50%{filter:brightness(1.12);}
    }
    .controls{
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      z-index:3;
      background:rgba(255,255,255,.92);
      padding:4px 6px;
      border-radius:16px;
      box-shadow:0 8px 16px rgba(0,0,0,.18);
      width:fit-content;
      max-width:100%;
      justify-content:center;
      margin-top:2px;
    }
    .btn{
      border:none;
      border-radius:999px;
      padding:8px 12px;
      font-size:.9rem;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(0,0,0,.15);
    }
    .btn.prev{background:var(--btn-orange);color:#fff;}
    .btn.next{background:var(--btn-orange);color:#fff;}
    .btn.stop{background:var(--btn-blue);color:#1f3b6b;}
    .mic-icon-btn{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .mic-icon-btn img{
      width:32px;
      height:32px;
      display:block;
      filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
    }
    .target{
      position:absolute;
      width:70px;
      height:70px;
      border-radius:50%;
      border:3px dashed transparent;
      cursor:pointer;
      z-index:4;
    }
    .target.circled{
      border-color:#ff3b5b;
      box-shadow:0 0 0 2px rgba(255,59,91,.3);
    }
    .target.wrong{
      border-color:#d62828;
      box-shadow:0 0 0 2px rgba(214,40,40,.35);
    }
    .feedback{
      font-size:1rem;
      font-weight:900;
      color:#2f9f5f;
      min-height:1.2em;
    }
    .highlight-red{ color:#d62828; }

    /* Intro Video Overlay Styles */
    #lbIntroVideoOverlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:9999;
      opacity:1;
      visibility:visible;
      pointer-events:auto;
    }
    #lbIntroVideoOverlay.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
      transition:opacity 0.3s ease-out;
    }
    .intro-video-container{
      max-width:90vw;
      max-height:90vh;
      position:relative;
    }
    #introVideo{
      display:block;
      width:100%;
      height:auto;
      border-radius:8px;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }
    .intro-controls{
      margin-top:20px;
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }
    .intro-btn{
      border:none;
      border-radius:999px;
      padding:12px 24px;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(0,0,0,.25);
      transition:transform 0.1s;
    }
    .intro-btn:active{
      transform:translateY(2px);
    }
    .intro-btn.sound{
      background:var(--btn-orange);
      color:#fff;
    }
    .intro-btn.skip{
      background:var(--btn-blue);
      color:#1f3b6b;
    }
  </style>
</head>
<body data-progress-required="circle">
  <!-- Intro Video Overlay -->
  <div id="lbIntroVideoOverlay">
    <div class="intro-video-container">
      <video id="introVideo" preload="metadata" autoplay muted>
        <source src="https://res.cloudinary.com/dtknykrkf/video/upload/v1774463156/LB25bvideo_vamfu4.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <div class="intro-controls">
        <button class="intro-btn sound" id="soundToggleBtn">🔊 Turn On Sound</button>
        <button class="intro-btn skip" id="skipIntroBtn">Skip Intro</button>
      </div>
    </div>
  </div>

  <div class="app">
    <div class="board" id="board">
      <div class="tray-hero">
        <img src="../../../../assets/images/shapes/B25.png" alt="Poster" id="designImage">
      </div>

      <div class="row convo-line line1">
        <div class="bubble">Find and circle all of the <span class="highlight-red">even numbers</span>.</div>
      </div>

      <div class="feedback" id="feedback"></div>

      <!-- targets (approx positions) -->
      <button class="target" data-num="2" data-correct="true" style="left:18%; top:36%;"></button>
      <button class="target" data-num="4" data-correct="true" style="left:46%; top:36%;"></button>
      <button class="target" data-num="6" data-correct="true" style="left:72%; top:36%;"></button>
      <button class="target" data-num="8" data-correct="true" style="left:22%; top:70%;"></button>
      <button class="target" data-num="10" data-correct="true" style="left:40%; top:56%;"></button>
      <button class="target" data-num="7" data-correct="false" style="left:24%; top:52%;"></button>
      <button class="target" data-num="9" data-correct="false" style="left:58%; top:56%;"></button>
      <button class="target" data-num="1" data-correct="false" style="left:74%; top:52%;"></button>
      <button class="target" data-num="3" data-correct="false" style="left:78%; top:72%;"></button>
      <button class="target" data-num="5" data-correct="false" style="left:52%; top:76%;"></button>

      <div class="controls">
        <button class="btn prev" id="prevBtn">&#8592; Previous page</button>
        <button class="btn next" id="nextBtn">Next page &#8594;</button>
        <button class="btn stop" id="clearBtn" type="button">Clear circles</button>
        <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
          <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone">
        </button>
      </div>
    </div>
  </div>

  <script>
    // Intro Video Logic
    const introOverlay = document.getElementById("lbIntroVideoOverlay");
    const introVideo = document.getElementById("introVideo");
    const soundToggleBtn = document.getElementById("soundToggleBtn");
    const skipIntroBtn = document.getElementById("skipIntroBtn");
    let videoHasSound = false;

    function revealPageContent(){
      if(introOverlay){
        introOverlay.classList.add("hidden");
        setTimeout(() => {
          introOverlay.style.display = "none";
        }, 300);
      }
    }

    soundToggleBtn.addEventListener("click", () => {
      videoHasSound = !videoHasSound;
      introVideo.muted = !videoHasSound;
      soundToggleBtn.textContent = videoHasSound ? "🔇 Turn Off Sound" : "🔊 Turn On Sound";
    });

    skipIntroBtn.addEventListener("click", () => {
      revealPageContent();
    });

    introVideo.addEventListener("ended", () => {
      revealPageContent();
    });

    introVideo.addEventListener("error", () => {
      console.warn("Intro video failed to load");
      revealPageContent();
    });

    // Activity Logic
    const micIconBtn = document.getElementById("micIconBtn");
    const clearBtn = document.getElementById("clearBtn");
    const feedback = document.getElementById("feedback");
      const nextBtn = document.getElementById("nextBtn");
      const prevBtn = document.getElementById("prevBtn");
      const line = document.querySelector(".convo-line");
      const bubble = document.querySelector(".bubble");
      const targets = Array.from(document.querySelectorAll(".target"));

    function speak(text){
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 1.0;
      utter.pitch = 1.1;
      window.speechSynthesis.speak(utter);
    }

    if (line) {
      line.hidden = false;
      line.classList.add("show");
    }

    const correctTargets = targets.filter((target) => target.dataset.correct === "true");

    function buildPayload(source){
      const correctCount = correctTargets.filter((target) => target.classList.contains("circled")).length;
      const wrongCount = targets.filter((target) => target.dataset.correct !== "true" && target.classList.contains("wrong")).length;
      const progress = Math.max(0, Math.round((correctCount / Math.max(1, correctTargets.length)) * 100));
      const score = Math.max(0, Math.min(100, progress - wrongCount * 10));
      const stars = score >= 90 ? 3 : score >= 70 ? 2 : score >= 40 ? 1 : 0;
      return {
        pageId: "LB25",
        title: document.title,
        level: "B",
        activityType: "circle-number",
        score,
        stars,
        skills: { reading: 1, writing: 0, speaking: 1, listening: 1 },
        extra: {
          source,
          progress,
          correctCount,
          totalCorrect: correctTargets.length,
          wrongCount,
          selected: targets.filter((target) => target.classList.contains("circled") || target.classList.contains("wrong")).map((target) => ({
            number: target.dataset.num,
            correct: target.dataset.correct === "true",
            selected: true
          })),
          timestamp: new Date().toISOString()
        }
      };
    }

    function updateUI(source){
      const payload = buildPayload(source);
      if (payload.extra.progress >= 100 && payload.extra.wrongCount === 0) {
        feedback.textContent = "Excellent! All even numbers are circled.";
      } else if (payload.extra.correctCount > 0 || payload.extra.wrongCount > 0) {
        feedback.textContent = `Even numbers: ${payload.extra.progress}% complete`;
      } else {
        feedback.textContent = "";
      }
      try {
        localStorage.setItem("gp_last_activity", JSON.stringify(payload));
      } catch (_) {}
      try {
        if (window.finishAndSave && typeof window.finishAndSave === "function") {
          window.finishAndSave(payload).catch(() => {});
        }
      } catch (_) {}
      return payload;
    }

    function clearCircles(){
      targets.forEach((target) => {
        target.classList.remove("circled", "wrong");
      });
      feedback.textContent = "";
      updateUI("clear");
    }

    targets.forEach((target) => {
      target.addEventListener("click", () => {
        const isCorrect = target.dataset.correct === "true";
        if (isCorrect) {
          target.classList.remove("wrong");
          target.classList.toggle("circled");
        } else {
          target.classList.remove("circled");
          target.classList.toggle("wrong");
        }
        updateUI("selection");
      });
    });

    if (clearBtn) clearBtn.addEventListener("click", clearCircles);
    if (micIconBtn) {
      // Mic click is handled by the shared LA2/LB3 unified protocol.
    }
    nextBtn.addEventListener("click", async () => {
      updateUI("next");
      window.location.href = "../thursday/LB_Revision4.html";
    });
    prevBtn.addEventListener("click", async () => {
      updateUI("prev");
      window.location.href = "LB24.html";
    });
    updateUI("init");
  </script>
<script src="../../../../activity-standardizer.js"></script>
<script src="../../../../shared/js/storage.js"></script>
<script src="../../../../shared/js/progress.js"></script>
<script src="../../../../shared/js/tracing.js"></script>
<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LB25",
    defaultLevel: "B",
    defaultActivityType: "lesson",
    defaultScore: 100,
    defaultStars: 1,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });



  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);
    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}
    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };
  
    saveLocalActivityFallback(fullPayload);
  
    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }
  
    return fullPayload;
  }

  window.finishAndSave = finishAndSave;

</script>
</body>
</html>

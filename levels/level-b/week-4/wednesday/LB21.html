<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Vertices Week 4 • Pentagon Hexagon Octagon</title>

<style>
*{
  box-sizing:border-box;
}

:root{
  --orange:#ff9f1c;
  --pink:#ff9aa8;
  --grid:#00a8e8;
  --paper:#fffaf1;
  --ink:#24242a;
  --blue:#2b79c2;
  --green:#22c55e;
  --red:#ef2b2b;
  --shadow:0 18px 40px rgba(0,0,0,.14);
  font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#e4f6df;
  padding:14px;
  color:var(--ink);
}

.app{
  width:min(780px,96vw);
}

.poster{
  position:relative;
  width:100%;
  aspect-ratio:976 / 1338;
  background:
    linear-gradient(rgba(100,140,190,.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100,140,190,.18) 1px, transparent 1px),
    var(--paper);
  background-size:26px 26px;
  border:12px solid var(--orange);
  border-radius:28px;
  box-shadow:var(--shadow);
  overflow:hidden;
}

.title{
  position:absolute;
  left:0;
  right:0;
  top:-8px;
  text-align:center;
  font-size:clamp(3rem,10vw,5.7rem);
  font-weight:1000;
  color:white;
  -webkit-text-stroke:9px var(--orange);
  paint-order:stroke fill;
  letter-spacing:1px;
  line-height:.95;
  z-index:5;
}

.week{
  position:absolute;
  right:3%;
  top:2.8%;
  border:4px solid var(--orange);
  background:white;
  border-radius:14px;
  padding:.35em .6em;
  font-size:clamp(1rem,2.6vw,1.45rem);
  font-weight:900;
  z-index:5;
}

.teacher{
  position:absolute;
  left:5%;
  top:6.3%;
  width:13.5%;
  z-index:8;
  cursor:pointer;
  border:none;
  background:transparent;
  padding:0;
  text-align:center;
  filter:drop-shadow(0 5px 8px rgba(0,0,0,.18));
}

.teacher img{
  width:100%;
  height:auto;
  display:block;
  object-fit:contain;
  pointer-events:none;
}

.teacher small{
  display:block;
  font-size:clamp(.58rem,1.5vw,.78rem);
  color:#1d5fd6;
  font-weight:900;
  background:white;
  border-radius:999px;
  margin-top:-2px;
  padding:2px 5px;
  box-shadow:0 3px 8px rgba(0,0,0,.12);
}

.teacher.fallback::before{
  content:"👩‍🏫";
  display:block;
  font-size:clamp(2.6rem,7vw,4.5rem);
  line-height:1;
}

.instruction{
  position:absolute;
  left:22%;
  top:14.35%;
  width:74%;
  font-size:clamp(.92rem,2.35vw,1.5rem);
  font-weight:900;
  z-index:5;
  white-space:nowrap;
  letter-spacing:-.02em;
}

.content{
  position:absolute;
  left:4%;
  right:4%;
  top:18.2%;
  bottom:3.2%;
  display:grid;
  grid-template-columns:38% 62%;
  grid-template-rows:1fr 1fr 1fr;
  gap:1.2%;
}

.shape-box,
.sentence-box{
  position:relative;
  background:rgba(255,255,255,.38);
  border:4px solid var(--pink);
  border-radius:6px;
  overflow:hidden;
}

.shape-box{
  background:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px),
    rgba(255,255,255,.42);
  background-size:28px 28px;
}

.shape-svg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.shape-line{
  fill:none;
  stroke:#4a4a4a;
  stroke-width:3;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.vertex-dot{
  fill:var(--blue);
  stroke:var(--blue);
}

.sentence-box{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:3.5% 5%;
}

.sentence{
  width:100%;
  display:grid;
  grid-template-columns:1fr;
  gap:.05em;
  align-items:center;
  justify-content:center;
  font-size:clamp(1.45rem,5.1vw,3.15rem);
  font-weight:500;
  line-height:1.02;
  text-align:left;
  padding-left:7%;
}

.top-line,
.bottom-line{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:.22em;
  white-space:nowrap;
}

.sentence .black{
  color:#25252b;
}

.sentence .blue{
  color:var(--blue);
}

.digit-area{
  position:relative;
  display:inline-block;
  width:2.05em;
  height:2.12em;
  vertical-align:middle;
  flex:0 0 auto;
  margin:-.18em .08em -.08em 0;
}

.dotted-svg{
  position:absolute;
  inset:-5%;
  width:110%;
  height:110%;
  pointer-events:none;
  overflow:visible;
}

.dotted-number-text{
  fill:none;
  stroke:#222;
  stroke-width:4.7;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:.1 11.2;
  opacity:.96;
}

.write-canvas{
  position:absolute;
  inset:-10%;
  width:120%;
  height:120%;
  z-index:4;
  touch-action:none;
  cursor:crosshair;
}

.speech{
  margin-top:10px;
  background:#fff7ed;
  border:3px solid #fed7aa;
  color:#7c2d12;
  border-radius:15px;
  padding:10px 12px;
  text-align:center;
  font-weight:900;
}

.progress-card{
  margin-top:10px;
  background:white;
  border:3px solid #bbf7d0;
  border-radius:16px;
  padding:9px 12px;
  box-shadow:0 8px 18px rgba(0,0,0,.1);
}

.progress-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:7px;
  flex-wrap:wrap;
}

#progressText{
  font-weight:900;
  color:#14532d;
}

#starsBox{
  font-size:1.35rem;
  letter-spacing:2px;
}

.progress-track{
  height:16px;
  border-radius:999px;
  overflow:hidden;
  background:#dbeafe;
  border:2px solid #93c5fd;
}

#progressFill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#22c55e,#a3e635);
  border-radius:999px;
  transition:width .18s ease;
}

.controls{
  margin-top:12px;
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}

.btn{
  border:none;
  border-radius:999px;
  padding:9px 14px;
  font-size:.95rem;
  font-weight:900;
  cursor:pointer;
  color:white;
  background:#ff8a5b;
  box-shadow:0 4px 0 rgba(0,0,0,.18);
  font-family:inherit;
}

.btn:hover{
  transform:translateY(-1px);
  filter:brightness(1.04);
}

.btn:active{
  transform:scale(.98);
  box-shadow:0 2px 0 rgba(0,0,0,.18);
}

.btn.clear{
  background:#3b82f6;
}

.btn.sound{
  background:#22c55e;
}

.btn.report{
  background:#7c3aed;
}

.reward{
  position:absolute;
  left:50%;
  top:52%;
  transform:translate(-50%,-50%) scale(.85);
  background:#fff7ed;
  border:5px solid var(--green);
  color:#166534;
  border-radius:24px;
  padding:16px 24px;
  font-size:clamp(1.2rem,4vw,2rem);
  font-weight:1000;
  z-index:50;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease, transform .2s ease;
  box-shadow:0 18px 40px rgba(0,0,0,.24);
}

.reward.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

.reward-star{
  position:absolute;
  z-index:60;
  pointer-events:none;
  font-size:28px;
  animation:flyStar 1.4s ease-out forwards;
}

@keyframes flyStar{
  from{
    transform:translate(0,0) scale(.5) rotate(0deg);
    opacity:1;
  }
  to{
    transform:translate(var(--x),var(--y)) scale(1.5) rotate(260deg);
    opacity:0;
  }
}

@media(max-width:560px){
  .poster{
    border-width:7px;
    border-radius:20px;
  }

  .title{
    -webkit-text-stroke:6px var(--orange);
  }

  .teacher{
    top:6.1%;
    width:13%;
  }

  .instruction{
    left:21%;
    top:14.15%;
    width:76%;
    font-size:clamp(.78rem,2.55vw,1.05rem);
  }

  .content{
    left:3%;
    right:3%;
    gap:.8%;
  }

  .shape-box,
  .sentence-box{
    border-width:3px;
  }

  .sentence{
    font-size:clamp(1.04rem,4.55vw,2.08rem);
    padding-left:7%;
  }

  .digit-area{
    width:2.02em;
    height:2.08em;
  }

  .btn{
    padding:8px 10px;
    font-size:.82rem;
  }
}
</style>
</head>

<body>
<main class="app">
  <section class="poster" id="poster">
    <div class="title">Vertices</div>

    <div class="week">Week 4</div>

    <button class="teacher" id="teacherBtn" type="button" aria-label="Tap the teacher for instruction">
      <img id="teacherImg" src="TeacherVertices.png" alt="Teacher helper">
      <small>Tap</small>

    <div class="instruction">Count and write the number of Vertices.</div>

    <div class="content">
      <!-- Pentagon -->

        <svg class="shape-svg" viewBox="0 0 300 300" aria-hidden="true">

      <div class="sentence-box">

          <circle class="vertex-dot" cx="102" cy="35" r="7"></circle>

      <div class="sentence-box">

<script>
const PAGE_ID = "LA21";
const PAGE_FILE = "LA21.html";
const LEVEL = "A";

const speechBox = document.getElementById("speechBox");
const progressText = document.getElementById("progressText");
const progressFill = document.getElementById("progressFill");
const starsBox = document.getElementById("starsBox");
const reward = document.getElementById("reward");
const poster = document.getElementById("poster");

const digitItems = [
  { id:"digit5Canvas", digit:"5", label:"pentagon", answer:5, progress:0 },
  { id:"digit6Canvas", digit:"6", label:"hexagon", answer:6, progress:0 },
  { id:"digit8Canvas", digit:"8", label:"octagon", answer:8, progress:0 }
];

let rewardShown = false;
let chimePlayed = false;
let audioCtx = null;
let lastTraceSoundTime = 0;

const completionChime = new Audio();
completionChime.preload = "auto";

const chimeSources = [
  "chime.mp3",
  "./chime.mp3",
  "chime(1).mp3",
  "./chime(1).mp3",
  "../../../../assets/audio/chime.mp3",
  "../../../../assets/audio/chime.mp3.mp3"
];

let chimeIndex = 0;
completionChime.src = chimeSources[chimeIndex];

completionChime.onerror = function(){
  chimeIndex += 1;
  if(chimeIndex < chimeSources.length){
    completionChime.src = chimeSources[chimeIndex];
    completionChime.load();
  }
};

function fixTeacherImage(){
  const img = document.getElementById("teacherImg");
  const btn = document.getElementById("teacherBtn");

  const imagePaths = [
    "TeacherVertices.png",
    "./TeacherVertices.png",
    "VerticesTeacher.png",
    "./VerticesTeacher.png",
    "../../../../assets/images/shapes/TeacherVertices.png",
    "../../../../assets/images/shapes/VerticesTeacher.png"
  ];

  let imageIndex = 0;

  img.onerror = function(){
    imageIndex += 1;

    if(imageIndex < imagePaths.length){
      img.src = imagePaths[imageIndex];
    }else{
      img.style.display = "none";
      btn.classList.add("fallback");
    }
  };
}

function getAudioContext(){
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if(!AudioContextClass) return null;

  if(!audioCtx){
    audioCtx = new AudioContextClass();
  }

  if(audioCtx.state === "suspended"){
    audioCtx.resume().catch(() => {});
  }

  return audioCtx;
}

function playTraceSound(){
  const now = performance.now();
  if(now - lastTraceSoundTime < 85) return;

  lastTraceSoundTime = now;

  const ctx = getAudioContext();
  if(!ctx) return;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(720, ctx.currentTime);

  gain.gain.setValueAtTime(0.0001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.055, ctx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.08);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.09);
}

function playCompletionChime(){
  completionChime.currentTime = 0;
  completionChime.volume = 1;
  completionChime.play().catch(() => {});
}

function resizeCanvas(canvas){
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.max(1, window.devicePixelRatio || 1);

  canvas.width = Math.round(rect.width * dpr);
  canvas.height = Math.round(rect.height * dpr);

  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "#111827";
  ctx.lineWidth = Math.max(9, rect.width * 0.075);
}

function setupWritableDigit(item){
  const canvas = document.getElementById(item.id);
  const ctx = canvas.getContext("2d");

  let drawing = false;
  let touched = new Set();
  let lastPoint = null;

  function resize(){
    resizeCanvas(canvas);
  }

  function getPoint(event){
    const rect = canvas.getBoundingClientRect();

    return {
      x:event.clientX - rect.left,
      y:event.clientY - rect.top,
      nx:(event.clientX - rect.left) / rect.width,
      ny:(event.clientY - rect.top) / rect.height
    };
  }

  function markCoverage(point){
    const cols = 10;
    const rows = 12;
    const col = Math.max(0, Math.min(cols - 1, Math.floor(point.nx * cols)));
    const row = Math.max(0, Math.min(rows - 1, Math.floor(point.ny * rows)));
    touched.add(row + ":" + col);

    item.progress = Math.min(100, Math.round((touched.size / 28) * 100));
    updateProgress();
  }

  function markCoverageBetween(a,b){
    const dx = b.nx - a.nx;
    const dy = b.ny - a.ny;
    const steps = Math.max(4, Math.ceil(Math.sqrt(dx*dx + dy*dy) * 140));

    for(let i = 0; i <= steps; i++){
      const t = i / steps;
      markCoverage({
        nx:a.nx + dx * t,
        ny:a.ny + dy * t
      });
    }
  }

  canvas.addEventListener("pointerdown", (event) => {
    event.preventDefault();

    getAudioContext();

    drawing = true;
    const p = getPoint(event);
    lastPoint = p;

    ctx.beginPath();
    ctx.moveTo(p.x,p.y);
    markCoverage(p);
    playTraceSound();

    try{
      canvas.setPointerCapture(event.pointerId);
    }catch(err){}
  });

  canvas.addEventListener("pointermove", (event) => {
    if(!drawing) return;
    event.preventDefault();

    const p = getPoint(event);

    ctx.lineTo(p.x,p.y);
    ctx.strokeStyle = "#111827";
    ctx.lineWidth = Math.max(9, canvas.getBoundingClientRect().width * 0.075);
    ctx.stroke();

    playTraceSound();
    markCoverageBetween(lastPoint,p);
    lastPoint = p;
  });

  function stop(event){
    drawing = false;
    lastPoint = null;
    saveProgress();

    try{
      if(event && event.pointerId) canvas.releasePointerCapture(event.pointerId);
    }catch(err){}
  }

  canvas.addEventListener("pointerup", stop);
  canvas.addEventListener("pointercancel", stop);
  canvas.addEventListener("pointerleave", stop);

  item.clear = function(){
    const rect = canvas.getBoundingClientRect();
    ctx.clearRect(0,0,rect.width,rect.height);
    touched.clear();
    item.progress = 0;
  };

  resize();
  window.addEventListener("resize", resize);
}

function getTotalProgress(){
  const total = digitItems.reduce((sum,item) => sum + item.progress, 0);
  return Math.round(total / digitItems.length);
}

function getStars(percent){
  if(percent >= 85) return 3;
  if(percent >= 55) return 2;
  if(percent >= 25) return 1;
  return 0;
}

function updateProgress(){
  const percent = getTotalProgress();
  const stars = getStars(percent);

  progressText.textContent = "Writing Progress: " + percent + "%";
  progressFill.style.width = percent + "%";
  starsBox.textContent = "⭐".repeat(stars) + "☆".repeat(3 - stars);

  saveProgress();

  if(percent >= 85 && !rewardShown){
    rewardShown = true;
    showReward("Great writing! ⭐⭐⭐");
    speak("Excellent! You wrote the number of vertices.");
  }

  if(percent >= 100 && !chimePlayed){
    chimePlayed = true;
    playCompletionChime();
  }
}

function showReward(text){
  reward.textContent = text;
  reward.classList.add("show");

  for(let i = 0; i < 18; i++){
    const star = document.createElement("div");
    star.className = "reward-star";
    star.textContent = "⭐";
    star.style.left = "50%";
    star.style.top = "52%";
    star.style.setProperty("--x", `${Math.random() * 360 - 180}px`);
    star.style.setProperty("--y", `${Math.random() * 260 - 200}px`);
    poster.appendChild(star);
    setTimeout(() => star.remove(), 1450);
  }

  setTimeout(() => reward.classList.remove("show"), 1700);
}

function clearWriting(){
  digitItems.forEach(item => {
    if(typeof item.clear === "function") item.clear();
  });

  rewardShown = false;
  chimePlayed = false;
  updateProgress();

  speechBox.textContent = "Writing cleared. Try again. Write 5, 6, and 8 on the dotted numbers.";
  speak("Writing cleared. Try again. Write five, six, and eight on the dotted numbers.");
}

function chooseVoice(){
  if(!("speechSynthesis" in window)) return null;

  const voices = speechSynthesis.getVoices();

  return (
    voices.find(v => /en-US/i.test(v.lang) && /Jenny|Aria|Samantha|Zira|Female|Google US English/i.test(v.name)) ||
    voices.find(v => /en-US/i.test(v.lang)) ||
    voices.find(v => /^en/i.test(v.lang)) ||
    null
  );
}

function speak(text){
  if(!("speechSynthesis" in window)) return;

  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.9;
  u.pitch = 1.15;
  u.volume = 1;

  const voice = chooseVoice();
  if(voice) u.voice = voice;

  speechSynthesis.speak(u);
}

function playInstruction(){
  getAudioContext();

  const text = "Count the vertices. A pentagon has five vertices. A hexagon has six vertices. An octagon has eight vertices. Write five, six, and eight on the big dotted numbers.";
  speechBox.textContent = "Write 5 for Pentagon, 6 for Hexagon, and 8 for Octagon.";
  speak(text);
}

function getStudentSession(){
  try{
    return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
  }catch(err){
    return null;
  }
}

function saveProgress(){
  const percent = getTotalProgress();
  const stars = getStars(percent);
  const session = getStudentSession() || {};

  const record = {
    pageId:PAGE_ID,
    file:PAGE_FILE,
    title:"Vertices Week 4 • Pentagon Hexagon Octagon",
    level:LEVEL,
    week:4,
    month:1,
    type:"writing",
    activityType:"writing",
    score:percent,
    percent,
    tracing:percent,
    stars,
    completed:percent >= 85,
    answers:{
      pentagon:5,
      hexagon:6,
      octagon:8
    },
    skills:{
      reading:1,
      writing:percent >= 25 ? 1 : 0,
      listening:1,
      speaking:0
    },
    classId:session.classId || null,
    studentId:session.studentId || null,
    studentName:session.studentName || session.displayName || session.name || session.fullName || null,
    updatedAt:new Date().toISOString(),
    savedAt:new Date().toISOString(),
    ts:Date.now()
  };

  try{
    localStorage.setItem("LA21_VERTICES_WRITING_PROGRESS", JSON.stringify(record));

    const activityProgress = JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_PROGRESS") || "{}");
    activityProgress[PAGE_ID] = record;
    localStorage.setItem("GP_EIS_ACTIVITY_PROGRESS", JSON.stringify(activityProgress));

    const activityResults = JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    activityResults[PAGE_ID] = record;
    localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(activityResults));

    const progressReport = JSON.parse(localStorage.getItem("GP_EIS_PROGRESS_REPORT") || "{}");
    progressReport[PAGE_ID] = record;
    localStorage.setItem("GP_EIS_PROGRESS_REPORT", JSON.stringify(progressReport));

    localStorage.setItem("GP_EIS_LAST_FILE", PAGE_FILE);

    window.dispatchEvent(new CustomEvent("gp-eis-progress-updated", { detail:record }));
  }catch(err){
    console.warn("Progress could not be saved:", err);
  }
}

function openProgressReport(){
  saveProgress();
  location.href = "../../../../ProgressReport.html";
}

document.getElementById("teacherBtn").addEventListener("click", playInstruction);
document.getElementById("instructionBtn").addEventListener("click", playInstruction);
document.getElementById("clearBtn").addEventListener("click", clearWriting);
document.getElementById("reportBtn").addEventListener("click", openProgressReport);

document.getElementById("prevBtn").addEventListener("click", () => {
  saveProgress();
  location.href = "../tuesday/LB20.html";
});

document.getElementById("nextBtn").addEventListener("click", () => {
  saveProgress();
  location.href = "LB25.html";
});

function init(){
  fixTeacherImage();

  digitItems.forEach(setupWritableDigit);
  updateProgress();

  if("speechSynthesis" in window){
    speechSynthesis.onvoiceschanged = chooseVoice;
  }

  setTimeout(() => {
    speechBox.textContent = "Tap the teacher or Instruction button to hear what to do.";
  },300);
}

document.addEventListener("DOMContentLoaded", init);
</script>

<!doctype html>
<html lang="en">
<head>
<style id="gpLessonPrehide">
  .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
  .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}
  .convo-line.show,.speech-line.show,.dialog-line.show,.bubble-line.show,.bubble-left.show,.bubble-right.show,#bubbleLeft.show,#bubbleRight.show{display:block !important;}
  .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,1.9vw,19px) !important;line-height:1.24 !important;max-width:min(40vw,320px) !important;white-space:normal !important;word-break:break-word !important;overflow-wrap:anywhere !important;}
  @media (max-width:780px){
    .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,3.6vw,17px) !important;max-width:min(44vw,220px) !important;line-height:1.2 !important;}
  }
</style>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Level B • Conversation</title>
  <link rel="stylesheet" href="../../../../shared/css/base.css" />
  <link rel="stylesheet" href="../../../../shared/css/layout.css" />
  <link rel="stylesheet" href="../../../../shared/css/lesson.css" />

  <style>
    :root{
      --ink:#2d2d2d;
      --bg:#e4f6df;
      --border:#d9b9f0;
      --bubble-left:#fde3c4;
      --bubble-right:#d8ebff;
      --btn-orange:#ff8a5b;
      --btn-blue:#dfeaff;
      --shadow:0 10px 24px rgba(0,0,0,.08);
      font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    }
    body{
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg);
      padding:16px;
      color:var(--ink);
    }
    .app{
      width:min(940px,96vw);
      border-radius:16px;
      padding:12px 12px 8px;
    }
    .home-btn{
      z-index:5;
      right:8%;
      top:8px;
    }
    .board{
      border:2px dashed var(--border);
      border-radius:16px;
      padding:12px;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,185,210,.35) 0 52px, transparent 54px),
        radial-gradient(circle at 82% 22%, rgba(210,240,255,.4) 0 58px, transparent 60px),
        radial-gradient(circle at 30% 80%, rgba(255,225,150,.35) 0 56px, transparent 58px),
        radial-gradient(circle at 72% 78%, rgba(190,255,210,.35) 0 54px, transparent 56px),
        linear-gradient(180deg,#fff7fb 0%, #f6f7ff 50%, #fff5e8 100%);
      min-height:360px;
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }
    .tray-hero{
      display:flex;
      justify-content:center;
      margin:6px 0 8px;
      width:100%;
    }
    .trace-wrap{
      position:relative;
      display:inline-block;
    }
    .tray-hero img{
      width:min(676px,92%);
      height:auto;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
      cursor:pointer;
    }
    .trace-wrap img{
      position:relative;
      z-index:1;
    }
    .trace-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      touch-action:none;
      cursor:crosshair;
      z-index:2;
    }
    .designer-text{
      position:absolute;
      left:50%;
      bottom:6%;
      transform:translateX(-50%);
      font-size:2rem;
      font-weight:800;
      font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
      color:#2d2d2d;
      text-align:center;
      opacity:0;
      transition:opacity .25s ease, transform .25s ease;
      z-index:3;
      white-space:nowrap;
      pointer-events:none;
    }
    .designer-sub{
      position:absolute;
      left:50%;
      bottom:1%;
      transform:translateX(-50%);
      font-size:2rem;
      font-weight:800;
      font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
      color:#2d2d2d;
      text-align:center;
      opacity:0;
      transition:opacity .25s ease, transform .25s ease;
      z-index:3;
      white-space:nowrap;
      pointer-events:none;
    }
    .designer-text.show,
    .designer-sub.show{
      opacity:1;
    }
    .row{
      display:flex;
      align-items:center;
      gap:10px;
      margin:10px 0;
      width:100%;
      justify-content:flex-start;
      z-index:2;
    }
    .convo-line{
      display:none !important;
      position:absolute;
      transform:translateY(-30%);
    }
    .convo-line.show{
      display:flex !important;
    }
    .line1{
      left:10%;
      top:20%;
    }
    .line2{
      right:10%;
      top:28%;
    }
    .row.right{
      justify-content:flex-end;
    }
    .bubble{
      padding:10px 14px;
      border-radius:16px;
      position:relative;
      font-size:1rem;
      max-width:min(560px,70vw);
      line-height:1.25;
    }
    .bubble.left{background:var(--bubble-left);}
    .bubble.right{background:var(--bubble-right);}
    .bubble.left::after{
      content:"";
      position:absolute;
      left:-6px;
      top:14px;
      border-width:8px 8px 8px 0;
      border-style:solid;
      border-color:transparent var(--bubble-left) transparent transparent;
    }
    .bubble.right::after{
      content:"";
      position:absolute;
      right:-6px;
      top:14px;
      border-width:8px 0 8px 8px;
      border-style:solid;
      border-color:transparent transparent transparent var(--bubble-right);
    }
    .bubble.sparkle{
      background: linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);
      box-shadow:0 0 12px rgba(255,214,0,.6), 0 0 18px rgba(255,105,180,.4);
      animation: sparklePulse 1.2s ease-in-out infinite;
    }
    @keyframes sparklePulse{
      0%,100%{filter:brightness(1);}
      50%{filter:brightness(1.12);}
    }
    .repeat-result{
      margin-top:4px;
      font-size:.95rem;
      font-weight:700;
      color:#2f9f5f;
    }
    .star-row{
      display:flex;
      gap:6px;
      margin-top:4px;
      font-weight:900;
      font-size:1.2rem;
      color:#ffd24a;
      text-shadow:
        0 2px 0 #b87900,
        0 4px 0 #8a5a00,
        0 8px 14px rgba(0,0,0,.28);
    }
    .controls{
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      z-index:3;
      background:rgba(255,255,255,.92);
      padding:4px 6px;
      border-radius:16px;
      box-shadow:0 8px 16px rgba(0,0,0,.18);
      width:fit-content;
      max-width:100%;
      justify-content:center;
      margin-top:2px;
    }
    .btn{
      border:none;
      border-radius:999px;
      padding:8px 12px;
      font-size:.9rem;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(0,0,0,.15);
    }
    .btn.prev{background:var(--btn-orange);color:#fff;}
    .btn.next{background:var(--btn-orange);color:#fff;}
    .btn.stop{background:var(--btn-blue);color:#1f3b6b;}
    .mic-icon-btn img{
      width:32px;
      height:32px;
      filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
    }
    .conversation-status{
      font-size:.95rem;
      font-weight:800;
      color:#6c4bbf;
      min-height:1.2em;
    }
    .girl-spot{
      position:absolute;
      left:18px;
      top:8px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      z-index:3;
    }
    .girl-spot img{
      width:72px;
      height:72px;
      border-radius:18px;
      object-fit:cover;
      box-shadow:0 6px 14px rgba(0,0,0,.25);
      border:4px solid #ffe3f7;
      background:#ffd6f2;
      cursor:pointer;
    }
    .girl-hint{
      font-size:1.2rem;
      font-weight:800;
      color:#1d5fd6;
      text-align:center;
    }
  </style>
<style id="lbIntroVideoOverlayStyles">
  #lbIntroVideoOverlay{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.78);
    z-index:2147483647;
    padding:16px;
    flex-direction:column;
    gap:14px;
  }
  #lbIntroVideoOverlay.active{display:flex;}
  #lbIntroVideoOverlay video{
    width:min(92vw,980px);
    max-height:82vh;
    height:auto;
    border-radius:14px;
    background:#000;
    opacity:0;
    transition:opacity .18s ease;
    box-shadow:0 18px 48px rgba(0,0,0,.45);
  }
  #lbIntroStartBtn{
    border:none;
    border-radius:999px;
    padding:14px 22px;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
    background:linear-gradient(180deg,#fffad7,#ffd86a);
    color:#8b5a00;
    box-shadow:0 6px 0 rgba(0,0,0,.22);
  }
  #lbIntroSkipBtn{
    border:none;
    border-radius:999px;
    padding:14px 22px;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
    background:#dfeaff;
    color:#1f3b6b;
    box-shadow:0 6px 0 rgba(0,0,0,.22);
  }
  #lbIntroHelp{
    color:#fff;
    font-weight:800;
    font-size:1rem;
    text-align:center;
    text-shadow:0 2px 8px rgba(0,0,0,.45);
  }
  #lbIntroActions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
  }
</style>
</head>
<body>
  <div class="app">
    <a class="home-btn" href="../../../../index.html" aria-label="Home">
      <img src="../../../../assets/images/shapes/Home1.png" alt="Home">
    </a>
    <div class="board" id="board">
      <div class="tray-hero">
        <div class="trace-wrap">
          <img src="../../../../assets/images/shapes/B16.png" alt="Poster" id="designImage">
          <canvas class="trace-canvas" id="traceCanvas" aria-label="Trace the dotted numbers"></canvas>
        </div>
      </div>
      <div class="designer-text" id="designerText">How many windows are octagons?</div>
      <div class="designer-sub" id="designerSub">8 windows are octagons.</div>
      <div class="girl-spot" aria-label="Tap the girl">
        <img src="../../../../assets/images/shapes/CirckleGirlWk1.png" alt="Girl helper" id="girlBtn" class="tap-girl" class="tap-girl">
        <div class="girl-hint">Tap the girl</div>
      </div>

      <div class="row convo-line line1">
        <div class="bubble left">Hello,<br>designer.</div>
        <div class="repeat-result" data-line="0"></div>
        <div class="star-row" data-line="0"></div>
      </div>

      <div class="row right convo-line line2">
        <div class="bubble right">My designs<br>are at the<br>department<br>store.</div>
        <div class="repeat-result" data-line="1"></div>
        <div class="star-row" data-line="1"></div>
      </div>

      <div class="conversation-status" id="conversationStatus"></div>

      <div class="controls">
        <button class="btn prev" id="prevBtn">&#8592; Previous page</button>
        <button class="btn next" id="nextBtn">Next page &#8594;</button>
        <button class="btn stop" id="traceClearBtn" type="button">Clear trace</button>
        <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
          <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone">
        </button>
      </div>
    </div>
  </div>

  <script src="../../../../activity-standardizer.js"></script>
<script src="../../../../shared/js/storage.js"></script>
<script src="../../../../shared/js/progress.js"></script>
<script src="../../../../shared/js/tracing.js"></script>
<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LB16",
    defaultLevel: "B",
    defaultActivityType: "lesson",
    defaultScore: 100,
    defaultStars: 1,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);
    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}
    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };
  
    saveLocalActivityFallback(fullPayload);
  
    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }
  
    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>
</body>
</html>

<!doctype html> 
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LB15 • Octagon Practice</title>

<style>
body{
  margin:0;
  background:#e4f6df;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:"Comic Sans MS";
}

.board{
  width:700px;
  position:relative;
  background:white;
  padding:12px;
  border-radius:16px;
}

.poster-wrap{
  position:relative;
}

#poster{
  width:100%;
  display:block;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  touch-action:none;
}

.progress-wrap{
  margin-top:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.progress-text{
  font-size:15px;
  font-weight:bold;
  color:#2f6b3f;
}

.progress-bar{
  width:min(520px,92%);
  height:13px;
  background:#e7efff;
  border-radius:999px;
  overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.2);
}

.progress-fill{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#3cc4ff,#7dffb3);
  transition:width .18s ease-out;
}

.controls{
  margin-top:10px;
  display:flex;
  gap:10px;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:#ff8a5b;
  color:white;
  font-weight:bold;
  cursor:pointer;
  font-family:"Comic Sans MS";
}

.girl-btn,
.mic-icon-btn{
  background:transparent;
  padding:0;
  border:none;
  box-shadow:none;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

#girl{
  width:48px;
  height:auto;
  display:block;
  filter:drop-shadow(0 4px 6px rgba(0,0,0,.18));
}

#micIcon{
  width:34px;
  height:34px;
  display:block;
  filter:drop-shadow(0 4px 6px rgba(0,0,0,.18));
}

.girl-btn:active,
.mic-icon-btn:active{
  transform:scale(.96);
}
</style>
</head>

<body>

<div class="board">

  <div class="poster-wrap">
    <img src="../../../../assets/images/shapes/B15.png" id="poster" alt="Octagon practice poster">
    <canvas id="traceCanvas"></canvas>
  </div>

  <div class="progress-wrap">
    <div class="progress-text">Trace progress: <span id="tracePercent">0%</span></div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="controls">
    <button onclick="goPrev()">Prev &lt;-</button>
    <button onclick="goNext()">-&gt; Next</button>
    <button onclick="clearTrace()">Clear</button>

    <button class="mic-icon-btn" onclick="micClick()" aria-label="Microphone">
      <img src="../../../../assets/images/shapes/Microphone.png" id="micIcon" alt="Microphone">
    </button>

    <button class="girl-btn" onclick="girlClick()" aria-label="Tap the girl for instruction">
      <img src="../../../../assets/images/shapes/CirckleGirlWk1.png" id="girl" alt="Tap the girl">
    </button>
  </div>

</div>

<script>
const canvas = document.getElementById("traceCanvas");
const img = document.getElementById("poster");
const ctx = canvas.getContext("2d");

const tracePercentText = document.getElementById("tracePercent");
const progressFill = document.getElementById("progressFill");

let drawing = false;
let lastPoint = null;
let traceDistance = 0;
let tracePercent = 0;

/*
  This target controls how quickly the trace bar fills.
  It works with the student’s actual tracing movement on the poster.
*/
let targetTraceDistance = 1800;

function resize(){
  canvas.width = img.clientWidth;
  canvas.height = img.clientHeight;

  targetTraceDistance = Math.max(1400, (canvas.width + canvas.height) * 1.35);
}

window.addEventListener("resize", resize);

if (img.complete) {
  resize();
} else {
  img.onload = resize;
}

function updateTraceProgress(){
  tracePercent = Math.min(100, Math.round((traceDistance / targetTraceDistance) * 100));

  tracePercentText.textContent = tracePercent + "%";
  progressFill.style.width = tracePercent + "%";

  if (tracePercent >= 100 && !window.__lb15Celebrated) {
    window.__lb15Celebrated = true;
    speak("Great job! You traced the octagon practice.");
  }
}

function getPoint(e){
  const rect = canvas.getBoundingClientRect();

  return {
    x:e.clientX - rect.left,
    y:e.clientY - rect.top
  };
}

canvas.addEventListener("pointerdown", e => {
  e.preventDefault();

  drawing = true;
  lastPoint = getPoint(e);

  ctx.beginPath();
  ctx.moveTo(lastPoint.x, lastPoint.y);
});

canvas.addEventListener("pointermove", e => {
  if (!drawing || !lastPoint) return;

  e.preventDefault();

  const point = getPoint(e);

  ctx.lineTo(point.x, point.y);
  ctx.strokeStyle = "blue";
  ctx.lineWidth = 6;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.stroke();

  const distance = Math.hypot(point.x - lastPoint.x, point.y - lastPoint.y);
  traceDistance += distance;

  lastPoint = point;

  updateTraceProgress();
});

function stopDrawing(){
  drawing = false;
  lastPoint = null;
}

canvas.addEventListener("pointerup", stopDrawing);
canvas.addEventListener("pointerleave", stopDrawing);
canvas.addEventListener("pointercancel", stopDrawing);

function clearTrace(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  traceDistance = 0;
  tracePercent = 0;
  window.__lb15Celebrated = false;

  tracePercentText.textContent = "0%";
  progressFill.style.width = "0%";
}

function chooseFemaleVoice(){
  if (!("speechSynthesis" in window)) return null;

  const voices = speechSynthesis.getVoices() || [];
  const englishVoices = voices.filter(v => /^en/i.test(v.lang || ""));

  const preferredNames = [
    "Jenny",
    "Aria",
    "Samantha",
    "Victoria",
    "Zira",
    "Susan",
    "Google US English",
    "Microsoft Zira"
  ];

  for (const name of preferredNames) {
    const found = englishVoices.find(v =>
      (v.name || "").toLowerCase().includes(name.toLowerCase())
    );
    if (found) return found;
  }

  return englishVoices[0] || voices[0] || null;
}

function speak(text){
  if (!("speechSynthesis" in window)) return;

  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.9;
  u.pitch = 1.1;
  u.volume = 1;

  const voice = chooseFemaleVoice();
  if (voice) u.voice = voice;

  speechSynthesis.speak(u);
}

function girlClick(){
  speak("Practice drawing octagons. Trace carefully on the poster.");
}

function micClick(){
  speak("Repeat after me. An octagon has eight vertices.");
}

function goNext(){
  location.href = "LB19.html";
}

function goPrev(){
  location.href = "LB14.html";
}
</script>

</body>
</html>

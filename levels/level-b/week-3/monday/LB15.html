  <script>
    const micIconBtn = document.getElementById("micIconBtn");
    const traceClearBtn = document.getElementById("traceClearBtn");
    const designImage = document.getElementById("designImage");
    const traceCanvas = document.getElementById("traceCanvas");
    const designerText = document.getElementById("designerText");
    const designerSub = document.getElementById("designerSub");
    const girlBtn = document.getElementById("girlBtn");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");

    const chimeAudio = new Audio("../../../../assets/audio/chimes/chime.mp3.mp3");
    chimeAudio.preload = "auto";
    let designerTimer = null;
    let traceCtx = null;
    let traceInkDistance = 0;

    function speakLine(text, onend){
      if (!("speechSynthesis" in window)) {
        if (onend) onend();
        return;
      }
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 1.0;
      utter.pitch = 1.1;
      utter.onend = () => { if (onend) onend(); };
      utter.onerror = () => { if (onend) onend(); };
      window.speechSynthesis.speak(utter);
    }

    const vertexEntry = window.GPVertexEntry?.create({
      mount: "#vertexEntryMount",
      title: "Write the number of vertices",
      prompt: "Trace the octagon, then write how many vertices it has.",
      showProgress: true,
      progressLabel: "Trace and vertex progress",
      items: [
        {
          id: "octagonVertices",
          label: "Octagon",
          answer: 8,
          hint: "Write 8",
          successSpeech: "Correct. An octagon has 8 vertices."
        }
      ],
      onProgress(state){
        if (typeof window.finishAndSave === "function") {
          window.finishAndSave({
            pageId: "LB15",
            level: "B",
            activityType: "lesson",
            score: state.totalProgress,
            tracing: state.totalProgress,
            stars: state.totalProgress >= 90 ? 3 : state.totalProgress >= 70 ? 2 : state.totalProgress >= 40 ? 1 : 0
          }).catch(() => {});
        }
      }
    }) || null;

    function updateTraceProgress(){
      const base = Math.max(0, Math.min(100, Math.round((traceInkDistance / 1200) * 100)));
      if (vertexEntry) vertexEntry.setBaseProgress(base);
    }

    function setupTrace(canvas, image){
      if (!canvas || !image) return;
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      let drawing = false;
      let lastPoint = null;
      traceCtx = ctx;

      function resizeCanvas(){
        const rect = image.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = rect.width + "px";
        canvas.style.height = rect.height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "rgba(30,120,255,0.9)";
        ctx.lineWidth = 7;
      }

      function scheduleResize(){
        requestAnimationFrame(resizeCanvas);
      }

      function getPoint(event){
        const rect = canvas.getBoundingClientRect();
        return {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top
        };
      }

      canvas.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        drawing = true;
        canvas.setPointerCapture(event.pointerId);
        const p = getPoint(event);
        lastPoint = p;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        window.GPTracing?.playTraceTick?.({ throttleMs: 90 });
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!drawing) return;
        const p = getPoint(event);
        if (lastPoint) {
          traceInkDistance += Math.hypot(p.x - lastPoint.x, p.y - lastPoint.y);
          updateTraceProgress();
          window.GPTracing?.playTraceTick?.({ throttleMs: 90 });
        }
        lastPoint = p;
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      });

      ["pointerup", "pointercancel", "pointerleave"].forEach((type) => {
        canvas.addEventListener(type, () => {
          drawing = false;
          lastPoint = null;
        });
      });

      if (image.complete) {
        scheduleResize();
      } else {
        image.addEventListener("load", scheduleResize);
      }
      if ("ResizeObserver" in window) {
        const observer = new ResizeObserver(scheduleResize);
        observer.observe(image);
      }
      window.addEventListener("resize", scheduleResize);
    }

    function clearTrace(){
      if (!traceCanvas || !traceCtx) return;
      traceCtx.clearRect(0, 0, traceCanvas.width, traceCanvas.height);
      traceInkDistance = 0;
      if (vertexEntry) vertexEntry.reset();
    }

    function runDesignerLines(){
      if (designerTimer) clearTimeout(designerTimer);
      if (designerText) designerText.classList.add("show");
      if (designerSub) designerSub.classList.remove("show");
      chimeAudio.currentTime = 0;
      chimeAudio.play().catch(() => {});
      speakLine("Practice drawing octagons.", () => {
        designerTimer = setTimeout(() => {
          if (designerSub) designerSub.classList.add("show");
          speakLine("An Octagon has 8 vertices.");
        }, 500);
      });
    }

    if (girlBtn) {
      girlBtn.addEventListener("click", runDesignerLines);
    }
    if (traceClearBtn) traceClearBtn.addEventListener("click", clearTrace);
    if (micIconBtn) {
      // Mic click is handled by activity-standardizer unified protocol.
    }
    setupTrace(traceCanvas, designImage);

    nextBtn.addEventListener("click", () => {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      window.location.href = "../tuesday/LB16.html";
    });

    prevBtn.addEventListener("click", () => {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      window.location.href = "LB14.html";
    });
  </script>
<script>
  (function(){
    if (window.__lbIntroVideoOverlayInit) return;
    window.__lbIntroVideoOverlayInit = true;

    const overlay = document.getElementById("lbIntroVideoOverlay");
    const video = document.getElementById("lbIntroVideo");
    const startBtn = document.getElementById("lbIntroStartBtn");
    const skipBtn = document.getElementById("lbIntroSkipBtn");
    const help = document.getElementById("lbIntroHelp");

    if (!overlay || !video) return;

    let introClosed = false;
    let hardTimeout = setTimeout(revealPage, 60000);

    function clearHardTimeout(){
      if (hardTimeout) {
        clearTimeout(hardTimeout);
        hardTimeout = null;
      }
    }

    function revealPage(){
      if (introClosed) return;
      introClosed = true;
      clearHardTimeout();
      try { video.pause(); } catch (_) {}
      overlay.classList.remove("active");
      overlay.style.display = "none";
    }

    function markStarted(){
      video.style.opacity = "1";
    }

    function tryPlayMuted(){
      try {
        video.muted = true;
        video.defaultMuted = true;
        video.volume = 1;
        const p = video.play();
        if (p && typeof p.then === "function") {
          p.then(() => {
            markStarted();
            if (help) help.textContent = 'Video is playing muted. Tap "Turn On Sound" if you want audio.';
          }).catch(() => {
            if (help) help.textContent = 'Tap "Turn On Sound" or tap the video to start the intro.';
          });
        } else {
          markStarted();
        }
      } catch (_) {
        if (help) help.textContent = 'Tap "Turn On Sound" or tap the video to start the intro.';
      }
    }

    async function turnOnSound(){
      try {
        video.muted = false;
        video.defaultMuted = false;
        video.volume = 1;
        await video.play();
        markStarted();
        if (help) help.textContent = "Sound is on.";
      } catch (_) {
        if (help) help.textContent = 'If sound is still blocked, tap directly on the video once.';
      }
    }

    if (startBtn) startBtn.addEventListener("click", turnOnSound);
    if (skipBtn) skipBtn.addEventListener("click", revealPage);
    video.addEventListener("click", turnOnSound);
    video.addEventListener("loadeddata", tryPlayMuted, { once:true });
    video.addEventListener("playing", markStarted);
    video.addEventListener("timeupdate", markStarted, { once:true });
    video.addEventListener("ended", revealPage, { once:true });
    video.addEventListener("error", revealPage, { once:true });

    setTimeout(() => {
      if (!introClosed && video.readyState < 2) {
        revealPage();
        return;
      }
      if (!introClosed) tryPlayMuted();
    }, 1000);
  })();
</script>

<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LB15",
    defaultLevel: "B",
    defaultActivityType: "lesson",
    defaultScore: 100,
    defaultStars: 1,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);
    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}
    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };
  
    saveLocalActivityFallback(fullPayload);
  
    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }
  
    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>

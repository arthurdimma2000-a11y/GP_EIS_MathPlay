  .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}
  .convo-line.show,.speech-line.show,.dialog-line.show,.bubble-line.show,.bubble-left.show,.bubble-right.show,#bubbleLeft.show,#bubbleRight.show{display:block !important;}
  .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,1.9vw,19px) !important;line-height:1.24 !important;max-width:min(40vw,320px) !important;white-space:normal !important;word-break:break-word !important;overflow-wrap:anywhere !important;}
  @media (max-width:780px){
    .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,3.6vw,17px) !important;max-width:min(44vw,220px) !important;line-height:1.2 !important;}
  }
</style>



<meta charset="utf-8" />

<style>
  :root{
    --ink:#2d2d2d;
    --bg:#e4f6df;
    --card:#f9f4ff;
    --border:#d9b9f0;
    --accent:#6c4bbf;
    --bubble-kid:#d8ebff;
    --bubble-baker:#fde3c4;
    --btn-yellow:#f6da7b;
    --btn-orange:#ff8a5b;
    --btn-blue:#dfeaff;
    --shadow:0 10px 24px rgba(0,0,0,.08);
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    padding:16px;
    color:var(--ink);
  }
  .app{
    width:min(940px,96vw);
    border-radius:16px;
    padding:12px 12px 8px;
  }
  .home-btn{
    right:10%;
    top:8px;
    z-index:5;
  }
  .board{
    border:2px dashed var(--border);
    border-radius:16px;
    padding:12px;
    background:
      radial-gradient(circle at 18% 20%, rgba(255,185,210,.35) 0 52px, transparent 54px),
      radial-gradient(circle at 82% 22%, rgba(210,240,255,.4) 0 58px, transparent 60px),
      radial-gradient(circle at 30% 80%, rgba(255,225,150,.35) 0 56px, transparent 58px),
      radial-gradient(circle at 72% 78%, rgba(190,255,210,.35) 0 54px, transparent 56px),
      linear-gradient(180deg,#fff7fb 0%, #f6f7ff 50%, #fff5e8 100%);
    min-height:360px;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }
  .tray-hero{
    display:flex;
    justify-content:center;
    margin:6px 0 8px;
    width:100%;
  }
  .tray-hero img{
    width:min(676px,92%);
    height:auto;
    object-fit:contain;
    display:block;
    filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
    cursor:pointer;
  }
  .designer-text{
    position:absolute;
    left:40%;
    top:16%;
    transform:translateX(-50%);
    font-size:2.2rem;
    font-weight:800;
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    color:#2d2d2d;
    text-align:left;
    opacity:0;
    transition:opacity .25s ease, transform .25s ease;
    z-index:2;
    white-space:nowrap;
  }
  .designer-text.show{
    opacity:1;
  }
  .designer-sub{
    position:absolute;
    left:55%;
    top:24%;
    transform:translateX(-50%);
    font-size:2.1rem;
    font-weight:900;
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    color:#2d2d2d;
    text-align:center;
    opacity:0;
    transition:opacity .25s ease, transform .25s ease;
    z-index:2;
  }
  .designer-sub.show{
    opacity:1;
  }
  .convo-line{
    display:none !important;
    transform:translateY(-30%);
  }
  .convo-line[hidden]{
    display:none !important;
  }
  .convo-line.show{
    display:flex !important;
  }
  .row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0;
    width:100%;
    justify-content:flex-start;
    z-index:2;
  }
  .convo-line{
    transform: translateY(-30%);
  }
  .row.right{
    justify-content:flex-end;
  }
  .avatar{
    width:56px;
    height:56px;
    border-radius:50%;
    background:#fff;
    border:3px solid #fff;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    color:#777;
    overflow:hidden;
  }
  .avatar img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    display:block;
  }
  .name-tag{
    font-size:.75rem;
    font-weight:700;
    text-transform:uppercase;
    color:#666;
    margin-top:4px;
    text-align:center;
  }
  .bubble{
    padding:10px 14px;
    border-radius:16px;
    position:relative;
    font-size:1rem;
    max-width:min(560px,70vw);
    line-height:1.25;
  }
  .bubble-stack{
    display:flex;
    flex-direction:column;
    gap:6px;
    align-items:flex-start;
  }
  .row.right .bubble-stack{
    align-items:flex-end;
  }
  .repeat-result{
    margin-top:4px;
    font-size:.95rem;
    font-weight:700;
    color:#2f9f5f;
  }
  .star-row{
    display:flex;
    gap:6px;
    margin-top:4px;
    font-weight:900;
    font-size:1.2rem;
    color:#ffd24a;
    text-shadow:
      0 2px 0 #b87900,
      0 4px 0 #8a5a00,
      0 8px 14px rgba(0,0,0,.28);
  }
  .cookie-row{
    display:flex;
    justify-content:center;
    gap:18px;
    margin:12px 0;
  }
  .cookie-row.hidden{
    display:none;
  }
  .cookie-row img{
    width:min(220px,40vw);
    height:auto;
    display:block;
    filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
  }
  .bubble.kid{background:var(--bubble-kid);}
  .bubble.baker{background:var(--bubble-baker);}
  .bubble.sparkle{
    background: linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);
    box-shadow:0 0 12px rgba(255,214,0,.6), 0 0 18px rgba(255,105,180,.4);
    animation: sparklePulse 1.2s ease-in-out infinite;
  }
  @keyframes sparklePulse{
    0%,100%{filter:brightness(1);}
    50%{filter:brightness(1.12);}
  }
  .bubble.kid::after{
    content:"";
    position:absolute;
    right:-6px;
    top:14px;
    border-width:8px 0 8px 8px;
    border-style:solid;
    border-color:transparent transparent transparent var(--bubble-kid);
  }
  .bubble.baker::after{
    content:"";
    position:absolute;
    left:-6px;
    top:14px;
    border-width:8px 8px 8px 0;
    border-style:solid;
    border-color:transparent var(--bubble-baker) transparent transparent;
  }
  .controls{
    display:flex;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
    z-index:3;
    background:rgba(255,255,255,.92);
    padding:4px 6px;
    border-radius:16px;
    box-shadow:0 8px 16px rgba(0,0,0,.18);
    width:fit-content;
    max-width:100%;
    justify-content:center;
    margin-top:2px;
  }
  .btn{
    border:none;
    border-radius:999px;
    padding:8px 12px;
    font-size:.9rem;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
  }
  .btn.prev{background:var(--btn-orange);color:#fff;}
  .btn.next{background:var(--btn-orange);color:#fff;}
  .btn.stop{background:var(--btn-blue);color:#1f3b6b;}
  .btn.read{background:var(--btn-orange);color:#fff;}
  .btn.mic{
    background:var(--btn-orange);
    color:#fff;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .record-icon{
    width:16px;
    height:16px;
    display:inline-block;
    vertical-align:middle;
  }
  .record-icon path{
    stroke:#fff;
  }
  .mic-icon-btn img{
    width:32px;
    height:32px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
  }
  .recording{
    display:inline-flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .recording audio{
    height:28px;
  }
  .recording-status{
    font-size:.85rem;
    color:#555;
  }
  .conversation-status{
    font-size:.95rem;
    font-weight:800;
    color:#6c4bbf;
    min-height:1.2em;
  }
  .girl-spot{
    position:absolute;
    left:18px;
    top:60px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    z-index:3;
  }
  .girl-spot img{
    width:72px;
    height:72px;
    border-radius:18px;
    object-fit:cover;
    box-shadow:0 6px 14px rgba(0,0,0,.25);
    border:4px solid #ffe3f7;
    background:#ffd6f2;
    cursor:pointer;
  }
  .girl-hint{
    font-size:.9rem;
    font-weight:800;
    color:#d62828;
    text-align:center;
  }
  @media (max-width:780px){
    .row{gap:8px;}
    .avatar{width:48px;height:48px;}
    .bubble{font-size:.95rem;}
  }
</style>

<body>

  

  <div class="app">
    <a class="home-btn" href="../../../../index.html" aria-label="Home">
      <img src="../../../../assets/images/shapes/Home1.png" alt="Home">
    </a>

    <div class="board" id="board">
      <div class="tray-hero">
        <img src="../../../../assets/images/shapes/PolyVertice1.png" alt="Vertices board" id="designImage">
      </div>

      <div class="designer-text" id="designerText">I am a designer.</div>
      <div class="designer-sub" id="designerSub">I design using shapes.</div>

      <div class="girl-spot" aria-label="Tap the girl">
        <img src="../../../../assets/images/shapes/CirckleGirlWk1.png" alt="Girl helper" id="girlBtn" class="tap-girl">
        <div class="girl-hint">Tap the girl</div>
      </div>

      <div class="row convo-line line1" hidden>
        <div>
          <div class="avatar"><img src="../../../../assets/images/shapes/Greenboy.png" alt="Baker"></div>
          <div class="name-tag">Baker</div>
        </div>
        <div class="bubble-stack">
          <div class="bubble baker">What do you design?</div>
          <div class="repeat-result" data-line="0"></div>
          <div class="star-row" data-line="0"></div>
        </div>
      </div>

      <div class="row right convo-line line2" hidden>
        <div class="bubble-stack">
          <div class="bubble kid">I design clothes</div>
          <div class="repeat-result" data-line="1"></div>
          <div class="star-row" data-line="1"></div>
        </div>
        <div>
          <div class="avatar"><img src="../../../../assets/images/shapes/YellowHairWoman.png" alt="Kid"></div>
          <div class="name-tag">Kid</div>
        </div>
      </div>

      <div class="conversation-status" id="conversationStatus"></div>

      <div class="controls">
        <button class="btn prev" id="prevBtn">&#8592; Previous page</button>
        <button class="btn next" id="nextBtn">Next page &#8594;</button>
        <button class="btn stop" id="clearBtn" type="button">Clear</button>
        <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
          <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone">
        </button>
        <button class="btn read" id="recordBtn">
          <svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">
            <path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z"
                  fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
            <path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
            <path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
            <path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>

          Record
        </button>

  <script>
    const micIconBtn = document.getElementById("micIconBtn");
    const clearBtn = document.getElementById("clearBtn");
    const recordBtn = document.getElementById("recordBtn");
    const recordingPlayback = document.getElementById("recordingPlayback");
    const conversationStatus = document.getElementById("conversationStatus");
    const designImage = document.getElementById("designImage");
    const designerText = document.getElementById("designerText");
    const designerSub = document.getElementById("designerSub");
    const girlBtn = document.getElementById("girlBtn");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    const lines = Array.from(document.querySelectorAll(".convo-line"));
    const repeatResults = Array.from(document.querySelectorAll(".repeat-result"));
    const starRows = Array.from(document.querySelectorAll(".star-row"));

    let recorder = null;
    let recordedChunks = [];
    let currentLineIndex = -1;
    let micExpectingRepeat = false;
    const attempts = [0, 0];
    const maxAttempts = 3;
    const chimeAudio = new Audio("../../../../assets/audio/chimes/chime.mp3");
    chimeAudio.preload = "auto";
    const instructionAudio = new Audio("../../../../assets/audio/chimes/InstructionAudio.mp3");
    instructionAudio.preload = "auto";
    let designerTimer = null;
    let loadIntroStarted = false;

    function hideAllLines(){
      lines.forEach(line => {
        line.classList.remove("show");
        line.hidden = true;
        const bubble = line.querySelector(".bubble");
        if (bubble) bubble.classList.remove("sparkle");
      });
    }

    function getSpeechVoice(role){
      if (!("speechSynthesis" in window) || typeof window.speechSynthesis.getVoices !== "function") return null;
      const voices = window.speechSynthesis.getVoices() || [];
      if (!voices.length) return null;
      const englishVoices = voices.filter((voice) => /^en(-|_)?/i.test(String(voice.lang || "")));
      const pool = englishVoices.length ? englishVoices : voices;
      const maleName = /(david|mark|george|daniel|fred|alex|guy|matthew|thomas|brian|christopher|male|man|boy)/i;
      const femaleName = /(samantha|victoria|zira|jenny|aria|ava|allison|ellie|libby|olivia|serena|emma|ivy|nova|stella|grace|female|woman|girl)/i;
      const kidName = /(kids?|child|junior|young|ava|aria|allison|ellie|libby|olivia|emma|ivy|jenny|nova|grace)/i;

      if (role === "boy") {
        return pool.find((voice) => maleName.test(String(voice.name || "")))
          || pool[0]
          || null;
      }

      if (role === "girl") {
        return pool.find((voice) => kidName.test(String(voice.name || "")) && !maleName.test(String(voice.name || "")))
          || pool.find((voice) => femaleName.test(String(voice.name || "")) && !maleName.test(String(voice.name || "")))
          || pool.find((voice) => !maleName.test(String(voice.name || "")))
          || pool[0]
          || null;
      }

      return pool[0] || null;
    }

    function speakLine(text, onend, options){
      if (!("speechSynthesis" in window)) {
        if (onend) onend();
        return;
      }
      window.speechSynthesis.cancel();
      const opts = options || {};
      const utter = new SpeechSynthesisUtterance(text);
      const selectedVoice = getSpeechVoice(opts.role);
      if (selectedVoice) utter.voice = selectedVoice;
      utter.lang = opts.lang || "en-US";
      utter.rate = typeof opts.rate === "number" ? opts.rate : (opts.role === "girl" ? 0.75 : 1.0);
      utter.pitch = typeof opts.pitch === "number" ? opts.pitch : (opts.role === "girl" ? 1.5 : 1.1);
      utter.volume = 1;
      utter.onend = () => { if (onend) onend(); };
      utter.onerror = () => { if (onend) onend(); };
      window.speechSynthesis.speak(utter);
    }

    function setConversationStatus(text){
      if (!conversationStatus) return;
      conversationStatus.textContent = text || "";
    }

    function highlightLine(index, on){
      const line = lines[index];
      if (!line) return;
      const bubble = line.querySelector(".bubble");
      if (!bubble) return;
      bubble.classList.toggle("sparkle", on);
    }

    function normalizeSpeech(text){
      return (text || "")
        .toLowerCase()
        .replace(/[^\w\s]|_/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function setStars(index, count){
      const row = starRows[index];
      if (!row) return;
      row.innerHTML = new Array(count).fill("&#9733;").join("");
    }

    function showAndSpeakLine(index){
      const line = lines[index];
      if (!line) return;
      line.hidden = false;
      line.classList.add("show");
      currentLineIndex = index;
      micExpectingRepeat = true;
      const bubble = line.querySelector(".bubble");
      const text = bubble ? bubble.textContent.trim() : "";
      speakLine(text);
    }

    function listenForRepeat(expectedText){
      try {
        if (window.GPTracing && typeof window.GPTracing.prepareMicSupport === "function") {
          window.GPTracing.prepareMicSupport();
        }
      } catch (_) {}
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        speakLine("Sorry, try again!");
        setConversationStatus("Sorry, try again!");
        return;
      }
      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.onresult = (event) => {
        const said = event.results[0][0].transcript;
        const expected = normalizeSpeech(expectedText);
        const actual = normalizeSpeech(said);
        attempts[currentLineIndex] += 1;
        if (actual === expected) {
          highlightLine(currentLineIndex, false);
          micExpectingRepeat = false;
          const attemptCount = attempts[currentLineIndex];
          const stars = attemptCount === 1 ? 3 : (attemptCount <= 3 ? 2 : 1);
          setStars(currentLineIndex, stars);
          if (repeatResults[currentLineIndex]) {
            repeatResults[currentLineIndex].textContent = expectedText;
          }
          setConversationStatus("");
          if (currentLineIndex === lines.length - 1) {
            chimeAudio.currentTime = 0;
            chimeAudio.play().catch(() => {});
            speakLine("Wow! You are super smart!");
            setConversationStatus("Wow! You are super smart!");
            return;
          }
          currentLineIndex += 1;
          showAndSpeakLine(currentLineIndex);
        } else {
          if (attempts[currentLineIndex] >= maxAttempts) {
            speakLine("Sorry, Study hard!");
            setConversationStatus("Sorry, Study hard!");
            micExpectingRepeat = false;
            highlightLine(currentLineIndex, false);
            return;
          }
          speakLine("Sorry, try again!", () => {
            setConversationStatus("Sorry, try again!");
            listenForRepeat(expectedText);
          });
        }
      };
      recognition.onerror = () => {
        speakLine("Sorry, try again!", () => {
          setConversationStatus("Sorry, try again!");
          listenForRepeat(expectedText);
        });
      };
      recognition.start();
    }

    function onMicClick(){
      if (currentLineIndex === -1) {
        hideAllLines();
        showAndSpeakLine(0);
        setConversationStatus("");
        return;
      }
      if (micExpectingRepeat) {
        const bubble = lines[currentLineIndex]?.querySelector(".bubble");
        if (!bubble) return;
        highlightLine(currentLineIndex, true);
        speakLine("Repeat after me.", () => {
          listenForRepeat(bubble.textContent || "");
        });
      }
    }

    function clearConversation(){
      hideAllLines();
      currentLineIndex = -1;
      micExpectingRepeat = false;
      attempts.forEach((_, i) => attempts[i] = 0);
      repeatResults.forEach(el => { if (el) el.textContent = ""; });
      starRows.forEach(el => { if (el) el.textContent = ""; });
      setConversationStatus("");
    }

    function setRecordLabel(text){
      recordBtn.innerHTML = '<svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">' +
        '<path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>' +
        '<path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '</svg> ' + text;
    }

    async function toggleRecord(){
      if (recorder && recorder.state === "recording") {
        recorder.stop();
        setRecordLabel("Record");
        return;
      }
      try{
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          return;
        }
        if (!window.MediaRecorder) {
          return;
        }
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
        recordedChunks = [];
        const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
          ? "audio/webm;codecs=opus"
          : (MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "");
        recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
        recorder.ondataavailable = (e) => {
          if (e.data.size > 0) recordedChunks.push(e.data);
        };
        recorder.onstop = () => {
          const type = recorder.mimeType || "audio/webm";
          const blob = new Blob(recordedChunks, { type });
          recordingPlayback.src = URL.createObjectURL(blob);
          recordingPlayback.muted = false;
          recordingPlayback.volume = 1;
          recordingPlayback.load();
          stream.getTracks().forEach(t => t.stop());
        };
        recorder.start();
        setRecordLabel("Stop recording");
      }catch(e){
        setRecordLabel("Record");
      }
    }

    if (micIconBtn) micIconBtn.addEventListener("click", async () => {
      try {
        if (window.GPTracing && typeof window.GPTracing.prepareMicSupport === "function") {
          await window.GPTracing.prepareMicSupport();
        }
      } catch (_) {}
      onMicClick();
    });

    if (clearBtn) clearBtn.addEventListener("click", clearConversation);
    recordBtn.addEventListener("click", toggleRecord);

    function runDesignerLines(){
      if (designerTimer) clearTimeout(designerTimer);
      if (designerText) designerText.classList.add("show");
      if (designerSub) designerSub.classList.remove("show");
      chimeAudio.currentTime = 0;
      chimeAudio.play().catch(() => {});
      speakLine("I am a designer.", () => {
        if (designerSub) designerSub.classList.add("show");
        speakLine("I design using shapes.", null, {
          role: "girl",
          rate: 0.75,
          pitch: 1.5,
          volume: 1
        });
      }, {
        role: "girl",
        rate: 0.75,
        pitch: 1.5,
        volume: 1
      });
    }

    function playLoadInstructionSequence(){
      if (loadIntroStarted) return;
      loadIntroStarted = true;

      hideAllLines();
      if (designerText) designerText.classList.remove("show");
      if (designerSub) designerSub.classList.remove("show");
      setConversationStatus("");

      const steps = [
        () => {
          if (designerText) designerText.classList.add("show");
          setConversationStatus("I am a designer.");
          speakLine("I am a designer.", runNextStep, {
            role: "girl",
            rate: 0.75,
            pitch: 1.5,
            volume: 1
          });
        },
        () => {
          const line = lines[0];
          if (line) {
            line.hidden = false;
            line.classList.add("show");
          }
          setConversationStatus("What do you design?");
          speakLine("What do you design?", runNextStep, {
            role: "girl",
            rate: 0.75,
            pitch: 1.5,
            volume: 1
          });
        },
        () => {
          const line = lines[1];
          if (line) {
            line.hidden = false;
            line.classList.add("show");
          }
          setConversationStatus("I design clothes.");
          speakLine("I design clothes.", runNextStep, {
            role: "girl",
            rate: 0.75,
            pitch: 1.5,
            volume: 1
          });
        },
        () => {
          if (designerSub) designerSub.classList.add("show");
          setConversationStatus("I design using shapes.");
          speakLine("I design using shapes.", null, {
            role: "girl",
            rate: 0.75,
            pitch: 1.5,
            volume: 1
          });
        }
      ];

      let stepIndex = 0;
      function runNextStep(){
        const step = steps[stepIndex++];
        if (step) window.setTimeout(step, 120);
      }

      const beginSpeech = () => window.setTimeout(runNextStep, 120);
      const fallbackTimer = window.setTimeout(beginSpeech, 5200);

      instructionAudio.onended = () => {
        window.clearTimeout(fallbackTimer);
        beginSpeech();
      };
      instructionAudio.onerror = () => {
        window.clearTimeout(fallbackTimer);
        beginSpeech();
      };

      try{
        instructionAudio.currentTime = 0;
        const playAttempt = instructionAudio.play();
        if (playAttempt && typeof playAttempt.catch === "function") {
          playAttempt.catch(() => {
            window.clearTimeout(fallbackTimer);
            beginSpeech();
          });
        }
      }catch(_err){
        window.clearTimeout(fallbackTimer);
        beginSpeech();
      }
    }

    if (girlBtn) {
      girlBtn.addEventListener("click", runDesignerLines);
    }

    nextBtn.addEventListener("click", () => {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      window.location.href = "../wednesday/LB3.html";
    });

    prevBtn.addEventListener("click", () => {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      window.location.href = "../monday/PentagonArtClass.html";
    });

    hideAllLines();
    window.addEventListener("load", playLoadInstructionSequence, { once:true });
  </script>

  <script src="../../../../shared/js/storage.js"></script>
  <script src="../../../../shared/js/progress.js"></script>
  <script src="../../../../shared/js/tracing.js"></script>
  <script src="../../../../activity-standardizer.js"></script>

  <script type="module">
    import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
    window.GPProgress.installTracker({
      saveActivityResult,
      markLoginPing,
      defaultPageId: "LB2",
      defaultLevel: "B",
      defaultActivityType: "lesson",
      defaultScore: 100,
      defaultStars: 1,
      defaultSkills: {
        reading: 1,
        writing: 0,
        speaking: 1,
        listening: 1
      }
    });

    function getStudentSession(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
      }catch(e){
        return null;
      }
    }

    function inferProgressMeta(payload){
      const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
      const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
      const level = (payload && payload.level)
        || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
      const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
      const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
      const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
      const month = payload && payload.month != null ? Number(payload.month) : 1;
      return {
        pageId,
        file,
        level,
        week: Number.isFinite(week) && week > 0 ? week : 1,
        month: Number.isFinite(month) && month > 0 ? month : 1
      };
    }

    function getActivityStore(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      }catch(e){
        return {};
      }
    }

    function setActivityStore(store){
      try{
        localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
      }catch(e){}
    }

    function saveLocalActivityFallback(payload){
      const session = getStudentSession() || {};
      const meta = inferProgressMeta(payload || {});
      const score = payload && typeof payload.score === "number" ? payload.score : 0;
      const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
      const tracing = payload && typeof payload.tracing === "number"
        ? payload.tracing
        : (payload && typeof payload.progress === "number" ? payload.progress : 0);
      const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
      const entry = {
        pageId: meta.pageId,
        file: meta.file,
        level: meta.level,
        type,
        activityType: (payload && payload.activityType) || type,
        score,
        stars,
        skills: payload && payload.skills ? payload.skills : {},
        completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
        tracing,
        week: meta.week,
        month: meta.month,
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
        savedAt: new Date().toISOString(),
        ts: Date.now()
      };
      const store = getActivityStore();
      store[meta.pageId] = {
        ...(store[meta.pageId] || {}),
        ...entry
      };
      setActivityStore(store);
      try{
        localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
      }catch(e){}
      return store[meta.pageId];
    }

    async function finishAndSave(payload){
      const session = getStudentSession() || {};
      const fullPayload = {
        ...(payload || {}),
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
      };

      saveLocalActivityFallback(fullPayload);

      if (typeof window.finishActivity === "function") {
        try{
          await window.finishActivity(fullPayload);
        }catch(err){
          console.warn("finishActivity failed, local fallback already saved:", err);
        }
      }

      return fullPayload;
    }

    window.finishAndSave = finishAndSave;
  </script>

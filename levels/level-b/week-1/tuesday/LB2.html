<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>LB2 Fixed</title>
<style>
:root{--ink:#2d2d2d;--bg:#e4f6df;--card:#fff;--border:#d9b9f0;--accent:#6c4bbf;--bubble-kid:#d8ebff;--bubble-baker:#fde3c4;--btn-yellow:#f6da7b;--btn-orange:#ff8a5b;--btn-blue:#dfeaff;--shadow:0 10px 24px rgba(0,0,0,.08);font-family:"Comic Sans MS","Segoe UI",system-ui,Arial,sans-serif}
*{box-sizing:border-box} html,body{margin:0;max-width:100%;overflow-x:hidden;background:var(--bg);color:var(--ink)} body{min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:10px}
.app{position:relative;width:min(960px,100%);background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:12px;overflow:hidden}.home-btn{position:absolute;right:10px;top:8px;width:68px;height:68px;display:inline-flex;z-index:20}.home-btn img{width:100%;height:100%;display:block}.board{position:relative;border:2px dashed var(--border);border-radius:18px;padding:12px;min-height:360px;background:linear-gradient(180deg,#fff7fb 0%,#f6f7ff 50%,#fff5e8 100%)}
  .poster-wrap{position:relative;display:flex;justify-content:center}.poster-wrap img{width:min(700px,92%);height:auto;display:block;filter:drop-shadow(0 8px 12px rgba(0,0,0,.12))}.finger-cue{position:absolute;left:50%;top:-26px;transform:translateX(-50%);font-size:1.8rem;line-height:1;filter:drop-shadow(0 3px 4px rgba(0,0,0,.18));animation:fingerBob 1s ease-in-out infinite;display:none;pointer-events:none}.finger-cue.show{display:block}
.designer-text,.designer-sub{position:absolute;left:50%;transform:translateX(-50%);text-align:center;font-weight:900;color:#2d2d2d;opacity:0;transition:opacity .25s ease;z-index:4;white-space:nowrap;max-width:90%}.designer-text{top:16%;font-size:clamp(1.4rem,4vw,2.2rem)}.designer-sub{top:24%;font-size:clamp(1.3rem,3.8vw,2rem)}.designer-text.show,.designer-sub.show{opacity:1}
.conversation-panel{margin-top:12px;border:2px dashed #d9b9f0;border-radius:16px;padding:14px 12px;background:linear-gradient(180deg,#fff,#f9f4ff);display:grid;gap:12px}.convo-line{display:none}.convo-line.show{display:flex}.convo-line.right{justify-content:flex-end}.bubble-stack{display:flex;flex-direction:column;gap:6px;max-width:min(100%,520px)}.convo-line.right .bubble-stack{align-items:flex-end;margin-left:auto}.bubble{position:relative;padding:12px 15px;border-radius:18px;box-shadow:0 8px 16px rgba(0,0,0,.12);font-size:clamp(1rem,2.3vw,1.22rem);line-height:1.3;white-space:normal;word-break:break-word;font-weight:700}.bubble.kid{background:var(--bubble-kid)}.bubble.baker{background:var(--bubble-baker)}.bubble.kid:after{content:"";position:absolute;right:-7px;top:16px;border-width:8px 0 8px 8px;border-style:solid;border-color:transparent transparent transparent var(--bubble-kid)}.bubble.baker:after{content:"";position:absolute;left:-7px;top:16px;border-width:8px 8px 8px 0;border-style:solid;border-color:transparent var(--bubble-baker) transparent transparent}.bubble.sparkle{background:linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);box-shadow:0 0 12px rgba(255,214,0,.6),0 0 18px rgba(255,105,180,.45);animation:pulse 1.2s ease-in-out infinite}@keyframes pulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.12)}}
.repeat-result{min-height:1.2em;font-size:clamp(1rem,3vw,1.45rem);font-weight:900;color:#2f9f5f}.star-row{min-height:1.2em;display:flex;gap:6px;font-size:clamp(1.2rem,4vw,1.9rem);line-height:1;color:#ffd24a;text-shadow:0 2px 0 #b87900,0 4px 0 #8a5a00,0 8px 14px rgba(0,0,0,.28)}
.controls{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px}.btn,.mic-icon-btn{border:none;border-radius:999px;min-height:46px;padding:10px 16px;font-size:.95rem;font-weight:800;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.15)}.btn.prev,.btn.next{background:var(--btn-orange);color:#fff}.btn.stop{background:var(--btn-blue);color:#1f3b6b}.btn.read{background:var(--btn-orange);color:#fff}.mic-icon-btn{position:relative;background:transparent;box-shadow:none;padding:0;min-width:46px}.mic-icon-btn img{width:42px;height:42px;display:block;filter:drop-shadow(0 4px 8px rgba(0,0,0,.18))}.status-wrap{display:grid;gap:6px;margin-top:8px}.conversation-status,.recording-status{min-height:1.25em;text-align:center;font-weight:900}.conversation-status{color:var(--accent)}.recording-status{color:#555;font-size:.92rem}.recording audio{height:34px;max-width:260px}.footer-note{text-align:center;color:#666;font-size:.92rem;margin-top:6px}
@keyframes fingerBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}
@media(max-width:520px){.home-btn{width:58px;height:58px}.board{padding:10px}.app{padding:10px}.poster-wrap img{width:100%}}
</style>
</head>
<body>
<div class="app">
  <a class="home-btn" href="../../../../index.html" aria-label="Home"><img src="../../../../assets/images/shapes/Home1.png" alt="Home"></a>
  <div class="board">
    <div class="poster-wrap"><img src="../../../../assets/images/shapes/PolyVertice1.png" alt="Vertices board"></div>
    <div class="designer-text" id="designerText">I am a designer.</div>
    <div class="designer-sub" id="designerSub">I design using shapes.</div>
    </div>
  <div class="conversation-panel">
    <div class="convo-line" data-index="0"><div class="bubble-stack"><div class="bubble baker">What do you design?</div><div class="repeat-result"></div><div class="star-row"></div></div></div>
    <div class="convo-line right" data-index="1"><div class="bubble-stack"><div class="bubble kid">I design clothes.</div><div class="repeat-result"></div><div class="star-row"></div></div></div>
  </div>
  <div class="controls">
    <button class="btn prev" id="prevBtn" type="button">← Previous page</button>
    <button class="btn next" id="nextBtn" type="button">Next page →</button>
    <button class="btn stop" id="clearBtn" type="button">Clear</button>
    <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Microphone"><span class="finger-cue" id="micFinger" aria-hidden="true">👇</span><img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone"></button>
    <button class="btn read" id="recordBtn" type="button">Record</button>
    <div class="recording"><audio id="recordingPlayback" controls></audio></div>
  </div>
  <div class="status-wrap"><div class="recording-status" id="recordingStatus"></div><div class="conversation-status" id="conversationStatus"></div></div>
  <div class="footer-note">Tap the microphone step by step.</div>
</div>
<script>
window.__GP_DISABLE_UNIFIED_MIC_PROTOCOL__ = true;
const PAGE_ID='LB2', LEVEL_ID='B';
const expectedLines=['What do you design?','I design clothes.'];
const remarks=['Wow! You are super smart!','Amazing Job!','Great! Keep it up!'];
const lines=[...document.querySelectorAll('.convo-line')], bubbles=lines.map(l=>l.querySelector('.bubble')), results=lines.map(l=>l.querySelector('.repeat-result')), stars=lines.map(l=>l.querySelector('.star-row'));
  const micBtn=document.getElementById('micIconBtn'), clearBtn=document.getElementById('clearBtn'), micFinger=document.getElementById('micFinger'), prevBtn=document.getElementById('prevBtn'), nextBtn=document.getElementById('nextBtn'), statusEl=document.getElementById('conversationStatus'), designerText=document.getElementById('designerText'), designerSub=document.getElementById('designerSub');
  const recordBtn=document.getElementById('recordBtn'), recordingPlayback=document.getElementById('recordingPlayback'), recordingStatus=document.getElementById('recordingStatus');
  let currentLine=0, phase='reveal', busy=false, done=false, recognitionCounter=0, attempts=[0,0], starsAwarded=[0,0], recorder=null, recordedChunks=[];
function speak(t){return new Promise(r=>{if(!('speechSynthesis'in window)||!t){r();return;} try{speechSynthesis.cancel();}catch(_){} const u=new SpeechSynthesisUtterance(t); u.lang='en-US'; u.rate=.9; u.pitch=1.12; u.onend=r; u.onerror=r; speechSynthesis.speak(u);});}
function normalize(t){return String(t||'').toLowerCase().replace(/[^\w\s]|_/g,'').replace(/\s+/g,' ').trim();}
function pctMatch(a,b){const e=normalize(a).split(' ').filter(Boolean), s=normalize(b).split(' ').filter(Boolean); if(!e.length) return 0; let hits=0; e.forEach(w=>{ if(s.includes(w)) hits++; }); return Math.round(hits/e.length*100);}
function reward(n){return n===1?3:n===2?2:n===3?1:0}
function setStatus(t){statusEl.textContent=t||''}
  function setGuide(stage){if(micFinger) micFinger.classList.toggle('show',stage==='mic');}
function hideLines(){lines.forEach(l=>l.classList.remove('show')); bubbles.forEach(b=>b.classList.remove('sparkle'));}
function setResult(i,t,c){results[i].textContent=t||''; if(c) results[i].style.color=c; else results[i].style.color='';}
function setStars(i,n){stars[i].innerHTML=new Array(n).fill('★').join('');}
async function pushProgress(extra={}){const completed=results.filter(el=>{const t=(el.textContent||'').trim(); return t && t!=='Sorry, try again!' && t!=='You did a good Job. Nice try!';}).length; const totalStars=starsAwarded.reduce((a,b)=>a+b,0); const payload={pageId:PAGE_ID,level:LEVEL_ID,activityType:'speaking',score:done?100:Math.max(5,Math.min(95,Math.round((completed/expectedLines.length)*70+totalStars*5))),stars:totalStars,completed:done,skills:{reading:0,writing:0,speaking:completed?Math.min(3,completed):0,listening:completed?Math.min(3,completed):0},details:{attempts:[...attempts]},timestamp:new Date().toISOString(),...extra}; try{const store=JSON.parse(localStorage.getItem('gpProgressByPage')||'{}'); store[payload.pageId]=payload; localStorage.setItem('gpProgressByPage',JSON.stringify(store)); localStorage.setItem('gpLatestProgress',JSON.stringify(payload));}catch(_){} try{window.dispatchEvent(new CustomEvent('gp-progress-update',{detail:payload}));}catch(_){} try{if(window.GPTrack&&typeof window.GPTrack.finish==='function') await window.GPTrack.finish(payload);}catch(_){} }
function listen(){return new Promise(resolve=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR){resolve({supported:false,transcript:''}); return;} const id=++recognitionCounter; const rec=new SR(); rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=3; rec.continuous=false; let finished=false; const done=(t)=>{ if(finished||id!==recognitionCounter) return; finished=true; resolve({supported:true,transcript:(t||'').trim()}); }; rec.onresult=e=>done(Array.from(e.results||[]).map(r=>r&&r[0]&&r[0].transcript).filter(Boolean).join(' ')); rec.onerror=()=>done(''); rec.onnomatch=()=>done(''); rec.onend=()=>done(''); try{rec.start();}catch(_){done('');}});}
async function reveal(){hideLines(); lines[currentLine].classList.add('show'); setStatus(expectedLines[currentLine]); await speak(expectedLines[currentLine]); phase='coach'; pushProgress();}
async function coach(){bubbles[currentLine].classList.add('sparkle'); setStatus('Repeat after me.'); await speak('Repeat after me.'); phase='listen'; return doListen();}
async function doListen(){busy=true; setStatus('Now say the sentence.'); const heard=await listen(); const tryNo=++attempts[currentLine]; const transcript=(heard.transcript||'').trim(); const pass=heard.supported && pctMatch(expectedLines[currentLine], transcript)>=50; if(pass){setResult(currentLine, transcript||expectedLines[currentLine], '#2f9f5f'); starsAwarded[currentLine]=reward(tryNo); setStars(currentLine, starsAwarded[currentLine]); setStatus('Great! Let\'s go to the next sentence.'); await pushProgress(); currentLine++; if(currentLine>=expectedLines.length){done=true; const remark=remarks[Math.floor(Math.random()*remarks.length)]; setStatus(remark); await speak(remark); await pushProgress({completed:true,score:100}); busy=false; return;} hideLines(); lines[currentLine].classList.add('show'); setStatus(expectedLines[currentLine]); await speak(expectedLines[currentLine]); phase='coach'; busy=false; return;} if(tryNo>=3){setResult(currentLine,'You did a good Job. Nice try!','#b06a00'); setStars(currentLine,0); await pushProgress(); currentLine++; if(currentLine>=expectedLines.length){done=true; const remark='Nice try!'; setStatus(remark); await speak(remark); await pushProgress({completed:true}); busy=false; return;} hideLines(); lines[currentLine].classList.add('show'); setStatus(expectedLines[currentLine]); await speak(expectedLines[currentLine]); phase='coach'; busy=false; return;} setResult(currentLine,'Sorry, try again!','#c62828'); setStatus('Sorry, try again!'); await pushProgress(); await speak('Sorry, try again!'); phase='coach'; busy=false;}
  async function onMic(e){e&&e.preventDefault(); if(busy||done) return; setGuide('mic'); busy=true; if(phase==='reveal'){await reveal(); busy=false; return;} if(phase==='coach'){await coach(); return;} if(phase==='listen'){await doListen(); return;} busy=false;}
  function clearAll(){try{speechSynthesis.cancel();}catch(_){} recognitionCounter++; attempts=[0,0]; starsAwarded=[0,0]; currentLine=0; phase='reveal'; busy=false; done=false; hideLines(); results.forEach(el=>{el.textContent=''; el.style.color='';}); stars.forEach(el=>el.textContent=''); setStatus('Tap the microphone to begin.'); setGuide('mic'); pushProgress({score:0,stars:0,completed:false});}
  async function autoCoachIntro(){designerText.classList.add('show'); await speak('I am a designer.'); designerSub.classList.add('show'); await speak('I design using shapes.'); setStatus('Tap the microphone to begin.'); setGuide('mic'); await speak('Tap the microphone to begin.');}
async function toggleRecord(){ if(recorder&&recorder.state==='recording'){ recorder.stop(); recordBtn.textContent='Record'; recordingStatus.textContent='Saved recording.'; return;} try{ if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia||!window.MediaRecorder){recordingStatus.textContent='Recording not supported on this device.'; return;} const stream=await navigator.mediaDevices.getUserMedia({audio:true}); recordedChunks=[]; recorder=new MediaRecorder(stream); recorder.ondataavailable=e=>{if(e.data.size>0) recordedChunks.push(e.data)}; recorder.onstop=()=>{ const blob=new Blob(recordedChunks,{type:recorder.mimeType||'audio/webm'}); recordingPlayback.src=URL.createObjectURL(blob); recordingPlayback.load(); stream.getTracks().forEach(t=>t.stop()); }; recorder.start(); recordBtn.textContent='Stop recording'; recordingStatus.textContent='Recording... speak clearly.';}catch(_){recordingStatus.textContent='Microphone permission denied.';}}
  micBtn.addEventListener('click',onMic,{passive:false}); clearBtn.addEventListener('click',clearAll); recordBtn.addEventListener('click',toggleRecord); prevBtn.addEventListener('click',()=>{try{speechSynthesis.cancel();}catch(_){} window.location.href='../monday/PentagonArtClass.html';}); nextBtn.addEventListener('click',()=>{try{speechSynthesis.cancel();}catch(_){} window.location.href='../wednesday/LB3.html';}); clearAll(); window.addEventListener('load',()=>{setTimeout(()=>{autoCoachIntro().catch(()=>{});},350);});
</script>
<script src="../../../../shared/js/activity-standardizer-shared.js"></script>
</body>
</html>

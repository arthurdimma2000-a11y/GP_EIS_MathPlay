<style>
  :root{
    --ink:#2d2d2d;
    --bg:#e4f6df;
    --card:#f9f4ff;
    --border:#d9b9f0;
    --accent:#6c4bbf;
    --bubble-kid:#d8ebff;
    --bubble-baker:#fde3c4;
    --btn-yellow:#f6da7b;
    --btn-orange:#ff8a5b;
    --btn-blue:#dfeaff;
    --shadow:0 10px 24px rgba(0,0,0,.08);
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    padding:8px;
    color:var(--ink);
  }

  .app{
    width:min(1200px,99vw);
    border-radius:16px;
    padding:12px 12px 8px;
  }

  .home-btn{
    right:8%;
    top:8px;
    z-index:5;
  }

  .board{
    border:2px dashed var(--border);
    border-radius:16px;
    padding:12px;
    background:
      radial-gradient(circle at 18% 20%, rgba(255,185,210,.35) 0 52px, transparent 54px),
      radial-gradient(circle at 82% 22%, rgba(210,240,255,.4) 0 58px, transparent 60px),
      radial-gradient(circle at 30% 80%, rgba(255,225,150,.35) 0 56px, transparent 58px),
      radial-gradient(circle at 72% 78%, rgba(190,255,210,.35) 0 54px, transparent 56px),
      linear-gradient(180deg,#fff7fb 0%, #f6f7ff 50%, #fff5e8 100%);
    min-height:calc(100vh - 170px);
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }

  .tray-hero{
    display:flex;
    justify-content:center;
    margin:6px 0 8px;
    width:100%;
  }

  .trace-wrap{
    position:relative;
    display:inline-block;
  }

  .tray-hero img{
    width:min(676px,92%);
    height:auto;
    object-fit:contain;
    display:block;
    filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
    cursor:pointer;
  }

  .trace-wrap img{
    position:relative;
    z-index:1;
  }

  .trace-canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    touch-action:none;
    cursor:crosshair;
    z-index:2;
  }

  .designer-text{
    position:absolute;
    right:38%;
    top:8%;
    transform:none;
    font-size:2.2rem;
    font-weight:800;
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    color:#2d2d2d;
    text-align:left;
    opacity:0;
    transition:opacity .25s ease, transform .25s ease;
    z-index:3;
    white-space:nowrap;
    pointer-events:none;
  }

  .highlight-red{ color:#d62828; }
  .highlight-blue{ color:#1d5fd6; }

  .designer-text.show{ opacity:1; }

  .row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0;
    width:100%;
    justify-content:flex-start;
    z-index:2;
  }

  .convo-line{
    display:none !important;
    position:absolute;
    transform:translateY(-30%);
  }

  .convo-line.show{ display:flex !important; }

  .line1{
    left:13%;
    top:16%;
  }

  .line2{
    right:38%;
    top:21%;
  }

  .row.right{ justify-content:flex-end; }

  .avatar{
    width:56px;
    height:56px;
    border-radius:50%;
    background:#fff;
    border:3px solid #fff;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    color:#777;
    overflow:hidden;
  }

  .avatar img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    display:block;
  }

  .name-tag{
    font-size:.75rem;
    font-weight:700;
    text-transform:uppercase;
    color:#666;
    margin-top:4px;
    text-align:center;
  }

  .bubble{
    padding:10px 14px;
    border-radius:16px;
    position:relative;
    font-size:1rem;
    max-width:min(560px,70vw);
    line-height:1.25;
  }

  .bubble-stack{
    display:flex;
    flex-direction:column;
    gap:6px;
    align-items:flex-start;
  }

  .row.right .bubble-stack{ align-items:flex-end; }

  .repeat-result{
    margin-top:4px;
    font-size:.95rem;
    font-weight:700;
    color:#2f9f5f;
  }

  .star-row{
    display:flex;
    gap:6px;
    margin-top:4px;
    font-weight:900;
    font-size:1.2rem;
    color:#ffd24a;
    text-shadow:
      0 2px 0 #b87900,
      0 4px 0 #8a5a00,
      0 8px 14px rgba(0,0,0,.28);
  }

  .cookie-row{
    display:flex;
    justify-content:center;
    gap:18px;
    margin:12px 0;
  }

  .cookie-row.hidden{ display:none; }

  .cookie-row img{
    width:min(220px,40vw);
    height:auto;
    display:block;
    filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
  }

  .bubble.kid{background:var(--bubble-kid);}
  .bubble.baker{background:var(--bubble-baker);}

  .bubble.sparkle{
    background: linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);
    box-shadow:0 0 12px rgba(255,214,0,.6), 0 0 18px rgba(255,105,180,.4);
    animation: sparklePulse 1.2s ease-in-out infinite;
  }

  @keyframes sparklePulse{
    0%,100%{filter:brightness(1);}
    50%{filter:brightness(1.12);}
  }

  .bubble.kid::after{
    content:"";
    position:absolute;
    right:-6px;
    top:14px;
    border-width:8px 0 8px 8px;
    border-style:solid;
    border-color:transparent transparent transparent var(--bubble-kid);
  }

  .bubble.baker::after{
    content:"";
    position:absolute;
    left:-6px;
    top:14px;
    border-width:8px 8px 8px 0;
    border-style:solid;
    border-color:transparent var(--bubble-baker) transparent transparent;
  }

  .controls{
    display:flex;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
    z-index:3;
    background:rgba(255,255,255,.92);
    padding:4px 6px;
    border-radius:16px;
    box-shadow:0 8px 16px rgba(0,0,0,.18);
    width:fit-content;
    max-width:100%;
    justify-content:center;
    margin-top:2px;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:8px 12px;
    font-size:.9rem;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
  }

  .btn.prev{background:var(--btn-orange);color:#fff;}
  .btn.next{background:var(--btn-orange);color:#fff;}
  .btn.stop{background:var(--btn-blue);color:#1f3b6b;}
  .btn.read{background:var(--btn-orange);color:#fff;}
  .btn.mic{
    background:var(--btn-orange);
    color:#fff;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }

  .record-icon{
    width:16px;
    height:16px;
    display:inline-block;
    vertical-align:middle;
  }

  .record-icon path{ stroke:#fff; }

  .mic-icon-btn img{
    width:32px;
    height:32px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
  }

  .recording{
    display:inline-flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }

  .recording audio{ height:28px; }

  .recording-status{
    font-size:.85rem;
    color:#555;
  }

  .conversation-status{
    font-size:.95rem;
    font-weight:800;
    color:#6c4bbf;
    min-height:1.2em;
  }

  .girl-spot{
    position:absolute;
    left:18px;
    top:8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    z-index:3;
  }

  .girl-spot img{
    width:72px;
    height:72px;
    border-radius:18px;
    object-fit:cover;
    box-shadow:0 6px 14px rgba(0,0,0,.25);
    border:4px solid #ffe3f7;
    background:#ffd6f2;
    cursor:pointer;
  }

  .girl-hint{
    font-size:1.35rem;
    font-weight:800;
    color:#1d5fd6;
    text-align:center;
  }

  @media (max-width:780px){
    .row{gap:8px;}
    .avatar{width:48px;height:48px;}
    .bubble{font-size:.95rem;}
  }
</style>

<body>

  <div class="app">
    <a class="home-btn" href="../../../../index.html" aria-label="Home">
      <img src="../../../../assets/images/shapes/Home1.png" alt="Home">
    </a>

    <div class="board" id="board">
      <div class="tray-hero">
        <div class="trace-wrap">
          <img src="../../../../assets/images/shapes/ArithmeticPoster2.png" alt="Vertices board" id="designImage">
          <canvas class="trace-canvas" id="traceCanvas" aria-label="Trace the dotted numbers"></canvas>
          <div class="designer-text" id="designerText">The designer is counting shapes.</div>
        </div>
      </div>

      <div class="girl-spot" aria-label="Tap the girl">
        <img src="../../../../assets/images/shapes/CirckleGirlWk1.png" alt="Girl helper" id="girlBtn" class="tap-girl">
        <div class="girl-hint">Tap the girl</div>
      </div>

      <div class="row convo-line line1">
        <div class="bubble-stack">
          <div class="bubble baker">Look at the pentagons.</div>
          <div class="repeat-result" data-line="0"></div>
          <div class="star-row" data-line="0"></div>
        </div>
      </div>

      <div class="row right convo-line line2">
        <div class="bubble-stack">
          <div class="bubble kid">Subtract the numbers.</div>
          <div class="repeat-result" data-line="1"></div>
          <div class="star-row" data-line="1"></div>
        </div>
      </div>

      <div class="conversation-status" id="conversationStatus"></div>

      <div class="controls">
        <button class="btn prev" id="prevBtn">&#8592; Previous page</button>
        <button class="btn next" id="nextBtn">Next page &#8594;</button>
        <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
          <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone">
        </button>
        <button class="btn stop" id="traceClearBtn" type="button">Clear trace</button>
      </div>
    </div>
  </div>

  

  <script src="../../../../shared/js/storage.js"></script>
  <script src="../../../../shared/js/progress.js"></script>
  <script src="../../../../shared/js/tracing.js"></script>
  <script src="../../../../activity-standardizer.js"></script>

  <script>    const micIconBtn = document.getElementById("micIconBtn");
    const traceClearBtn = document.getElementById("traceClearBtn");
    const conversationStatus = document.getElementById("conversationStatus");
    const designImage = document.getElementById("designImage");
    const traceCanvas = document.getElementById("traceCanvas");
    const designerText = document.getElementById("designerText");
    const girlBtn = document.getElementById("girlBtn");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    const lines = Array.from(document.querySelectorAll(".convo-line"));
    const repeatResults = Array.from(document.querySelectorAll(".repeat-result"));
    const starRows = Array.from(document.querySelectorAll(".star-row"));

    const chimeAudio = new Audio("../../../../assets/audio/chimes/chime.mp3.mp3");
    chimeAudio.preload = "auto";
    const instructionAudio = new Audio("../../../../assets/audio/chimes/InstructionAudio.mp3");
    instructionAudio.preload = "auto";

    let currentLineIndex = -1;
    let micExpectingRepeat = false;
    const expectedLines = [
      "Look at the pentagons.",
      "Subtract the numbers."
    ];
    const attempts = [0, 0];
    const maxAttempts = 3;
    let designerTimer = null;
    let traceProgressUi = null;
    let traceSaveTimer = null;
    let traceProgressStarted = false;
    let traceCelebrated = false;
    let traceEncouraged = false;
    let loadIntroStarted = false;

    function hideAllLines(){
      lines.forEach(line => {
        line.classList.remove("show");
        line.hidden = true;
        const bubble = line.querySelector(".bubble");
        if (bubble) bubble.classList.remove("sparkle");
      });
      if (designerText) designerText.classList.remove("show");
    }

    function getSpeechVoice(role){
      if (!("speechSynthesis" in window) || typeof window.speechSynthesis.getVoices !== "function") return null;
      const voices = window.speechSynthesis.getVoices() || [];
      if (!voices.length) return null;
      const englishVoices = voices.filter((voice) => /^en(-|_)?/i.test(String(voice.lang || "")));
      const pool = englishVoices.length ? englishVoices : voices;
      const maleName = /(david|mark|george|daniel|fred|alex|guy|matthew|thomas|brian|christopher|male|man|boy)/i;
      const femaleName = /(samantha|victoria|zira|jenny|aria|ava|allison|ellie|libby|olivia|serena|emma|ivy|nova|stella|grace|female|woman|girl)/i;
      const kidName = /(kids?|child|junior|young|ava|aria|allison|ellie|libby|olivia|emma|ivy|jenny|nova|grace)/i;

      if (role === "girl") {
        return pool.find((voice) => kidName.test(String(voice.name || "")) && !maleName.test(String(voice.name || "")))
          || pool.find((voice) => femaleName.test(String(voice.name || "")) && !maleName.test(String(voice.name || "")))
          || pool.find((voice) => !maleName.test(String(voice.name || "")))
          || pool[0]
          || null;
      }

      if (role === "female") {
        return pool.find((voice) => femaleName.test(String(voice.name || "")) && !maleName.test(String(voice.name || "")))
          || pool.find((voice) => !maleName.test(String(voice.name || "")))
          || pool[0]
          || null;
      }

      return pool[0] || null;
    }

    function speakLine(text, onend, options){
      if (!("speechSynthesis" in window)) {
        if (onend) onend();
        return;
      }
      window.speechSynthesis.cancel();
      const opts = options || {};
      const utter = new SpeechSynthesisUtterance(text);
      const selectedVoice = getSpeechVoice(opts.role);
      if (selectedVoice) utter.voice = selectedVoice;
      utter.lang = opts.lang || "en-US";
      utter.rate = typeof opts.rate === "number" ? opts.rate : 1.0;
      utter.pitch = typeof opts.pitch === "number" ? opts.pitch : 1.1;
      utter.volume = typeof opts.volume === "number" ? opts.volume : 1;
      utter.onend = () => { if (onend) onend(); };
      utter.onerror = () => { if (onend) onend(); };
      window.speechSynthesis.speak(utter);
    }

    function setConversationStatus(text){
      if (!conversationStatus) return;
      conversationStatus.textContent = text || "";
    }

    function highlightLine(index, on){
      const line = lines[index];
      if (!line) return;
      const bubble = line.querySelector(".bubble");
      if (!bubble) return;
      bubble.classList.toggle("sparkle", on);
    }

    function normalizeSpeech(text){
      return (text || "")
        .toLowerCase()
        .replace(/[^\w\s]|_/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function setStars(index, count){
      const row = starRows[index];
      if (!row) return;
      row.innerHTML = new Array(count).fill("&#9733;").join("");
    }

    function showAndSpeakLine(index){
      const line = lines[index];
      if (!line) return;
      line.hidden = false;
      line.classList.add("show");
      currentLineIndex = index;
      micExpectingRepeat = true;
      const bubble = line.querySelector(".bubble");
      const text = bubble ? bubble.textContent.trim() : "";
      speakLine(text);
    }
    // Legacy local mic flow removed; shared LA2/LB3 protocol owns mic click.


    function setupTrace(canvas, image){
      if (!canvas || !image) return;
      let traceInitialized = false;

      function initSharedTrace(){
        if (traceInitialized) return;
        if (!window.GPTracing || typeof window.GPTracing.createPathTracePad !== "function") {
          window.setTimeout(initSharedTrace, 60);
          return;
        }
        traceInitialized = true;

        const boardEl = document.getElementById("board") || document.querySelector(".board") || canvas.parentElement;
        const controlsEl = document.querySelector(".controls");
        traceProgressUi = window.GPTracing.ensureTraceProgressUI({
          container: boardEl,
          before: controlsEl,
          label: "Trace progress"
        });

        const reset = window.GPTracing.createPathTracePad({
          canvas,
          lineWidth: 12,
          threshold: 20,
          completionSnap: 96,
          getPoints(){
            const groups = [];
            traceAnswerDigits.forEach((digits, index) => {
              groups.push(...window.GPTracing.createDigitTraceGroups(digits, traceAnswerBoxes[index], {
                gap: 0.08,
                insetX: 0.14,
                insetY: 0.08
              }));
            });
            return groups;
          },
          onProgress(pct){
            updateTraceProgress(pct, traceProgressStarted);
            traceProgressStarted = true;
          },
          onTick(){
            window.GPTracing.playTraceTick({ throttleMs: 82, frequency: 910, endFrequency: 660, volume: 0.06 });
          }
        });

        window.__gpSharedTraceReset = function(){
          traceProgressStarted = false;
          traceCelebrated = false;
          traceEncouraged = false;
          if (typeof reset === "function") reset();
          updateTraceProgress(0, false);
        };

        updateTraceProgress(0, false);
      }

      if (image.complete) initSharedTrace();
      else image.addEventListener("load", initSharedTrace, { once: true });
      window.addEventListener("load", initSharedTrace, { once: true });
    }

    function clearTrace(){
      if (typeof window.__gpSharedTraceReset === "function") {
        window.__gpSharedTraceReset();
      }
    }

    function runDesignerLines(){
      if (designerTimer) clearTimeout(designerTimer);
      hideAllLines();
      if (designerText) {
        designerText.textContent = "The designer is counting shapes.";
        designerText.classList.add("show");
      }
      chimeAudio.currentTime = 0;
      chimeAudio.play().catch(() => {});
      speakLine("The designer is counting shapes.", () => {
        designerTimer = setTimeout(() => {
          if (lines[0]) {
            const bubble = lines[0].querySelector(".bubble");
            if (bubble) bubble.textContent = "Look at the pentagons.";
            lines[0].hidden = false;
            lines[0].classList.add("show");
          }
          speakLine("Look at the pentagons.", () => {
            designerTimer = setTimeout(() => {
              if (lines[1]) {
                const bubble = lines[1].querySelector(".bubble");
                if (bubble) bubble.textContent = "Subtract the numbers.";
                lines[1].hidden = false;
                lines[1].classList.add("show");
              }
              speakLine("Subtract the numbers.");
            }, 500);
          });
        }, 500);
      });
    }

    function playLoadInstructionSequence(){
      if (loadIntroStarted) return;
      loadIntroStarted = true;

      hideAllLines();
      if (designerText) designerText.classList.remove("show");
      setConversationStatus("Listen carefully.");

      const steps = [
        () => {
          if (lines[0]) {
            lines[0].hidden = false;
            lines[0].classList.add("show");
          }
          setConversationStatus("Look at the Pentagons.");
          speakLine("Look at the Pentagons.", runNextStep, {
            role: "female",
            rate: 0.9,
            pitch: 1.08,
            volume: 1
          });
        },
        () => {
          if (lines[1]) {
            lines[1].hidden = false;
            lines[1].classList.add("show");
          }
          setConversationStatus("Subtract the numbers.");
          speakLine("Subtract the numbers.", null, {
            role: "girl",
            rate: 1.0,
            pitch: 1.36,
            volume: 1
          });
        }
      ];

      let stepIndex = 0;
      function runNextStep(){
        const step = steps[stepIndex++];
        if (step) window.setTimeout(step, 140);
      }

      const beginSpeech = () => window.setTimeout(runNextStep, 140);
      const fallbackTimer = window.setTimeout(beginSpeech, 5200);

      instructionAudio.onended = () => {
        window.clearTimeout(fallbackTimer);
        beginSpeech();
      };
      instructionAudio.onerror = () => {
        window.clearTimeout(fallbackTimer);
        beginSpeech();
      };

      try {
        instructionAudio.currentTime = 0;
        const playAttempt = instructionAudio.play();
        if (playAttempt && typeof playAttempt.catch === "function") {
          playAttempt.catch(() => {
            window.clearTimeout(fallbackTimer);
            beginSpeech();
          });
        }
      } catch (_err) {
        window.clearTimeout(fallbackTimer);
        beginSpeech();
      }
    }

    if (micIconBtn) {
      // Mic click is handled by the shared LA2/LB3 unified protocol.
    }

    if (traceClearBtn) traceClearBtn.addEventListener("click", clearTrace);
    setupTrace(traceCanvas, designImage);

    if (girlBtn) {
      girlBtn.addEventListener("click", runDesignerLines);
    }

    nextBtn.addEventListener("click", () => {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      window.location.href = "../thursday/PentagonFairlyTale.html";
    });

    prevBtn.addEventListener("click", () => {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      window.location.href = "LB3.html";
    });

    hideAllLines();
    window.addEventListener("load", playLoadInstructionSequence, { once:true });
  </script>

  <script>
    (function(){
      const homeBtn = document.querySelector('.home-btn');
      if(!homeBtn) return;

      const chime = new Audio("../../../../assets/audio/chimes/chime.mp3.mp3");
      chime.preload = "auto";

      homeBtn.addEventListener('click', () => {
        try{
          chime.currentTime = 0;
          const p = chime.play();
          if (p && typeof p.catch === "function") p.catch(() => {});
        }catch(e){}
      });
    })();
  </script>

  

  <script type="module">
    import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
    window.GPProgress.installTracker({
      saveActivityResult,
      markLoginPing,
      defaultPageId: "LB7",
      defaultLevel: "B",
      defaultActivityType: "lesson",
      defaultScore: 100,
      defaultStars: 1,
      defaultSkills: {
        reading: 1,
        writing: 0,
        speaking: 1,
        listening: 1
      }
    });

    function getStudentSession(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
      }catch(e){
        return null;
      }
    }

    function inferProgressMeta(payload){
      const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
      const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
      const level = (payload && payload.level)
        || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
      const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
      const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
      const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
      const month = payload && payload.month != null ? Number(payload.month) : 1;
      return {
        pageId,
        file,
        level,
        week: Number.isFinite(week) && week > 0 ? week : 1,
        month: Number.isFinite(month) && month > 0 ? month : 1
      };
    }

    function getActivityStore(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      }catch(e){
        return {};
      }
    }

    function setActivityStore(store){
      try{
        localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
      }catch(e){}
    }

    function saveLocalActivityFallback(payload){
      const session = getStudentSession() || {};
      const meta = inferProgressMeta(payload || {});
      const score = payload && typeof payload.score === "number" ? payload.score : 0;
      const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
      const tracing = payload && typeof payload.tracing === "number"
        ? payload.tracing
        : (payload && typeof payload.progress === "number" ? payload.progress : 0);
      const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
      const entry = {
        pageId: meta.pageId,
        file: meta.file,
        level: meta.level,
        type,
        activityType: (payload && payload.activityType) || type,
        score,
        stars,
        skills: payload && payload.skills ? payload.skills : {},
        completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
        tracing,
        week: meta.week,
        month: meta.month,
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
        savedAt: new Date().toISOString(),
        ts: Date.now()
      };
      const store = getActivityStore();
      store[meta.pageId] = {
        ...(store[meta.pageId] || {}),
        ...entry
      };
      setActivityStore(store);
      try{
        localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
      }catch(e){}
      return store[meta.pageId];
    }

    async function finishAndSave(payload){
      const session = getStudentSession() || {};
      const fullPayload = {
        ...(payload || {}),
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
      };

      saveLocalActivityFallback(fullPayload);

      if (typeof window.finishActivity === "function") {
        try{
          await window.finishActivity(fullPayload);
        }catch(err){
          console.warn("finishActivity failed, local fallback already saved:", err);
        }
      }

      return fullPayload;
    }

    window.finishAndSave = finishAndSave;
  </script>

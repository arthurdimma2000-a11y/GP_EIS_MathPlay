<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PentagonArtClass</title>
  <style>
    :root{
      --bg1:#fff6da; --bg2:#ffe18a; --bg3:#ffc84d;
      --text:#5b3200; --accent:#ff8a00; --accent2:#ffb300;
      --dark:#2f2f2f; --shadow:0 14px 34px rgba(0,0,0,.20); --radius:26px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;width:100%;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top left,#fff8ea 0%,transparent 35%),radial-gradient(circle at bottom right,#ffd76a 0%,transparent 30%),linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));color:var(--text)}
    body{padding:20px;display:flex;justify-content:center;align-items:flex-start}
    .page{width:100%;max-width:1180px;position:relative}
    .floating-shape{position:absolute;width:80px;height:80px;background:rgba(255,255,255,.28);clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);animation:floaty 5s ease-in-out infinite;pointer-events:none}
    .shape1{top:10px;left:10px}.shape2{top:50px;right:30px;width:60px;height:60px;animation-delay:.8s}.shape3{bottom:40px;left:40px;width:55px;height:55px;animation-delay:1.4s}
    @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .header{text-align:center;margin-bottom:18px;background:rgba(255,255,255,.58);backdrop-filter:blur(6px);border-radius:24px;padding:18px 14px;box-shadow:var(--shadow);border:2px solid rgba(255,255,255,.55)}
    .header h1{font-size:clamp(1.7rem,3vw,2.6rem);color:#8c4300;margin-bottom:8px;font-weight:900}
    .header p{font-size:clamp(.95rem,1.8vw,1.08rem);font-weight:700;color:#7a4900}
    .video-card{position:relative;border-radius:var(--radius);overflow:hidden;background:#000;box-shadow:var(--shadow);border:4px solid rgba(255,255,255,.65)}
    video{width:100%;height:auto;display:block;background:#000}
    .top-bar,.bottom-bar{position:absolute;left:0;width:100%;z-index:5;display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;padding:12px;pointer-events:none}
    .top-bar{top:0;background:linear-gradient(to bottom,rgba(0,0,0,.70),rgba(0,0,0,0))}
    .bottom-bar{bottom:0;background:linear-gradient(to top,rgba(0,0,0,.76),rgba(0,0,0,0))}
    .nav-btn{pointer-events:auto;border:none;cursor:pointer;border-radius:999px;padding:12px 18px;min-width:104px;font-size:.95rem;font-weight:800;color:#fff;background:linear-gradient(180deg,var(--accent2),var(--accent));box-shadow:0 8px 18px rgba(0,0,0,.28);transition:transform .18s ease}
    .nav-btn:hover{transform:translateY(-2px) scale(1.03)}
    .nav-btn.dark{background:linear-gradient(180deg,#515151,#2b2b2b)}
    .nav-btn.green{background:linear-gradient(180deg,#2ecc71,#16924d)}
    .nav-btn.red{background:linear-gradient(180deg,#ff7b61,#e74c3c)}
    .lesson-note{margin-top:16px;background:rgba(255,255,255,.7);border-radius:22px;padding:14px 16px;box-shadow:var(--shadow);text-align:center;font-weight:700;color:#7a4900;line-height:1.55}
    #pageContent{opacity:0;visibility:hidden;transition:opacity .28s ease}
    body.intro-complete #pageContent{opacity:1;visibility:visible}
    #lbIntroVideoOverlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.82);z-index:9999}
    #lbIntroVideoOverlay[hidden]{display:none!important}
    .intro-panel{width:min(920px,100%);background:rgba(15,15,15,.96);border-radius:24px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.45);border:2px solid rgba(255,255,255,.14)}
    .intro-title{color:#fff4d6;font-size:clamp(1.1rem,2.4vw,1.5rem);font-weight:900;text-align:center;margin-bottom:12px}
    #lbIntroVideo{width:100%;max-height:72vh;border-radius:18px;object-fit:contain;background:#000}
    .intro-actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:14px}
    .intro-btn{border:none;cursor:pointer;border-radius:999px;padding:12px 18px;min-width:140px;font-size:.96rem;font-weight:800;color:#fff;box-shadow:0 8px 18px rgba(0,0,0,.28)}
    .intro-btn.sound{background:linear-gradient(180deg,#38bdf8,#0284c7)}
    .intro-btn.skip{background:linear-gradient(180deg,#fb923c,#ea580c)}
    .intro-help{margin-top:10px;text-align:center;color:#fef3c7;font-size:.9rem;font-weight:700}
  </style>
</head>
<body>
  <div id="lbIntroVideoOverlay">
    <div class="intro-panel">
      <div class="intro-title">Pentagon Art Class Intro</div>
      <video id="lbIntroVideo" playsinline autoplay muted preload="metadata">
        <source src="https://res.cloudinary.com/dtknykrkf/video/upload/v1777791982/Newbartclass_x85ya1.mp4" type="video/mp4">
      </video>
      <div class="intro-actions">
        <button type="button" class="intro-btn sound" id="turnOnSoundBtn">Turn On Sound</button>
        <button type="button" class="intro-btn skip" id="skipIntroBtn">Skip Intro</button>
      </div>
      <div class="intro-help">Skip Intro will go straight to LB2.html.</div>
    </div>
  </div>

  <div id="pageContent">
    <div class="page">
      <div class="floating-shape shape1"></div><div class="floating-shape shape2"></div><div class="floating-shape shape3"></div>
      <div class="header">
        <h1>🎨 Pentagon Art Class</h1>
        <p>index.html ← PentagonArtClass.html → LB2.html</p>
      </div>

      <div class="video-card">
        <div class="top-bar">
          <button class="nav-btn" onclick="goHome()">🏠 Home</button>
          <button class="nav-btn dark" onclick="goBackPage()">⬅ Back</button>
          <button class="nav-btn" onclick="replayVideo()">🔁 Replay</button>
        </div>

        <video id="lessonVideo" controls playsinline preload="metadata">
          <source src="https://res.cloudinary.com/dtknykrkf/video/upload/v1777791982/Newbartclass_x85ya1.mp4" type="video/mp4">
        </video>

        <div class="bottom-bar">
          <button class="nav-btn green" onclick="togglePlayPause()">▶ / ⏸ Play</button>
          <button class="nav-btn red" onclick="toggleFullscreen()">⛶ Fullscreen</button>
          <button class="nav-btn dark" onclick="goNextPage()">Next ➜</button>
        </div>
      </div>

      <div class="lesson-note">Back goes to index.html. Next goes to LB2.html. Skip Intro jumps immediately to LB2.html.</div>
    </div>
  </div>

  <script>
    const HOME_PAGE = "../../../../index.html";
    const PREVIOUS_PAGE = "../../../../index.html";
    const NEXT_PAGE = "../tuesday/LB2.html";

    const video = document.getElementById("lessonVideo");
    const introOverlay = document.getElementById("lbIntroVideoOverlay");
    const introVideo = document.getElementById("lbIntroVideo");
    const turnOnSoundBtn = document.getElementById("turnOnSoundBtn");
    const skipIntroBtn = document.getElementById("skipIntroBtn");
    let introFinished = false;
    video.muted = true;
    video.volume = 0;
    const LESSON_VIDEO_URL = "https://res.cloudinary.com/dtknykrkf/video/upload/v1777791982/Newbartclass_x85ya1.mp4";

    function clearVideoSource(videoEl){ if(!videoEl) return; const source = videoEl.querySelector("source"); if(source) source.src = ""; videoEl.removeAttribute("src"); videoEl.load(); }
    function ensureLessonVideoLoaded(){ if(!video) return; const source = video.querySelector("source"); const activeSrc = source && source.src ? source.src : (video.currentSrc || ""); if(!activeSrc || !activeSrc.includes(LESSON_VIDEO_URL)){ if(source){ source.src = LESSON_VIDEO_URL; video.load(); } else { video.src = LESSON_VIDEO_URL; } } }
    clearVideoSource(video);

    function pauseVideo(el){
      if(el){
        try{ el.pause(); }catch(e){}
      }
    }

    function revealPageContent(){
      if(introFinished) return;
      introFinished = true;
      document.body.classList.add("intro-complete");
      introOverlay.hidden = true;
      pauseVideo(introVideo);
    }

    function restoreLessonAudio(){
      video.muted = false;
      video.volume = 1;
    }

    function goHome(){
      pauseVideo(video);
      pauseVideo(introVideo);
      window.location.href = HOME_PAGE;
    }

    function goBackPage(){
      pauseVideo(video);
      pauseVideo(introVideo);
      window.location.href = PREVIOUS_PAGE;
    }

    function goNextPage(){
      pauseVideo(video);
      pauseVideo(introVideo);
      window.location.href = NEXT_PAGE;
    }

    function skipIntroAndGoNext(){
      pauseVideo(introVideo);
      pauseVideo(video);
      window.location.href = NEXT_PAGE;
    }

    function replayVideo(){
      video.currentTime = 0;
      video.play().catch(()=>{});
    }

    function togglePlayPause(){
      if(video.paused){
        video.play().catch(()=>{});
      } else {
        video.pause();
      }
    }

    function toggleFullscreen(){
      const card = document.querySelector(".video-card");
      if(!document.fullscreenElement){
        if(card.requestFullscreen) card.requestFullscreen();
      } else {
        if(document.exitFullscreen) document.exitFullscreen();
      }
    }

    function enableIntroSound(){
      introVideo.muted = false;
      introVideo.volume = 1;
      introVideo.play().catch(()=>{});
      turnOnSoundBtn.textContent = "Sound On";
      turnOnSoundBtn.disabled = true;
    }

    const originalRevealPageContent = revealPageContent;
    revealPageContent = function(){ if(introFinished) return; originalRevealPageContent(); if(introVideo){ try{ introVideo.muted = true; introVideo.volume = 0; introVideo.currentTime = 0; clearVideoSource(introVideo); }catch(e){} } ensureLessonVideoLoaded(); video.muted = false; video.volume = 1; };
    const originalRestoreLessonAudio = restoreLessonAudio;
    restoreLessonAudio = function(){ ensureLessonVideoLoaded(); originalRestoreLessonAudio(); };
    const originalReplayVideo = replayVideo;
    replayVideo = function(){ ensureLessonVideoLoaded(); originalReplayVideo(); };
    const originalTogglePlayPause = togglePlayPause;
    togglePlayPause = function(){ ensureLessonVideoLoaded(); originalTogglePlayPause(); };

    introVideo.addEventListener("ended", () => {
      revealPageContent();
      restoreLessonAudio();
    });

    introVideo.addEventListener("error", () => {
      revealPageContent();
      restoreLessonAudio();
    });

    introVideo.play().catch(()=>{});
    turnOnSoundBtn.addEventListener("click", enableIntroSound);
    skipIntroBtn.addEventListener("click", skipIntroAndGoNext);

    document.addEventListener("keydown", (e) => {
      if(e.key === "ArrowLeft") goBackPage();
      else if(e.key === "ArrowRight") goNextPage();
      else if(e.key.toLowerCase() === "h") goHome();
      else if(e.key.toLowerCase() === "r") replayVideo();
      else if(e.key.toLowerCase() === "f") toggleFullscreen();
      else if(e.key === " "){
        e.preventDefault();
        togglePlayPause();
      }
    });

    setTimeout(() => {
      if(!introFinished && introVideo.readyState < 1) {
        revealPageContent();
        restoreLessonAudio();
      }
    }, 4000);
  </script>
</body>
</html>

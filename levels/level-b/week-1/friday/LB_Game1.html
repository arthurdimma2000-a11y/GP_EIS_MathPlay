<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Level B • Quiz 1 — Polygon Names</title>
<style>
  :root{
    --bg1:#fff4b8;
    --bg2:#c7f7ff;
    --bg3:#ffd1f3;
    --ink:#1f2430;
    --card:#ffffff;
    --good:#dcfce7;
    --oops:#fff1f2;
    --purple:#9b5de5;
    --blue:#00bbf9;
    --pink:#f15bb5;
    --yellow:#ffd166;
    --orange:#ff9f1c;
    font-family:"Comic Sans MS","Baloo 2","Segoe UI",system-ui,-apple-system,Arial;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
    padding:18px;
  }

  .app{width:min(1020px,98vw)}

  .top{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:12px;
  }

  .badge{
    background:#fff;
    border-radius:999px;
    padding:10px 14px;
    box-shadow:0 12px 28px rgba(0,0,0,.10);
    font-weight:1000;
    display:flex;
    gap:10px;
    align-items:center;
  }

  .btn{
    border:0;
    cursor:pointer;
    font-weight:1000;
    border-radius:16px;
    padding:12px 16px;
    background:#fff;
    color:var(--ink);
    box-shadow:0 10px 22px rgba(0,0,0,.12);
    text-decoration:none;
    display:inline-flex;
    gap:8px;
    align-items:center;
    transition:transform .12s ease, opacity .12s ease;
  }

  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(1px)}

  .btn.primary{background:linear-gradient(180deg,#63e6be,#22c55e);color:#0b1b10}
  .btn.next{background:linear-gradient(180deg,#74c0fc,#4dabf7);color:#06121d}
  .btn.speak{background:linear-gradient(180deg,#ffe08a,#ffb703);color:#3d2a00}
  .btn.auto{background:linear-gradient(180deg,#ffd6a5,#ff9f1c);color:#442200}

  .card{
    background:var(--card);
    border-radius:24px;
    padding:16px;
    box-shadow:0 16px 44px rgba(0,0,0,.12);
    position:relative;
    overflow:hidden;
  }

  .title{
    font-size:32px;
    font-weight:1000;
    margin:6px 0 4px;
    text-align:center;
  }

  .subtitle{
    margin:0 0 12px;
    opacity:.9;
    text-align:center;
    font-size:18px;
  }

  .progressWrap{
    width:min(520px,96%);
    margin:0 auto 8px;
  }

  .progress{
    width:100%;
    height:18px;
    background:#eef7ff;
    border-radius:999px;
    overflow:hidden;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.06);
  }

  .bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#63e6be,#4dabf7,#f15bb5);
    transition:width .35s ease;
  }

  .stars{
    text-align:center;
    font-size:28px;
    font-weight:1000;
    margin:8px 0 10px;
  }

  .bubble{
    margin:0 auto 12px;
    width:min(560px,96%);
    background:#fff;
    border-radius:24px;
    padding:12px 16px;
    box-shadow:0 10px 24px rgba(0,0,0,.10);
    text-align:center;
    font-weight:1000;
    font-size:22px;
    position:relative;
    z-index:2;
  }

  .bubble::after{
    content:"";
    position:absolute;
    left:36px;
    bottom:-14px;
    width:24px;
    height:24px;
    background:#fff;
    transform:rotate(45deg);
    border-radius:4px;
  }

  .helperWrap{
    display:flex;
    justify-content:flex-start;
    align-items:flex-end;
    gap:14px;
    margin-bottom:8px;
  }

  .helper{
    width:92px;
    min-width:92px;
    height:120px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    animation:bob 1.8s ease-in-out infinite;
    position:relative;
    z-index:2;
  }

  @keyframes bob{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-6px)}
  }

  .pointer{
    position:absolute;
    right:-6px;
    top:18px;
    font-size:24px;
    animation:point 1.1s ease-in-out infinite;
  }

  @keyframes point{
    0%,100%{transform:translateX(0)}
    50%{transform:translateX(8px)}
  }

  .q{
    border-radius:22px;
    padding:14px;
    background:linear-gradient(180deg,#fff,#f7fbff);
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.06);
    margin-top:10px;
  }

  .questionLabel{
    text-align:center;
    font-size:24px;
    font-weight:1000;
    margin-bottom:8px;
  }

  .shapeBox{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:250px;
  }

  .row{
    display:flex;
    gap:12px;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
  }

  .opt{
    border:0;
    cursor:pointer;
    font-weight:1000;
    border-radius:22px;
    padding:16px 20px;
    min-width:170px;
    font-size:24px;
    color:#1f2430;
    box-shadow:0 10px 22px rgba(0,0,0,.12);
    transition:transform .12s ease, opacity .12s ease;
  }

  .opt:hover:not(:disabled){transform:translateY(-2px)}
  .opt:active:not(:disabled){transform:translateY(1px)}
  .opt:disabled{opacity:.62;cursor:not-allowed}

  .opt.p1{background:linear-gradient(180deg,#efe3ff,#ffffff)}
  .opt.p2{background:linear-gradient(180deg,#dff4ff,#ffffff)}
  .opt.p3{background:linear-gradient(180deg,#ffe0f3,#ffffff)}

  .msg{
    margin-top:14px;
    border-radius:18px;
    padding:12px 14px;
    background:#fff;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.06);
    font-weight:1000;
    font-size:21px;
    text-align:center;
    min-height:58px;
  }

  .msg.good{background:var(--good)}
  .msg.oops{background:var(--oops)}

  .hint{
    text-align:center;
    opacity:.85;
    margin-top:10px;
    font-size:16px;
  }

  .controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:12px;
  }

  .tiny{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin-top:10px;
    font-weight:1000;
    font-size:16px;
    flex-wrap:wrap;
  }

  .toggle{
    transform:scale(1.25);
    cursor:pointer;
  }

  @media (max-width: 640px){
    .title{font-size:26px}
    .opt{min-width:140px;font-size:20px;padding:14px 16px}
    .bubble{font-size:19px}
    .helper{width:76px;min-width:76px;height:105px}
  }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="badge">🟣 <span style="font-size:18px">Level B</span> <span style="opacity:.8">Quiz 1 • Names</span></div>
    <div style="display:flex; gap:10px; flex-wrap:wrap">
      <a class="btn" href="LB_Game1.html">⬅ Back</a>
      <a class="btn next" href="../../../../index.html">Home ▶</a>
    </div>
  </div>

  <div class="card">
    <div class="title">What is this shape?</div>
    <p class="subtitle">Look, listen, and tap the correct name.</p>

    <div class="progressWrap">
      <div class="progress"><div class="bar" id="bar"></div></div>
    </div>

    <div class="stars" id="stars">⭐ 0</div>

    <div class="helperWrap">
      <div class="helper" aria-hidden="true">
        <svg viewBox="0 0 120 160" width="100%" height="100%">
          <circle cx="60" cy="28" r="18" fill="#ffd6a5"/>
          <path d="M42 24 Q60 5 78 24" fill="#5b3a29"/>
          <circle cx="53" cy="28" r="2.5" fill="#222"/>
          <circle cx="67" cy="28" r="2.5" fill="#222"/>
          <path d="M54 36 Q60 41 66 36" fill="none" stroke="#c96" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="40" y="48" width="40" height="48" rx="12" fill="#ff6fb5"/>
          <rect x="30" y="54" width="14" height="40" rx="7" fill="#ffd6a5"/>
          <rect x="76" y="54" width="14" height="40" rx="7" fill="#ffd6a5"/>
          <rect x="46" y="96" width="10" height="34" rx="5" fill="#5dade2"/>
          <rect x="64" y="96" width="10" height="34" rx="5" fill="#5dade2"/>
          <rect x="43" y="128" width="14" height="8" rx="3" fill="#7f5539"/>
          <rect x="63" y="128" width="14" height="8" rx="3" fill="#7f5539"/>
        </svg>
        <div class="pointer">👉</div>
      </div>
      <div class="bubble" id="bubbleText">Press Start Quiz to begin.</div>
    </div>

    <div class="q">
      <div class="questionLabel">Tap the correct answer 👇</div>

      <div class="shapeBox" id="shapeBox"></div>

      <div class="row">
        <button class="opt p1" data-name="Pentagon">Pentagon</button>
        <button class="opt p2" data-name="Hexagon">Hexagon</button>
        <button class="opt p3" data-name="Octagon">Octagon</button>
      </div>

      <div class="hint">Need help? Tap the yellow button to hear the question again.</div>
    </div>

    <div class="controls">
      <button class="btn primary" id="startBtn">🎉 Start Quiz</button>
      <button class="btn speak" id="repeatBtn">🔊 Repeat Question</button>
      <button class="btn auto" id="nextPageBtn">➡ Auto Next: OFF</button>
      <button class="btn" id="finishBtn">🏁 Finish</button>
    </div>

    <div class="tiny">
      <label>
        <input type="checkbox" class="toggle" id="autoNextCheck">
        Go to the next lesson page automatically after quiz
      </label>
    </div>

    <div class="msg" id="msg">Let’s learn shape names ⭐</div>
  </div>
</div>

<script>
/* -------------------- CONFIG -------------------- */
const NEXT_PAGE = "../../../../index.html";

/* -------------------- SFX -------------------- */
let audioCtx = null;

function ctx(){
  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep(freq, dur, gain = 0.05, type = "triangle"){
  try{
    const c = ctx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = gain;
    o.connect(g);
    g.connect(c.destination);
    o.start();
    o.stop(c.currentTime + dur);
  }catch(e){}
}

function chime(){
  beep(880,.08,.05);
  setTimeout(()=>beep(1175,.10,.05),90);
  setTimeout(()=>beep(1568,.12,.05),200);
}

function cheer(){
  beep(523,.09,.05,"sine");
  setTimeout(()=>beep(659,.09,.05,"sine"),80);
  setTimeout(()=>beep(784,.11,.05,"sine"),160);
  setTimeout(()=>beep(988,.14,.05,"sine"),260);
}

function clapSound(){
  try{
    beep(300,.03,.06,"square");
    setTimeout(()=>beep(220,.03,.06,"square"),45);
    setTimeout(()=>beep(340,.03,.05,"square"),90);
    setTimeout(()=>beep(250,.03,.05,"square"),135);
  }catch(e){}
}

/* -------------------- Speech -------------------- */
function getFemaleVoice(){
  const voices = window.speechSynthesis?.getVoices?.() || [];
  return voices.find(v =>
    /^en(-|_)?(us|gb|au|ca)/i.test(v.lang || "") &&
    /aria|jenny|samantha|ava|zira|female|woman|girl/i.test(v.name || "")
  ) || voices.find(v =>
    /aria|jenny|samantha|ava|zira|female|woman|girl/i.test(v.name || "")
  ) || null;
}

function speakText(text, rate = 0.98, pitch = 1.5){
  return new Promise(resolve => {
    if(!("speechSynthesis" in window)){
      resolve();
      return;
    }
    try{ window.speechSynthesis.cancel(); }catch(e){}
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = rate;
    u.pitch = pitch;
    u.volume = 1;
    const female = getFemaleVoice();
    if(female) u.voice = female;
    u.onend = resolve;
    u.onerror = resolve;
    window.speechSynthesis.speak(u);
  });
}

async function speakQuestion(){
  const lines = [
    "Look carefully.",
    "What is this shape?",
    "Tap the correct answer.",
    "Your choices are Pentagon, Hexagon, and Octagon."
  ];
  for(const line of lines){
    await speakText(line, 0.96, 1.52);
  }
}

async function speakResult(ok, answer){
  if(ok){
    await speakText("Great job. That is correct.", 1.02, 1.56);
  }else{
    await speakText(`Nice try. The correct answer is ${answer}.`, 0.98, 1.46);
  }
}

/* -------------------- Elements -------------------- */
const shapeBox = document.getElementById("shapeBox");
const msg = document.getElementById("msg");
const bar = document.getElementById("bar");
const starsEl = document.getElementById("stars");
const bubbleText = document.getElementById("bubbleText");
const startBtn = document.getElementById("startBtn");
const repeatBtn = document.getElementById("repeatBtn");
const finishBtn = document.getElementById("finishBtn");
const autoNextCheck = document.getElementById("autoNextCheck");
const nextPageBtn = document.getElementById("nextPageBtn");
const options = [...document.querySelectorAll(".opt")];

/* -------------------- Quiz Data -------------------- */
const deck = [
  {
    name:"Pentagon",
    color:"#9b5de5",
    svg:`<path d="M60 18 L98 44 L84 92 L36 92 L22 44 Z"/>`
  },
  {
    name:"Hexagon",
    color:"#00bbf9",
    svg:`<path d="M60 18 L95 38 L95 82 L60 102 L25 82 L25 38 Z"/>`
  },
  {
    name:"Octagon",
    color:"#f15bb5",
    svg:`<path d="M44 18 L76 18 L98 40 L98 80 L76 102 L44 102 L22 80 L22 40 Z"/>`
  }
];

let total = 6;
let currentIndex = -1;
let currentShape = null;
let correct = 0;
let started = false;
let locked = true;
let questions = [];

/* -------------------- Progress fallback -------------------- */
(function(){
  const STORE_KEY = "gpeis_progress_v1";

  function load(){
    try{return JSON.parse(localStorage.getItem(STORE_KEY) || "{}");}
    catch(e){return {};}
  }

  function save(db){
    localStorage.setItem(STORE_KEY, JSON.stringify(db));
  }

  window.__LegacyTrack__ = {
    complete({level, activityId, score = 0, stars = 0}){
      const db = load();
      db[level] = db[level] || {level, activities:{}, updatedAt:new Date().toISOString()};
      const acts = db[level].activities;
      acts[activityId] = acts[activityId] || {attempts:0, bestScore:0, bestStars:0};
      const a = acts[activityId];
      a.attempts++;
      a.lastScore = score;
      a.lastStars = stars;
      a.completed = true;
      a.lastAt = new Date().toISOString();
      a.bestScore = Math.max(a.bestScore || 0, score);
      a.bestStars = Math.max(a.bestStars || 0, stars);
      db[level].updatedAt = new Date().toISOString();
      save(db);
      return a;
    }
  };
})();

/* -------------------- Helpers -------------------- */
function makeQuestions(){
  const arr = [];
  for(let i = 0; i < total; i++){
    arr.push(deck[Math.floor(Math.random() * deck.length)]);
  }
  return arr;
}

function setMessage(text, type = ""){
  msg.className = "msg" + (type ? " " + type : "");
  msg.textContent = text;
}

function setBubble(text){
  bubbleText.textContent = text;
}

function setOptionsEnabled(enabled){
  options.forEach(btn => btn.disabled = !enabled);
}

function render(item){
  shapeBox.innerHTML = `
    <div style="width:250px;height:250px;border-radius:34px;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(180deg, ${item.color}, #ffffff);
      box-shadow:0 18px 38px rgba(0,0,0,.14);">
      <svg viewBox="0 0 120 120" width="180" height="180" fill="white" opacity="0.96">
        ${item.svg}
      </svg>
    </div>
  `;
}

function updateProgress(){
  const done = Math.max(0, currentIndex);
  const pct = Math.round((done / total) * 100);
  bar.style.width = pct + "%";
  starsEl.textContent = "⭐ " + correct;
}

function updateAutoNextLabel(){
  nextPageBtn.textContent = autoNextCheck.checked ? "➡ Auto Next: ON" : "➡ Auto Next: OFF";
}

/* -------------------- Quiz Flow -------------------- */
async function askQuestion(){
  if(!currentShape) return;

  locked = true;
  setOptionsEnabled(false);
  render(currentShape);
  setBubble("Listen carefully 👂");
  setMessage(`Question ${currentIndex + 1} of ${total}.`);
  chime();

  await speakQuestion();

  locked = false;
  setOptionsEnabled(true);
  setBubble("What is this shape?");
  setMessage("Tap the correct answer.");
}

async function nextQuestion(){
  currentIndex++;
  updateProgress();

  if(currentIndex >= total){
    finishQuiz();
    return;
  }

  currentShape = questions[currentIndex];
  await askQuestion();
}

async function handleAnswer(choice){
  if(locked || !currentShape) return;

  locked = true;
  setOptionsEnabled(false);

  const isCorrect = choice === currentShape.name;

  if(isCorrect){
    correct++;
    starsEl.textContent = "⭐ " + correct;
    setBubble("Yay! You got it!");
    setMessage("✅ Correct! Great job!", "good");
    cheer();
    clapSound();
  } else {
    setBubble(`It is ${currentShape.name}.`);
    setMessage(`❌ Nice try! It is ${currentShape.name}.`, "oops");
    chime();
  }

  await speakResult(isCorrect, currentShape.name);

  setTimeout(() => {
    nextQuestion();
  }, 700);
}

function goToNextPageSoon(){
  if(!autoNextCheck.checked) return;
  setTimeout(() => {
    window.location.href = NEXT_PAGE;
  }, 2800);
}

function finishQuiz(){
  const scorePct = Math.round((correct / total) * 100);
  const stars = scorePct >= 90 ? 3 : scorePct >= 70 ? 2 : scorePct >= 50 ? 1 : 0;

  locked = true;
  setOptionsEnabled(false);
  bar.style.width = "100%";
  setBubble("Amazing work! 🎉");
  setMessage(`🎉 Quiz Finished! You got ${correct} out of ${total}. Score: ${scorePct}%.`, "good");
  cheer();
  clapSound();
  speakText("Amazing. You finished the quiz. Well done.", 1.02, 1.56);

  if (window.GPTrack && typeof window.GPTrack.finish === "function") {
    window.GPTrack.finish({
      pageId: "LB_Quiz1",
      level: "B",
      activityType: "quiz",
      score: scorePct,
      stars,
      skills: { reading: 1, writing: 0, speaking: 0, listening: 1 }
    }).catch(() => {});
  } else if (window.__LegacyTrack__) {
    window.__LegacyTrack__.complete({
      level: "B",
      activityId: "LB_Quiz1",
      score: scorePct,
      stars
    });
  }

  goToNextPageSoon();
}

async function startQuiz(){
  started = true;
  correct = 0;
  currentIndex = -1;
  currentShape = null;
  questions = makeQuestions();

  bar.style.width = "0%";
  starsEl.textContent = "⭐ 0";
  setBubble("Welcome, little learner!");
  setMessage("Let’s start the quiz ⭐");
  startBtn.textContent = "🔄 Restart Quiz";

  await speakText("Welcome. Let us start the shape quiz.", 0.96, 1.52);
  nextQuestion();
}

/* -------------------- Events -------------------- */
startBtn.addEventListener("click", startQuiz);

repeatBtn.addEventListener("click", async () => {
  if(!started || !currentShape) return;
  await askQuestion();
});

finishBtn.addEventListener("click", finishQuiz);

options.forEach(btn => {
  btn.addEventListener("click", () => handleAnswer(btn.dataset.name));
});

autoNextCheck.addEventListener("change", updateAutoNextLabel);
nextPageBtn.addEventListener("click", () => {
  autoNextCheck.checked = !autoNextCheck.checked;
  updateAutoNextLabel();
});

window.speechSynthesis?.getVoices?.();
window.speechSynthesis?.addEventListener?.("voiceschanged", () => {
  window.speechSynthesis.getVoices();
});

updateAutoNextLabel();
setOptionsEnabled(false);
</script>

<script src="./levelbc-runtime-fix.js"></script>
<script src="../../../../shared/js/activity-standardizer-shared.js"></script>
<script type="module" src="./progress-tracker.js"></script>
<script>
  window.addEventListener("load", () => {
    if (!window.GPTrack) return;
    const pageFile = ((location.pathname || "").split("/").pop() || "").replace(/\.html$/i, "");
    GPTrack.start(pageFile || document.title || "Activity");
  });
</script>
</body>
</html>

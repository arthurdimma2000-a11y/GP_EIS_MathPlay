  <style>
    :root{
      --ink:#2d2d2d;
      --bg:#e4f6df;
      --card:#f9f4ff;
      --border:#d9b9f0;
      --accent:#6c4bbf;

      --shadow:0 10px 24px rgba(0,0,0,.08);

    }
    body{
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg);
      padding:16px;
      color:var(--ink);
    }
    .app{
      width:min(940px,96vw);
      border-radius:16px;
      padding:12px 12px 8px;
    }
    .home-btn{
      right:8%;
      top:8px;
      z-index:5;
    }
    .board{
      border:2px dashed var(--border);
      border-radius:16px;
      padding:12px;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,185,210,.35) 0 52px, transparent 54px),
        radial-gradient(circle at 82% 22%, rgba(210,240,255,.4) 0 58px, transparent 60px),
        radial-gradient(circle at 30% 80%, rgba(255,225,150,.35) 0 56px, transparent 58px),
        radial-gradient(circle at 72% 78%, rgba(190,255,210,.35) 0 54px, transparent 56px),
        linear-gradient(180deg,#fff7fb 0%, #f6f7ff 50%, #fff5e8 100%);
      min-height:360px;
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }
    .tray-hero{
      display:flex;
      justify-content:center;
      margin:6px 0 8px;
      width:100%;
    }
    .trace-wrap{
      position:relative;
      display:inline-block;
      width:min(676px,92%);
    }
    .tray-hero img{
      width:100%;
      height:auto;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
      cursor:pointer;
    }
    .trace-wrap img{
      position:relative;
      z-index:1;
    }
    .trace-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      touch-action:none;
      cursor:crosshair;
      z-index:2;
    }
    .designer-text{
      position:absolute;
      right:38%;
      top:8%;
      transform:none;
      font-size:2.2rem;
      font-weight:800;
      font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
      color:#2d2d2d;
      text-align:left;
      opacity:0;
      transition:opacity .25s ease, transform .25s ease;
      z-index:3;
      white-space:nowrap;
      pointer-events:none;
    }
    .designer-sub{
      position:absolute;
      right:32%;
      top:16%;
      transform:none;
      font-size:2rem;
      font-weight:800;
      font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
      color:#2d2d2d;
      text-align:left;
      opacity:0;
      transition:opacity .25s ease, transform .25s ease;
      z-index:3;
      white-space:nowrap;
      pointer-events:none;
    }
    .designer-sub.show{
      opacity:1;
    }
    .highlight-red{
      color:#d62828;
    }
    .highlight-blue{
      color:#1d5fd6;
    }
    .designer-text.show{
      opacity:1;
    }
    .row{
      display:flex;
      align-items:center;
      gap:10px;
      margin:10px 0;
      width:100%;
      justify-content:flex-start;
      z-index:2;
    }
    .convo-line{
      display:none !important;
      position:absolute;
      transform:translateY(-30%);
    }
    .convo-line.show{
      display:flex !important;
    }
    .line1{
      left:13%;
      top:16%;
    }
    .line2{
      right:38%;
      top:21%;
    }
    .row.right{
      justify-content:flex-end;
    }
    .avatar{
      width:56px;
      height:56px;
      border-radius:50%;
      background:#fff;
      border:3px solid #fff;
      box-shadow:0 4px 10px rgba(0,0,0,.1);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      color:#777;
      overflow:hidden;
    }
    .avatar img{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      display:block;
    }
    .name-tag{
      font-size:.75rem;
      font-weight:700;
      text-transform:uppercase;
      color:#666;
      margin-top:4px;
      text-align:center;
    }
    .bubble{
      padding:10px 14px;
      border-radius:16px;
      position:relative;
      font-size:1rem;
      max-width:min(560px,70vw);
      line-height:1.25;
    }
    .bubble-stack{
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:flex-start;
    }
    .row.right .bubble-stack{
      align-items:flex-end;
    }
    .repeat-result{
      margin-top:4px;
      font-size:.95rem;
      font-weight:700;
      color:#2f9f5f;
    }
    .star-row{
      display:flex;
      gap:6px;
      margin-top:4px;
      font-weight:900;
      font-size:1.2rem;
      color:#ffd24a;
      text-shadow:
        0 2px 0 #b87900,
        0 4px 0 #8a5a00,

    }
    .cookie-row{
      display:flex;
      justify-content:center;
      gap:18px;
      margin:12px 0;
    }
    .cookie-row.hidden{
      display:none;
    }
    .cookie-row img{
      width:min(220px,40vw);
      height:auto;
      display:block;
      filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
    }
    .bubble.kid{background:var(--bubble-kid);}
    .bubble.baker{background:var(--bubble-baker);}
    .bubble.sparkle{
      background: linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);
      box-shadow:0 0 12px rgba(255,214,0,.6), 0 0 18px rgba(255,105,180,.4);
      animation: sparklePulse 1.2s ease-in-out infinite;
    }
    @keyframes sparklePulse{
      0%,100%{filter:brightness(1);}
      50%{filter:brightness(1.12);}
    }
    .bubble.kid::after{
      content:"";
      position:absolute;
      right:-6px;
      top:14px;
      border-width:8px 0 8px 8px;
      border-style:solid;
      border-color:transparent transparent transparent var(--bubble-kid);
    }
    .bubble.baker::after{
      content:"";
      position:absolute;
      left:-6px;
      top:14px;
      border-width:8px 8px 8px 0;
      border-style:solid;
      border-color:transparent var(--bubble-baker) transparent transparent;
    }
    .controls{
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      z-index:3;
      background:rgba(255,255,255,.92);
      padding:4px 6px;
      border-radius:16px;
      box-shadow:0 8px 16px rgba(0,0,0,.18);
      width:fit-content;
      max-width:100%;
      justify-content:center;
      margin-top:2px;
    }
    .btn{
      border:none;
      border-radius:999px;
      padding:8px 12px;

      font-weight:700;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(0,0,0,.15);

    .btn.prev{background:var(--btn-orange);color:#fff;}
    .btn.next{background:var(--btn-orange);color:#fff;}

    .btn.read{background:var(--btn-orange);color:#fff;}
    .btn.mic{
      background:var(--btn-orange);
      color:#fff;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .record-icon{
      width:16px;
      height:16px;
      display:inline-block;
      vertical-align:middle;
    }
    .record-icon path{
      stroke:#fff;
    }
    .mic-icon-btn img{
        width:32px;
        height:32px;
        filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));

    .recording{

      flex-wrap:wrap;
    }
    .recording audio{

    .recording-status{

    }
    .conversation-status{
      font-size:.95rem;

      color:#6c4bbf;

    }
    .girl-spot{
      position:absolute;
      left:18px;
      top:8px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;

    .girl-spot img{
      width:72px;
      height:72px;
      border-radius:18px;
      object-fit:cover;
      box-shadow:0 6px 14px rgba(0,0,0,.25);
      border:4px solid #ffe3f7;
      background:#ffd6f2;
      cursor:pointer;

      font-size:1.35rem;
      font-weight:800;
      color:#1d5fd6;
      text-align:center;

    @media (max-width:780px){
      .row{gap:8px;}
      .avatar{width:48px;height:48px;}
      .bubble{font-size:.95rem;}

      </div>

      <div class="row right convo-line line2">
        <div class="bubble-stack">
          <div class="bubble kid">At the studio.</div>
          <div class="repeat-result" data-line="1"></div>
          <div class="star-row" data-line="1"></div>
        </div>
      </div>

      <div class="conversation-status" id="conversationStatus"></div>

      <div class="controls">
        <button class="btn prev" id="prevBtn">&#8592; Previous page</button>
        <button class="btn next" id="nextBtn">Next page &#8594;</button>
        <button class="btn stop" id="traceClearBtn" type="button">Clear trace</button>
        <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
          <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone">
        </button>

  <script>    const micIconBtn = document.getElementById("micIconBtn");
    const clearBtn = document.getElementById("clearBtn");
    const recordBtn = document.getElementById("recordBtn");
    const traceClearBtn = document.getElementById("traceClearBtn");
    const recordingPlayback = document.getElementById("recordingPlayback");
    const conversationStatus = document.getElementById("conversationStatus");
    const designImage = document.getElementById("designImage");
    const traceCanvas = document.getElementById("traceCanvas");
    const designerText = document.getElementById("designerText");
    const designerSub = document.getElementById("designerSub");
    const girlBtn = document.getElementById("girlBtn");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    const lines = Array.from(document.querySelectorAll(".convo-line"));
    const repeatResults = Array.from(document.querySelectorAll(".repeat-result"));
    const starRows = Array.from(document.querySelectorAll(".star-row"));

    let recorder = null;
    let recordedChunks = [];
    let currentLineIndex = -1;
    let micExpectingRepeat = false;
    const expectedLines = [
      "Where are we?.",
      "At the studio."
    ];
    const attempts = [0, 0];
    const maxAttempts = 3;
    const chimeAudio = new Audio("../../../../assets/audio/chimes/chime.mp3.mp3");
    chimeAudio.preload = "auto";
    let designerTimer = null;
    let traceCtx = null;

    function hideAllLines(){
      lines.forEach(line => {
        line.classList.remove("show");
        line.hidden = true;
        const bubble = line.querySelector(".bubble");
        if (bubble) bubble.classList.remove("sparkle");
      });
      if (designerText) designerText.classList.remove("show");
      if (designerSub) designerSub.classList.remove("show");
    }

    function speakLine(text, onend){
      if (!("speechSynthesis" in window)) {
        if (onend) onend();
        return;
      }
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 1.0;
      utter.pitch = 1.1;
      utter.onend = () => { if (onend) onend(); };
      utter.onerror = () => { if (onend) onend(); };
      window.speechSynthesis.speak(utter);
    }

    function setConversationStatus(text){
      if (!conversationStatus) return;
      conversationStatus.textContent = text || "";
    }

    function highlightLine(index, on){
      const line = lines[index];
      if (!line) return;
      const bubble = line.querySelector(".bubble");
      if (!bubble) return;
      bubble.classList.toggle("sparkle", on);
    }

    function normalizeSpeech(text){
      return (text || "")
        .toLowerCase()
        .replace(/[^\w\s]|_/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function setStars(index, count){
      const row = starRows[index];
      if (!row) return;
      row.innerHTML = new Array(count).fill("&#9733;").join("");
    }

    function showAndSpeakLine(index){
      const line = lines[index];
      if (!line) return;
      line.hidden = false;
      line.classList.add("show");
      currentLineIndex = index;
      micExpectingRepeat = true;
      const bubble = line.querySelector(".bubble");
      const text = bubble ? bubble.textContent.trim() : "";
      speakLine(text);
    }
    // Legacy local mic flow removed; shared LA2/LB3 protocol owns mic click.
    function clearConversation(){
      hideAllLines();
      currentLineIndex = -1;
      micExpectingRepeat = false;
      attempts.forEach((_, i) => attempts[i] = 0);
      repeatResults.forEach(el => { if (el) el.textContent = ""; });
      starRows.forEach(el => { if (el) el.textContent = ""; });
      if (cookieRow) cookieRow.classList.add("hidden");
      setConversationStatus("");
    }

    function setupTrace(canvas, image){
      if (!canvas || !image) return;
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      let drawing = false;
      traceCtx = ctx;

      function resizeCanvas(){
        const rect = image.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = rect.width + "px";
        canvas.style.height = rect.height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "rgba(30,120,255,0.9)";
        ctx.lineWidth = 7;
      }

      function scheduleResize(){
        requestAnimationFrame(resizeCanvas);
      }

      function getPoint(event){
        const rect = canvas.getBoundingClientRect();
        return {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top
        };
      }

      canvas.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        drawing = true;
        canvas.setPointerCapture(event.pointerId);
        const p = getPoint(event);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!drawing) return;
        const p = getPoint(event);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      });

      ["pointerup", "pointercancel", "pointerleave"].forEach((type) => {
        canvas.addEventListener(type, () => {
          drawing = false;
        });
      });

      if (image.complete) {
        scheduleResize();
      } else {
        image.addEventListener("load", scheduleResize);
      }
      if ("ResizeObserver" in window) {
        const observer = new ResizeObserver(scheduleResize);
        observer.observe(image);
      }
      window.addEventListener("resize", scheduleResize);
    }

    function clearTrace(){
      if (!traceCanvas || !traceCtx) return;
      traceCtx.clearRect(0, 0, traceCanvas.width, traceCanvas.height);
    }

    function setRecordLabel(text){
      recordBtn.innerHTML = '<svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">' +
        '<path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>' +
        '<path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '</svg> ' + text;
    }

    async function toggleRecord(){
      if (recorder && recorder.state === "recording") {
        recorder.stop();
        setRecordLabel("Record");
        return;
      }
      try{
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          return;
        }
        if (!window.MediaRecorder) {
          return;
        }
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
        recordedChunks = [];
        const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
          ? "audio/webm;codecs=opus"
          : (MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "");
        recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
        recorder.ondataavailable = (e) => {
          if (e.data.size > 0) recordedChunks.push(e.data);
        };
        recorder.onstop = () => {
          const type = recorder.mimeType || "audio/webm";
          const blob = new Blob(recordedChunks, { type });
          recordingPlayback.src = URL.createObjectURL(blob);
          recordingPlayback.muted = false;
          recordingPlayback.volume = 1;
          recordingPlayback.load();
          stream.getTracks().forEach(t => t.stop());
        };
        recorder.start();
        setRecordLabel("Stop recording");
      }catch(e){
        setRecordLabel("Record");
      }
    }

    // Mic click is handled by activity-standardizer unified protocol.
    if (clearBtn) clearBtn.addEventListener("click", clearConversation);
    if (traceClearBtn) traceClearBtn.addEventListener("click", clearTrace);
    if (recordBtn) recordBtn.addEventListener("click", toggleRecord);
    setupTrace(traceCanvas, designImage);
    function runDesignerLines(){
      if (designerTimer) clearTimeout(designerTimer);
      hideAllLines();
      if (designerText) {
        designerText.classList.add("show");
      }
      if (designerSub) designerSub.classList.remove("show");
      chimeAudio.currentTime = 0;
      chimeAudio.play().catch(() => {});
      speakLine("How many windows are hexagons?", () => {
        designerTimer = setTimeout(() => {
          if (designerSub) designerSub.classList.add("show");
          speakLine("3 windows are hexagons.");
        }, 500);
      });
    }
    if (girlBtn) {
      girlBtn.addEventListener("click", runDesignerLines);
    }

    nextBtn.addEventListener("click", () => {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      window.location.href = "../wednesday/LB12.html";
    });

    prevBtn.addEventListener("click", () => {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      window.location.href = "LB10.html";
    });

    hideAllLines();
  </script>
<script>
  (function(){
    if (window.__lbIntroVideoOverlayInit) return;
    window.__lbIntroVideoOverlayInit = true;

    const overlay = document.getElementById("lbIntroVideoOverlay");
    const video = document.getElementById("lbIntroVideo");
    const startBtn = document.getElementById("lbIntroStartBtn");
    const skipBtn = document.getElementById("lbIntroSkipBtn");
    const help = document.getElementById("lbIntroHelp");

    if (!overlay || !video) return;

    let introClosed = false;
    let hardTimeout = setTimeout(revealPage, 60000);

    function clearHardTimeout(){
      if (hardTimeout) {
        clearTimeout(hardTimeout);
        hardTimeout = null;
      }
    }

    function revealPage(){
      if (introClosed) return;
      introClosed = true;
      clearHardTimeout();
      try { video.pause(); } catch (_) {}
      overlay.classList.remove("active");
      overlay.style.display = "none";
    }

    function markStarted(){
      video.style.opacity = "1";
    }

    function tryPlayMuted(){
      try {
        video.muted = true;
        video.defaultMuted = true;
        video.volume = 1;
        const p = video.play();
        if (p && typeof p.then === "function") {
          p.then(() => {
            markStarted();
            if (help) help.textContent = 'Video is playing muted. Tap "Turn On Sound" if you want audio.';
          }).catch(() => {
            if (help) help.textContent = 'Tap "Turn On Sound" or tap the video to start the intro.';
          });
        } else {
          markStarted();
        }
      } catch (_) {
        if (help) help.textContent = 'Tap "Turn On Sound" or tap the video to start the intro.';
      }
    }

    async function turnOnSound(){
      try {
        video.muted = false;
        video.defaultMuted = false;
        video.volume = 1;
        await video.play();
        markStarted();
        if (help) help.textContent = "Sound is on.";
      } catch (_) {
        if (help) help.textContent = 'If sound is still blocked, tap directly on the video once.';
      }
    }

    if (startBtn) startBtn.addEventListener("click", turnOnSound);
    if (skipBtn) skipBtn.addEventListener("click", revealPage);
    video.addEventListener("click", turnOnSound);
    video.addEventListener("loadeddata", tryPlayMuted, { once:true });
    video.addEventListener("playing", markStarted);
    video.addEventListener("timeupdate", markStarted, { once:true });
    video.addEventListener("ended", revealPage, { once:true });
    video.addEventListener("error", revealPage, { once:true });

    setTimeout(() => {
      if (!introClosed && video.readyState < 2) {
        revealPage();
        return;
      }
      if (!introClosed) tryPlayMuted();
    }, 1000);
  })();

      try{
        chime.currentTime = 0;
        const p = chime.play();
        if (p && typeof p.catch === "function") p.catch(() => {});
      }catch(e){}
    });
  })();
</script>

<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LB11",
    defaultLevel: "B",
    defaultActivityType: "lesson",
    defaultScore: 100,
    defaultStars: 1,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);
    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}
    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };
  
    saveLocalActivityFallback(fullPayload);
  
    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }
  
    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>

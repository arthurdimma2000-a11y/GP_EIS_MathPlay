<!doctype html>
<html lang="en">
<head>
<style id="gpLessonPrehide">
  .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
  .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}
  .convo-line.show,.speech-line.show,.dialog-line.show,.bubble-line.show,.bubble-left.show,.bubble-right.show,#bubbleLeft.show,#bubbleRight.show{display:block !important;}
  .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,1.9vw,19px) !important;line-height:1.24 !important;max-width:min(40vw,320px) !important;white-space:normal !important;word-break:break-word !important;overflow-wrap:anywhere !important;}
  @media (max-width:780px){
    .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,3.6vw,17px) !important;max-width:min(44vw,220px) !important;line-height:1.2 !important;}
  }
</style>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Level B_Literacy Math: Repeat and Record Week 2</title>

  <style>
    :root{
      --ink:#2d2d2d;
      --bg:#e4f6df;
      --card:#f9f4ff;
      --border:#d9b9f0;
      --accent:#6c4bbf;
      --bubble-kid:#d8ebff;
      --bubble-baker:#fde3c4;
      --btn-yellow:#f6da7b;
      --btn-orange:#ff8a5b;
      --btn-blue:#dfeaff;
      --shadow:0 10px 24px rgba(0,0,0,.08);
      font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg);
      padding:16px;
      color:var(--ink);
    }
    .app{
      width:min(940px,96vw);
      background:#fff;
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:12px 12px 8px;
      position:relative;
    }
    .home-btn{
      position:absolute;
      right:10%;
      top:8px;
      width:72px;
      height:72px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      border:none;
      padding:0;
      text-decoration:none;
      z-index:5;
      transform-origin:top center;
      animation:homeSwing 2.4s ease-in-out infinite;
    }
    .home-btn img{
      width:72px;
      height:72px;
      display:block;
      filter:drop-shadow(0 8px 10px rgba(0,0,0,.22));
    }
    @keyframes homeSwing{
      0%{transform:rotate(-6deg);}
      50%{transform:rotate(8deg);}
      100%{transform:rotate(-6deg);}
    }
    .board{
      border:2px dashed var(--border);
      border-radius:16px;
      padding:12px;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,185,210,.35) 0 52px, transparent 54px),
        radial-gradient(circle at 82% 22%, rgba(210,240,255,.4) 0 58px, transparent 60px),
        radial-gradient(circle at 30% 80%, rgba(255,225,150,.35) 0 56px, transparent 58px),
        radial-gradient(circle at 72% 78%, rgba(190,255,210,.35) 0 54px, transparent 56px),
        linear-gradient(180deg,#fff7fb 0%, #f6f7ff 50%, #fff5e8 100%);
      min-height:360px;
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }
    .tray-hero{
      display:flex;
      justify-content:center;
      margin:6px 0 8px;
      width:100%;
    }
    .tray-hero img{
      width:min(676px,92%);
      height:auto;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
      cursor:pointer;
    }
    .designer-text{
      position:absolute;
      left:50%;
      top:15%;
      transform:translateX(-50%);
      font-size:2.42rem;
      font-weight:800;
      font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
      color:#2d2d2d;
      text-align:center;
      opacity:0;
      transition:opacity .25s ease, transform .25s ease;
      z-index:2;
      white-space:nowrap;
    }
    .highlight-red{
      color:#d62828;
    }
    .highlight-blue{
      color:#1d5fd6;
    }
    .designer-text.show{
      opacity:1;
    }
    .designer-sub{
      position:absolute;
      left:50%;
      top:75%;
      transform:translateX(-50%);
      font-size:2.31rem;
      font-weight:900;
      font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
      color:#2d2d2d;
      text-align:center;
      opacity:0;
      transition:opacity .25s ease, transform .25s ease;
      z-index:2;
    }
    .designer-sub.show{
      opacity:1;
    }
    .row{
      display:flex;
      align-items:center;
      gap:10px;
      margin:10px 0;
      width:100%;
      justify-content:flex-start;
      z-index:2;
    }
    .convo-line{
      display:none !important;
      position:absolute;
      transform:translateY(-30%);
    }
    .convo-line.show{
      display:flex !important;
    }
    .line1{
      left:22%;
      top:28%;
    }
    .line2{
      right:18%;
      top:28%;
    }
    .row.right{
      justify-content:flex-end;
    }
    .avatar{
      width:56px;
      height:56px;
      border-radius:50%;
      background:#fff;
      border:3px solid #fff;
      box-shadow:0 4px 10px rgba(0,0,0,.1);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      color:#777;
      overflow:hidden;
    }
    .avatar img{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      display:block;
    }
    .name-tag{
      font-size:.75rem;
      font-weight:700;
      text-transform:uppercase;
      color:#666;
      margin-top:4px;
      text-align:center;
    }
    .bubble{
      padding:10px 14px;
      border-radius:16px;
      position:relative;
      font-size:1rem;
      max-width:min(560px,70vw);
      line-height:1.25;
    }
    .bubble-stack{
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:flex-start;
    }
    .row.right .bubble-stack{
      align-items:flex-end;
    }
    .repeat-result{
      margin-top:4px;
      font-size:.95rem;
      font-weight:700;
      color:#2f9f5f;
    }
    .star-row{
      display:flex;
      gap:6px;
      margin-top:4px;
      font-weight:900;
      font-size:1.2rem;
      color:#ffd24a;
      text-shadow:
        0 2px 0 #b87900,
        0 4px 0 #8a5a00,
        0 8px 14px rgba(0,0,0,.28);
    }
    .cookie-row{
      display:flex;
      justify-content:center;
      gap:18px;
      margin:12px 0;
    }
    .cookie-row.hidden{
      display:none;
    }
    .cookie-row img{
      width:min(220px,40vw);
      height:auto;
      display:block;
      filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
    }
    .bubble.kid{background:var(--bubble-kid);}
    .bubble.baker{background:var(--bubble-baker);}
    .bubble.sparkle{
      background: linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);
      box-shadow:0 0 12px rgba(255,214,0,.6), 0 0 18px rgba(255,105,180,.4);
      animation: sparklePulse 1.2s ease-in-out infinite;
    }
    @keyframes sparklePulse{
      0%,100%{filter:brightness(1);}
      50%{filter:brightness(1.12);}
    }
    .bubble.kid::after{
      content:"";
      position:absolute;
      right:-6px;
      top:14px;
      border-width:8px 0 8px 8px;
      border-style:solid;
      border-color:transparent transparent transparent var(--bubble-kid);
    }
    .bubble.baker::after{
      content:"";
      position:absolute;
      left:-6px;
      top:14px;
      border-width:8px 8px 8px 0;
      border-style:solid;
      border-color:transparent var(--bubble-baker) transparent transparent;
    }
    .controls{
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      z-index:3;
      background:rgba(255,255,255,.92);
      padding:4px 6px;
      border-radius:16px;
      box-shadow:0 8px 16px rgba(0,0,0,.18);
      width:fit-content;
      max-width:100%;
      justify-content:center;
      margin-top:2px;
    }
    .btn{
      border:none;
      border-radius:999px;
      padding:8px 12px;
      font-size:.9rem;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(0,0,0,.15);
    }
    .btn.prev{background:var(--btn-orange);color:#fff;}
    .btn.next{background:var(--btn-orange);color:#fff;}
    .btn.stop{background:var(--btn-blue);color:#1f3b6b;}
    .btn.read{background:var(--btn-orange);color:#fff;}
    .btn.mic{
      background:var(--btn-orange);
      color:#fff;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .record-icon{
      width:16px;
      height:16px;
      display:inline-block;
      vertical-align:middle;
    }
    .record-icon path{
      stroke:#fff;
    }
    .mic-icon-btn{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .mic-icon-btn img{
      width:32px;
      height:32px;
      display:block;
      filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
    }
    .recording{
      display:inline-flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .recording audio{
      height:28px;
    }
    .recording-status{
      font-size:.85rem;
      color:#555;
    }
    .conversation-status{
      font-size:.95rem;
      font-weight:800;
      color:#6c4bbf;
      min-height:1.2em;
    }
    .girl-spot{
      position:absolute;
      left:18px;
      top:60px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      z-index:3;
    }
    .girl-spot img{
      width:72px;
      height:72px;
      border-radius:18px;
      object-fit:cover;
      box-shadow:0 6px 14px rgba(0,0,0,.25);
      border:4px solid #ffe3f7;
      background:#ffd6f2;
      cursor:pointer;
    }
    .girl-hint{
      font-size:.9rem;
      font-weight:800;
      color:#d62828;
      text-align:center;
    }
    @media (max-width:780px){
      .row{gap:8px;}
      .avatar{width:48px;height:48px;}
      .bubble{font-size:.95rem;}
    }
  </style>
</head>
<body>
  <div class="app">
    <a class="home-btn" href="../../../../index.html" aria-label="Home">
      <img src="../../../../assets/images/shapes/Home1.png" alt="Home">
    </a>
    <div class="board" id="board">
      <div class="tray-hero">
        <img src="../../../../assets/images/shapes/LB8b.png" alt="Design poster" id="designImage">
      </div>
      <div class="designer-text" id="designerText">What do you design?</div>
      <div class="designer-sub" id="designerSub">I like games.</div>
      <div class="girl-spot" aria-label="Tap the girl">
        <img src="../../../../assets/images/shapes/CirckleGirlWk1.png" alt="Girl helper" id="girlBtn" class="tap-girl">
        <div class="girl-hint">Tap the girl</div>
      </div>
      <div class="row convo-line line1">
        <div>
          <div class="avatar"><img src="../../../../assets/images/shapes/Greenboy.png" alt="Baker"></div>
          <div class="name-tag">Arthur</div>
        </div>
        <div class="bubble-stack">
          <div class="bubble baker">I design games.</div>
          <div class="repeat-result" data-line="0"></div>
          <div class="star-row" data-line="0"></div>
        </div>
      </div>

      <div class="row right convo-line line2">
        <div class="bubble-stack">
          <div class="bubble kid">These characters are shapes.</div>
          <div class="repeat-result" data-line="1"></div>
          <div class="star-row" data-line="1"></div>
        </div>
        <div>
          <div class="avatar"><img src="../../../../assets/images/shapes/YelloHeadSWoman.png" alt="Kid"></div>
          <div class="name-tag">Nora</div>
        </div>
      </div>

      <div class="conversation-status" id="conversationStatus"></div>

      <div class="controls">
        <button class="btn prev" id="prevBtn">&#8592; Previous page</button>
        <button class="btn next" id="nextBtn">Next page &#8594;</button>
        <button class="btn stop" id="clearBtn" type="button">Clear</button>
        <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
          <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone">
        </button>
        <button class="btn read" id="recordBtn">
          <svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">
            <path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z"
                  fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
            <path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
            <path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
            <path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          </svg>
          Record
        </button>
        <div class="recording">
          <audio id="recordingPlayback" controls></audio>
        </div>
      </div>
    </div>
  </div>

  <script src="../../../../shared/js/storage.js"></script>
  <script src="../../../../shared/js/progress.js"></script>
  <script src="../../../../shared/js/tracing.js"></script>
  <script>
    window.__GP_REQUIRE_INTRO_AUDIO__ = true;
    const micIconBtn = document.getElementById("micIconBtn");
    const clearBtn = document.getElementById("clearBtn");
    const recordBtn = document.getElementById("recordBtn");
    const recordingPlayback = document.getElementById("recordingPlayback");
    const conversationStatus = document.getElementById("conversationStatus");
    const designImage = document.getElementById("designImage");
    const designerText = document.getElementById("designerText");
    const designerSub = document.getElementById("designerSub");
    const girlBtn = document.getElementById("girlBtn");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    const lines = Array.from(document.querySelectorAll(".convo-line"));
    const repeatResults = Array.from(document.querySelectorAll(".repeat-result"));
    const starRows = Array.from(document.querySelectorAll(".star-row"));

    let recorder = null;
    let recordedChunks = [];
    let currentLineIndex = -1;
    let micExpectingRepeat = false;
    const expectedLines = [
      "I design games.",
      "These characters are shapes."
    ];
    const attempts = [0, 0];
    const maxAttempts = 3;
    const chimeAudio = new Audio("../../../../assets/audio/chimes/chime.mp3");
    chimeAudio.preload = "auto";
    let designerTimer = null;

    function hideAllLines(){
      lines.forEach(line => {
        line.classList.remove("show");
        line.hidden = true;
        const bubble = line.querySelector(".bubble");
        if (bubble) bubble.classList.remove("sparkle");
      });
    }

    function speakLine(text, onend){
      if (!("speechSynthesis" in window)) {
        if (onend) onend();
        return;
      }
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 1.0;
      utter.pitch = 1.1;
      utter.onend = () => { if (onend) onend(); };
      utter.onerror = () => { if (onend) onend(); };
      window.speechSynthesis.speak(utter);
    }

    function setConversationStatus(text){
      if (!conversationStatus) return;
      conversationStatus.textContent = text || "";
    }

    function highlightLine(index, on){
      const line = lines[index];
      if (!line) return;
      const bubble = line.querySelector(".bubble");
      if (!bubble) return;
      bubble.classList.toggle("sparkle", on);
    }

    function normalizeSpeech(text){
      return (text || "")
        .toLowerCase()
        .replace(/[^\w\s]|_/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function setStars(index, count){
      const row = starRows[index];
      if (!row) return;
      row.innerHTML = new Array(count).fill("&#9733;").join("");
    }

    function showAndSpeakLine(index){
      const line = lines[index];
      if (!line) return;
      line.hidden = false;
      line.classList.add("show");
      currentLineIndex = index;
      micExpectingRepeat = true;
      const bubble = line.querySelector(".bubble");
      const text = bubble ? bubble.textContent.trim() : "";
      speakLine(text);
    }

    function listenForRepeat(expectedText){
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        speakLine("Sorry, try again!");
        setConversationStatus("Sorry, try again!");
        return;
      }
      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.onresult = (event) => {
        const said = event.results[0][0].transcript;
        const expected = normalizeSpeech(expectedText);
        const actual = normalizeSpeech(said);
        attempts[currentLineIndex] += 1;
        if (actual === expected) {
          highlightLine(currentLineIndex, false);
          micExpectingRepeat = false;
          const attemptCount = attempts[currentLineIndex];
          const stars = attemptCount === 1 ? 3 : (attemptCount <= 3 ? 2 : 1);
          setStars(currentLineIndex, stars);
          if (repeatResults[currentLineIndex]) {
            repeatResults[currentLineIndex].textContent = expectedText;
          }
          setConversationStatus("");
          if (currentLineIndex === lines.length - 1) {
            chimeAudio.currentTime = 0;
            chimeAudio.play().catch(() => {});
            speakLine("Wow! You are super smart!");
            setConversationStatus("Wow! You are super smart!");
            return;
          }
          currentLineIndex += 1;
          showAndSpeakLine(currentLineIndex);
        } else {
          if (attempts[currentLineIndex] >= maxAttempts) {
            speakLine("Sorry, Study hard!");
            setConversationStatus("Sorry, Study hard!");
            micExpectingRepeat = false;
            highlightLine(currentLineIndex, false);
            return;
          }
          speakLine("Sorry, try again!", () => {
            setConversationStatus("Sorry, try again!");
            listenForRepeat(expectedText);
          });
        }
      };
      recognition.onerror = () => {
        speakLine("Sorry, try again!", () => {
          setConversationStatus("Sorry, try again!");
          listenForRepeat(expectedText);
        });
      };
      recognition.start();
    }

    function onMicClick(){
      if (currentLineIndex === -1) {
        hideAllLines();
        showAndSpeakLine(0);
        setConversationStatus("");
        return;
      }
      if (micExpectingRepeat) {
        const bubble = lines[currentLineIndex]?.querySelector(".bubble");
        if (!bubble) return;
        highlightLine(currentLineIndex, true);
        speakLine("Repeat after me.", () => {
          listenForRepeat(bubble.textContent || "");
        });
      }
    }

    function clearConversation(){
      hideAllLines();
      currentLineIndex = -1;
      micExpectingRepeat = false;
      attempts.forEach((_, i) => attempts[i] = 0);
      repeatResults.forEach(el => { if (el) el.textContent = ""; });
      starRows.forEach(el => { if (el) el.textContent = ""; });
      setConversationStatus("");
    }

    function setRecordLabel(text){
      recordBtn.innerHTML = '<svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">' +
        '<path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>' +
        '<path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '</svg> ' + text;
    }

    async function toggleRecord(){
      if (recorder && recorder.state === "recording") {
        recorder.stop();
        setRecordLabel("Record");
        return;
      }
      try{
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          return;
        }
        if (!window.MediaRecorder) {
          return;
        }
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
        recordedChunks = [];
        const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
          ? "audio/webm;codecs=opus"
          : (MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "");
        recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
        recorder.ondataavailable = (e) => {
          if (e.data.size > 0) recordedChunks.push(e.data);
        };
        recorder.onstop = () => {
          const type = recorder.mimeType || "audio/webm";
          const blob = new Blob(recordedChunks, { type });
          recordingPlayback.src = URL.createObjectURL(blob);
          recordingPlayback.muted = false;
          recordingPlayback.volume = 1;
          recordingPlayback.load();
          stream.getTracks().forEach(t => t.stop());
        };
        recorder.start();
        setRecordLabel("Stop recording");
      }catch(e){
        setRecordLabel("Record");
      }
    }

    if (micIconBtn) {
      micIconBtn.addEventListener("click", (event) => {
        if (event) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
        onMicClick();
      });
    }
    if (clearBtn) clearBtn.addEventListener("click", clearConversation);
    recordBtn.addEventListener("click", toggleRecord);
    function runDesignerLines(){
      if (designerTimer) clearTimeout(designerTimer);
      if (designerText) {
        designerText.textContent = "What do you design?";
        designerText.classList.add("show");
      }
      if (designerSub) {
        designerSub.textContent = "I like games.";
        designerSub.classList.remove("show");
      }
      chimeAudio.currentTime = 0;
      chimeAudio.play().catch(() => {});
      speakLine("What do you design?", () => {
        if (designerSub) designerSub.classList.add("show");
        speakLine("I like games.");
      });
    }
    if (girlBtn) {
      girlBtn.addEventListener("click", runDesignerLines);
    }

    nextBtn.addEventListener("click", () => {

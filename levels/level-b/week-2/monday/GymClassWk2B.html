<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Class Wk2B</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --panel: rgba(255, 255, 255, 0.12);
      --panel-strong: rgba(15, 23, 42, 0.72);
      --text: #ffffff;
      --accent: #f59e0b;
      --accent2: #38bdf8;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      --radius: 24px;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .page-wrap {
      width: 100%;
      max-width: 720px;
    }

    .title-bar {
      text-align: center;
      margin-bottom: 14px;
    }

    .title-bar h1 {
      font-size: clamp(1.4rem, 2vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.4px;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    }

    .video-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 1080 / 1612;
      max-height: 90vh;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 3px solid rgba(255,255,255,0.12);
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #000;
    }

    .start-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.32), rgba(0,0,0,0.58));
      z-index: 7;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }

    .start-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .start-card {
      background: rgba(15, 23, 42, 0.82);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      padding: 18px 20px;
      text-align: center;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      max-width: 360px;
      width: 100%;
    }

    .start-card h2 {
      font-size: 1.2rem;
      color: #fff4d6;
      margin-bottom: 8px;
      font-weight: 900;
    }

    .start-card p {
      font-size: 0.95rem;
      color: #e2e8f0;
      margin-bottom: 14px;
      line-height: 1.45;
    }

    .start-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .start-btn {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 18px;
      min-width: 130px;
      font-size: 0.95rem;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 8px 18px rgba(0,0,0,0.28);
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    .start-btn:hover {
      transform: translateY(-1px) scale(1.02);
    }

    .start-btn.play {
      background: linear-gradient(180deg, #38bdf8, #0284c7);
    }

    .start-btn.sound {
      background: linear-gradient(180deg, #fb923c, #ea580c);
    }

    .top-nav {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.65), rgba(0,0,0,0.08));
      z-index: 5;
      pointer-events: none;
    }

    .top-nav-left,
    .top-nav-right {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: auto;
    }

    .nav-btn {
      border: none;
      outline: none;
      cursor: pointer;
      color: #fff;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(6px);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
      transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }

    .nav-btn:hover:not(:disabled) {
      transform: translateY(-1px) scale(1.02);
      background: rgba(30, 41, 59, 0.92);
    }

    .nav-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .nav-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .nav-home {
      background: rgba(245, 158, 11, 0.92);
      color: #111827;
    }

    .nav-next {
      background: rgba(56, 189, 248, 0.95);
      color: #082f49;
    }

    .side-nav {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .side-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      font-weight: 900;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      pointer-events: auto;
      transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
    }

    .side-btn:hover:not(:disabled) {
      transform: translateY(-50%) scale(1.06);
      background: rgba(0, 0, 0, 0.62);
    }

    .side-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .side-btn.left {
      left: 12px;
    }

    .side-btn.right {
      right: 12px;
    }

    .bottom-bar {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(6px);
      z-index: 5;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    }

    .bottom-bar .lesson-name {
      font-size: 0.98rem;
      font-weight: 800;
      color: #fff;
    }

    .bottom-bar .hint {
      font-size: 0.86rem;
      color: #dbeafe;
      opacity: 0.95;
      text-align: right;
    }

    .tap-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.18);
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .tap-overlay.show {
      opacity: 1;
    }

    .tap-card {
      background: rgba(15, 23, 42, 0.8);
      color: #fff;
      padding: 12px 18px;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
    }

    .nav-hidden {
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .nav-visible {
      opacity: 1;
      transition: opacity 0.25s ease;
    }

    @media (max-width: 600px) {
      body {
        padding: 8px;
      }

      .video-shell {
        border-radius: 18px;
      }

      .nav-btn {
        padding: 9px 12px;
        font-size: 0.85rem;
      }

      .side-btn {
        width: 50px;
        height: 50px;
      }

      .bottom-bar {
        padding: 10px 12px;
      }

      .bottom-bar .lesson-name {
        font-size: 0.9rem;
      }

      .bottom-bar .hint {
        font-size: 0.78rem;
      }

      .start-card {
        padding: 16px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="title-bar">
      <h1>Gym Class Wk2B</h1>
    </div>

    <div class="video-shell" id="videoShell">
      <video
        id="lessonVideo"
        controls
        playsinline
        preload="metadata"
      >
        <source src="https://res.cloudinary.com/dtknykrkf/video/upload/v1776525364/Finalwk2gymclassb_fsm27q.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>

      <div class="start-overlay" id="startOverlay">
        <div class="start-card">
          <h2>Gym Class Wk2B</h2>
          <p>Tap Play to start the gym class video. You can also turn sound on and use the navigation buttons around the video page.</p>
          <div class="start-actions">
            <button type="button" class="start-btn play" id="startPlayBtn">▶ Play Video</button>
            <button type="button" class="start-btn sound" id="soundBtn">🔊 Sound On</button>
          </div>
        </div>
      </div>

      <div class="tap-overlay" id="tapOverlay">
        <div class="tap-card">Tap video to Play / Pause</div>
      </div>

      <div class="top-nav nav-visible" id="topNav">
        <div class="top-nav-left">
          <button class="nav-btn nav-home" id="homeBtn">🏠 Home</button>
          <button class="nav-btn" id="backBtn">⬅ Back</button>
        </div>

        <div class="top-nav-right">
          <button class="nav-btn" id="replayBtn">⟲ Replay</button>
          <button class="nav-btn nav-next" id="nextBtn">Next ➜</button>
          <button class="nav-btn" id="fullscreenBtn">⛶ Full Screen</button>
        </div>
      </div>

      <div class="side-nav">
        <button class="side-btn left" id="sideBackBtn" aria-label="Go to previous page">❮</button>
        <button class="side-btn right" id="sideNextBtn" aria-label="Go to next page">❯</button>
      </div>

      <div class="bottom-bar nav-visible" id="bottomBar">
        <div class="lesson-name">Gym Class Wk2B Video</div>
        <div class="hint">Use Home, Back, Replay, Next, and Full Screen</div>
      </div>
    </div>
  </div>

  <script>
    /* =========================
       EDIT THESE PAGE LINKS
       ========================= */
    const HOME_PAGE = "../../../../index.html";
    const PREVIOUS_PAGE = "../../week-1/friday/LB_Quiz1.html";
    const NEXT_PAGE = "../tuesday/LB8.html";

    const video = document.getElementById("lessonVideo");
    const videoShell = document.getElementById("videoShell");
    const startOverlay = document.getElementById("startOverlay");
    const startPlayBtn = document.getElementById("startPlayBtn");
    const soundBtn = document.getElementById("soundBtn");

    const homeBtn = document.getElementById("homeBtn");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    const sideBackBtn = document.getElementById("sideBackBtn");
    const sideNextBtn = document.getElementById("sideNextBtn");
    const replayBtn = document.getElementById("replayBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const topNav = document.getElementById("topNav");
    const bottomBar = document.getElementById("bottomBar");
    const tapOverlay = document.getElementById("tapOverlay");

    let navTimer;

    function hasNextPage() {
      return NEXT_PAGE && NEXT_PAGE.trim() !== "";
    }

    function updateNextButtons() {
      nextBtn.disabled = !hasNextPage();
      sideNextBtn.disabled = !hasNextPage();
    }

    function hideStartOverlay() {
      startOverlay.classList.add("hidden");
    }

    function startVideoWithSound() {
      video.muted = false;
      video.volume = 1;
      hideStartOverlay();
      video.play().catch(() => {});
      showNavigation();
    }

    function startVideoMuted() {
      video.muted = true;
      hideStartOverlay();
      video.play().catch(() => {});
      showNavigation();
    }

    function goHome() {
      window.location.href = HOME_PAGE || "index.html";
    }

    function goBackPage() {
      if (PREVIOUS_PAGE && PREVIOUS_PAGE.trim() !== "") {
        window.location.href = PREVIOUS_PAGE;
      } else if (document.referrer) {
        history.back();
      } else {
        window.location.href = HOME_PAGE || "index.html";
      }
    }

    function goNextPage() {
      if (hasNextPage()) {
        window.location.href = NEXT_PAGE;
      }
    }

    function replayVideo() {
      video.currentTime = 0;
      video.play().catch(() => {});
      hideStartOverlay();
      showNavigation();
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await videoShell.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (err) {
        console.log("Fullscreen not supported on this device/browser.", err);
      }
    }

    function showNavigation() {
      topNav.classList.remove("nav-hidden");
      topNav.classList.add("nav-visible");
      bottomBar.classList.remove("nav-hidden");
      bottomBar.classList.add("nav-visible");

      clearTimeout(navTimer);
      navTimer = setTimeout(() => {
        topNav.classList.remove("nav-visible");
        topNav.classList.add("nav-hidden");
        bottomBar.classList.remove("nav-visible");
        bottomBar.classList.add("nav-hidden");
      }, 3500);
    }

    function showTapHint() {
      tapOverlay.classList.add("show");
      setTimeout(() => tapOverlay.classList.remove("show"), 900);
      showNavigation();
    }

    function togglePlayPause() {
      if (video.paused) {
        hideStartOverlay();
        video.play().catch(() => {});
      } else {
        video.pause();
      }
      showTapHint();
    }

    startPlayBtn.addEventListener("click", startVideoMuted);
    soundBtn.addEventListener("click", startVideoWithSound);

    homeBtn.addEventListener("click", goHome);
    backBtn.addEventListener("click", goBackPage);
    nextBtn.addEventListener("click", goNextPage);
    sideBackBtn.addEventListener("click", goBackPage);
    sideNextBtn.addEventListener("click", goNextPage);
    replayBtn.addEventListener("click", replayVideo);
    fullscreenBtn.addEventListener("click", toggleFullscreen);

    video.addEventListener("click", togglePlayPause);
    videoShell.addEventListener("mousemove", showNavigation);
    videoShell.addEventListener("touchstart", showNavigation, { passive: true });
    video.addEventListener("play", showNavigation);
    video.addEventListener("pause", showNavigation);
    video.addEventListener("ended", showNavigation);

    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (key === " ") {
        e.preventDefault();
        togglePlayPause();
      } else if (key === "arrowleft") {
        e.preventDefault();
        goBackPage();
      } else if (key === "arrowright") {
        e.preventDefault();
        goNextPage();
      } else if (key === "h") {
        goHome();
      } else if (key === "f") {
        toggleFullscreen();
      } else if (key === "r") {
        replayVideo();
      }
    });

    updateNextButtons();
    showNavigation();
  </script>
<script src="../../../../shared/js/activity-standardizer-shared.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Level A • Quiz 1 • Shapes Quiz</title>
<link rel="stylesheet" href="../../../../shared/css/base.css" />
<link rel="stylesheet" href="../../../../shared/css/layout.css" />
<link rel="stylesheet" href="../../../../shared/css/lesson.css" />
<style>
  :root{
    --ink:#1f2a37;
    --muted:#64748b;
    --card:#ffffffd9;
    --shadow:0 18px 60px rgba(0,0,0,.16);
    --pink:#ff4fd8;
    --blue:#35c8ff;
    --green:#7cffa6;
    --yellow:#ffd84d;
    --good:#22c55e;
    --bad:#ef4444;
    font-family:"Comic Sans MS","Baloo 2","Segoe UI",system-ui,-apple-system,Arial;
  }

  *{box-sizing:border-box}

  body{
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 20%, #ffe3fb 0 18%, transparent 19%),
      radial-gradient(circle at 85% 25%, #d7f5ff 0 20%, transparent 21%),
      radial-gradient(circle at 25% 85%, #e6ffe9 0 22%, transparent 23%),
      linear-gradient(135deg,#fff 0%,#f5fbff 35%,#fff7fb 70%,#f7fff7 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    margin:0;
    min-height:100vh;
  }

  .app{
    width:min(980px,96vw);
    background:transparent;
    box-shadow:none;
  }

  .topbar{
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
    flex-wrap:wrap;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:linear-gradient(90deg,#ff4fd8,#35c8ff,#7cffa6,#ffd84d);
    color:#111;
    padding:10px 14px;
    border-radius:999px;
    box-shadow:var(--shadow);
    font-weight:1000;
  }

  .btn{
    appearance:none;
    border:0;
    cursor:pointer;
    user-select:none;
    padding:10px 12px;
    border-radius:14px;
    font-weight:1000;
    background:#111827;
    color:#fff;
    box-shadow:0 10px 26px rgba(0,0,0,.2);
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:44px;
    transition:transform .08s ease, opacity .08s ease, filter .08s ease;
    position:relative;
    z-index:5;
  }

  .btn:hover,.btn:focus{
    transform:translateY(-1px);
    filter:brightness(1.03);
  }

  .btn.ghost{
    background:#ffffffd9;
    color:#111827;
  }

  .btn.is-disabled{
    opacity:.55;
    cursor:not-allowed;
    filter:none;
    transform:none;
  }

  .panel{
    background:var(--card);
    border:3px solid #fff;
    border-radius:24px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  .head{
    padding:14px 16px;
    border-bottom:2px solid #eef2ff;
  }

  .title{
    margin:0;
    font-size:clamp(24px,4vw,34px);
    font-weight:1000;
    background:linear-gradient(90deg,#ff4fd8,#35c8ff,#7cffa6,#ffd84d);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .sub{
    margin:6px 0 0;
    color:var(--muted);
    font-weight:900;
  }

  .box{
    padding:16px;
  }

  .quiz-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:12px;
  }

  .progress-dots{
    display:flex;
    gap:8px;
    align-items:center;
  }

  .dot{
    width:14px;
    height:14px;
    border-radius:999px;
    background:#dbeafe;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.06);
  }

  .dot.done{background:var(--good);}
  .dot.now{background:#8b5cf6;}

  .big{
    height:260px;
    border-radius:22px;
    border:2px dashed #dbeafe;
    display:grid;
    place-items:center;
    background:linear-gradient(180deg,#fff,#f6fbff);
    margin-bottom:12px;
  }

  .shape-wrap{
    display:grid;
    place-items:center;
    width:100%;
    height:100%;
  }

  .shape-circle{
    width:180px;
    height:180px;
    border-radius:999px;
    background:radial-gradient(circle at 30% 30%, #fff, #ffe5fb 35%, #ff4fd8 90%);
    border:6px solid rgba(255,255,255,.85);
    box-shadow:
      inset 0 12px 26px rgba(255,255,255,.65),
      inset 0 -18px 28px rgba(0,0,0,.12),
      0 18px 48px rgba(255,79,216,.20);
  }

  .shape-square{
    width:180px;
    height:180px;
    background:linear-gradient(180deg,#fff6ba,#ffd84d);
    border:6px solid rgba(255,255,255,.85);
    box-shadow:
      inset 0 12px 26px rgba(255,255,255,.55),
      inset 0 -18px 28px rgba(0,0,0,.10),
      0 18px 48px rgba(255,216,77,.26);
  }

  .shape-triangle{
    width:0;
    height:0;
    border-left:100px solid transparent;
    border-right:100px solid transparent;
    border-bottom:180px solid #35c8ff;
    filter:drop-shadow(0 18px 24px rgba(53,200,255,.24));
    position:relative;
  }

  .shape-triangle::after{
    content:"";
    position:absolute;
    left:-80px;
    top:22px;
    width:0;
    height:0;
    border-left:80px solid transparent;
    border-right:80px solid transparent;
    border-bottom:145px solid rgba(255,255,255,.22);
  }

  .q{
    margin:14px 0 10px;
    font-size:clamp(20px,3vw,28px);
    font-weight:1000;
    text-align:center;
  }

  .answers{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
  }

  @media (max-width:740px){
    .answers{grid-template-columns:1fr}
  }

  .ans{
    background:#fff;
    border:2px solid #e5e7eb;
    border-radius:20px;
    padding:16px 12px;
    cursor:pointer;
    font-weight:1000;
    text-align:center;
    box-shadow:0 10px 24px rgba(0,0,0,.06);
    font-size:1.25rem;
    transition:transform .08s ease, box-shadow .08s ease, border-color .08s ease;
  }

  .ans:hover,.ans:focus{
    transform:translateY(-1px);
    box-shadow:0 14px 24px rgba(0,0,0,.08);
  }

  .ans.good{
    border-color:var(--good);
    background:#effff4;
  }

  .ans.bad{
    border-color:var(--bad);
    background:#fff5f5;
  }

  .ans[disabled]{
    cursor:not-allowed;
    opacity:.92;
  }

  .score-row{
    margin-top:14px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
  }

  @media (max-width:740px){
    .score-row{grid-template-columns:1fr}
  }

  .score-card{
    background:#f8fbff;
    border:2px solid #e2e8f0;
    border-radius:18px;
    padding:12px;
    font-weight:1000;
    text-align:center;
  }

  .score-big{
    font-size:1.5rem;
    margin-bottom:4px;
  }

  .footerNav{
    display:flex;
    gap:10px;
    justify-content:space-between;
    align-items:center;
    padding:12px 16px;
    background:linear-gradient(90deg,#ffffff,#f8fbff);
    border-top:2px solid #eef2ff;
    flex-wrap:wrap;
  }

  .spark{
    pointer-events:none;
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:9999;
  }

  .star{
    position:absolute;
    font-size:24px;
    animation:pop 900ms ease-out forwards;
    filter:drop-shadow(0 10px 14px rgba(0,0,0,.18));
  }

  @keyframes pop{
    0%{transform:translate(-50%,-50%) scale(.4);opacity:0}
    12%{opacity:1}
    100%{transform:translate(-50%,-160%) scale(1.25);opacity:0}
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    background:#0b1b2a;
    color:#fff;
    padding:12px 16px;
    border-radius:16px;
    box-shadow:0 18px 35px rgba(0,0,0,.25);
    display:none;
    max-width:min(92vw,720px);
    font-weight:900;
    text-align:center;
    z-index:10000;
  }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="badge">
      <div>Level A <small style="display:block;opacity:.9">Quiz 1</small></div>
      <div style="font-size:20px">📝</div>
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end">
      <a class="btn ghost" href="LA_Game1.html">⬅ Back</a>
      <button class="btn ghost" id="soundBtn" type="button">🔊 Sound: ON</button>
      <button class="btn ghost" id="readBtn" type="button">🗣️ Read Question</button>
    </div>
  </div>

  <div class="panel">
    <div class="head">
      <p class="title">Shapes Quiz</p>
      <p class="sub" id="msg">Let’s answer shape questions and win stars ⭐</p>
    </div>

    <div class="box">
      <div class="quiz-top">
        <div style="font-weight:1000;font-size:1.05rem" id="roundLabel">Question 1 of 3</div>
        <div class="progress-dots" id="progressDots"></div>
      </div>

      <div class="big">
        <div class="shape-wrap" id="shapeStage"></div>
      </div>

      <div class="q" id="questionText">How many vertices does a circle have?</div>

      <div class="answers" id="answers"></div>

      <div class="score-row">
        <div class="score-card">
          <div class="score-big">⭐ <span id="stars">0</span></div>
          <div>Stars</div>
        </div>
        <div class="score-card">
          <div class="score-big"><span id="score">0</span>%</div>
          <div>Score</div>
        </div>
        <div class="score-card">
          <div class="score-big"><span id="correctCount">0</span>/3</div>
          <div>Correct</div>
        </div>
      </div>
    </div>

    <div class="footerNav">
      <a class="btn ghost" href="LA_Game1.html">◀ Prev</a>
      <button class="btn is-disabled" id="nextBtn" type="button" aria-disabled="true">Next ➜</button>
    </div>
  </div>
</div>

<div class="spark" id="spark"></div>
<div class="toast" id="toast"></div>

<script src="../../../../shared/js/storage.js"></script>
<script src="../../../../shared/js/progress.js"></script>
<script src="../../../../shared/js/tracing.js"></script>
<script>
(function(){
  const TRACK = { level:"A" };
  const LS_KEY = "gp_kids_progress_v1";
  const PAGE_ID = "LA_Quiz1";
  const NEXT_PAGE_URL = "../../week-2/tuesday/LA8.html";

  let soundOn = true;
  let stars = 0;
  let currentQuestion = 0;
  let correctCount = 0;
  let questionLocked = false;
  let audioCtx = null;
  let canGoNext = false;

  const questions = [
    {
      id: "circle",
      question: "How many vertices does a circle have?",
      correct: 0,
      answers: [0, 3, 4],
      shapeClass: "shape-circle",
      voice: "How many vertices does a circle have?"
    },
    {
      id: "square",
      question: "How many vertices does a square have?",
      correct: 4,
      answers: [3, 4, 0],
      shapeClass: "shape-square",
      voice: "How many vertices does a square have?"
    },
    {
      id: "triangle",
      question: "How many vertices does a triangle have?",
      correct: 3,
      answers: [4, 0, 3],
      shapeClass: "shape-triangle",
      voice: "How many vertices does a triangle have?"
    }
  ];

  const $ = (q) => document.querySelector(q);
  const spark = $("#spark");
  const toast = $("#toast");
  const shapeStage = $("#shapeStage");
  const questionText = $("#questionText");
  const answersEl = $("#answers");
  const roundLabel = $("#roundLabel");
  const progressDots = $("#progressDots");
  const nextBtn = $("#nextBtn");
  const msgEl = $("#msg");
  const starsEl = $("#stars");
  const scoreEl = $("#score");
  const correctCountEl = $("#correctCount");
  const soundBtn = $("#soundBtn");
  const readBtn = $("#readBtn");

  function setNextEnabled(enabled){
    canGoNext = enabled;
    nextBtn.classList.toggle("is-disabled", !enabled);
    nextBtn.setAttribute("aria-disabled", enabled ? "false" : "true");
  }

  function saveProgress(activity, score, max){
    const row = {
      ...TRACK,
      activity,
      score,
      max,
      at:new Date().toISOString(),
      file:location.pathname.split("/").pop()
    };
    if (window.GPStorage && typeof window.GPStorage.appendJSON === "function") {
      window.GPStorage.appendJSON(LS_KEY, row, []);
    }
  }

  function toastShow(text){
    if(!toast) return;
    toast.textContent = text;
    toast.style.display = "block";
    clearTimeout(toast._t);
    toast._t = setTimeout(() => {
      toast.style.display = "none";
    }, 1600);
  }

  function starBurst(x, y, emoji="⭐"){
    if(!spark) return;
    const s = document.createElement("div");
    s.className = "star";
    s.textContent = emoji;
    s.style.left = x + "px";
    s.style.top = y + "px";
    spark.appendChild(s);
    setTimeout(() => s.remove(), 950);
  }

  function getAudioCtx(){
    if (!audioCtx) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) audioCtx = new Ctx();
    }
    return audioCtx;
  }

  async function ensureAudioUnlocked(){
    try{
      const ctx = getAudioCtx();
      if(ctx && ctx.state === "suspended") await ctx.resume();
    }catch(e){}
  }

  function beep(type="good"){
    if(!soundOn) return;
    const ctx = getAudioCtx();
    if(!ctx) return;

    const o = ctx.createOscillator();
    const g = ctx.createGain();
    const now = ctx.currentTime;

    o.type = "sine";
    const f1 = type === "good" ? 880 : 220;
    const f2 = type === "good" ? 1320 : 180;

    o.frequency.setValueAtTime(f1, now);
    o.frequency.exponentialRampToValueAtTime(f2, now + 0.14);

    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.22, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

    o.connect(g);
    g.connect(ctx.destination);
    o.start(now);
    o.stop(now + 0.2);
  }

  function cheer(text){
    if(!soundOn) return;
    try{
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.9;
      u.pitch = 1.2;
      u.volume = 1;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }catch(e){}
  }

  function playBigCheer(){
    beep("good");
    setTimeout(() => beep("good"), 180);
    setTimeout(() => beep("good"), 340);
    cheer("Amazing! You finished the quiz!");
  }

  function updateProgressDots(){
    progressDots.innerHTML = "";
    questions.forEach((_, i) => {
      const dot = document.createElement("div");
      dot.className = "dot";
      if(i < currentQuestion) dot.classList.add("done");
      if(i === currentQuestion) dot.classList.add("now");
      progressDots.appendChild(dot);
    });
  }

  function updateScoreUi(){
    starsEl.textContent = String(stars);
    correctCountEl.textContent = String(correctCount);
    const score = Math.round((correctCount / questions.length) * 100);
    scoreEl.textContent = String(score);
  }

  function renderQuestion(){
    questionLocked = false;
    setNextEnabled(false);

    const q = questions[currentQuestion];
    roundLabel.textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
    questionText.textContent = q.question;
    shapeStage.innerHTML = `<div class="${q.shapeClass}"></div>`;
    answersEl.innerHTML = "";

    q.answers.forEach((value) => {
      const btn = document.createElement("button");
      btn.className = "ans";
      btn.type = "button";
      btn.dataset.v = String(value);
      btn.textContent = String(value);
      btn.addEventListener("click", (e) => handleAnswer(e, btn, value));
      answersEl.appendChild(btn);
    });

    updateProgressDots();
    updateScoreUi();
    msgEl.textContent = "Choose the correct answer to win a star ⭐";
    nextBtn.textContent = currentQuestion === questions.length - 1 ? "Finish ➜" : "Next ➜";
  }

  async function saveResultSnapshot(isCompleted){
    const score = Math.round((correctCount / questions.length) * 100);
    if (typeof window.finishAndSave === "function") {
      try{
        await window.finishAndSave({
          pageId: PAGE_ID,
          level: "A",
          activityType: "quiz",
          score,
          tracing: score,
          progress: score,
          completed: isCompleted,
          stars,
          skills: {
            reading: 1,
            writing: 0,
            speaking: 0,
            listening: 1
          }
        });
      }catch(err){
        console.warn("finishAndSave failed:", err);
      }
    }
  }

  async function handleAnswer(e, button, value){
    if(questionLocked) return;
    questionLocked = true;
    await ensureAudioUnlocked();

    const q = questions[currentQuestion];
    const ok = value === q.correct;

    document.querySelectorAll(".ans").forEach(x => x.disabled = true);
    document.querySelectorAll(".ans").forEach(x => x.classList.remove("good","bad"));

    if(ok){
      button.classList.add("good");
      stars++;
      correctCount++;
      beep("good");
      cheer(currentQuestion === questions.length - 1 ? "Great job!" : "Correct!");
      starBurst(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2, "🎉");
      msgEl.textContent = "Yay! Correct answer! ⭐";
      toastShow("Correct! Great job!");
      saveProgress(`LA_Quiz1_${q.id}`, 1, 1);
    }else{
      button.classList.add("bad");
      const correctBtn = [...document.querySelectorAll(".ans")].find(x => Number(x.dataset.v) === q.correct);
      if(correctBtn) correctBtn.classList.add("good");
      beep("bad");
      cheer("Try again next time!");
      starBurst(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2, "💛");
      msgEl.textContent = `The correct answer is ${q.correct}.`;
      toastShow("Oops! Let's learn the right answer.");
      saveProgress(`LA_Quiz1_${q.id}`, 0, 1);
    }

    updateScoreUi();
    await saveResultSnapshot(currentQuestion === questions.length - 1);

    if(currentQuestion === questions.length - 1){
      nextBtn.textContent = "Finish ➜";
      playBigCheer();
      msgEl.textContent = `Wonderful! You finished the quiz with ${correctCount} correct answers.`;
    }else{
      nextBtn.textContent = "Next ➜";
    }

    setNextEnabled(true);
  }

  function readCurrentQuestion(){
    const q = questions[currentQuestion];
    cheer(q.voice);
  }

  function goNext(){
    if (!canGoNext) {
      toastShow("Please answer the question first.");
      return;
    }

    if(currentQuestion < questions.length - 1){
      currentQuestion++;
      renderQuestion();
      readCurrentQuestion();
    }else{
      window.location.href = NEXT_PAGE_URL;
    }
  }

  soundBtn.addEventListener("click", async () => {
    await ensureAudioUnlocked();
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? "🔊 Sound: ON" : "🔇 Sound: OFF";
    beep(soundOn ? "good" : "bad");
  });

  readBtn.addEventListener("click", async () => {
    await ensureAudioUnlocked();
    readCurrentQuestion();
  });

  nextBtn.addEventListener("click", async () => {
    await ensureAudioUnlocked();
    goNext();
  });

  window.addEventListener("keydown", async (e) => {
    if (e.key === "Enter" && document.activeElement === nextBtn) {
      await ensureAudioUnlocked();
      goNext();
    }
  });

  window.addEventListener("pointerdown", ensureAudioUnlocked, { once:true });
  window.addEventListener("keydown", ensureAudioUnlocked, { once:true });

  renderQuestion();
  setTimeout(() => {
    readCurrentQuestion();
  }, 600);
})();
</script>

<script src="../../../../activity-standardizer.js"></script>
<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";

  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LA_Quiz1",
    defaultLevel: "A",
    defaultActivityType: "quiz",
    defaultScore: 0,
    defaultStars: 0,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 0,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;

    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";

    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };

    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);

    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}

    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };

    saveLocalActivityFallback(fullPayload);

    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }

    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>

<style>
  :root{
    --ink:#2d2d2d;
    --bg:#e4f6df;
    --card:#f9f4ff;
    --border:#d9b9f0;
    --accent:#6c4bbf;
    --bubble-kid:#d8ebff;
    --bubble-baker:#fde3c4;
    --btn-yellow:#f6da7b;
    --btn-orange:#ff8a5b;
    --btn-blue:#dfeaff;

    width:100%;
    opacity:1;
    visibility:visible;
    transition:opacity .28s ease;
  }
  body.intro-active #pageContent{
    opacity:0;
    visibility:hidden;
  }
  body.intro-complete #pageContent{
    opacity:1;
    visibility:visible;
  }
  body.intro-active .app{ visibility:hidden; }

    width:min(960px,100%);

    border-radius:16px;
    padding:12px 12px 8px;
  }
  .title{
    font-size:clamp(2.4rem,6vw,4.2rem);
    font-weight:800;
    margin-bottom:10px;
  }
  .board{

    position:relative;
    overflow:hidden;
  }
  .board-sky{
    position:absolute;

  <script>
    window.__GP_REQUIRE_INTRO_AUDIO__ = false;
    document.body.classList.remove("intro-active");
    document.body.classList.add("intro-complete");
    let introFinished = true;

    const clearBtn = document.getElementById("clearBtn");
    const micIconBtn = document.getElementById("micIconBtn");
    const recordBtn = document.getElementById("recordBtn");
    const recordingPlayback = document.getElementById("recordingPlayback");
    const recordingStatus = document.getElementById("recordingStatus");
    const conversationStatus = document.getElementById("conversationStatus");
    const tapGirl = document.getElementById("tapGirl");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    const circleReveal = document.getElementById("circleReveal");
    const lines = Array.from(document.querySelectorAll(".convo-line"));
    const repeatResults = Array.from(document.querySelectorAll(".repeat-result"));
    const starRows = Array.from(document.querySelectorAll(".star-row"));
    const instructionAudio = new Audio("../../../../assets/audio/chimes/InstructionAudio.mp3");

    let readToken = 0;
    let currentLineIndex = -1;
    let repeatNext = false;
    let recorder = null;
    let recordedChunks = [];
    const expectedLines = ["What do you make?", "I make cookies."];
    const attempts = [0, 0];
    const starsAwarded = [0, 0];
    const maxAttempts = 3;
    let micStepIndex = 0;
    let micPhase = "reveal";
    let micBusy = false;
    let micDone = false;
    let micInitialized = false;
    let activitySaved = false;
    let circleTapped = false;
    let loadIntroStarted = false;
    let introDialogueStarted = false;
    let instructionGestureBound = false;

    instructionAudio.preload = "auto";

    function bindInstructionGestureRetry(startSequence){
      if (instructionGestureBound) return;
      instructionGestureBound = true;
      const resumeFromGesture = () => {
        startSequence();
      };
      ["pointerdown", "touchstart", "keydown"].forEach((eventName) => {
        window.addEventListener(eventName, resumeFromGesture, {
          once: true,
          passive: eventName !== "keydown",
          capture: true
        });
      });
    }

    function hideAllLines(){
      lines.forEach(line => {
        line.classList.remove("show");
        line.hidden = true;
        line.style.display = "none";
      });
    }

    function showLine(index){
      const line = lines[index];
      if (!line) return;
      line.hidden = false;
      line.classList.add("show");
      line.style.display = "flex";
    }

    function getSpeechVoice(role){
      if (!("speechSynthesis" in window) || typeof window.speechSynthesis.getVoices !== "function") return null;
      const voices = window.speechSynthesis.getVoices() || [];
      if (!voices.length) return null;

      const englishVoices = voices.filter((voice) => /^en(-|_)?/i.test(String(voice.lang || "")));
      const pool = englishVoices.length ? englishVoices : voices;
      const maleName = /(david|mark|george|daniel|fred|alex|guy|matthew|thomas|brian|christopher|male|man|boy)/i;
      const kidName = /(kids?|child|junior|young|ava|aria|ellie|ivy|jenny|libby|nova|grace|olivia|emma)/i;

      if (role === "male") {
        return pool.find((voice) => maleName.test(String(voice.name || ""))) || pool[0] || null;
      }

      if (role === "kid") {
        return pool.find((voice) => kidName.test(String(voice.name || "")) && !maleName.test(String(voice.name || "")))
          || pool.find((voice) => !maleName.test(String(voice.name || "")))
          || pool[0]
          || null;
      }

      return pool[0] || null;
    }

    function speakLine(text, onend, options){
      if (!("speechSynthesis" in window)) {
        if (onend) onend();
        return;
      }
      const opts = options || {};
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = typeof opts.rate === "number" ? opts.rate : 0.95;
      utter.pitch = typeof opts.pitch === "number" ? opts.pitch : 1.1;
      utter.volume = typeof opts.volume === "number" ? opts.volume : 1;
      utter.lang = opts.lang || "en-US";
      const selectedVoice = getSpeechVoice(opts.role);
      if (selectedVoice) utter.voice = selectedVoice;
      utter.onend = () => { if (onend) onend(); };
      utter.onerror = () => { if (onend) onend(); };
      window.speechSynthesis.speak(utter);
    }

    function runPageHintAndLessonSequence(){
      if (introDialogueStarted) return;
      introDialogueStarted = true;
      hideAllLines();
      setConversationStatus("");
      if ("speechSynthesis" in window) {
        try { window.speechSynthesis.cancel(); } catch (_err) {}
      }
      const steps = [
        () => {
          setConversationStatus("Tap the girl. Click the Mic icon. Then repeat after me.");
          speakLine("Tap the girl. Click the Mic icon. Then repeat after me.", runNextLoadIntroStep, {
            role: "kid",
            rate: 0.96,
            pitch: 1.3,
            volume: 1
          });
        },
        () => {
          setConversationStatus("I am a baker.");
          speakLine("I am a baker.", runNextLoadIntroStep, {
            role: "male",
            rate: 0.92,
            pitch: 0.9,
            volume: 1
          });
        },
        () => {
          showLine(0);
          setConversationStatus("What do you make?");
          speakLine("What do you make?", runNextLoadIntroStep, {
            role: "kid",
            rate: 0.98,
            pitch: 1.35,
            volume: 1
          });
        },
        () => {
          showLine(1);
          setConversationStatus("I make cookies.");
          speakLine("I make cookies.", runNextLoadIntroStep, {
            role: "male",
            rate: 0.92,
            pitch: 0.9,
            volume: 1
          });
        },
        () => {
          circleTapped = true;
          if (circleReveal) circleReveal.classList.add("show");
          setConversationStatus("It's a Circle!");
          speakLine("It's a Circle!", null, {
            role: "kid",
            rate: 1,
            pitch: 1.35,
            volume: 1
          });
        }
      ];

      let stepIndex = 0;
      function runNextLoadIntroStep(){
        const step = steps[stepIndex++];
        if (step) {
          window.setTimeout(step, 120);
        }
      }
      window.setTimeout(runNextLoadIntroStep, 120);
    }

    function playInstructionThenDialogue(){
      if (loadIntroStarted) return;
      loadIntroStarted = true;
      let sequenceTriggered = false;
      const startSequence = () => {
        if (sequenceTriggered) return;
        sequenceTriggered = true;
        runPageHintAndLessonSequence();
      };

      hideAllLines();
      setConversationStatus("Listen to the instruction audio.");
      bindInstructionGestureRetry(playInstructionThenDialogue);

      instructionAudio.onended = () => {
        startSequence();
      };
      instructionAudio.onerror = () => {
        startSequence();
      };

      window.setTimeout(startSequence, 3600);

      try {
        instructionAudio.currentTime = 0;
        const playAttempt = instructionAudio.play();
        if (playAttempt && typeof playAttempt.catch === "function") {
          playAttempt.then(() => {
            setConversationStatus("Instruction audio is playing.");
          });
          playAttempt.catch(() => {
            startSequence();
          });
        }
      } catch (_err) {
        startSequence();
      }
    }

    function highlightLine(index, on){
      const line = lines[index];
      if (!line) return;
      const bubble = line.querySelector(".bubble");
      if (!bubble) return;
      bubble.classList.toggle("sparkle", on);
    }

    function setStars(index, count){
      const row = starRows[index];
      if (!row) return;
      row.innerHTML = new Array(count).fill("&#9733;").join("");
    }

    function setConversationStatus(text){
      if (!conversationStatus) return;
      conversationStatus.textContent = text || "";
    }

    function clearConversation(){
      hideAllLines();
      currentLineIndex = -1;
      repeatNext = false;
      attempts[0] = 0;
      attempts[1] = 0;
      starsAwarded[0] = 0;
      starsAwarded[1] = 0;
      micStepIndex = 0;
      micPhase = "reveal";
      micBusy = false;
      micDone = false;
      micInitialized = false;
      activitySaved = false;
      circleTapped = false;

      if (circleReveal) circleReveal.classList.remove("show");

      repeatResults.forEach(el => { if (el) el.textContent = ""; });
      starRows.forEach(el => { if (el) el.textContent = ""; });
      lines.forEach(line => {
        const bubble = line.querySelector(".bubble");
        if (bubble) bubble.classList.remove("sparkle");
      });
      setConversationStatus("");
    }

    function revealBubblesFromMic(){
      micIconBtn.dataset.gpMicSeqBound = "1";
      if (!micInitialized) {
        if (lines[0]) showLine(0);
        if (lines[1]) {
          lines[1].hidden = true;
          lines[1].classList.remove("show");
          lines[1].style.display = "none";
        }
        micInitialized = true;
      }
      currentLineIndex = micStepIndex;
    }

    function percentMatch(expectedText, saidText){
      return window.GPTracing.percentWordMatch(expectedText, saidText);
    }

    function listenForRepeat(expectedText, onDone){
      window.GPTracing.listenForRepeat(expectedText, onDone);
    }

    function stopSpeaking(){
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
      readToken += 1;
      hideAllLines();
    }

    function showAndSpeakLine(index){
      if (index < 0 || index >= lines.length) return;
      showLine(index);
      const line = lines[index];
      currentLineIndex = index;
      const bubble = line.querySelector(".bubble");
      if (bubble) speakLine(bubble.textContent || "");
    }

    async function moveToNextMicStep(){
      highlightLine(micStepIndex, false);
      micStepIndex += 1;
      micPhase = "reveal";
      micBusy = false;

      if (micStepIndex >= expectedLines.length) {
        micDone = true;

        const totalStars = starsAwarded[0] + starsAwarded[1];
        const maxStars = expectedLines.length * 3;
        const score = Math.round((totalStars / maxStars) * 100);

        if (totalStars > 0) {
          const remarks = [
            "Wow! You are super smart!",
            "Amazing Job",
            "Great Try! keep it up!!!"
          ];
          const remark = remarks[Math.floor(Math.random() * remarks.length)];
          const chime = new Audio("../../../../assets/audio/chimes/chime.mp3");
          chime.preload = "auto";
          chime.play().catch(() => {});
          setConversationStatus(remark);
          speakLine(remark);
        } else {
          setConversationStatus("");
        }

        if (typeof window.finishAndSave === "function" && !activitySaved) {
          activitySaved = true;
          await window.finishAndSave({
            pageId: "LA2",
            level: "A",
            activityType: "speaking",
            score,
            stars: Math.min(5, Math.max(1, Math.round(totalStars / 2))),
            skills: {
              reading: circleTapped ? 1 : 0,
              writing: 0,
              speaking: totalStars >= 4 ? 3 : totalStars >= 2 ? 2 : totalStars >= 1 ? 1 : 0,
              listening: totalStars >= 4 ? 3 : totalStars >= 2 ? 2 : totalStars >= 1 ? 1 : 0
            }
          });
        }
        return;
      }

      showAndSpeakLine(micStepIndex);
      setConversationStatus(expectedLines[micStepIndex]);
      micPhase = "repeat";
    }

    async function runMicStepFlow(){
      if (window.GPTracing?.prepareMicSupport) {
        await window.GPTracing.prepareMicSupport().catch(() => {});
      }
      if (micDone || micBusy) return;
      if (!micInitialized) revealBubblesFromMic();

      if (micPhase === "reveal") {
        showAndSpeakLine(micStepIndex);
        setConversationStatus(expectedLines[micStepIndex]);
        micPhase = "repeat";
        return;
      }

      highlightLine(micStepIndex, true);
      micBusy = true;
      setConversationStatus("Repeat after me.");

      speakLine("Repeat after me.", () => {
        listenForRepeat(expectedLines[micStepIndex], (pct, said) => {
          const tryNo = ++attempts[micStepIndex];

          if (pct >= 50) {
            if (repeatResults[micStepIndex]) {
              repeatResults[micStepIndex].style.color = "#2f9f5f";
              repeatResults[micStepIndex].textContent = (said || expectedLines[micStepIndex]).trim();
            }
            starsAwarded[micStepIndex] = window.GPTracing.rewardStars(tryNo);
            setStars(micStepIndex, starsAwarded[micStepIndex]);
            setConversationStatus("Great speaking. Get ready for the next bubble.");
            setTimeout(() => { moveToNextMicStep(); }, 900);
            return;
          }

          if (tryNo >= maxAttempts) {
            if (repeatResults[micStepIndex]) {
              repeatResults[micStepIndex].style.color = "#c62828";
              repeatResults[micStepIndex].textContent = "You did a good Job. Nice try!";
            }
            starsAwarded[micStepIndex] = 0;
            setStars(micStepIndex, 0);
            speakLine("You did a good Job. Nice try!", () => setTimeout(() => { moveToNextMicStep(); }, 900));
            return;
          }

          micBusy = false;
          micPhase = "repeat";
          if (repeatResults[micStepIndex]) {
            repeatResults[micStepIndex].style.color = "#c62828";
            repeatResults[micStepIndex].textContent = "Sorry, try again!";
          }
          setConversationStatus("Sorry, try again!");
          speakLine("Sorry, try again!");
        });
      });
    }

    function revealCircleFromGirl(){
      circleTapped = true;
      if (circleReveal) circleReveal.classList.add("show");
      setConversationStatus("It's a Circle");
      speakLine("It's a Circle");
    }

    window.__GP_DISABLE_UNIFIED_MIC_PROTOCOL = true;
    window.__GP_DISABLE_SHARED_MIC_GUIDE__ = true;

    function readAllLines(){
      if (currentLineIndex === -1) {
        hideAllLines();
        readToken += 1;
        currentLineIndex = 0;
        repeatNext = true;
        showAndSpeakLine(currentLineIndex);
        return;
      }

      if (repeatNext) {
        showAndSpeakLine(currentLineIndex);
        repeatNext = false;
        return;
      }

      if (currentLineIndex + 1 < lines.length) {
        currentLineIndex += 1;
        repeatNext = true;
        showAndSpeakLine(currentLineIndex);
      }
    }

    hideAllLines();
    try { window.__GP_STOP_INTRO_MEDIA && window.__GP_STOP_INTRO_MEDIA(); } catch (_) {}
    window.addEventListener("load", () => {
      playInstructionThenDialogue();
    }, { once: true });

    function setRecordLabel(text){
      recordBtn.innerHTML = '<svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">' +
        '<path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>' +
        '<path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '</svg> ' + text;
    }

    async function toggleRecord(){
      if (recorder && recorder.state === "recording") {
        recorder.stop();
        setRecordLabel("Record");
        if (recordingStatus) recordingStatus.textContent = "Saved recording.";
        return;
      }

      try{
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          if (recordingStatus) recordingStatus.textContent = "Microphone not available in this browser.";
          return;
        }
        if (!window.MediaRecorder) {
          if (recordingStatus) recordingStatus.textContent = "Recording not supported on this device.";
          return;
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });

        recordedChunks = [];
        const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
          ? "audio/webm;codecs=opus"
          : (MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "");

        recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);

        recorder.ondataavailable = (e) => {
          if (e.data.size > 0) recordedChunks.push(e.data);
        };

        recorder.onstop = () => {
          const type = recorder.mimeType || "audio/webm";
          const blob = new Blob(recordedChunks, { type });
          recordingPlayback.src = URL.createObjectURL(blob);
          recordingPlayback.muted = false;
          recordingPlayback.volume = 1;
          recordingPlayback.load();
          stream.getTracks().forEach(t => t.stop());
        };

        recorder.start();
        setRecordLabel("Stop recording");
        if (recordingStatus) recordingStatus.textContent = "Recording... speak clearly.";
      }catch(e){
        setRecordLabel("Record");
        if (recordingStatus) recordingStatus.textContent = "Microphone permission denied.";
      }
    }

    if (clearBtn) {
      clearBtn.addEventListener("click", clearConversation);
    }

    if (tapGirl) {
      tapGirl.addEventListener("click", revealCircleFromGirl);
    }

    if (recordBtn) {
      recordBtn.addEventListener("click", toggleRecord);
    }

    async function savePageProgressBeforeLeave(){
      if (typeof window.finishAndSave === "function" && !activitySaved) {
        await window.finishAndSave({
          pageId: "LA2",
          level: "A",
          activityType: "lesson",
          score: micDone ? null : (circleTapped ? 40 : 10),
          stars: micDone ? 0 : (circleTapped ? 1 : 0),
          skills: {
            reading: circleTapped ? 1 : 0,
            writing: 0,
            speaking: 0,
            listening: 0
          }
        });
        activitySaved = true;
      }
    }

    function stopPageAudioImmediately(){
      try { instructionAudio.pause(); } catch (_) {}
      try { instructionAudio.currentTime = 0; } catch (_) {}
      if ("speechSynthesis" in window) {
        try { window.speechSynthesis.cancel(); } catch (_) {}
      }
      try { window.__BgMusicManager && window.__BgMusicManager.stopAllBgMusic(); } catch (_) {}
    }

    async function navigateToPage(target){
      stopPageAudioImmediately();
      await savePageProgressBeforeLeave();
      window.location.href = target;
    }

    window.addEventListener("pagehide", stopPageAudioImmediately);
    window.addEventListener("beforeunload", stopPageAudioImmediately);

    if (nextBtn) {
      nextBtn.addEventListener("click", async (e) => {
        if (e) {
          e.preventDefault();
          e.stopPropagation();
        }
        await navigateToPage("../wednesday/LA3.html");
      });
    }

    if (prevBtn) {
      prevBtn.addEventListener("click", async (e) => {
        if (e) {
          e.preventDefault();
          e.stopPropagation();
        }
        await navigateToPage("../monday/CircleArtClass.html");
      });
    }

    if (micIconBtn) {
      micIconBtn.addEventListener("click", (e) => {
        if (e) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
        runMicStepFlow();
      });
    }
  </script>

  <script>
    (function(){
      const homeBtn = document.querySelector('.home-btn');
      if(!homeBtn) return;
      const chime = new Audio("../../../../assets/audio/chimes/chime.mp3");
      chime.preload = "auto";

      homeBtn.addEventListener('click', async (e) => {
        e.preventDefault();

        try{
          chime.currentTime = 0;
          const p = chime.play();
          if (p && typeof p.catch === "function") p.catch(() => {});
        }catch(e){}

        await navigateToPage(homeBtn.getAttribute("href") || "../../../../index.html");
      });

  </script>

  <script src="../../../../activity-standardizer.js"></script>

  <script type="module">
    import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";

    function getStudentSession(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
      }catch(e){
        return null;
      }
    }

    function inferProgressMeta(payload){
      const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
      const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
      const level = (payload && payload.level)
        || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
      const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
      const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
      const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
      const month = payload && payload.month != null ? Number(payload.month) : 1;
      return {
        pageId,
        file,
        level,
        week: Number.isFinite(week) && week > 0 ? week : 1,
        month: Number.isFinite(month) && month > 0 ? month : 1
      };
    }

    function getActivityStore(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      }catch(e){
        return {};
      }
    }

    function setActivityStore(store){
      try{
        localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
      }catch(e){}
    }

    function saveLocalActivityFallback(payload){
      const session = getStudentSession() || {};
      const meta = inferProgressMeta(payload || {});
      const score = payload && typeof payload.score === "number" ? payload.score : 0;
      const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
      const tracing = payload && typeof payload.tracing === "number"
        ? payload.tracing
        : (payload && typeof payload.progress === "number" ? payload.progress : 0);
      const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
      const entry = {
        pageId: meta.pageId,
        file: meta.file,
        level: meta.level,
        type,
        activityType: (payload && payload.activityType) || type,
        score,
        stars,
        skills: payload && payload.skills ? payload.skills : {},
        completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
        tracing,
        week: meta.week,
        month: meta.month,
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
        savedAt: new Date().toISOString(),
        ts: Date.now()
      };
      const store = getActivityStore();
      store[meta.pageId] = {
        ...(store[meta.pageId] || {}),
        ...entry
      };
      setActivityStore(store);
      try{
        localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
      }catch(e){}
      return store[meta.pageId];
    }

    async function finishAndSave(payload){
      const session = getStudentSession() || {};
      const fullPayload = {
        ...(payload || {}),
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
      };

      saveLocalActivityFallback(fullPayload);

      if (typeof window.finishActivity === "function") {
        try{
          await window.finishActivity(fullPayload);
        }catch(err){
          console.warn("finishActivity failed, local fallback already saved:", err);
        }
      }

      return fullPayload;
    }

    window.finishAndSave = finishAndSave;
  </script>

<script>
  /* Cloudinary intro video */
  const introOverlay = document.getElementById("introVideoWrap");
  const introVideo = document.getElementById("introVideo");
  const soundToggleBtn = document.getElementById("soundToggleBtn");
  const skipIntroBtn = document.getElementById("skipIntroBtn");
  const introHelp = document.getElementById("introHelp");
  let introSoundOn = false;
  let introClosed = false;

  document.body.classList.add("intro-active");

  function revealIntroAndPage(){
    if (introClosed) return;
    introClosed = true;
    if (introVideo) {
      try { introVideo.pause(); } catch(e) {}
    }
    if (introOverlay) {
      introOverlay.style.display = "none";
    }
    document.body.classList.remove("intro-active");
    document.body.style.overflowY = "auto";
    requestAnimationFrame(() => window.scrollTo(0, 0));
    const card = document.querySelector('.card');
    if (card) card.style.transform = "none";
    window.dispatchEvent(new Event("gp:intro-end"));
  }

  async function tryMutedAutoplay(){
    if (!introVideo) {
      revealIntroAndPage();
      return;
    }
    try{
      introVideo.muted = true;
      introVideo.defaultMuted = true;
      await introVideo.play();
      if (introHelp) introHelp.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
    }catch(e){
      if (introHelp) introHelp.textContent = 'Autoplay was blocked. Tap "Turn On Sound" or "Skip Intro".';
    }
  }

  if (soundToggleBtn) {
    soundToggleBtn.addEventListener("click", async () => {
      if (!introVideo) return;
      try{
        introSoundOn = !introSoundOn;
        introVideo.muted = !introSoundOn;
        introVideo.defaultMuted = !introSoundOn;
        await introVideo.play();
        soundToggleBtn.textContent = introSoundOn ? "Turn Off Sound" : "Turn On Sound";
        if (introHelp) {
          introHelp.textContent = introSoundOn
            ? 'Sound is on. Tap "Skip Intro" to continue.'
            : 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
        }
      }catch(e){
        if (introHelp) introHelp.textContent = 'Tap the video once, then tap "Turn On Sound".';
      }
    });
  }

  if (skipIntroBtn) {
    skipIntroBtn.addEventListener("click", revealIntroAndPage);
  }

  if (introVideo) {
    introVideo.addEventListener("loadedmetadata", tryMutedAutoplay, { once:true });
    introVideo.addEventListener("ended", revealIntroAndPage, { once:true });
    introVideo.addEventListener("error", () => {
      if (introHelp) introHelp.textContent = "Intro video failed to load. Opening page now.";
      setTimeout(revealIntroAndPage, 800);
    }, { once:true });

    setTimeout(() => {
      if (!introClosed) tryMutedAutoplay();
    }, 1200);
  } else {
    revealIntroAndPage();
  }

  setTimeout(() => {
    if (!introClosed) revealIntroAndPage();
  }, 60000);
</script>

<script>
  window.__GP_REQUIRE_INTRO_AUDIO__ = true;
  function finalizeLessonLayout(){
    document.body.classList.remove('intro-active');
    document.body.style.overflowY = "auto";
    requestAnimationFrame(() => window.scrollTo(0, 0));
    const card = document.querySelector('.card');
    if (card) card.style.transform = "none";
  }
  window.addEventListener('DOMContentLoaded', () => {
    const introVideo = document.getElementById('introVideo') || document.querySelector('.intro-video-wrap video');
    if (introVideo) {
      try {
        introVideo.muted = true;
        introVideo.defaultMuted = true;
        introVideo.volume = 1;
      } catch (e) {}
    }
    if (!introVideo) {
      finalizeLessonLayout();
    }
  }, { once:true });
  window.addEventListener('gp:intro-end', finalizeLessonLayout, { once:true });

  function fitCardToViewport(){
    window.GPTracing.fitElementToViewport('.card', {
      minWidth: 320,
      minHeight: 420,
      padding: 8,
      minScale: 0.62,
      isActive: () => document.body.classList.contains("intro-active")
    });
  }
  fitCardToViewport();

  window.addEventListener('resize', fitCardToViewport);

  if (window.visualViewport) window.visualViewport.addEventListener('resize', fitCardToViewport);
</script>

  }

  const progressFillEl = document.getElementById('progressFill');

  const miniPercents = [0,0,0,0];
  const miniResetFns = [];
  let aggregateCelebrated = false;
  let traceCompletedNotified = false;
  let combinedProgress = 0;

  const chimeAudio = new Audio("../../../../assets/audio/chimes/chime.mp3.mp3");
  chimeAudio.preload = "auto";

  function playChime(){
    try{
      chimeAudio.currentTime = 0;
      const p = chimeAudio.play();
      if (p && typeof p.catch === "function") p.catch(() => {});
    }catch(e){}
  }

  let speaking = false;

  function speak(text, onend){
    if(!("speechSynthesis" in window)) return;
    stopVoice();
    const u = new SpeechSynthesisUtterance(text);
    const voices = window.speechSynthesis.getVoices();
    const happyAmericanFemaleVoice =
      voices.find(v => /^en(-|_)?us/i.test(v.lang || "") && /aria|jenny|samantha|ava|female/i.test(v.name || "")) ||
      voices.find(v => /^en(-|_)?us/i.test(v.lang || "") && /zira|female/i.test(v.name || "")) ||
      voices.find(v => /^en(-|_)?us/i.test(v.lang || "")) ||
      voices.find(v => /jenny|samantha|ava|aria|zira|female/i.test(v.name || "")) ||
      voices.find(v => /^en(-|_)?(us|gb|au|ca)/i.test(v.lang || ""));
    if(happyAmericanFemaleVoice) u.voice = happyAmericanFemaleVoice;
    u.rate = 0.92;
    u.pitch = 1.08;
    speaking = true;

    u.onend = () => { speaking = false; if (onend) onend(); };
    u.onerror = () => { speaking = false; if (onend) onend(); };

    window.speechSynthesis.speak(u);
  }

  function stopVoice(){
    if("speechSynthesis" in window && speaking){
      window.speechSynthesis.cancel();
    }
    speaking = false;
  }

  function applyCombinedProgress(total){
    combinedProgress = Math.max(0, Math.min(100, Math.round(total)));
    progressPercentEl.textContent = combinedProgress + "%";
    progressFillEl.style.width = combinedProgress + "%";
    if (typeof window.__gpRealtimeSaveLA3 === "function") {
      window.__gpRealtimeSaveLA3(combinedProgress);
    }
  }

  const vertexEntry = window.GPVertexEntry?.create({
    mount: "#vertexEntryMount",
    title: "Write the number of vertices",
    prompt: "Write how many vertices a circle has.",
    showProgress: false,
    items: [
      {
        id: "circleVertices",
        label: "Circle",
        answer: 0,
        hint: "Write 0",
        successSpeech: "Correct. A circle has 0 vertices."
      }
    ],
    onProgress(state){
      applyCombinedProgress(state.totalProgress);
    }
  }) || null;

  function updateAggregate(){
    const baseTotal = miniPercents.reduce((a,b)=>a+b,0);
    const total = vertexEntry ? vertexEntry.setBaseProgress(baseTotal) : baseTotal;
    if (!vertexEntry) applyCombinedProgress(total);
    if (total >= 93 && !aggregateCelebrated){
      aggregateCelebrated = true;
      playChime();
      progressMessageEl.textContent = "Wow! you are super smart!";
      if (progressMessageOverlayEl) progressMessageOverlayEl.textContent = "Wow! you are super smart!";
      speak("Wow! you are super smart!");
      if (!traceCompletedNotified){
        traceCompletedNotified = true;
        window.dispatchEvent(new Event("gp:trace-complete"));
      }
    }

    if (total < 93){
      aggregateCelebrated = false;
      traceCompletedNotified = false;
    }
  }

  function resetAllMini(){
    miniResetFns.forEach(fn => fn());
    for(let i=0;i<miniPercents.length;i++){ miniPercents[i] = 0; }
    if (vertexEntry) vertexEntry.reset();
    updateAggregate();
  }

  const headlineLines = [
    { text: "They are Circles.", html: 'They are <span class="red-word">Circles</span>.' },
    { text: "A Circle has 0 vertices.", html: 'A <span class="red-word">Circle</span> has <span class="red-word">0 Vertices</span>.' }
  ];

  clearBtn.addEventListener('click', () => {
    resetAllMini();
    progressMessageEl.textContent = "";
    if (progressMessageOverlayEl) progressMessageOverlayEl.textContent = "";
  });

  stopBtn.addEventListener('click', () => stopVoice());

  readBtn.addEventListener('click', () => {
    const text = headlineLines.map(l => l.text).join(" ");
    speak(text);
  });

  prevBtn.addEventListener('click', () => { window.location.href = "LA2.html"; });
  nextBtn.addEventListener('click', () => { window.location.href = "../tuesday/LA4.html"; });

  function showSpark(){
    const boyRect = boyBtn.getBoundingClientRect();
    const targetRect = headlineEl.getBoundingClientRect();
    const startX = boyRect.left + boyRect.width / 2;
    const startY = boyRect.top + boyRect.height / 2;
    const endX = targetRect.left + targetRect.width / 2;
    const endY = targetRect.top + targetRect.height / 2;

    const dx = endX - startX;
    const dy = endY - startY;

    const spark = document.createElement("div");
    spark.className = "spark";
    spark.style.left = startX + "px";
    spark.style.top = startY + "px";
    spark.style.setProperty("--dx", dx + "px");
    spark.style.setProperty("--dy", dy + "px");
    document.body.appendChild(spark);
    spark.addEventListener("animationend", () => spark.remove());
  }

  let headlineToken = 0;

  function revealHeadlineLine(index, token){
    if (token !== headlineToken) return;
    if (index >= headlineLines.length) return;
    const lineEl = headlineEl.querySelector(`[data-line="${index}"]`);
    if (!lineEl) return;
    lineEl.classList.add("show");
    speak(headlineLines[index].text, () => {
      setTimeout(() => revealHeadlineLine(index + 1, token), 180);
    });
  }

  boyBtn.addEventListener('click', () => {
    headlineToken += 1;
    const token = headlineToken;
    headlineEl.innerHTML = headlineLines
      .map((line, i) => `<div class="headline-line" data-line="${i}">${line.html}</div>`)
      .join("");
    showSpark();
    playChime();
    setTimeout(() => revealHeadlineLine(0, token), 220);
  });

  if("speechSynthesis" in window){
    window.speechSynthesis.onvoiceschanged = () => {};
  }

  const miniConfigs = [
    { canvasId: "miniTrace1", pctId: "miniPct1", fillId: "miniFill1", msgId: "miniMsg1" },
    { canvasId: "miniTrace2", pctId: "miniPct2", fillId: "miniFill2", msgId: "miniMsg2" },
    { canvasId: "miniTrace3", pctId: "miniPct3", fillId: "miniFill3", msgId: "miniMsg3" },
    { canvasId: "miniTrace4", pctId: "miniPct4", fillId: "miniFill4", msgId: "miniMsg4" }
  ];

  function setupMiniTrace(cfg, index){
    const resetTrace = window.GPTracing.createCircleTracePad({
      canvasId: cfg.canvasId,
      pctId: cfg.pctId,
      fillId: cfg.fillId,
      msgId: cfg.msgId,
      maxPercent: 25,
      speak,
      onProgress: (percent) => {
        miniPercents[index] = percent;
        updateAggregate();
      },
      getMessage: (percent) => {
        if (percent < 15) return "Oh no! Try again!";
        if (percent <= 22) return "Good job but try again!";
        return "Wow! you are amazing!";
      }
    });
    if (resetTrace) miniResetFns.push(resetTrace);
  }

  miniConfigs.forEach((cfg, index) => setupMiniTrace(cfg, index));
  updateAggregate();

  window.addEventListener('load', () => {
    resetAllMini();
  });
</script>

<script src="../../../../activity-standardizer.js"></script>
<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
  let realtimeSaveTimer = null;
  window.__gpRealtimeSaveLA3 = function(score){
    if (typeof window.finishAndSave !== "function") return;
    if (realtimeSaveTimer) window.clearTimeout(realtimeSaveTimer);
    realtimeSaveTimer = window.setTimeout(() => {
      window.finishAndSave({
        pageId: "LA3",
        level: "A",
        activityType: "lesson",
        score: Math.max(0, Math.min(100, Math.round(score))),
        tracing: Math.max(0, Math.min(100, Math.round(score))),
        stars: score >= 93 ? 3 : score >= 70 ? 2 : score >= 40 ? 1 : 0
      }).catch(() => {});
    }, 250);
  };

  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LA3",
    defaultLevel: "A",
    defaultActivityType: "lesson",
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);
    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}
    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };

    saveLocalActivityFallback(fullPayload);

    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }

    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>

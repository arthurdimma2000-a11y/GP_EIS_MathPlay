<!doctype html>
<html lang="en">
<head>
  <style id="gpLessonPrehide">
    .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
    .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}
    .convo-line.show,.speech-line.show,.dialog-line.show,.bubble-line.show,.bubble-left.show,.bubble-right.show,#bubbleLeft.show,#bubbleRight.show{display:block !important;}
    .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{
      font-size:clamp(13px,1.9vw,19px) !important;
      line-height:1.24 !important;
      max-width:min(52vw,420px) !important;
      white-space:nowrap !important;
      word-break:normal !important;
      overflow-wrap:normal !important;
    }
    @media (max-width:780px){
      .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{
        font-size:clamp(13px,3.6vw,17px) !important;
        max-width:min(62vw,280px) !important;
        line-height:1.2 !important;
        white-space:nowrap !important;
        word-break:normal !important;
        overflow-wrap:normal !important;
      }
    }
  </style>

  <script>
    document.documentElement.classList.add('gp-intro-video-pending');
    setTimeout(function(){
      document.documentElement.classList.remove('gp-intro-video-pending');
    }, 60000);
  </script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Level A - Count the Circles</title>

  <link rel="stylesheet" href="../../../../shared/css/base.css" />
  <link rel="stylesheet" href="../../../../shared/css/layout.css" />
  <link rel="stylesheet" href="../../../../shared/css/lesson.css" />

  <style>
    :root{
      --ink:#2d2d2d;
      --bg:#bfe9fb;
      --panel:#ffffff;
      --border:#d9b9f0;
      --accent:#6c4bbf;
      --bubble-kid:#d8ebff;
      --bubble-baker:#fde3c4;
      --btn-yellow:#f6da7b;
      --btn-orange:#ff8a5b;
      --btn-blue:#dfeaff;
      --shadow:0 10px 24px rgba(0,0,0,.08);

      --bubble-font:1.05rem;
      --bubble-max:420px;

      --nav-btn-h:54px;
      --nav-btn-pad-x:18px;
      --nav-btn-font:1rem;

      --mic-size:64px;

      font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    }

    *{box-sizing:border-box;}

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--ink);
    }

    body{
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:10px;
    }

    html.gp-intro-video-pending body > *:not(#gpIntroVideoOverlay){visibility:hidden !important;}

    .card{
      width:min(960px,100%);
      max-width:960px;
      border-radius:16px;
      padding:12px 12px 8px;
      overflow:hidden;
      position:relative;
    }

    .home-btn{
      position:fixed;
      top:10px;
      left:10px;
      z-index:20;
      display:inline-flex;
      width:78px;
      height:78px;
      align-items:center;
      justify-content:center;
      animation:homeSwingLA7 2.4s ease-in-out infinite;
    }

    .home-btn img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    @keyframes homeSwingLA7{
      0%{transform:translateY(30%) rotate(-6deg);}
      50%{transform:translateY(30%) rotate(8deg);}
      100%{transform:translateY(30%) rotate(-6deg);}
    }

    .poster-area{
      position:relative;
      width:min(820px,90vw);
      margin:6px auto 0;
      z-index:1;
    }

    .poster-img{
      width:min(820px,90vw);
      height:auto;
      display:block;
      filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
    }

    .row{
      display:flex;
      align-items:center;
      gap:10px;
      margin:18px 0;
      position:relative;
      z-index:4;
    }

    .row.right{
      justify-content:flex-end;
    }

    .convo-line{
      display:none;
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:7;
      margin:0;
      overflow:visible;
    }

    .convo-line.show{
      display:flex;
    }

    .convo-line .bubble-stack{
      position:absolute;
      z-index:8;
    }

    .bubble-stack{
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:flex-start;
    }

    .row.right .bubble-stack{
      align-items:flex-end;
    }

    .chef-bubble{
      left:6%;
      top:18%;
      max-width:36%;
      align-items:flex-start;
    }

    .boy-bubble{
      right:5%;
      top:58%;
      max-width:35%;
      align-items:flex-end;
    }

    .bubble{
      padding:12px 16px;
      border-radius:18px;
      position:relative;
      font-size:var(--bubble-font);
      line-height:1.24;
      white-space:nowrap;
      max-width:var(--bubble-max);
      box-shadow:0 8px 16px rgba(0,0,0,.16);
      overflow-wrap:normal;
      word-break:normal;
      min-height:46px;
      display:flex;
      align-items:center;
      font-weight:700;
    }

    .bubble.kid{background:var(--bubble-kid);}
    .bubble.baker{background:var(--bubble-baker);}

    .bubble.kid::after{
      content:"";
      position:absolute;
      right:-6px;
      top:14px;
      border-width:8px 0 8px 8px;
      border-style:solid;
      border-color:transparent transparent transparent var(--bubble-kid);
    }

    .bubble.baker::after{
      content:"";
      position:absolute;
      left:-6px;
      top:14px;
      border-width:8px 8px 8px 0;
      border-style:solid;
      border-color:transparent var(--bubble-baker) transparent transparent;
    }

    .bubble.sparkle{
      background:linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);
      box-shadow:0 0 12px rgba(255,214,0,.6), 0 0 18px rgba(255,105,180,.4);
      animation:sparklePulse 1.2s ease-in-out infinite;
    }

    @keyframes sparklePulse{
      0%,100%{filter:brightness(1);}
      50%{filter:brightness(1.12);}
    }

    .repeat-result{
      margin-top:4px;
      font-size:2.1rem !important;
      line-height:1.1;
      font-weight:900;
      color:#2f9f5f;
      min-height:1.2em;
    }

    .star-row{
      display:flex;
      gap:6px;
      margin-top:4px;
      font-weight:900;
      font-size:2.35rem !important;
      line-height:1;
      color:#ffd24a;
      text-shadow:
        0 2px 0 #b87900,
        0 4px 0 #8a5a00,
        0 8px 14px rgba(0,0,0,.28);
      min-height:1.15em;
    }

    .trace-layer{
      position:absolute;
      inset:0;
      pointer-events:auto;
      z-index:3;
      background:transparent;
    }

    .trace-canvas{
      position:absolute;
      pointer-events:auto;
      touch-action:none;
      z-index:4;
      background:transparent;
      border-radius:12px;
    }

    #trace1{ right:6.2%; top:29.4%; width:22.5%; height:17.5%; }
    #trace2{ right:6.0%; top:49.2%; width:22.8%; height:18.5%; }
    #trace3{ right:6.0%; top:69.0%; width:22.8%; height:18.5%; }

    .girl-sentence{
      margin-top:10px;
      text-align:center;
      font-size:1.5rem;
      font-weight:700;
      color:var(--ink);
      min-height:3.2em;
      transform:translateY(-15%);
    }

    .headline-line{
      opacity:0;
      transform:translateY(8px);
      transition:opacity .22s ease, transform .22s ease;
    }

    .headline-line.show{
      opacity:1;
      transform:translateY(0);
    }

    .controls{
      margin-top:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      font-size:.9rem;
    }

    .controls-row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .progress-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
    }

    .progress-bar{
      width:min(520px,92%);
      height:12px;
      border-radius:999px;
      background:#e7efff;
      overflow:hidden;
      box-shadow:inset 0 1px 3px rgba(0,0,0,.15);
    }

    .progress-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#3cc4ff,#7dffb3);
      transition:width .15s ease-out;
    }

    .progress-text{
      font-size:.9rem;
      font-weight:700;
      color:#3b3b3b;
    }

    .mascot-spot{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:#fff;
      border:2px solid #e8e0ff;
      border-radius:14px;
      padding:8px 12px;
      box-shadow:0 8px 16px rgba(0,0,0,.12);
      min-height:58px;
    }

    .tap-girl{
      width:46px;
      height:46px;
      border-radius:12px;
      object-fit:cover;
      cursor:pointer;
      display:block;
      flex:0 0 auto;
    }

    .mascot-hint{
      font-size:.98rem;
      font-weight:800;
      color:#2f9f5f;
      white-space:nowrap;
    }

    .button-row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:999px;
      min-height:var(--nav-btn-h);
      padding:0 var(--nav-btn-pad-x);
      font-size:var(--nav-btn-font);
      font-weight:800;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(0,0,0,.15);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      line-height:1;
      min-width:150px;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .btn.prev{background:#f8f0c7;color:#9c7b2f;}
    .btn.next{background:var(--btn-yellow);color:#8b5a00;}
    .btn.stop{background:var(--btn-blue);color:#1f3b6b;}

    .mic-icon-btn{
      width:var(--mic-size);
      height:var(--mic-size);
      border:none;
      background:transparent;
      padding:0;
      margin:0;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:50%;
      -webkit-tap-highlight-color:transparent;
    }

    .mic-icon-btn img{
      width:100%;
      height:100%;
      object-fit:contain;
      filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
      display:block;
    }

    .mic-icon-btn.is-busy{
      pointer-events:none;
      opacity:.75;
      transform:scale(.98);
    }

    .conversation-status{
      margin-top:8px;
      font-size:1rem;
      font-weight:800;
      color:#6c4bbf;
      min-height:1.3em;
      text-align:center;
    }

    #gpIntroVideoOverlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.92);
      z-index:99999;
      padding:16px;
      flex-direction:column;
      gap:14px;
    }
    #gpIntroVideoOverlay.active{display:flex;}

    #gpIntroVideo{
      width:min(92vw,980px);
      max-height:82vh;
      height:auto;
      display:block;
      border-radius:14px;
      background:#000;
      box-shadow:0 18px 48px rgba(0,0,0,.45);
    }

    .gp-intro-help{
      color:#fff;
      font-weight:800;
      font-size:1rem;
      text-align:center;
      text-shadow:0 2px 8px rgba(0,0,0,.45);
      max-width:min(92vw,760px);
    }

    .gp-intro-controls{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
    }

    .gp-intro-btn{
      border:none;
      border-radius:999px;
      padding:12px 22px;
      font-size:1rem;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 6px 0 rgba(0,0,0,.22);
    }

    .gp-intro-btn.play{
      background:linear-gradient(180deg,#dff7ff,#8fdcff);
      color:#114a67;
      display:none;
    }

    .gp-intro-btn.sound{
      background:linear-gradient(180deg,#fffad7,#ffd86a);
      color:#8b5a00;
    }

    .gp-intro-btn.skip{
      background:linear-gradient(180deg,#ffffff,#e9eef7);
      color:#304060;
    }

    @media (max-width:780px){
      :root{
        --bubble-font:1.08rem;
        --nav-btn-h:52px;
        --nav-btn-pad-x:16px;
        --nav-btn-font:.97rem;
        --mic-size:60px;
      }

      .chef-bubble{left:4.5%;top:17%;max-width:41%;}
      .boy-bubble{right:4.5%;top:60%;max-width:41%;}
      .home-btn{width:70px;height:70px;}

      #trace1{ right:6.0%; top:29.8%; width:23.4%; height:17.6%; }
      #trace2{ right:5.8%; top:49.7%; width:23.7%; height:18.7%; }
      #trace3{ right:5.8%; top:69.5%; width:23.7%; height:18.7%; }
    }

    @media (max-width:520px){
      :root{
        --bubble-font:.98rem;
        --bubble-max:280px;
        --nav-btn-h:50px;
        --nav-btn-font:.93rem;
        --mic-size:58px;
      }

      .card{
        width:100%;
        padding:12px 12px 10px;
        border-radius:12px;
      }

      .bubble{
        padding:9px 11px;
        max-width:min(62vw,280px);
        min-height:42px;
      }

      .chef-bubble{left:3.5%;top:15%;max-width:46%;}
      .boy-bubble{right:3.5%;top:62%;max-width:46%;}

      #trace1{ right:5.6%; top:30.2%; width:24.2%; height:17.8%; }
      #trace2{ right:5.5%; top:50.0%; width:24.4%; height:18.9%; }
      #trace3{ right:5.5%; top:69.8%; width:24.4%; height:18.9%; }

      .mascot-spot{
        width:100%;
        justify-content:center;
      }

      .button-row .btn{
        min-width:136px;
      }

      .home-btn{
        width:64px;
        height:64px;
        top:8px;
        left:8px;
      }
    }
  </style>
</head>
<body>
  <div id="gpIntroVideoOverlay" class="active" aria-label="Intro video">
    <video
      id="gpIntroVideo"
      preload="metadata"
      playsinline
      webkit-playsinline
      autoplay
      muted
      poster="../../../../assets/images/shapes/A7a.png"
    >
      <source src="https://res.cloudinary.com/dtknykrkf/video/upload/f_auto:video,q_auto/v1774463108/LA7avideo_ntj3lt.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="gp-intro-help" id="gpIntroHelp">Loading intro video...</div>
    <div class="gp-intro-controls">
      <button class="gp-intro-btn play" id="gpIntroPlayBtn" type="button">Play Intro</button>
      <button class="gp-intro-btn sound" id="gpIntroSoundBtn" type="button">Turn On Sound</button>
      <button class="gp-intro-btn skip" id="gpIntroSkipBtn" type="button">Skip Intro</button>
    </div>
  </div>

  <div class="card">
    <a class="home-btn" href="../../../../index.html" aria-label="Home">
      <img src="../../../../assets/images/avatars/Home1.png" alt="Home">
    </a>

    <div class="poster-area" id="posterArea">
      <img class="poster-img" id="posterImg" src="../../../../assets/images/shapes/A7a.png" alt="Numbers poster">

      <div class="row convo-line">
        <div class="bubble-stack chef-bubble">
          <div class="bubble baker">Let&apos;s count the circles!</div>
          <div class="repeat-result" id="bakerRepeat"></div>
          <div class="star-row" id="bakerStars"></div>
        </div>
      </div>

      <div class="row right convo-line">
        <div class="bubble-stack boy-bubble">
          <div class="bubble kid">One, two, three</div>
          <div class="repeat-result" id="kidRepeat"></div>
          <div class="star-row" id="kidStars"></div>
        </div>
      </div>

      <div class="trace-layer">
        <canvas class="trace-canvas" id="trace1"></canvas>
        <canvas class="trace-canvas" id="trace2"></canvas>
        <canvas class="trace-canvas" id="trace3"></canvas>
      </div>
    </div>

    <div class="girl-sentence" id="girlSentence"></div>

    <div class="controls">
      <div class="progress-wrap">
        <div class="progress-text">Trace progress: <span id="progressPercent">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>

      <div class="controls-row">
        <div class="mascot-spot">
          <img src="../../../../assets/images/shapes/CirckleGirlWk1.png" alt="Circle helper girl" id="girlBtn" class="tap-girl">
          <div class="mascot-hint">Tap the girl</div>
        </div>

        <div class="button-row">
          <button class="btn prev" id="prevBtn" type="button">&#8592; Previous page</button>
          <button class="btn next" id="nextBtn" type="button">Next page &#8594;</button>
          <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
            <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone">
          </button>
          <button class="btn stop" id="clearBtn" type="button">Clear</button>
        </div>
      </div>
    </div>

    <div class="conversation-status" id="conversationStatus"></div>
  </div>

  <script src="../../../../shared/js/storage.js"></script>
  <script src="../../../../shared/js/progress.js"></script>
  <script src="../../../../shared/js/tracing.js"></script>

  <script>
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const clearBtn = document.getElementById('clearBtn');
    const girlBtn = document.getElementById('girlBtn');
    const bakerRepeat = document.getElementById('bakerRepeat');
    const bakerStars = document.getElementById('bakerStars');
    const kidRepeat = document.getElementById('kidRepeat');
    const kidStars = document.getElementById('kidStars');
    const micIconBtn = document.getElementById('micIconBtn');
    const girlSentenceEl = document.getElementById('girlSentence');
    const conversationStatus = document.getElementById('conversationStatus');
    const posterArea = document.getElementById('posterArea');
    const posterImg = document.getElementById('posterImg');

    const lines = Array.from(document.querySelectorAll(".convo-line"));
    const repeatResults = [bakerRepeat, kidRepeat];
    const starRows = [bakerStars, kidStars];

    const chimeAudio = new Audio("../../../../assets/audio/chimes/chime.mp3.mp3");
    chimeAudio.preload = "auto";
    chimeAudio.volume = 1;

    let audioUnlocked = false;
    let sentenceToken = 0;

    const expectedLines = ["Let's count the circles!", "One, two, three"];
    const attempts = [0,0];
    const starsAwarded = [0,0];
    const maxAttempts = 3;

    let currentLineIndex = 0;
    let micPhase = "reveal";
    let micBusy = false;
    let micDone = false;
    let micInitialized = false;

    const progressPercentEl = document.getElementById('progressPercent');
    const progressFillEl = document.getElementById('progressFill');
    const tracePercents = [0,0,0];
    const traceResets = [];
    let traceCelebrated = false;
    let traceCompletedNotified = false;
    let lastTraceSound = 0;
    let traceSetupDone = false;

    function unlockAudio(){
      if (audioUnlocked) return;
      audioUnlocked = true;
      try{
        chimeAudio.muted = true;
        const p = chimeAudio.play();
        if (p && typeof p.then === "function") {
          p.then(() => {
            chimeAudio.pause();
            chimeAudio.currentTime = 0;
            chimeAudio.muted = false;
          }).catch(() => {
            chimeAudio.muted = false;
          });
        } else {
          chimeAudio.pause();
          chimeAudio.currentTime = 0;
          chimeAudio.muted = false;
        }
      }catch(e){
        chimeAudio.muted = false;
      }
    }

    function playChime(){
      unlockAudio();
      try{
        const sound = chimeAudio.cloneNode(true);
        sound.currentTime = 0;
        const p = sound.play();
        if (p && typeof p.catch === "function") p.catch(() => {});
      }catch(e){}
    }

    function setConversationStatus(text){
      if (conversationStatus) conversationStatus.textContent = text || "";
    }

    function lockMic(state){
      micBusy = !!state;
      if (micIconBtn) micIconBtn.classList.toggle("is-busy", !!state);
    }

    function hideAllLines(){
      lines.forEach(line => {
        line.classList.remove("show");
        line.hidden = true;
        line.style.display = "none";
      });
    }

    function showLine(index){
      const line = lines[index];
      if (!line) return;
      line.hidden = false;
      line.classList.add("show");
      line.style.display = "flex";
    }

    function highlightLine(index, on){
      const line = lines[index];
      if (!line) return;
      const bubble = line.querySelector(".bubble");
      if (!bubble) return;
      bubble.classList.toggle("sparkle", !!on);
    }

    function clearHighlights(){
      lines.forEach(line => {
        const bubble = line.querySelector(".bubble");
        if (bubble) bubble.classList.remove("sparkle");
      });
    }

    function setStars(index, count){
      const row = starRows[index];
      if (!row) return;
      row.innerHTML = new Array(count).fill("&#9733;").join("");
    }

    function setRepeatText(index, text){
      const el = repeatResults[index];
      if (!el) return;
      el.textContent = text || "";
    }

    function stopSpeaking(){
      try{
        if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      }catch(_){}
    }

    function speak(text, onend){
      stopSpeaking();
      if(!("speechSynthesis" in window)){
        if (typeof onend === "function") onend();
        return;
      }
      const u = new SpeechSynthesisUtterance(text || "");
      if (window.GPTracing && typeof window.GPTracing.applyPreferredVoice === "function") {
        window.GPTracing.applyPreferredVoice(u);
      } else {
        u.lang = "en-US";
      }
      u.rate = 0.94;
      u.pitch = 1.08;
      u.onend = () => { if (typeof onend === "function") onend(); };
      u.onerror = () => { if (typeof onend === "function") onend(); };
      window.speechSynthesis.speak(u);
    }

    function showAndSpeakLine(index, onend){
      if (index < 0 || index >= lines.length) {
        if (typeof onend === "function") onend();
        return;
      }
      showLine(index);
      currentLineIndex = index;
      const bubble = lines[index].querySelector(".bubble");
      const text = bubble ? bubble.textContent.trim() : "";
      setConversationStatus(text);
      speak(text, onend);
    }

    function prepareMicUI(){
      if (!micInitialized) {
        hideAllLines();
        showLine(0);
        if (lines[1]) {
          lines[1].hidden = true;
          lines[1].classList.remove("show");
          lines[1].style.display = "none";
        }
        micInitialized = true;
        currentLineIndex = 0;
        micPhase = "reveal";
      }
    }

    function listenForRepeat(expectedText, onDone){
      if (window.GPTracing && typeof window.GPTracing.listenForRepeat === "function") {
        window.GPTracing.listenForRepeat(expectedText, onDone);
        return;
      }
      onDone(0, "");
    }

    async function finishMicActivity(){
      if (micDone) return;
      micDone = true;
      playChime();
      const remarks = ["Wow! You are super smart!", "Amazing job!", "Great! Keep it up."];
      const remark = remarks[Math.floor(Math.random() * remarks.length)];
      setConversationStatus(remark);
      speak(remark);
      window.dispatchEvent(new CustomEvent("gp:mic-complete"));
    }

    async function goToNextMicLine(){
      highlightLine(currentLineIndex, false);
      const nextIndex = currentLineIndex + 1;
      micPhase = "reveal";
      lockMic(false);

      if (nextIndex >= expectedLines.length) {
        await finishMicActivity();
        return;
      }

      currentLineIndex = nextIndex;
      showAndSpeakLine(currentLineIndex);
      micPhase = "repeat";
    }

    async function runMicSequence(){
      unlockAudio();
      if (window.GPTracing?.prepareMicSupport) {
        await window.GPTracing.prepareMicSupport().catch(() => {});
      }
      if (micDone || micBusy) return;

      prepareMicUI();

      if (micPhase === "reveal") {
        lockMic(true);
        showAndSpeakLine(currentLineIndex, () => {
          setConversationStatus("Tap microphone again and repeat.");
          micPhase = "repeat";
          lockMic(false);
        });
        return;
      }

      if (micPhase !== "repeat") return;

      lockMic(true);
      highlightLine(currentLineIndex, true);
      setConversationStatus("Repeat after me.");

      speak("Repeat after me.", () => {
        listenForRepeat(expectedLines[currentLineIndex], (pct, said) => {
          const tryNo = ++attempts[currentLineIndex];

          if (pct >= 50) {
            setRepeatText(currentLineIndex, (said || expectedLines[currentLineIndex]).trim());
            starsAwarded[currentLineIndex] =
              window.GPTracing && typeof window.GPTracing.rewardStars === "function"
                ? window.GPTracing.rewardStars(tryNo)
                : (tryNo === 1 ? 3 : tryNo === 2 ? 2 : 1);
            setStars(currentLineIndex, starsAwarded[currentLineIndex]);
            setConversationStatus("Excellent!");
            setTimeout(() => { goToNextMicLine(); }, 250);
            return;
          }

          if (tryNo >= maxAttempts) {
            setRepeatText(currentLineIndex, "Sorry, Study hard!");
            setStars(currentLineIndex, 0);
            speak("Sorry, Study hard!", () => {
              setTimeout(() => { goToNextMicLine(); }, 250);
            });
            return;
          }

          highlightLine(currentLineIndex, false);
          lockMic(false);
          micPhase = "repeat";
          setRepeatText(currentLineIndex, "Sorry, try again!");
          setConversationStatus("Sorry, try again!");
          speak("Sorry, try again!");
        });
      });
    }

    const sentenceLines = [
      { text: "Let's count the circles.", html: "Let’s count the circles." },
      { text: "One, two, three", html: "One, two, three" }
    ];

    function showSpark(){
      const girlRect = girlBtn.getBoundingClientRect();
      const targetRect = girlSentenceEl.getBoundingClientRect();
      const startX = girlRect.left + girlRect.width / 2;
      const startY = girlRect.top + girlRect.height / 2;
      const endX = targetRect.left + targetRect.width / 2;
      const endY = targetRect.top + targetRect.height / 2;
      const dx = endX - startX;
      const dy = endY - startY;

      const spark = document.createElement("div");
      spark.style.position = "fixed";
      spark.style.width = "18px";
      spark.style.height = "18px";
      spark.style.borderRadius = "50%";
      spark.style.background = "radial-gradient(circle,#fff799 0%,#ffd54f 60%,rgba(255,213,79,0) 100%)";
      spark.style.left = startX + "px";
      spark.style.top = startY + "px";
      spark.style.zIndex = "9998";
      spark.style.pointerEvents = "none";
      spark.animate([
        { transform:"translate(0,0) scale(.6)", opacity:1 },
        { transform:`translate(${dx}px,${dy}px) scale(1.2)`, opacity:0 }
      ], { duration:700, easing:"ease-out" });
      document.body.appendChild(spark);
      setTimeout(() => spark.remove(), 760);
    }

    function revealSentenceLine(index, token){
      if (token !== sentenceToken) return;
      if (index >= sentenceLines.length) return;
      const lineEl = girlSentenceEl.querySelector(`[data-line="${index}"]`);
      if (!lineEl) return;
      lineEl.classList.add("show");
      speak(sentenceLines[index].text, () => {
        setTimeout(() => revealSentenceLine(index + 1, token), 180);
      });
    }

    girlBtn.addEventListener('click', () => {
      unlockAudio();
      sentenceToken += 1;
      const token = sentenceToken;
      girlSentenceEl.innerHTML = sentenceLines
        .map((line, i) => `<div class="headline-line" data-line="${i}">${line.html}</div>`)
        .join("");
      showSpark();
      playChime();
      setTimeout(() => revealSentenceLine(0, token), 220);
    });

    if (micIconBtn) {
      micIconBtn.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        runMicSequence();
      }, { passive:false });
    }

    prevBtn.addEventListener('click', () => {
      window.location.href = "LA6.html";
    });

    nextBtn.addEventListener('click', () => {
      window.location.href = "LA8.html";
    });

    function updateTotal(){
      const raw = tracePercents.reduce((a,b)=>a+b,0) / tracePercents.length;
      const allDone = tracePercents.every(p => p >= 90);
      const total = Math.round(raw);
      progressPercentEl.textContent = total + "%";
      progressFillEl.style.width = total + "%";

      if (typeof window.__gpRealtimeSaveLA7 === "function") {
        window.__gpRealtimeSaveLA7(total);
      }

      if(allDone && !traceCelebrated){
        traceCelebrated = true;
        playChime();
        speak("Wow! great job!");
        if (!traceCompletedNotified) {
          traceCompletedNotified = true;
          window.dispatchEvent(new Event("gp:trace-complete"));
        }
      }

      if(!allDone){
        traceCelebrated = false;
        traceCompletedNotified = false;
      }
    }

    function playTraceTick(){
      try{
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if(!AudioCtx) return;
        const ctx = new AudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = 880;
        gain.gain.value = 0.055;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.045);
        osc.onended = () => ctx.close();
      }catch(e){}
    }

    function syncTraceCanvasResolution(){
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      document.querySelectorAll('.trace-canvas').forEach((canvas) => {
        const rect = canvas.getBoundingClientRect();
        const targetW = Math.max(1, Math.round(rect.width * dpr));
        const targetH = Math.max(1, Math.round(rect.height * dpr));
        if (canvas.width !== targetW || canvas.height !== targetH) {
          canvas.width = targetW;
          canvas.height = targetH;
        }
      });
    }

    function setupTrace(canvasId, points, index){
      const reset = window.GPTracing.createPathTracePad({
        canvasId,
        getPoints: () => points,
        lineWidth: 14,
        threshold: 24,
        onProgress: (pct) => {
          tracePercents[index] = pct;
          updateTotal();
        },
        onTick: () => {
          const now = performance.now();
          if (now - lastTraceSound > 110) {
            lastTraceSound = now;
            playTraceTick();
          }
        }
      });

      if (typeof reset === "function") {
        traceResets.push(() => {
          reset();
          tracePercents[index] = 0;
          updateTotal();
        });
      }
    }

    function initTracingOnce(){
      if (traceSetupDone) return;
      syncTraceCanvasResolution();

      setupTrace("trace1", window.GPTracing.getDigitTraceGroups("1"), 0);
      setupTrace("trace2", window.GPTracing.getDigitTraceGroups("2"), 1);
      setupTrace("trace3", window.GPTracing.getDigitTraceGroups("3"), 2);

      traceSetupDone = true;
      updateTotal();
    }

    function resetTracingOnly(){
      traceResets.forEach(fn => fn());
      syncTraceCanvasResolution();
      tracePercents[0] = 0;
      tracePercents[1] = 0;
      tracePercents[2] = 0;
      traceCelebrated = false;
      traceCompletedNotified = false;
      updateTotal();
    }

    function waitForPosterThenInit(){
      if (posterImg.complete) {
        requestAnimationFrame(() => {
          syncTraceCanvasResolution();
          initTracingOnce();
        });
      } else {
        posterImg.addEventListener('load', () => {
          requestAnimationFrame(() => {
            syncTraceCanvasResolution();
            initTracingOnce();
          });
        }, { once:true });
      }
    }

    clearBtn.addEventListener('click', () => {
      resetTracingOnly();
      hideAllLines();
      clearHighlights();
      currentLineIndex = 0;
      micPhase = "reveal";
      lockMic(false);
      micDone = false;
      micInitialized = false;
      attempts[0] = 0;
      attempts[1] = 0;
      starsAwarded[0] = 0;
      starsAwarded[1] = 0;
      setRepeatText(0, "");
      setRepeatText(1, "");
      setStars(0, 0);
      setStars(1, 0);
      setConversationStatus("");
    });

    hideAllLines();
    waitForPosterThenInit();

    window.addEventListener('resize', syncTraceCanvasResolution);
    if (window.visualViewport) window.visualViewport.addEventListener('resize', syncTraceCanvasResolution);

    if (window.ResizeObserver) {
      const ro = new ResizeObserver(() => {
        syncTraceCanvasResolution();
      });
      ro.observe(posterArea);
    }
  </script>

        isActive: () => document.documentElement.classList.contains("gp-intro-video-pending")

  <script src="../../../../activity-standardizer.js"></script>

  <script type="module">
    import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";

    let realtimeSaveTimer = null;
    window.__gpRealtimeSaveLA7 = function(score){
      if (typeof window.finishAndSave !== "function") return;
      if (realtimeSaveTimer) window.clearTimeout(realtimeSaveTimer);
      realtimeSaveTimer = window.setTimeout(() => {
        window.finishAndSave({
          pageId: "LA7",
          level: "A",
          activityType: "lesson",
          score: Math.max(0, Math.min(100, Math.round(score))),
          stars: score >= 90 ? 3 : score >= 70 ? 2 : score >= 40 ? 1 : 0
        }).catch(() => {});
      }, 250);
    };

    window.GPProgress.installTracker({
      saveActivityResult,
      markLoginPing,
      defaultPageId: "LA7",
      defaultLevel: "A",
      defaultActivityType: "lesson",
      defaultScore: 100,
      defaultStars: 1,
      defaultSkills: {
        reading: 1,
        writing: 0,
        speaking: 1,
        listening: 1
      }
    });

    function getStudentSession(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
      }catch(e){
        return null;
      }
    }

    function inferProgressMeta(payload){
      const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
      const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
      const level = (payload && payload.level)
        || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
      const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
      const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
      const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
      const month = payload && payload.month != null ? Number(payload.month) : 1;
      return {
        pageId,
        file,
        level,
        week: Number.isFinite(week) && week > 0 ? week : 1,
        month: Number.isFinite(month) && month > 0 ? month : 1
      };
    }

    function getActivityStore(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      }catch(e){
        return {};
      }
    }

    function setActivityStore(store){
      try{
        localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
      }catch(e){}
    }

    function saveLocalActivityFallback(payload){
      const session = getStudentSession() || {};
      const meta = inferProgressMeta(payload || {});
      const score = payload && typeof payload.score === "number" ? payload.score : 0;
      const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
      const tracing = payload && typeof payload.tracing === "number"
        ? payload.tracing
        : (payload && typeof payload.progress === "number" ? payload.progress : 0);
      const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";

      const entry = {
        pageId: meta.pageId,
        file: meta.file,
        level: meta.level,
        type,
        activityType: (payload && payload.activityType) || type,
        score,
        stars,
        skills: payload && payload.skills ? payload.skills : {},
        completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
        tracing,
        week: meta.week,
        month: meta.month,
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
        savedAt: new Date().toISOString(),
        ts: Date.now()
      };

      const store = getActivityStore();
      store[meta.pageId] = {
        ...(store[meta.pageId] || {}),
        ...entry
      };
      setActivityStore(store);

      try{
        localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
      }catch(e){}

      return store[meta.pageId];
    }

    async function finishAndSave(payload){
      const session = getStudentSession() || {};
      const fullPayload = {
        ...(payload || {}),
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
      };

      saveLocalActivityFallback(fullPayload);

      if (typeof window.finishActivity === "function") {
        try{
          await window.finishActivity(fullPayload);
        }catch(err){
          console.warn("finishActivity failed, local fallback already saved:", err);
        }
      }

      return fullPayload;
    }

    window.finishAndSave = finishAndSave;
  </script>

  <script>
    (function(){
      const html = document.documentElement;
      const overlay = document.getElementById("gpIntroVideoOverlay");
      const video = document.getElementById("gpIntroVideo");
      const help = document.getElementById("gpIntroHelp");
      const playBtn = document.getElementById("gpIntroPlayBtn");
      const soundBtn = document.getElementById("gpIntroSoundBtn");
      const skipBtn = document.getElementById("gpIntroSkipBtn");

      if (!overlay || !video || !help || !playBtn || !soundBtn || !skipBtn) {
        html.classList.remove("gp-intro-video-pending");
        return;
      }

      let revealed = false;
      let hardTimeout = setTimeout(revealLesson, 60000);

      function revealLesson(){
        if (revealed) return;
        revealed = true;
        clearTimeout(hardTimeout);
        try { video.pause(); } catch(_){}
        overlay.classList.remove("active");
        overlay.style.display = "none";
        html.classList.remove("gp-intro-video-pending");
      }

      function showPlayFallback(msg){
        help.textContent = msg || 'Tap "Play Intro" to start the video.';
        playBtn.style.display = "inline-flex";
      }

      async function tryAutoplayMuted(){
        try{
          video.muted = true;
          video.defaultMuted = true;
          await video.play();
          help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
          playBtn.style.display = "none";
        }catch(err){
          showPlayFallback('Autoplay was blocked. Tap "Play Intro" to start.');
        }
      }

      async function playWithSound(){
        try{
          video.muted = false;
          video.defaultMuted = false;
          video.volume = 1;
          await video.play();
          help.textContent = 'Sound is on. Tap "Skip Intro" to continue.';
          playBtn.style.display = "none";
        }catch(err){
          help.textContent = 'Tap "Play Intro" first, then tap "Turn On Sound".';
          playBtn.style.display = "inline-flex";
        }
      }

      playBtn.addEventListener("click", async () => {
        try{
          video.muted = true;
          video.defaultMuted = true;
          await video.play();
          help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
          playBtn.style.display = "none";
        }catch(err){
          help.textContent = "Unable to start the intro video.";
        }
      });

      soundBtn.addEventListener("click", playWithSound);
      skipBtn.addEventListener("click", revealLesson);

      video.addEventListener("playing", () => {
        help.textContent = video.muted
          ? 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".'
          : 'Sound is on. Tap "Skip Intro" to continue.';
      });

      video.addEventListener("ended", revealLesson, { once:true });

      video.addEventListener("error", () => {
        help.textContent = "Intro video failed to load. Opening page now.";
        setTimeout(revealLesson, 800);
      }, { once:true });

      video.addEventListener("loadedmetadata", () => {
        tryAutoplayMuted();
      }, { once:true });

      setTimeout(() => {
        if (!revealed && video.readyState >= 1) tryAutoplayMuted();
      }, 1200);
    })();
  </script>

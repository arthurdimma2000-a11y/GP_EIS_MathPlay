<!doctype html>
<html lang="en">
<head>
<style id="gpLessonPrehide">
  .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
  .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}
  .convo-line.show,.speech-line.show,.dialog-line.show,.bubble-line.show,.bubble-left.show,.bubble-right.show,#bubbleLeft.show,#bubbleRight.show{display:block !important;}
  .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{
    font-size:clamp(13px,1.9vw,19px) !important;
    line-height:1.24 !important;
    max-width:min(52vw,420px) !important;
    white-space:nowrap !important;
    word-break:normal !important;
    overflow-wrap:normal !important;
  }
  @media (max-width:780px){
    .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{
      font-size:clamp(13px,3.6vw,17px) !important;
      max-width:min(62vw,280px) !important;
      line-height:1.2 !important;
      white-space:nowrap !important;
      word-break:normal !important;
      overflow-wrap:normal !important;
    }
  }
</style>



<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Trace the number 1 – Circle Bear Cake</title>
<link rel="stylesheet" href="../../../../shared/css/base.css" />
<link rel="stylesheet" href="../../../../shared/css/layout.css" />
<link rel="stylesheet" href="../../../../shared/css/lesson.css" />

<style>
  :root{
    --sky:#bfe9fb;
    --panel:#ffffff;
    --ink:#3b3b3b;
    --blue:#3aa7e8;
    --soft-blue:#e6f2ff;
    --num-blue:#e4f0ff;
    --dash:#4c6ca6;
    --shadow:0 20px 40px rgba(0,0,0,.08);
    --bubble-kid:#d8ebff;
    --bubble-baker:#fde3c4;
    --btn-yellow:#f6da7b;
    --btn-orange:#ff8a5b;
    --btn-blue:#dfeaff;
    --accent:#6c4bbf;
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
  }

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--sky);
    padding:18px;
    color:var(--ink);
  }

  .card{
    position:relative;
    width:min(980px,96vw);
    border-radius:18px;
    padding:22px 24px 30px;
    overflow:hidden;
    background:
      radial-gradient(circle at 18% 18%, rgba(255,255,255,.32) 0 58px, transparent 62px),
      radial-gradient(circle at 82% 20%, rgba(255,241,182,.28) 0 72px, transparent 76px),
      linear-gradient(180deg, rgba(255,255,255,.30), rgba(255,255,255,.12));
  }

  .page-title{
    text-align:center;
    font-size:clamp(2rem,5vw,3rem);
    font-weight:800;
    color:var(--ink);
    margin:0 0 4px;
  }

  .question{
    margin-top:14px;
    text-align:center;
    color:var(--ink);
    font-size:clamp(1.45rem,3.2vw,2.2rem);
    line-height:1.28;
    font-weight:700;
  }

  .girl-sentence{
    margin-top:10px;
    text-align:center;
    font-size:1.5rem;
    font-weight:700;
    color:var(--ink);
    min-height:3.2em;
  }

  .circle-red{ color:#d62828; }

  .poster-area{
    position:relative;
    width:min(820px,100%);
    margin:4px auto 0;
    z-index:1;
  }

  .convo-bear{
    width:100%;
    height:auto;
    display:block;
    filter:drop-shadow(0 8px 14px rgba(0,0,0,.12));
  }

  .row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:18px 0;
    position:relative;
    z-index:2;
  }

  .convo-line{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:4;
    margin:0;
    overflow:visible;
    display:none;
  }

  .convo-line.show{
    display:block;
  }

  .bubble-stack{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .bubble{
    padding:10px 14px;
    border-radius:16px;
    position:relative;
    font-size:1.05rem;
    white-space:nowrap;
    max-width:420px;
    box-shadow:0 8px 16px rgba(0,0,0,.16);
    overflow-wrap:normal;
    word-break:normal;
    font-weight:700;
  }

  .bubble.kid{ background:var(--bubble-kid); }
  .bubble.baker{ background:var(--bubble-baker); }

  .bubble.kid::after{
    content:"";
    position:absolute;
    right:-6px;
    top:14px;
    border-width:8px 0 8px 8px;
    border-style:solid;
    border-color:transparent transparent transparent var(--bubble-kid);
  }

  .bubble.baker::after{
    content:"";
    position:absolute;
    left:-6px;
    top:14px;
    border-width:8px 8px 8px 0;
    border-style:solid;
    border-color:transparent var(--bubble-baker) transparent transparent;
  }

  .chef-bubble{
    position:absolute;
    left:4.5%;
    top:15%;
    max-width:35%;
    align-items:flex-start;
  }

  .kid-bubble{
    position:absolute;
    right:4.5%;
    top:56%;
    max-width:35%;
    align-items:flex-end;
  }

  .row.right .bubble-stack{
    align-items:flex-end;
  }

  .bubble.sparkle{
    background:linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);
    box-shadow:0 0 12px rgba(255,214,0,.6), 0 0 18px rgba(255,105,180,.4);
    animation:sparklePulse 1.2s ease-in-out infinite;
  }

  @keyframes sparklePulse{
    0%,100%{filter:brightness(1);}
    50%{filter:brightness(1.12);}
  }

  .repeat-result{
    margin-top:4px;
    font-size:2.1rem !important;
    line-height:1.1;
    font-weight:900;
    color:#2f9f5f;
    min-height:1.1em;
  }

  .star-row{
    display:flex;
    gap:6px;
    margin-top:4px;
    font-weight:900;
    font-size:2.35rem !important;
    line-height:1;
    color:#ffd24a;
    text-shadow:
      0 2px 0 #b87900,
      0 4px 0 #8a5a00,
      0 8px 14px rgba(0,0,0,.28);
    min-height:1.2em;
  }

  .controls{
    margin-top:12px;
    display:flex;
    flex-direction:column;
    gap:10px;
    font-size:.9rem;
  }

  .controls-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    flex-wrap:wrap;
  }

  .button-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
  }

  .recording{
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
  }

  .recording audio{
    width:min(360px,90vw);
    max-width:100%;
    height:32px;
  }

  .recording-status{
    min-height:1.2em;
    text-align:center;
    font-size:.95rem;
    font-weight:700;
    color:#1f6bb7;
  }

  .conversation-status{
    margin-top:8px;
    font-size:.95rem;
    font-weight:800;
    color:#6c4bbf;
    min-height:1.2em;
    text-align:center;
  }

  .record-icon{
    width:18px;
    height:18px;
    flex:0 0 auto;
  }

  .mascot-spot{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#fff;
    border:2px solid #e8e0ff;
    border-radius:14px;
    padding:6px 10px;
    box-shadow:0 8px 16px rgba(0,0,0,.12);
  }

  .tap-girl{
    width:44px;
    height:44px;
    border-radius:12px;
    object-fit:cover;
    cursor:pointer;
    display:block;
  }

  .mascot-hint{
    font-size:.95rem;
    font-weight:800;
    color:#2f9f5f;
    white-space:nowrap;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:10px 16px;
    font-size:.95rem;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
  }

  .btn.prev{background:#f8f0c7;color:#9c7b2f;}
  .btn.next{background:var(--btn-yellow);color:#8b5a00;}
  .btn.stop{background:var(--btn-blue);color:#1f3b6b;}
  .btn.read{background:var(--btn-orange);color:#fff;}

  .mic-icon-btn{
    border:none;
    background:transparent;
    padding:0;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .mic-icon-btn img{
    width:38px;
    height:38px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
  }

  .home-btn{
    position:absolute;
    left:10px;
    top:10px;
    z-index:20;
    animation:homeSwingLA4 2.4s ease-in-out infinite;
  }

  .home-btn img{
    width:72px;
    height:auto;
    display:block;
  }

  @keyframes homeSwingLA4{
    0%{transform:translateY(0) rotate(-6deg);}
    50%{transform:translateY(0) rotate(8deg);}
    100%{transform:translateY(0) rotate(-6deg);}
  }

  .headline-line{
    opacity:0;
    transform:translateY(6px) scale(.98);
    transition:opacity .25s ease, transform .25s ease;
  }

  .headline-line.show{
    opacity:1;
    transform:translateY(0) scale(1);
  }

  .spark{
    position:fixed;
    width:16px;
    height:16px;
    border-radius:50%;
    background:radial-gradient(circle,#fff9a8 0%,#ffd54d 45%,#ff9c2f 70%,transparent 72%);
    pointer-events:none;
    z-index:9999;
    animation:sparkFly .7s ease forwards;
    box-shadow:0 0 12px rgba(255,215,0,.75);
  }

  @keyframes sparkFly{
    0%{
      transform:translate(0,0) scale(.5);
      opacity:0;
    }
    15%{opacity:1;}
    100%{
      transform:translate(var(--dx),var(--dy)) scale(1.2);
      opacity:0;
    }
  }

  /* Reliable intro overlay */
  @media (max-width:780px){
    body{
      padding:12px;
      align-items:flex-start;
    }

    .card{
      padding:18px 16px 28px;
    }

    .question{
      font-size:1.6rem;
    }

    .chef-bubble{
      left:3.5%;
      top:13%;
      max-width:42%;
    }

    .kid-bubble{
      right:3.5%;
      top:58%;
      max-width:42%;
    }

    .home-btn img{
      width:64px;
    }
  }

  @media (max-width:520px){
    .card{
      width:100%;
      padding:14px 12px 22px;
      border-radius:12px;
    }

    .question{
      font-size:1.3rem;
      line-height:1.24;
    }

    .girl-sentence{
      font-size:1.12rem;
      min-height:2.8em;
    }

    .bubble{
      padding:8px 10px;
      max-width:min(62vw,280px);
      white-space:nowrap;
    }

    .chef-bubble{
      left:2.5%;
      top:11%;
      max-width:46%;
    }

    .kid-bubble{
      right:2.5%;
      top:60%;
      max-width:46%;
    }

    .home-btn img{
      width:58px;
    }
  }
</style>
</head>

<body>
  

  <div class="card">
    <a class="home-btn" href="../../../../index.html" aria-label="Home">
      <img src="../../../../assets/images/avatars/Home1.png" alt="Home">
    </a>

    <div class="poster-area">
      <img class="convo-bear" src="../../../../assets/images/shapes/Cake1.png" alt="Bear cake poster">

      <div class="row convo-line" id="chefConvo">
        <div class="bubble-stack chef-bubble">
          <div class="bubble baker" id="bakerLine">Happy Birthday!</div>
          <div class="repeat-result" id="bakerRepeat"></div>
          <div class="star-row" id="bakerStars"></div>
        </div>
      </div>

      <div class="row right convo-line" id="kidConvo">
        <div class="bubble-stack kid-bubble">
          <div class="bubble kid" id="kidLine">It&#39;s 1 bear cake.</div>
          <div class="repeat-result" id="kidRepeat"></div>
          <div class="star-row" id="kidStars"></div>
        </div>
      </div>
    </div>

    <div class="question">
      How many <span class="circle-red">circle</span> bear cakes are there?
    </div>

    <div class="girl-sentence" id="girlSentence"></div>

    <div class="controls">
      <div class="controls-row">
        <div class="mascot-spot">
          <img src="../../../../assets/images/shapes/CirckleGirlWk1.png" alt="Circle helper girl" id="girlBtn" class="tap-girl">
          <div class="mascot-hint">Tap the girl</div>
        </div>

        <div class="button-row">
          <button class="btn prev" id="prevBtn" type="button">&#8592; Previous page</button>
          <button class="btn next" id="nextBtn" type="button">Next page &#8594;</button>
          <button class="btn stop" id="clearBtn" type="button">Clear</button>

          <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
            <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone">
          </button>

          <button class="btn read" id="recordBtn" type="button">
            <svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">
              <path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
              <path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
              <path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
              <path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
            </svg>
            Record
          </button>
        </div>
      </div>

      <div class="recording">
        <audio id="recordingPlayback" controls></audio>
      </div>

      <div class="recording-status" id="recordingStatus"></div>
      <div class="conversation-status" id="conversationStatus"></div>
    </div>
  </div>

  <script src="../../../../shared/js/storage.js"></script>
  <script src="../../../../shared/js/progress.js"></script>
  <script src="../../../../shared/js/tracing.js"></script>

  <script>
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const clearBtn = document.getElementById("clearBtn");
    const girlBtn = document.getElementById("girlBtn");
    const micIconBtn = document.getElementById("micIconBtn");
    const recordBtn = document.getElementById("recordBtn");
    const recordingPlayback = document.getElementById("recordingPlayback");
    const recordingStatus = document.getElementById("recordingStatus");
    const conversationStatus = document.getElementById("conversationStatus");
    const girlSentenceEl = document.getElementById("girlSentence");

    const chefConvo = document.getElementById("chefConvo");
    const kidConvo = document.getElementById("kidConvo");

    const bakerLine = document.getElementById("bakerLine");
    const kidLine = document.getElementById("kidLine");
    const bakerRepeat = document.getElementById("bakerRepeat");
    const kidRepeat = document.getElementById("kidRepeat");
    const bakerStars = document.getElementById("bakerStars");
    const kidStars = document.getElementById("kidStars");

    const lines = [chefConvo, kidConvo];
    const repeatResults = [bakerRepeat, kidRepeat];
    const starRows = [bakerStars, kidStars];

    const expectedLines = ["Happy Birthday!", "It's 1 bear cake."];
    const sentenceLines = [
      {
        text: "There is 1 circle bear cake.",
        html: 'There is <span class="circle-red">1</span> <span class="circle-red">circle</span> bear cake.'
      }
    ];

    let recorder = null;
    let recordedChunks = [];
    let currentLineIndex = -1;
    let attempts = [0, 0];
    let starsAwarded = [0, 0];
    let micStepIndex = 0;
    let micPhase = "reveal";
    let micBusy = false;
    let micDone = false;
    let micInitialized = false;
    let activitySaved = false;
    let girlTapped = false;
    let sentenceToken = 0;

    const maxAttempts = 3;

    function setConversationStatus(text){
      if (!conversationStatus) return;
      conversationStatus.textContent = text || "";
    }

    function hideAllLines(){
      lines.forEach(line => {
        if (!line) return;
        line.classList.remove("show");
        line.hidden = true;
        line.style.display = "none";
      });
    }

    function showLine(index){
      const line = lines[index];
      if (!line) return;
      line.hidden = false;
      line.classList.add("show");
      line.style.display = "block";
    }

    function highlightLine(index, on){
      const line = lines[index];
      if (!line) return;
      const bubble = line.querySelector(".bubble");
      if (!bubble) return;
      bubble.classList.toggle("sparkle", on);
    }

    function setStars(index, count){
      const row = starRows[index];
      if (!row) return;
      row.innerHTML = new Array(count).fill("&#9733;").join("");
    }

    function speakLine(text, onend){
      if (!("speechSynthesis" in window)) {
        if (onend) onend();
        return;
      }
      const utter = new SpeechSynthesisUtterance(text);
      if (window.GPTracing && typeof window.GPTracing.applyPreferredVoice === "function") {
        window.GPTracing.applyPreferredVoice(utter);
      } else {
        utter.lang = "en-US";
      }
      utter.rate = 0.95;
      utter.pitch = 1.08;
      utter.onend = () => { if (onend) onend(); };
      utter.onerror = () => { if (onend) onend(); };
      window.speechSynthesis.speak(utter);
    }

    function clearConversation(){
      hideAllLines();
      currentLineIndex = -1;
      attempts = [0, 0];
      starsAwarded = [0, 0];
      micStepIndex = 0;
      micPhase = "reveal";
      micBusy = false;
      micDone = false;
      micInitialized = false;
      activitySaved = false;

      repeatResults.forEach(el => { if (el) el.textContent = ""; });
      starRows.forEach(el => { if (el) el.textContent = ""; });
      lines.forEach(line => {
        const bubble = line && line.querySelector(".bubble");
        if (bubble) bubble.classList.remove("sparkle");
      });
      setConversationStatus("");
    }

    function revealBubblesFromMic(){
      micIconBtn.dataset.gpMicSeqBound = "1";
      if (!micInitialized) {
        if (lines[0]) showLine(0);
        if (lines[1]) {
          lines[1].hidden = true;
          lines[1].classList.remove("show");
          lines[1].style.display = "none";
        }
        micInitialized = true;
      }
      currentLineIndex = micStepIndex;
    }

    function listenForRepeat(expectedText, onDone){
      window.GPTracing.listenForRepeat(expectedText, onDone);
    }

    function showAndSpeakLine(index){
      if (index < 0 || index >= lines.length) return;
      showLine(index);
      currentLineIndex = index;
      const bubble = lines[index].querySelector(".bubble");
      if (bubble) speakLine(bubble.textContent || "");
    }

    async function moveToNextMicStep(){
      highlightLine(micStepIndex, false);
      micStepIndex += 1;
      micPhase = "reveal";
      micBusy = false;

      if (micStepIndex >= expectedLines.length) {
        micDone = true;

        const totalStars = starsAwarded[0] + starsAwarded[1];
        const maxStars = expectedLines.length * 3;
        const score = Math.round((totalStars / maxStars) * 100);

        if (totalStars > 0) {
          const remarks = [
            "Wow! You are super smart!",
            "Amazing Job",
            "Great Try! keep it up!!!"
          ];
          const remark = remarks[Math.floor(Math.random() * remarks.length)];
          const chime = new Audio("../../../../assets/audio/chimes/chime.mp3.mp3");
          chime.preload = "auto";
          chime.play().catch(() => {});
          setConversationStatus(remark);
          speakLine(remark);
        } else {
          setConversationStatus("");
        }

        if (typeof window.finishAndSave === "function" && !activitySaved) {
          activitySaved = true;
          await window.finishAndSave({
            pageId: "LA4",
            level: "A",
            activityType: "speaking",
            score,
            stars: Math.min(5, Math.max(1, Math.round(totalStars / 2))),
            skills: {
              reading: girlTapped ? 1 : 0,
              writing: 0,
              speaking: totalStars >= 4 ? 3 : totalStars >= 2 ? 2 : totalStars >= 1 ? 1 : 0,
              listening: totalStars >= 4 ? 3 : totalStars >= 2 ? 2 : totalStars >= 1 ? 1 : 0
            }
          });
        }
        return;
      }

      showAndSpeakLine(micStepIndex);
      setConversationStatus(expectedLines[micStepIndex]);
      micPhase = "repeat";
    }

    async function runMicStepFlow(){
      if (window.GPTracing?.prepareMicSupport) {
        await window.GPTracing.prepareMicSupport().catch(() => {});
      }
      if (micDone || micBusy) return;
      if (!micInitialized) revealBubblesFromMic();

      if (micPhase === "reveal") {
        showAndSpeakLine(micStepIndex);
        setConversationStatus(expectedLines[micStepIndex]);
        micPhase = "repeat";
        return;
      }

      highlightLine(micStepIndex, true);
      micBusy = true;
      setConversationStatus("Repeat after me.");

      speakLine("Repeat after me.", () => {
        listenForRepeat(expectedLines[micStepIndex], (pct, said) => {
          const tryNo = ++attempts[micStepIndex];

          if (pct >= 50) {
            if (repeatResults[micStepIndex]) {
              repeatResults[micStepIndex].style.color = "#2f9f5f";
              repeatResults[micStepIndex].textContent = (said || expectedLines[micStepIndex]).trim();
            }
            starsAwarded[micStepIndex] = window.GPTracing.rewardStars(tryNo);
            setStars(micStepIndex, starsAwarded[micStepIndex]);
            setTimeout(() => { moveToNextMicStep(); }, 220);
            return;
          }

          if (tryNo >= maxAttempts) {
            if (repeatResults[micStepIndex]) {
              repeatResults[micStepIndex].style.color = "#c62828";
              repeatResults[micStepIndex].textContent = "You did a good Job. Nice try!";
            }
            starsAwarded[micStepIndex] = 0;
            setStars(micStepIndex, 0);
            speakLine("You did a good Job. Nice try!", () => setTimeout(() => { moveToNextMicStep(); }, 200));
            return;
          }

          micBusy = false;
          micPhase = "repeat";
          if (repeatResults[micStepIndex]) {
            repeatResults[micStepIndex].style.color = "#c62828";
            repeatResults[micStepIndex].textContent = "Sorry, try again!";
          }
          setConversationStatus("Sorry, try again!");
          speakLine("Sorry, try again!");
        });
      });
    }

    function showSpark(){
      const girlRect = girlBtn.getBoundingClientRect();
      const targetRect = girlSentenceEl.getBoundingClientRect();

      const startX = girlRect.left + girlRect.width / 2;
      const startY = girlRect.top + girlRect.height / 2;
      const endX = targetRect.left + targetRect.width / 2;
      const endY = targetRect.top + targetRect.height / 2;
      const dx = endX - startX;
      const dy = endY - startY;

      const spark = document.createElement("div");
      spark.className = "spark";
      spark.style.left = startX + "px";
      spark.style.top = startY + "px";
      spark.style.setProperty("--dx", dx + "px");
      spark.style.setProperty("--dy", dy + "px");
      document.body.appendChild(spark);
      spark.addEventListener("animationend", () => spark.remove());

      const spark2 = document.createElement("div");
      spark2.className = "spark";
      spark2.style.left = (startX + 10) + "px";
      spark2.style.top = (startY - 4) + "px";
      spark2.style.setProperty("--dx", (dx + 10) + "px");
      spark2.style.setProperty("--dy", (dy - 4) + "px");
      spark2.style.animationDelay = "0.18s";
      spark2.style.transform = "scale(0.75)";
      document.body.appendChild(spark2);
      spark2.addEventListener("animationend", () => spark2.remove());
    }

    function revealSentenceLine(index, token){
      if (token !== sentenceToken) return;
      if (index >= sentenceLines.length) return;
      const lineEl = girlSentenceEl.querySelector(`[data-line="${index}"]`);
      if (!lineEl) return;
      lineEl.classList.add("show");
      speakLine(sentenceLines[index].text, () => {
        setTimeout(() => revealSentenceLine(index + 1, token), 180);
      });
    }

    function setRecordLabel(text){
      recordBtn.innerHTML =
        '<svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">' +
        '<path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>' +
        '<path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '</svg> ' + text;
    }

    async function toggleRecord(){
      if (recorder && recorder.state === "recording") {
        recorder.stop();
        setRecordLabel("Record");
        if (recordingStatus) recordingStatus.textContent = "Saved recording.";
        return;
      }

      try{
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          if (recordingStatus) recordingStatus.textContent = "Microphone not available in this browser.";
          return;
        }
        if (!window.MediaRecorder) {
          if (recordingStatus) recordingStatus.textContent = "Recording not supported on this device.";
          return;
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });

        recordedChunks = [];
        const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
          ? "audio/webm;codecs=opus"
          : (MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "");

        recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);

        recorder.ondataavailable = (e) => {
          if (e.data.size > 0) recordedChunks.push(e.data);
        };

        recorder.onstop = () => {
          const type = recorder.mimeType || "audio/webm";
          const blob = new Blob(recordedChunks, { type });
          recordingPlayback.src = URL.createObjectURL(blob);
          recordingPlayback.muted = false;
          recordingPlayback.volume = 1;
          recordingPlayback.load();
          stream.getTracks().forEach(t => t.stop());
        };

        recorder.start();
        setRecordLabel("Stop recording");
        if (recordingStatus) recordingStatus.textContent = "Recording... speak clearly.";
      }catch(e){
        setRecordLabel("Record");
        if (recordingStatus) recordingStatus.textContent = "Microphone permission denied.";
      }
    }

    function stopSpeaking(){
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
    }

    if (clearBtn) {
      clearBtn.addEventListener("click", () => {
        stopSpeaking();
        clearConversation();
        girlSentenceEl.innerHTML = "";
      });
    }

    if (girlBtn) {
      girlBtn.addEventListener("click", (e) => {
        if (e) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
        girlTapped = true;
        if (girlSentenceEl) girlSentenceEl.style.display = "block";
        sentenceToken += 1;
        const token = sentenceToken;

        girlSentenceEl.innerHTML = sentenceLines
          .map((line, i) => `<div class="headline-line" data-line="${i}">${line.html}</div>`)
          .join("");

        showSpark();

        const chime = new Audio("../../../../assets/audio/chimes/chime.mp3.mp3");
        chime.preload = "auto";
        chime.play().catch(() => {});
        setTimeout(() => revealSentenceLine(0, token), 220);
      });
    }

    if (recordBtn) {
      recordBtn.addEventListener("click", toggleRecord);
    }

    if (micIconBtn) {
      micIconBtn.addEventListener("click", (e) => {
        if (e) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
        runMicStepFlow();
      });
    }

    if (nextBtn) {
      nextBtn.addEventListener("click", async () => {
        if (typeof window.finishAndSave === "function" && !activitySaved) {
          await window.finishAndSave({
            pageId: "LA4",
            level: "A",
            activityType: "lesson",
            score: micDone ? null : (girlTapped ? 40 : 10),
            stars: micDone ? 0 : (girlTapped ? 1 : 0),
            skills: {
              reading: girlTapped ? 1 : 0,
              writing: 0,
              speaking: 0,
              listening: 0
            }
          });
          activitySaved = true;
        }
        window.location.href = "LA5.html";
      });
    }

    if (prevBtn) {
      prevBtn.addEventListener("click", async () => {
        if (typeof window.finishAndSave === "function" && !activitySaved) {
          await window.finishAndSave({
            pageId: "LA4",
            level: "A",
            activityType: "lesson",
            score: micDone ? null : (girlTapped ? 40 : 10),
            stars: micDone ? 0 : (girlTapped ? 1 : 0),
            skills: {
              reading: girlTapped ? 1 : 0,
              writing: 0,
              speaking: 0,
              listening: 0
            }
          });
          activitySaved = true;
        }
        window.location.href = "../monday/LA3.html";
      });
    }

    hideAllLines();
  </script>

  <script type="module">
    import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";

    window.GPProgress.installTracker({
      saveActivityResult,
      markLoginPing,
      defaultPageId: "LA4",
      defaultLevel: "A",
      defaultActivityType: "lesson",
      defaultSkills: {
        reading: 1,
        writing: 0,
        speaking: 1,
        listening: 1
      }
    });

    function getStudentSession(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
      }catch(e){
        return null;
      }
    }

    function inferProgressMeta(payload){
      const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
      const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
      const level = (payload && payload.level)
        || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
      const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
      const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
      const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
      const month = payload && payload.month != null ? Number(payload.month) : 1;
      return {
        pageId,
        file,
        level,
        week: Number.isFinite(week) && week > 0 ? week : 1,
        month: Number.isFinite(month) && month > 0 ? month : 1
      };
    }

    function getActivityStore(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      }catch(e){
        return {};
      }
    }

    function setActivityStore(store){
      try{
        localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
      }catch(e){}
    }

    function saveLocalActivityFallback(payload){
      const session = getStudentSession() || {};
      const meta = inferProgressMeta(payload || {});
      const score = payload && typeof payload.score === "number" ? payload.score : 0;
      const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
      const tracing = payload && typeof payload.tracing === "number"
        ? payload.tracing
        : (payload && typeof payload.progress === "number" ? payload.progress : 0);
      const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
      const entry = {
        pageId: meta.pageId,
        file: meta.file,
        level: meta.level,
        type,
        activityType: (payload && payload.activityType) || type,
        score,
        stars,
        skills: payload && payload.skills ? payload.skills : {},
        completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
        tracing,
        week: meta.week,
        month: meta.month,
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
        savedAt: new Date().toISOString(),
        ts: Date.now()
      };
      const store = getActivityStore();
      store[meta.pageId] = {
        ...(store[meta.pageId] || {}),
        ...entry
      };
      setActivityStore(store);
      try{
        localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
      }catch(e){}
      return store[meta.pageId];
    }

    async function finishAndSave(payload){
      const session = getStudentSession() || {};
      const fullPayload = {
        ...(payload || {}),
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
      };

      saveLocalActivityFallback(fullPayload);

      if (typeof window.finishActivity === "function") {
        try{
          await window.finishActivity(fullPayload);
        }catch(err){
          console.warn("finishActivity failed, local fallback already saved:", err);
        }
      }

      return fullPayload;
    }

    window.finishAndSave = finishAndSave;
  </script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Circle Fairly Tale</title>

  <style>
    :root{
      --bg1:#fff7fb;
      --bg2:#eef7ff;
      --card:#ffffff;
      --text:#17324d;
      --accent:#ff6b9d;
      --accent2:#6c8cff;
      --gold:#ffcc4d;
      --shadow:0 18px 45px rgba(0,0,0,.16);
      --radius:24px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      min-height:100%;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #fff3c9 0%, transparent 28%),
        radial-gradient(circle at top right, #ffd8ec 0%, transparent 24%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    #pageContent{
      width:100%;
      opacity:0;
      visibility:hidden;
      transition:opacity .28s ease;
    }

    body.intro-complete #pageContent{
      opacity:1;
      visibility:visible;
    }

    #lbIntroVideoOverlay{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:rgba(0,0,0,.82);
      z-index:9999;
    }

    #lbIntroVideoOverlay[hidden]{
      display:none !important;
    }

    .intro-panel{
      width:min(920px, 100%);
      background:rgba(15, 15, 15, .96);
      border-radius:24px;
      padding:16px;
      box-shadow:0 20px 60px rgba(0,0,0,.45);
      border:2px solid rgba(255,255,255,.14);
    }

    .intro-title{
      color:#fff4d6;
      font-size:clamp(1.1rem, 2.4vw, 1.5rem);
      font-weight:900;
      text-align:center;
      margin-bottom:12px;
    }

    #lbIntroVideo{
      width:100%;
      max-height:72vh;
      border-radius:18px;
      object-fit:contain;
      background:#000;
      display:block;
    }

    .intro-actions{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .intro-btn{
      border:none;
      cursor:pointer;
      border-radius:999px;
      padding:12px 18px;
      min-width:140px;
      font-size:.96rem;
      font-weight:800;
      color:#fff;
      box-shadow:0 8px 18px rgba(0,0,0,.28);
    }

    .intro-btn.sound{
      background:linear-gradient(180deg, #38bdf8, #0284c7);
    }

    .intro-btn.skip{
      background:linear-gradient(180deg, #fb923c, #ea580c);
    }

    .intro-help{
      margin-top:10px;
      text-align:center;
      color:#fef3c7;
      font-size:.9rem;
      font-weight:700;
    }

    .page{
      width:min(100%, 980px);
    }

    .title-wrap{
      text-align:center;
      margin-bottom:14px;
    }

    .title{
      margin:0;
      font-size:clamp(1.4rem, 2vw + 1rem, 2.3rem);
      font-weight:900;
      color:#ff4c84;
      letter-spacing:.3px;
      text-shadow:0 2px 0 rgba(255,255,255,.8);
    }

    .subtitle{
      margin:8px 0 0;
      font-size:clamp(.92rem, 1vw + .55rem, 1.08rem);
      color:#49627d;
      font-weight:700;
    }

    .video-card{
      position:relative;
      width:100%;
      max-width:760px;
      margin:0 auto;
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      overflow:hidden;
    }

    .video-shell{
      position:relative;
      width:100%;
      background:#000;
      border-radius:20px;
      overflow:hidden;
      aspect-ratio:450 / 656;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.15);
    }

    video{
      width:100%;
      height:100%;
      display:block;
      object-fit:contain;
      background:#000;
    }

    .overlay{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .top-bar,
    .bottom-bar,
    .side-nav{
      position:absolute;
      left:0;
      right:0;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px;
      pointer-events:none;
    }

    .top-bar{
      top:0;
      background:linear-gradient(to bottom, rgba(8,19,43,.55), rgba(8,19,43,0));
    }

    .bottom-bar{
      bottom:0;
      justify-content:center;
      flex-wrap:wrap;
      background:linear-gradient(to top, rgba(8,19,43,.68), rgba(8,19,43,0));
    }

    .side-nav{
      top:50%;
      transform:translateY(-50%);
      justify-content:space-between;
      padding:0 10px;
    }

    .nav-group{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      pointer-events:none;
    }

    .nav-btn,
    .round-btn{
      pointer-events:auto;
      text-decoration:none;
      border:none;
      outline:none;
      cursor:pointer;
      transition:transform .2s ease, box-shadow .2s ease, background .2s ease, opacity .2s ease;
      box-shadow:0 8px 18px rgba(0,0,0,.18);
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      font-weight:800;
    }

    .nav-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 14px;
      border-radius:999px;
      font-size:.95rem;
      color:#17324d;
      background:rgba(255,255,255,.94);
      white-space:nowrap;
    }

    .nav-btn:hover,
    .round-btn:hover{
      transform:translateY(-2px) scale(1.02);
    }

    .nav-btn:active,
    .round-btn:active{
      transform:translateY(0) scale(.98);
    }

    .nav-btn.home{ background:#fff2b8; }
    .nav-btn.lessons{ background:#dff3ff; }
    .nav-btn.back{ background:#ffe0ea; }
    .nav-btn.active{ background:#ff6b9d; color:#fff; }
    .nav-btn.lesson{ background:rgba(255,255,255,.92); }

    .round-btn{
      width:54px;
      height:54px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.5rem;
      color:#17324d;
      background:rgba(255,255,255,.92);
    }

    .video-label{
      position:absolute;
      top:64px;
      left:50%;
      transform:translateX(-50%);
      padding:8px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.9);
      color:#17324d;
      font-size:.95rem;
      font-weight:900;
      box-shadow:0 8px 18px rgba(0,0,0,.12);
      pointer-events:none;
    }

    .note{
      max-width:760px;
      margin:14px auto 0;
      text-align:center;
      font-size:.96rem;
      font-weight:700;
      color:#546c84;
      line-height:1.5;
      background:rgba(255,255,255,.7);
      border-radius:18px;
      padding:12px 14px;
      box-shadow:0 8px 20px rgba(0,0,0,.06);
    }

    @media (max-width: 680px){
      body{ padding:10px; }

      .video-card{
        padding:10px;
        border-radius:18px;
      }

      .video-shell{
        border-radius:16px;
      }

      .top-bar{
        padding:10px 8px;
      }

      .bottom-bar{
        padding:10px 8px;
        gap:8px;
      }

      .nav-btn{
        min-height:38px;
        padding:8px 12px;
        font-size:.82rem;
      }

      .round-btn{
        width:48px;
        height:48px;
        font-size:1.28rem;
      }

      .video-label{
        top:58px;
        font-size:.82rem;
        padding:7px 12px;
      }

      .intro-panel{
        padding:12px;
        border-radius:18px;
      }
    }
  </style>
</head>
<body>
  <div id="lbIntroVideoOverlay">
    <div class="intro-panel">
      <div class="intro-title">Circle Fairly Tale Intro</div>
      <video
        id="lbIntroVideo"
        playsinline
        autoplay
        muted
        preload="metadata"
      >
        <source src="https://res.cloudinary.com/dtknykrkf/video/upload/v1776021903/Lacirclefairlytale_lw8ewo.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
      <div class="intro-actions">
        <button type="button" class="intro-btn sound" id="turnOnSoundBtn">Turn On Sound</button>
        <button type="button" class="intro-btn skip" id="skipIntroBtn">Skip Intro</button>
      </div>
      <div class="intro-help">If the intro does not play, the story page will open automatically.</div>
    </div>
  </div>

  <div id="pageContent">
    <main class="page">
      <div class="title-wrap">
        <h1 class="title">Circle Fairly Tale</h1>
        <p class="subtitle">Watch, learn, and move easily through the app</p>
      </div>

      <section class="video-card">
        <div class="video-shell">
          <video id="storyVideo" controls playsinline preload="metadata">
            <source src="CircleFairlyTale.mp4" type="video/mp4" />
            Your browser does not support the video tag.
          </video>

          <div class="overlay">
            <div class="top-bar">
              <div class="nav-group">
                <a class="nav-btn home" href="../../../../index.html" aria-label="Go to home page">🏠 Home</a>
                <a class="nav-btn lessons" href="../monday/CircleArtClass.html" aria-label="Go to Circle Art Class">🎨 Lesson</a>
              </div>

              <div class="nav-group">
                <button class="nav-btn back" type="button" onclick="goBack()" aria-label="Go back">↩ Back</button>
              </div>
            </div>

            <div class="video-label">📖 Circle Fairly Tale Video</div>

            <div class="side-nav">
              <a
                class="round-btn"
                href="../wednesday/LA7.html"
                aria-label="Go to previous page"
                title="Previous Page"
              >❮</a>

              <a
                class="round-btn"
                href="../friday/LA_Game1.html"
                aria-label="Go to next page"
                title="Next Page"
              >❯</a>
            </div>

            <div class="bottom-bar">
              <a class="nav-btn lesson" href="../monday/CircleArtClass.html">Art Class</a>
              <a class="nav-btn lesson" href="../tuesday/LA2.html">Listening &amp; Speaking</a>
              <a class="nav-btn lesson" href="../wednesday/LA7.html">Writing &amp; Drawing</a>
              <a class="nav-btn active" href="CircleFairlyTale.html">Fairly-tale</a>
              <a class="nav-btn lesson" href="../friday/LA_Game1.html">Activity</a>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const INTRO_VIDEO_URL = "https://res.cloudinary.com/dtknykrkf/video/upload/v1776021903/Lacirclefairlytale_lw8ewo.mp4";
    const introOverlay = document.getElementById("lbIntroVideoOverlay");
    const introVideo = document.getElementById("lbIntroVideo");
    const turnOnSoundBtn = document.getElementById("turnOnSoundBtn");
    const skipIntroBtn = document.getElementById("skipIntroBtn");
    let introFinished = false;

    function revealPageContent() {
      if (introFinished) return;
      introFinished = true;
      document.body.classList.add("intro-complete");
      if (introOverlay) {
        introOverlay.hidden = true;
      }
      if (introVideo) {
        try {
          introVideo.pause();
        } catch (err) {}
      }
    }

    function enableIntroSound() {
      if (!introVideo) return;
      introVideo.muted = false;
      introVideo.volume = 1;
      introVideo.play().catch(() => {});
      turnOnSoundBtn.textContent = "Sound On";
      turnOnSoundBtn.disabled = true;
    }

    function goBack() {
      window.location.href = "../wednesday/LA7.html";
    }

    if (introVideo) {
      introVideo.src = INTRO_VIDEO_URL;
      introVideo.load();
      introVideo.addEventListener("ended", revealPageContent);
      introVideo.addEventListener("error", revealPageContent);
      introVideo.addEventListener("stalled", () => {
        window.setTimeout(() => {
          if (!introFinished && (!introVideo.currentSrc || introVideo.networkState === 3)) {
            revealPageContent();
          }
        }, 1200);
      });
      introVideo.play().catch(() => {});
    } else {
      revealPageContent();
    }

    if (turnOnSoundBtn) {
      turnOnSoundBtn.addEventListener("click", enableIntroSound);
    }

    if (skipIntroBtn) {
      skipIntroBtn.addEventListener("click", revealPageContent);
    }

    window.setTimeout(() => {
      if (!introFinished && introVideo && introVideo.readyState < 1) {
        revealPageContent();
      }
    }, 4000);
  </script>
</body>
</html>

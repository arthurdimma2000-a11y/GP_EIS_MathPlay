<!doctype html>
<html lang="en">

</style>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Level A_Literacy Math: Repeat and Record Week 2</title>
<link rel="stylesheet" href="../../../../shared/css/base.css" />
<link rel="stylesheet" href="../../../../shared/css/layout.css" />
<link rel="stylesheet" href="../../../../shared/css/lesson.css" />

<style>
  :root{
    --ink:#2d2d2d;
    --bg:#e4f6df;
    --card:#f9f4ff;
    --border:#d9b9f0;
    --accent:#6c4bbf;
    --bubble-kid:#d8ebff;
    --bubble-baker:#fde3c4;
    --btn-yellow:#f6da7b;
    --btn-orange:#ff8a5b;
    --btn-blue:#dfeaff;
    --shadow:0 10px 24px rgba(0,0,0,.08);
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
  }

  html, body{
    height:auto;
    min-height:100%;
  }

  body{
    display:flex;
    align-items:flex-start;
    justify-content:center;
    background:var(--bg);
    padding:4px;
    overflow-y:auto;
    color:var(--ink);
  }

  html.gp-intro-video-pending body > *:not(#gpIntroVideoOverlay){visibility:hidden !important;}

  .app{
    width:min(980px,96vw);
    border-radius:16px;
    padding:16px 16px 10px;
    transform-origin:top center;
    will-change:transform;
  }

  .home-btn{
    z-index:5;
  }

  .title{
    font-size:1.25rem;
    font-weight:800;
    margin-bottom:10px;
  }

  .board{
    border:2px dashed var(--border);
    border-radius:16px;
    padding:16px;
    background:var(--card);
    min-height:420px;
    position:relative;
  }

  .tray-hero{
    display:flex;
    justify-content:center;
    margin:6px 0 14px;
    position:relative;
  }

  .tray-hero img{
    width:min(420px,90%);
    height:auto;
    display:block;
    filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
  }

  .convo-line{
    display:none !important;
    position:absolute;
    inset:0;
    pointer-events:none;
  }

  .convo-line[hidden]{
    display:none !important;
  }

  .convo-line.show{
    display:block !important;
  }

  .row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:18px 0;
  }

  .row.right{
    justify-content:flex-end;
  }

  .avatar{
    width:56px;
    height:56px;
    border-radius:50%;
    background:#fff;
    border:3px solid #fff;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    color:#777;
    overflow:hidden;
  }

  .avatar img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    display:block;
  }

  .name-tag{
    font-size:.75rem;
    font-weight:700;
    text-transform:uppercase;
    color:#666;
    margin-top:4px;
    text-align:center;
  }

  .bubble{
    padding:10px 14px;
    border-radius:16px;
    position:relative;
    font-size:1rem;
    max-width:min(560px,70vw);
    line-height:1.25;
    white-space:nowrap;
  }

  .bubble-stack{
    display:flex;
    flex-direction:column;
    gap:6px;
    align-items:flex-start;
  }

  .row.right .bubble-stack{
    align-items:flex-end;
  }

  .repeat-result{
    margin-top:4px;
    font-size:.95rem;
    font-weight:700;
    color:#2f9f5f;
  }

  .star-row{
    display:flex;
    gap:6px;
    margin-top:4px;
    font-weight:900;
    font-size:1.2rem;
    color:#ffd24a;
    text-shadow:
      0 2px 0 #b87900,
      0 4px 0 #8a5a00,
      0 8px 14px rgba(0,0,0,.28);
  }

  .cookie-row{
    display:flex;
    justify-content:center;
    gap:18px;
    margin:12px 0;
  }

  .cookie-row.hidden{
    display:none;
  }

  .cookie-row img{
    width:min(220px,40vw);
    height:auto;
    display:block;
    filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
  }

  .triangle-answer{
    position:absolute;
    left:50%;
    top:66%;
    transform:translateX(-50%);
    padding:8px 14px;
    border-radius:12px;
    background:rgba(255,255,255,.94);
    color:#1f5ea8;
    font-size:1.1rem;
    font-weight:900;
    box-shadow:0 6px 12px rgba(0,0,0,.16);
    border:2px solid #b8d5ff;
    display:none;
    z-index:3;
    pointer-events:none;
    text-align:center;
    white-space:nowrap;
  }

  .triangle-answer.show{
    display:block;
  }

  .app{
    width:min(960px,100%);
    max-width:960px;
    border-radius:16px;
    padding:12px 12px 8px;
  }

  .board{
    width:min(820px,90vw);
    margin:0 auto;
  }

  .tray-hero{
    width:min(820px,90vw);
    margin:6px auto 0;
  }

  .bubble{
    font-size:1.05rem;
    line-height:1.22;
    max-width:min(34vw,320px);
  }

  .bubble.kid{background:var(--bubble-kid);}
  .bubble.baker{background:var(--bubble-baker);}

  .poster-bubble{
    position:absolute;
    max-width:min(420px,70vw);
  }

  .kid-bubble{
    right:7%;
    top:58%;
    transform:none;
  }

  .chef-bubble{
    left:7%;
    right:auto;
    top:18%;
    transform:none;
  }

  .tap-prompt{
    position:absolute;
    left:50%;
    right:auto;
    top:12%;
    transform:translateX(-50%);
    padding:8px 14px;
    border-radius:12px;
    background:rgba(255,255,255,.96);
    color:#1e4d8f;
    font-size:1.95rem;
    font-weight:900;
    box-shadow:0 6px 12px rgba(0,0,0,.16);
    border:2px solid #b8d5ff;
    display:none;
    z-index:4;
    pointer-events:none;
    text-align:center;
    white-space:nowrap;
  }

  .tap-prompt.show{
    display:block;
  }

  .triangle-answer{
    display:none !important;
  }

  .tap-row{
    display:flex;
    align-items:center;
    gap:10px;
    justify-content:center;
  }

  .tap-girl{
    width:82px;
    height:82px;
    border-radius:22px;
    box-shadow:0 6px 14px rgba(0,0,0,.2);
    border:4px solid #ffe3f7;
    cursor:pointer;
  }

  .tap-label{
    font-weight:700;
    color:#d62828;
  }

  .bubble.sparkle{
    background: linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);
    box-shadow:0 0 12px rgba(255,214,0,.6), 0 0 18px rgba(255,105,180,.4);
    animation: sparklePulse 1.2s ease-in-out infinite;
  }

  @keyframes sparklePulse{
    0%,100%{filter:brightness(1);}
    50%{filter:brightness(1.12);}
  }

  .bubble.kid::after{
    content:"";
    position:absolute;
    right:-6px;
    top:14px;
    border-width:8px 0 8px 8px;
    border-style:solid;
    border-color:transparent transparent transparent var(--bubble-kid);
  }

  .bubble.baker::after{
    content:"";
    position:absolute;
    left:-6px;
    top:14px;
    border-width:8px 8px 8px 0;
    border-style:solid;
    border-color:transparent var(--bubble-baker) transparent transparent;
  }

  .controls{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-top:14px;
    flex-wrap:wrap;
    align-items:center;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:7px 18px;
    font-size:.85rem;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
  }

  .btn.prev{background:#f8f0c7;color:#9c7b2f;}
  .btn.next{background:var(--btn-yellow);color:#8b5a00;}
  .btn.stop{background:var(--btn-blue);color:#1f3b6b;}
  .btn.read{background:var(--btn-orange);color:#fff;}
  .btn.mic{
    background:var(--btn-orange);
    color:#fff;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }

  .record-icon{
    width:16px;
    height:16px;
    display:inline-block;
    vertical-align:middle;
  }

  .record-icon path{
    stroke:#fff;
  }

  .mic-icon-btn img{
    width:38px;
    height:38px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
  }

  .recording{
    display:inline-flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }

  .recording audio{
    height:32px;
  }

  .recording-status{
    font-size:.85rem;
    color:#555;
  }

  .conversation-status{
    margin-top:8px;
    font-size:.95rem;
    font-weight:800;
    color:#6c4bbf;
    min-height:1.2em;
  }

  .footer-note{
    margin-top:6px;
    font-size:.9rem;
    color:#666;
  }

  @media (max-width:780px){
    .row{gap:8px;}
    .avatar{width:48px;height:48px;}
    .bubble{font-size:.95rem;}
  }

  #gpIntroVideoOverlay{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.92);
    z-index:99999;
    padding:16px;
    flex-direction:column;
    gap:14px;

  #gpIntroVideoOverlay.active{display:flex;}

  #gpIntroVideo{
    width:min(92vw,980px);
    max-height:82vh;
    height:auto;
    display:block;
    border-radius:14px;

  .gp-intro-help{

    text-align:center;

  .gp-intro-controls{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
  }

  .gp-intro-btn{
    border:none;
    border-radius:999px;
    padding:12px 22px;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,.22);
  }

  .gp-intro-btn.play{
    background:linear-gradient(180deg,#dff7ff,#8fdcff);
    color:#114a67;

  }

  .gp-intro-btn.sound{
    background:linear-gradient(180deg,#fffad7,#ffd86a);

  .gp-intro-btn.skip{
    background:linear-gradient(180deg,#ffffff,#e9eef7);

  }
</style>

  <div class="app">

    <div class="title">Level A_Literacy Math: Repeat and Record Week 2</div>

    <div class="board" id="board">
      <div class="tray-hero">
        <img src="../../../../assets/images/shapes/A8.png" alt="Poster">

        <div class="convo-line" hidden>
          <div class="bubble-stack poster-bubble kid-bubble">
            <div class="bubble kid">Yes, I'm hungry.</div>
            <div class="repeat-result" data-line="0"></div>

    <div class="controls">
      <button class="btn prev" id="prevBtn">&#8592; Previous page</button>
      <button class="btn next" id="nextBtn">Next page &#8594;</button>
      <button class="btn stop" id="clearBtn" type="button">Clear</button>

      <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
        <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone">
      </button>

      <div class="tap-row">
        <img src="../../../../assets/images/shapes/CirckleGirlWk1.png" alt="Tap the girl" class="tap-girl" id="tapGirl">
        <div class="tap-label">Tap the girl</div>
      </div>

      <button class="btn read" id="recordBtn">
        <svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z"
                fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
          <path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        </svg>
        Record
      </button>

      <div class="recording">
        <audio id="recordingPlayback" controls></audio>
      </div>
    </div>

    <div class="recording-status" id="recordingStatus"></div>
    <div class="conversation-status" id="conversationStatus"></div>
    <div class="footer-note">Tap the microphone to reveal the conversation line by line.</div>
  </div>

  <script src="../../../../shared/js/storage.js"></script>
  <script src="../../../../shared/js/progress.js"></script>
  <script src="../../../../shared/js/tracing.js"></script>

  <script>
    window.__GP_REQUIRE_INTRO_AUDIO__ = true;
    const micIconBtn = document.getElementById("micIconBtn");
    const clearBtn = document.getElementById("clearBtn");
    const recordBtn = document.getElementById("recordBtn");
    const recordingPlayback = document.getElementById("recordingPlayback");
    const recordingStatus = document.getElementById("recordingStatus");
    const conversationStatus = document.getElementById("conversationStatus");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    const lines = Array.from(document.querySelectorAll(".convo-line"));
    const repeatResults = Array.from(document.querySelectorAll(".repeat-result"));
    const starRows = Array.from(document.querySelectorAll(".star-row"));
    const cookieRow = document.getElementById("cookieRow");
    const triangleAnswer = document.getElementById("triangleAnswer");
    const tapPrompt = document.getElementById("tapPrompt");

    let recorder = null;
    let recordedChunks = [];
    let currentLineIndex = -1;
    let micExpectingRepeat = false;
    let tapRevealTimer = null;
    let tapPromptPinned = false;

    const expectedLines = [
      "Yes, I'm hungry.",
      "Eat some cookies."
    ];
    const attempts = [0, 0];
    const maxAttempts = 3;
    const chimeAudio = new Audio("../../../../assets/audio/chimes/chime.mp3.mp3");
    chimeAudio.preload = "auto";

    function hideAllLines(){
      lines.forEach(line => {
        line.classList.remove("show");
        line.hidden = true;
        const bubble = line.querySelector(".bubble");
        if (bubble) bubble.classList.remove("sparkle");
      });
      if (tapPrompt && !tapPromptPinned) tapPrompt.classList.remove("show");
      if (triangleAnswer) triangleAnswer.classList.remove("show");
    }

    function speakLine(text, onend){
      if (!("speechSynthesis" in window)) {
        if (onend) onend();
        return;
      }
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      if (window.GPTracing && typeof window.GPTracing.applyPreferredVoice === "function") {
        window.GPTracing.applyPreferredVoice(utter);
      } else {
        utter.lang = "en-US";
      }
      utter.rate = 0.94;
      utter.pitch = 1.08;
      utter.onend = () => { if (onend) onend(); };
      utter.onerror = () => { if (onend) onend(); };
      window.speechSynthesis.speak(utter);
    }

    function setConversationStatus(text){
      if (!conversationStatus) return;
      conversationStatus.textContent = text || "";
    }

    function highlightLine(index, on){
      const line = lines[index];
      if (!line) return;
      const bubble = line.querySelector(".bubble");
      if (!bubble) return;
      bubble.classList.toggle("sparkle", on);
    }

    function setStars(index, count){
      const row = starRows[index];
      if (!row) return;
      row.innerHTML = new Array(count).fill("&#9733;").join("");
    }

    function showCookies(){
      if (!cookieRow || !cookieRow.classList.contains("hidden")) return;
      cookieRow.classList.remove("hidden");
      chimeAudio.currentTime = 0;
      chimeAudio.play().catch(() => {});
    }

    function showAndSpeakLine(index){
      const line = lines[index];
      if (!line) return;
      line.hidden = false;
      line.classList.add("show");
      currentLineIndex = index;
      micExpectingRepeat = true;
      const bubble = line.querySelector(".bubble");
      const text = bubble ? bubble.textContent.trim() : "";
      speakLine(text);
    }

    function listenForRepeat(expectedText){
      window.GPTracing.listenForRepeat(expectedText, (pct, said) => {
        attempts[currentLineIndex] += 1;
        if (pct >= 50) {
          highlightLine(currentLineIndex, false);
          micExpectingRepeat = false;
          const attemptCount = attempts[currentLineIndex];
          const stars = window.GPTracing.rewardStars(attemptCount);
          setStars(currentLineIndex, stars);
          if (repeatResults[currentLineIndex]) {
            repeatResults[currentLineIndex].textContent = said || expectedText;
          }
          setConversationStatus("");
          if (currentLineIndex === lines.length - 1) {
            chimeAudio.currentTime = 0;
            chimeAudio.play().catch(() => {});
            speakLine("Wow! You are super smart!");
            setConversationStatus("Wow! You are super smart!");
            window.dispatchEvent(new CustomEvent("gp:mic-complete"));
            return;
          }
          currentLineIndex += 1;
          showAndSpeakLine(currentLineIndex);
        } else {
          if (attempts[currentLineIndex] >= maxAttempts) {
            speakLine("Sorry, Study hard!");
            setConversationStatus("Sorry, Study hard!");
            if (repeatResults[currentLineIndex]) {
              repeatResults[currentLineIndex].textContent = "Sorry, Study hard!";
            }
            setStars(currentLineIndex, 0);
            micExpectingRepeat = false;
            highlightLine(currentLineIndex, false);
            if (currentLineIndex < lines.length - 1) {
              currentLineIndex += 1;
              showAndSpeakLine(currentLineIndex);
            } else {
              chimeAudio.currentTime = 0;
              chimeAudio.play().catch(() => {});
              speakLine("Great try! Keep it up.");
              window.dispatchEvent(new CustomEvent("gp:mic-complete"));
            }
            return;
          }
          speakLine("Sorry, try again!");
          setConversationStatus("Sorry, try again!");
          if (repeatResults[currentLineIndex]) {
            repeatResults[currentLineIndex].textContent = "Sorry, try again!";
          }
        }
      });
    }

    function onMicClick(){
      if (window.GPTracing && typeof window.GPTracing.prepareMicSupport === "function") {
        window.GPTracing.prepareMicSupport();
      }
      if (currentLineIndex === -1) {
        hideAllLines();
        showAndSpeakLine(0);
        setConversationStatus("");
        return;
      }

      if (micExpectingRepeat) {
        const bubble = lines[currentLineIndex]?.querySelector(".bubble");
        if (!bubble) return;
        highlightLine(currentLineIndex, true);
        speakLine("Repeat after me.", () => {
          listenForRepeat(bubble.textContent || "");
        });
      }
    }

    function clearConversation(){
      if (tapRevealTimer) {
        clearTimeout(tapRevealTimer);
        tapRevealTimer = null;
      }

      hideAllLines();
      currentLineIndex = -1;
      micExpectingRepeat = false;
      attempts.forEach((_, i) => attempts[i] = 0);
      tapPromptPinned = false;
      if (tapPrompt) tapPrompt.classList.remove("show");
      repeatResults.forEach(el => { if (el) el.textContent = ""; });
      starRows.forEach(el => { if (el) el.textContent = ""; });
      if (cookieRow) cookieRow.classList.add("hidden");
      setConversationStatus("");
    }

    function fitPageToViewport(){
      window.GPTracing.fitElementToViewport(".app", {
        minWidth: 320,
        minHeight: 420,
        padding: 6,
        minScale: 0.58,
        useScrollSize: true,
        isActive: () =>
          document.body.classList.contains("intro-active") ||
          document.documentElement.classList.contains("lesson-intro-video-pending") ||
          document.documentElement.classList.contains("gp-intro-video-pending")
      });

    function onTapGirlClicked(){
      if (tapRevealTimer) clearTimeout(tapRevealTimer);
      hideAllLines();
      setConversationStatus("");
      currentLineIndex = -1;
      micExpectingRepeat = false;
      tapPromptPinned = true;
      if (tapPrompt) tapPrompt.classList.add("show");

    function setRecordLabel(text){
      recordBtn.innerHTML = '<svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">' +
        '<path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>' +
        '<path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '</svg> ' + text;
    }

    async function toggleRecord(){
      if (recorder && recorder.state === "recording") {
        recorder.stop();
        setRecordLabel("Record");
        if (recordingStatus) recordingStatus.textContent = "Saved recording.";
        return;
      }
      try{
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          if (recordingStatus) recordingStatus.textContent = "Microphone not available in this browser.";
          return;
        }
        if (!window.MediaRecorder) {
          if (recordingStatus) recordingStatus.textContent = "Recording not supported on this device.";
          return;
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });

        recordedChunks = [];
        const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
          ? "audio/webm;codecs=opus"
          : (MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "");

        recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);

        recorder.ondataavailable = (e) => {
          if (e.data.size > 0) recordedChunks.push(e.data);
        };

        recorder.onstop = () => {
          const type = recorder.mimeType || "audio/webm";
          const blob = new Blob(recordedChunks, { type });
          recordingPlayback.src = URL.createObjectURL(blob);
          recordingPlayback.muted = false;
          recordingPlayback.volume = 1;
          recordingPlayback.load();
          stream.getTracks().forEach(t => t.stop());
        };

        recorder.start();
        setRecordLabel("Stop recording");
        if (recordingStatus) recordingStatus.textContent = "Recording... speak clearly.";
      }catch(e){
        setRecordLabel("Record");
        if (recordingStatus) recordingStatus.textContent = "Microphone permission denied.";
      }
    }

    if (micIconBtn) {
      micIconBtn.addEventListener("click", (event) => {
        if (event) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
        onMicClick();
      });
    }

    if (clearBtn) clearBtn.addEventListener("click", clearConversation);
    recordBtn.addEventListener("click", toggleRecord);

    document.addEventListener("click", (event) => {
      const tap = event.target && event.target.closest
        ? event.target.closest("#tapGirl, .tap-girl, .tapGirl")
        : null;
      if (!tap) return;
      onTapGirlClicked();
    });

    nextBtn.addEventListener("click", () => {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      window.location.href = "LA9.html";
    });

    prevBtn.addEventListener("click", () => {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      window.location.href = "../../week-1/friday/LA_Quiz1.html";
    });

    hideAllLines();
    if (cookieRow) cookieRow.classList.add("hidden");
    fitPageToViewport();
    window.addEventListener("resize", fitPageToViewport);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", fitPageToViewport);
    }
  </script>

  <script src="../../../../activity-standardizer.js"></script>

  <script type="module">
    import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
    window.GPProgress.installTracker({
      saveActivityResult,
      markLoginPing,
      defaultPageId: "LA8",
      defaultLevel: "A",
      defaultActivityType: "lesson",
      defaultScore: 100,
      defaultStars: 1,
      defaultSkills: {
        reading: 1,
        writing: 0,
        speaking: 1,
        listening: 1
      }
    });

    function getStudentSession(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
      }catch(e){
        return null;
      }
    }

    function inferProgressMeta(payload){
      const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
      const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
      const level = (payload && payload.level)
        || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
      const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
      const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
      const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
      const month = payload && payload.month != null ? Number(payload.month) : 1;
      return {
        pageId,
        file,
        level,
        week: Number.isFinite(week) && week > 0 ? week : 1,
        month: Number.isFinite(month) && month > 0 ? month : 1
      };
    }

    function getActivityStore(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      }catch(e){
        return {};
      }
    }

    function setActivityStore(store){
      try{
        localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
      }catch(e){}
    }

    function saveLocalActivityFallback(payload){
      const session = getStudentSession() || {};
      const meta = inferProgressMeta(payload || {});
      const score = payload && typeof payload.score === "number" ? payload.score : 0;
      const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
      const tracing = payload && typeof payload.tracing === "number"
        ? payload.tracing
        : (payload && typeof payload.progress === "number" ? payload.progress : 0);
      const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
      const entry = {
        pageId: meta.pageId,
        file: meta.file,
        level: meta.level,
        type,
        activityType: (payload && payload.activityType) || type,
        score,
        stars,
        skills: payload && payload.skills ? payload.skills : {},
        completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
        tracing,
        week: meta.week,
        month: meta.month,
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
        savedAt: new Date().toISOString(),
        ts: Date.now()
      };
      const store = getActivityStore();
      store[meta.pageId] = {
        ...(store[meta.pageId] || {}),
        ...entry
      };
      setActivityStore(store);
      try{
        localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
      }catch(e){}
      return store[meta.pageId];
    }

    async function finishAndSave(payload){
      const session = getStudentSession() || {};
      const fullPayload = {
        ...(payload || {}),
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
      };

      saveLocalActivityFallback(fullPayload);

      if (typeof window.finishActivity === "function") {
        try{
          await window.finishActivity(fullPayload);
        }catch(err){
          console.warn("finishActivity failed, local fallback already saved:", err);
        }
      }

      return fullPayload;
    }

    window.finishAndSave = finishAndSave;
  </script>

  <script>
    (function(){
      const html = document.documentElement;
      const overlay = document.getElementById("gpIntroVideoOverlay");
      const video = document.getElementById("gpIntroVideo");
      const help = document.getElementById("gpIntroHelp");
      const playBtn = document.getElementById("gpIntroPlayBtn");
      const soundBtn = document.getElementById("gpIntroSoundBtn");
      const skipBtn = document.getElementById("gpIntroSkipBtn");

      if (!overlay || !video || !help || !playBtn || !soundBtn || !skipBtn) {
        html.classList.remove("gp-intro-video-pending");
        return;
      }

      let revealed = false;
      let hardTimeout = setTimeout(revealLesson, 60000);

      function revealLesson(){
        if (revealed) return;
        revealed = true;
        clearTimeout(hardTimeout);
        try { video.pause(); } catch(_){}
        overlay.classList.remove("active");
        overlay.style.display = "none";
        html.classList.remove("gp-intro-video-pending");
      }

      function showPlayFallback(msg){
        help.textContent = msg || 'Tap "Play Intro" to start the video.';
        playBtn.style.display = "inline-flex";
      }

      async function tryAutoplayMuted(){
        try{
          video.muted = true;
          video.defaultMuted = true;
          await video.play();
          help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
          playBtn.style.display = "none";
        }catch(err){
          showPlayFallback('Autoplay was blocked. Tap "Play Intro" to start.');
        }
      }

      async function playWithSound(){
        try{
          video.muted = false;
          video.defaultMuted = false;
          video.volume = 1;
          await video.play();
          help.textContent = 'Sound is on. Tap "Skip Intro" to continue.';
          playBtn.style.display = "none";
        }catch(err){
          help.textContent = 'Tap "Play Intro" first, then tap "Turn On Sound".';
          playBtn.style.display = "inline-flex";
        }
      }

      playBtn.addEventListener("click", async () => {
        try{
          video.muted = true;
          video.defaultMuted = true;
          await video.play();
          help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
          playBtn.style.display = "none";
        }catch(err){
          help.textContent = "Unable to start the intro video.";
        }
      });

      soundBtn.addEventListener("click", playWithSound);
      skipBtn.addEventListener("click", revealLesson);

      video.addEventListener("playing", () => {
        help.textContent = video.muted
          ? 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".'
          : 'Sound is on. Tap "Skip Intro" to continue.';
      });

      video.addEventListener("ended", revealLesson, { once:true });

      video.addEventListener("error", () => {
        help.textContent = "Intro video failed to load. Opening page now.";
        setTimeout(revealLesson, 800);
      }, { once:true });

      video.addEventListener("loadedmetadata", () => {
        tryAutoplayMuted();
      }, { once:true });

      setTimeout(() => {
        if (!revealed && video.readyState >= 1) tryAutoplayMuted();
      }, 1200);
    })();
  </script>

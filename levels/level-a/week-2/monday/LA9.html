<script>
  window.__GP_REQUIRE_INTRO_AUDIO__ = true;
  const posterWrap = document.getElementById('posterWrap');
  const posterImg  = document.getElementById('posterImg');
  const dotLayer   = document.getElementById('dotLayer');
  const drawLayer  = document.getElementById('drawLayer');
  const ctx        = drawLayer.getContext('2d');

  const progressPercentEl = document.getElementById('progressPercent');
  const progressFillEl    = document.getElementById('progressFill');
  const progressMessageEl = document.getElementById('progressMessage');

  const girlBtn        = document.getElementById('girlBtn');
  const girlSentenceEl = document.getElementById('girlSentence');
  const posterNote     = document.getElementById('posterNote');
  const prevBtn        = document.getElementById('prevBtn');
  const nextBtn        = document.getElementById('nextBtn');
  const clearBtn       = document.getElementById('clearBtn');

  let baseW = 1000;
  let baseH = 1400;

  const SHAPES_NORM = [
    { id:'t1', pts:[ {x:0.294,y:0.286}, {x:0.106,y:0.566}, {x:0.482,y:0.566} ] },
    { id:'t2', pts:[ {x:0.706,y:0.286}, {x:0.518,y:0.566}, {x:0.894,y:0.566} ] },
    { id:'t3', pts:[ {x:0.294,y:0.592}, {x:0.106,y:0.872}, {x:0.482,y:0.872} ] },
    { id:'t4', pts:[ {x:0.706,y:0.592}, {x:0.518,y:0.872}, {x:0.894,y:0.872} ] }
  ];

  let SHAPES_PX = [];

  function rebuildShapesPx(){
    SHAPES_PX = SHAPES_NORM.map((shape) => ({
      id: shape.id,
      pts: shape.pts.map((p) => ({
        x: Math.round(p.x * baseW),
        y: Math.round(p.y * baseH)
      }))
    }));
  }

  const samples   = new Map();
  const visited   = new Map();
  const completed = new Set();
  const shapePercents = new Map();
  let combinedProgress = 0;
  const TRACE_LINE_WIDTH = 9;
  const TRACE_SAMPLE_SPACING = 8;

  function speak(text){
    if(!('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.96; u.pitch = 1.08; u.volume = 1.0;
    if (window.GPTracing?.applyPreferredVoice) window.GPTracing.applyPreferredVoice(u);
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  }

  const traceMilestones = new Set();
  let traceCompleteCheerPlayed = false;

  function playChime(){
    try{ new Audio('../../../../assets/audio/chimes/chime.mp3.mp3').play().catch(()=>{}); }catch(e){}
  }

  let lastTraceSound = 0;
  function playTraceTick(){
    if (window.GPTracing?.playTraceTick) {
      window.GPTracing.playTraceTick({ throttleMs: 110 });
      return;
    }
    try{
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if(!AudioCtx) return;
      const a = new AudioCtx();
      const osc = a.createOscillator();
      const gain = a.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.value = 0.06;
      osc.connect(gain); gain.connect(a.destination);
      osc.start();
      osc.stop(a.currentTime + 0.05);
      osc.onended = () => a.close();
    }catch(e){}
  }

  function playTraceCelebration(){
    playChime();
    window.GPTracing?.playTraceCelebration?.();
  }

  function applyCombinedProgress(total){
    combinedProgress = Math.max(0, Math.min(100, Math.round(total)));
    progressPercentEl.textContent = combinedProgress + '%';
    progressFillEl.style.width = combinedProgress + '%';
    progressMessageEl.textContent = msgFor(combinedProgress);
    if (typeof window.__gpRealtimeSaveLA9 === "function") {
      window.__gpRealtimeSaveLA9(combinedProgress);
    }
    maybeCelebrateProgress(combinedProgress);
  }

  const vertexEntry = window.GPVertexEntry?.create({
    mount: "#vertexEntryMount",
    title: "Write the number of vertices",
    prompt: "Write the number of vertices for each triangle.",
    showProgress: false,
    items: [
      { id: "t1v", label: "Triangle 1", answer: 3, hint: "Write 3", successSpeech: "Correct. A triangle has 3 vertices." },
      { id: "t2v", label: "Triangle 2", answer: 3, hint: "Write 3", successSpeech: "Correct. A triangle has 3 vertices." },
      { id: "t3v", label: "Triangle 3", answer: 3, hint: "Write 3", successSpeech: "Correct. A triangle has 3 vertices." },
      { id: "t4v", label: "Triangle 4", answer: 3, hint: "Write 3", successSpeech: "Correct. A triangle has 3 vertices." }
    ],
    onProgress(state){
      applyCombinedProgress(state.totalProgress);
    }
  }) || null;

  function msgFor(pct){
    if (pct >= 100) return 'Fantastic! Every triangle is complete.';
    if (pct >= 75) return 'Amazing job! Keep tracing the last lines.';
    if (pct >= 40) return 'Great tracing. Keep going.';
    return 'Trace each triangle on the dashed lines.';
  }

  function maybeCelebrateProgress(total){
    [
      [35, 'Nice tracing. Keep going!'],
      [70, 'Great work. You are almost done!']
    ].forEach(([mark, message]) => {
      if (total >= mark && !traceMilestones.has(mark)) {
        traceMilestones.add(mark);
        playChime();
        speak(message);
      }
    });

    if (total >= 100 && !traceCompleteCheerPlayed) {
      traceCompleteCheerPlayed = true;
      playTraceCelebration();
      speak('Excellent! You finished all the triangles.');
    }
  }

  function updateTotal(){
    const values = SHAPES_PX.map(s => shapePercents.get(s.id) || 0);
    const baseTotal = values.length ? Math.round(values.reduce((a,b)=>a+b,0)/values.length) : 0;
    const total = vertexEntry ? vertexEntry.setBaseProgress(baseTotal) : baseTotal;
    if (!vertexEntry) applyCombinedProgress(total);
  }

  function redrawDots(){
    dotLayer.innerHTML = '';
    dotLayer.setAttribute('viewBox', `0 0 ${baseW} ${baseH}`);

    const strokeW = Math.max(4, Math.round(baseW * 0.004));
    const dashA   = Math.max(14, Math.round(baseW * 0.014));
    const dashB   = Math.max(10, Math.round(baseW * 0.010));

    SHAPES_PX.forEach(shape => {
      const ptsStr = shape.pts.map(p => `${p.x},${p.y}`).join(' ');
      const poly = document.createElementNS('http://www.w3.org/2000/svg','polyline');
      poly.setAttribute('points', ptsStr + ' ' + `${shape.pts[0].x},${shape.pts[0].y}`);
      poly.setAttribute('fill','none');
      poly.setAttribute('stroke','rgba(80,80,80,0.92)');
      poly.setAttribute('stroke-width', String(strokeW));
      poly.setAttribute('stroke-linecap','round');
      poly.setAttribute('stroke-linejoin','round');
      poly.setAttribute('stroke-dasharray', `${dashA} ${dashB}`);
      dotLayer.appendChild(poly);

      shape.pts.forEach(p => {
        const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx', p.x);
        c.setAttribute('cy', p.y);
        c.setAttribute('r', String(Math.max(10, Math.round(baseW * 0.010))));
        c.setAttribute('fill', '#e63a45');
        dotLayer.appendChild(c);
      });
    });
  }

  function resizeCanvasToImage(){
    const rect = posterImg.getBoundingClientRect();
    const cssW = Math.max(1, Math.round(rect.width));
    const cssH = Math.max(1, Math.round(rect.height));

    const dpr = Math.max(1, window.devicePixelRatio || 1);

    drawLayer.style.width  = cssW + 'px';
    drawLayer.style.height = cssH + 'px';

    drawLayer.width  = Math.round(cssW * dpr);
    drawLayer.height = Math.round(cssH * dpr);

    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,cssW,cssH);

    redrawDots();
    buildSamples();
  }

  function imgToCanvas(pt){
    const rect = posterImg.getBoundingClientRect();
    const scaleX = rect.width / baseW;
    const scaleY = rect.height / baseH;
    return { x: pt.x * scaleX, y: pt.y * scaleY };
  }

  function buildSamples(){
    samples.clear();
    visited.clear();
    completed.clear();
    shapePercents.clear();
    if (vertexEntry) vertexEntry.reset();

    const spacing = TRACE_SAMPLE_SPACING;
    SHAPES_PX.forEach(shape => {
      const ptsCanvas = shape.pts.map(imgToCanvas);
      const s = [];
      for(let i=0;i<ptsCanvas.length;i++){
        const a = ptsCanvas[i];
        const b = ptsCanvas[(i+1)%ptsCanvas.length];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx,dy);
        const steps = Math.max(1, Math.ceil(dist/spacing));
        for(let k=0;k<=steps;k++){
          s.push({ x: a.x + (dx*k/steps), y: a.y + (dy*k/steps) });
        }
      }
      samples.set(shape.id, s);
      visited.set(shape.id, new Array(s.length).fill(false));
    });

    updateTotal();
  }

  function updateVisited(currPos, prevPos){
    const rect = posterImg.getBoundingClientRect();
    const strokeRadius = Math.max(14, TRACE_LINE_WIDTH * 0.95);
    const threshold = Math.max(22, rect.width * 0.022, strokeRadius + 8);
    const thr2 = threshold * threshold;

    const a = prevPos || currPos;
    const b = currPos;
    const abx = b.x - a.x;
    const aby = b.y - a.y;
    const ab2 = (abx * abx) + (aby * aby) || 1;

    function dist2PointToSegment(p){
      const apx = p.x - a.x;
      const apy = p.y - a.y;
      let t = (apx * abx + apy * aby) / ab2;
      t = Math.max(0, Math.min(1, t));
      const qx = a.x + t * abx;
      const qy = a.y + t * aby;
      const dx = p.x - qx;
      const dy = p.y - qy;
      return dx * dx + dy * dy;
    }

    SHAPES_PX.forEach(shape => {
      const s = samples.get(shape.id) || [];
      const v = visited.get(shape.id) || [];
      if (!s.length || !v.length) return;

      let hit = false;
      for(let i=0;i<s.length;i++){
        if(v[i]) continue;
        if(dist2PointToSegment(s[i]) <= thr2){ v[i]=true; hit = true; }
      }

      if(hit){
        let pct = Math.round((v.filter(Boolean).length / s.length) * 100);
        if (pct >= 98) pct = 100;
        shapePercents.set(shape.id, pct);
        if(pct >= 100) completed.add(shape.id);
      } else {
        if (!shapePercents.has(shape.id)) shapePercents.set(shape.id, 0);
      }
    });

    updateTotal();
  }

  let drawing = false;
  let last = null;
  let lastMid = null;
  let activePointerId = null;

  function getPosFromPointer(e){
    const rect = drawLayer.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function getUnifiedPos(e){
    if (e && typeof e.clientX === 'number' && typeof e.clientY === 'number') {
      return getPosFromPointer(e);
    }
    const touch = e && e.touches && e.touches[0] ? e.touches[0] : (e && e.changedTouches && e.changedTouches[0] ? e.changedTouches[0] : null);
    if (!touch) return null;
    const rect = drawLayer.getBoundingClientRect();
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }

  function startDraw(e){
    e.preventDefault();
    activePointerId = typeof e.pointerId === 'number' ? e.pointerId : null;
    try {
      if (activePointerId != null && drawLayer.setPointerCapture) drawLayer.setPointerCapture(activePointerId);
    } catch (_) {}

    drawing = true;
    last = getUnifiedPos(e);
    if (!last) return;
    lastMid = last;

    ctx.beginPath();
    ctx.moveTo(last.x, last.y);
    ctx.lineWidth = TRACE_LINE_WIDTH;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#ff4d4d';
    ctx.globalCompositeOperation = 'source-over';

    updateVisited(last, last);
  }

  function moveDraw(e){
    if(!drawing) return;
    e.preventDefault();
    if (activePointerId != null && typeof e.pointerId === 'number' && e.pointerId !== activePointerId) return;

    const prev = last;
    const p = getUnifiedPos(e);
    if (!p || !prev) return;
    const mid = { x:(prev.x+p.x)/2, y:(prev.y+p.y)/2 };

    ctx.quadraticCurveTo(prev.x, prev.y, mid.x, mid.y);
    ctx.stroke();

    last = p;
    lastMid = mid;

    updateVisited(p, prev);

    const now = performance.now();
    if(now - lastTraceSound > 120){ lastTraceSound = now; playTraceTick(); }
  }

  function endDraw(e){
    if(!drawing) return;
    e.preventDefault();
    drawing = false;
    try {
      if (activePointerId != null && drawLayer.releasePointerCapture) drawLayer.releasePointerCapture(activePointerId);
    } catch (_) {}
    activePointerId = null;
    last = null;
    lastMid = null;
  }

  drawLayer.addEventListener('pointerdown', startDraw);
  drawLayer.addEventListener('pointermove', moveDraw);
  drawLayer.addEventListener('pointerup', endDraw);
  drawLayer.addEventListener('pointercancel', endDraw);
  drawLayer.addEventListener('pointerleave', endDraw);
  drawLayer.addEventListener('mousedown', startDraw);
  drawLayer.addEventListener('mousemove', moveDraw);
  window.addEventListener('mouseup', endDraw);
  drawLayer.addEventListener('touchstart', startDraw, { passive:false });
  drawLayer.addEventListener('touchmove', moveDraw, { passive:false });

  clearBtn.addEventListener('click', () => {

  nextBtn?.addEventListener('click', () => window.location.href = '../tuesday/LA10.html');

    baseH = posterImg.naturalHeight || 1400;

    redrawDots();
    resizeCanvasToImage();
  }

  if (posterImg.complete) initAfterImageLoad();
  else posterImg.addEventListener('load', initAfterImageLoad, { once:true });

  function fitCardToViewport(){
    window.GPTracing.fitElementToViewport('.card', {
      minWidth: 320,
      minHeight: 420,
      padding: 8,
      minScale: 0.58,
      useScrollSize: true,
      isActive: () =>
        document.body.classList.contains('intro-active') ||
        document.documentElement.classList.contains('lesson-intro-video-pending') ||
        document.documentElement.classList.contains('gp-intro-video-pending')
    });

  window.addEventListener('resize', () => {
    resizeCanvasToImage();
    fitCardToViewport();
  });
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', fitCardToViewport);
  }
  fitCardToViewport();

<script src="../../../../activity-standardizer.js"></script>
<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
  let realtimeSaveTimer = null;
  window.__gpRealtimeSaveLA9 = function(score){
    if (typeof window.finishAndSave !== "function") return;
    if (realtimeSaveTimer) window.clearTimeout(realtimeSaveTimer);
    realtimeSaveTimer = window.setTimeout(() => {
      window.finishAndSave({
        pageId: "LA9",
        level: "A",
        activityType: "lesson",
        score: Math.max(0, Math.min(100, Math.round(score))),
        tracing: Math.max(0, Math.min(100, Math.round(score))),
        stars: score >= 93 ? 3 : score >= 70 ? 2 : score >= 40 ? 1 : 0
      }).catch(() => {});
    }, 250);
  };
  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LA9",
    defaultLevel: "A",
    defaultActivityType: "lesson",
    defaultScore: 100,
    defaultStars: 1,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);
    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}
    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };

    saveLocalActivityFallback(fullPayload);

    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }

    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>

<script>
  (function(){
    const html = document.documentElement;
    const overlay = document.getElementById("gpIntroVideoOverlay");
    const video = document.getElementById("gpIntroVideo");
    const help = document.getElementById("gpIntroHelp");
    const playBtn = document.getElementById("gpIntroPlayBtn");
    const soundBtn = document.getElementById("gpIntroSoundBtn");
    const skipBtn = document.getElementById("gpIntroSkipBtn");

    if (!overlay || !video || !help || !playBtn || !soundBtn || !skipBtn) {
      html.classList.remove("gp-intro-video-pending");
      return;
    }

    let revealed = false;
    let hardTimeout = setTimeout(revealLesson, 60000);

    function revealLesson(){
      if (revealed) return;
      revealed = true;
      clearTimeout(hardTimeout);
      try { video.pause(); } catch(_){}
      overlay.classList.remove("active");
      overlay.style.display = "none";
      html.classList.remove("gp-intro-video-pending");
    }

    function showPlayFallback(msg){
      help.textContent = msg || 'Tap "Play Intro" to start the video.';
      playBtn.style.display = "inline-flex";
    }

    async function tryAutoplayMuted(){
      try{
        video.muted = true;
        video.defaultMuted = true;
        await video.play();
        help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
        playBtn.style.display = "none";
      }catch(err){
        showPlayFallback('Autoplay was blocked. Tap "Play Intro" to start.');
      }
    }

    async function playWithSound(){
      try{
        video.muted = false;
        video.defaultMuted = false;
        video.volume = 1;
        await video.play();
        help.textContent = 'Sound is on. Tap "Skip Intro" to continue.';
        playBtn.style.display = "none";
      }catch(err){
        help.textContent = 'Tap "Play Intro" first, then tap "Turn On Sound".';
        playBtn.style.display = "inline-flex";
      }
    }

    playBtn.addEventListener("click", async () => {
      try{
        video.muted = true;
        video.defaultMuted = true;
        await video.play();
        help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
        playBtn.style.display = "none";
      }catch(err){
        help.textContent = "Unable to start the intro video.";
      }
    });

    soundBtn.addEventListener("click", playWithSound);
    skipBtn.addEventListener("click", revealLesson);

    video.addEventListener("playing", () => {
      help.textContent = video.muted
        ? 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".'
        : 'Sound is on. Tap "Skip Intro" to continue.';
    });

    video.addEventListener("ended", revealLesson, { once:true });

    video.addEventListener("error", () => {
      help.textContent = "Intro video failed to load. Opening page now.";
      setTimeout(revealLesson, 800);
    }, { once:true });

    video.addEventListener("loadedmetadata", () => {
      tryAutoplayMuted();
    }, { once:true });

    setTimeout(() => {
      if (!revealed && video.readyState >= 1) tryAutoplayMuted();
    }, 1200);
  })();
</script>

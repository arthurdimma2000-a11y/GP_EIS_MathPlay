<!doctype html>
<html lang="en">
<head>
<style id="gpLessonPrehide">
  .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
  .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}
  .convo-line.show,.speech-line.show,.dialog-line.show,.bubble-line.show,.bubble-left.show,.bubble-right.show,#bubbleLeft.show,#bubbleRight.show{display:block !important;}
  .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,1.9vw,19px) !important;line-height:1.24 !important;max-width:min(40vw,320px) !important;white-space:normal !important;word-break:break-word !important;overflow-wrap:anywhere !important;}
  @media (max-width:780px){
    .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,3.6vw,17px) !important;max-width:min(44vw,220px) !important;line-height:1.2 !important;}
  }
</style>
<meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Level A_Literacy Math: Repeat and Record Week 1</title>

  <style>
    :root{
      --ink:#2d2d2d;
      --bg:#e4f6df;
      --card:#f9f4ff;
      --border:#d9b9f0;
      --accent:#6c4bbf;
      --bubble-kid:#d8ebff;
      --bubble-baker:#fde3c4;
      --btn-yellow:#f6da7b;
      --btn-orange:#ff8a5b;
      --btn-blue:#dfeaff;
      --shadow:0 10px 24px rgba(0,0,0,.08);
      font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    }
    *{box-sizing:border-box;}
    html, body{
      width:100%;
      height:auto;
      min-height:100%;
      overflow-x:hidden;
    }
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      background:var(--bg);
      padding:4px;
      overflow-y:auto;
      color:var(--ink);
    }
    body.intro-active{
      overflow:hidden;
    }
    .app{
      width:min(980px,96vw);
      background:#fff;
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:16px 16px 10px;
      position:relative;
      transform-origin:top center;
      will-change:transform;
    }
    .home-btn{
      position:absolute;
      right:10px;
      top:8px;
      width:72px;
      height:72px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      border:none;
      padding:0;
      text-decoration:none;
      z-index:5;
      transform-origin:top center;
      animation:homeSwing 2.4s ease-in-out infinite;
    }
    .home-btn img{
      width:72px;
      height:72px;
      display:block;
      filter:drop-shadow(0 8px 10px rgba(0,0,0,.22));
    }
    @keyframes homeSwing{
      0%{transform:rotate(-6deg);}
      50%{transform:rotate(8deg);}
      100%{transform:rotate(-6deg);}
    }
    .title{
      font-size:1.25rem;
      font-weight:800;
      margin-bottom:10px;
    }
    .board{
      border:2px dashed var(--border);
      border-radius:16px;
      padding:16px;
      background:var(--card);
      min-height:420px;
      position:relative;
    }
    .tray-hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      margin:6px 0 14px;
      position:relative;
      gap:10px;
    }
    .tray-hero img{
      width:min(420px,90%);
      height:auto;
      display:block;
      filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
    }
    .convo-line{
      display:none !important;
      position:absolute;
      inset:0;
      pointer-events:none;
    }
    .convo-line[hidden]{
      display:none !important;
    }
    .convo-line.show{
      display:block !important;
    }
    .row{
      display:flex;
      align-items:center;
      gap:10px;
      margin:18px 0;
    }
    .row.right{
      justify-content:flex-end;
    }
    .avatar{
      width:56px;
      height:56px;
      border-radius:50%;
      background:#fff;
      border:3px solid #fff;
      box-shadow:0 4px 10px rgba(0,0,0,.1);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      color:#777;
      overflow:hidden;
    }
    .avatar img{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      display:block;
    }
    .name-tag{
      font-size:.75rem;
      font-weight:700;
      text-transform:uppercase;
      color:#666;
      margin-top:4px;
      text-align:center;
    }
    .bubble{
      padding:10px 14px;
      border-radius:16px;
      position:relative;
      font-size:1rem;
      max-width:min(560px,70vw);
      line-height:1.25;
      white-space:nowrap;
    }
    .bubble-stack{
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:flex-start;
    }
    .row.right .bubble-stack{
      align-items:flex-end;
    }
    .repeat-result{
      margin-top:4px;
      font-size:.95rem;
      font-weight:700;
      color:#2f9f5f;
    }
    .star-row{
      display:flex;
      gap:6px;
      margin-top:4px;
      font-weight:900;
      font-size:1.2rem;
      color:#ffd24a;
      text-shadow:
        0 2px 0 #b87900,
        0 4px 0 #8a5a00,
        0 8px 14px rgba(0,0,0,.28);
    }
    .cookie-row{
      display:flex;
      justify-content:center;
      gap:18px;
      margin:12px 0;
    }
    .cookie-row.hidden{
      display:none;
    }
    .cookie-row img{
      width:min(220px,40vw);
      height:auto;
      display:block;
      filter:drop-shadow(0 8px 12px rgba(0,0,0,.12));
    }
    .triangle-answer{
      position:absolute;
      left:50%;
      top:66%;
      transform:translateX(-50%);
      padding:8px 14px;
      border-radius:12px;
      background:rgba(255,255,255,.94);
      color:#1f5ea8;
      font-size:1.1rem;
      font-weight:900;
      box-shadow:0 6px 12px rgba(0,0,0,.16);
      border:2px solid #b8d5ff;
      display:none;
      z-index:3;
      pointer-events:none;
      text-align:center;
      white-space:nowrap;
    }
    .triangle-answer.show{
      display:block;
    }
    .bubble.kid{background:var(--bubble-kid);}
    .bubble.baker{background:var(--bubble-baker);}
    .poster-bubble{
      position:absolute;
      max-width:min(420px,70vw);
    }
    .poster-dialogue-zone{
      display:none;
      width:min(460px,92%);
      margin:2px auto 0;
      padding:10px 12px;
      border-radius:18px;
      background:rgba(255,255,255,.94);
      box-shadow:0 8px 18px rgba(0,0,0,.10);
      border:2px solid rgba(108,75,191,.14);
    }
    .poster-dialogue-zone.active{
      display:block;
    }
    .poster-dialogue-zone .convo-line{
      position:static;
      inset:auto;
      width:100%;
      margin:0;
      pointer-events:none;
    }
    .poster-dialogue-zone .convo-line.show{
      display:block !important;
    }
    .poster-dialogue-zone .poster-bubble,
    .poster-dialogue-zone .kid-bubble,
    .poster-dialogue-zone .chef-bubble{
      position:static;
      right:auto;
      left:auto;
      top:auto;
      transform:none;
      max-width:100%;
    }
    .poster-dialogue-zone .bubble-stack{
      width:100%;
      align-items:flex-start;
    }
    .poster-dialogue-zone .bubble{
      width:100%;
      max-width:100%;
      white-space:normal;
    }
    .kid-bubble{
      right:10%;
      top:58%;
      transform:none;
    }
    .chef-bubble{
      right:10%;
      left:auto;
      top:22%;
      transform:none;
    }
    .tap-prompt{
      position:absolute;
      right:8%;
      left:auto;
      top:10%;
      transform:none;
      padding:8px 14px;
      border-radius:12px;
      background:rgba(255,255,255,.96);
      color:#1e4d8f;
      font-size:1.15rem;
      font-weight:900;
      box-shadow:0 6px 12px rgba(0,0,0,.16);
      border:2px solid #b8d5ff;
      display:none;
      z-index:4;
      pointer-events:none;
      text-align:center;
      white-space:nowrap;
    }
    .tap-prompt.show{
      display:block;
    }
    .bubble.sparkle{
      background: linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);
      box-shadow:0 0 12px rgba(255,214,0,.6), 0 0 18px rgba(255,105,180,.4);
      animation: sparklePulse 1.2s ease-in-out infinite;
    }
    @keyframes sparklePulse{
      0%,100%{filter:brightness(1);}
      50%{filter:brightness(1.12);}
    }
    .bubble.kid::after{
      content:"";
      position:absolute;
      right:-6px;
      top:14px;
      border-width:8px 0 8px 8px;
      border-style:solid;
      border-color:transparent transparent transparent var(--bubble-kid);
    }
    .bubble.baker::after{
      content:"";
      position:absolute;
      left:-6px;
      top:14px;
      border-width:8px 8px 8px 0;
      border-style:solid;
      border-color:transparent var(--bubble-baker) transparent transparent;
    }
    .controls{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-top:14px;
      flex-wrap:wrap;
    }
    .btn{
      border:none;
      border-radius:999px;
      padding:10px 16px;
      font-size:.95rem;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(0,0,0,.15);
    }
    .btn.prev{background:#f8f0c7;color:#9c7b2f;}
    .btn.next{background:var(--btn-yellow);color:#8b5a00;}
    .btn.stop{background:var(--btn-blue);color:#1f3b6b;}
    .btn.read{background:var(--btn-orange);color:#fff;}
    .btn.mic{
      background:var(--btn-orange);
      color:#fff;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .record-icon{
      width:16px;
      height:16px;
      display:inline-block;
      vertical-align:middle;
    }
    .record-icon path{
      stroke:#fff;
    }
    .mic-icon-btn{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .mic-icon-btn img{
      width:38px;
      height:38px;
      display:block;
      filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
    }
    .recording{
      display:inline-flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .recording audio{
      height:32px;
    }
    .recording-status{
      font-size:.85rem;
      color:#555;
    }
    .conversation-status{
      margin-top:8px;
      font-size:.95rem;
      font-weight:800;
      color:#6c4bbf;
      min-height:1.2em;
    }
    .footer-note{
      margin-top:6px;
      font-size:.9rem;
      color:#666;
    }
    @media (max-width:780px){
      .row{gap:8px;}
      .avatar{width:48px;height:48px;}
      .bubble{font-size:.95rem;}
    }
  </style>

<body>
  <div class="app">
    <a class="home-btn" href="../../../../index.html" aria-label="Home">
      <img src="../../../../assets/images/avatars/Home1.png" alt="Home">
    </a>
    <div class="title">Level A_Literacy Math: Repeat and Record Week 2</div>

    <div class="board" id="board">
      <div class="tray-hero">
        <img src="../../../../assets/images/shapes/A8.png" alt="Poster">
        <div class="convo-line" hidden>
          <div class="bubble-stack poster-bubble chef-bubble">
            <div class="bubble baker">Eat some cookies.</div>
            <div class="repeat-result" data-line="0"></div>
            <div class="star-row" data-line="0"></div>
          </div>
        </div>
        <div class="convo-line" hidden>
          <div class="bubble-stack poster-bubble kid-bubble">
            <div class="bubble kid">Yes, I'm hungry.</div>
            <div class="repeat-result" data-line="1"></div>
            <div class="star-row" data-line="1"></div>
          </div>
        </div>
      <div class="tap-prompt" id="tapPrompt">Are you hungry?</div>
      <div class="triangle-answer" id="triangleAnswer">They are triangles.</div>
      <div class="poster-dialogue-zone" id="posterDialogueZone" aria-live="polite"></div>
    </div>
    </div>

    <div class="controls">
      <button class="btn prev" id="prevBtn">&#8592; Previous page</button>
      <button class="btn next" id="nextBtn">Next page &#8594;</button>
      <button class="btn stop" id="clearBtn" type="button">Clear</button>
      <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
        <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone">
      </button>
      <button class="btn read" id="recordBtn">
        <svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z"
                fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
          <path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        </svg>
        Record
      </button>
      <div class="recording">
        <audio id="recordingPlayback" controls></audio>
      </div>
    </div>
    <div class="recording-status" id="recordingStatus"></div>
    <div class="conversation-status" id="conversationStatus"></div>
    <div class="footer-note">Tap the microphone to reveal the conversation line by line.</div>
  </div>

  <script>
    const micIconBtn = document.getElementById("micIconBtn");
    const clearBtn = document.getElementById("clearBtn");
    const recordBtn = document.getElementById("recordBtn");
    const recordingPlayback = document.getElementById("recordingPlayback");
    const recordingStatus = document.getElementById("recordingStatus");
    const conversationStatus = document.getElementById("conversationStatus");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    const lines = Array.from(document.querySelectorAll(".convo-line"));
    const repeatResults = Array.from(document.querySelectorAll(".repeat-result"));
    const starRows = Array.from(document.querySelectorAll(".star-row"));
    const cookieRow = document.getElementById("cookieRow");
    const triangleAnswer = document.getElementById("triangleAnswer");
    const tapPrompt = document.getElementById("tapPrompt");
    const posterDialogueZone = document.getElementById("posterDialogueZone");
    const instructionAudio = new Audio("../../../../assets/audio/chimes/InstructionAudio.mp3");

    let recorder = null;
    let recordedChunks = [];
    let currentLineIndex = -1;
    let micExpectingRepeat = false;
    let tapRevealTimer = null;
    let instructionStarted = false;
    let introGuideStarted = false;
    const expectedLines = [
      "Eat some cookies.",
      "Yes, I'm hungry."
    ];
    const attempts = [0, 0];
    const maxAttempts = 3;
    const chimeAudio = new Audio("../../../../assets/audio/chimes/chime.mp3");
    chimeAudio.preload = "auto";
    instructionAudio.preload = "auto";
    instructionAudio.volume = 0.28;

    function ensureBubblesUnderPoster(){
      if (!posterDialogueZone) return;
      posterDialogueZone.classList.add("active");
      lines.forEach((line) => {
        if (line.parentElement !== posterDialogueZone) {
          posterDialogueZone.appendChild(line);
        }
      });
    }

    function hideAllLines(){
      lines.forEach(line => {
        line.classList.remove("show");
        line.hidden = true;
        const bubble = line.querySelector(".bubble");
        if (bubble) bubble.classList.remove("sparkle");
      });
      if (posterDialogueZone) posterDialogueZone.classList.remove("active");
      if (tapPrompt) tapPrompt.classList.remove("show");
      if (triangleAnswer) triangleAnswer.classList.remove("show");
    }

    function speakLine(text, onend){
      if (window.GPTracing && typeof window.GPTracing.speakText === "function") {
        window.GPTracing.speakText(text || "", {
          rate: 0.92,
          pitch: 1.06,
          volume: 1,
          lang: "en-US",
          onEnd: onend,
          onError: onend
        });
        return;
      }
      if (!("speechSynthesis" in window)) {
        if (onend) onend();
        return;
      }
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text || "");
      utter.lang = "en-US";
      utter.rate = 0.92;
      utter.pitch = 1.06;
      utter.volume = 1;
      if (window.GPTracing && typeof window.GPTracing.applyPreferredVoice === "function") {
        window.GPTracing.applyPreferredVoice(utter);
      }
      utter.onend = () => { if (onend) onend(); };
      utter.onerror = () => { if (onend) onend(); };
      window.speechSynthesis.speak(utter);
    }

    function setConversationStatus(text){
      if (!conversationStatus) return;
      conversationStatus.textContent = text || "";
    }

    function highlightLine(index, on){
      const line = lines[index];
      if (!line) return;
      const bubble = line.querySelector(".bubble");
      if (!bubble) return;
      bubble.classList.toggle("sparkle", on);
    }

    function normalizeSpeech(text){
      return (text || "")
        .toLowerCase()
        .replace(/[^\w\s]|_/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }
    function normalizeWords(text){
      return normalizeSpeech(text).split(" ").filter(Boolean);
    }
    function matchPercent(expected, said){
      const exp = normalizeWords(expected);
      const act = normalizeWords(said);
      if (!exp.length) return 0;
      let match = 0;
      exp.forEach((w) => { if (act.includes(w)) match += 1; });
      return Math.round((match / exp.length) * 100);
    }

    function setStars(index, count){
      const row = starRows[index];
      if (!row) return;
      row.innerHTML = new Array(count).fill("&#9733;").join("");
    }

    function showCookies(){
      if (!cookieRow || !cookieRow.classList.contains("hidden")) return;
      cookieRow.classList.remove("hidden");
      chimeAudio.currentTime = 0;
      chimeAudio.play().catch(() => {});
    }

    function showAndSpeakLine(index){
      const line = lines[index];
      if (!line) return;
      ensureBubblesUnderPoster();
      line.hidden = false;
      line.classList.add("show");
      currentLineIndex = index;
      micExpectingRepeat = true;
      const bubble = line.querySelector(".bubble");
      const text = bubble ? bubble.textContent.trim() : "";
      speakLine(text);
    }

    function handleRepeatResult(expectedText, pct, said){
      attempts[currentLineIndex] += 1;
      const finalSaid = (said || "").trim();
      const finalPct = typeof pct === "number" ? pct : matchPercent(expectedText, finalSaid);
      if (finalPct >= 50) {
        highlightLine(currentLineIndex, false);
        micExpectingRepeat = false;
        const attemptCount = attempts[currentLineIndex];
        const stars =
          window.GPTracing && typeof window.GPTracing.rewardStars === "function"
            ? window.GPTracing.rewardStars(attemptCount)
            : (attemptCount === 1 ? 3 : (attemptCount === 2 ? 2 : 1));
        setStars(currentLineIndex, stars);
        if (repeatResults[currentLineIndex]) {
          repeatResults[currentLineIndex].textContent = finalSaid || expectedText;
        }
        setConversationStatus("");
        if (currentLineIndex === lines.length - 1) {
          chimeAudio.currentTime = 0;
          chimeAudio.play().catch(() => {});
          speakLine("Wow! You are super smart!");
          setConversationStatus("Wow! You are super smart!");
          window.dispatchEvent(new CustomEvent("gp:mic-complete"));
          return;
        }
        setConversationStatus("Great speaking. Get ready for the next bubble.");
        currentLineIndex += 1;
        window.setTimeout(() => { showAndSpeakLine(currentLineIndex); }, 900);
        return;
      }

      if (attempts[currentLineIndex] >= maxAttempts) {
        speakLine("Sorry, Study hard!");
        setConversationStatus("Sorry, Study hard!");
        if (repeatResults[currentLineIndex]) {
          repeatResults[currentLineIndex].textContent = "Sorry, Study hard!";
        }
        setStars(currentLineIndex, 0);
        micExpectingRepeat = false;
        highlightLine(currentLineIndex, false);
        if (currentLineIndex < lines.length - 1) {
          setConversationStatus("Good try. Get ready for the next bubble.");
          currentLineIndex += 1;
          window.setTimeout(() => { showAndSpeakLine(currentLineIndex); }, 900);
        } else {
          chimeAudio.currentTime = 0;
          chimeAudio.play().catch(() => {});
          speakLine("Great try! Keep it up.");
          window.dispatchEvent(new CustomEvent("gp:mic-complete"));
        }
        return;
      }

      speakLine("Sorry, try again!");
      setConversationStatus("Sorry, try again!");
      if (repeatResults[currentLineIndex]) {
        repeatResults[currentLineIndex].textContent = "Sorry, try again!";
      }
    }

    function listenForRepeat(expectedText){
      if (window.GPTracing && typeof window.GPTracing.listenForRepeat === "function") {
        window.GPTracing.listenForRepeat(expectedText, (pct, said) => {
          handleRepeatResult(expectedText, pct, said);
        }, {
          timeoutMs: 6500,
          settleMs: 1400,
          startDelayMs: 700
        });
        return;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        speakLine("Sorry, try again!");
        setConversationStatus("Sorry, try again!");
        return;
      }
      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.continuous = false;
      recognition.maxAlternatives = 3;
      recognition.onresult = (event) => {
        const transcripts = [];
        for (let i = 0; i < event.results.length; i += 1) {
          const result = event.results[i];
          if (!result || !result[0]) continue;
          transcripts.push(result[0].transcript || "");
        }
        const said = (transcripts.join(" ").trim() || event.results[0][0].transcript || "").trim();
        const pct = matchPercent(expectedText, said);
        handleRepeatResult(expectedText, pct, said);
      };
      recognition.onerror = () => {
        speakLine("Sorry, try again!");
        setConversationStatus("Sorry, try again!");
      };
      window.setTimeout(() => {
        try {
          recognition.start();
        } catch (_) {
          speakLine("Sorry, try again!");
          setConversationStatus("Sorry, try again!");
        }
        }, 700);
    }

    function playIntroGuideSequence(){
      if (introGuideStarted) return;
      introGuideStarted = true;
      const steps = [
        "Tap the microphone to reveal the bubble texts under the poster.",
        "Listen carefully and repeat each sentence.",
        "You can tap the picture to hear the page question."
      ];
      let index = 0;
      const runNext = () => {
        const line = steps[index++];
        if (!line) {
          setConversationStatus("Tap the microphone to begin.");
          return;
        }
        setConversationStatus(line);
        speakLine(line, () => {
          window.setTimeout(runNext, 120);
        });
      };
      runNext();
    }

    function playInstructionThenGuide(){
      if (instructionStarted) return;
      instructionStarted = true;
      setConversationStatus("Listen to the instruction audio.");
      instructionAudio.onended = () => {
        playIntroGuideSequence();
      };
      instructionAudio.onerror = () => {
        playIntroGuideSequence();
      };
      window.setTimeout(() => {
        playIntroGuideSequence();
      }, 3600);
      try {
        instructionAudio.currentTime = 0;
        const playAttempt = instructionAudio.play();
        if (playAttempt && typeof playAttempt.catch === "function") {
          playAttempt.then(() => {
            setConversationStatus("Instruction audio is playing.");
          }).catch(() => {
            playIntroGuideSequence();
          });
        }
      } catch (_) {
        playIntroGuideSequence();
      }
    }

    function onMicClick(){
      ensureBubblesUnderPoster();
      if (currentLineIndex === -1) {
        hideAllLines();
        showAndSpeakLine(0);
        setConversationStatus(expectedLines[0]);
        return;
      }
      if (micExpectingRepeat) {
        const bubble = lines[currentLineIndex]?.querySelector(".bubble");
        if (!bubble) return;
        highlightLine(currentLineIndex, true);
        setConversationStatus("Repeat after me.");
        speakLine("Repeat after me.", () => {
          listenForRepeat(bubble.textContent || "");
        });
      }
    }

    function clearConversation(){
      if (tapRevealTimer) {
        clearTimeout(tapRevealTimer);
        tapRevealTimer = null;
      }
      hideAllLines();
      currentLineIndex = -1;
      micExpectingRepeat = false;
      attempts.forEach((_, i) => attempts[i] = 0);
      repeatResults.forEach(el => { if (el) el.textContent = ""; });
      starRows.forEach(el => { if (el) el.textContent = ""; });
      if (cookieRow) cookieRow.classList.add("hidden");
      setConversationStatus("");
    }

    function fitPageToViewport(){
      const appEl = document.querySelector(".app");
      if (!appEl) return;
      const introActive =
        document.body.classList.contains("intro-active") ||
        document.documentElement.classList.contains("lesson-intro-video-pending");
      if (!introActive) {
        appEl.style.transform = "none";
        return;
      }
      const vv = window.visualViewport;
      const vw = Math.max(320, Math.floor(vv ? vv.width : window.innerWidth));
      const vh = Math.max(420, Math.floor(vv ? vv.height : window.innerHeight));
      const pad = 6;

      appEl.style.transform = "none";
      const targetW = Math.max(appEl.scrollWidth, Math.ceil(appEl.getBoundingClientRect().width));
      const targetH = Math.max(appEl.scrollHeight, Math.ceil(appEl.getBoundingClientRect().height));
      if (!targetW || !targetH) return;

      const scaleW = (vw - pad) / targetW;
      const scaleH = (vh - pad) / targetH;
      const scale = Math.min(1, scaleW, scaleH);
      appEl.style.transform = `scale(${Math.max(0.58, scale).toFixed(3)})`;
    }

    function onTapGirlClicked(){
      if (tapRevealTimer) clearTimeout(tapRevealTimer);
      hideAllLines();
      setConversationStatus("");
      currentLineIndex = -1;
      micExpectingRepeat = false;
      if (tapPrompt) tapPrompt.classList.add("show");
      speakLine("Are you hungry?");
      tapRevealTimer = setTimeout(() => {
        if (triangleAnswer) triangleAnswer.classList.add("show");
        speakLine("They are triangles.");
      }, 3000);
    }

    function setRecordLabel(text){
      recordBtn.innerHTML = '<svg class="record-icon" viewBox="0 0 64 64" aria-hidden="true">' +
        '<path d="M32 40c6.6 0 12-5.4 12-12V18c0-6.6-5.4-12-12-12S20 11.4 20 18v10c0 6.6 5.4 12 12 12Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>' +
        '<path d="M14 28c0 9.9 8.1 18 18 18s18-8.1 18-18" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M32 46v10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '<path d="M24 56h16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>' +
        '</svg> ' + text;
    }

    async function toggleRecord(){
      if (recorder && recorder.state === "recording") {
        recorder.stop();
        setRecordLabel("Record");
        if (recordingStatus) recordingStatus.textContent = "Saved recording.";
        return;
      }
      try{
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          if (recordingStatus) recordingStatus.textContent = "Microphone not available in this browser.";
          return;
        }
        if (!window.MediaRecorder) {
          if (recordingStatus) recordingStatus.textContent = "Recording not supported on this device.";
          return;
        }
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
        recordedChunks = [];
        const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
          ? "audio/webm;codecs=opus"
          : (MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "");
        recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
        recorder.ondataavailable = (e) => {
          if (e.data.size > 0) recordedChunks.push(e.data);
        };
        recorder.onstop = () => {
          const type = recorder.mimeType || "audio/webm";
          const blob = new Blob(recordedChunks, { type });
          recordingPlayback.src = URL.createObjectURL(blob);
          recordingPlayback.muted = false;
          recordingPlayback.volume = 1;
          recordingPlayback.load();
          stream.getTracks().forEach(t => t.stop());
        };
        recorder.start();
        setRecordLabel("Stop recording");
        if (recordingStatus) recordingStatus.textContent = "Recording... speak clearly.";
      }catch(e){
        setRecordLabel("Record");
        if (recordingStatus) recordingStatus.textContent = "Microphone permission denied.";
      }
    }

    window.__GP_FORCE_UNIFIED_MIC_PROTOCOL__ = true;
    window.__GP_DISABLE_SHARED_MIC_GUIDE__ = true;
    if (clearBtn) clearBtn.addEventListener("click", clearConversation);
    recordBtn.addEventListener("click", toggleRecord);
    document.addEventListener("click", (event) => {
      const tap = event.target && event.target.closest
        ? event.target.closest("#tapGirl, .tap-girl, .tapGirl")
        : null;
      if (!tap) return;
      onTapGirlClicked();
    });

    nextBtn.addEventListener("click", () => {
      try { instructionAudio.pause(); } catch (_) {}
      try { instructionAudio.currentTime = 0; } catch (_) {}
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      window.location.href = "../wednesday/LA9.html";
    });

    prevBtn.addEventListener("click", () => {
      try { instructionAudio.pause(); } catch (_) {}
      try { instructionAudio.currentTime = 0; } catch (_) {}
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      window.location.href = "../monday/GymClassWk2A.html";
    });

    hideAllLines();
    if (cookieRow) cookieRow.classList.add("hidden");
    fitPageToViewport();
    window.addEventListener("resize", fitPageToViewport);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", fitPageToViewport);
    }
    window.addEventListener("load", playInstructionThenGuide, { once: true });
    window.addEventListener("pagehide", () => {
      try { instructionAudio.pause(); } catch (_) {}
      try { instructionAudio.currentTime = 0; } catch (_) {}
      if ("speechSynthesis" in window) {
        try { window.speechSynthesis.cancel(); } catch (_) {}
      }
    });
  </script>

<script>
  window.addEventListener("load", () => {
    if (!window.GPTrack) return;
    const pageFile = ((location.pathname || "").split("/").pop() || "").replace(/\.html$/i, "");
    GPTrack.start(pageFile || document.title || "Activity");
  });

  async function finishActivity(overrides = {}){
    if (!window.GPTrack) return;
    const pageFile = ((location.pathname || "").split("/").pop() || "").replace(/\.html$/i, "");
    const inferredLevel = (/^(LA|LevelA|Level_A)/i.test(pageFile))
      ? "A"
      : (/^(LB|LevelB)/i.test(pageFile))
        ? "B"
        : (/^(LC|LevelC)/i.test(pageFile))
          ? "C"
          : null;

    await GPTrack.finish({
      pageId: pageFile || document.title || "Activity",
      level: inferredLevel,
      activityType: "activity",
      score: null,
      stars: 0,
      skills: { reading: 0, writing: 0, speaking: 0, listening: 0 },
      ...overrides
    });
  }
</script>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>LA11 – Triangle Fish</title>
<link rel="stylesheet" href="../../../../shared/css/base.css" />
<link rel="stylesheet" href="../../../../shared/css/layout.css" />
<link rel="stylesheet" href="../../../../shared/css/lesson.css" />

<style>
  :root{
    --sky:#bfe9fb;
    --ink:#3b3b3b;
    --accent:#6c4bbf;
    --bubble-kid:#d8ebff;
    --bubble-baker:#fde3c4;
    --btn-yellow:#f6da7b;
    --btn-orange:#ff8a5b;
    --btn-blue:#dfeaff;
    --shadow:0 10px 24px rgba(0,0,0,.08);
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
  }

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--sky);
    padding:18px;
    color:var(--ink);
  }

  html.gp-intro-video-pending body > *:not(#gpIntroVideoOverlay){visibility:hidden !important;}

  .card{
    position:relative;
    width:min(980px,96vw);
    border-radius:18px;
    padding:22px 24px 30px;
    overflow:hidden;
    background:
      radial-gradient(circle at 18% 18%, rgba(255,255,255,.32) 0 58px, transparent 62px),
      radial-gradient(circle at 82% 20%, rgba(255,241,182,.28) 0 72px, transparent 76px),
      linear-gradient(180deg, rgba(255,255,255,.30), rgba(255,255,255,.12));
  }

  .poster-area{
    position:relative;
    width:min(820px,100%);
    margin:8px auto 0;
    z-index:1;
  }

  .convo-poster{
    width:100%;
    height:auto;
    display:block;
    pointer-events:none;
    filter:drop-shadow(0 8px 14px rgba(0,0,0,.12));
  }

  .question{
    margin-top:14px;
    text-align:center;
    color:var(--ink);
    font-size:clamp(1.45rem,3.2vw,2.2rem);
    line-height:1.28;
    font-weight:700;
    min-height:1.4em;
  }

  .girl-sentence{
    margin-top:10px;
    text-align:center;
    font-size:1.5rem;
    font-weight:700;
    color:var(--ink);
    min-height:3.2em;
  }

  .headline-line{
    opacity:0;
    transform:translateY(6px) scale(.98);
    transition:opacity .25s ease, transform .25s ease;
  }

  .headline-line.show{
    opacity:1;
    transform:translateY(0) scale(1);
  }

  .triangle-red{
    color:#d62828;
  }

  .row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:18px 0;
    position:absolute;
    inset:0;
    z-index:4;
    pointer-events:none;
    overflow:visible;
  }

  .convo-line{
    display:none;
  }

  .convo-line.show{
    display:block;
  }

  .bubble-stack{
    display:flex;
    flex-direction:column;
    gap:6px;
    position:absolute;
  }

  .bubble{
    padding:10px 14px;
    border-radius:16px;
    position:relative;
    font-size:1.05rem;
    white-space:nowrap;
    max-width:420px;
    box-shadow:0 8px 16px rgba(0,0,0,.16);
    overflow-wrap:normal;
    word-break:normal;
    font-weight:700;
  }

  .bubble.kid{ background:var(--bubble-kid); }

  .bubble.kid::after{
    content:"";
    position:absolute;
    right:-6px;
    top:14px;
    border-width:8px 0 8px 8px;
    border-style:solid;
    border-color:transparent transparent transparent var(--bubble-kid);
  }

  .bubble.sparkle{
    background:linear-gradient(120deg,#fff2a8,#ffd1f0,#c7f1ff);
    box-shadow:0 0 12px rgba(255,214,0,.6), 0 0 18px rgba(255,105,180,.4);
    animation:sparklePulse 1.2s ease-in-out infinite;
  }

  @keyframes sparklePulse{
    0%,100%{filter:brightness(1);}
    50%{filter:brightness(1.12);}
  }

  .fish1-bubble{
    left:35%;
    top:27%;
    max-width:26%;
    align-items:flex-end;
  }

  .fish2-bubble{
    left:57%;
    top:48%;
    max-width:26%;
    align-items:flex-end;
  }

  .fish3-bubble{
    left:49%;
    top:68%;
    max-width:26%;
    align-items:flex-end;
  }

  .repeat-result{
    margin-top:4px;
    font-size:2.1rem !important;
    line-height:1.1;
    font-weight:900;
    color:#2f9f5f;
    min-height:1.1em;
  }

  .star-row{
    display:flex;
    gap:6px;
    margin-top:4px;
    font-weight:900;
    font-size:2.35rem !important;
    line-height:1;
    color:#ffd24a;
    text-shadow:
      0 2px 0 #b87900,
      0 4px 0 #8a5a00,
      0 8px 14px rgba(0,0,0,.28);
    min-height:1.2em;
  }

  .controls{
    margin-top:12px;
    display:flex;
    flex-direction:column;
    gap:10px;
    font-size:.9rem;
  }

  .controls-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    flex-wrap:wrap;
  }

  .button-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
  }

  .mascot-spot{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#fff;
    border:2px solid #e8e0ff;
    border-radius:14px;
    padding:6px 10px;
    box-shadow:0 8px 16px rgba(0,0,0,.12);
  }

  .tap-girl{
    width:44px;
    height:44px;
    border-radius:12px;
    object-fit:cover;
    cursor:pointer;
    display:block;
  }

  .mascot-hint{
    font-size:.95rem;
    font-weight:800;
    color:#2f9f5f;
    white-space:nowrap;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:10px 16px;
    font-size:.95rem;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
  }

  .btn.prev{background:#f8f0c7;color:#9c7b2f;}
  .btn.next{background:var(--btn-yellow);color:#8b5a00;}
  .btn.stop{background:var(--btn-blue);color:#1f3b6b;}

  .mic-icon-btn{
    border:none;
    background:transparent;
    padding:0;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .mic-icon-btn img{
    width:38px;
    height:38px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));
  }

  .conversation-status{
    margin-top:8px;
    font-size:.95rem;
    font-weight:800;
    color:#6c4bbf;
    min-height:1.2em;
    text-align:center;
  }

  .home-btn{
    position:absolute;
    left:10px;
    top:10px;
    z-index:20;
    animation:homeSwingLA11 2.4s ease-in-out infinite;
  }

  .home-btn img{
    width:72px;
    height:auto;
    display:block;
  }

  @keyframes homeSwingLA11{
    0%{transform:translateY(0) rotate(-6deg);}
    50%{transform:translateY(0) rotate(8deg);}
    100%{transform:translateY(0) rotate(-6deg);}
  }

  .spark{
    position:fixed;
    width:16px;
    height:16px;
    border-radius:50%;
    background:radial-gradient(circle,#fff9a8 0%,#ffd54d 45%,#ff9c2f 70%,transparent 72%);
    pointer-events:none;
    z-index:9999;
    animation:sparkFly .7s ease forwards;
    box-shadow:0 0 12px rgba(255,215,0,.75);
  }

  @keyframes sparkFly{
    0%{
      transform:translate(0,0) scale(.5);
      opacity:0;
    }
    15%{opacity:1;}
    100%{
      transform:translate(var(--dx),var(--dy)) scale(1.2);
      opacity:0;
    }
  }

  #gpIntroVideoOverlay{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.92);
    z-index:99999;
    padding:16px;
    flex-direction:column;
    gap:14px;
  }
  #gpIntroVideoOverlay.active{display:flex;}

  #gpIntroVideo{
    width:min(92vw,980px);
    max-height:82vh;
    height:auto;
    display:block;
    border-radius:14px;
    background:#000;
    box-shadow:0 18px 48px rgba(0,0,0,.45);
  }

  .gp-intro-help{
    color:#fff;
    font-weight:800;
    font-size:1rem;
    text-align:center;
    text-shadow:0 2px 8px rgba(0,0,0,.45);
    max-width:min(92vw,760px);
  }

  .gp-intro-controls{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
  }

  .gp-intro-btn{
    border:none;
    border-radius:999px;
    padding:12px 22px;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,.22);
  }

  .gp-intro-btn.play{
    background:linear-gradient(180deg,#dff7ff,#8fdcff);
    color:#114a67;
    display:none;
  }

  .gp-intro-btn.sound{
    background:linear-gradient(180deg,#fffad7,#ffd86a);
    color:#8b5a00;
  }

  .gp-intro-btn.skip{
    background:linear-gradient(180deg,#ffffff,#e9eef7);
    color:#304060;
  }

  @media (max-width:780px){
    body{
      padding:12px;
      align-items:flex-start;
    }

    .card{
      padding:18px 16px 28px;
    }

    .question{
      font-size:1.6rem;
    }

    .fish1-bubble{
      left:33%;
      top:24%;
      max-width:32%;
    }

    .fish2-bubble{
      left:56%;
      top:47%;
      max-width:32%;
    }

    .fish3-bubble{
      left:46%;
      top:67%;
      max-width:32%;
    }

    .home-btn img{
      width:64px;
    }
  }

  @media (max-width:520px){
    .card{
      width:100%;
      padding:14px 12px 22px;
      border-radius:12px;
    }

    .question{
      font-size:1.24rem;
      line-height:1.24;
    }

    .girl-sentence{
      font-size:1.08rem;
      min-height:2.8em;
    }

    .bubble{
      padding:8px 10px;
      max-width:min(62vw,280px);
      white-space:nowrap;
    }

    .fish1-bubble{
      left:29%;
      top:21%;
      max-width:38%;
    }

    .fish2-bubble{
      left:53%;
      top:46%;
      max-width:38%;
    }

    .fish3-bubble{
      left:43%;
      top:66%;
      max-width:38%;
    }

    .home-btn img{
      width:58px;
    }
  }
</style>
</head>

    </video>
    <div class="gp-intro-help" id="gpIntroHelp">Video is playing muted. Tap "Turn On Sound" if you want audio.</div>
    <div class="gp-intro-controls">
      <button class="gp-intro-btn play" id="gpIntroPlayBtn" type="button">Play Intro</button>

  <div class="card">
    <a class="home-btn" href="../../../../index.html" aria-label="Home">
      <img src="../../../../assets/images/avatars/Home1.png" alt="Home">
    </a>

    <div class="poster-area">
      <img class="convo-poster" src="../../../../assets/images/shapes/A11.png" alt="Triangle fish poster">

      <div class="row convo-line" id="fishConvo1">
        <div class="bubble-stack fish1-bubble">
          <div class="bubble kid">I&#39;m hungry.</div>
          <div class="repeat-result" data-line="0"></div>
          <div class="star-row" data-line="0"></div>
        </div>
      </div>

      <div class="row convo-line" id="fishConvo2">
        <div class="bubble-stack fish2-bubble">
          <div class="bubble kid">I&#39;m hungry.</div>
          <div class="repeat-result" data-line="1"></div>
          <div class="star-row" data-line="1"></div>
        </div>
      </div>

      <div class="row convo-line" id="fishConvo3">
        <div class="bubble-stack fish3-bubble">
          <div class="bubble kid">I&#39;m hungry.</div>
          <div class="repeat-result" data-line="2"></div>
          <div class="star-row" data-line="2"></div>
        </div>
      </div>
    </div>

    <div class="question">How many <span class="triangle-red">triangle</span> fish are there?</div>

    <div class="controls">
      <div class="controls-row">
        <div class="mascot-spot">
          <img src="../../../../assets/images/shapes/CirckleGirlWk1.png" alt="Circle helper girl" id="girlBtn" class="tap-girl">
          <div class="mascot-hint">Tap the girl</div>
        </div>

        <div class="button-row">
          <button class="btn prev" id="prevBtn" type="button">&#8592; Previous page</button>
          <button class="btn next" id="nextBtn" type="button">Next page &#8594;</button>
          <button class="btn stop" id="clearBtn" type="button">Clear</button>

          <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
            <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone">
          </button>
        </div>
      </div>

      <div class="conversation-status" id="conversationStatus"></div>
    </div>
  </div>

  <script src="../../../../shared/js/storage.js"></script>
  <script src="../../../../shared/js/progress.js"></script>
  <script src="../../../../shared/js/tracing.js"></script>

  <script>
    window.__GP_REQUIRE_INTRO_AUDIO__ = true;

    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const clearBtn = document.getElementById("clearBtn");
    const girlBtn = document.getElementById("girlBtn");
    const girlSentenceEl = document.getElementById("girlSentence");
    const micIconBtn = document.getElementById("micIconBtn");
    const conversationStatus = document.getElementById("conversationStatus");

    const lines = [
      document.getElementById("fishConvo1"),
      document.getElementById("fishConvo2"),
      document.getElementById("fishConvo3")
    ];

    const repeatResults = Array.from(document.querySelectorAll(".repeat-result"));
    const starRows = Array.from(document.querySelectorAll(".star-row"));

    const expectedLines = ["I'm hungry.", "I'm hungry.", "I'm hungry."];
    const attempts = [0,0,0];
    const starsAwarded = [0,0,0];
    const maxAttempts = 3;

    let currentLineIndex = -1;
    let micStepIndex = 0;
    let micPhase = "reveal";
    let micBusy = false;
    let micDone = false;
    let micInitialized = false;
    let activitySaved = false;
    let girlTapped = false;
    let sentenceToken = 0;

    const sentenceLines = [
      {
        text:"How many triangle fish are there?",
        html:'How many <span class="triangle-red">triangle</span> fish are there?'
      },
      {
        text:"There are 3 triangle fish.",
        html:'There are <span class="triangle-red">3</span> <span class="triangle-red">triangle</span> fish.'
      }
    ];

    function setConversationStatus(text){
      if (!conversationStatus) return;
      conversationStatus.textContent = text || "";
    }

    function hideAllLines(){
      lines.forEach(line => {
        if (!line) return;
        line.classList.remove("show");
        line.hidden = true;
        line.style.display = "none";
      });
    }

    function showLine(index){
      const line = lines[index];
      if (!line) return;
      line.hidden = false;
      line.classList.add("show");
      line.style.display = "block";
    }

    function speakLine(text, onend){
      if (!("speechSynthesis" in window)) {
        if (onend) onend();
        return;
      }
      const utter = new SpeechSynthesisUtterance(text);
      if (window.GPTracing && typeof window.GPTracing.applyPreferredVoice === "function") {
        window.GPTracing.applyPreferredVoice(utter);
      } else {
        utter.lang = "en-US";
      }
      utter.rate = 0.95;
      utter.pitch = 1.08;
      utter.onend = () => { if (onend) onend(); };
      utter.onerror = () => { if (onend) onend(); };
      window.speechSynthesis.speak(utter);
    }

    function highlightLine(index, on){
      const line = lines[index];
      if (!line) return;
      const bubble = line.querySelector(".bubble");
      if (!bubble) return;
      bubble.classList.toggle("sparkle", on);
    }

    function setStars(index, count){
      const row = starRows[index];
      if (!row) return;
      row.innerHTML = new Array(count).fill("&#9733;").join("");
    }

    function revealBubblesFromMic(){
      micIconBtn.dataset.gpMicSeqBound = "1";
      if (!micInitialized) {
        if (lines[0]) showLine(0);
        for (let i = 1; i < lines.length; i++) {
          if (lines[i]) {
            lines[i].hidden = true;
            lines[i].classList.remove("show");
            lines[i].style.display = "none";
          }
        }
        micInitialized = true;
      }
      currentLineIndex = micStepIndex;
    }

    function listenForRepeat(expectedText, onDone){
      window.GPTracing.listenForRepeat(expectedText, onDone);
    }

    function showAndSpeakLine(index){
      if (index < 0 || index >= lines.length) return;
      showLine(index);
      currentLineIndex = index;
      const bubble = lines[index].querySelector(".bubble");
      if (bubble) speakLine((bubble.textContent || "").trim());
    }

    function clearConversation(){
      hideAllLines();
      currentLineIndex = -1;
      micStepIndex = 0;
      micPhase = "reveal";
      micBusy = false;
      micDone = false;
      micInitialized = false;
      activitySaved = false;

      for (let i = 0; i < attempts.length; i++) attempts[i] = 0;
      for (let i = 0; i < starsAwarded.length; i++) starsAwarded[i] = 0;

      repeatResults.forEach(el => { if (el) el.textContent = ""; });
      starRows.forEach(el => { if (el) el.textContent = ""; });
      lines.forEach(line => {
        const bubble = line && line.querySelector(".bubble");
        if (bubble) bubble.classList.remove("sparkle");
      });
      setConversationStatus("");
    }

    async function moveToNextMicStep(){
      highlightLine(micStepIndex, false);
      micStepIndex += 1;
      micPhase = "reveal";
      micBusy = false;

      if (micStepIndex >= expectedLines.length) {
        micDone = true;

        const totalStars = starsAwarded[0] + starsAwarded[1] + starsAwarded[2];
        const maxStars = expectedLines.length * 3;
        const score = Math.round((totalStars / maxStars) * 100);

        if (totalStars > 0) {
          const remarks = [
            "Wow! You are super smart!",
            "Amazing Job",
            "Great Try! keep it up!!!"
          ];
          const remark = remarks[Math.floor(Math.random() * remarks.length)];
          const chime = new Audio("../../../../assets/audio/chimes/chime.mp3.mp3");
          chime.preload = "auto";
          chime.play().catch(() => {});
          setConversationStatus(remark);
          speakLine(remark);
        } else {
          setConversationStatus("");
        }

        if (typeof window.finishAndSave === "function" && !activitySaved) {
          activitySaved = true;
          await window.finishAndSave({
            pageId: "LA11",
            level: "A",
            activityType: "speaking",
            score,
            stars: Math.min(5, Math.max(1, Math.round(totalStars / 2))),
            skills: {
              reading: girlTapped ? 1 : 0,
              writing: 0,
              speaking: totalStars >= 5 ? 3 : totalStars >= 2 ? 2 : totalStars >= 1 ? 1 : 0,
              listening: totalStars >= 5 ? 3 : totalStars >= 2 ? 2 : totalStars >= 1 ? 1 : 0
            }
          });
        }
        return;
      }

      showAndSpeakLine(micStepIndex);
      setConversationStatus(expectedLines[micStepIndex]);
      micPhase = "repeat";
    }

    async function runMicStepFlow(){
      if (window.GPTracing?.prepareMicSupport) {
        await window.GPTracing.prepareMicSupport().catch(() => {});
      }
      if (micDone || micBusy) return;
      if (!micInitialized) revealBubblesFromMic();

      if (micPhase === "reveal") {
        showAndSpeakLine(micStepIndex);
        setConversationStatus(expectedLines[micStepIndex]);
        micPhase = "repeat";
        return;
      }

      highlightLine(micStepIndex, true);
      micBusy = true;
      setConversationStatus("Repeat after me.");

      speakLine("Repeat after me.", () => {
        listenForRepeat(expectedLines[micStepIndex], (pct, said) => {
          const tryNo = ++attempts[micStepIndex];

          if (pct >= 50) {
            if (repeatResults[micStepIndex]) {
              repeatResults[micStepIndex].style.color = "#2f9f5f";
              repeatResults[micStepIndex].textContent = (said || expectedLines[micStepIndex]).trim();
            }
            starsAwarded[micStepIndex] = window.GPTracing.rewardStars(tryNo);
            setStars(micStepIndex, starsAwarded[micStepIndex]);
            setTimeout(() => { moveToNextMicStep(); }, 220);
            return;
          }

          if (tryNo >= maxAttempts) {
            if (repeatResults[micStepIndex]) {
              repeatResults[micStepIndex].style.color = "#c62828";
              repeatResults[micStepIndex].textContent = "You did a good Job. Nice try!";
            }
            starsAwarded[micStepIndex] = 0;
            setStars(micStepIndex, 0);
            speakLine("You did a good Job. Nice try!", () => setTimeout(() => { moveToNextMicStep(); }, 200));
            return;
          }

          micBusy = false;
          micPhase = "repeat";
          if (repeatResults[micStepIndex]) {
            repeatResults[micStepIndex].style.color = "#c62828";
            repeatResults[micStepIndex].textContent = "Sorry, try again!";
          }
          setConversationStatus("Sorry, try again!");
          speakLine("Sorry, try again!");
        });
      });
    }

    function showSpark(){
      const girlRect = girlBtn.getBoundingClientRect();
      const targetRect = girlSentenceEl.getBoundingClientRect();

      const startX = girlRect.left + girlRect.width / 2;
      const startY = girlRect.top + girlRect.height / 2;
      const endX = targetRect.left + targetRect.width / 2;
      const endY = targetRect.top + targetRect.height / 2;
      const dx = endX - startX;
      const dy = endY - startY;

      const spark = document.createElement("div");
      spark.className = "spark";
      spark.style.left = startX + "px";
      spark.style.top = startY + "px";
      spark.style.setProperty("--dx", dx + "px");
      spark.style.setProperty("--dy", dy + "px");
      document.body.appendChild(spark);
      spark.addEventListener("animationend", () => spark.remove());

      const spark2 = document.createElement("div");
      spark2.className = "spark";
      spark2.style.left = (startX + 10) + "px";
      spark2.style.top = (startY - 4) + "px";
      spark2.style.setProperty("--dx", (dx + 10) + "px");
      spark2.style.setProperty("--dy", (dy - 4) + "px");
      spark2.style.animationDelay = "0.18s";
      spark2.style.transform = "scale(0.75)";
      document.body.appendChild(spark2);
      spark2.addEventListener("animationend", () => spark2.remove());
    }

    function revealSentenceLine(index, token){
      if (token !== sentenceToken) return;
      if (index >= sentenceLines.length) return;
      const lineEl = girlSentenceEl.querySelector(`[data-line="${index}"]`);
      if (!lineEl) return;
      lineEl.classList.add("show");
      speakLine(sentenceLines[index].text, () => {
        setTimeout(() => revealSentenceLine(index + 1, token), 180);
      });
    }

    function stopSpeaking(){
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
    }

    if (clearBtn) {
      clearBtn.addEventListener("click", () => {
        stopSpeaking();
        clearConversation();
        girlSentenceEl.innerHTML = "";
      });
    }

    if (girlBtn) {
      girlBtn.addEventListener("click", (e) => {
        if (e) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
        girlTapped = true;
        if (girlSentenceEl) girlSentenceEl.style.display = "block";
        sentenceToken += 1;
        const token = sentenceToken;

        girlSentenceEl.innerHTML = sentenceLines
          .map((line, i) => `<div class="headline-line" data-line="${i}">${line.html}</div>`)
          .join("");

        showSpark();

        const chime = new Audio("../../../../assets/audio/chimes/chime.mp3.mp3");
        chime.preload = "auto";
        chime.play().catch(() => {});
        setTimeout(() => revealSentenceLine(0, token), 220);
      });
    }

    if (micIconBtn) {
      micIconBtn.addEventListener("click", (e) => {
        if (e) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
        runMicStepFlow();
      });
    }

    if (prevBtn) {
      prevBtn.addEventListener("click", async () => {
        if (typeof window.finishAndSave === "function" && !activitySaved) {
          await window.finishAndSave({
            pageId: "LA11",
            level: "A",
            activityType: "lesson",
            score: micDone ? null : (girlTapped ? 40 : 10),
            stars: micDone ? 0 : (girlTapped ? 1 : 0),
            skills: {
              reading: girlTapped ? 1 : 0,
              writing: 0,
              speaking: 0,
              listening: 0
            }
          });
          activitySaved = true;
        }
        window.location.href = "LA10.html";
      });
    }

    if (nextBtn) {
      nextBtn.addEventListener("click", async () => {
        if (typeof window.finishAndSave === "function" && !activitySaved) {
          await window.finishAndSave({
            pageId: "LA11",
            level: "A",
            activityType: "lesson",
            score: micDone ? null : (girlTapped ? 40 : 10),
            stars: micDone ? 0 : (girlTapped ? 1 : 0),
            skills: {
              reading: girlTapped ? 1 : 0,
              writing: 0,
              speaking: 0,
              listening: 0
            }
          });
          activitySaved = true;
        }
        window.location.href = "../wednesday/LA12.html";
      });
    }

    hideAllLines();
    try { window.__GP_STOP_INTRO_MEDIA && window.__GP_STOP_INTRO_MEDIA(); } catch (_) {}
  </script>

  <script type="module">
    import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";

    window.GPProgress.installTracker({
      saveActivityResult,
      markLoginPing,
      defaultPageId: "LA11",
      defaultLevel: "A",
      defaultActivityType: "lesson",
      defaultScore: 100,
      defaultStars: 1,
      defaultSkills: {
        reading: 1,
        writing: 0,
        speaking: 1,
        listening: 1
      }
    });

    function getStudentSession(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
      }catch(e){
        return null;
      }
    }

    function inferProgressMeta(payload){
      const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
      const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
      const level = (payload && payload.level)
        || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
      const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
      const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
      const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
      const month = payload && payload.month != null ? Number(payload.month) : 1;
      return {
        pageId,
        file,
        level,
        week: Number.isFinite(week) && week > 0 ? week : 1,
        month: Number.isFinite(month) && month > 0 ? month : 1
      };
    }

    function getActivityStore(){
      try{
        return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
      }catch(e){
        return {};
      }
    }

    function setActivityStore(store){
      try{
        localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
      }catch(e){}
    }

    function saveLocalActivityFallback(payload){
      const session = getStudentSession() || {};
      const meta = inferProgressMeta(payload || {});
      const score = payload && typeof payload.score === "number" ? payload.score : 0;
      const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
      const tracing = payload && typeof payload.tracing === "number"
        ? payload.tracing
        : (payload && typeof payload.progress === "number" ? payload.progress : 0);
      const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
      const entry = {
        pageId: meta.pageId,
        file: meta.file,
        level: meta.level,
        type,
        activityType: (payload && payload.activityType) || type,
        score,
        stars,
        skills: payload && payload.skills ? payload.skills : {},
        completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
        tracing,
        week: meta.week,
        month: meta.month,
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
        savedAt: new Date().toISOString(),
        ts: Date.now()
      };
      const store = getActivityStore();
      store[meta.pageId] = {
        ...(store[meta.pageId] || {}),
        ...entry
      };
      setActivityStore(store);
      try{
        localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
      }catch(e){}
      return store[meta.pageId];
    }

    async function finishAndSave(payload){
      const session = getStudentSession() || {};
      const fullPayload = {
        ...(payload || {}),
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
      };

      saveLocalActivityFallback(fullPayload);

      if (typeof window.finishActivity === "function") {
        try{
          await window.finishActivity(fullPayload);
        }catch(err){
          console.warn("finishActivity failed, local fallback already saved:", err);
        }
      }

      return fullPayload;
    }

    window.finishAndSave = finishAndSave;
  </script>

  <script>
    (function(){
      const html = document.documentElement;
      const overlay = document.getElementById("gpIntroVideoOverlay");
      const video = document.getElementById("gpIntroVideo");
      const help = document.getElementById("gpIntroHelp");
      const playBtn = document.getElementById("gpIntroPlayBtn");
      const soundBtn = document.getElementById("gpIntroSoundBtn");
      const skipBtn = document.getElementById("gpIntroSkipBtn");

      if (!overlay || !video || !help || !playBtn || !soundBtn || !skipBtn) {
        html.classList.remove("gp-intro-video-pending");
        return;
      }

      let revealed = false;
      let hardTimeout = setTimeout(revealLesson, 60000);

      function revealLesson(){
        if (revealed) return;
        revealed = true;
        clearTimeout(hardTimeout);
        try { video.pause(); } catch(e){}
        overlay.classList.remove("active");
        overlay.style.display = "none";
        html.classList.remove("gp-intro-video-pending");
      }

      function showPlayFallback(msg){
        help.textContent = msg || 'Tap "Play Intro" to start the video.';
        playBtn.style.display = "inline-flex";
      }

      async function tryAutoplayMuted(){
        try{
          video.muted = true;
          video.defaultMuted = true;
          await video.play();
          help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
          playBtn.style.display = "none";
        }catch(err){
          showPlayFallback('Autoplay was blocked. Tap "Play Intro" to start.');
        }
      }

      async function playWithSound(){
        try{
          video.muted = false;
          video.defaultMuted = false;
          video.volume = 1;
          await video.play();
          help.textContent = 'Sound is on. Tap "Skip Intro" to continue.';
          playBtn.style.display = "none";
        }catch(err){
          help.textContent = 'Tap "Play Intro" first, then tap "Turn On Sound".';
          playBtn.style.display = "inline-flex";
        }
      }

      playBtn.addEventListener("click", async () => {
        try{
          video.muted = true;
          video.defaultMuted = true;
          await video.play();
          help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
          playBtn.style.display = "none";
        }catch(err){
          help.textContent = "Unable to start the intro video.";
        }
      });

      soundBtn.addEventListener("click", playWithSound);
      skipBtn.addEventListener("click", revealLesson);

      video.addEventListener("playing", () => {
        help.textContent = video.muted
          ? 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".'
          : 'Sound is on. Tap "Skip Intro" to continue.';
      });

      video.addEventListener("ended", revealLesson, { once:true });

      video.addEventListener("error", () => {
        help.textContent = "Intro video failed to load. Opening page now.";
        setTimeout(revealLesson, 800);
      }, { once:true });

      video.addEventListener("loadedmetadata", () => {
        tryAutoplayMuted();
      }, { once:true });

      setTimeout(() => {
        if (!revealed && video.readyState >= 1) tryAutoplayMuted();
      }, 1200);
    })();
  </script>

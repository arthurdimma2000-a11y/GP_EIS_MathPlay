<!doctype html>
<html lang="en">
<head>

<style id="gpLessonPrehide">
  .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
  .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}
  .convo-line.show,.speech-line.show,.dialog-line.show,.bubble-line.show,.bubble-left.show,.bubble-right.show,#bubbleLeft.show,#bubbleRight.show{display:block !important;}
  .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,1.9vw,19px) !important;line-height:1.24 !important;max-width:min(40vw,320px) !important;white-space:normal !important;word-break:break-word !important;overflow-wrap:anywhere !important;}
  @media (max-width:780px){
    .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,3.6vw,17px) !important;max-width:min(44vw,220px) !important;line-height:1.2 !important;}
  }
</style>

<script>
  document.documentElement.classList.add('gp-intro-video-pending');
  setTimeout(function(){
    document.documentElement.classList.remove('gp-intro-video-pending');
  }, 60000);
</script>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>LA20 - Cookies</title>
<style>
  :root{font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;--ink:#2d2d2d;--bubble:#dff1ff;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#e7f7e7;padding:16px;color:var(--ink);}
  html.gp-intro-video-pending body > *:not(#gpIntroVideoOverlay){visibility:hidden !important;}
  .card{width:min(980px,96vw);background:#fff;border-radius:18px;padding:14px 14px 18px;box-shadow:0 20px 40px rgba(0,0,0,.12);}
  .poster-area{position:relative;width:min(900px,100%);margin:0 auto;border-radius:16px;overflow:hidden;}
  .poster-img{width:100%;height:auto;display:block;}
  .bubble{position:absolute;padding:10px 14px;border-radius:16px;font-weight:800;font-size:1.2rem;max-width:260px;line-height:1.2;box-shadow:0 8px 18px rgba(0,0,0,.12);background:var(--bubble);opacity:0;}
  .bubble.show{opacity:1;}
  .bubble::after{content:"";position:absolute;left:12px;bottom:-10px;border-width:10px 8px 0 8px;border-style:solid;border-color:var(--bubble) transparent transparent transparent;}
  .controls{margin-top:12px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;}
  .btn{border:none;border-radius:999px;padding:8px 12px;font-size:.9rem;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.15);background:#ff8a5b;color:#fff;}
  .mic-icon-btn{border:none;background:transparent;padding:0;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
  .mic-icon-btn img{width:32px;height:32px;display:block;filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));}

  #gpIntroVideoOverlay{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.92);
    z-index:99999;
    padding:16px;
    flex-direction:column;
    gap:14px;
  }
  #gpIntroVideoOverlay.active{display:flex;}

  #gpIntroVideo{
    width:min(92vw,980px);
    max-height:82vh;
    height:auto;
    display:block;
    border-radius:14px;
    background:#000;
    box-shadow:0 18px 48px rgba(0,0,0,.45);
  }

  .gp-intro-help{
    color:#fff;
    font-weight:800;
    font-size:1rem;
    text-align:center;
    text-shadow:0 2px 8px rgba(0,0,0,.45);
    max-width:min(92vw,760px);
  }

  .gp-intro-controls{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
  }

  .gp-intro-btn{
    border:none;
    border-radius:999px;
    padding:12px 22px;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,.22);
  }

  .gp-intro-btn.play{
    background:linear-gradient(180deg,#dff7ff,#8fdcff);
    color:#114a67;
    display:none;
  }

  .gp-intro-btn.sound{
    background:linear-gradient(180deg,#fffad7,#ffd86a);
    color:#8b5a00;
  }

  .gp-intro-btn.skip{
    background:linear-gradient(180deg,#ffffff,#e9eef7);
    color:#304060;
  }
</style>
</head>
<body>

<div id="gpIntroVideoOverlay" class="active" aria-label="Lesson intro video">
  <video id="gpIntroVideo" preload="metadata" autoplay muted playsinline webkit-playsinline poster="../../../../assets/images/shapes/A20.png">
    <source src="https://res.cloudinary.com/dtknykrkf/video/upload/f_auto:video,q_auto/v1774463128/LA20avideo_rkmotx.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <div class="gp-intro-help" id="gpIntroHelp">Video is playing muted. Tap "Turn On Sound" if you want audio.</div>
  <div class="gp-intro-controls">
    <button class="gp-intro-btn play" id="gpIntroPlayBtn" type="button">Play Intro</button>
    <button class="gp-intro-btn sound" id="gpIntroSoundBtn" type="button">Turn On Sound</button>
    <button class="gp-intro-btn skip" id="gpIntroSkipBtn" type="button">Skip Intro</button>
  </div>
</div>

<div class="card">
  <div class="poster-area">
    <img class="poster-img" src="../../../../assets/images/shapes/A20.png" alt="Cookies poster">
    <div class="bubble speakable" data-text="What do you want?" style="left:8%; top:20%;">What do you want?</div>
    <div class="bubble speakable" data-text="I want a circle cookie" style="left:60%; top:30%;">I want a circle cookie</div>
    <div class="bubble speakable" data-text="I want a triangle cookie" style="left:12%; top:55%;">I want a triangle cookie</div>
    <div class="bubble speakable" data-text="I want a square cookie" style="left:62%; top:68%;">I want a square cookie</div>
  </div>
  <div class="controls">
    <button class="btn prev" id="prevBtn">← Previous page</button>
    <button class="mic-icon-btn" id="micIconBtn" type="button" aria-label="Repeat conversation">
      <img src="../../../../assets/images/shapes/Microphone.png" alt="Microphone">
    </button>
    <button class="btn next" id="nextBtn">Next page →</button>
  </div>
  <div id="conversationStatus" style="margin-top:10px;text-align:center;font-weight:800;color:#d62828;min-height:1.5em;"></div>
</div>

<script>
  window.__GP_REQUIRE_INTRO_AUDIO__ = true;
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const micIconBtn = document.getElementById('micIconBtn');
  const conversationStatus = document.getElementById('conversationStatus');
  const bubbles = Array.from(document.querySelectorAll('.bubble.speakable'));
  const expected = bubbles.map((bubble) => (bubble.dataset.text || bubble.textContent || '').trim());
  let micIndex = 0;
  let micPhase = 'reveal';
  let micBusy = false;
  bubbles.forEach((bubble) => bubble.classList.remove('show'));

  function setConversationStatus(text){
    if (conversationStatus) conversationStatus.textContent = text || '';
  }

  function speakLine(text, onDone){
    if (window.GPTracing?.speakText) {
      window.GPTracing.speakText(text, { rate: 0.94, pitch: 1.08, onEnd: onDone });
      return;
    }
    if (typeof onDone === 'function') onDone();
  }

  async function runMicFlow(){
    if (micBusy || micIndex >= bubbles.length) return;
    await window.GPTracing?.prepareMicSupport?.().catch(() => {});
    if (micPhase === 'reveal') {
      bubbles[micIndex].classList.add('show');
      setConversationStatus(expected[micIndex]);
      speakLine(expected[micIndex]);
      micPhase = 'repeat';
      return;
    }
    micBusy = true;
    setConversationStatus('Repeat after me.');
    speakLine('Repeat after me.', () => {
      window.GPTracing?.listenForRepeat?.(expected[micIndex], (pct) => {
        micBusy = false;
        if (pct >= 50) {
          micIndex += 1;
          micPhase = 'reveal';
          setConversationStatus(micIndex >= bubbles.length ? 'Great job!' : '');
          if (micIndex >= bubbles.length) speakLine('Great job!');
          return;
        }
        setConversationStatus('Sorry, try again!');
        speakLine('Sorry, try again!');
      });
    });
  }

  if (micIconBtn) {
    micIconBtn.addEventListener('click', (event) => {
      event.preventDefault();
      event.stopImmediatePropagation();
      runMicFlow();
    });
  }

  prevBtn.addEventListener('click', () => { window.location.href = '../../week-3/friday/LA_Quiz3.html'; });
  nextBtn.addEventListener('click', () => { window.location.href = 'LA21.html'; });
</script>

<script src="../../../../shared/js/storage.js"></script>
<script src="../../../../shared/js/progress.js"></script>
<script src="../../../../shared/js/tracing.js"></script>
<script src="../../../../activity-standardizer.js"></script>

<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LA20",
    defaultLevel: "A",
    defaultActivityType: "lesson",
    defaultScore: 100,
    defaultStars: 1,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);
    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}
    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };

    saveLocalActivityFallback(fullPayload);

    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }

    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>

<script>
  (function(){
    const html = document.documentElement;
    const overlay = document.getElementById("gpIntroVideoOverlay");
    const video = document.getElementById("gpIntroVideo");
    const help = document.getElementById("gpIntroHelp");
    const playBtn = document.getElementById("gpIntroPlayBtn");
    const soundBtn = document.getElementById("gpIntroSoundBtn");
    const skipBtn = document.getElementById("gpIntroSkipBtn");

    if (!overlay || !video || !help || !playBtn || !soundBtn || !skipBtn) {
      html.classList.remove("gp-intro-video-pending");
      return;
    }

    let revealed = false;
    let hardTimeout = setTimeout(revealLesson, 60000);

    function revealLesson(){
      if (revealed) return;
      revealed = true;
      clearTimeout(hardTimeout);
      try { video.pause(); } catch(e){}
      overlay.classList.remove("active");
      overlay.style.display = "none";
      html.classList.remove("gp-intro-video-pending");
    }

    function showPlayFallback(msg){
      help.textContent = msg || 'Tap "Play Intro" to start the video.';
      playBtn.style.display = "inline-flex";
    }

    async function tryAutoplayMuted(){
      try{
        video.muted = true;
        video.defaultMuted = true;
        await video.play();
        help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
        playBtn.style.display = "none";
      }catch(err){
        showPlayFallback('Autoplay was blocked. Tap "Play Intro" to start.');
      }
    }

    async function playWithSound(){
      try{
        video.muted = false;
        video.defaultMuted = false;
        video.volume = 1;
        await video.play();
        help.textContent = 'Sound is on. Tap "Skip Intro" to continue.';
        playBtn.style.display = "none";
      }catch(err){
        help.textContent = 'Tap "Play Intro" first, then tap "Turn On Sound".';
        playBtn.style.display = "inline-flex";
      }
    }

    playBtn.addEventListener("click", async () => {
      try{
        video.muted = true;
        video.defaultMuted = true;
        await video.play();
        help.textContent = 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".';
        playBtn.style.display = "none";
      }catch(err){
        help.textContent = "Unable to start the intro video.";
      }
    });

    soundBtn.addEventListener("click", playWithSound);
    skipBtn.addEventListener("click", revealLesson);

    video.addEventListener("playing", () => {
      help.textContent = video.muted
        ? 'Intro is playing. Tap "Turn On Sound" for audio or "Skip Intro".'
        : 'Sound is on. Tap "Skip Intro" to continue.';
    });

    video.addEventListener("ended", revealLesson, { once:true });

    video.addEventListener("error", () => {
      help.textContent = "Intro video failed to load. Opening page now.";
      setTimeout(revealLesson, 800);
    }, { once:true });

    video.addEventListener("loadedmetadata", () => {
      tryAutoplayMuted();
    }, { once:true });

    setTimeout(() => {
      if (!revealed && video.readyState >= 1) tryAutoplayMuted();
    }, 1200);
  })();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>LA25 - Count and Circle 4 and 5</title>
<link rel="stylesheet" href="../../../../shared/css/base.css" />
<link rel="stylesheet" href="../../../../shared/css/layout.css" />
<link rel="stylesheet" href="../../../../shared/css/lesson.css" />
<style>
  :root{
    font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;
    --ink:#2d2d2d;
    --orange:#fb9819;
    --red:#f2495a;
    --green:#2cc970;
    --shadow:0 20px 40px rgba(0,0,0,.12);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#e7f7e7;
    padding:12px;
    color:var(--ink);
  }
  .card{
    width:min(860px,97vw);
    border-radius:18px;
    padding:12px 12px 16px;
    background:#fff;
    box-shadow:var(--shadow);
  }
  .poster-area{
    position:relative;
    width:min(760px,100%);
    margin:0 auto;
    border-radius:16px;
    overflow:hidden;
    background:#fff7ef;
    box-shadow:0 10px 22px rgba(0,0,0,.08);
    user-select:none;
    -webkit-user-select:none;
  }
  .poster-img{width:100%;height:auto;display:block;pointer-events:none;}
  #circleCanvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:5;
    touch-action:none;
    cursor:crosshair;
  }
  .poster-bubble-highlight{
    position:absolute;
    left:25.6%;
    top:12.0%;
    width:28.2%;
    height:12.2%;
    z-index:6;
    border-radius:52% 48% 50% 46%;
    border:4px solid rgba(255,211,67,.95);
    box-shadow:0 0 0 4px rgba(255,255,255,.55),0 0 20px rgba(255,200,0,.8);
    display:none;
    pointer-events:none;
    animation:gpSparkle 1s ease-in-out infinite;
  }
  .poster-bubble-highlight.show{display:block;}
  .count-bubble{
    position:absolute;
    right:12%;
    top:16.5%;
    z-index:7;
    display:none;
    max-width:34%;
    padding:.62rem .95rem;
    background:#fffdf8;
    border:3px solid #222;
    border-radius:999px;
    font-size:clamp(1.05rem,3.2vw,1.65rem);
    font-weight:1000;
    color:#222;
    text-align:center;
    line-height:1.1;
    box-shadow:0 8px 0 rgba(0,0,0,.10);
    pointer-events:none;
  }
  .count-bubble::after{
    content:"";
    position:absolute;
    left:14%;
    bottom:-13px;
    width:22px;
    height:16px;
    background:#fffdf8;
    border-left:3px solid #222;
    border-bottom:3px solid #222;
    transform:skew(-35deg) rotate(-8deg);
  }
  .count-bubble.show{display:block;}
  .count-bubble.active{animation:gpSparkle 1s ease-in-out infinite;}
  @keyframes gpSparkle{
    0%,100%{filter:drop-shadow(0 0 0 rgba(255,211,67,0));transform:scale(1);}
    50%{filter:drop-shadow(0 0 14px rgba(255,211,67,.95));transform:scale(1.025);}
  }
  .controls{
    margin-top:12px;
    display:flex;
    flex-direction:column;
    gap:10px;
    align-items:center;
  }
  .progress-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;}
  .progress-bar{
    width:min(520px,92%);
    height:13px;
    border-radius:999px;
    background:#e7efff;
    overflow:hidden;
    box-shadow:inset 0 1px 3px rgba(0,0,0,.15);
  }
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#ff8a5b,#38d27a);transition:width .15s ease-out;}
  .progress-text{font-size:.95rem;font-weight:900;color:#3b3b3b;}
  .controls-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;align-items:center;}
  .btn{
    border:none;
    border-radius:999px;
    padding:9px 14px;
    font-size:.95rem;
    font-weight:900;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
    background:#ff8a5b;
    color:#fff;
  }
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.15);}
  .mic-icon-btn{
    border:none;
    background:#fff;
    border-radius:50%;
    width:54px;
    height:54px;
    padding:8px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 18px rgba(0,0,0,.16);
    position:relative;
  }
  .mic-icon-btn img{width:34px;height:34px;display:block;filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));}
  .mic-icon-btn.listening{outline:4px solid rgba(242,73,90,.65);animation:gpMicPulse .75s ease-in-out infinite;}
  @keyframes gpMicPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  .recording audio{max-width:min(280px,82vw);}
  .conversation-status,.recording-status{min-height:1.45em;text-align:center;font-weight:900;color:#d62828;}
  @media(max-width:700px){
    .card{padding:8px 8px 12px;}
    .poster-area{width:100%;}
    .btn{font-size:.86rem;padding:8px 12px;}
    .mic-icon-btn{width:50px;height:50px;}
    .count-bubble{right:7%;top:16%;max-width:40%;}
  }
</style>
<style id="gpUnifiedIntroPrehide">#introVideoWrap,.intro-video-wrap,#lbIntroVideoOverlay{display:none !important;visibility:hidden !important;opacity:0 !important;pointer-events:none !important;}</style>

  <script src="../../../../shared/js/tracing.js"></script>
  <script>
    window.__GP_REQUIRE_INTRO_AUDIO__ = true;

    const posterArea = document.getElementById('posterArea');
    const posterImg = document.getElementById('posterImg');
    const canvas = document.getElementById('circleCanvas');
    const ctx = canvas.getContext('2d');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const clearBtn = document.getElementById('clearBtn');
    const micIconBtn = document.getElementById('micIconBtn');
    const recordBtn = document.getElementById('recordBtn');
    const recordingPlayback = document.getElementById('recordingPlayback');
    const recordingStatus = document.getElementById('recordingStatus');
    const conversationStatus = document.getElementById('conversationStatus');
    const progressPercentEl = document.getElementById('progressPercent');
    const progressFillEl = document.getElementById('progressFill');
    const countBubble = document.getElementById('countBubble');
    const posterBubbleHighlight = document.getElementById('posterBubbleHighlight');

    const correctAnswers = new Set();
    const completedCircles = [];
    let isDrawing = false;
    let currentPath = [];
    let recorder = null;
    let recordedChunks = [];

    const numberZones = [
      { key:'top3', row:'top', number:'3', correct:false, cx:.440, cy:.465, rx:.090, ry:.075 },
      { key:'top4', row:'top', number:'4', correct:true,  cx:.620, cy:.465, rx:.090, ry:.075 },
      { key:'top5', row:'top', number:'5', correct:false, cx:.802, cy:.465, rx:.090, ry:.075 },
      { key:'bottom3', row:'bottom', number:'3', correct:false, cx:.440, cy:.680, rx:.090, ry:.075 },
      { key:'bottom4', row:'bottom', number:'4', correct:false, cx:.620, cy:.680, rx:.090, ry:.075 },
      { key:'bottom5', row:'bottom', number:'5', correct:true,  cx:.802, cy:.680, rx:.090, ry:.075 }
    ];

    function setStatus(text, color){
      conversationStatus.textContent = text || '';
      conversationStatus.style.color = color || '#d62828';
    }

    function speak(text, onEnd){
      if (window.GPTracing?.speakText) {
        window.GPTracing.speakText(text, { rate:0.94, pitch:1.08, onEnd });
        return;
      }
      if (!('speechSynthesis' in window)) { if (typeof onEnd === 'function') onEnd(); return; }
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.94;
      u.pitch = 1.08;
      u.volume = 1;
      if (window.GPTracing?.applyPreferredVoice) window.GPTracing.applyPreferredVoice(u);
      u.onend = () => { if (typeof onEnd === 'function') onEnd(); };
      window.speechSynthesis.speak(u);
    }

    function normalizedWords(text){
      const digitWords = { '1':'one', '2':'two', '3':'three', '4':'four', '5':'five', '6':'six', '7':'seven', '8':'eight', '9':'nine', '0':'zero' };
      return String(text || '')
        .toLowerCase()
        .replace(/[0-9]/g, d => ' ' + digitWords[d] + ' ')
        .replace(/[^a-z\s]/g, ' ')
        .split(/\s+/)
        .filter(Boolean);
    }

    function matchPercent(target, heard){
      const targetWords = normalizedWords(target);
      const heardWords = new Set(normalizedWords(heard));
      if (!targetWords.length) return 0;
      let matched = 0;
      targetWords.forEach(w => { if (heardWords.has(w)) matched += 1; });
      return Math.round((matched / targetWords.length) * 100);
    }

    function listenForRepeat(target, callback){
      if (window.GPTracing?.listenForRepeat) {
        window.GPTracing.listenForRepeat(target, callback);
        return;
      }
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        setStatus('Speech recognition is not available on this device. Please try Chrome or Edge.', '#d62828');
        callback(0);
        return;
      }
      const rec = new SpeechRecognition();
      rec.lang = 'en-US';
      rec.interimResults = false;
      rec.maxAlternatives = 1;
      micIconBtn.classList.add('listening');
      setStatus('Listening... say it now.', '#1d6fd1');
      rec.onresult = (event) => {
        const heard = event.results?.[0]?.[0]?.transcript || '';
        callback(matchPercent(target, heard));
      };
      rec.onerror = () => callback(0);
      rec.onend = () => micIconBtn.classList.remove('listening');
      try { rec.start(); } catch(_e) { micIconBtn.classList.remove('listening'); callback(0); }
    }

    const micLines = [
      { text:'Count and circle the correct number of cookies.', kind:'poster' },
      { text:'1, 2, 3, 4, 5', kind:'count' }
    ];
    let micIndex = 0;
    let micPhase = 'speak';
    let micBusy = false;

    function setActiveMicLine(line, active){
      posterBubbleHighlight.classList.toggle('show', line.kind === 'poster' && active);
      countBubble.classList.toggle('show', line.kind === 'count');
      countBubble.classList.toggle('active', line.kind === 'count' && active);
    }

    function clearActiveMicLines(){
      posterBubbleHighlight.classList.remove('show');
      countBubble.classList.remove('active');
    }

    async function runMicFlow(){
      if (micBusy) return;
      const line = micLines[micIndex];
      await window.GPTracing?.prepareMicSupport?.().catch(() => {});

      if (micPhase === 'speak') {
        setActiveMicLine(line, true);
        setStatus(line.text, '#1b4e74');
        speak(line.text, () => { clearActiveMicLines(); });
        micPhase = 'repeat';
        return;
      }

      micBusy = true;
      setActiveMicLine(line, true);
      setStatus('Repeat after me.', '#d62828');
      speak('Repeat after me.', () => {
        window.setTimeout(() => {
          listenForRepeat(line.text, (pct) => {
            micBusy = false;
            clearActiveMicLines();
            if (pct >= 50) {
              if (micIndex < micLines.length - 1) {
                micIndex += 1;
                micPhase = 'speak';
                setStatus('Excellent! Tap the mic for the next air bubble.', '#1f7a3a');
                speak('Excellent! Tap the mic for the next air bubble.');
              } else {
                setStatus('Excellent! Now circle number 4 on the first row and number 5 on the second row.', '#1f7a3a');
                speak('Excellent! Now circle number four on the first row and number five on the second row.');
              }
              return;
            }
            setStatus('Sorry, try again!', '#d62828');
            speak('Sorry, try again!');
          });
        }, 250);
      });
    }

    function resizeCanvas(){
      const rect = posterArea.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      redraw();
    }

    function localPoint(event){
      const rect = posterArea.getBoundingClientRect();
      return { x:event.clientX - rect.left, y:event.clientY - rect.top };
    }

    function pxZone(zone){
      const rect = posterArea.getBoundingClientRect();
      return {
        ...zone,
        x:zone.cx * rect.width,
        y:zone.cy * rect.height,
        rx:zone.rx * rect.width,
        ry:zone.ry * rect.height
      };
    }

    function pointInZone(point, zone){
      const z = pxZone(zone);
      const dx = (point.x - z.x) / z.rx;
      const dy = (point.y - z.y) / z.ry;
      return dx * dx + dy * dy <= 1;
    }

    function getTargetFromPath(points){
      if (!points.length) return null;
      const xs = points.map(p => p.x);
      const ys = points.map(p => p.y);
      const bbox = {
        minX:Math.min(...xs), maxX:Math.max(...xs),
        minY:Math.min(...ys), maxY:Math.max(...ys)
      };
      const w = bbox.maxX - bbox.minX;
      const h = bbox.maxY - bbox.minY;
      const last = points[points.length - 1];
      const first = points[0];

      let best = null;
      let bestScore = -Infinity;
      for (const zone of numberZones) {
        const z = pxZone(zone);
        const directHits = points.filter(p => pointInZone(p, zone)).length;
        const centerInsideBbox = z.x >= bbox.minX && z.x <= bbox.maxX && z.y >= bbox.minY && z.y <= bbox.maxY;
        const tapHit = pointInZone(first, zone) || pointInZone(last, zone);
        const bigEnoughCircle = centerInsideBbox && w >= z.rx * .75 && h >= z.ry * .60;
        const score = directHits + (tapHit ? 30 : 0) + (bigEnoughCircle ? 45 : 0);
        if (score > bestScore) { bestScore = score; best = zone; }
      }
      return bestScore > 0 ? best : null;
    }

    function drawSmoothPath(points, color, width){
      if (points.length < 2) return;
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i += 1) ctx.lineTo(points[i].x, points[i].y);
      ctx.stroke();
      ctx.restore();
    }

    function drawNeatCircle(zone, color){
      const z = pxZone(zone);
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = 'rgba(255,255,255,.75)';
      ctx.lineWidth = 13;
      ctx.beginPath();
      ctx.ellipse(z.x, z.y, z.rx * 1.05, z.ry * 1.12, -0.04, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = color;
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.ellipse(z.x, z.y, z.rx * 1.05, z.ry * 1.12, -0.04, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,210,74,.9)';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.ellipse(z.x, z.y, z.rx * 1.17, z.ry * 1.24, -0.04, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function redraw(){
      const rect = posterArea.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
      completedCircles.forEach(zone => drawNeatCircle(zone, '#f2495a'));
      if (currentPath.length) drawSmoothPath(currentPath, 'rgba(242,73,90,.88)', 7);
    }

    function playTick(){
      if (window.GPTracing?.playTraceTick) { window.GPTracing.playTraceTick({ throttleMs:120, frequency:820, endFrequency:620, volume:.055 }); return; }
    }

    function playSuccess(){
      window.GPTracing?.playSuccessChime?.();
      window.GPTracing?.playCheerAudio?.();
    }

    function updateProgress(){
      const score = Math.round((correctAnswers.size / 2) * 100);
      progressPercentEl.textContent = score + '%';
      progressFillEl.style.width = score + '%';
      if (typeof window.__gpRealtimeSaveLA25 === 'function') window.__gpRealtimeSaveLA25(score);
      if (score === 100) {
        setStatus('Fantastic! You circled 4 and 5 correctly.', '#1f7a3a');
        playSuccess();
        speak('Fantastic! You circled four and five correctly.');
      }
    }

    function acceptTarget(zone){
      if (!zone.correct) {
        setStatus('Oops! Count the cookies again and choose the correct number.', '#d62828');
        speak('Oops! Count the cookies again and choose the correct number.');
        return;
      }
      if (correctAnswers.has(zone.key)) {
        setStatus('That number is already circled. Find the other correct number.', '#1b4e74');
        return;
      }
      correctAnswers.add(zone.key);
      completedCircles.push(zone);
      redraw();
      playTick();
      if (zone.key === 'top4') {
        setStatus('Great! Four cookies. Number 4 is correct.', '#1f7a3a');
        speak('Great! Four cookies. Number four is correct.');
      } else {
        setStatus('Great! Five cookies. Number 5 is correct.', '#1f7a3a');
        speak('Great! Five cookies. Number five is correct.');
      }
      updateProgress();
    }

    canvas.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      isDrawing = true;
      currentPath = [localPoint(event)];
      canvas.setPointerCapture?.(event.pointerId);
      playTick();
      redraw();
    });

    canvas.addEventListener('pointermove', (event) => {
      if (!isDrawing) return;
      event.preventDefault();
      const p = localPoint(event);
      const last = currentPath[currentPath.length - 1];
      if (!last || Math.hypot(p.x - last.x, p.y - last.y) > 3) currentPath.push(p);
      redraw();
    });

    function finishDraw(event){
      if (!isDrawing) return;
      event.preventDefault();
      currentPath.push(localPoint(event));
      const target = getTargetFromPath(currentPath);
      currentPath = [];
      isDrawing = false;
      redraw();
      if (target) acceptTarget(target);
      else {
        setStatus('Circle a number inside the answer boxes.', '#d62828');
        speak('Circle a number inside the answer boxes.');
      }
    }

    canvas.addEventListener('pointerup', finishDraw);
    canvas.addEventListener('pointercancel', finishDraw);

    clearBtn.addEventListener('click', () => {
      correctAnswers.clear();
      completedCircles.length = 0;
      currentPath = [];
      redraw();
      updateProgress();
      setStatus('Cleared. Circle number 4 in the first row and number 5 in the second row.', '#1b4e74');
      speak('Cleared. Circle number four in the first row and number five in the second row.');
    });

    if (micIconBtn) {
      micIconBtn.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopImmediatePropagation();
        runMicFlow();
      });
    }

    async function toggleRecording(){
      if (!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === 'undefined') {
        recordingStatus.textContent = 'Recording is not available on this device.';
        return;
      }
      if (recorder && recorder.state === 'recording') { recorder.stop(); return; }
      try{
        const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
        recordedChunks = [];
        recorder = new MediaRecorder(stream);
        recorder.ondataavailable = (event) => { if (event.data && event.data.size > 0) recordedChunks.push(event.data); };
        recorder.onstop = () => {
          const blob = new Blob(recordedChunks, { type: recorder.mimeType || 'audio/webm' });
          recordingPlayback.src = URL.createObjectURL(blob);
          recordingStatus.textContent = 'Recording saved.';
          recordBtn.textContent = 'Record';
          stream.getTracks().forEach(track => track.stop());
        };
        recorder.start();
        recordingStatus.textContent = 'Recording...';
        recordBtn.textContent = 'Stop';
      } catch(_e) {
        recordingStatus.textContent = 'Microphone permission is needed to record.';
      }
    }

    if (recordBtn) recordBtn.addEventListener('click', toggleRecording);
    prevBtn.addEventListener('click', () => { window.location.href = 'LA21.html'; });
    nextBtn.addEventListener('click', () => { updateProgress(); window.location.href = '../thursday/ShapeMusicFairlyTale.html'; });

    const boot = () => {
      resizeCanvas();
      updateProgress();
      window.setTimeout(() => speak('Count the cookies. Circle number four in the first row and number five in the second row.'), 650);
    };
    if (posterImg.complete) boot(); else posterImg.addEventListener('load', boot);
    window.addEventListener('resize', resizeCanvas);
  </script>

  <script src="../../../../shared/js/storage.js"></script>
  <script src="../../../../shared/js/progress.js"></script>
  <script src="../../../../activity-standardizer.js"></script>
  <script type="module">
    import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
    let realtimeSaveTimer = null;
    window.__gpRealtimeSaveLA25 = function(score){
      if (typeof window.finishAndSave !== "function") return;
      if (realtimeSaveTimer) window.clearTimeout(realtimeSaveTimer);
      realtimeSaveTimer = window.setTimeout(() => {
        window.finishAndSave({
          pageId: "LA25",
          level: "A",
          activityType: "lesson",
          score: Math.max(0, Math.min(100, Math.round(score))),
          tracing: Math.max(0, Math.min(100, Math.round(score))),
          stars: score >= 100 ? 3 : score >= 50 ? 1 : 0,
          skills: { reading: 1, writing: 1, speaking: 1, listening: 1 }
        }).catch(() => {});
      }, 250);
    };

    window.GPProgress.installTracker({
      saveActivityResult,
      markLoginPing,
      defaultPageId: "LA25",
      defaultLevel: "A",
      defaultActivityType: "lesson",
      defaultScore: 100,
      defaultStars: 1,
      defaultSkills: { reading: 1, writing: 0, speaking: 1, listening: 1 }
    });

    function getStudentSession(){
      try{ return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null"); }catch(e){ return null; }
    }
    function inferProgressMeta(payload){
      const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
      const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
      const level = (payload && payload.level) || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
      const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
      const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
      const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
      const month = payload && payload.month != null ? Number(payload.month) : 1;
      return { pageId, file, level, week: Number.isFinite(week) && week > 0 ? week : 1, month: Number.isFinite(month) && month > 0 ? month : 1 };
    }
    function getActivityStore(){ try{ return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}"); }catch(e){ return {}; } }
    function setActivityStore(store){ try{ localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {})); }catch(e){} }
    function saveLocalActivityFallback(payload){
      const session = getStudentSession() || {};
      const meta = inferProgressMeta(payload || {});
      const score = payload && typeof payload.score === "number" ? payload.score : 0;
      const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
      const tracing = payload && typeof payload.tracing === "number" ? payload.tracing : (payload && typeof payload.progress === "number" ? payload.progress : 0);
      const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
      const entry = {
        pageId: meta.pageId, file: meta.file, level: meta.level, type, activityType: (payload && payload.activityType) || type,
        score, stars, skills: payload && payload.skills ? payload.skills : {}, completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
        tracing, week: meta.week, month: meta.month,
        classId: (payload && payload.classId) || session.classId || null,
        studentId: (payload && payload.studentId) || session.studentId || null,
        studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
        savedAt: new Date().toISOString(), ts: Date.now()
      };
      const store = getActivityStore();
      store[meta.pageId] = { ...(store[meta.pageId] || {}), ...entry };
      setActivityStore(store);
      try{ localStorage.setItem("GP_EIS_LAST_FILE", meta.file); }catch(e){}
      return store[meta.pageId];
    }
    async function finishAndSave(payload){
      const session = getStudentSession() || {};
      const fullPayload = { ...(payload || {}), classId: (payload && payload.classId) || session.classId || null, studentId: (payload && payload.studentId) || session.studentId || null, studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null };
      saveLocalActivityFallback(fullPayload);
      if (typeof window.finishActivity === "function") {
        try{ await window.finishActivity(fullPayload); }catch(err){ console.warn("finishActivity failed, local fallback already saved:", err); }
      }
      return fullPayload;
    }
    window.finishAndSave = finishAndSave;
  </script>

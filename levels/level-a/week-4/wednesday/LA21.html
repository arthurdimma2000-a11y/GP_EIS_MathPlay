<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>LA21 • Vertices Week 4</title>

<style>
*{box-sizing:border-box;}

:root{
  --orange:#ff9f1c;
  --pink:#ff9aa8;
  --grid:#00a8e8;
  --paper:#fffaf1;
  --ink:#24242a;
  --red:#ef2b2b;
  --green:#22c55e;
  --shadow:0 18px 40px rgba(0,0,0,.14);
  font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#e4f6df;
  padding:14px;
  color:var(--ink);
}

.app{
  width:min(760px,96vw);
}

.poster{
  position:relative;
  width:100%;
  aspect-ratio:976 / 1338;
  background:
    linear-gradient(rgba(100,140,190,.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100,140,190,.18) 1px, transparent 1px),
    var(--paper);
  background-size:26px 26px;
  border:12px solid var(--orange);
  border-radius:28px;
  box-shadow:var(--shadow);
  overflow:hidden;
}

.title{
  position:absolute;
  left:0;
  right:0;
  top:-6px;
  text-align:center;
  font-size:clamp(3rem,10vw,5.4rem);
  font-weight:1000;
  color:white;
  -webkit-text-stroke:9px var(--orange);
  paint-order:stroke fill;
  letter-spacing:1px;
  line-height:.95;
  z-index:5;
}

.week{
  position:absolute;
  right:3%;
  top:2.8%;
  border:4px solid var(--orange);
  background:white;
  border-radius:14px;
  padding:.35em .6em;
  font-size:clamp(1rem,2.6vw,1.45rem);
  font-weight:900;
  z-index:5;
}

.chef{
  position:absolute;
  left:4.2%;
  top:6.7%;
  width:14.5%;
  z-index:8;
  text-align:center;
  cursor:pointer;
  border:none;
  background:transparent;
  padding:0;
  filter:drop-shadow(0 5px 8px rgba(0,0,0,.18));
}

.chef img{
  width:100%;
  height:auto;
  display:block;
  object-fit:contain;
  pointer-events:none;
}

.chef small{
  display:block;
  font-size:clamp(.58rem,1.5vw,.78rem);
  color:#1d5fd6;
  font-weight:900;
  background:white;
  border-radius:999px;
  margin-top:-2px;
  padding:2px 5px;
  box-shadow:0 3px 8px rgba(0,0,0,.12);
}

.instruction{
  position:absolute;
  left:22%;
  top:14.25%;
  width:72%;
  font-size:clamp(.94rem,2.35vw,1.55rem);
  font-weight:900;
  z-index:5;
  white-space:nowrap;
  letter-spacing:-.02em;
}

.content{
  position:absolute;
  left:4%;
  right:4%;
  top:19%;
  bottom:3.4%;
  display:grid;
  grid-template-columns:38% 62%;
  grid-template-rows:1fr 1fr 1fr;
  gap:1.2%;
}

.shape-box,
.sentence-box{
  position:relative;
  background:rgba(255,255,255,.38);
  border:4px solid var(--pink);
  border-radius:6px;
  overflow:hidden;
}

.shape-box{
  background:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px),
    rgba(255,255,255,.42);
  background-size:28px 28px;
}

.shape-svg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.shape-line{
  fill:none;
  stroke:#4a4a4a;
  stroke-width:3;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.vertex-dot{
  fill:#e63946;
  stroke:#e63946;
}

.sentence-box{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:3.5% 5%;
}

.sentence{
  width:100%;
  display:grid;
  grid-template-columns:1fr;
  gap:.04em;
  align-items:center;
  justify-content:center;
  font-size:clamp(1.6rem,5.2vw,3.2rem);
  font-weight:500;
  line-height:1.02;
  text-align:left;
  padding-left:3%;
}

.top-sentence,
.bottom-sentence{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:.22em;
  white-space:nowrap;
}

.sentence .black{
  color:#25252b;
}

.sentence .red{
  color:var(--red);
}

.digit-area{
  position:relative;
  display:inline-block;
  width:2.1em;
  height:2.15em;
  vertical-align:middle;
  margin:-.22em .1em -.1em 0;
  flex:0 0 auto;
}

.dotted-number-svg{
  position:absolute;
  inset:-5%;
  width:110%;
  height:110%;
  overflow:visible;
  pointer-events:none;
}

.dotted-number-text{
  fill:none;
  stroke:#202020;
  stroke-width:4.8;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:.1 11.5;
  opacity:.96;
}

.write-canvas{
  position:absolute;
  inset:-10%;
  width:120%;
  height:120%;
  z-index:4;
  touch-action:none;
  cursor:crosshair;
}

.controls{
  margin-top:12px;
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}

.btn{
  border:none;
  border-radius:999px;
  padding:9px 14px;
  font-size:.95rem;
  font-weight:900;
  cursor:pointer;
  color:white;
  background:#ff8a5b;
  box-shadow:0 4px 0 rgba(0,0,0,.18);
  font-family:inherit;
}

.btn.clear{background:#3b82f6;}
.btn.sound{background:#22c55e;}
.btn.report{background:#7c3aed;}

.progress-card{
  margin-top:10px;
  background:white;
  border:3px solid #bbf7d0;
  border-radius:16px;
  padding:9px 12px;
  box-shadow:0 8px 18px rgba(0,0,0,.1);
}

.progress-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:7px;
  flex-wrap:wrap;
}

#progressText{
  font-weight:900;
  color:#14532d;
}

#starsBox{
  font-size:1.35rem;
  letter-spacing:2px;
}

.progress-track{
  height:16px;
  border-radius:999px;
  overflow:hidden;
  background:#dbeafe;
  border:2px solid #93c5fd;
}

#progressFill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#22c55e,#a3e635);
  border-radius:999px;
  transition:width .18s ease;
}

.speech{
  margin-top:8px;
  background:#fff7ed;
  border:3px solid #fed7aa;
  color:#7c2d12;
  border-radius:15px;
  padding:9px 12px;
  text-align:center;
  font-weight:900;
}

.reward{
  position:absolute;
  left:50%;
  top:52%;
  transform:translate(-50%,-50%) scale(.85);
  background:#fff7ed;
  border:5px solid var(--green);
  color:#166534;
  border-radius:24px;
  padding:16px 24px;
  font-size:clamp(1.2rem,4vw,2rem);
  font-weight:1000;
  z-index:50;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease, transform .2s ease;
  box-shadow:0 18px 40px rgba(0,0,0,.24);
}

.reward.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

@media(max-width:560px){
  .poster{
    border-width:7px;
    border-radius:20px;
  }

  .title{
    -webkit-text-stroke:6px var(--orange);
  }

  .chef{
    top:6.5%;
    width:14%;
  }

  .instruction{
    left:21%;
    top:14.15%;
    width:75%;
    font-size:clamp(.78rem,2.55vw,1.05rem);
  }

  .content{
    left:3%;
    right:3%;
    gap:.8%;
  }

  .shape-box,
  .sentence-box{
    border-width:3px;
  }

  .sentence{
    font-size:clamp(1.12rem,4.75vw,2.15rem);
    padding-left:2.5%;
  }

  .digit-area{
    width:2.05em;
    height:2.08em;
  }

  .btn{
    padding:8px 10px;
    font-size:.82rem;
  }
}
</style>
</head>

<script>
const PAGE_ID = "LA21";
const PAGE_FILE = "LA21.html";
const LEVEL = "A";

const speechBox = document.getElementById("speechBox");
const progressText = document.getElementById("progressText");
const progressFill = document.getElementById("progressFill");
const starsBox = document.getElementById("starsBox");
const reward = document.getElementById("reward");

const digitCanvases = [
  { id:"digit0Canvas", digit:"0", label:"circle", answer:0, progress:0 },
  { id:"digit3Canvas", digit:"3", label:"triangle", answer:3, progress:0 },
  { id:"digit4Canvas", digit:"4", label:"square", answer:4, progress:0 }
];

let rewardShown = false;
let audioCtx = null;
let lastTraceSoundTime = 0;
let chimePlayed = false;

const completionChime = new Audio();
completionChime.preload = "auto";

const chimeSources = [
  "chime.mp3",
  "./chime.mp3",
  "../../../../assets/audio/chime.mp3",
  "../../../../assets/audio/chime.mp3.mp3"
];

let chimeSourceIndex = 0;
completionChime.src = chimeSources[chimeSourceIndex];

completionChime.onerror = function(){
  chimeSourceIndex += 1;
  if(chimeSourceIndex < chimeSources.length){
    completionChime.src = chimeSources[chimeSourceIndex];
    completionChime.load();
  }
};

function getAudioContext(){
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if(!AudioContextClass) return null;

  if(!audioCtx){
    audioCtx = new AudioContextClass();
  }

  if(audioCtx.state === "suspended"){
    audioCtx.resume().catch(() => {});
  }

  return audioCtx;
}

function playTraceSound(){
  const nowMs = performance.now();
  if(nowMs - lastTraceSoundTime < 85) return;
  lastTraceSoundTime = nowMs;

  const ctx = getAudioContext();
  if(!ctx) return;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(720, ctx.currentTime);

  gain.gain.setValueAtTime(0.0001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.055, ctx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.08);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.09);
}

function playCompletionChime(){
  completionChime.currentTime = 0;
  completionChime.volume = 1;
  completionChime.play().catch(() => {
    showReward("Excellent! ⭐⭐⭐");
  });
}

function resizeCanvas(canvas){
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.max(1, window.devicePixelRatio || 1);

  canvas.width = Math.round(rect.width * dpr);
  canvas.height = Math.round(rect.height * dpr);

  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "#111827";
  ctx.lineWidth = Math.max(9, rect.width * 0.075);
}

function setupWritableDigit(item){
  const canvas = document.getElementById(item.id);
  const ctx = canvas.getContext("2d");

  let drawing = false;
  let touched = new Set();
  let lastPoint = null;

  function resize(){
    resizeCanvas(canvas);
  }

  function getPoint(event){
    const rect = canvas.getBoundingClientRect();

    return {
      x:event.clientX - rect.left,
      y:event.clientY - rect.top,
      nx:(event.clientX - rect.left) / rect.width,
      ny:(event.clientY - rect.top) / rect.height
    };
  }

  function markCoverage(point){
    const cols = 10;
    const rows = 12;
    const col = Math.max(0, Math.min(cols - 1, Math.floor(point.nx * cols)));
    const row = Math.max(0, Math.min(rows - 1, Math.floor(point.ny * rows)));
    touched.add(row + ":" + col);

    item.progress = Math.min(100, Math.round((touched.size / 28) * 100));
    updateProgress();
  }

  function markCoverageBetween(a,b){
    const dx = b.nx - a.nx;
    const dy = b.ny - a.ny;
    const steps = Math.max(4, Math.ceil(Math.sqrt(dx*dx + dy*dy) * 140));

    for(let i = 0; i <= steps; i++){
      const t = i / steps;
      markCoverage({
        nx:a.nx + dx * t,
        ny:a.ny + dy * t
      });
    }
  }

  canvas.addEventListener("pointerdown", (event) => {
    event.preventDefault();

    getAudioContext();

    drawing = true;
    const p = getPoint(event);
    lastPoint = p;

    ctx.beginPath();
    ctx.moveTo(p.x,p.y);
    markCoverage(p);
    playTraceSound();

    try{ canvas.setPointerCapture(event.pointerId); }catch(err){}
  });

  canvas.addEventListener("pointermove", (event) => {
    if(!drawing) return;
    event.preventDefault();

    const p = getPoint(event);

    ctx.lineTo(p.x,p.y);
    ctx.strokeStyle = "#111827";
    ctx.lineWidth = Math.max(9, canvas.getBoundingClientRect().width * 0.075);
    ctx.stroke();

    playTraceSound();
    markCoverageBetween(lastPoint,p);
    lastPoint = p;
  });

  function stop(event){
    drawing = false;
    lastPoint = null;
    saveProgress();

    try{
      if(event && event.pointerId) canvas.releasePointerCapture(event.pointerId);
    }catch(err){}
  }

  canvas.addEventListener("pointerup", stop);
  canvas.addEventListener("pointercancel", stop);
  canvas.addEventListener("pointerleave", stop);

  item.clear = function(){
    const rect = canvas.getBoundingClientRect();
    ctx.clearRect(0,0,rect.width,rect.height);
    touched.clear();
    item.progress = 0;
  };

  resize();
  window.addEventListener("resize", resize);
}

function getTotalProgress(){
  const total = digitCanvases.reduce((sum,item) => sum + item.progress, 0);
  return Math.round(total / digitCanvases.length);
}

function getStars(percent){
  if(percent >= 85) return 3;
  if(percent >= 55) return 2;
  if(percent >= 25) return 1;
  return 0;
}

function updateProgress(){
  const percent = getTotalProgress();
  const stars = getStars(percent);

  progressText.textContent = "Writing Progress: " + percent + "%";
  progressFill.style.width = percent + "%";
  starsBox.textContent = "⭐".repeat(stars) + "☆".repeat(3 - stars);

  saveProgress();

  if(percent >= 85 && !rewardShown){
    rewardShown = true;
    showReward("Great writing! ⭐⭐⭐");
    speak("Excellent! You wrote the number of vertices.");
  }

  if(percent >= 100 && !chimePlayed){
    chimePlayed = true;
    playCompletionChime();
  }
}

function showReward(text){
  reward.textContent = text;
  reward.classList.add("show");
  setTimeout(() => reward.classList.remove("show"), 1600);
}

function clearWriting(){
  digitCanvases.forEach(item => {
    if(typeof item.clear === "function") item.clear();
  });

  rewardShown = false;
  chimePlayed = false;
  updateProgress();

  speechBox.textContent = "Writing cleared. Try again. Write 0, 3, and 4 on the dotted numbers.";
  speak("Writing cleared. Try again. Write zero, three, and four on the dotted numbers.");
}

function chooseVoice(){
  if(!("speechSynthesis" in window)) return null;

  const voices = speechSynthesis.getVoices();

  return (
    voices.find(v => /en-US/i.test(v.lang) && /Jenny|Aria|Samantha|Zira|Female|Google US English/i.test(v.name)) ||
    voices.find(v => /en-US/i.test(v.lang)) ||
    voices.find(v => /^en/i.test(v.lang)) ||
    null
  );
}

function speak(text){
  if(!("speechSynthesis" in window)) return;

  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.9;
  u.pitch = 1.15;
  u.volume = 1;

  const voice = chooseVoice();
  if(voice) u.voice = voice;

  speechSynthesis.speak(u);
}

function playInstruction(){
  getAudioContext();

  const text = "Count the vertices. A circle has zero vertices. A triangle has three vertices. A square has four vertices. Write zero, three, and four on the big dotted numbers.";
  speechBox.textContent = "Write 0 for Circle, 3 for Triangle, and 4 for Square.";
  speak(text);
}

function getStudentSession(){
  try{
    return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
  }catch(err){
    return null;
  }
}

function saveProgress(){
  const percent = getTotalProgress();
  const stars = getStars(percent);
  const session = getStudentSession() || {};

  const record = {
    pageId:PAGE_ID,
    file:PAGE_FILE,
    title:"LA21 • Vertices Week 4",
    level:LEVEL,
    week:4,
    month:1,
    type:"writing",
    activityType:"writing",
    score:percent,
    percent,
    tracing:percent,
    stars,
    completed:percent >= 85,
    skills:{
      reading:1,
      writing:percent >= 25 ? 1 : 0,
      listening:1,
      speaking:0
    },
    classId:session.classId || null,
    studentId:session.studentId || null,
    studentName:session.studentName || session.displayName || session.name || session.fullName || null,
    updatedAt:new Date().toISOString(),
    savedAt:new Date().toISOString(),
    ts:Date.now()
  };

  try{
    localStorage.setItem("LA21_WRITING_PROGRESS", JSON.stringify(record));

    const activityProgress = JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_PROGRESS") || "{}");
    activityProgress[PAGE_ID] = record;
    localStorage.setItem("GP_EIS_ACTIVITY_PROGRESS", JSON.stringify(activityProgress));

    const activityResults = JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    activityResults[PAGE_ID] = record;
    localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(activityResults));

    const progressReport = JSON.parse(localStorage.getItem("GP_EIS_PROGRESS_REPORT") || "{}");
    progressReport[PAGE_ID] = record;
    localStorage.setItem("GP_EIS_PROGRESS_REPORT", JSON.stringify(progressReport));

    localStorage.setItem("GP_EIS_LAST_FILE", PAGE_FILE);

    window.dispatchEvent(new CustomEvent("gp-eis-progress-updated", { detail:record }));
  }catch(err){
    console.warn("Progress could not be saved:", err);
  }
}

function openProgressReport(){
  saveProgress();
  location.href = "../../../../ProgressReport.html";
}

document.getElementById("girlBtn").addEventListener("click", playInstruction);
document.getElementById("instructionBtn").addEventListener("click", playInstruction);
document.getElementById("clearBtn").addEventListener("click", clearWriting);
document.getElementById("reportBtn").addEventListener("click", openProgressReport);

document.getElementById("prevBtn").addEventListener("click", () => {
  saveProgress();
  location.href = "../tuesday/LA20.html";
});

document.getElementById("nextBtn").addEventListener("click", () => {
  saveProgress();
  location.href = "LA25.html";
});

function init(){
  digitCanvases.forEach(setupWritableDigit);
  updateProgress();

  if("speechSynthesis" in window){
    speechSynthesis.onvoiceschanged = chooseVoice;
  }

  setTimeout(() => {
    speechBox.textContent = "Tap the chef or Instruction button to hear what to do.";
  },300);
}

document.addEventListener("DOMContentLoaded", init);
</script>

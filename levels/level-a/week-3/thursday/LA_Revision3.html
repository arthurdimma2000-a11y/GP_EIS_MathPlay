<!doctype html>
<html lang="en">
<head>
<style id="gpLessonPrehide">
  .convo-line,.speech-line,.dialog-line,.bubble-line,.bubble-left,.bubble-right,#bubbleLeft,#bubbleRight{display:none !important;}
  .row.convo-line.show,.row.speech-line.show,.row.dialog-line.show,.row.bubble-line.show{display:flex !important;}
  .convo-line.show,.speech-line.show,.dialog-line.show,.bubble-line.show,.bubble-left.show,.bubble-right.show,#bubbleLeft.show,#bubbleRight.show{display:block !important;}
  .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,1.9vw,19px) !important;line-height:1.24 !important;max-width:min(40vw,320px) !important;white-space:normal !important;word-break:break-word !important;overflow-wrap:anywhere !important;}
  @media (max-width:780px){
    .bubble,.speech-bubble,.dialog-bubble,.convo-bubble{font-size:clamp(13px,3.6vw,17px) !important;max-width:min(44vw,220px) !important;line-height:1.2 !important;}
  }
</style>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>LA15 - Practice Squares</title>
<style>
  :root{font-family:"Comic Sans MS","Segoe UI",system-ui,-apple-system,Arial;--ink:#2d2d2d;--red:#d62828;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#bfe9fb;padding:18px;}
  .card{width:min(980px,96vw);background:#fff;border-radius:18px;padding:18px 18px 28px;box-shadow:0 20px 40px rgba(0,0,0,.08);}  
  .poster-area{position:relative;width:min(900px,100%);margin:0 auto;touch-action:none;}
  .poster-img{width:100%;height:auto;display:block;position:relative;z-index:0;pointer-events:none;}
  .dot-layer{position:absolute;inset:0;pointer-events:none;z-index:1;}
  .draw-layer{position:absolute;inset:0;z-index:2;touch-action:none;display:block;pointer-events:auto;cursor:crosshair;}
  .controls{margin-top:10px;display:flex;flex-direction:column;gap:10px;align-items:center;}
  .button-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  button{border:none;border-radius:999px;padding:8px 16px;font-weight:700;cursor:pointer;background:linear-gradient(180deg,#fffad7,#ffd86a);color:#8b5a00;box-shadow:0 4px 0 rgba(0,0,0,.2);}  
  .progress-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .progress-bar{width:min(520px,92%);height:12px;border-radius:999px;background:#e7efff;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.15);}  
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#3cc4ff,#7dffb3);transition:width .15s ease-out;}
  .progress-text{font-weight:700;}
  .progress-message{font-weight:800;color:#2e9b2e;min-height:1.2em;}
  .tap-row{display:flex;align-items:center;gap:10px;}
  .tap-girl{width:82px;height:82px;border-radius:22px;box-shadow:0 6px 14px rgba(0,0,0,.2);border:4px solid #ffe3f7;cursor:pointer;}
  .tap-label{font-weight:700;color:#d62828;}
  .sentence{
    position:absolute;
    left:8%;
    right:8%;
    top:10%;
    min-height:2.4em;
    font-weight:700;
    font-size:1.6rem;
    text-align:center;
    z-index:3;
  }
  .line{opacity:0;transform:translateY(6px);transition:opacity .2s ease,transform .2s ease;}
  .line.show{opacity:1;transform:translateY(0);}  
  .red{color:var(--red);}  
</style>
<style id="gpUnifiedIntroPrehide">#introVideoWrap,.intro-video-wrap,#lbIntroVideoOverlay{display:none !important;visibility:hidden !important;opacity:0 !important;pointer-events:none !important;}</style>
</head>
<body>
  <div class="card">
    <div class="poster-area" id="posterArea">
      <img class="poster-img" src="../../../../assets/images/shapes/A15.png" alt="Squares tracing poster">
      <canvas class="draw-layer" id="drawLayer"></canvas>
      <div class="sentence" id="girlSentence"></div>
    </div>

    <div class="controls">
      <div class="progress-wrap">
        <div class="progress-text">Trace progress: <span id="progressPercent">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-message" id="progressMessage"></div>
      </div>
      <div class="tap-row">
        <img src="../../../../assets/images/shapes/CirckleGirlWk1.png" alt="Tap the girl" class="tap-girl" id="girlBtn" class="tap-girl">
        <div class="tap-label">Tap the girl</div>
      </div>
      <div class="button-row">
        <button id="prevBtn"><- Previous page</button>
        <button id="clearBtn">Clear [X]</button>
        <button id="nextBtn">Next page -></button>
      </div>
    </div>
  </div>

<script src="../../../../shared/js/storage.js"></script>
<script src="../../../../shared/js/progress.js"></script>
<script src="../../../../shared/js/tracing.js"></script>
<script>
  const posterArea = document.getElementById('posterArea');
  const posterImg = posterArea.querySelector('.poster-img');
  const drawLayer = document.getElementById('drawLayer');
  const ctx = drawLayer.getContext('2d');
  const progressPercentEl = document.getElementById('progressPercent');
  const progressFillEl = document.getElementById('progressFill');
  const progressMessageEl = document.getElementById('progressMessage');
  const girlBtn = document.getElementById('girlBtn');
  const girlSentenceEl = document.getElementById('girlSentence');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const clearBtn = document.getElementById('clearBtn');

  const boxes = [
    { id:'s1', x0:0.10, x1:0.45, y0:0.28, y1:0.52 },
    { id:'s2', x0:0.55, x1:0.90, y0:0.28, y1:0.52 },
    { id:'s3', x0:0.10, x1:0.45, y0:0.56, y1:0.90 },
    { id:'s4', x0:0.55, x1:0.90, y0:0.56, y1:0.90 }
  ];

  const shapes = boxes.map(box => {
    const padX = 0;
    const padY = 0;
    const tl = { x: box.x0 + padX, y: box.y0 + padY };
    const tr = { x: box.x1 - padX, y: box.y0 + padY };
    const br = { x: box.x1 - padX, y: box.y1 - padY };
    const bl = { x: box.x0 + padX, y: box.y1 - padY };
    return { id: box.id, points: [tl, tr, br, bl] };
  });

  const samples = new Map();
  const visited = new Map();
  const completed = new Set();
  let lastTraceSound = 0;
  let doneSentence = false;

  function speak(text){
    if(!('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.0; u.pitch = 1.05; u.volume = 1.0;
    window.speechSynthesis.speak(u);
  }

  function playChime(){
    try{ const chime = new Audio('../../../../assets/audio/chimes/chime.mp3.mp3'); chime.play().catch(()=>{}); }catch(e){}
  }

  function playTraceTick(){
    try{
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if(!AudioCtx) return;
      const a = new AudioCtx();
      const osc = a.createOscillator();
      const gain = a.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.value = 0.05;
      osc.connect(gain);
      gain.connect(a.destination);
      osc.start();
      osc.stop(a.currentTime + 0.05);
      osc.onended = () => a.close();
    }catch(e){}
  }

  function msgFor(pct){
    if (pct >= 90) return 'Wow! you are super smart!';
    if (pct >= 50) return 'Amazing Job!';
    if (pct >= 50) return 'Good Job but try again!';
    return 'Oh no! try again!';
  }

  const shapePercents = new Map();
  function updateTotal(){
    const values = shapes.map(s => shapePercents.get(s.id) || 0);
    const total = values.length ? Math.round(values.reduce((a,b)=>a+b,0)/values.length) : 0;
    progressPercentEl.textContent = total + '%';
    progressFillEl.style.width = total + '%';
    progressMessageEl.textContent = msgFor(total);
    if(total >= 90 && !doneSentence){
      doneSentence = true;
      playChime();
      const line = 'A <span class="red">square</span> has 4 <span class="red">vertices</span>.';
      girlSentenceEl.innerHTML = `<div class="line">${line}</div>`;
      girlSentenceEl.querySelector('.line').classList.add('show');
      if(window.startTypingSound) window.startTypingSound(900);
      speak('A square has 4 vertices.');
    }
  }


  function toCanvasPoint(pt){
    return { x: pt.x * drawLayer.width, y: pt.y * drawLayer.height };
  }

  function buildSamples(){
    samples.clear(); visited.clear(); completed.clear();
    shapes.forEach(shape => {
      const ptsCanvas = shape.points.map(p => toCanvasPoint(p));
      const s = [];
      for(let i=0;i<ptsCanvas.length;i++){
        const a = ptsCanvas[i];
        const b = ptsCanvas[(i+1)%ptsCanvas.length];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx,dy);
        const steps = Math.max(1, Math.ceil(dist/8));
        for(let k=0;k<=steps;k++){
          s.push({ x: a.x + (dx*k/steps), y: a.y + (dy*k/steps) });
        }
      }
      samples.set(shape.id, s);
      visited.set(shape.id, new Array(s.length).fill(false));
    });
    updateTotal();
  }

  function resize(){
    const imgRect = posterImg.getBoundingClientRect();
    const areaRect = posterArea.getBoundingClientRect();
    const width = imgRect.width || areaRect.width;
    const height = imgRect.height || areaRect.height;
    if(!width || !height){ requestAnimationFrame(resize); return; }
    drawLayer.width = width; drawLayer.height = height;
    drawLayer.style.width = width + 'px';
    drawLayer.style.height = height + 'px';
    ctx.clearRect(0,0,drawLayer.width,drawLayer.height);
    buildSamples();
  }

  function updateVisited(pos){
    const threshold = 10;
    const thr2 = threshold * threshold;
    shapes.forEach(shape => {
      if(completed.has(shape.id)) return;
      const s = samples.get(shape.id) || [];
      const v = visited.get(shape.id) || [];
      let changed = false;
      for(let i=0;i<s.length;i++){
        if(v[i]) continue;
        const dx = pos.x - s[i].x;
        const dy = pos.y - s[i].y;
        if(dx*dx + dy*dy <= thr2){ v[i]=true; changed=true; }
      }
      if(changed){
      const pct = Math.round((v.filter(Boolean).length / s.length) * 100);
      shapePercents.set(shape.id, pct);
      if(pct >= 90){ completed.add(shape.id); }
      }
    });
    updateTotal();
  }

  let drawing = false;
  function getEventPos(e){
    const rect = drawLayer.getBoundingClientRect();
    if (e.touches && e.touches[0]) {
      return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    }
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
  function startDraw(e){
    e.preventDefault();
    drawing = true;
    const pos = getEventPos(e);
    ctx.beginPath(); ctx.moveTo(pos.x,pos.y);
    updateVisited(pos);
  }
  function moveDraw(e){
    if(!drawing) return; e.preventDefault();
    const pos = getEventPos(e);
    ctx.lineTo(pos.x,pos.y);
    ctx.lineWidth = 5; ctx.lineCap='round'; ctx.strokeStyle='#ff4d4d'; ctx.stroke();
    updateVisited(pos);
    const now = performance.now();
    if(now - lastTraceSound > 120){ lastTraceSound = now; playTraceTick(); }
  }
  function endDraw(e){ if(!drawing) return; e && e.preventDefault(); drawing = false; }
  drawLayer.addEventListener('pointerdown', startDraw);
  drawLayer.addEventListener('pointermove', moveDraw);
  drawLayer.addEventListener('pointerup', endDraw);
  drawLayer.addEventListener('pointerleave', endDraw);
  drawLayer.addEventListener('pointercancel', endDraw);
  drawLayer.addEventListener('mousedown', startDraw);
  drawLayer.addEventListener('mousemove', moveDraw);
  drawLayer.addEventListener('mouseup', endDraw);
  drawLayer.addEventListener('touchstart', startDraw, { passive:false });
  drawLayer.addEventListener('touchmove', moveDraw, { passive:false });
  drawLayer.addEventListener('touchend', endDraw);

  clearBtn.addEventListener('click', () => {
    ctx.clearRect(0,0,drawLayer.width,drawLayer.height);
    doneSentence = false;
    buildSamples();
  });
  prevBtn.addEventListener('click', () => { window.location.href = '../wednesday/LA19.html'; });
  nextBtn.addEventListener('click', () => { window.location.href = '../friday/LA_Game3.html'; });

  girlBtn.addEventListener('click', () => {
    girlSentenceEl.innerHTML = '<div class="line">Practice drawing <span class="red">squares</span>.</div>';
    const line = girlSentenceEl.querySelector('.line');
    line.classList.add('show');
    if(window.startTypingSound) window.startTypingSound(900);
    speak('Practice drawing squares.');
  });

  resize();
  if (posterImg && !posterImg.complete) { posterImg.addEventListener('load', resize, { once:true }); }
  window.addEventListener('resize', resize);
</script>
<script src="../../../../activity-standardizer.js"></script>
<script type="module">
  import { saveActivityResult, markLoginPing } from "../../../../progress-tracker.js";
  window.GPProgress.installTracker({
    saveActivityResult,
    markLoginPing,
    defaultPageId: "LA_Revision3",
    defaultLevel: "A",
    defaultActivityType: "revision",
    defaultScore: 100,
    defaultStars: 1,
    defaultSkills: {
      reading: 1,
      writing: 0,
      speaking: 1,
      listening: 1
    }
  });

  function getStudentSession(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_STUDENT_SESSION") || "null");
    }catch(e){
      return null;
    }
  }

  function inferProgressMeta(payload){
    const pageId = String((payload && payload.pageId) || ((location.pathname || "").split("/").pop() || "Activity").replace(/\.html$/i, ""));
    const file = (payload && (payload.file || payload.fileName)) || (pageId + ".html");
    const level = (payload && payload.level)
      || (/^(LA|LevelA|Level_A)/i.test(pageId) ? "A" : (/^(LB|LevelB|Level_B)/i.test(pageId) ? "B" : (/^(LC|LevelC|Level_C)/i.test(pageId) ? "C" : "A")));
    const weekMatch = String(location.pathname || "").match(/week-(\d+)/i);
    const inferredWeek = weekMatch ? Number(weekMatch[1]) : 1;
    const week = payload && payload.week != null ? Number(payload.week) : inferredWeek;
    const month = payload && payload.month != null ? Number(payload.month) : 1;
    return {
      pageId,
      file,
      level,
      week: Number.isFinite(week) && week > 0 ? week : 1,
      month: Number.isFinite(month) && month > 0 ? month : 1
    };
  }

  function getActivityStore(){
    try{
      return JSON.parse(localStorage.getItem("GP_EIS_ACTIVITY_RESULTS") || "{}");
    }catch(e){
      return {};
    }
  }

  function setActivityStore(store){
    try{
      localStorage.setItem("GP_EIS_ACTIVITY_RESULTS", JSON.stringify(store || {}));
    }catch(e){}
  }

  function saveLocalActivityFallback(payload){
    const session = getStudentSession() || {};
    const meta = inferProgressMeta(payload || {});
    const score = payload && typeof payload.score === "number" ? payload.score : 0;
    const stars = payload && typeof payload.stars === "number" ? payload.stars : 0;
    const tracing = payload && typeof payload.tracing === "number"
      ? payload.tracing
      : (payload && typeof payload.progress === "number" ? payload.progress : 0);
    const type = (payload && payload.type) || (payload && payload.activityType) || "lesson";
    const entry = {
      pageId: meta.pageId,
      file: meta.file,
      level: meta.level,
      type,
      activityType: (payload && payload.activityType) || type,
      score,
      stars,
      skills: payload && payload.skills ? payload.skills : {},
      completed: payload && typeof payload.completed === "boolean" ? payload.completed : true,
      tracing,
      week: meta.week,
      month: meta.month,
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null,
      savedAt: new Date().toISOString(),
      ts: Date.now()
    };
    const store = getActivityStore();
    store[meta.pageId] = {
      ...(store[meta.pageId] || {}),
      ...entry
    };
    setActivityStore(store);
    try{
      localStorage.setItem("GP_EIS_LAST_FILE", meta.file);
    }catch(e){}
    return store[meta.pageId];
  }

  async function finishAndSave(payload){
    const session = getStudentSession() || {};
    const fullPayload = {
      ...(payload || {}),
      classId: (payload && payload.classId) || session.classId || null,
      studentId: (payload && payload.studentId) || session.studentId || null,
      studentName: (payload && payload.studentName) || session.studentName || session.displayName || session.name || session.fullName || null
    };
  
    saveLocalActivityFallback(fullPayload);
  
    if (typeof window.finishActivity === "function") {
      try{
        await window.finishActivity(fullPayload);
      }catch(err){
        console.warn("finishActivity failed, local fallback already saved:", err);
      }
    }
  
    return fullPayload;
  }

  window.finishAndSave = finishAndSave;
</script>
</body>
</html>

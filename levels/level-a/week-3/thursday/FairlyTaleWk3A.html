<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FairlyTaleWk3A</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --text: #ffffff;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      --radius: 24px;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    #pageContent {
      width: 100%;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.28s ease;
    }

    body.intro-complete #pageContent {
      opacity: 1;
      visibility: visible;
    }

    #lbIntroVideoOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.82);
      z-index: 9999;
    }

    #lbIntroVideoOverlay[hidden] {
      display: none !important;
    }

    .intro-panel {
      width: min(920px, 100%);
      background: rgba(15, 15, 15, 0.96);
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      border: 2px solid rgba(255, 255, 255, 0.14);
    }

    .intro-title {
      color: #fff4d6;
      font-size: clamp(1.1rem, 2.4vw, 1.5rem);
      font-weight: 900;
      text-align: center;
      margin-bottom: 12px;
    }

    #lbIntroVideo {
      width: 100%;
      max-height: 72vh;
      border-radius: 18px;
      object-fit: contain;
      background: #000;
      display: block;
    }

    .intro-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .intro-btn {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 18px;
      min-width: 140px;
      font-size: 0.96rem;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
    }

    .intro-btn.sound {
      background: linear-gradient(180deg, #38bdf8, #0284c7);
    }

    .intro-btn.skip {
      background: linear-gradient(180deg, #fb923c, #ea580c);
    }

    .intro-help {
      margin-top: 10px;
      text-align: center;
      color: #fef3c7;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .page-wrap {
      width: 100%;
      max-width: 700px;
    }

    .title-bar {
      text-align: center;
      margin-bottom: 14px;
    }

    .title-bar h1 {
      font-size: clamp(1.4rem, 2vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.4px;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
    }

    .video-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 1080 / 1612;
      max-height: 90vh;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 3px solid rgba(255, 255, 255, 0.12);
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #000;
    }

    .top-nav {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.08));
      z-index: 5;
      pointer-events: none;
    }

    .top-nav-left,
    .top-nav-right {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: auto;
    }

    .nav-btn {
      border: none;
      outline: none;
      cursor: pointer;
      color: #fff;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(6px);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
      transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    }

    .nav-btn:hover {
      transform: translateY(-1px) scale(1.02);
      background: rgba(30, 41, 59, 0.92);
    }

    .nav-btn:active {
      transform: scale(0.98);
    }

    .nav-home {
      background: rgba(245, 158, 11, 0.92);
      color: #111827;
    }

    .nav-next {
      background: rgba(56, 189, 248, 0.95);
      color: #082f49;
    }

    .side-nav {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .side-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      font-weight: 900;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      pointer-events: auto;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    .side-btn:hover {
      transform: translateY(-50%) scale(1.06);
      background: rgba(0, 0, 0, 0.62);
    }

    .side-btn.left {
      left: 12px;
    }

    .side-btn.right {
      right: 12px;
    }

    .bottom-bar {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(6px);
      z-index: 5;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
    }

    .bottom-bar .lesson-name {
      font-size: 0.98rem;
      font-weight: 800;
      color: #fff;
    }

    .bottom-bar .hint {
      font-size: 0.86rem;
      color: #dbeafe;
      opacity: 0.95;
    }

    .tap-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.18);
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .tap-overlay.show {
      opacity: 1;
    }

    .tap-card {
      background: rgba(15, 23, 42, 0.8);
      color: #fff;
      padding: 12px 18px;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
    }

    .nav-hidden {
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .nav-visible {
      opacity: 1;
      transition: opacity 0.25s ease;
    }

    @media (max-width: 600px) {
      body {
        padding: 8px;
      }

      .video-shell {
        border-radius: 18px;
      }

      .nav-btn {
        padding: 9px 12px;
        font-size: 0.85rem;
      }

      .side-btn {
        width: 50px;
        height: 50px;
      }

      .bottom-bar {
        padding: 10px 12px;
      }

      .bottom-bar .lesson-name {
        font-size: 0.9rem;
      }

      .bottom-bar .hint {
        font-size: 0.78rem;
      }

      .intro-panel {
        padding: 12px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="lbIntroVideoOverlay">
    <div class="intro-panel">
      <div class="intro-title">FairlyTaleWk3A Intro</div>
      <video
        id="lbIntroVideo"
        playsinline
        autoplay
        muted
        preload="metadata"
      >
        <source src="https://res.cloudinary.com/dtknykrkf/video/upload/v1777183060/LAWk3FairlyTale_ic3rae.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>

      <div class="intro-actions">
        <button type="button" class="intro-btn sound" id="turnOnSoundBtn">Turn On Sound</button>
        <button type="button" class="intro-btn skip" id="skipIntroBtn">Skip Intro</button>
      </div>

      <div class="intro-help">If the intro does not play, the lesson page will open automatically.</div>
    </div>
  </div>

  <div id="pageContent">
    <div class="page-wrap">
      <div class="title-bar">
        <h1>FairlyTaleWk3A</h1>
      </div>

      <div class="video-shell" id="videoShell">
        <video
          id="lessonVideo"
          controls
          playsinline
          preload="metadata"
        >
          <source src="https://res.cloudinary.com/dtknykrkf/video/upload/v1777183060/LAWk3FairlyTale_ic3rae.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>

        <div class="tap-overlay" id="tapOverlay">
          <div class="tap-card">Tap video to Play / Pause</div>
        </div>

        <div class="top-nav nav-visible" id="topNav">
          <div class="top-nav-left">
            <button class="nav-btn nav-home" id="homeBtn">🏠 Home</button>
            <button class="nav-btn" id="backBtn">⬅ Back</button>
          </div>

          <div class="top-nav-right">
            <button class="nav-btn" id="replayBtn">⟲ Replay</button>
            <button class="nav-btn nav-next" id="nextBtn">Next ➜</button>
            <button class="nav-btn" id="fullscreenBtn">⛶ Full Screen</button>
          </div>
        </div>

        <div class="side-nav">
          <button class="side-btn left" id="sideBackBtn" aria-label="Go to previous page">❮</button>
          <button class="side-btn right" id="sideNextBtn" aria-label="Go to next page">❯</button>
        </div>

        <div class="bottom-bar nav-visible" id="bottomBar">
          <div class="lesson-name">FairlyTaleWk3A Video</div>
          <div class="hint">Use the buttons to move around the app</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* =========================
       EDIT THESE PAGE LINKS
       ========================= */
    const VIDEO_SRC = "https://res.cloudinary.com/dtknykrkf/video/upload/v1777183060/LAWk3FairlyTale_ic3rae.mp4";
    const INTRO_VIDEO_URL = "https://res.cloudinary.com/dtknykrkf/video/upload/v1777183060/LAWk3FairlyTale_ic3rae.mp4";

    const HOME_PAGE = "../../../../index.html";
    const PREVIOUS_PAGE = "../wednesday/LA19.html";
    const NEXT_PAGE = "../friday/LA_Game3.html";

    const video = document.getElementById("lessonVideo");
    const videoShell = document.getElementById("videoShell");
    const homeBtn = document.getElementById("homeBtn");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    const sideBackBtn = document.getElementById("sideBackBtn");
    const sideNextBtn = document.getElementById("sideNextBtn");
    const replayBtn = document.getElementById("replayBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const topNav = document.getElementById("topNav");
    const bottomBar = document.getElementById("bottomBar");
    const tapOverlay = document.getElementById("tapOverlay");
    const introOverlay = document.getElementById("lbIntroVideoOverlay");
    const introVideo = document.getElementById("lbIntroVideo");
    const turnOnSoundBtn = document.getElementById("turnOnSoundBtn");
    const skipIntroBtn = document.getElementById("skipIntroBtn");

    let introFinished = false;
    let navTimer;

    function setVideoSource(videoEl, url) {
      const source = videoEl.querySelector("source");
      if (source) {
        source.src = url;
        videoEl.load();
      } else {
        videoEl.src = url;
      }
    }

    setVideoSource(video, VIDEO_SRC);
    setVideoSource(introVideo, INTRO_VIDEO_URL);

    function revealPageContent() {
      if (introFinished) return;
      introFinished = true;
      document.body.classList.add("intro-complete");

      if (introOverlay) {
        introOverlay.hidden = true;
      }

      if (introVideo) {
        try {
          introVideo.pause();
        } catch (err) {}
      }
    }

    function goHome() {
      window.location.href = HOME_PAGE || "index.html";
    }

    function goBackPage() {
      if (PREVIOUS_PAGE && PREVIOUS_PAGE.trim() !== "") {
        window.location.href = PREVIOUS_PAGE;
      } else if (document.referrer) {
        history.back();
      } else {
        goHome();
      }
    }

    function goNextPage() {
      if (NEXT_PAGE && NEXT_PAGE.trim() !== "") {
        window.location.href = NEXT_PAGE;
      } else {
        goHome();
      }
    }

    function replayVideo() {
      video.currentTime = 0;
      video.play().catch(() => {});
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await videoShell.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (err) {
        console.log("Fullscreen not supported on this device/browser.", err);
      }
    }

    function togglePlayPause() {
      if (video.paused) {
        video.play().catch(() => {});
      } else {
        video.pause();
      }
      showTapHint();
    }

    function enableIntroSound() {
      if (!introVideo) return;
      introVideo.muted = false;
      introVideo.volume = 1;
      introVideo.play().catch(() => {});
      turnOnSoundBtn.textContent = "Sound On";
      turnOnSoundBtn.disabled = true;
    }

    function showNavigation() {
      topNav.classList.remove("nav-hidden");
      topNav.classList.add("nav-visible");
      bottomBar.classList.remove("nav-hidden");
      bottomBar.classList.add("nav-visible");

      clearTimeout(navTimer);
      navTimer = setTimeout(() => {
        topNav.classList.remove("nav-visible");
        topNav.classList.add("nav-hidden");
        bottomBar.classList.remove("nav-visible");
        bottomBar.classList.add("nav-hidden");
      }, 3500);
    }

    function showTapHint() {
      tapOverlay.classList.add("show");
      setTimeout(() => {
        tapOverlay.classList.remove("show");
      }, 900);
      showNavigation();
    }

    if (introVideo) {
      introVideo.addEventListener("ended", revealPageContent);
      introVideo.addEventListener("error", revealPageContent);
      introVideo.addEventListener("stalled", () => {
        window.setTimeout(() => {
          if (!introFinished && (!introVideo.currentSrc || introVideo.networkState === 3)) {
            revealPageContent();
          }
        }, 1200);
      });

      introVideo.play().catch(() => {});
    } else {
      revealPageContent();
    }

    if (turnOnSoundBtn) {
      turnOnSoundBtn.addEventListener("click", enableIntroSound);
    }

    if (skipIntroBtn) {
      skipIntroBtn.addEventListener("click", revealPageContent);
    }

    window.setTimeout(() => {
      if (!introFinished && introVideo && introVideo.readyState < 1) {
        revealPageContent();
      }
    }, 4000);

    homeBtn.addEventListener("click", goHome);
    backBtn.addEventListener("click", goBackPage);
    nextBtn.addEventListener("click", goNextPage);
    sideBackBtn.addEventListener("click", goBackPage);
    sideNextBtn.addEventListener("click", goNextPage);
    replayBtn.addEventListener("click", replayVideo);
    fullscreenBtn.addEventListener("click", toggleFullscreen);

    video.addEventListener("click", togglePlayPause);
    videoShell.addEventListener("mousemove", showNavigation);
    videoShell.addEventListener("touchstart", showNavigation, { passive: true });
    video.addEventListener("play", showNavigation);
    video.addEventListener("pause", showNavigation);
    video.addEventListener("ended", showNavigation);

    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (key === " ") {
        e.preventDefault();
        togglePlayPause();
      } else if (key === "arrowleft") {
        e.preventDefault();
        goBackPage();
      } else if (key === "arrowright") {
        e.preventDefault();
        goNextPage();
      } else if (key === "h") {
        goHome();
      } else if (key === "f") {
        toggleFullscreen();
      } else if (key === "r") {
        replayVideo();
      }
    });

    showNavigation();
  </script>
  <script src="../../../../shared/js/activity-standardizer-shared.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>LA Game 3 • Corner Count Parade</title>
<style>
  :root{
    font-family:"Comic Sans MS","Baloo 2","Segoe UI",system-ui,-apple-system,Arial;
    --bg:#d7fff1; --bg2:#ffd6ff; --ink:#1f1f1f; --card:#fff;
    --shadow:0 18px 50px rgba(0,0,0,.14);
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:18px;
    background:
      radial-gradient(circle at 20% 10%, var(--bg2), transparent 55%),
      radial-gradient(circle at 80% 30%, #fff6a6, transparent 55%),
      linear-gradient(135deg, var(--bg), #cde7ff);
  }
  .app{width:min(1060px,96vw)}
  .top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .badge{
    background:#fff; border-radius:999px; padding:10px 14px; font-weight:1000;
    box-shadow:0 10px 25px rgba(0,0,0,.10); display:flex;gap:10px;align-items:center
  }
  .badge .pill{background:#1c7ed6;color:#fff;padding:6px 10px;border-radius:999px;font-size:14px}
  .btn{
    border:0; cursor:pointer; border-radius:999px; padding:10px 14px; font-weight:1000;
    box-shadow:0 12px 25px rgba(0,0,0,.12); background:#fff; color:#111;
  }
  .btn.primary{background:#2b8a3e;color:#fff}
  .btn:active{transform:translateY(1px)}
  .card{background:var(--card); border-radius:22px; box-shadow:var(--shadow); overflow:hidden}
  .hero{padding:16px 18px; background:linear-gradient(90deg,#ffed9a,#c8fff7); border-bottom:2px dashed rgba(0,0,0,.08)}
  h1{margin:0;font-size:28px}
  .sub{margin-top:6px;font-size:18px;opacity:.86}
  .grid{display:grid;grid-template-columns:1.1fr .9fr; gap:14px; padding:16px 18px 20px}
  @media (max-width:860px){.grid{grid-template-columns:1fr}}
  .panel{
    border:2px solid rgba(0,0,0,.06); border-radius:18px; padding:14px; background:linear-gradient(180deg,#f7fbff,#fff)
  }
  .stage{
    border-radius:18px; border:2px solid rgba(0,0,0,.06); background:#fff;
    height:360px; display:grid; place-items:center; overflow:hidden;
  }
  .choices{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  .chip{
    border:0; cursor:pointer; border-radius:16px; padding:12px 14px; font-size:18px; font-weight:1000;
    box-shadow:0 10px 20px rgba(0,0,0,.10); background:#fff;
  }
  .chip.good{background:#e9ffef}
  .chip.bad{background:#ffe9ef}
  .hud{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:center;justify-content:space-between}
  .stat{background:#fff;border-radius:14px;padding:10px 12px;box-shadow:0 10px 20px rgba(0,0,0,.10);font-weight:1000}
  .mini{height:170px;border-radius:16px;overflow:hidden;border:2px solid rgba(0,0,0,.06)}
  .tip{margin-top:10px;background:#fff;padding:12px;border-radius:16px;box-shadow:0 10px 20px rgba(0,0,0,.10);font-size:18px}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="badge"><span class="pill">Level A</span> <span>Game 3 • Corner Count Parade</span></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end">
      <button class="btn" onclick="location.href='../thursday/FairlyTaleWk3A.html'">⬅ Back</button>
      <button class="btn" onclick="newRound()">🔁 New</button>
      <button class="btn primary" onclick="location.href='LA_Quiz3.html'">Next ➜</button>
    </div>
  </div>

  <div class="card">
    <div class="hero">
      <h1>How many vertices (corners)? ⭐</h1>
      <div class="sub">Circle = 0 • Triangle = 3 • Square = 4</div>
    </div>

    <div class="grid">
      <div class="panel">
        <div class="stage" id="stage"></div>

        <div class="choices" id="choices"></div>

        <div class="hud">
          <div class="stat">✅ Correct: <span id="ok">0</span></div>
          <div class="stat">❌ Wrong: <span id="no">0</span></div>
          <div class="stat">⭐ Stars: <span id="stars">0</span></div>
          <button class="btn primary" onclick="finish()">🏁 Finish</button>
        </div>
      </div>

      <div class="panel" style="background:linear-gradient(180deg,#fff7c2,#ffffff)">
        <div class="mini" id="mini"></div>
        <div class="tip"><b>Hint:</b> Vertices are the <b>sharp corners</b> you can point to with your finger!</div>
        <div class="tip" style="background:#eaf4ff"><b>Challenge:</b> Get 6 correct answers for ⭐⭐⭐</div>
        <button class="btn" style="margin-top:10px" onclick="speak()">🔊 Read</button>
      </div>
    </div>
  </div>
</div>

<script>
/* Tracker + sound */
(function(){
  const STORE="gpeis_progress_v1";
  function load(){ try{return JSON.parse(localStorage.getItem(STORE)||"{}")}catch(e){return{}} }
  function save(db){ localStorage.setItem(STORE, JSON.stringify(db)); }
  function now(){ return new Date().toISOString(); }
  let ctx=null;
  function audio(){ if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)(); return ctx; }
  function beep(freq, t, g=.05, type="triangle"){
    const c=audio(), o=c.createOscillator(), gn=c.createGain();
    o.type=type; o.frequency.value=freq; gn.gain.value=g;
    o.connect(gn); gn.connect(c.destination); o.start(); o.stop(c.currentTime+t);
  }
  function chime(){ try{beep(880,.08); setTimeout(()=>beep(1175,.10),90); setTimeout(()=>beep(1568,.12),200);}catch(e){} }
  function cheer(){ try{beep(523,.09,.05,"sine"); setTimeout(()=>beep(659,.09,.05,"sine"),80); setTimeout(()=>beep(784,.11,.05,"sine"),160); setTimeout(()=>beep(988,.14,.05,"sine"),260);}catch(e){} }

  window.__LegacyTrack__ = {
    complete({level, activityId, score=0, stars=0}){
      const db=load();
      if(!db[level]) db[level]={level, updatedAt:now(), activities:{}};
      const lvl=db[level];
      if(!lvl.activities[activityId]) lvl.activities[activityId]={id:activityId, attempts:0, bestScore:0, bestStars:0, completed:false};
      const a=lvl.activities[activityId];
      a.attempts++; a.completed=true; a.lastScore=score; a.lastStars=stars; a.lastAt=now();
      a.bestScore=Math.max(a.bestScore||0, score);
      a.bestStars=Math.max(a.bestStars||0, stars);
      lvl.updatedAt=now(); save(db);
      chime(); if(stars>=2||score>=70) cheer();
      return a;
    }
  };
  window.__sound={chime,cheer};
})();

const stage=document.getElementById("stage");
const choices=document.getElementById("choices");
const okEl=document.getElementById("ok");
const noEl=document.getElementById("no");
const starsEl=document.getElementById("stars");

let ok=0,no=0,rounds=0,goal=6,current=null;

function art(shape){
  if(shape==="circle"){
    return `<svg viewBox="0 0 520 320" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="bg" x1="0" x2="1"><stop offset="0" stop-color="#ffd1f3"/><stop offset="1" stop-color="#c7f9ff"/></linearGradient></defs>
      <rect width="520" height="320" rx="26" fill="url(#bg)"/>
      <circle cx="260" cy="170" r="96" fill="#ffbf69" stroke="#fff" stroke-width="10"/>
      <text x="260" y="72" text-anchor="middle" font-size="30" font-family="Comic Sans MS, Segoe UI" font-weight="900">CIRCLE</text>
      <text x="260" y="286" text-anchor="middle" font-size="26" font-family="Comic Sans MS, Segoe UI" font-weight="900">Vertices = 0</text>
    </svg>`;
  }
  if(shape==="triangle"){
    return `<svg viewBox="0 0 520 320" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="bg" x1="0" x2="1"><stop offset="0" stop-color="#fff6a6"/><stop offset="1" stop-color="#c8fff7"/></linearGradient></defs>
      <rect width="520" height="320" rx="26" fill="url(#bg)"/>
      <polygon points="260,70 410,255 110,255" fill="#ff6b6b" stroke="#fff" stroke-width="10"/>
      <circle cx="260" cy="70" r="7" fill="#222"/><circle cx="410" cy="255" r="7" fill="#222"/><circle cx="110" cy="255" r="7" fill="#222"/>
      <text x="260" y="58" text-anchor="middle" font-size="30" font-family="Comic Sans MS, Segoe UI" font-weight="900">TRIANGLE</text>
      <text x="260" y="292" text-anchor="middle" font-size="26" font-family="Comic Sans MS, Segoe UI" font-weight="900">Vertices = 3</text>
    </svg>`;
  }
  return `<svg viewBox="0 0 520 320" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="bg" x1="0" x2="1"><stop offset="0" stop-color="#cde7ff"/><stop offset="1" stop-color="#d7fff1"/></linearGradient></defs>
    <rect width="520" height="320" rx="26" fill="url(#bg)"/>
    <rect x="160" y="80" width="200" height="200" rx="22" fill="#4dabf7" stroke="#fff" stroke-width="10"/>
    <circle cx="160" cy="80" r="7" fill="#222"/><circle cx="360" cy="80" r="7" fill="#222"/><circle cx="160" cy="280" r="7" fill="#222"/><circle cx="360" cy="280" r="7" fill="#222"/>
    <text x="260" y="58" text-anchor="middle" font-size="30" font-family="Comic Sans MS, Segoe UI" font-weight="900">SQUARE</text>
    <text x="260" y="306" text-anchor="middle" font-size="26" font-family="Comic Sans MS, Segoe UI" font-weight="900">Vertices = 4</text>
  </svg>`;
}

function setMini(){
  document.getElementById("mini").innerHTML = `
  <svg viewBox="0 0 520 320" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <rect width="520" height="320" rx="26" fill="#ffffff"/>
    <text x="260" y="70" text-anchor="middle" font-size="28" font-family="Comic Sans MS, Segoe UI" font-weight="900">Remember!</text>
    <text x="260" y="120" text-anchor="middle" font-size="24" font-family="Comic Sans MS, Segoe UI">⭕ 0 corners</text>
    <text x="260" y="170" text-anchor="middle" font-size="24" font-family="Comic Sans MS, Segoe UI">🔺 3 corners</text>
    <text x="260" y="220" text-anchor="middle" font-size="24" font-family="Comic Sans MS, Segoe UI">🟦 4 corners</text>
    <text x="260" y="280" text-anchor="middle" font-size="20" font-family="Comic Sans MS, Segoe UI" fill="#555">Tap the correct number!</text>
  </svg>`;
}
setMini();

function newRound(){
  const shapes=["circle","triangle","square"];
  current = shapes[Math.floor(Math.random()*shapes.length)];
  stage.innerHTML = art(current);
  choices.innerHTML = "";

  const correct = current==="circle"?0:current==="triangle"?3:4;
  const opts = [0,3,4].sort(()=>Math.random()-0.5);

  opts.forEach(n=>{
    const b=document.createElement("button");
    b.className="chip";
    b.textContent = n + " corners";
    b.onclick=()=>{
      rounds++;
      if(n===correct){
        ok++; __sound.chime();
        speak(["Great job!", "Correct!", "Well done!", "Awesome!"][Math.floor(Math.random()*4)]);
        b.classList.add("good");
      }else{
        no++; __sound.cheer();
        speak(["Try again!", "Not quite!", "Keep going!"][Math.floor(Math.random()*3)]);
        b.classList.add("bad");
      }
      okEl.textContent=ok; noEl.textContent=no;

      const stars = ok>=goal ? 3 : ok>=4 ? 2 : ok>=2 ? 1 : 0;
      starsEl.textContent=stars;

      setTimeout(()=>{ if(rounds<8) newRound(); }, 450);
    };
    choices.appendChild(b);
}
newRound();

window.addEventListener("load", () => {
  setTimeout(() => {
    speak("Welcome to the corner count game! Count the vertices on each shape. Circle has zero, triangle has three, square has four. Tap the correct number!");
  }, 500);
});

async function finish(){
  const total = Math.max(1, ok+no);
  const score = Math.round((ok/total)*100);
  const stars = Number(starsEl.textContent)||0;

  if (window.GPTrack && typeof window.GPTrack.finish === "function") {
    await window.GPTrack.finish({
      pageId: "LA_Game3",
      level: "A",
      activityType: "game",
      score,
      stars,
      skills: { reading: 0, writing: 0, speaking: 0, listening: 1 }
    });
  } else if (window.__LegacyTrack__ && typeof window.__LegacyTrack__.complete === "function") {
    window.__LegacyTrack__.complete({ level: "A", activityId: "LA_Game3", score, stars });
  }
  alert("🏁 Finished!\nScore: "+score+"%\nStars: "+("⭐".repeat(stars)||"0"));
}

function speak(){
  const txt="Count the corners. Circle has zero vertices. Triangle has three. Square has four. Tap the correct number!";
  try{
    const u=new SpeechSynthesisUtterance(txt);
    u.rate=0.95; u.pitch=1.1;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch(e){}
}
</script>
<script type="module" src="./progress-tracker.js"></script>
<script>
  window.addEventListener("load", () => {
    if (!window.GPTrack) return;
    const pageFile = ((location.pathname || "").split("/").pop() || "").replace(/\.html$/i, "");
    GPTrack.start(pageFile || document.title || "Activity");
  });

  async function finishActivity(overrides = {}){
    if (!window.GPTrack) return;
    const pageFile = ((location.pathname || "").split("/").pop() || "").replace(/\.html$/i, "");
    const inferredLevel = (/^(LA|LevelA|Level_A)/i.test(pageFile))
      ? "A"
      : (/^(LB|LevelB)/i.test(pageFile))
        ? "B"
        : (/^(LC|LevelC)/i.test(pageFile))
          ? "C"
          : null;

    await GPTrack.finish({
      pageId: pageFile || document.title || "Activity",
      level: inferredLevel,
      activityType: "activity",
      score: null,
      stars: 0,
      skills: { reading: 0, writing: 0, speaking: 0, listening: 0 },
      ...overrides
    });
  }
</script>
</body>
</html>

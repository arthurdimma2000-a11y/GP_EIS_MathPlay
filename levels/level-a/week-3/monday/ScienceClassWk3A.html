<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScienceClassWk3A</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --text: #ffffff;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      --radius: 24px;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    #pageContent {
      width: 100%;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.28s ease;
    }

    body.intro-complete #pageContent {
      opacity: 1;
      visibility: visible;
    }

    #lbIntroVideoOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.82);
      z-index: 9999;
    }

    #lbIntroVideoOverlay[hidden] {
      display: none !important;
    }

    .intro-panel {
      width: min(920px, 100%);
      background: rgba(15, 15, 15, 0.96);
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      border: 2px solid rgba(255, 255, 255, 0.14);
    }

    .intro-title {
      color: #fff4d6;
      font-size: clamp(1.1rem, 2.4vw, 1.5rem);
      font-weight: 900;
      text-align: center;
      margin-bottom: 12px;
    }

    #lbIntroVideo {
      width: 100%;
      max-height: 72vh;
      border-radius: 18px;
      object-fit: contain;
      background: #000;
      display: block;
    }

    .intro-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .intro-btn {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 18px;
      min-width: 140px;
      font-size: 0.96rem;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
    }

    .intro-btn.sound {
      background: linear-gradient(180deg, #38bdf8, #0284c7);
    }

    .intro-btn.skip {
      background: linear-gradient(180deg, #fb923c, #ea580c);
    }

    .intro-help {
      margin-top: 10px;
      text-align: center;
      color: #fef3c7;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .page-wrap {
      width: 100%;
      max-width: 700px;
    }

    .title-bar {
      text-align: center;
      margin-bottom: 14px;
    }

    .title-bar h1 {
      font-size: clamp(1.4rem, 2vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.4px;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
    }

    .video-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 1080 / 1612;
      max-height: 90vh;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 3px solid rgba(255, 255, 255, 0.12);
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #000;
    }

    #traceCanvas {
      position: absolute;
      inset: 0;
      z-index: 3;
      width: 100%;
      height: 100%;
      pointer-events: none;
      touch-action: none;
    }

    #traceCanvas.trace-active {
      pointer-events: auto;
      cursor: crosshair;
    }

    .trace-toolbar {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 78px;
      z-index: 7;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      padding: 10px 12px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.78);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
    }

    .trace-left,
    .trace-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .trace-btn {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 0.86rem;
      font-weight: 900;
      color: #082f49;
      background: linear-gradient(180deg, #e0f2fe, #38bdf8);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.24);
      transition: transform 0.15s ease, filter 0.2s ease;
    }

    .trace-btn:hover {
      transform: translateY(-1px) scale(1.02);
      filter: brightness(1.04);
    }

    .trace-btn.active {
      background: linear-gradient(180deg, #fef08a, #f59e0b);
      color: #111827;
    }

    .trace-btn.clear {
      background: linear-gradient(180deg, #fecaca, #ef4444);
      color: #fff;
    }

    .trace-status {
      font-size: 0.86rem;
      font-weight: 900;
      color: #ffffff;
      min-width: 102px;
    }

    .trace-progress-wrap {
      width: min(220px, 44vw);
      height: 13px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.45);
    }

    .trace-progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #22c55e, #bef264);
      transition: width 0.18s ease;
    }

    .top-nav {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.08));
      z-index: 8;
      pointer-events: none;
    }

    .top-nav-left,
    .top-nav-right {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: auto;
    }

    .nav-btn {
      border: none;
      outline: none;
      cursor: pointer;
      color: #fff;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(6px);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
      transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    }

    .nav-btn:hover {
      transform: translateY(-1px) scale(1.02);
      background: rgba(30, 41, 59, 0.92);
    }

    .nav-btn:active {
      transform: scale(0.98);
    }

    .nav-home {
      background: rgba(245, 158, 11, 0.92);
      color: #111827;
    }

    .nav-next {
      background: rgba(56, 189, 248, 0.95);
      color: #082f49;
    }

    .side-nav {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
    }

    .side-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      font-weight: 900;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      pointer-events: auto;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    .side-btn:hover {
      transform: translateY(-50%) scale(1.06);
      background: rgba(0, 0, 0, 0.62);
    }

    .side-btn.left {
      left: 12px;
    }

    .side-btn.right {
      right: 12px;
    }

    .bottom-bar {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(6px);
      z-index: 7;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
    }

    .bottom-bar .lesson-name {
      font-size: 0.98rem;
      font-weight: 800;
      color: #fff;
    }

    .bottom-bar .hint {
      font-size: 0.86rem;
      color: #dbeafe;
      opacity: 0.95;
    }

    .tap-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.18);
      z-index: 4;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .tap-overlay.show {
      opacity: 1;
    }

    .tap-card {
      background: rgba(15, 23, 42, 0.8);
      color: #fff;
      padding: 12px 18px;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
    }

    .nav-hidden {
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .nav-visible {
      opacity: 1;
      transition: opacity 0.25s ease;
    }

    @media (max-width: 600px) {
      body {
        padding: 8px;
      }

      .video-shell {
        border-radius: 18px;
      }

      .nav-btn {
        padding: 9px 12px;
        font-size: 0.85rem;
      }

      .side-btn {
        width: 50px;
        height: 50px;
      }

      .bottom-bar {
        padding: 10px 12px;
      }

      .bottom-bar .lesson-name {
        font-size: 0.9rem;
      }

      .bottom-bar .hint {
        font-size: 0.78rem;
      }

      .trace-toolbar {
        bottom: 72px;
        padding: 9px 10px;
      }

      .trace-btn {
        padding: 8px 11px;
        font-size: 0.78rem;
      }

      .trace-status {
        font-size: 0.78rem;
      }

      .trace-progress-wrap {
        width: 150px;
      }

      .intro-panel {
        padding: 12px;
        border-radius: 18px;
      }
    }
  </style>
</head>

<body>
  <div id="lbIntroVideoOverlay">
    <div class="intro-panel">
      <div class="intro-title">Science Class Week 3A Intro</div>

      <video
        id="lbIntroVideo"
        playsinline
        autoplay
        muted
        preload="metadata"
      >
        <source src="https://res.cloudinary.com/dtknykrkf/video/upload/v1777183025/Scienceclasslawk3_kf1smd.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>

      <div class="intro-actions">
        <button type="button" class="intro-btn sound" id="turnOnSoundBtn">Turn On Sound</button>
        <button type="button" class="intro-btn skip" id="skipIntroBtn">Skip Intro</button>
      </div>

      <div class="intro-help">If the intro does not play, the lesson page will open automatically.</div>
    </div>
  </div>

  <div id="pageContent">
    <div class="page-wrap">
      <div class="title-bar">
        <h1>Science Class Week 3A</h1>
      </div>

      <div class="video-shell" id="videoShell">
        <video
          id="lessonVideo"
          controls
          playsinline
          preload="metadata"
        >
          <source src="https://res.cloudinary.com/dtknykrkf/video/upload/v1777183025/Scienceclasslawk3_kf1smd.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>

        <canvas id="traceCanvas" aria-label="Student tracing canvas"></canvas>

        <div class="tap-overlay" id="tapOverlay">
          <div class="tap-card">Tap video to Play / Pause</div>
        </div>

        <div class="top-nav nav-visible" id="topNav">
          <div class="top-nav-left">
            <button class="nav-btn nav-home" id="homeBtn" type="button">🏠 Home</button>
            <button class="nav-btn" id="backBtn" type="button">⬅ Back</button>
          </div>

          <div class="top-nav-right">
            <button class="nav-btn" id="replayBtn" type="button">⟲ Replay</button>
            <button class="nav-btn nav-next" id="nextBtn" type="button">Next ➜</button>
            <button class="nav-btn" id="fullscreenBtn" type="button">⛶ Full Screen</button>
          </div>
        </div>

        <div class="side-nav">
          <button class="side-btn left" id="sideBackBtn" type="button" aria-label="Go to previous page">❮</button>
          <button class="side-btn right" id="sideNextBtn" type="button" aria-label="Go to next page">❯</button>
        </div>

        <div class="trace-toolbar nav-visible" id="traceToolbar">
          <div class="trace-left">
            <button class="trace-btn" id="traceModeBtn" type="button">✏️ Start Tracing</button>
            <button class="trace-btn clear" id="clearTraceBtn" type="button">🧽 Clear</button>
          </div>

          <div class="trace-right">
            <div class="trace-status" id="traceStatus">Trace: 0%</div>
            <div class="trace-progress-wrap" aria-label="Trace progress">
              <div class="trace-progress-fill" id="traceProgressFill"></div>
            </div>
          </div>
        </div>

        <div class="bottom-bar nav-visible" id="bottomBar">
          <div class="lesson-name">Science Class Week 3A Video</div>
          <div class="hint" id="bottomHint">Tap “Start Tracing” to draw on the page.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const VIDEO_SRC = "https://res.cloudinary.com/dtknykrkf/video/upload/v1777183025/Scienceclasslawk3_kf1smd.mp4";
    const INTRO_VIDEO_URL = "https://res.cloudinary.com/dtknykrkf/video/upload/v1777183025/Scienceclasslawk3_kf1smd.mp4";

    const HOME_PAGE = "../../../../index.html";
    const PREVIOUS_PAGE = "../../week-2/friday/LA_Quiz2.html";
    const NEXT_PAGE = "../tuesday/LA14.html";

    const ACTIVITY_ID = "ScienceClassWk3A";
    const TRACE_STROKES_KEY = "GP_EIS_TRACE_STROKES_" + ACTIVITY_ID;
    const TRACE_PROGRESS_KEY = "GP_EIS_TRACE_PROGRESS_" + ACTIVITY_ID;
    const TARGET_CELLS_FOR_100_PERCENT = 150;

    const video = document.getElementById("lessonVideo");
    const videoShell = document.getElementById("videoShell");
    const homeBtn = document.getElementById("homeBtn");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    const sideBackBtn = document.getElementById("sideBackBtn");
    const sideNextBtn = document.getElementById("sideNextBtn");
    const replayBtn = document.getElementById("replayBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const topNav = document.getElementById("topNav");
    const bottomBar = document.getElementById("bottomBar");
    const bottomHint = document.getElementById("bottomHint");
    const tapOverlay = document.getElementById("tapOverlay");
    const introOverlay = document.getElementById("lbIntroVideoOverlay");
    const introVideo = document.getElementById("lbIntroVideo");
    const turnOnSoundBtn = document.getElementById("turnOnSoundBtn");
    const skipIntroBtn = document.getElementById("skipIntroBtn");

    const traceCanvas = document.getElementById("traceCanvas");
    const traceCtx = traceCanvas.getContext("2d");
    const traceModeBtn = document.getElementById("traceModeBtn");
    const clearTraceBtn = document.getElementById("clearTraceBtn");
    const traceStatus = document.getElementById("traceStatus");
    const traceProgressFill = document.getElementById("traceProgressFill");

    let introFinished = false;
    let navTimer;

    let tracingMode = false;
    let drawing = false;
    let lastPoint = null;
    let currentStroke = null;
    let strokes = [];
    let touchedCells = new Set();
    let saveTimer = null;

    const GRID_COLS = 28;
    const GRID_ROWS = 42;
    const BRUSH_SIZE = 8;

    function setVideoSource(videoEl, url) {
      const source = videoEl.querySelector("source");
      if (source) {
        source.src = url;
        videoEl.load();
      } else {
        videoEl.src = url;
      }
    }

    setVideoSource(video, VIDEO_SRC);
    setVideoSource(introVideo, INTRO_VIDEO_URL);
    if (video) {
      try { video.pause(); } catch (err) {}
      video.muted = true;
      video.volume = 0;
    }

    function revealPageContent() {
      if (introFinished) return;
      introFinished = true;
      document.body.classList.add("intro-complete");

      if (introOverlay) {
        introOverlay.hidden = true;
      }

      if (introVideo) {
        try {
          introVideo.pause();
        } catch (err) {}
      }

      if (video) {
        video.muted = false;
        video.volume = 1;
        try { video.currentTime = 0; } catch (err) {}
        video.play().catch(() => {});
      }

      resizeTraceCanvas();
      loadSavedTrace();
      showNavigation();
    }

    function goHome() {
      window.location.href = HOME_PAGE || "index.html";
    }

    function goBackPage() {
      if (PREVIOUS_PAGE && PREVIOUS_PAGE.trim() !== "") {
        window.location.href = PREVIOUS_PAGE;
      } else if (document.referrer) {
        history.back();
      } else {
        goHome();
      }
    }

    function goNextPage() {
      saveTraceProgress();
      if (NEXT_PAGE && NEXT_PAGE.trim() !== "") {
        window.location.href = NEXT_PAGE;
      } else {
        goHome();
      }
    }

    function replayVideo() {
      video.currentTime = 0;
      video.play().catch(() => {});
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await videoShell.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
        setTimeout(resizeTraceCanvas, 250);
      } catch (err) {
        console.log("Fullscreen not supported on this device/browser.", err);
      }
    }

    function togglePlayPause() {
      if (tracingMode) return;

      if (video.paused) {
        video.play().catch(() => {});
      } else {
        video.pause();
      }

      showTapHint();
    }

    function enableIntroSound() {
      if (!introVideo) return;
      introVideo.muted = false;
      introVideo.volume = 1;
      introVideo.play().catch(() => {});
      turnOnSoundBtn.textContent = "Sound On";
      turnOnSoundBtn.disabled = true;
    }

    function showNavigation() {
      topNav.classList.remove("nav-hidden");
      topNav.classList.add("nav-visible");

      bottomBar.classList.remove("nav-hidden");
      bottomBar.classList.add("nav-visible");

      document.getElementById("traceToolbar").classList.remove("nav-hidden");
      document.getElementById("traceToolbar").classList.add("nav-visible");

      clearTimeout(navTimer);

      navTimer = setTimeout(() => {
        if (tracingMode) return;

        topNav.classList.remove("nav-visible");
        topNav.classList.add("nav-hidden");

        bottomBar.classList.remove("nav-visible");
        bottomBar.classList.add("nav-hidden");

        document.getElementById("traceToolbar").classList.remove("nav-visible");
        document.getElementById("traceToolbar").classList.add("nav-hidden");
      }, 3500);
    }

    function showTapHint() {
      tapOverlay.classList.add("show");
      setTimeout(() => tapOverlay.classList.remove("show"), 900);
      showNavigation();
    }

    function resizeTraceCanvas() {
      const rect = traceCanvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);

      traceCanvas.width = Math.round(rect.width * dpr);
      traceCanvas.height = Math.round(rect.height * dpr);

      traceCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      redrawTrace();
    }

    function getCanvasSize() {
      return {
        width: traceCanvas.clientWidth || traceCanvas.getBoundingClientRect().width,
        height: traceCanvas.clientHeight || traceCanvas.getBoundingClientRect().height
      };
    }

    function getPointerPoint(event) {
      const rect = traceCanvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;

      return {
        x,
        y,
        nx: rect.width ? x / rect.width : 0,
        ny: rect.height ? y / rect.height : 0
      };
    }

    function drawLine(from, to) {
      traceCtx.save();
      traceCtx.lineCap = "round";
      traceCtx.lineJoin = "round";
      traceCtx.strokeStyle = "#ff2d55";
      traceCtx.lineWidth = BRUSH_SIZE;
      traceCtx.shadowColor = "rgba(255, 255, 255, 0.85)";
      traceCtx.shadowBlur = 4;

      traceCtx.beginPath();
      traceCtx.moveTo(from.x, from.y);
      traceCtx.lineTo(to.x, to.y);
      traceCtx.stroke();

      traceCtx.restore();
    }

    function redrawTrace() {
      const size = getCanvasSize();
      traceCtx.clearRect(0, 0, size.width, size.height);

      strokes.forEach((stroke) => {
        for (let i = 1; i < stroke.length; i++) {
          const from = {
            x: stroke[i - 1].nx * size.width,
            y: stroke[i - 1].ny * size.height
          };
          const to = {
            x: stroke[i].nx * size.width,
            y: stroke[i].ny * size.height
          };
          drawLine(from, to);
        }
      });

      rebuildCoverage();
      updateTraceProgress();
    }

    function markCoverage(point) {
      const col = Math.max(0, Math.min(GRID_COLS - 1, Math.floor(point.nx * GRID_COLS)));
      const row = Math.max(0, Math.min(GRID_ROWS - 1, Math.floor(point.ny * GRID_ROWS)));
      touchedCells.add(row + ":" + col);
    }

    function markCoverageBetween(from, to) {
      const dx = to.nx - from.nx;
      const dy = to.ny - from.ny;
      const steps = Math.max(4, Math.ceil(Math.sqrt(dx * dx + dy * dy) * 260));

      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        markCoverage({
          nx: from.nx + dx * t,
          ny: from.ny + dy * t
        });
      }
    }

    function rebuildCoverage() {
      touchedCells.clear();

      strokes.forEach((stroke) => {
        for (let i = 1; i < stroke.length; i++) {
          markCoverageBetween(stroke[i - 1], stroke[i]);
        }
      });
    }

    function getTracePercent() {
      return Math.min(100, Math.round((touchedCells.size / TARGET_CELLS_FOR_100_PERCENT) * 100));
    }

    function updateTraceProgress() {
      const percent = getTracePercent();
      traceStatus.textContent = "Trace: " + percent + "%";
      traceProgressFill.style.width = percent + "%";
      scheduleTraceSave();
    }

    function startDrawing(event) {
      if (!tracingMode) return;

      event.preventDefault();
      drawing = true;

      const point = getPointerPoint(event);
      lastPoint = point;
      currentStroke = [point];
      strokes.push(currentStroke);

      markCoverage(point);
      updateTraceProgress();

      try {
        traceCanvas.setPointerCapture(event.pointerId);
      } catch (err) {}
    }

    function continueDrawing(event) {
      if (!tracingMode || !drawing || !lastPoint || !currentStroke) return;

      event.preventDefault();

      const point = getPointerPoint(event);
      const size = getCanvasSize();

      drawLine(
        {
          x: lastPoint.nx * size.width,
          y: lastPoint.ny * size.height
        },
        {
          x: point.nx * size.width,
          y: point.ny * size.height
        }
      );

      currentStroke.push(point);
      markCoverageBetween(lastPoint, point);
      lastPoint = point;
      updateTraceProgress();
    }

    function stopDrawing(event) {
      if (!drawing) return;

      drawing = false;
      lastPoint = null;
      currentStroke = null;
      saveTraceProgress();

      try {
        traceCanvas.releasePointerCapture(event.pointerId);
      } catch (err) {}
    }

    function toggleTraceMode() {
      tracingMode = !tracingMode;

      traceCanvas.classList.toggle("trace-active", tracingMode);
      traceModeBtn.classList.toggle("active", tracingMode);

      if (tracingMode) {
        video.pause();
        traceModeBtn.textContent = "✅ Tracing On";
        bottomHint.textContent = "Use your finger or mouse to trace on the page.";
        showNavigation();
      } else {
        traceModeBtn.textContent = "✏️ Start Tracing";
        bottomHint.textContent = "Tap “Start Tracing” to draw on the page.";
        saveTraceProgress();
      }
    }

    function clearTrace() {
      strokes = [];
      touchedCells.clear();

      const size = getCanvasSize();
      traceCtx.clearRect(0, 0, size.width, size.height);

      localStorage.removeItem(TRACE_STROKES_KEY);
      updateTraceProgress();
      saveTraceProgress();
    }

    function scheduleTraceSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveTraceProgress, 250);
    }

    function saveTraceProgress() {
      const percent = getTracePercent();

      const record = {
        activityId: ACTIVITY_ID,
        title: "Science Class Week 3A",
        type: "tracing",
        score: percent,
        percent: percent,
        completed: percent >= 80,
        updatedAt: new Date().toISOString()
      };

      try {
        localStorage.setItem(TRACE_STROKES_KEY, JSON.stringify(strokes));
        localStorage.setItem(TRACE_PROGRESS_KEY, JSON.stringify(record));

        const appProgressKey = "GP_EIS_ACTIVITY_PROGRESS";
        const allProgress = JSON.parse(localStorage.getItem(appProgressKey) || "{}");
        allProgress[ACTIVITY_ID] = record;
        localStorage.setItem(appProgressKey, JSON.stringify(allProgress));

        window.dispatchEvent(new CustomEvent("gp-eis-progress-updated", { detail: record }));
      } catch (err) {
        console.warn("Could not save trace progress.", err);
      }
    }

    function loadSavedTrace() {
      try {
        const saved = JSON.parse(localStorage.getItem(TRACE_STROKES_KEY) || "[]");
        if (Array.isArray(saved)) {
          strokes = saved;
          redrawTrace();
        }
      } catch (err) {
        strokes = [];
      }
    }

    if (introVideo) {
      introVideo.addEventListener("ended", revealPageContent);
      introVideo.addEventListener("error", revealPageContent);
      introVideo.addEventListener("stalled", () => {
        window.setTimeout(() => {
          if (!introFinished && (!introVideo.currentSrc || introVideo.networkState === 3)) {
            revealPageContent();
          }
        }, 1200);
      });

      introVideo.play().catch(() => {});
    } else {
      revealPageContent();
    }

    if (turnOnSoundBtn) {
      turnOnSoundBtn.addEventListener("click", enableIntroSound);
    }

    if (skipIntroBtn) {
      skipIntroBtn.addEventListener("click", () => {
        if (introVideo) {
          try { introVideo.pause(); } catch (err) {}
        }
        try { video.pause(); } catch (err) {}
        goNextPage();
      });
    }

    window.setTimeout(() => {
      if (!introFinished && introVideo && introVideo.readyState < 1) {
        revealPageContent();
      }
    }, 4000);

    homeBtn.addEventListener("click", goHome);
    backBtn.addEventListener("click", goBackPage);
    nextBtn.addEventListener("click", goNextPage);
    sideBackBtn.addEventListener("click", goBackPage);
    sideNextBtn.addEventListener("click", goNextPage);
    replayBtn.addEventListener("click", replayVideo);
    fullscreenBtn.addEventListener("click", toggleFullscreen);

    traceModeBtn.addEventListener("click", toggleTraceMode);
    clearTraceBtn.addEventListener("click", clearTrace);

    traceCanvas.addEventListener("pointerdown", startDrawing);
    traceCanvas.addEventListener("pointermove", continueDrawing);
    traceCanvas.addEventListener("pointerup", stopDrawing);
    traceCanvas.addEventListener("pointercancel", stopDrawing);
    traceCanvas.addEventListener("pointerleave", stopDrawing);

    video.addEventListener("click", togglePlayPause);
    videoShell.addEventListener("mousemove", showNavigation);
    videoShell.addEventListener("touchstart", showNavigation, { passive: true });
    video.addEventListener("play", showNavigation);
    video.addEventListener("pause", showNavigation);
    video.addEventListener("ended", showNavigation);

    window.addEventListener("resize", resizeTraceCanvas);
    document.addEventListener("fullscreenchange", () => setTimeout(resizeTraceCanvas, 250));

    document.addEventListener("keydown", (e) => {
      const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : "";
      if (activeTag === "button" || activeTag === "input" || activeTag === "textarea") return;

      const key = e.key.toLowerCase();

      if (key === " ") {
        e.preventDefault();
        togglePlayPause();
      } else if (key === "arrowleft") {
        e.preventDefault();
        goBackPage();
      } else if (key === "arrowright") {
        e.preventDefault();
        goNextPage();
      } else if (key === "h") {
        goHome();
      } else if (key === "f") {
        toggleFullscreen();
      } else if (key === "r") {
        replayVideo();
      } else if (key === "t") {
        toggleTraceMode();
      } else if (key === "c") {
        clearTrace();
      }
    });

    showNavigation();
  </script>

  <script src="../../../../shared/js/activity-standardizer-shared.js"></script>
</body>
</html>
